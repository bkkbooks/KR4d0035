body:
  text: 蘇魏公文集巻五十三宋蘇頌撰碑銘資政殿學士通議大夫孫公神道碑銘有宋四朝耆德之臣資政殿學士通議大夫兼侍讀提舉中太一宫兼集禧觀公事柱國樂安郡開國侯食邑一千六百户食實封三百户贈銀青光祿大夫謚康簡孫公墓在汝州襄城縣永安鄕某里孫氏世為趙郡人自公之曽祖贈工部侍郎諱澄而上皆居平棘死則葬其邑祖給事中集賢院學士判西京留守御史臺贈工部尚書諱冲以官終洛陽因葬襄城父贈銀青光禄大夫諱旦徙占潁昌府長社縣子孫遂為許人公以元祐二年正月壬午薨於京師嗣子承事郎愭護䘮南歸卜其年五月庚申祔於祖塋之次越四年春愭袖公履歴功狀泣訴於某曰愭罪逆未殞已畢祥除而終鮮兄弟獨任宗事行當去逺墳墓重惟先人之大行大節則有今右丞相髙平公所撰德銘存焉然而石納幽堂人莫得見謹案禮令官終三品立碑墓下今龜螭具矣敢縁平日之雅請文揭於神道使得終事死無憾矣某辱與公游且三十年昔官同省後位同列出入趣舍亦多同者紀述遺德可無言乎公諱永字曼叔生十年而失所怙大父愛育置之子行再奏守將作監主簿慶厯二年服祖重畢自列於朝正其三代而官之詔換試銜六年擢進士第補汝州襄城縣尉所部列薦遷襄州宜城縣令考課改著作佐郎轉秘書丞太常博士歴知蔡州確山縣公吏事明逹民情隱伏方俗媺惡靡不究其纎悉一有教告則民信而服在襄城修保伍相司之法而宿奸僑寇為之屏逺在宜城復長渠灌漑之利前後太守為之表章用水多寡之節刋為定令至今不改在確山立兩稅輸納之限不煩督責而編户相戒應期自集嘉祐二年御史中丞賈公薦公文中御史詔且下矣以母錢塘郡太夫人錢氏髙年不當任言責力辭不拜未幾三司奏選為京東西淮南三路寛恤民力公所至詢民疾苦得其弊在鄉户吏主持物務及漕運緩急輕重不均致有亡家破産之患因考輯衆論斟酌裁定著為成法上之朝廷頒行諸路皆以為便韓康公帥環慶表公管勾機宜文字英宗即位遷尚書屯田員外郎轉都官府罷於審官格當注逺官亦以母故求任筦庫時大司徒韓忠獻公當國擢公提舉河北糴便糧草踰年召為權發遣三司開拆司公事治平三年諸王出閣建府選公為侍讀神宗初潛好學不倦一日出新錄韓非子屬府僚讎校公進白曰韓非險薄刻覈背六經帝王之旨願勿留意神宗曰録此聊以備藏書之數非所好也明年升儲以公為司封員外郎太子舍人神宗即位拜工部郎中充天章閣待制主管三班院案條束吏躬操簿籍凡有員闕取選者績效髙下到選先後預銓次之至集注日依名唱授無復爭訟出為陜西體量安撫使時諸路旱歉使者四出轉粟以哺流殍公會所在倉庾軍食之餘悉以振贍故民頼以全活者為多值有中旨捕送叛人景詢族屬入西界者不以赦原公言陛下新即位首布大號惡逆者猶蠲除之縁坐者反不宥非所以考春秋謹始之義而取信於天下也歴河北陜西都轉運使是時以邉用不足解鹽市馬别為一司外臺不得干預公奏曰鹽馬國之大計使者耑其柄旣無統𨽻苟為非法孰從而制之耶熙寧元年秋遷龍圖閣直學士充秦鳳路經略安撫使知秦州時有布衣上書言邉事稱㫖擢為判司書寫秦鳳路經略司機宜文字執政亦以書抵公言其才至府首談恢復熙河之畫公謂之曰邊陲方靜若無故搔動恐變生不測非敢聞命也遂宻䟽其非便旣而青唐族兵壓邉境謂漢人將錮我青紅鹽之利公遣副帥劉昌祚馳徃喻以無是事酋豪聼命而去㑹新建劉構堡失守有勸公曰此帥事也戮其偏禆可以塞責公曰居敵必爭之地孤軍絶援兵法所謂不得而守者也尤人以全已豈將帥所為乎縁此斥去吾之幸也後竟從坐降授天章閣待制知和州三年四月以提舉詳定熈寧編勅兼知審官東院召還又命為契丹國信使屬執政建議復肉刑事下編勅所公辭日面奏曰刻人肌膚深害仁政漢文有所不忍陛下乃欲行之何也上曰事固未決需卿北歸乃定後竟不果行尋復學士出為髙陽關路安撫使兼知瀛州河決貝丘瀛冀諸郡尤被其害民户賦租前以災傷已嘗倚閣而州縣拘常平法坐視流離科催如故公累章論曰臣言與法盭用事者所不便非出獨斷則一路之民流亡無日矣特詔從其請仍命發廪粟以助救䘏白溝界河常患北人絶河捕魚巡檢趙用擅引兵北渡焚蕩其族帳故致數侵略境上邉郡為之震恐上聞至遣中使宻訪虛實公奏南北信好無間隙但縁趙用侵暴生疑正用罪則無事矣執政繼以書問息耗公答敢以一門保無他後北人軍連珠等寨亘四十里謀起舟師邀邉臣會議公立遣使諭以邉吏冒禁巳繫獄矣隣邦何至輕動耶答曰若罪人已治能以糒醪犒師立自歸矣公命霸州遺而遣之用本沿邉安撫司所辟公慮其銜前隙復致生事遂便宜易置皆中機會有㫖並塞城寨官雖非所舉亦聼自辟六年加樞宻直學士權知開封府畿内新行保甲訓練之令縁案教所須多出編户有訴貧不能辦者它官司皆拒不納至公受而言之稍懲其弊七年春降授龍圖閣直學士提舉中太一宫兼集禧觀公事再以親疾求補外出知潁州又丐閒局以便晨昏改判北京留司御史臺八年冬復舊職遭母䘮去位元豐元年服除判軍器監有司患皮角不足以給造作奏重隱匿不輸之科亡頼輩因此搜剔告訐至及婦女首飾者公為之請應私有皮角使人得鬻於官中度者善價售之不堪者仕其貨易自是材用足而告訐者息矣冬十一月拜河東路經畧安撫使知太原府公三為邉帥務以安靜為治常飭守吏謹約束毋得妄起事要功以速禍敗故二境帖然戎漢未嘗有相侵犯者時謂公寛以得士心信以懷異俗真治世之良帥也三年秋以判將作監召明堂禮畢特拜太中大夫充端明殿學士病不任朝請得提舉嵩山崇福宫踰年起知陳州蔡渠水溢將冒城郭居民驚擾遷徙避溺者不可遏公躬自臨視先嚴禁盗之令訖水退復故安居如昔雖匕筯亦無失者在郡興葺學舍督教官躬課試之程於是禮教行於鄉黨矣京西初行保馬監司趣其期冀速賞格公諭民詔限本寛不必預蓄宻奏監司違法病民之弊有㫖詰責使如前詔七年移知潁昌府八年覃霈遷通議大夫永裕陵役兵數萬轉運使請雇民舟車運許汝諸州常平粟輸陵下州各數十萬斛公言方佃作時調人牛數萬不能無妨農之害䟽入而獲免今上初即位太皇太后臨朝共政詔求直言時政之闕公首陳保馬保甲免役錢三事最敝願一切罷之籍見馬𨽻軍復監牧如舊募保伍之材勇者為兵行前朝差科之政今上皆嘉納之冬十二月詔除工部尚書兼詳定役法今左僕射吕公右僕射范公大資政韓公實並命也一日召對簾前面諭以雇役大率上户太優下户不易所以專委卿等詳定是時故相司馬溫公首議變法命官雜論其所宜未就而溫公薨或有異議欲用輸錢雇役公力陳不可狀及法成多合所議元祐元年三月遷吏部選法擬舊以功過及薦者多寡為差公曰以薦者差其髙下是教人奔競以干薦也乃定選闕惟無過有薦者不限多寡以到選為差次人皆便之未幾以痼疾辭位封章連上明年正月進資政殿學士兼侍讀罷選事提舉中太一宫未及拜命以不起聞制贈銀青光祿大夫公為人外和内勁出於天資其論議平易施設務循故常不求詭異之迹事或悖於義雖逼以山岳之勢亦不為屈然亦未嘗矯抗形於言色故入領臺閣出典州郡職事所及知無不言言無不盡其要領前後有論數十事其尤著者初歸自歴陽陛見日上問近執政建青苗助役之法將以紓民以為便否對曰法誠善矣然強民出息輸錢代徭不能無重斂之患若用以資經費非臣所知也初禁倉庾吏受賕滿百金則配𨽻為軍京司府史有犯亦如之謂之倉法有司奉行極於峻宻上常問公曰倉法之行吏尚為姦乎對曰強盗罪死犯者猶衆況配𨽻乎上曰若爾將縱之乎對曰人但畏法而不能革其心雖府吏臣亦不敢必其無犯它日有敗露是臣今日面欺也赴并門日上詢方今時務所切公言軍器監造作倍常外議以為將有事於征討夫兵非輕用之物魯衆仲有弗戢自焚之戒漢魏相有兵應者勝之論安危禍福之機不可不慎也上曰兵備不虞若宼戎無警朝廷豈有輕動之理卿言是也公之開陳世務切劘上意多此類也熈寧中言利者欲使都城市行輸錢以免直初下開封詢究便否掾曹議無不便公亦循例書其紙尾後躬訪民間多言不便詔公與今大資政韓公同體問利害無何韓公出守河陽公獨任其責時方行市易抵當法貸民錢以期限輸息下户有取貸及期不能償而自裁者上頗知之一日遣中使宻問姓名而提舉者懼先罷免月出錢萬緡矣它日公復對言市行之筭下逮錐刀之末有變其名號以昧上耳用事者知之劾奏公前書府議無不便今乃異論言不以實意在沮撓新法用是罷府河東以監牧廢地招置弓箭手養官馬習戎事公言應募者皆流移僑寄旣非武斷鄉曲之人又無愛戀閭里之意不若罷之以養正兵便忻代二州産鹽苦惡不可食轉運使司旣立監臨増虧之格又重盗販透漏之科巡檢兵吏由是得罪者甚多公奏鹽民食也不可禁兵武備也不可闕今以惡鹽累防兵非所以固圉也是數者皆當時所甚患而言事者畏縮不以聞公極陳其本原深悟上聼先帝以公東宫僚舊待遇特厚凡有所陳皆加意復熟雖或行或格而察公悃愊無它益以信任初病不任朝親遣上醫調診六命近侍問安否且宣諭云欲與卿議邉事何日可出尚虚樞宻員以待公辭不能興懇請道宫以就頤養又遣樞宻副使孫公臨問所以欲去之意公具言其狀上皆從之前歳疾再作太皇太后命内侍賜御膳視所苦旣罷天官錫服升班皆如尚書及薨特遣内貴人存拊其孤賻以銀絹各一千又命中使護䘮歸潁昌府并勑潁昌汝州共辦葬事其恩禮始終近世未有也公自少敏於文詞嘗從諸生肄業西京國子監公私試常在第一尚書公謂之曰洛陽英俊所集爾年少不宜多上人因不復令與諸生員校試自爾每有制作衆皆傳誦學問之餘游思書畫特妙行草喜晉唐諸賢帖臨習逼真當時士大夫得其尺牘藏去以為珍玩碑誌不得公筆子孫以為不足有集三十巻藏於家初忠獻公之知公也因得其詩稿讀之歎愛稱譽不巳一日相見慰籍如平生謂之曰公貴人也遂見引用儲僚之議它執政未有知者忠獻公出其文稿示之咸曰真舍人才也曁公聲稱大顯皆謂忠獻公為知人公善與人交開懐見心中無町畦間以談謔言婉而中理所與游者多一時偉人然於是非當否不少徇情以此或有忤時因之齟齬公亦不悔故更利害歴夷險未嘗芥蔕於中心其内行尤篤與諸父之黨友愛情至有無共之人不知屬之親踈也二妺以寡歸養視於家教其子學以任子恩薦大甥李氏子而以張生猶未及公病亟語愭曰遺奏當先之幸上哀憐澤及張族吾目瞑矣後卒如言公娶京兆康氏某人之子封許昌郡君先七年而亡三男伯慥通直郎季悅並先卒仲即愭也五女一早卒四適人壻將作監主簿朱得象長社縣尉謝愔榖城縣令王士彦宣義郎通判施州燕若材孫男四曰佾曰偓並承奉郎曰倚承務郎曰俶尚幼孫女八人三適人壻曰蘄縣尉張道承奉郎吕仲衍宜芳縣令韓奕賢五幼曽孫二人曰計曰評惟公言行操履見於行事者葢畧得其大要顧鄙言未足以發其藴微竊伏讀某日贈制曰事上見不欺之誠治民多可紀之績此可以見公之忠誠著於朝廷矣又讀考功諡誥曰内外以愛民利物為心平生無怨仇不足之人此又可以見公之行義信於士大夫矣若是則不朽之大名大迹皦然自顯不待刋之金石乃見其美實然則墓之有碑其來逺矣姑紬次其所見聞者以塞孝嗣之請銘曰赫赫炎宋明明神宗紹仁遐武繼英烈功朱邸初開皇僚妙選孰主畫諾孫公康簡康簡之進司徒所知擢於逺仕寘彼通閨始信其言再試之吏績著王家明稱國器公自幼齡嶷然大成文傳西學名動留京初仕州縣不汙卑賤苟利於民瘵勦匪倦其在省臺知無不為及遷御史力以親辭左右東朝導揚三善書斥刑名經崇訓典乾龍天飛風雲會時光華禁序啟納忠規入輔出藩在逺如邇陳戒佳兵深明治體元豐末命二聖臨朝召彼故老服在大僚考工典選議役修令新書舊章自我而定凡公所言邦本為先罷租兩市息警三邉人謀近計我圖長利議雖屢格事迹遄濟先帝知公悉心匪躬公旣感遇相亦惟終雖極九遷不登三事上思遺直寵加賻襚頴川公鄉襄城公藏三世之墓塋闕相望坎堂有銘延道有表岸谷或遷令名不朽皇城使李公神道碑銘原武李氏冑出隴西成紀自西漢前將軍廣始著其邑涉魏晉至隋唐代有顯者在晉則昭武王暠以英姿偉度㨿有梁秦是為唐室始祖王别子之後有魏尚書僕射冲以文學端亮振名一代其裔孫君威仕隋唐至禮部侍郎是嘗集東晉至陳隋八書為南北史未竟而子延夀卒其業者其後失官居鄭卒於滎陽縣之野舍子孫遂占籍焉其居原武者曰顒顒生光光生元超並殖産不仕為鄉里所敬元超生贈左驍衛大將軍諱興咸平二年冬契丹舉衆内寇以東班殿侍從彰國軍節度康保裔戍高陽關護一旅之衆與宼苦戰而援兵不至軍敗死之朝廷賻䘏甚厚錄其一子為西班殿侍即公也公諱樞字仲訥始七歳受父官以材敏精辯稱於所部未二十年七遷為東頭供奉官歴巡轄南雄韶州香藥馬遞舖監鄭州賈育山採石場仁宗初預修永定陵勤最於儕等自殿直擢涇原儀渭州鎮戎軍巡檢徙三門徃來催驅鹽綱趙僖質公罷樞密副使出知河中府舉監本府酒務嵗課溢九千萬方是時元昊以靈夏反陜陲用兵右職之任事者以數百人公籍籍有聲班行中帥府爭欲延致之初從客省使知鄜州張亢辟為本州兵馬監押特旨兼主管駐泊軍馬公事召試弓馬策略中程補閣門祗候陜西四路經略使夏文莊公奏改都監再任移慶州淮安鎮都監管幹東西谷寨會涇原經略使夏公安期奏復瓦亭寨以援原州德順鎮戎兩軍請以公為駐泊兵馬都監從之嘉祐初用刑部尚書李莊公應詔舉提㸃廣南東路刑獄廣源蠻儂智高入宼廣帥仲簡倉卒不知所圖即以事移公公寘其家曲江獨與子昌齡間道赴難在重圍五十六日出竒制變賊卒不能勝事平自内殿崇班閣門祗候遷供備庫副使充廣南西路鈐轄故太子少保元公時為轉運使三奏理公於廣人有大功一官賞薄不足以稱其效於是又遷西京左藏庫副使滿秩超拜供備庫使知儀州以治行優異擢知鎮戎軍就移成都府利州路鈐轄代還例當進秩上書丐移以加贈父一官詔可又用工部尚書知廣州余襄公辟命以文思使充廣東鈐轄就加康州刺史恩數並視三路英宗登極轉左藏庫使歸朝遷皇城使管勾本司神宗覃恩換賀州刺史充本州團練使累表告老請致為政上察其精力猶強職事無廢面諭令再任乃謂親友曰予慿籍先人餘烈遭遇四朝繇冗從無尺寸功伐次遷使持節得備宿衛年過七十有蒲城之敝廬可以佚老而天子仁恩弗忍遽棄尚使充位未遂素志雖然異時若死牖下從蒲津先人之墟墓亦不失其願也熈寧四年年七十九卒於官所諸孤護䘮西歸以其年九月三日葬於河中府河東縣陶邑鄕仙觀里驍衛將軍墳之左次遵治命也公為人外和裕而内勁挺遇事無劇易處之皆有條理議論平允人不能以非義奪善與人交其游皆一時俊傑尤尚氣節不為炎凉易操素善种世衡及廢免勞問周䘏厚於平時世衡謂人曰自吾之黜不改故舊者李君一人而已自嶺外歸驟苦失明名醫髙手咸曰疾不可為也時有蜀川道人李士寧者言事頗異一見公曰是類有隂德者疾自當愈後强治之果如士寧言夫人韓氏某官之女以某年某月卒葬某所繼夫人譚氏遂州觀察使贈太尉廷美之孫崇儀副使贈左金吾衛大將軍繼倫之女封某縣君子男六人曰棻今為中散大夫知邠州曰昌齡三班差使曰蕖某官曰􅀢某官二未名與昌齡皆先亡女九人一學浮屠為比丘尼早卒六已從人壻曰某官張毅某官趙寅某官薛昌圖某官鮑朝賔某官聞人通某官高宣某官劉濟孫三人曰佐某官曰偉曰僅並某官曽孫幾人曰垂用公遺恩今為某官先是衛將軍殁後六十三年嘉祐六年某月公舉其柩曁母夫人永安縣太君朱氏葬河中得故相王荆公文載於碑公之葬也又得荆公之亞弟平父銘誌其墓可為盡禮而盡孝也而諸子猶曰未也以謂誌藏於坎人不得而見之日月旣邁則懿行偉蹟久或不傳而吾親所終官在令當立碑若得銘揭於道則其傳不朽矣謂僕與中散君同年進士不為無素因以事跡見屬僕昔者一拜公前固已高其行義又聞平父嘗稱衛將軍死於國事公以才謀顯於邉鎮中散君以詞學取科第􅀢求解所居官服親䘮蓋亦一門之美事也因記其書齋為忠孝文武以表之誠欲叙其始卒以示後來然有雄辭大筆著於前雖欲文之亦難為工矣姑攟摭前言次而詩之所以成孝子之志也銘曰李著隴西鼻於廣祖系逺族分别占原武原武裔孫曰衛將軍以死勤事不屈契丹公嗣厥武𨽻籍西班服勞六紀遂顯厥官爰初奮迹間關小職見稱巨公謂當逺蹠解池督鹽賈山伐石課溢平時人亡苦役旣徙陜陲方起西師計臺帥閫辟書屢移涇有戍卒叛逃外移數出侵掠捕輙竄馳公以名購得而殺之州人德公久益見思鄜守患城議徙山北命公帥師版築勿亟曽不踰時嶄嶄堅壁四路開府副帥治軍戎事毛宻動必咨詢用其逺謀遂集成勲獄囚殺卒夜出為變公掩獲焉帥欲章薦堅辭不請恐吏受譴漕臺亡金搜牢甚急公曰不逺當在近習一徃即時羣偷就縶淮安近胡熟羌喜亂隂破其謀邉遂無患瓦亭當衝廢久復建招懷初附悉如舊貫南使五嶺刑清盗迸賀有大獄株連儕等軺車即訊重繫半挺活死千餘恕吏一眚儂變内侵封康道梗進逼廣城帥軍不整悉以諉公使當兇獷躬先士奮介馬馳騁外斷重圍中如沸鼎縋卒突門得賊要領遂闢南闉人安市井賊梯雲飛我箭火猛攻具盡摧醜徒莫逞將尋海道潛謀越境公曰歸善彼有健令使子昌齡間道徃請合謀出竒盪焚棹艇腥臊夜遁海隅遂靜有來自賊納之不疑稚弱棄道拊如嬰兒由是疲人赴之如歸事已論功昌齡居最公曰吾子此亦何頼軍賞雖優子獨不逮公初進官使者屢言功厚賞薄豈足勸旃再命増秩俄亦召還送者隘途涕泣留連再領西州儀及鎮戎二邦惠化夷漢懷風昔守用間諜撓其中今悉斥去逺近附從昔苦平糶邊儲薦空今逢樂歳囷倉積充總兵益利政成愷悌人圖其像配昔賢帥廣管飛章辟公副貳天子嘉之恩踰常比衆謡交人浮海且至居民駭驚爭出避地公曰變情吾所嘗試此必奸言爾衆毋避倉場夜火獨馳一騎亟徃視之火亦隨翳於是廣人伏其强明知有預備邑居用寧還朝奏功恩留輦下典領禁城匪躬夙夜封章告老上為慰籍七十九年猶不得謝公方壯時築室於蒲期以年至歸佚吾廬志卒不就人為欷歔考終視履又何慊歟峩峩新丘在河之滸大筆摛詞鑱於沈礎烝烝孝嗣事靡不舉謂銘旣藏人孰與覩維彼豐碑揭於大逵載琢斯文飾以龜螭庶幾遺德顯揚於時用慰孝嗣終天之思蘇魏公文集巻五十三
