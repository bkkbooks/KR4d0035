body:
  text: 蘇魏公文集卷九宋蘇頌撰律詩次韻林次中察院經過南都見寄都府曾為入幕賔玉符重忝守藩臣幾年流落甘閒散平日交遊半要津簿領沈迷千慮耗鬢頤衰颯二毛新聖恩休養深知幸厚祿華堂許便親次韻次中寄莘老學士曽見臺烏朝夕飛尚稽雙鳯浴天池逺方隨牒應難久同好彈冠即有期佐幕暫來光右席莘老屈佐留幕還家聊去植芳籬次中還吳葺居睢陽老尹欽才望待看同升贊盛時又和次中答莘老見招近甸無辭暫駐車吳門雖好隔重湖且嘗竹苑迎霜兔休憶松江上釣鱸老見交朋尤眷戀醉吟風月好躊躇廣陵喜得賢賔客簮履光華勝玳珠次韻久雨言懷久雨涔􅨽浹甸圻層雲暗曖壓城低沈灰將恐蛙生竈負土深防蟻漏堤汴流泛漲府官防河避冷竹窗烘炭獸今嵗早寒九月擁爐禱晴琳館抗旌霓知君方欲行千里早晚殘霞却照西次韻奉和次中叙别嘉句連篇惠好音愧無瓊玉報南金幾年漂泊離羣恨此日逢迎話舊心氣類自應憐茂悅世情誰復擬髙深且將懷抱還尊酒莫為思歸動越吟次韻劉莘老學士惜别言懷兼呈次中察院二首梁園寒早雪霏微親友將分一棹歸客舍蕭條風送栁離筵凄慘酒霑衣霜臺二妙君相繼幕府三端我所依况是汴渠今不涸留連猶得奉音徽再和詩侣方逢夢與微白公書呼元劉為夢微蓋相親之厚攄懷未盡遽言歸正思玉鱠將登俎應笑緇塵又染衣金石交情知不改輔車形體自相依何時得遂江湖樂簿宦牽羈甚纆徽次韻蔡資政答朱寺丞惠千葉桃花菊分得穠華質依然苦薏香繁紅如上苑京師近多紅菊即此類也密蘃勝南陽不用尋根葉須留過雪霜殷勤送東閣聊薦百年觴送洞霄宫王文玉學士歸吳仙都補吏向天涯歸棹南遊事事嘉冬課洞庭千戶橘春嘗石縫一槍茶蓬山厭直拋鉛摘公府傷離念棣華二紀編酬老朋伴何時相逐訪烟霞林次中示及追和浙西三賢述夢詩其間叙衛公事幾盡輒拾其遺逸再次前韻曽覽三賢述吟哦日幾遭文章追李杜贈答擬劉曹二相逢辰早中山擅價髙才華固相若光焰實難韜智决推安邑超騰自髧髦武謀家府祕晉祝史君褒任重函牛鼎投虛剸兕刀內庭才視草同列便棲毫夷夏欣寧謐揄揚頌戢櫜臺烏棲直舍廄馬借拳毛對數開宣室忠逾諌館陶絲綸長慶制奴僕楚人騷雙莭分千騎滄波看六鼇帶垂金錯落服賜錦葡萄憂國常針衮延賔罕置醪韋平門素貴周邵職奚叨在鎮民除瘼還朝雨潤膏星霜恩感舊休沐事忘勞去蠧過蟊蠈防仇甚猘獒躬仍主戎索手不釋書絛相以父年入權因主眷操神鋒雖爽爽靈府亦忉忉烏嶺無遺鏃維城獨贈𫀆風波消橫議枳棘奈羣豪既悟方城語何由别墅遨間言多斐貝閒地少蹊桃世路山川險愁腸氷炭熬兩朝空獻替萬里孰呼號都為尤權勢終令觸怒濤災屯疑是馬朋敵目為牢伊昔來江海頻年泛棹篙再違文石陛三擁浙西旄夢覺魂應斷詩成首重搔緘封寄僚友往復走軺舠殘漏傳軍柝新流漲郡濠所懷存北闕有志念東臯豈謂投荒裔從兹解袠韜平泉遂榛莽甘露漸藜蒿像寄浮屠宇香焚過客艘依然見塵迹流恨水滔滔留臺蔡資政見示嘉章且有花時之約忽䝉除代恨阻親依因抒鄙懷仍依元韻清羸躬現疾出處道還周當軸諧人望謀邊緩主憂莊環聊造適伊鼎待烹羞見約髙齊㑹將行尚少留和府推官冬菊經冬寒菊巳離披梁苑殘英尚滿墀尊酒還思元亮醉秋香又過子愚期尋芳意思人尤厚耐冷枝條土所宜睢陽土最宜菊墨客有誰偏好事留將樂府著新辭七言二首奉答簽判學士兩篇華藻敵南金辱贈應憐舊賞音平日所知誰莫逆老年于事巳無心雲霄路在看君上詩酒盟寒且共尋屈指當時文學士誰知揚子思湛深常愛君房言語妙仍欽叔度德名髙受釐宣室行膺召置酒梁園喜譽髦辨博方親談衮衮别離俄起恨勞勞臨岐更辱殷勤句衰拙何勝異日褒解秩西還夕次葛驛二通判與簽判學士留府諸君逺出餞别情至禮勤輒成拙詩奉謝厚意逺行車馬出西城風義相髙一府傾留幕經年叨主諾郵亭終夕困飛觥人烟數舍將歸路霜月三冬愴别情政拙自慙無惠愛尚慿河潤慰羣氓七言送林次中南歸何事頻思江海間清時美彥未應閒襟懷舊貯縱橫術獻納嘗開咫尺顔吏隱尚勞趨幕府郊居毋苦戀家山蓴鱸正熟雖堪愛羔雁相催又北還和次中雙廟感事天寶黎民困賊庭杞城睢社勢相形四公百戰期殱虜數載重圍不啓扃當日捐軀全土境至今遺貌載丹青行人安得侵松檟樵採從來禁有刑某忝命守餘杭楊元素內翰洎兩禁諸公出祖佛寺席上探韻賦詩以寵其行某亦分得留字時李承之待制帥延安內閣臨邊貴鑾坡主席優賦詩嘉趙孟載酒餞韓侯何幸江城守容陪禁序游烟霄慙久隔聲氣荷相求笑語隨春煦歡酣永日留百分傳盞斚五熟薦包羞西望千兵盛東歸兩槳浮感時嗟老病去國動離憂遂别青雲友重為滄海州應憐舊簮履猶著故巾褠衮字榮褒寵瓊琚乏報投惟將誇逺俗歌咏入吳謳次韻奉酬簽判呂殿丞燕集西湖江海為藩地絶塵湖山尋勝坐邀賔消除袢暑忘三伏追憶曽遊隔五春極望林巒橫紫翠旋供肴核剝青皴常時欲到喧囂阻偶得相陪似宿因王沂公喜延賔客嘗與一道人清話甚久公曰平居嘗苦少暇今得相陪終日無事亦似宿昔因緣耳走筆奉酬簽判殿丞遊思上人院坐閣何時得少休羡君乘興喜尋幽每逢幕府文書簡便作湖山佛寺遊巖畔揮毫傳麗句林間炊黍飫香羞㑹須偷撥閒忙日更上髙軒看碧流次韻奉酬通判姚郎中宴望湖樓過昭慶院暮歸偶作山半樓臺繞曲堤水風當夏却炎威常思遍覽前朝迹自恨勞生暇日稀偶到上方慿檻久恍如員嶠躡雲飛白蓮舊社空遺址有幾人從此路歸再次前韻巋然華屋四開扉經搆初慿佛大威元名看經樓最是一州孤絶處不因嘉客到應稀凌虛自覺雲梯近銷暑聊將玉盞飛人士莫嗟山簡醉猶能倒著接䍦歸再酬三次前韻千里江山昔霸基百年文物憺皇威閭閻櫛比于今盛塔寺鱗差自古稀極目烟霞時顯晦忘情魚鳥自飛何須逺慕嵓居者乘興還來興盡歸和簽判早秋見寄滄海西垠浙水頭人生不到負吳謳剖符何幸來都㑹坐閣俄驚陟夏秋每按吏條慙漢詔未豐民食念箕疇所欣幕府多才彥樽俎時時接宴遊次韻楊立之十一官府館二篇固無政術效前賢又乏詩名繼樂天連嵗出藩居善地何時負郭有良田回風巳隔三山路講德難偕四子篇滿目勝遊都未到且將圖畫與人傳豫到郡值災歉涉五月尚未暇遊山楚客登臨悲素秋感時風物自颼颼潦收逺水清堪鑑雨過羣山翠欲浮月露往來羇旅恨倉箱千萬里民謳鬢毛衰颯歡遊少珍重嘉篇寫我憂次韻楊立之懷舊秋卷昔觀賔同遊上苑春歸軒今取道共食浙江珍俯仰周三紀文章了十人窮通不復問一以付天均立之慶厯初與豫場屋相遇因留館敝居次韻楊立之贈京小子方承學初心未見功雕蟲徒好賦舞象僅成童率爾多慙路師哉逺慕雄顓侗如可教丈席冀趨風和錢塘周寺丞遊南山兩寺臨湖共一山名傳四五百年間臺前康樂翻千葉井上仙翁錬九還挂壁空存遊客詠掩關都屬野僧閒欣同僚友尋幽趣嵓石雲蘿永日攀和兖弟到郡先寄雖非祿厚與官尊多幸名都遂出藩訪舊遍遊江北路提封連接海西門六年往復頭先白四郡推遷席不溫衰病早宜歸畎畝君恩未報自難言蘇魏公文集卷九
