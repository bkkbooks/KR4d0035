body:
  text: 蘇魏公文集卷七十二宋蘇頌撰雜著厯者天地之大紀賦聖人以通天地之數昔聖王建官司地因象知天推厯用明于大紀考星咸自于初躔合三體以為元成書最密舉二篇之定䇿備數無愆古有善談載于前志因太初創厯之首述往聖知時之義莫不究極象數精窮天地有時以紀夫啓閉有日以紀乎分至躔離弦望也于此而為正晦朔昏明也于此而攸示下可辨乎斗建上靡差于辰次惟君審璣衡之運所以緒正于元功使民知寒暑之來然後順修于時利況夫厯為一嵗之本紀明太極之基惟精祲之至妙豈深思之與知必也迎辰以䇿定晷于儀帝舜則羲和而分命顓頊則重黎而是司皆所以凖厥二氣乘于四時聖有作也人皆度之制自清臺得舉正履端之要職由太史盡觀文察理之宜若乃辰集于房日窮于紀孟陬既協于月建攝提亦隨乎杓指國將頒正朔以為令王乃觀情性而順理章蔀元之書兮著于彼子丑寅之正兮見于此可以察發斂于未然定慘舒之所以推其生律子陽午隂而互分治以明時春作秋成而是擬且夫天之運也日與星而代逢地之道也柔與剛而莫窮非乃聖無以探其賾非立法無以舉其中我乃錯綜氣候參稽變通起建星而運算故積嵗以成功考連珠合璧之辰得名尤邃應大呂黃鍾之統立道斯同用能鉤校舊儀審觀新度成敗因之而遂紀氣節于焉而可步于以極隂陽之大端于以備五六之中數亦何異魯經比事舉二中以嵗成羲易窮神合五位而象布後王以是知厯象不可不審經紀不可不循或立元而謹其始或節事而授于民馮相則致乎日月保章則志夫星辰以定五十五數以通三百六旬所謂見道而知治何患以天而占人彼為刻漏以考中星但紀曉昏之度處璇璣而觀大運蓋明氣候之因猶未若測運動于二儀齊往來于七政建乃星紀先夫算命吾皇所以監古厯之尤疏頒新書而考正天人之際因以明焉乃知夫作者謂聖省題詩象載瑜一人敦至化象載效嘉祥美澤昭仁感皇華顯道光再馳聞檻檻無外表洋洋華轂初彰瑞椎輪異服箱器車雖比美泉露豈同方荐廟歌休德神靈祉式揚南廟䇿問問周制王畿千里其外則九服諸侯之地也而周禮所載六卿之屬三百六十皆王朝之官其名氏之繁密典掌之間冗若司市校人賤者之事皆命大夫僅乎數百鄰長比長才治五家皆命士故至于萬人夫以千里之畿四郊鄉遂園㕓場圃之外為田十有一等官府之給六軍之衆封賞之地皆在其中其餘以食萬官宜若不足而當時行之為便凡九正之斂致財賄之入亦寡矣而大祭祀大賔客大軍旅大田役四者之勞無有虛月度其經費蓋不訾焉而當時不言其乏我國家統一海內四鄉萬里皆為郡縣一毫之賦悉歸縣官司會核入宜若有餘然其設官自省寺至于州縣不過萬數比周亦簡矣而議者猶病吏員之冗勞于供億至于郊廟祭享數簡而禮略朝會宴飲嵗不過二三師田講武稀闊而不行軍興調發不聞于警急方古無事矣而財用未嘗羡盈昔周以千里用而足今以天下用而無餘其故何也豈今之經制不得其道耶將周官之載為虛文耶願陳所以異同之説以輔當世之宜又問孔子曰如有王者必世而後仁又曰善人為邦百年亦可以勝殘去殺若周至成康漢至文景唐至貞觀皆有國未數十年而仁政洽或刑厝不用或斷獄數百或報囚十九古稱至治之極何以尚兹宋興百餘年矣祖宗之休德主上之仁聖未嘗不以恤刑慎罰為意獄一有疑縱以豫民吏或用法深故則廢而不録如此刑冝省矣然而天下嵗報重辟常不下二千其間忿爭賊害剽盜陵奪甚者骨肉相殘甘心仇怨皆法不可緩者習俗流敝而至是耶且必世之仁于周漢唐見矣以我朝之隆盛獨不見其成效歟至于善人不入于室猶能止惡而歸善以纍聖之求治反未能致茲其故何也夫移風易俗使天下回心向道蓋儒者之所願言也盍陳古所以致治而今所以未能省刑革敝興仁必有本末幸悉言之又問孔子曰如有用我者期月而巳可也三年有成孟子曰師文王大國五年小國七年必為政于天下矣此言為政者導民有漸非纍久則不能成功故周公相成王六年然後制禮作樂以致太平是也而伯禽封魯三年而報政周公曰魯後世北面事齊矣又公孫𢎞報漢武曰周公期年而化臣尚竊遲之此則為政尚乎速也彼大聖賢且猶期年而為政必三年至于七年而後成功伯禽三年乃以為遲何也太公五月信未洽于民周公何以知後世齊強而魯弱公孫𢎞才不及古人而以周公為遲然其相漢之迹其效何若此學古者所悉也試講論之李惟幾改字説李君名惟幾字景純問于豫曰吾幼而名壯而始字夫字所以識其名而稱表之古人又從而有規誡之説今惟幾之字景純既無以識惟幾之義又非所以稱表規誡之道吾將易之久矣願吾子擇其宜稱者為惟幾之字焉非特以其所表然亦將蘄所謂自誡者于吾子耳豫始重違其請又推朋友相字之説在禮則然而况李君才具優敏心志通逹䇿名從宦有文而能政斯足稱道者又豫頃年與之舉進士以里中子論交甚篤則正名為字之説今不得而辭也夫所謂幾者在事隱微而與知之之詞也故易曰幾者動之微吉之先見者也書載大禹之謨曰惟幾惟康云爾者蓋禹戒舜念慮幾微然後保其安康之謂也又舜作歌自戒亦曰惟時惟幾者舜以庶工既諧事之當戒者惟在知時幾微而巳而仲尼稱顔子之善曰其殆庶幾謂其舉動言行能慮之于微則其著也蔑有過事之謂也是則幾之為義逺矣淵乎古之聖賢之治天下也事君也修身也未有不念于是焉而臻其極致也且聖人之幾緼乎誠明賢人之幾發乎思慮緼乎誠明則不思而適乎中不勉而同其道所謂知幾其神者也發乎思慮者由勉焉而後得戒焉而後弗失其顔氏之庶幾乎在易則曰不逺復在禮則曰擇善而固執之夫行之而弗思何曰能復復之而弗慎何云固執蓋顔子拳拳于斯未嘗少過故謂之殆庶幾者豈其思之詳而慎之至也歟噫事之未彰橫乎思慮是雖聖人賢人且猶念之戒之勤勤若是況衆人而不慎哉李君既求字于豫因以求其自誡是不忘乎立身之道也豫又以朋友之義不得而讓故原其説兼舉易與書之事以告之而命其字曰仲思庶乎李君早夜念焉逺慝而就正由是而之道云爾題鄴侯家傳後相國鄴侯家傳唐亳州刺史李蘩撰述其父泌之事迹起天寶被召中間遷謫迄貞元中終于相位其所論著甚悉然與唐史小異文字亦有不倫次者蓋蘩以罪繫獄謂其將死則先人之嘉謀密議遂不得傳因得廢紙敗筆于獄吏以成其藁且戒家人令求大手筆别加潤色後亦不果今崇文本第一至第五揔五卷尤為踈略大類抄節臣以私本校正凡增補數萬言以充定云題枯木賦枮樹賦故龍閣壽春魏公家傳云褚河南書其卷末題識止云貞觀四年為燕國公書而無書人姓名豫按徐浩書品云中宗時中書令宗楚客恩幸用事嘗賜二王真迹二十軸因製為十二屏以褚遂良枯樹賦為腳大會羣賢張以示之薛稷崔湜輩見之皆廢食嘆息驗此賦河南書明矣然既用作屏而今本乃橫卷豈非後之好事者重裝背以便緘藏耶抑河南書此賦自有别本耶不可復知也觀其筆力遒媚頗逼二王非河南不能為也而學者多云燕公于志寧也按志寧曾祖謹仕周開國封燕志寧貞觀末始襲祖封而此賦乃在未封前豈當時公卿自有封燕者而史失其傳耶或志寧嗣封當在前而書傳記之誤耶又不可得而詳也豫愛玩其書因究其本末而志于後題維摩像張彥逺古今名畫記所載顧長康傳云興寧中瓦棺寺初置僧衆設剎會請朝賢鳴剎注其疏時士大夫莫有過十萬者長康素貧打剎獨注百萬衆以為大言後請勾疏長康曰宜備一壁遂閉户往來一月餘日畫維摩詰一軀工畢將點眸子乃謂僧曰第一日觀者請施十萬第二日可五萬第三日任例責施及開户光照一寺施者填咽俄而得錢百萬又論畫體工用云顧生首創維摩詰像有清羸示病之容隱几忘言之狀陸探微張僧繇效之終不及至唐寺廢杜紫薇牧之為池州刺史過金陵嘆其將圯募工拓寫十餘本以遺好事者其一乃汝隂太守某人也不敢擕去至今置于州廨丞相晏臨淄公鎮潁日嘗語從事鑱石以記其始末嘉祐壬寅豫領郡事暇日數取以觀之案長康晉人故所畫服飾器用皆當時所尚其意態位置固非常畫之比也或云杜本巳為後人竊取今所存者蓋再經謄拓矣然而氣象超逺倣佛如見當時之人物巳可愛也況牧之所傳乎況長康之真迹乎想慕不足因命工人即其本移寫藏之家楮又題于像旁丹陽蘇子容記題右軍帖豫向見二王書帖多矣疑非真迹應是響拓然筆勢圎徑無毫釐之差都莫能辨其是否所可辨者一紙數帖及用硬黃耳昔唐文皇好二王書天下訪求遺迹殆盡彼時巳患嵗久恐遂磨滅因命拓書手趙模輩傳拓數百本藏之禁中或分賜王公得之者巳為祕寶矣故當時語云趙模一紙尚直數萬錢今觀説之所收一軸凡四紙一十帖實竒迹也卷末題蕭祐者元和人起處士仕至桂管觀察使書畫皆妙嘗敘鍾王遺法蕭張筆勢編集真偽為二十卷上之又題凝式正臣則楊少師也每紙皆有正臣字應是其家舊物也丹陽蘇某題題御前厯子左光祿大夫守尚書左丞蘇某恭覽太宗皇帝淳化中賜知州御前厯子親書三十一字逮今八十餘年筆勢飛動翰墨如新對之歆然孰不悚厲昔漢光武以手迹賜郡國一札十行細書成文故自臨邦宰邑者競能其官唐明皇除令長亦以敕書訓厲謂之令長新戒當時郡縣號為得人其猶載于金石之刻或見于詩人之咏歌以為太平之源由此其致猶未若神功恤民之勤為之精擇守長親書翰墨以遣之得其賜者超越前代規橅閎逺垂于無窮守臣奉之以為大訓不其偉歟題胡考甫書華嚴經大方廣佛華嚴經本敘云佛為大心衆生説一乘道純真境界超絶權假當念相應即成正覺名雖十會指歸一貫通利者剎那見性泥文者多劫迷塗自晉至唐三經翻演其書乃完凡十萬正字揔百千妙頌要言奧義包括萬殊前代名流留心探索則有論鈔贊圖開示末學入法界門大行于時豫熙寧中赴東陽守道桐江失舟弟息及甥三人不救追悼不巳因作毗盧文殊普賢三像以薦夭橫通經義者以為正合教意今考父大夫服太夫人之喪三年齋潔書此經全部八十卷字皆端楷功巳圓成仰報劬勞隂助冥福其勤至矣非特見孝子精誠之意抑可示導門誘掖之勸因覽巨軸贊嘆不巳因假翰墨題于入法界品之篇末云元祐七年二月初七日丹陽蘇某謹志題青溪圖豫慶厯四年領邑江寧六月馳漕牒之貴池適遇天章滕公過郡磐桓新居都官曽公退居州第相期為弄水之遊者數四臨青溪望諸山以琴碁銷暑笑言甚適逮今五十年矣而未嘗再到公詡畫圖曲盡幽致言念嵗月推遷二賢墓木巳拱而老朽巋然覩物思人不覺感懷因識卷末題送辨光序辨光論書法猶釋氏心印發于心源成于了悟非口手可傳此誠知書者然當時名稱如此而獨不聞于後世筆迹絶少傳者豈唐人能書者多如光輩湮沒無聞不知幾何人耶觀諸公稱譽之言蓋非常常僧流也題灘院記唐人多善書者題楷行草往往各盡其妙涉五代而字體衰矣獨楊公凝式號得筆法洛中碑志石刻官寺僧舍多其題識至今尚存校之一時墨迹固不類矣伯鎮所臨中灘浴室記是其書撰文格雖不甚髙而詞氣宏贍猶有唐人之風範亦可嘉也題應之詩應之江表名僧能文章善楷𨽻南唐升元保大間為內供奉中主後主書體與之相類當時碑刻多其寫者至今盡存惟江寧府保寧寺四注金剛經兼備衆體尤為精筆此詩乃其真迹也蘇某題題張籍墨迹張籍書世罕傳者豫頃遊歷陽見僧寺有收得其墨迹與詩刻今覽此帖疑昔所見者唐人大率能書籍雖非以書名然其用筆皆有法尤可佳也丹陽蘇某子容題題名茶記齊巳詩人不以書稱在唐季二道既衰然此詩脫灑不俗筆札亦善信乎名稱于人必有可尚者子容題題巨然山水巨然山水擅名江表歸朝尤為當時貴重然而亦靳其筆故今傳者甚少惟學士院北壁特為傑作前賢詩記中多稱之煙嵐曉景是其措意者嚮見好事家一二小圖皆題此名説之所收特佳也子容題題君謨草書唐明皇有飛白散𨽻賜上巳曲水宴大字今尚存巳為竒迹矣而君謨又作飛草盡風雲龍蛇之變態非曲江字可比也少有得其真迹者説之此卷遂為竒寶矣丹陽蘇某題又説之與豫皆連君謨姻家情好亦均豫嚮恃欵密未嘗求其書而説之所得飛草二軸其他真草又過是非夫好事之篤何能致其多也如此君謨今亡矣其書不可復求故因披卷益增悵恨耳子容題題授經圖後漢永平七年明帝夢金人既寤以問羣臣通人傅毅對曰臣聞西方有神其名曰佛陛下所夢將必是乎因詔使者秦景等十四人如天竺至月支遇沙門攝摩騰竺法蘭等傳其經像載以白馬還洛陽譯所得經為四十二章緘於蘭臺石室遂流東夏右攝摩騰竺法蘭入漢獻經像圖人物十有一治平丁未在山陽傳史中輝家藏本云其本拓成都佛寺右殿畫壁相傳漢魏間筆觀其衣冠服用若後魏周隋制度疑彼時畫工創意所造耳蘇某子容燕寢北軒題記硯銘延平溪石硯前此未聞熙寧丙辰建守李侯立之得于劒津遂以相寄云石出水底數十仭溫潤而明瑩縝密而條逹其堅不折其廉不劌蓋有玉之德焉琢而研之復益墨色端巖龍尾不足多也豫試之信然因銘其背云其質則石其德如玉既漬既研利用縑牘毫端可濡麋九匪渝功施萬世四者相須又子容硯銘石出延平兩涯涘矩而琢之中厥器面如坳堂引涓水背如青圭去鋒鋭比德于玉磨不磷罷龜而食文以治啓土建安邑丹陽世世寶用斯盡意書帙銘惟蘇氏世宦學以儒何以遺後其在此書誡非學何立非書何習終以不倦聖賢可及蘇魏公文集卷七十二
