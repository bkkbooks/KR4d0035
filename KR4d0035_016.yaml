body:
  text: 蘇魏公文集卷十六宋蘇頌撰奏議駮坐講議翰林學士兼侍講吕公著王安石起居舍人兼侍講同知諫院吳充等劄子請坐講臣等竊尋故事侍講皆賜坐自乾興以來講者始立而侍者皆坐聽臣等竊以謂侍者可使立而講者當賜坐所以當賜坐者以傳先王之道故也伏惟陛下躬仁聖之質將興堯舜之治于傳道之際不宜因循有司一時之失不正其禮欲乞以臣等所言付禮官考議奉聖旨送太常禮院詳定聞奏判寺韓維刁約禮官胡宗愈等議臣等考尋故事天禧舊制侍臣皆賜坐講者别設本于前列坐而聽乾興以後皆先坐賜茶徹席立講講畢復坐賜湯今來侍者皆坐講者獨立比之天禧舊制則講者當坐而獨立較之乾興以後則侍者當立而坐臣等竊謂臣侍君側古今之常或賜之坐蓋出優禮祖宗以來講説之臣多賜坐者誠以其敷揚經義所以明先王之道道之所存禮則加異太祖皇帝開寶中李穆薦王昭素于朝召對便殿賜坐令講易乾卦太宗皇帝端拱中幸國子監升輦將出顧見講坐因召學官李覺令對御説書覺曰陛下六飛在御臣何敢輒升髙坐太宗為之降輦令有司張㡩幕設列坐詔覺講易之泰卦今列侍之臣尚得環坐執經而講者顧使獨立于側事體之間誠為未安臣等以為宜如天禧舊制以彰陛下稽古重道之意判太常寺蘇某龔鼎臣周孟陽禮官王汾劉攽韓忠彥等議臣等檢詳國朝會要天禧舊制侍臣皆賜坐講者别設本于前列坐而聽乾興以後侍臣先就坐賜茶訖徹席立講講畢復坐賜湯近制當講讀者立于上前餘皆退坐並出一時特旨侍從之臣皆同此制非為侍講别設殊禮也然則事出上恩雖微賤賜坐于義無害即人主不命而自請則為非禮矣今公著等議講者當坐臣等以謂侍從之臣見于天子若賜之坐有所顧問猶當避席立語况執經人主之前本欲便于指陳則立講為宜若謂其傳道近于為師則今侍講解詁舊儒章句之學耳非有為師之實豈可專席安坐以自取重也又朝廷班制以侍講居侍讀之下祖宗建官之本意重輕可知矣今若使侍講輒坐其侍讀當從何禮若亦許之坐則侍從之臣每遇進説皆當坐矣若不許侍讀之坐乃職卑者禮厚而位高者禮薄輕重為不宜矣且自乾興以來侍臣立講歷仁宗英宗兩朝行之僅五十年自可守為定法豈可以為一旦有司之失而輕議變更乎今人主之待侍臣由始見以及畢講皆賜之坐而從容焉其尊德重道固巳厚于三公矣尚何加焉昔仲尼之時人臣拜君于上仲尼嘗曰拜下禮也雖違衆吾從下仲尼之正名重禮如此蓋尊君卑臣之分不可易也臣等敢不以為法其講官侍立伏請仍舊施行繳李定詞頭劄子臣今月二十一日準中書劄子右諫議大夫知制誥宋敏求奏今月十九日當直中書刑房送到前秀州軍州事判官李定特除太子中允權監察御史裏行詞頭伏以御史之官國朝以來其任頗重去嵗驟用京官而選之今又以幕職官便升朝著而峻處紏繩之地臣恐弗循官制之舊而未厭羣議所有詞頭未敢具草奉御批速送别官命草臣伏以國朝近制進補臺官皆詔御史中丞知雜與翰林學士更互于太常博士以上中行員外郎以下曽任通判官中奏舉充三院其未歷通判者即須特旨方許薦為裏行倘非其人或至連坐所以慎重臺閣之選也去嵗詔旨專令中丞舉官雖不限資品猶以京秩薦授緣巳有前詔故人無間言今定自支郡幕職官入居朝廷紏繩之任超越資序近嵗未有臣恐有違官法無益治朝敏求所以惓惓而進言者納忠而舉職也議者或曰唐世自諸侯幕府入登臺省者多矣而定之此除豈為過耶臣以為不然在唐方鎮盛時有奏辟郎官御史以充幕府者由此幕府連茹增重祖宗深鑒此弊一切釐改州郡僚佐皆從朝廷補授大臣出鎮或許辟官亦皆隨資注擬滿嵗遷秩並循銓格非復如唐世之比而今之三院事任又重于昔時况定官未終更非時召對不由銓考擢授朝列不緣御史之薦直置憲臺雖朝廷急于用才度越常格然隳紊法制必致人言所益者小所損者大再詳敏求前奏頗得允當所有李定除官制未敢具草又臣今月二十三日準中書劄子節文尚書工部郎中知制誥李大臨狀所有李定除官制內有未便奉聖旨令蘇某依前降指揮撰詞臣竊以官品有髙下職事有間劇皆所以待才能之士擢授有資級保任有常法亦所以抑奔競之途由古以來兹道不易祖宗之朝或有自起孤逺而登顯要者蓋天下初定士或棄草萊而不用故不得不廣搜揚之路自真宗仁宗以來每有除授雖幽人異士亦不至超越資品蓋承平之代事有紀律故不得不循用資品選授之法今朝廷清明俊乂並用進任臺閣動有成規而定以逺州幕官非有積纍之資明白之效偶因召對一言稱旨便授臺官政府既已奉行有司不能抗議使制命遂下四方聳聞仕進之間豈無觖望况今天下之廣英豪之衆他日或更有非常之人又過于此夤緣進見奏對稱旨則復以何官處之寖漸不巳誠恐髙官要秩或可以岐路而致事有萬一不可不防臣所以區區建言者上以遵朝廷之法制下以盡有司之職業耳謹按六典中書舍人之職凡詔旨制敕皆按典故而起草制敕既行有誤則奏而正之故前後舍人論列差除用典故而蒙改正者非一今三院御史須中丞學士薦舉朝臣乃典故也或不應此其敢無言去嵗以京官除授所以無言者以前有詔令故也今若先立定制許于幕職官中選擢三院則臣等復有何言而敢違拒耶况定之此制前日敏求大臨洎臣皆知不應近制是以各有論奏今再被詔旨若便奉行是臣故違官守自作二三上纍聖明孰任其責竊謂威福之柄人主得以自專官守有責臣下得以固執若朝廷以定才實非常則當特與改官别授職任隨資超用無所不可不必棄越近制處之憲綱若臣上懼嚴誅靦顔起草誠慮門下封駮不肯放過縱門下不舉則言事之臣必須重有論列或定畏議固執不敢祗受是臣一廢職事而致論議互起煩瀆聖聽則臣之罪戾死有餘責所有李定除官制未敢具草內降條貫同李奏檢會熙寧二年七月六日奉聖旨今後臺官有闕委御史中丞奏舉不拘官職高下兼權如所舉非其人令言事官覺察聞奏四月二十八日蘇某上殿面奉聖旨將上件條貫赴舍人院商量草除李定官制者臣等尋將上件條貫同共看詳稱今後臺官有闕委御史中丞奏舉不拘官職高下令兼權如所舉非其人令言事官覺察聞奏者蓋為從前臺官須得于太常博士以上中行員外郎以下奏舉充職後來為朝行中難得資序相當之人故朝廷特開此制云不拘官職高下者只是不限博士與中行員外郎耳即非謂選人亦許奏舉也所謂兼權者如舊官資序不相當三丞以下未可為監察故且令上權前行員外郎以上不可為侍御史故令下兼詳此皆不為選人設文也若不拘官職高下并選人在其間則是秀州判官亦可以權裏行不必更改中允也以此言之選人不可超授臺官明矣至如程皓王子韶等並巳先轉京官因中丞薦舉方蒙特遷中允上權監察今李定是初等職官資序若特與改官只合轉大理寺丞且選人特改京官已是優恩若更超授朝籍處之憲臺恩命重疊升擢非常先朝以來未有此比未知李定有何所長而可當此殊命也臣等所以喋喋有言不避斧鉞之誅者非他也但為愛惜朝廷之法制而遵守有司之職業耳且爵祿賞罰進退黜陟皆陛下得以專之無所不可者若事下有司則具有條例當官者須奉行而固執也大抵條例戒于妄開今日行之他日遂為故事若有司因循漸致隳紊誠恐幸門一啓則士途奔競之人皆有僥求希望不次之擢朝廷名器有限焉得人人而滿其意哉前世所以慎重爵賞不以假人雖有竒材異倫亦須試以職事俟有成效然後超擢者以此也兼臣等前來論列雖不具記上條貫亦只指陳選人超授臺官為過當耳如宋敏求言去嵗驟用京官而遷之又以幕職官便升朝著而峻處糾繩之地竊恐弗循官制之舊未厭羣議臣大臨言秀州判官除授監察御史裏行不惟超越資序未厭羣言抑亦有乖國朝從來法制臣某言去嵗詔旨專令中丞舉官雖不限資品猶以京秩薦授所以無言者以前有詔令故也詳此與今來檢舉到不拘官職髙下條詔亦不致違戾以此臣等所以須至再三執守初議也臣等非不知再拒嚴旨獲罪不輕但以意在盡公不敢自為反覆上誤朝廷耳至於臣大臨昨日當草薛昌朝除官制初亦疑慮恐未得允當既而思之昌朝雖非御史薦朝廷特除緣巳是京官為有程皓王子韶近例所以不敢違拒非如李定選人之比也欲望聖慈更賜詳察臣等惓惓之誠所有李定除官制臣等未敢具草又臣今月二日準中書劄子節文李定除太子中允監察御史裏行詞頭奉聖旨劄與蘇某所除李定係是特旨不礙近條令疾速撰詞臣為詳自來本院凡有中書送到詞頭並是當制舍人奉行唯是當制日曽封還詞頭其詞頭再下若元封還之官却再當日即專送以次官命詞昨日中書劄子送舍人院是臣當制所以獨具劄子奏陳今日輪當李大臨直日上件劄子合是本官奉行却専送臣處顯見不依得自來更直承受體例是同一職事而差使有異臣豈敢越次承受若云因臣論列除改不合條制便送臣處又緣上件論奏是與李大臨一狀同議事體不殊却不依常例送本院輪次承受其劄子巳具狀繳納中書門下伏乞依自來體例施行去訖兼臣與大臨等前後論列李定差除未得允當蓋是遵守朝廷之法制奉行有司之職業初等職官超授朝列兼權御史不應近制所以未敢具草今來中書劄子稱係是特旨除授不礙近降條制臣竊謂若果出聖意拔擢即須是非常之人名聲顯聞于時然後可以厭伏羣議為朝廷美事不然則進用之路自有階漸耳昔馬周為常何作奏條陳得失二十餘事皆當世切務唐太宗拔于布衣近世張知白上書言事論議卓越真宗皇帝拔于河陽職官此二臣者可謂有顯狀矣逢時遇主可謂非常矣然周猶召直門下省明年方用為御史裏行知白召還奏對稱旨亦命試舍人院然後授以正言非如定逺州職官素無聲稱偶因孫覺論薦一賜召對便蒙超授縱有竒謀碩畫亦未顯著于時豈足以上稱不次之擢但用其言不試以實誠恐天下才辨之士聞之皆思趨走勢要以希薦用此門一開未必為國家之福也故前世用人之法必加詳試俟見成效然後升擢者亦所以防僥幸之路也今臣不避誅戮再貢瞽言者誠見陛下容受直言雖堯舜三代之聖王未若此時也羣臣遭逢此時安敢緘默不思獻納少冀裨補耶其李定特旨除授欲望陛下更賜採聽羣議或詢近臣若謂定之才果足以副陛下特旨之擢則臣自當受妄言之罪萬一臣言不虛即乞再加詳酌或别授一官置之京師俟他時見其實狀進用未晚如此不惟臣等職事得舉兼亦可以養成定之才資免詒異日之論議也臣不勝夙夜惓惓納忠之至然臣巳是五次論列纍拒詔命罪應不赦戰懼待罪不敢遑寧論省曹寺監法令繁密乞改從簡便臣聞在昔帝王之發號出令也必因時而施宜視俗而興化時朴野則濟之以文俗雕偽則示之以質隨變所適使民宜之故能久于其道而天下化成質文損益百世可知也國朝剗五代之弊續有唐之緒纍聖創制或革或因其道粲然於是大備仁宗皇帝以承平日久事多因循曠然有改作之志故開廣言路整緝治綱至于先皇帝遂大有為臺閣之務無所不舉然而事目寖廣法令亦繁陛下臨御之初深知其故推原先志稍加裁損數年之間講明備至而法令之煩尚未盡革何以言之先皇帝改定官制本欲憲章百王歸于簡要而奉行之際羣臣不能究宣上旨各務便文事有未詳更復立法積久不巳遂致滋彰故今日之弊良由關防傷于太密而畫一傷于太煩則難于通融蓋省臺寺監萬務所萃置長立二承之以僚屬所以裁處事務助成至治也而官不任職每事立條事務日新欲以有司之文而盡天下之務雖使臯陶制法蕭何造律勢不能遍况百司所職條目不同而一司之間又有細務或通于此而礙于彼故有求之人不能悉曉遂至紛爭或經臺省投牒披訴文移往復虛煩取會其可行者百無一二徒長奔競無益風教夫關防密則有司執文重疊問難小或違戾遂格而不行使有求者抑塞而不舒妄訴者牽制而不斷近者陛下特軫宸衷將革其弊故丁酉詔書分命近臣抽索文案看詳點檢內有拘文害事不近人情者許并元條刪改詔意如此可謂察見事情大慰羣望然而行移彌月取索甚多比至定奪上省竟以有礙他條不能盡如詔書之意誠由關防太密之所致耳拘礙如此亦可以謂之弊矣誠能少損其文致而濟之以忠厚則三代循環之政亦不過此臣愚欲望聖慈特詔近臣遍行取索應省曹寺監見用條制格式仍召集諸司官吏使之反復詰問看詳定奪可刪者刪之可改者改之擇其要切者著為新令務從簡易使便于施用其餘令式所不能者小事則行省曹長官專決大事則稟于朝廷簿書期會悉付衆僚催督結絶若官司措置失當及徇私廢公致有赴訴並委臺察紏案如得實狀其當職官吏次第書罰有涉欺妄亦行懲責如此則臺閣規模有宏逺之致朝廷法度循簡易之規矣蘇魏公文集卷十六
