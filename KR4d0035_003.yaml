body:
  text: 蘇魏公文集卷三宋蘇頌撰古詩題畫草蟲扇子蠉飛蠕動誠微物尺素輕盈誰畫出一朝君手將動搖猶似吟風欲跳逸竹梢草際弄輕翰水墨淺深見􅊏質昔人徒愛明月詩何似今看老師筆清暉茅亭山僧構亭山之麓旋結茅蓬架園竹千年巖樹怪枝虬十畝龍池春水緑閒移賓榻向松軒一坐清風香馥郁誰為潄石枕流人老此優游避喧俗逢錢塘詩僧把手忽相逢開談究詩義子雖浮屠流乃抱風騷志錢塘佳山水一一助清思何處最堪懷飛來峯下寺聞蛙蛙黽何所恃喧喧矜善鳴不知穢汚質羣沸沼池清游子得無淚羇人若為情華堂有絲竹皆厭爾虛聲和林丘二君㑹程坦之家二詩春晚寒不已節候差季孟木行怯初陽水官恣餘橫滂沱連月雨愁歎斯民病已紊四時和更傷羣物性園花半零落猶逞晨粧靚隴麥將痿摧况值風威徑我願天地心慎舉陰陽柄十雨應太平時豐順睿聖庶令疵沴消永保寒暑正無復三月中慘慘行冬令天涯人未歸飄然江海上客心蓬任風歸路萍隨浪青雲少知已白日多罹謗著書見窮愁倚門知骯髒皇皇干名祿戚戚足羞讓豈特為身謀所懷慰親望昔人在困躓寧復論得喪吾徒抱道義豈不保趣嚮勉希一簞賢無慕千乘相卷舒各有時出處當自諒奉陪府公賽雪橋公廟紀事兼呈倅幕諸君北走出都門寒坰冒初雪言瞻漢三公嚴祠奉遺烈䄡帷未行春首兹薦腥血念昨冬愆陽時風少凝冽長人惜熯菑坐閣苦憂惙遣吏造靈宇精心致蕭焫冥感不踰旬同雲寖融結甸畿千里間滋液遍農畷兆為豐年祥倉箱行可閲報祈禮則然况乃人望觖前期告祝史按令肄儀蕝俎豆載博肥尊罍泲芳飶朱轓朝啓行騎從紛交列雍容幕府盛陪預愧䝉拙聯行趨閟宫就位修罄折拜望巳告䖍歎詠想竒節惟昔漢之季奸雄逞權譎公初任州郡超然脫羈紲敢犯跋扈鋒終正狡吏讞霽威遁世賢先覺安民傑舉當仇無避義在親則滅入朝掌武事出塞受師孑烽塵息邊土蠻貊竄巢穴屢進行惟危保終名不缺世閥著廟鼎庸勳刋冢碣清風邈千載血祀豈嘗絶時其福善事鄉人每談說水旱或禜雩響應甚昭晣神實依于人禱祀戒輕媟今兹罄誠禮庶可消眚孽府公臺閣老家聲繼臯契都圻出居留條令見施設芘民慈惠師事神粢盛潔威行肅羣豪政成除一切二車實邦英諸僚亦時哲儒雅資緣飾吏治賴關決非才荷寬矜幸免事卑屑方欣盍簪得載詠嚶鳴闋期㑹間亦希宴遊時豈輟嘉此歲事和樂哉民共悅覽古極優游言歸日將昳送趙君權中歸福唐兼呈陳季中趙子抱經術儒林挺孤秀䇿足入上庠高誼諸生右秋闈再程文懷寶不見售京師首善地翹然俊賢囿朝廷舉新詔多士四方走主司搜擇艱有如羿張彀小善或不遺寧當舍良茂豈非繩凖高刀尺下難就得喪不在已自信非我疚歲窮感親心倚門方逺候都亭謝知已飄飄拂歸袖樂彼閩中幽里中賢友舊且復從其游行義益充厚道存貴有用獨善古所陋明時無滯才子行當勉懋送許當世職方通判泉州仕宦逺故鄉古人之所譏懷祿去養親千鍾且為微當世倅州行二美其庶幾符竹非不貴誠與雅志違獨駕箳篁車東南去如飛所懷戀晨昏奚論官等威遙遙七閩山喬木正芳菲駟馬過舊遊道路增光輝榮觀慰親心佩綬紆銀緋上堂拜慶日喜氣生庭闈躬扶版輿去徑入牙城扉潭潭公府盛華顯猶布韋膳羞盈其前酒紅魚蟹肥人生苟適意富貴安所希况今邦伯賢早辭尹王畿亦從北堂養再擁雙輪歸君欣舊知已復得相親依守相同鄉州㑹遇時所稀純孝自感人逺近聞風徽豈徒對交親誇詫晝錦衣和胡俯學士游西池書事皇都有滄池近在金商陌淵源控河汴襟帶引京索衆派㵼寒光一鑑涵空碧晴明天垂幕隂靄地滋脈煙嵐隘五湖氣象吞七澤漪漣十餘里縞練千萬尺樓殿起參差門闉開岝峉人間識方壺古來慚太液美哉臺沼名壯我帝王宅惟昔經始謀兹見神武迹非同泗淵濫蓋用昆夷策萬乘紆警蹕羣官扈鑾軛津頭駐翠華唐中搜赤籍水犀陳百旅畫鷁棹千隻時多吕梁人士有中黃伯旋淵齊出沒桅檣競跳躑鼓枻變魚麗飛江生羽翮一時軍事嚴四表皇威赫承平垂百年聲教重九譯朝惟講文物民亦厭金革樓戈無復用池籞因不易年年春風暮處處褉筵闢曲堤栁交隂上苑花遍拆舟師校艨衝樂佾鏘金石翔禽鼓輕翰潛鱗躍修額鳴鼉促繁節陰獸蕩精魄浮吹時往來綵標縱爭獲魚龍隨變態波浪相激射何妨試趫勇豈徒觀戲劇吾皇兹豫順庶物遂闓懌靈囿無禁止都人任遊適輪蹄去若狂錦繡委如積臨流錯杯盤列肆張幄帟金繒樂揮散采翠亂狼藉嘉㑹此難逢良辰真可惜前日瀛洲仙顧謂同舍客言此好時節豈當虛廢擲掩卷下直廬連鑣出東掖郊原朋盍簪舲舸觴浮醳指顧集珍羞餖飣瞻肴核暫喜解朝纓仍便平岸紗幘清波入平望嘉果富新摘園竒插山丹水美鱠霜鯽喧呼少停樽眺覽閒信屐畫橋躡虹霓寶殿覘楹磶再見瓊林芳重思曲江席寵恩徒欲報顓愚豈任責翩翩衆翹彥一一富才畫同時致榮階云誰量逺跖曰豫孤陋姿本惟一逢掖無能拾青紫有志厲冰蘖久事州縣勞已甘簿書役公卿廣收揚文字誤掎托得懷儒館鉛始識君門㦸何乃英俊流不以才地隔同登石渠閣共閲金匱册飽食任嬉遊縣君奚補益所賴友賢能庶幾逭隳謫兹遊誠可樂何幸謬見擇逮賦醉言歸都忘日之夕風雲一流散俯仰成宿昔集賢冰㕔郎雕章古風格感此意稠重足成言四百記彼集間事有如丹在白初惟侈榮觀終乃發幽賾分明指行藏礧砢見肝鬲諸賢繼佳篇仲吕和無射辭源可渺瀰筆鋒俱砉騞彼美雙南金輝映連城璧樂事子同賦聯編豫有獲欽慕風雅情慰誨詩書癖滯思豁以開遙襟聳然釋報投愧芻蕪叩虛漫紬繹多謝久要言贈君嵗寒柏和胡俯學士紅絲桃京都花品豫嘗評夭桃僅有十數名含絲繁艷今始識鮮苞長蘂彯紅纓春晴日暖助顔色灼灼一片朝霞輕鮫綃剪碎旋裝綴虬須摘盡將紉縈因知化工巧難狀偏于草木呈瑞精又疑華燈九光爛蜂蝶不敢來窺爭江南萱草易滋殖維揚芍藥初種成此花皆有紅絲號恨不同時相合并君家數株發庭際愛玩常掛簾鈎瓊有客風流欲寄目主人喜笑張筵迎飛觴灑翰偏得意都緣尤物牽風情我雖多病不能飲猶思强舉花前觥即席分韻送李才元學士守臨卭君登石渠閣荏苒十過春編摩業既卒出入命已頻人情歎榮滯雅意猶逡巡襟懷恬而曠鬢髮黳如新躬隨省中籍念切堂上親前時動鄉思歸夢趍梁岷乞符去故里拜疏伏紫宸恩頒尺一詔寵駕雙朱輪朝為浮瀛侣暮作臨卭賓誰言蜀道逺自喜家山鄰嵗晏風慘慘行役心欣欣怊悵同舍友仳離照心人杯行莫辭滿分攜只明晨和諸君觀畫鬼拔河關中古有拔河戲傳聞始盛隋唐世長絙百尺人兩朋遞以勇力相牽制芳華樂府務誇大黎園公卿謾輕肆拔山扛鼎烏足矜引繩排根非勝事當時好尚人競習鬼物何為亦能是展吳畫格入神品陸法尤長寫靈異蒲津古寺筆跡竒世疑二子之􅀈置旗門雙立衆鬼環大石當中坐渠帥蓬頭圜目㸦奮踴植鼓揚桴各凌厲東西挽引力若停賦彩自分傾奪勢畫來巳歷數百年墻壁巋然今不廢觀風使者集賢翁每遊其下幾忘味因令搨手裂齊紈橫卷傳看得形似精神氣韻信瓌詭毫髮輕濃皆髣佛持來都下示朋僚一見飄然動詩思諸公詩豪固難敵形容物象尤精緻氣完語健雋衆口二子聲名轉增貴豫觀昔之善畫者心手規橅無不至窮竒極怪千萬端特出一時之用意鬼神冥漠不可詰豈有便能人勇智仙官佛像亦如斯變態隨時轉竒麗遂令來者信有說塔廟從而增侈費後賢雖欲究端倪竟亦無由革頽弊因知怪誕一崇長漸靡成風滋巧僞兹圖他日遂流傳更使人心惑魑魅補和王深甫潁川西湖四篇甘棠湖為湖始何人人賢物亦久所以甘棠名百年猶不朽宜逺橋溪流去無窮路逺更難盡信步到橋邊望中千里近竹間亭青青林間竹有亭才袤丈林深隔囂塵人間見真尚明月舫明月照寒宵湖水白如晝縱覽泊中流清光應可就刁景純學士寄示嘉篇述前後過潁遊覽之樂不鄙虛陋曲䝉推奬感歎不足輒用本韻通成五十仰答來貺昔嵗寓文館雅志慕藩屏嘗聞近畿州勝絶惟南潁十年走京華官局苦閒冷欲求一麾去數奏囊章請適㑹擇兹守乘時竊僥幸君相寵儒林念久貸愆眚旋䝉左符賜上戴天恩併扁舟促行役洪渠逐奔猛飄然離塵囂有若出機穽從容光景多厯覽江山迥去都時值秋到官月逢寎此邦信名區民願俗無警昔守皆巨公今猶䝉鎮靖非才偶承乏繼治實多幸前賢有規模遇事見要領因此頗閒暇得以探物景溪湖繞郡郭臺榭跨岡嶺春媚花百名秋香荷十頃野色連莽蒼水容迷淥淨虹駕逵路長鷁泛源流永幽尋窮勝處登陟疲足脛適意自留連對人成詫逞是時汴流阻北客多過境景純罷山陰前斾亦南騁豫逢丈人行再拜肅襟袊君待同舍生抗禮均儕等公齊薦具薄主席奉陪鼎饋以清淮魚報我龍山茗西園復追從繼日承音謦胸懷坦而夷不事畦與町杯盤命鐫簡絲竹煩正訂橫管教吹羌新聲賞歌郢善謔劇笑諧盡歡忘醉醒自兹别經秋多故值憂梗七月㑹同軌逺臣傷弔影交舊少經塗酒希但虛皿兀然坐空閣何異蛙在井故人勤眷盼尺書詢動靜新詩三百言斫句露鋒穎念舊起悲傷曽遊皆記省眷豫沗疇曩被愛踰踵頂感慨知已心中藏聊自警景純書閣老二紀酬申丙當年文雅譽久合登西省心貪為郡樂旌旄屢操秉徊翔成淹留前輩今誰並復聞乞淮藩早已飾歸艇南河如可棹北渡時引頸溪亭待清掃賓具重消整還當揖前塵晤語慰懸耿省中早出與同僚過談文思西軒詠太湖石洞庭山連震澤水怪石巉巗出波底誰言行逺莫致之好事經營俄至此愛君小軒才袤丈滿地新芳雜紅紫偶來慿檻見竒峯便有江湖秋思起送朱郎中壽昌通判河中府邶詩詠凱風以成孝子志鄭人復君母傳稱能錫類中郎常有懷生不識所恃登朝雖厚祿當食每忘饋念昔鞠育勞嗟今出處異倚門豈不待兩求終莫致乳烏思反哺哀鳴自垂翅百草搖春暉寧無謝生意灑血向穹壤解組出臺寺馳驅咸雍郊厯訪經行地至行感神明精神通夢寐悠悠大道傍親息忽相值紫綬拜北堂白頭歸長嗣悲欣叙契闊恍如隔生事四紀世路殊一朝板輿侍兹事昔未有聞者共驚喟帥守為之言詔趣還官次當年二千石寵名非所利仕或便鄉關安用竹符使蒲中母家近自屈為倅二受命慰慈顔騰裝愜歸思既徇報德心亦安效官智觴以萬壽薦衣成五綵戲無復興寒泉何須賦大隧令人及聖善孝慈兩不匱贈言述高風庶用激忠義寄題徐郎中鄱陽高居望雲臺子牟在江海心存魏闕下君居雖逺方不忘朝廷者築室負郊郭虛堂連廣厦浮梁江湖間風物最蕭灑官罷得優閒一到休車馬開軒命賓客棊壺雜觴斚園亭助登覽山川入騷雅霄漢不可跂惓惓誰能捨目睇西北雲丹成此傾㵼出還擁旌旟歸復傲林野真得吏隱趣豈纍榮名假宦遊羈紲中適意如君寡秀才石君豫同年子也攜書見投重之以歌詩意甚勤厚其歸也邀豫言為贈因作五言以勉之石生故人子袖書逺相過趨翔有父風步闊冠峩峩自言少也孤奉親由江鄱區區營甘㫖靡暇謀其他三十未有成無門托絲蘿求知走四方慷慨成悲歌顧我舊朝宷謂能激餘波多慙僻郡守局趣如生何空持贈我句坐閣長吟哦方今紹唐虞詠歌繼卷阿舉世用經術革去辭章訛詔書起遺逸草澤咸搜羅高爵待俊傑世礪鈍以磨君子務藏器生其勤切磋乘時挾才䇿繼世收賢科壯懷無自忽流年易蹉跎石縫泉清輕而甘滑傳聞有年矣前此數欲疏引入州治久不克就豫至則命工人尋舊迹相地架竹旬月而水懸聼事又析一支以給中堂一支以入西閣其下流則釃出外廡往來取汲人以為利因抒長篇以紀其功云峩峩鳳凰山有泉出其腋初微才濫觴漸大乃穿石靈苖蔭荼檟寶氣近金錫毖彼淵源長兹惟雲霧液人傳煮茗竒味與中泠敵陸生不到此云誰能賞識牙城據岡巒舊井皆滷㵼先時屬經營曽未致㸃滴及此川谷盈空為畎澮積我昨尋勝遊偶見為心惻料工度山原舉步過門㦸水道兹可行面勢正相直剪裁竹千竿接聯筧萬尺派别起中阿架空踰下稷不及浹旬間已到堂皇側吐溜始涓涓循除俄㶁㶁盈科殊未止過顙非用激公堂及燕寢股引各疏脈何期南澗流近在使君宅日用助烹爨嵗儲供醴醳冬春雖暫竭秋夏多餘瀝一支出橫廊通衢見勿幕衆器競挹㪺萬口得盥滌無愧抱甕人幸寬挈壺役嘗聞武林都素號蓬瀛國非才叨長臨愒日苦喧劇湖山空在望車馬難屢歷阻聽潺湲聲謾憐蒼翠色自得飛泉來頓覺煩襟釋常時兩衙退暫憩一軒息環流隨啓處玉音聞几席塵土汩以消形容清可覿誰知簿領中有此山林適若非仕江鄉何由見竒跡智者必樂水君子以觀德豈徒狎而玩寧嗟泄不食良嘉上善功所至為利澤兹泉雖未大其用已為益猶有膏潤資更期釃𨗳力來哲倘不遺庶幾成逺績蘇魏公文集卷三
