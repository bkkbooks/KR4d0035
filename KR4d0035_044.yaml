body:
  text: 蘇魏公文集巻四十四宋蘇頌撰表賀今上皇帝登極臣某言伏覩制書恭承皇帝陛下以正月十二日遵奉遺制紹登寶位者中外臣民永有依賴神靈龜筮罔不協從臣某中賀伏以太庚嗣商實兆歴年之永代邸繼漢益開緒業之隆異世同符千齡協慶伏惟皇帝陛下紹休洪緒眷命昊穹肇聖問于宗藩即丕圖于帝統提五精而撫運受三䇿以臨尊日月正明溥乾坤而寧泰雷雨作解徧動植以涵濡上宗七廟之基扄髙視百王之徽烈臣久塵位著世荷恩榮方退老于丘園阻蹷趨于朝闕扶杖而觀詔令繼明喜遘于重熈詒訓以示子孫事上更期于盡瘁臣無任賀欽聖太后同聽㫁臣某言伏審皇太后陛下勉從遺制同預政機共安龜鼎之隆式副臣民之望凡在臣庶舉極歡欣臣某中賀伏以皇太后陛下子育兩朝母儀萬國動必規于圖史化實首于宫闈深居長樂之尊丕昭聖範循奉治平之制允慰上心輔盛徳于唐虞軼徽音于任姒福均宗社恩被華夷臣限以老病退休不獲隨例稱慶闕廷臣無任賀立順國夫人為皇后臣某言恭聞今月日頒降麻制册立皇后者有命自天肇建長秋之號正位乎内實為王化之先上承廟社之靈下副華夷之望臣某中賀竊以軒星垂象儷宸極以居中坤徳資生賛乾元而育物方交修于治典宜首正于人倫伏惟皇帝陛下始初清明嚴恭寅畏致中和而格天地躬禮法以御家邦媯汭嬪虞本帝舜聰明之化塗山興夏昭大禹勤儉之風作合皇家允符世徳翬珩垂範宫閫延洪臣蒲栁衰年丘園退老側聽絲綸之出阻陪鴛鷺之班抃蹈之誠實倍常等臣無任謝賜登極對衣銀絹臣某言今月日潤州遞到伏蒙聖慈賜臣詔書一道寛衣五件二十五兩金腰帶一條銀器二百兩絹二百匹者大明繼照榮光徧燭于幽遐麗澤流恩繁錫遽占于耆艾奉詔文之深厚對服器以珍華拜賜不貲慙顔罔措臣某中謝伏念臣材資極陋遭遇實多以省臺累久之勤進叨近輔以蒲栁先秋之質退老丘園俯當月制之年仰遘天飛之運顧筋骸之已瘁趨觀闕以無階方鼓舞于休辰忽郵𫝊于渥命細書一札煥綸綍以下臨束帛兼金與帶袍而共賁何言隤暮荷此恩章豈惟充侈于家庭實亦增輝于里巷此蓋伏遇皇帝陛下堯仁光宅周徳丕承紹興洪業之隆曲軫周行之舊衣被萬物咸均雷雨之濡惠養老臣更厚金繒之寵况餘齡之無幾駭異數之難勝謹當鏤骨銘恩望雲祝聖出同父老贊睿烈以無疆入戒子孫罄忠規而弗替伏限衰病不獲奔走闕廷臣無任又臣某言龍飛紫極遘千載之一時鳳詔泥封均萬分之大賚顧慚衰耄亦與匪頒煥服用以増華戒位踰而有靦臣某中謝伏念臣斗筲小器章句陋儒逢時偶踐于機衡引老獲歸于蓬蓽重明繼照徒傾日月之光輝慶賜遂行咸蒙雨露之潤澤爛然龜紫之飾副以兼金之繁寵迨丘園榮生里閈此蓋伏遇皇太后陛下謀定國體功勤王家推惠養以為心致中和而育物博施濟衆務開廣于堯仁承筐是将俾涵濡于周澤綬章若若幣帛戔戔暮齒何堪拜君命之再至丹誠罙切瞻象魏之九重伏限衰羸不獲躬詣朝闕臣無任賀元符三年生皇子臣某言前星發采占垂象之告符甲觀誕彌協吹銅之夙兆况坤儀之正位當震長之鴻名事越古今慶覃夷夏臣某中賀伏惟皇帝陛下體元居正恭已承祧自光宅于皇基思克隆于治道振淹起廢朝野益見于清明隤祉發祥天人動彰于丕應月直正陽之吉時生貳極之尊國本維寧允契元良之美民黎均惠咸蒙在宥之恩臣退老江圻欣聆邦慶手足徒知于蹈抃筋骸難强于奔趨企仰雲霄但馳䰟幹臣無任又臣某言前星發采占垂象之告符甲觀誕彌協吹銅之夙兆况坤儀之正位當震長之鴻名事越古今慶覃夷夏臣某中賀伏惟皇太后陛下母臨萬國子育羣生翊嗣聖之丕基賛皇圖之興運自家刑國中外之治晏然隤祉發祥天人之應昭若月直正陽之吉時生貳極之尊國本維寧允契元良之美民黎均惠咸蒙在宥之恩臣退老江圻欣聆邦慶手足徒知于蹈抃筋骸難强于奔趨企仰雲霄但馳䰟幹臣無任賀受傳國璽臣某言伏聞五月日皇帝御大慶殿受傳國寶者天開炎統受命冠于百王神啓坤珍得寶充于八璽自秦咸之吉壤奉螭玉之嘉祥茂對元符考稽故實舉正元五月之㑹親見臣工推渙汗大號之恩普周方域慶成盛禮歡浹輿情伏惟皇帝陛下題五精之期繼六聖之治積徳累仁而動植茂遂彰善癉惡而朝野清明徳澤誕敷瑞應沓至惟傳國之守器蓋歴代之徽章藍璧斯書篆刻久藏于厚載漢泉堅井靈光屢見于前朝由神物之䕶持豈人力之能致聖辰奉若天意昭然既夀永昌方詠歌于金石無思不服将讋震于獯戎見海内一家之榮昭帝者萬世之福臣抱痾暮齒得謝明時側聴句臚竊欣盛徳之事躬與芸牧共贊泰平之功臣限以老疾在逺不獲躬慶闕廷臣無任進華戎魯衛信録臣某言臣聞先王撫邦弼成六服天子有道守在四夷大禹之即叙西戎周人之惠綏中國由聲明之及逺致華裔以同風詩書所稱古今一揆臣某中謝竊以國家規恢億載之䇿方制萬里之區憬彼獯戎初擅權於八部屬在唐季遂竊據于一隅太祖皇帝首命帥臣經營其畧太宗皇帝載馳使指問遺有加雖服叛之靡常亦羈縻而不絶爰逮文明之世親巡澶魏之師因一介之請和賜勅書而示好仁宗再更信誓益以金繒之資英宗嘗勅邊州寛其魚葦之禁以繼好息民之義為長轡逺馭之圖相承百年共由一道伏惟皇帝陛下徳㝢天覆乾剛日新紹列聖之成謨總君人之大畧謂彼方之荒忽狃我澤之涵濡嵗講聘儀雖切蟻羶之慕間窺邊隙稍萌蛆食之心上靡察淵俯為全度科征暫起則戒彼創生疆畛交侵則許其分畫蠕蠢咸蒙於煦育垢洿悉為之含容宜其革心永以内面竊尋在昔禦戎之論前書載筆之傳或厚賂和親漢才得其下䇿或償功與地唐亦信而不疑事出權宜情非固結由至誠之不著終後悔之莫追是以匈奴未入於長城而馬邑之謀巳露結賛始盟于渭水而平涼之變遽聞亂之由生兵乃弗戢豈若我朝之綏逺率令異域之歸忠偃革有年曠古無並而聖慮猶虞其越軼詔書思所以持循乃屬下臣討求故實料平日嘗行之務著一朝永久之規将欲付之有司使知所守又以待其来者無得而踰極逺見識微之明得禦侮折衝之要臣謬持鉛摘躬服綸函采輶軒絶代之言紀象胥行人之職撮其綱目刪彼繁蕪發例求端首述講修之始分門布序次標書幣之儀軺車别常泛之名陛見異燕辭之目至于勞賓訝摯厚往薄来朝廷之匪頒州郡之迎餞皇華四達山川有險易之塗闗市交通貨賄有懋遷之利内則羣臣之䇿應外則旁境之文移諸蕃之土俗風宜近塞之溝封亭隧有資援據悉用條陳或見聞于異辭或圖上于方畧推原本末則大事小事而俱收蒐補闕遺則中書外書而雜取嵗時洊易籖帙甫終解成周王㑹之篇因為憲令繪湘東貢職之事匪獨形容方屬藁之上聞荷賜名之下賁恭覽天題之命仰探聖賾之淵曰華戎所以示南北之情通曰魯衛所以表親鄰之意厚信者久而不易錄者盡而不汙兼三義以名篇掩二中之善志謙抑冠百王之表威懐盡四海之歡是謂信書煥乎國册臣荒孱有素紬繹無功識謝營平罔通知於夷事學慚伯始幸纂續于漢儀固多疏牾之尤莫盡聖神之藴将塵乙覽豫集汗顔冒凟冕旒臣無任謝支賜臣今月日准樞密院劄子以臣近上表進呈華戎魯衛信録二百二十九巻事目五巻奉聖㫖特賜銀絹各一百五十兩匹者輯百年之案籍甫上奏篇出九府之貨財猥加庶錫顧編摩之效薄荷奨飾之恩隆捧對以還兢惶靡措伏念臣技能素寡識致甚迂早探六藝之科未達四方之畧昨承詔㫖俾詮次于信書歴考前聞僅裁成於類例叙異域講和之事雜鴻臚典客之儀規橅悉稟于淵衷論著漫殫于庸力汗青云畢漏目固多但虞稽誤之誅敢覬便蕃之賜伏況撫和戎狄本聖世之治功紬繹簡編乃文儒之常職詎謂偶縁于任使遂蒙推假于寵光賚物有加揆勞非稱雖忍慚而祇受終撫事以增憂此蓋伏遇皇帝陛下天覆萬邦澤流四海以威懐御蕃國以恩信禮使人率用舊章垂為永制尸臣無狀乏纎塵涓露之功賞典過優厚賁帛鐐金之品既被匪頒之渥益思報稱之宜惟竭力于股肱冀收功于簿領仰酬樂育誓畢餘生臣無任進元祐編勅臣某言竊以法不獨立必由聖哲之有為令出惟行當重變更之所始時屬休明之運民漸寛厚之仁仰奉淵謨克新治典臣等聞古者民樸而事約故弼教之刑流宥惟五及乎俗易而風移故用中之典輕重以三事隨世而屢遷文因情而互起自唐興訖乎顯徳其律令格式具載于簡編由國初至于元豐其制勅禮書悉藏于官守章程時易巧偽日新峻其隄防乃有滋彰之弊緩其銜策又多扺冒之虞昔為便者或閡于今近所利者或違於逺舊文未具新例更生令每戒于荼煩事固難于毛舉取其宜於時者由是變而通之或革或因至纎至悉恭惟皇帝陛下太皇太后陛下道熈天縡智燭物情紹休六紀之光損益百王之際以謂疏律著令皆欲傳之無窮正本清源遂可措而不用雖祖宗之制具在而習俗之變靡常正律旁章一有滯疑之論奇請他比寖成破析之繁不有刋删孰從折中宜乎本朝以為先務二聖為之盡心慎簡乃僚總領其事置司率屬将訂正於煩苛據舊鑒新俾發明于義類臣等奉承詔㫖繙閱舊章于是以元豐勅令格式并元祐二年十二月終以前海行續降條貫共六千八百七十六道兼取嘉祐熈寧編勅附令勅等講求本末詳究源流合二紀之所行約三書之大要彌年攈摭極慮研窮稍就編幐粗成綱領隨巻標目用舊制也以義名篇倣唐律也其間一事之禁而有數條一條之中或該數事悉皆類聚各附本門義欲著明理宜増損文有重覆者削除之意有闊略者潤色之使簡而易從則久而無弊又案熈寧以前編勅各分門目以類相從約束賞刑本條具載以是官司便于檢閱元豐勅則各隨其罪釐入諸篇以約束為令刑名為勅酬賞為格更不分門故檢用之際多致漏落今則並依熈寧以前體例刪修更不别立賞格又以古之議刑必詢于衆漢以春秋㫁疑獄發自仲舒唐以居作代肉刑成於洪獻復有國人奏請隨事立條讞報實繁去取尤慎曩時修熈寧勅止據嘉祐舊文元豐勅亦只用熈寧前例增損刪定更不參考日前創法改作之意今則㫁自嘉祐至今凡二十餘年海行宣勅及四方士陳述利害㕘酌可否互有從違又以人情多辟法意未周須藉増禆乃為完密考東郡之議應劭有臣所創造之言按慶厯之書羣官有㕘詳新立之例今来勅令式内事有未備與刪定官等同共討論具為條目者即依慶厯故事注曰臣等㕘詳新立又以法令所載事非一端郡縣省臺紀綱繁委前紀所述皆有别書魏律則尚書州郡著令自殊唐格則留司散頒立名亦異皆所以便于典掌不使混殽其元豐勅以熈寧勅令中合入尚書六曹在京通用并一路一州一縣事並釐歸逐處若盡收還慮致叢脞今只以該五路以上者依舊修入勅令其餘有事節相須條制相類可以隨事生文不須别條立法者雖止該一路一司並附本條編載又有専為一事特立新書若景徳農田慶厯貢舉皆别為條勅付在逐司今元祐差役勅先已成書并近嵗専為貢舉出使立條者既不常行遇事即用並巳釐出不使相㕘其有一時約束三省奉行廢置改更蠲除省約既闗治體須俟僉用大則奏稟于清衷次則諮議于執政既有定論咸用著篇又案刑統録出律内餘條准此附名例後旁舉諸條各以類見今亦以勅令中如此例者六十四件别為一篇凡刪修成勅二千四百四十條共一十二巻内有名件多者分為上下計一十七巻目録三巻令一千二十條共二十五巻式一百二十七條共六巻令式目録二巻申明一巻餘條准此例一巻元豐七年以後赦書徳音一巻總五十六巻合為一部如得允當即望降勅雕印頒行仍乞以元祐詳定令式為名所有元豐勅令格式并元祐二年終以前海行續降條貫及前来詳定重修編勅所闗出熈寧勅天聖令附令勅并熈寧元豐申明勅前後申明散勅及一時指揮等已降新書收載者更不行用不係收載者各合依舊法其元祐三年正月一日以後海行續降條貫自為後勅施行若乃勅著罪名令存禁止應干典則盡載式文世重世輕蓋亦隨時之義先庚先甲庶乎已日乃孚倘賜俞音立為常制則官司奉憲無穿令㫁律之譏郡國承流有操刀執繩之戒臣等昧刑名之學乏將明之才誤被選掄服勤紬繹惕緩期于嵗月愧無補于毫分所冀刑清吏端少助敦龎之化網疎禁闊彌彰宏逺之規塵瀆冕旒若蹈淵谷其勅令式等五十六巻并看詳二百卷共二百四十六冊謹隨表上進蘇魏公文集卷四十四
