body:
  text: 蘇魏公文集巻六十一宋蘇頌撰墓誌龍圖閣直學士致仕李公墓誌銘龍圖閣直學士正議大夫致仕上柱國隴西郡開國公食邑三千户濮陽李公公儀年八十四以元祐四年十一月某甲子考終于濟南郡退居之私第終以正也以紹聖五年二月某甲子返葬于濮州鄄城縣遺直鄉栖鸞里塟從先也前期嗣子駕部員外郎孝純以季弟密直君承之所敘狀走書南徐請銘以識其壙予惟先世並遊之舊甘泉同僚之契紀其功伐書於樂石云公儀諱肅之公儀字也贈太尉諱遜之子贈太師中書令兼尚書令蔡國公諱護之孫贈太師中書令諱令珣之曽孫天聖中以世父故相文定公乾元節推恩奏補將作監主簿初命監大名府軍資庫年少氣勁早有才譽大河溢張家口府命督脩冠氏縣堤茭薪出納之事畚築力役之政晨夕親臨如期而功就冠氏民數千詣府請為縣宰府上其事朝㫖如請既莅職視民所先急者宿冦根據鄉疃人不安其居乃案令使鄉村置鼓盜發擊之逺近聞聲而畢應民既知教因親臨試鼓鳴而保伍􅍪至自是盜為衰息都轉運使李公紘奏為御河催綱景祐二年河決横隴又奏巡護金堤滿嵗無溢齧之患擢通判徳州改澶州慶厯二年契丹遣耶律仁先劉六符馳禮赴闕將過郡而病譙楯頽缺即謀于郡守曰吾州實景徳初鑾輿誓師之地今泛使來而城壘若是萬一朝廷有問則土木暴興其擾甚矣惟先事為備可以寛責于是料工度材増罅補漏成屋千區已而果有中人銜命檢視指顧徙置不日而棚樓一新使者驚異時我先人自禁林貳樞副任公出使修建北京往復城中目其治迹歸言于上擢知徳州未幾以施黔蠻首田忠霸冦邊被選提㸃䕫州路刑獄公事到部徑趨邊砦喻諸蠻以威信衆遂伏竄璽書褒其勞就移提㸃開封府界縣鎮公事賜五品服出知沂州州人常苦沂水敗橋水涸修復之患乃詢于衆咸曰家户輸財無有寧嵗于是教為輿梁使可徹置植堅木為杠横巨材為棟夏秋撤去至冬復舊暫勞永逸衆以為若是便于今不廢河北嵗歉流殍至郡視其强壯者募為兵羸不任者餔以庾粟抵春遣還兩得其所歴深濰二郡徙荆湖南路提㸃刑獄皇祐三年廣源儂智髙犯邕管侵掠十餘州朝廷至遣大臣經制湖湘密邇賊境使者實任其責于是親督諸郡兵往禦其衝廣東蔣偕王正倫追賊湖嶺間失利又率兵丁往收其餘燼招輯散亡躡跡討襲過臨賀賊遂引去一境帖然經制使狄青孫沔言狀朝廷第賞特轉尚書主客員外郎荆湖北路轉運使辰陽彭仕羲之叛被詔親行處置乃畫攻取䇿授郡將宋守信進兵窮討徑山岅篁竹之嶮兵不得前又為之募敢勇士為鄉導直抵溪州破蕩其巢穴賊平以太夫人髙年求鄉郡自齊易海就選江東轉運使徙兩浙時以浙河水災籍諸州役兵疏濬堤堨不勞民力而蘇秀之患除移成都路改河北賜三品使遷江淮發運使是時方治汴堤創木岸以束湍流久之未就特㫖召赴相府㕘議于是有都大提舉陜河之命既而堤岸卒成以親喪去職服竟由三司勾院進度支副使厚陵之役百費所出皆先期應辦公私無擾除將作監再領發運使因對神宗皇帝問西夏諒祚犯大順城事敷奏合㫖翌日拜諌議大夫知慶州既至治戎政嚴攻守之具將佐禀命常若冦至冦聞聲而戢數月移瀛州熙寧元年河北大水地震數州累日不止城壘廐庫公廨民廬摧陷幾遍乃躬冒泥潦中指喻僚屬為之區處倉庾粟麥暴露者則結草為囷圌而以儲積之沾漬者出以賑流冗編户之無蓋藏者為茇舍以居處之公宇亦如其制又嚴盗賊之禁下令民敢有乘災剽攘一切以軍法從事後有叛卒夜掠民財立捕斬以徇人遂安息上聞其措置有緒特遣中使勞問賜茶藥以示優䘏踰年拜天章閣待制權知開封府出知定州召還權三司使司事出知永興軍換青州改齊州提舉南京鴻慶宫三命皆自請也過都留提舉中太一宮判將作監元豐元年拜龍圖閣直學士知鄆州占謝日上謂之曰鄆介濮齊之間在卿為便矣州自曹村決口之後積水為患甫下車為之相土髙下創築長堤請民丁萬人于朝一月而成水患遂除四年告老優詔提舉兖州景靈宮太極觀遂居濟南七年致為政而歸退休六年而精力罙健毎嵗時節序率子姪輩往濮上祀先壠合族以食欣欣然歩趨笑語少年不若也早通竺乾之教持心行已衷無隠情常曰吾無他長惟至誠待物而巳故其啓手足之日疾無甚苦忽語諸子曰人生一夢耳寂爾順化豈其生也操行純固故其往也若有歸焉夫人宋氏前十一年卒于京師追封延安郡夫人子六男子長即駕部君也次曰孝謹通直郎孝愿宣義郎皆先亡孝錫通直郎孝益宣徳郎孝常承事郎五女子孟季皆出家為尼曰智滿號明覺大師曰慈妙悟真大師三壻大理寺丞韓鎮國子博士張照宣義郎王仲康孫男二十三人侊宣義郎傅僅仔侍倚皆仕銓選為州縣掾佐曽孫二十二人公儀性明達周知世務而于吏事尤為精密敏而能斷主于寛平不戾文法其治郡也不為條教事至而應初莅東海牒訴滿庭下獨于儔人中指一叛卒訊曰若非前九年沂州犯盜而亡者今尚不悛耶卒寘于法聞者畏惕其奉使也務舉大體不以小察為明未嘗以細故案吏吏伏其公其立朝也直以奉上勤于濟務尹京主計不累月以治最聞凡七領州節皆近于鄉隣而濟南三至兩為提㸃刑獄五為轉運使而成都以親年免行制溪蠻禦邕冦績效尤顯六領方面並兼一路安撫使而慶州又兼經畧使馬步軍都總管髙陽捍患之政至今人猶能道其事兩為提舉在京諸司庫務皆以疾辭府省特恩授之再至又兼羣牧使判三班其别使則體量陳亳水災相度張馬㪷門分閷都城水患護魏王𦵏事賀大遼生辰皆稱所職出入中外六十餘年自九品至三品更十六官用嵗月轉者少由功最遷者多兩拜内閣所莅實迹可紀而無悔尤晩嵗以學士歸老里第逢辰錫福既貴而夀且康善始令終仕宦如公儀者幾希矣少有至行年十四時從文定公南遷衡陽至復相不離左右公薨又請沂州以奉襄事在徳州聞先公訃即時徒跣赴殯居太夫人之喪廬墓三年不入城郭曹村河流壞先壠躬募鄉民負土増葺季君密直君生數月而孤親為鞠育誨導以至大成密直君嘗曰承之奉兄如父兄之視我如子因省兄陳留過都神宗特召見勞問面諭曰卿家可謂一門忠孝其天平除書有父子忠孝兄弟顯人之語當時賢公名卿多以端方目之王沂公呂許公杜祁公富鄭公韓魏公最為知巳冠氏則沂公之薦䕫路許公祁公所引用木汴則魏公委擇其為君相稱舉如此李氏世占濮上為東州望族自文定公薨未數年而公儀兄弟以才名相繼登朝元昆東之太子少保仲兄徽之正議大夫亞弟及之通議大夫立之中散大夫並以年德致仕而終季弟密直君與公儀同時為學士今子姪踐省寺使一道者又數人諸孫及曾仕與未仕四十餘人克紹家訓有後之澤其可量乎予治平初為度支判官與公議同曹共事相好尤篤追紀平昔愴然于懷系之以銘言不逮意銘曰伯陽苗裔飛將來雲山東著姓濮水名門相有遺直慶貽後昆弟兄鳴玉子姪輶軒藩朝互陟霄鶚齊鶱猗歟内閣克承世芬聲馳初仕惠布黎元公卿交薦州使宣勤梁沂罷斂木汳通堙上嘉乃績詔錫褒言尹京主計制閫藩軍中外更踐寵數便蕃再留持橐懇丐鄉枌玉符琳館汶水仙源遂還印紱退老丘園公生鼎族仕遘華勛夀彌七紀家有曾孫歸全新第返葬先原始亨終吉本固枝繁垂於永久考以斯文少府監致仕王君墓誌銘由京師舟行東南五百里而近郡曰汝隂地瀕淮潁厥土良沃水泉魚稻之美甲于近甸言卜居者莫不先之故自慶厯以來賢士大夫往往經營其處以為閒燕之地嘉祐中予忝麾守時長樂王深甫徙閩籍占著郡内未幾潁川辛成之罷郡鄂渚過境留居而同郡王君隠甫來自壽陽治第中郭常與二人者游皆以僑寄遂為鄉黨鄰里焉深甫予友也成之亦予從外舅在郡過從最數因而接君甚欵每燕游造適而三君未嘗不同之既而成之調官而還未遑卜築君獨遺逺宦情樂此勝槩後雖腰郡章臨九江逺去數千里而心未嘗忘之其滿秩也年才六十六矣去而謂人曰吾里有第鄉有田而子有禄可以休矣遂上書請老朝廷又官其一子以寵其歸因定居焉逡巡鄉閭衎衎自適而論者亦稱其勇退為得計後三年年六十九考終于新第克𦵏于汝隂縣旌義鄉新安原又十二年以夫人張氏之柩合祔焉從吉卜也君諱山民隱甫字也其先臨汾人曽祖夢徵贈太子太保祖嗣宗左屯衞上將軍致仕贈太師諡曰景莊父九齡感徳軍節度推官累贈尚書工部侍郎妣温氏追封仙遊郡太君太師在祖宗朝以文學登科甲以才謀致台輔藹然聲譽見于一時捐館許田就𦵏其邑子孫復為長社人君用祖䕃祥符中補將作監主簿其後通閨籍服五品進陞卿寺出典州郡紫衣金章爛如也其為人謹介自持不撓非法在家無子弟之過居官為辦職吏始監荆南越州江隂軍酒税擢知温州永嘉縣嵗餘徙知賓州通判夀密泉安四州最後知江州凡遷秩十有五等而位正監歴官十政所至雖無赫赫稱而課局有羨吏治無廢不為矯激之行以取當塗之知然仕宦幾五十年未嘗絓于吏議在賓州時年尚少已能修舉政令谿洞獠蠻聞其風無敢犯境遭嵗大穰郡素不積儲穀價猥賤君白外臺發庫錢廣平糴以紓民勞俄而歐希範冦宜州官兵進討軍須轉餉卒賴賓廩以濟部刺史上其狀于朝法當遷秩有司以不滿數旬而格其議君獨無一言以稱伐六安芍陂隄壞久不治君議調夫繕完躬自董役既成而嵗大旱民獲其利為多凡此足以見其不苟簡于職事不汲汲于進取他可知已始娶某郡孫氏封永康縣君早亡張夫人繼室也工部侍郎正倫之孫女封京兆郡君柔訓靜專能盡婦道家庭雍雍而無間言子男七人曰浹通直郎河北轉運司管勾文字曰濬巴州司理㕘軍曰泳未仕渥開州萬嵗尉漸承奉郎監開封府襄邑縣倉草場沂華州浦城縣丞濤湘州司理㕘軍女二人長適鎮安軍節度推官監解州解縣塩池某次適宣徳郎曾孝廣孫十五人初君終于熙寧四年夏四月庚辰塟以其年十月甲子合祔前期一日浹等泣訴于予曰昔我曽大父太師景莊公之勲爵行義應諡于朝公為奉常實由一言以定其議而聲光煒煒垂榮至今惟皇考大監仕歴四朝伐閲無玷而退嘿自守不求顯聞故當時公卿無深知者公昔守潁嘗䝉顧遇不朽之事敢復干一言以傳取于後其婿孝廣又從為之請予惟平日之雅固不忘也又嘉君有子能顯揚先人之善而其所稱述皆予昔之見聞也故得以詳載之夫恬于仕進者官不蘄達要之適志意而巳禄不蘄侈要之代勞力而已名譽不蘄顯聞要之逺羞洿而已若君者智能逺害而殆于趨時力可任事而勇于知退方其未衰休休焉以歸籍素資以享宴安之樂顧其所得豈不多乎孔子所謂言寡尤行寡悔禄亦在其中矣其少府君之謂乎銘曰王出汾陽系于通祖太師始大遂遷舊許宜爾子孫或塋或處少府來潁樂彼風土卒塟其地在淮之滸後十二年夫人始祔卜人曰吉利其後嗣太師立朝功崇譽著少府恂恂與物無忤夫人成家允矣健婦積善相承後昆是裕如卜者言當享榮祚朝請郎辛君墓誌銘嘉祐六年仁宗謂輔臣曰科舉取人拘以條式敦朴有道之士或至棄遺是豈朝廷求才之意耶乃詔諸路州郡訪求遺逸敦遣詣闕試而官之時故相右僕射兼侍中判許州賈文元公洎京西轉運使提㸃刑獄凡五章列上長社進士辛君廱化光文藝節行鄉里推服召試西掖中選者十八人化光在第四特賜進士出身試秘書省校書郎知河中府永樂縣當時議者咸謂聖主崇奬儒行恩及草澤實曠世未行之事翰林尚書宋景文公遺奏以為取士不刋之法其為天下稱賛也如此化光尚書比部員外郎贈光禄大夫諱有孚之子駕部郎中檢校太府少卿致仕贈户部尚書諱若沖之孫故㕘知政事太子太傅致仕贈中書令諱仲甫之曽孫胄出隴西金城之世自汾州西河縣再徙潁川今為潁昌府長社縣人化光少以名家子向學勤刻綜貫書傳與士大夫游當時賢公名卿至許者莫不推挹以為逺器累舉進士不偶既壯矣自謂命之竒隻不可强進杜門養志幾十年而從聘命治平元年英宗皇帝立諸王宮大小學選儒學之官為教授使以經義訓宗子化光自永樂召為韓王冀王宮小學教授嘗以為貴游子弟以諸生法約束之則惴憚而難入故為之别立課程日誦若干言書若干字間則大集講解所誦書習為文詞庶幾漸靡成性若自然耳于是宗子以其規矩簡而易行莫不悦從未數年而學益進能循禮法不為非義繄善誘之益也以嵗勞遷大理寺丞仍舊任凡六年求外補差通判火山軍故相韓康節公與化光鄉友也帥并門鎮武定皆奏辟管勾安撫司機宜文字累遷尚書屯田員外郎官制行換朝奉郎府罷還審官格以常選王宮洎機宜雖積十年四任而未嘗實歴令宰不得升秩復當領邑㑹機宜罷舉取嘗為此官者為首選化光欣然不恤復領真定又二年仍未外任由是朝廷知其才久滯常調用為光禄寺丞遷太常博士逾年選為王府記室㕘軍再轉朝請郎化光為人外温和而内勁正與人共事推誠相親議論有不合但不言雖不從未嘗變色後或議奪而氣益恐怍自以為事勝而怨憎生非孤拙所宜也故在王宫及國邸二王多詢其故事特加禮敬盡得内外之歡心其去也從學者至涕泣流連不巳雖給使皂𨽻輩亦遇之以禮未嘗惰忽其周旋于事皆此類也在帥府雖邊書叢委皆悉力裁處動中機㑹帥長賴之以厭折多矣天性孝義愛親戚辛大族也昆弟皆先喪逝而貧居食口益衆化光月給以俸錢僅二十千此外有婚喪又輟財以周急内外屬之居京者遇四時節序飲食之饋未嘗絶乏死之日家徒四壁族人住俸失所者七八家平生無他嗜好獨喜賓客善談諧至于歌嘯終日不倦罄家之有無以供饌具故士大夫無不與之交好者平居康健未嘗有疾一旦暴得腹瘍漸不能興伏枕月餘而卒時元祐四年七月一日也交親聞訃無不嗟戚而痛善人之云亡也予與户部侍郎韓公持正給事中趙公無愧往撫其櫬慟哭相弔右丞相范公堯夫尤深惻恨不得臨其喪日遣親賓往問其襄事周恤尤厚嗣子公琬素承清白之訓家無一簪之貲舉喪難苦予之息喜化光甥也使往幹助得以盡禮以其月二十八日舉櫬還陽翟以某月某日塟于三封山某六從先某官穴之左夫人王氏某官之女賢淑善治家前三年某月卒先祔大墓自夫人之殁化光自以室無主饋忽忽不適蓋平居奉親戚待賓客所以周旋無間皆内助致然故也一子即公琬以致仕恩補太廟齋郎二女長適臨潁宿夀昌亦其甥也次幼在室予與化光友且親道術相忘中無間然每杯酒意適則歌呼縱放至忘形骸稍隔濶則以為不足及病且亡予為之慘慘者累數月不能已益念相知之難得也其𦵏也公琬請文以誌其壙遂為之銘銘曰辛系隴西金城著姓中徙河汾數世不競流光自逺是生中令佐佑神功入預大政歸老潁川厥居以定子孫蟬聨衣冠益盛化光特起出駕封軺一命宰邑躬掌民徭宗藩典教邊城賛條五參帥幕逡巡不超太常光禄預議中朝上選耆老典記王僚博識多聞納言敏行善與人交久而益敬或出或處安之若命胡不永年遽至大病殁有遺恩𦵏從先正既安故丘復貽後慶朝請郎致仕李君墓誌銘朝請郎致仕護軍賜緋魚袋李君諱況字希荀泰州海陵人予仲妹壻也曽祖祥祖載家世力農自業不求聞達鄉閭有長者稱考容少以豪義自奮起家為三班官非其志也乃還鄉教二子以學問為求良師友躬自課厲以至成就使舉進士相繼取科第仕歴州郡卒用其升朝恩累贈正議大夫配朱氏追封同安郡君長子曰洙累官朝奉大夫次即希荀也大夫宰邑與州治有異等其為政簡而明遇事乃斷不預為條教故吏不能逆其意以用事奸蠹以此亦自息予治平中為淮南轉運嘗薦其髙郵最狀後得官多逺僻未及為朝廷任用而卒希荀治行大抵相近蓋昆弟講學有源故政事皆不撓也始予妺適宋氏未久而寡子幼未有所從有言希荀家行慈睦可託遂以歸之希荀視宋之子猶子也恩勤鞠育若出天性然加之以矜憐惻怛及長成為之冠婚如禮卒使宋孤視猶己父無間然人以為難也咸謂推是心以施于有政則安老撫弱風化末俗易易也希荀質性淑茂襟量夷坦與人交盡誠無隱言談洞見底裏于親舊間雖狎侮造次不失謙恭急人之病甚于切已當官勇於敢為用法主平恕而未嘗失有罪持議不阿優柔盡理或所見異同至于辨爭而同僚不以為忤蓋知其誠意非他也初為真湖二州掾端太平二郡從事時年尚少持文法報期㑹久更事變不能過也州委案蕪湖縣遺火事迹火所起曰烟燎無從來悉衆救撤焮熖連日不息此天災也豈人力可禦乎于是為之辨明白州使官吏得免從坐用薦舉格改秘書省著作佐郎四嵗進本省丞知潭州湘潭縣就徙通判衡州每病衡守疾惡太過徙𨽻為引視民有犯已決猶留州役即有代乃釋為引瘡病律白守罷之屯戍禁卒賊殺有罪不殊吏以戍兵肆惡當軍法從事詆曰州縣接蠻境其實内地卒非行軍猶在營也自宜處以常法衆不能奪元豐官制行由太常博士換承議郎三轉至朝請歴通判太平秀州有故人子為嘉興主簿暴卒知其貧不能舉喪為出已俸賙之遂得還𦵏未幾同提舉三門輦運以廣濟十軍嵗挽漕舟最號重役至冬當休而白波常託河隄備虞及期不遣斃于凍餒者十六七于是為坐放凍令籖白波放還得稍憩洎外臺計省交上其勞朝廷稍欲試用選知海州未行以疾請納禄守本官致仕詔下一日而終于河清之官舍時元祐五年十二月某甲子日享年六十二希荀自解巾褐訖啓手足凡四十二年歴十一官九更事任並以資履敘進未嘗干功賞倖超擢所至皆有善課而無毫毛過失不與物競而職事常辦年雖未壽而克保終吉豈積厚所來者逺耶至今淮甸士大夫語人物者猶稱二李而云樂善好義希荀又過之可謂善人君子也初娶譙郡曹氏繼某縣君繼以予妺封海陵縣君一子曰峒用致政補太廟齋郎今為泗州臨淮主簿四女三適人一早卒長壻蘄州判官章觀次進士郭景亮次宣徳郎陳師常一孫尚幼李氏居海陵世數逺矣死皆塟焉而城郭褊隘嵗久居者益衆瀕海舄鹵埤薄而塟者又少岡陵吉壤希荀既仕宦數歸患其然往來吳中樂京口土風且密邇海陵蓋有意居且塟也未及而卒峒探其遺志遂謀塟丹徒筮縣之大慈鄉道仙灣西山之原吉以紹聖元年二月已未厝柩于幽堂事已奉母氏葺居郡城遂著籍焉一日峒號泣謁予曰先人行義徳業早䝉重援今去泰徙潤當有文以誌所遷之由非吾舅莫得其詳予知希荀者也平居愛其善論議有推已及物之志亦欲乘時施為然安恬自信不汲汲于進取昔嘗與故相蔡公共事相期久逺情好尤篤蔡公秉政數招延勞苦勤厚希荀對之但問無他道舊故笑語如平生無一語及榮利蔡公亦悉其雅志終不及引用而去其所以仕不至顯大者未必不由此也可無述焉銘曰君子恭寛信敏而惠悃愊無華古之良吏孰克有之可以言治我黨荀也其庶乎是侃侃惟荀氣充貌溫有容雅度可復誠言在割能繼靡怨惟恩渾純篤厚孰見涯根江淮濯纓王畿結綬鴻干始漸驥路俄驟出將漕最擢分符守資適逢時假年弗究厥生海瀕其復河津孤惸負柩卜竁京原民懷遺愛士想清芬德必有後其在嗣人蘇魏公文集巻六十一
