body:
  text: 蘇魏公文集卷三十三宋蘇頌撰外制提點陜府西路諸州刑獄公事司封員外郎趙瞻可祠部郎中敕承務中臺左曹謂之清要觀風外服右陜當其會衝惟時通籍之良方重讞刑之寄稽其治課應我陟書以爾具官某博通古今多識治要早預法冠之選往分郡組之行稔其休聲擢以方任案條察吏有能臣之風閲嵗校勞居奉使之最進列冰廳之秩益增星節之華宜勉懋于事為副疇咨于近劇可虞部員外郎曽孝寬可比部員外郎敕具官某古之仕臺閣者多用公卿之世以其習熟典章可任以事隨資敘進式佇甄升以爾士操清修學術詳敏繼承門法厥問甚休副郎省六聮之華結天官四載之課姑循常格擢列近曹惟勉懋于官針用顯揚于世美可三司度支判官尚書刑部郎中充集賢校理王瓘可尚書兵部郎中依前集賢校理充三司度支判官羣牧判官尚書比部郎中王誨可尚書司勳郎中依前羣牧判官敕夫考功黜陟之法自有虞以來未之或廢我朝稽古其令甚明雖職列臺閣之華任登要近之地必由校課然後議遷以爾具官王瓘文敏學優才通用博服勤鉛槧之業振務計財之繁以爾具官王誨仕富吏資行循家法稔譽郊畿之政贊司廄牧之良而皆久次郎臺荐登最格稽其功狀應進上階武部冠於右曹勳書次于大選用酬爾善各俾序升若其治迹之殊尤材資之美茂則朕所考察不在有司之比往服休命爾其勉哉可尚書比部郎中馮博雅可如京使惠州刺史敕具官某國家設官之制略擬唐規列使之名近對郎務仕者更踐惟才所宜矧兼領于郡章示優隆于武爵自非勳戚曷允咨俞以爾早服閨臺夙推器幹襲相門之餘緒連宗邸之外姻間覽奏封之陳載嘉閥閲之美俾從華省易授內司掌庾京都實超于資等析符善壤益重于聮班佩服恩褒之華勉圖方略之上可前祕書丞充集賢校理孫洙等可並舊官服闋敕具官某夫服喪去位人子之私恩也脫衰還朝人臣之公義也故進退不踰其禮則忠孝可以兩全以爾仕以文儒籍在閨省遭罹艱疚甫畢禫除姑徇常經起仍舊著益思所以揚名顯親之效在勉懋于公家而已可尚書比部郎中范仰之可駕部郎中敕具官某審官考課之法以四嵗為限南宫遷秩之等有六行之差旌擢吏勞宜優寵典以爾材資敏茂治狀詳明為郎有年奏最應格進列右曹之上益光華省之遊欽對明恩更圖逺績可駕部員外郎李安道等改官敕具官某等朕命有司考羣吏之治限年而上課隨資而敘進雖令有定著而恩無泛及允如遷格兹謂宿官以爾等或仕歷省闈或籍通閨闥出幹衆務入奉外朝稱最及期稽功斯善增秩一等姑用前規若乃才譽彰聞績效明白則懋官懋賞豈限常資爾等勉之副我明陟可都官員外郎仇著等改官敕具官某等尚書郎九卿丞屬皆外庭美選通籍之士得以次遷所以辨才能而旌吏閥也以爾等材力之敏試于治煩操履之修行而寡過分列省寺外更事勞有司議年既成積纍之效隨兹進秩咸增班爵之榮祇服恩華勉思忠報可國子博士髙保衡等改官敕具官某吏治有勞法當甄奬天官覆實恩有次遷爰録顯庸特推茂渥以爾夙勤士操進列朝閨幹職不愆奏功斯善録其四載之課擢以一官之榮益務逺圖丕欽厚奬可西上閣門使李評可東上閣門使敕具官某中閨典謁列使橫班陟降殿墀導揚詞命非素推于詳練固靡副于咨詢以爾世服忠純材資敏達向擢聮于上閣參掌選于西銓朝廷之儀頗聞事舉閥閲之課復用最升特甄纍嵗之勤就陟東藩之秩宜益圖于逺績期報稱于異恩可皇兄前右武衛大將軍春州刺史仲虺可舊官服闋敕具官某三年之喪稱情而立文日月既終衰麻必釋蓋天下之通誼也爾以宗室之秀服閨朝之聮向罹親憂銜恤在疚既畢禫纎之制宜還簮紱之榮欲忠孝之兩全在始終而一節往祇厥位當體訓言可皇姪前右千牛衛將軍令羽可舊官服闋敕子之于親也有鞠育之恩顧復之慈三年之喪未足以報其厚德然聖人稱情而立文不可多寡故天下共之以爾具官某宗室之近支臺閨之顯列遭罹不幸棄失所天服衰而居倚廬克遵禮式鑽燧而更舊火甫畢禫除宜還定著之聮入奉內朝之謁無忘信厚兹謂顯揚可仁夀郡君張氏可才人敕嬪婦之列蓋掌帥于宫庭才美之名實優隆于位號載嘉內治之助特厚言綸之頒某氏體間淑之令姿稟肅雍之懿範自參承于御敘嘗進躐于恩封而謹職中闈顧德言之並茂增華近序介祥祉以尤殊宜加印綬之榮用光圖史之鑒惟靜專所以安寵數惟婉約所以副褒章服我訓辭無忘欽率可左千牛衛大將軍羅榮可依前官充絳州團練使敕漢之執金唐之諸衛今雖處于間秩然猶列于上班或兼方任之權益顯官儀之貴以爾具官某早登勇爵嘗典伍符因齒力之向衰擢禁環而甚寵仍司戎仗獲就燕安宜優異于久勤俾復升于團結斯為厚渥足慰暮年尚殫夙夜之心以答始終之遇可皇城使宜州團練使桞涉可左千牛衛大將軍宜州團練使敕具官某國家待賢能之士恩禮甚厚方其壯盛則任以權劇而責其實效及其衰耄則處之便安而俾遂乎休養以爾素負材氣來仕班列臨邊有綏禦之效治郡得廉良之稱閔其暮齡宜有優禮特遷環衛之秩仍假州符之榮易事局于清間示始終之殊遇體兹厚渥姑務燕怡可秦國莊孝大長公主遺表長男供備庫副使李嗣徽可供備庫使敕具官某朕惇睦懿親愴仁姑之早世周旋恤典鑒遺牘之所陳眷言世嗣之遘凶方倚居廬而茹痛特越從于朝序俾擢正于使名念往撫存宜體國章之厚愼終追逺益思家事之承祇服訓辭勉遵禮式可如京副使兼閣門通事舍人王光祖可莊宅副使兼閣門通事舍人敕具官某朕擇沈敏方重之臣委以邉略庶幾安輯一道使不生事于疆外而爾光祖實應兹選涖事之始辦職惟勤入奏便朝講畫有素載嘉策慮特爾甄升疇進使聮式優戎路惟爾世服忠義纍更寄任宜益圖于逺績斯乃稱于寵章可西京左藏庫副使程昉可莊宅副使敕具官某夫服軒墀而列禁衛皆朕所信任之臣也則敘遷之法推恩固優以爾幹裕謹良擢侍近幄出護河役訖亦有勞校課滿年功狀應陟躐進使名之美仍參拱扈之榮祇欽寵章益念忠報可左藏庫副使鄭惟勤等服闋敕具官某早登勇爵列在閨朝俄服親喪甫終祥祭奉追書而來集還舊次以參榮服右著之聮無忘厥守展四方之事佇集爾勞可供備庫副使黃巽劉永清可並西京左藏庫副使敕具官某列局京都分處衆務並置使介以擢羣材今雖無涖職之煩抑亦有限年之選向非能稱不在次遷以爾通稽右閨服勞王事出入著幹廉之效嵗月成纍久之勤結課荐周進官有等欽膺褒顯之渥益念公忠之誠可未復舊官供備庫副使張繼凝等復官敕具官某爾向以武材擢在邉徼失于禦冦用是奪官屬霈恩之溥加閔公坐之滋久稍遷秩次進列通班丕欽甄敘之恩無怠忠勞之報可文思副使田守則可左驍衛將軍致仕敕具官某仕優而賦祿年至而謝事古今之通義也以爾才力素稱擢在班列更歷中外頗亦有勞自言且衰願還所職既許之退宜優以恩躐遷環衛之資使為鄉服之寵往祇榮渥益保暮齡可殿中省尚藥奉御直翰林院蘇惟和可翰林醫官副使敕具官某周禮醫師有稽功賦祿之等本朝官制有置使立二之文既彰厥能宜進之職以爾通上池之技聮中省之班典領纍年診治有效擢進內司之介用旌久次之勞益念精專乃副恩陟可太子右清道率府率致仕張忠可落致仕依前官敕具官某七十致仕大夫之禮也豈謂夫武力之士哉爾以才勇聞所至可紀引年當去大臣為言都城方籍于繕完祿秩固宜于優假特還儲率之秩俾幹留司之煩往服殊恩尚勤乃力可內殿崇班閣門祇候趙璞可內殿承制依舊閣門祇候敕具官某夫入贊上閣出乘塞垣皆王爵之美選也爾以殿著之秩兼領其任自非才資之敏曷膺職秩之優屬上年勤載嘉治狀姑循班級之次稍進官聮之榮尚綴近塗益思逺業可內殿崇班李舜卿可內殿承制敕具官某爾通班內著之聮祇事平陽之館追惟懿主奄謝昭辰遺奏上聞言爾勤力宜特遷于朝秩俾仍幹於邑司祇膺優異之恩無怠始終之效可內殿崇班張敏可左監門衛將軍致仕敕具官某服武辨者以筋力為尚而爾之齒耄矣豈任奔走之役閔其久勞宜有安處俾易衛環之秩歸為里閈之榮祇欽茂恩益自休養可大理寺丞張保微王愼儀等改官敕具官某爾以名家子擢在京司能蹈世風不廢官守荐者稱其幹裕攸司上于年庸法有次遷班升一等往服朝綸之寵益思門構之承可大理評事李德芻可光祿寺丞敕具官某考課之法豈所以待俊異之倫然官久不遷則能者何勸以爾文雅修潔善承世風仕于京司蔚有美稱姑用四載之陟稍進一官之榮益懋逺圖以光慶閥可大理評事楊耆可衛尉寺丞敕具官某爾延賞入官坐曹試吏能弗懈于王事既積稔于嵗勞上課應條攸司言狀敘遷之典奬勸在焉斯漸履于榮階益服勤于治效可前知涪州樂溫縣事鍾浚可祕書省著作佐郎敕具官某考課之法不行久矣吏之能否何以甄明前詔有司復修舊典而爾之治狀實應新書遷佐祕丘俾偕榮路惟爾詞科之秀歷仕有年膺兹渥恩必能勉懋以副朝廷責實之意也可奏舉人前閬州録事參軍霍亨等改官敕具官某夫仕于州郡既擅幹亷之稱校于銓衡復成積纍之課不有恩奬曷甄吏勤以爾士操甚修官閥無曠從外臺之尉荐副便坐之收揚擢聮京司俾漸榮路所宜欽率以服寵光可奏舉人前權知建州節度推官孫宇等改官敕具官某夫甄擇才能莫若觀詳試之效考察言行莫若責保任之人由此而升得士為衆以爾歷官州縣亦既有年覆實銓衡咸應前格因唱名于便坐命遷秩于京司欽承渙恩勉盡勤恪可奏舉人前陜州陜縣尉常景可光祿寺丞奏舉人前晉州趙城縣令安夀可著作佐郎敕具官某等郎內閽丞蘭臺遷佐皆京司之美官也由選部而升者非詞學之科與公卿之世不得與焉以爾等仕于縣邑或令或尉皆有善狀稱于知已中銓考實便坐推恩各用爾資進增厥秩既蒙奬擢之命宜盡公忠之心可奏舉人前權淮康軍節度推官試祕書省校書郎許宗舉等改官敕具官某等九卿之屬皆美官也祕書以待文雅之士大理以進詳明之才由銓管而敘遷蓋榮塗之階漸以爾等或詞中科級或仕起世資久從州縣之勞繼有知已之荐引對便坐擢聮上臺仍俾長民益思善俗可延州甘泉縣令張圃可太子中允致仕敕具官某今之仕于銓選而不虧亷守者其告歸也則以朝籍寵之所以嘉夫士操也以爾文中科選官為長民甫及始衰之期乃懷知止之尚升秩儲禁增美鄉閭服我褒優之恩慰爾沖退之志可登仕郎守祁州深澤縣令韓孝直可守河中府河西縣令敕具官某捕盜之格殿賞尤嚴綏安里閭良藉幹畫爾頃尉畿甸能勤厥官冦攘就擒功最應令擢以大邑寵其前勞宜善撫于羣元思益圖于後效可儒林郎行秀州華亭縣尉劉安世可守越州上虞縣令敕具官某翦除盜賊肅清里閭尉事也爾隨牒逺方能勤厥職剽聚之黨一舉而擒録其前勞易以邑令勉收撫字之最式佇甄收之恩可駕部郎中致仕趙宗閔男觀可試祕書省校書郎敕具官某男某士大夫年至致其職事于上於是有賞延之澤以及其子孫古今之所同也爾父仕歷省郎引年得謝俾官一子以寵其歸爾勉承之無替厥服可故恩州司理參軍王奬男覿可守鄆州須城縣主簿敕某男某爾父頃掾清河沒于城守當推恤典以及其家而爾方稚年未任仕格逮兹有立可以入官因命舉于前恩俾勾稽于便邑所宜竭力以亢厥宗可故給事中充天章閣待制王舉元遺表親孫王璞可將仕郎試將作監主簿敕某朕念彼帥臣奄遺于明代恤其家事特厚于恩綸爾實裔孫早聞義訓特推試秩之命俾逮亢宗之榮善守世風無忘學古可東頭供奉官王唐卿可內殿崇班敕具官某仕無文武之異而以登朝為貴况通班殿著是曰華選以爾策名右列從事有年校其勤勞材力可見稽于令格遷擢攸宜進聮廷籍之榮罙謹官針之畏可左侍禁趙升可清道率府副率致仕敕具官某爾以拳勇自奮擢置仕聮體力未衰遽辭祿秩惟其知退之果宜有優遷之恩儲率榮資鄉閭歸佚膺兹褒渥遂爾素懷可應天府進士陳宗望永寧軍明法劉堯可並逐州軍助教敕某今夫布衣韋帶之士挾藝文而遊場屋至老而無所成名是亦可矜矣屬逄三嵗之舉特推一命之恩用慰晚年足勸學者可制置三司條例司奏潭州湘隂縣鄉貢進士李度可將仕郎潭州長史敕某朕念夫服田疇之民多水旱之患嘗詔執事勸人興功爾為鄉儒有志於是倡率閭里繕完隄防卒化汙萊遂為膏壤覽使者之言狀命州佐以起家祇服殊恩更思來效可軍員換諸司使副及崇班承制敕某人等夫入奉宿衛出為廷臣蓋勇爵之甚髙實公朝之愼選爾等擢于武旅號有材謀亦既程其器能是用升于仕綴寖服褒華之渥當懷奮勵之誠往圖後勤無怠素志可軍都指揮使諸班都虞候與除忠佐帶遙郡不帶遙郡敕某人等軍師之長是皆材武之倫進退之間固有甄優之比第其功次霈以寵章爾等典領和門周旋嵗序宜易輿行之領往參軒陛之聮尚體恩榮無忘忠藎可軍都指揮使諸班都虞候與轉軍分帶遙郡或巳有遙郡敕某人等師旅命帥所以壯營衛之嚴班爵有差所以示功庸之勸惟其遷次是曰寵甄爾等咸負壯圖久宣忠力才勞並茂賞擢兼優進加等級之榮無替夙宵之效可廂都指揮使與落權正任敕某人等夫武力之士內則為王之爪牙外則當國之藩衛雖序進之惟舊亦校勞而後遷爾等早以拳勇之名擢于拱扈之列備彰器幹善戢軍和積于嵗勤應我勳典或進兵團之貴或分使竹之權兹謂殊榮勿忘報稱可廂都指揮使敕某人等夫立乎三軍之中使士卒服習必自拊循之有素然後部勒之得宜用次以遷抑惟舊典爾等在事纍久服勞可嘉式求壯籍之良遞進連營之領往膺茂渥無怠後勤可蕃官慶州荔原堡左惟窯族孟怡大順城下骨咩族屈嵬蕃官慶州柔逺寨栁橋寨屈你可並元本族軍副主敕具官某生長邉陲服習風化裔俗推其拳勇帥路稱其材資宜推柔逺之恩擢視通班之列仍加軍領俾率土豪祇膺寵章益念忠報可蘇魏公文集卷三十三
