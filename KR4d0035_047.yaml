body:
  text: 蘇魏公文集卷四十七宋蘇頌撰表普寧郡王謝哲宗皇帝加恩表伏以禮行太室普饗帝親之尊命降外朝大封文武之列顧惟稚弱均荷寵光拜祝踰涯以榮為懼中謝竊以祭祀者有國之大事得其道則神靈歆爵祿者厲世之至權當其功則士民勸厲逢陽館之蕆事爰逮端門之布常天表之應以善祥王言之出為大號凡百在位皆從享禋自匪有勞敢冒優渥伏念臣生非殊禀材謝夙成幸分慶於仙源早疏榮於節制假王封而述職曽未造朝望齊輅之親祠莫陪奉祼祗聼告庭之訓首膺加地之文賁錫過優固辭莫獲恭承典冊如蹈氷淵此蓋伏遇皇帝陛下懷欽翼以事天克寬仁而濟物爰推忠澤廣布神休宗室近親獨愧誤恩之厚居家樂善願遵諄誨之言仰答鴻慈不渝斯志謝皇太后表伏以修講上儀推行惠述不間弱齡之陋亟蒙大澤之均辭寵莫遑拜嘉增惕中謝竊有祭以惠下之義欲貴賤之悉周爵有等功之名顧重輕而必當矧合宫之大報紆清蹕之親行自王公洎于庶官有來而相祀雖宗室之霑一命亦莫不在庭兹䝉渙汗之加是謂承神之貺如臣者以至親受爵以在傅矌官荷鞠育於深宫獲奉承於慈誨方羣后肆覲既虧輯瑞之儀洎四海駿奔亦阻奉璋之禮而乃上同將相並進土田雖朝廷尚親許其尸祿而幼冲加命徒用厚顔此蓋伏遇皇太后殿下盛德在躬至仁及物愛憐諸子皆均一於仁慈推贊鴻思欲溥施於上下始慙菲質莫稱褒華但勤篤於進修冀不辜於誨育謝皇太妃箋皇太妃宫閣淑哲迪躬慈祥成德養殫四海方昭聖孝之隆朝事兩宫益厚教風之首愛均稚弱恩錫光榮敢忘志意之修上副奬提之訓祁國公謝哲宗皇帝加恩表伏以講三歲之親祠導迎景貺春五宗之近屬均錫龎釐惟是童䝉何勝寵渥中謝竊以宗祀而配上帝所以昭文考之功大賚而富善人所以法周家之訓汔崇盛典兹謂矌儀劔佩列乎羣賢梯航來乎萬國既得天人之祐遂頒雨露之恩推惠甚優非賢罔預伏念臣年方在齓學未知方但循帨礪之勤阻奉圭璋之助真封廣賦荷加錫于原田需牘再辭終難回于渙汗此蓋伏遇皇帝陛下德侔健順恩被邇遐祭則受福于神靈仁而敦睦於宗族勳賢並建固慙屏翰之良寵祿已盈更荷雲天之澤云何報稱乃副敦褒惟遵保傅之儀仰答君親之賜謝皇太后表伏以祭澤疏恩孚號肆覃於海宇國藩增賦徽章不間於稚蒙拜貺殊優儀年豈稱中謝竊以開國之制周人分列於五侯實封之名唐室等差於千戶逮今賦祿視爵加田每緣慶賜之行遂有陪敦之數雖云並逮於親戚亦將表顯於勳賢恩典所加官儀尤重伏念臣才微質薄屬近地親粵自勝衣即叨賜命衛昭晉穆已同啓于廟封沛易楚詩尚未從於師訓更被餕神之惠泛增多邑之榮匪以職勞坐䝉國寵此蓋伏遇皇太后殿下睿慈博愛聖度兼容親賢而憐無能式彰毋道有澤則惠及下深助政經致兹誤恩曲加蕞陋敢不勤修志意靡怠晨昏冀少長之有成思靖共而守位謝皇太妃箋皇太妃宫閣儀刑宫壼愛篤王家因大祀之熙成贊鴻休之溥博載循愚薄之禀何預肅雍之陪例沐寵光自慙忝冒惟勤修於四術期少稱於萬分大寧郡王冬節賀哲宗皇帝表伏以周人建子以為正得天之統唐室稱觴而上夀如日之升會聖旦之迎長協陽元之萃祉中賀伏惟皇帝陛下繼承祖烈熙緝治功體堯舜之性仁恩漸有截法禹湯之論略道契何言四氣均和百嘉茂嚮臣聨榮帝胄託屬天倫來復届辰共慶光亨之運童䝉寡職敢忘善禱之心賀太皇太后表伏以一陽來復爻升君子之亨至信在中首重太元之本維時純祐允集清躬中賀伏惟太皇太后陛下厚德有容至仁能愛宅尊南面繼思齊之徽音協治泰辰成保定之大業茂迎榖旦擁佑丕圖臣越在幼齡叨承愛育允兹逢吉仰二聖之重光願言揚休祈萬年之永祿賀皇太后表伏以孳萌於子首六律以為陽運化至無當七日之來復惟天地之大德合春秋之一元中賀伏惟皇太后殿下子佐帝尊母儀邦教躬服浣濯德茂周南之風情存謙虛道邁建初之治天正協吉國祉同休臣生長九重愛均諸子竊慶履長之旦輒紓獻夀之誠賀皇太妃箋伏以灰飛緹室應嶰律之陽生表正侯臺驗周圭之景至與時茂對同國安榮中賀伏惟皇太妃宫閣德緼徽柔化存恭儉儀刑嬪婦居忘修德之勞輔佐宫朝深念進賢之志踐迎長日永續修齡某屬預天枝親聨子行荷愛憐而均厚祝休祉以惟勤咸寧郡王冬節賀哲宗皇帝表伏以日在北陸晷景至而萬福生斗行右旋天運周而四時正允屬光華之旦導迎泰定之祥中賀伏惟皇帝陛下睿德淵冲聖謨日就堯仁舜孝協至治於典墳夏質周文繼成功於禮樂丕承天序鞏固邦圖臣幼學未通嘉辰預慶獻履祥之頌雖略於舊儀贊鼎䇿之祥竚符於皇世賀太皇太后表伏以六律正時黃鍾生於仲吕三微治歷卦氣起於中孚適丁來復之辰仰贊無為之治中賀伏惟太皇太后陛下母愛萬方君臨四表乾健坤順措國本於始安雷動風行運神功於語默履兹榖旦嚮彼多祥臣託質宗枝承華宫禁奉觴上夀仰陪亜嵗之儀候景延暉願續履長之慶賀皇太后表伏以魯臺書物時當南至之辰漢琯飛灰侯應陽生之旦朝儀亜嵗人慶履長中賀伏惟皇太后殿下婦順宫朝母儀寰宇勞心曲體藹然東觀之風求賢審官志在周南之化嘉辰集祉盛德咸宜臣幼未有知恩叨加命內切報親之念䖍傾祝算之誠賀皇太妃箋伏以合璧連珠驗初躔於天部撞鍾擊磬動和氣於人聲敻古以還兹辰為重中賀伏惟皇太妃宫閣位尊啓母慶襲堯門膺萬乘之承顔允隆孝治致九州之奉養克協親尊方庶物之含生宜萬靈之來相某聨榮子屬服寵藩封內深荷德之誠敢效祝年之請普寧郡王冬節賀哲宗皇帝表伏以雲物傋書占有年之嘉瑞鼓鐘在列謹亜歲之盛儀羣生丕冒於至和率土同傾於善禱中賀恭惟皇帝陛下順天育物稽古守文日就月將益懋緝熙之學陽舒陰慘不渝消長之期動靜得時福釐來舍臣分輝棣萼託庇宸居神策效祥實契聖人之夀祥風應律請宣太史之書賀太皇太后表伏以天施復於子冠三統以紀元日景正乎南驗四時之協序升平盛際遐邇傾心中賀伏惟太皇太后陛下德應直方施侔博厚臨朝端拱大凝帝載之熙措國居安坐視天民之阜一陽來復百順攸宜臣託蔭慈仁承顔左右物成歲美遘時運之惟新地久天長祝睿齡之共永賀皇太后表伏以清臺課歷考星度於珠躔緹室飛葭侯陽萌於玉琯繁禧所届善祝攸同中賀恭惟皇太后殿下柔順積中憂勤宅志內修陰教不忘驚戒之誠上正母儀思繼齊莊之德書雲納祉視履加祥臣夙荷親憐方間簡諒幸遘踐長之慶願增有永之年賀皇太妃箋伏以荔出藝生兆新元之化育日中表正迎愛景之舒長國有盛儀時為令節中賀恭惟皇太妃宫閣躬循圖史德茂芝蘭位號愈尊居念滿盈之戒綺紈弗御志有節儉之風方物産之孳萌宜福基之隆厚某幸聨子育託愛親慈敢因稱慶之辰更祝惟新之祉祁國公冬節賀哲宗皇帝表伏以堯庭觀象南面視昴星之中漢立建正太初當甲子之朔一元肇始四海蒙休中賀恭惟皇帝陛下清明在躬中正履位進德修業志常念于及時誠意正心化以推於治國彛倫攸敘萬夀無疆臣席慶本支叨榮爵土願言遐福等岡陵山阜之崇竊聼賡歌贊元首股肱之喜賀太皇太后表伏以天運日南周謹占氣之傋君人道長漢隆賈至之儀聲教所同邇遐無外中賀恭惟太皇太后陛下誠明盡性睿知有臨淵默九重坐格無為之化梯航萬國咸歸至治之朝陰陽調和天地輔相臣叨居親息獲侍慈闈撞黃鍾之宫莫逮八能之士獻瑶池之體願延萬夀之期賀皇太后表伏以緹室飛灰驗元陽之應律觀臺書物占黃祲之為祥海寓均和宫闈同慶中賀恭惟皇太后殿下徽柔迪德恭順存誠形閫內之教風躬先節儉享天下之至養居極尊崇元和肇新戬榖是荷臣承華帝系託質皇幃願乘來復之亨益介無疆之祉賀皇太妃箋伏以日晷極南辨五雲之瑞應斗繩維北兆萬物之豐盈降福孔多由中及外中賀恭惟皇太妃宫閣處躬淑慎履德柔謙慈孝兩全母道隆於萬乘寵榮兼至婦儀著于兩宫肇履陽元茂膺祉福某質惟䝉稚躬託愛憐敢傾善祝之誠願介延洪之祚大寧郡王年節賀哲宗皇帝表伏以春朝上日精歲首時法駕臨朝受四海之圖籍大庭肆會設九賔之句臚中賀伏惟皇帝陛下受命昊穹儲神昭矌為政以德體宸極之居中守位曰仁順陽和之布令斂時純嘏允集清躬臣越在稚齡叨塵名數三階有籍莫陪鴛鷺之行萬夀無疆敢效岡陵之祝賀太皇太后表伏以行夏之時斗漸建寅之位立春之日帝臨乘震之司若聖御天以人為統中賀伏惟太皇太后陛下至仁漙博厚德直方獨觀萬化之原體乾之行健廣開衆正之路協泰之彚征肇履三陽丕膺萬夀臣越繇童孺寵拜官封方元朔之受朝阻陪上列望宸闈而獻祝但罄精𠂻賀皇太后表伏以律中太簇授時允協於人正歲在敦牂居位適符於火德慶叢元朔禮傋宸庭中賀伏惟皇太后殿下坤德靜專母儀慈愛自家刑國廣治世之教風求賢審官佐東朝之德化春陽納祉邦祚延休臣年始佩觽榮叨昨土望九儀之列未遂昕趍奉萬年之觴徒傾善頌賀皇太妃箋伏以履端舉正頒歷象以授人開歲發春布陽和之育物禮褾上日朝舉多儀中賀伏惟皇太妃宫閣柔順積中仁恩逮下奉兩宫之佐餕克謙婦儀膺萬乘之承顔益隆母道夀祺肇啓天胙丕延某稚齒無知宸居託愛早受封於茅土尚阻朝趨將獻夀於椒花徒深懇至咸寧郡王年節賀哲宗皇帝表伏以履端于始肇開獻歲之祥維春之祺增茂自天之貺紀為令節式舉多儀中賀恭惟皇帝陛下遹駿有聲孝思維則對時育物動植咸遂於生成體仁長人遐邇實均于富庶順承榖旦翕受叢禧臣力僅勝衣心勤獻祝慶從日益朔復朔以無窮德與時升新又新而彌著賀太皇太后表伏以大鈞播物幹一氣以會于元治歷明時繫萬事而正其始新陽溥洽介福維多中賀恭惟太皇太后陛下其仁如天以儉率下廣鴻休于堯緒數法惟時佑駿德於湯孫世年罙永肇履三微之始布宣四氣之和臣屬忝宗親齒猶稚弱觴稱廣殿阻陪臚句之儀夀祝南山更續岡陵之福賀皇太后表伏以椒花獻頌前占繁衍之祥柏葉稱觴共祝延長之慶勸心交集協氣時乘中賀恭惟皇太后殿下翼夏贊商超任邈姒恩由義制戚里無過盛之權孝與時兼帝躬歸保佑之德春陽兹始天祉惟新臣藐在幼齡仰依鴻訓內竊逢辰之幸敢傾獻壽之誠賀皇太妃箋伏以玩占於易交當乾卦之九三推歷於書氣應林鍾之益一福祥所介禁掖攸先中賀恭惟皇太妃宫閣德協靜專心循恭儉宫庭風偃化蓋自於躬行帝德日躋功實均於母愛履端兹始戩榖是膺某方在稚齡早依慈蔭仰祝綿長之慶冀酬覆育之恩普寧王年節賀哲宗皇帝表伏以計羣吏之功能若稽於戴禮受四海之圖籍嗣講於漢儀神人協和福祚曼衍中賀恭惟皇帝陛下智勇天錫光輝日新誠致中和民洽好生之德道先敦朴世陶遷善之風品物同榮慶釐並集臣忝聨棣萼託芘宗藩敢殫傾日之誠仰祝後天之算賀太皇太后表伏以春秋謹始之義正次於王大昜生物之原帝出乎震三陽交泰萬壽攸同中賀恭惟太皇太后陛下禀睿哲之姿躬儉慈之寶擁佑元聖馴致太平之功奄宅多方已臻富庶之教對時元吉納祉無疆臣襲慶宗支叨榮屏翰荷皇慈之鞠育祈天祚之延洪賀皇太后表伏以吕令布和逮兆民而施惠漢宫講禮來萬國之貢珍允屬熙辰翕臻純嘏中賀恭惟皇太后殿下道光聖治性迎溫恭儼然象服之儀禮繇德稱訓彼女圖之事功以時修順履端元茂迎釐祚臣生蒙愛育幼被寵榮願傾葵藿之心冀續岡陵之壽賀皇太妃箋伏以獻椒花之頌式重於三正陳白獸之樽方成於九醖著為令序允格遐休中賀恭惟皇太妃宫閣履德徽柔秉心淑慎躬先几御倡陰教以踐修上應四星煥紫垣之明潤履新之慶界祉維繁某年在稚蒙恩承鞠育仰祝綿長之算倍傾懇至之誠祁國公年節賀哲宗皇帝表伏以奉元養物肇更正嵗之端執規司春首運東神之化對時欽若介福紛然中賀恭惟皇帝陛下承丕顯之謨受穆清之命道格於上下率華裔以同風功軼於古今與皇王而共貫順履三陽之始茂迎六氣之和臣識昧知方心勤祝聖輝光其德與歲律以俱新億萬斯年配乾行而彌久賀太皇太后表伏以帝乘震位開春序之元朝斗建寅初首人正之朔旦歡盈朝野慶集震闈中賀恭惟太皇太后陛下躬淑聖之資宅休明之運體乾坤而御世四海來同建氣物以乘時五韙咸傋坐視璿璣之運順迎玉燭之和臣預列宗支方居同稚式歌且舞願傾祝聖之心俾夀而臧永對自天之貺賀皇太后表伏以天時潛運日當一氣之元人統更新禮重四時之首順乘令序交舉歡儀中賀恭惟皇太后殿下德盛俔天功深應地關睢化下增隆周道之光長樂居尊崇傋漢儀之奉維時初吉受祉時多臣日侍寢門親承聖訓茂對三微之始仰祈萬夀之延賀皇太妃箋伏以人統得四時之正歷建夏家春朝受萬國之珍禮崇漢世逖稽舊典傋著慶儀中賀恭惟皇太妃宫閣德耀中洲功光彤管儀刑自內居帝嚳四妃之尊均一為心得文王十子之慶荷天之寵受祉爰多某榮預宗藩日親宫壼祝春祺而參會與天序以俱新蘇魏公文集卷四十七
