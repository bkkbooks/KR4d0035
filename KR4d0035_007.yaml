body:
  text: 蘇魏公文集卷七宋蘇頌撰律詩送沈學士守毗陵使君四十五專城新向鴻都得請行高閣和鉛人暫去秋郊驅弩吏趨迎蘭陵郡邑今尤盛陽羡溪山古有名賦政優游多樂事東園應不負飛觥送李留後赴鎮天平出擁朱轓就鎮雄須句封國濟亭東干旄光動奎躔外閫節權并魯分中兩綬鵰鷹紋異繡半符魚虎佩兼銅朝廷慎重惟良選定有能聲愜帝衷送朱屯田赴辟成都贊條初罷浙江回辟命還從蜀道來朱紱聊光新幕府烏星重照舊行臺秋登危棧烟霄界曉望通闤錦繡堆樂職定應能賦頌知君堪繼子淵才府公端明嘗鎮餘杭復之時巳在上幕今再登舊府實為盛事送黃從政宰晉江泉山南望海之濱家樂文儒里富仁弦誦多于鄒魯俗綺羅不减蜀吳春懷章近輟樞廷傑製錦重紆學館人豈獨光榮生邑里須知美化浹甌閩送李屯田子震赴宛丘簽判交游情分十年餘從宦差池後㑹疏逺塞新歸饒意氣長年相遇倍勤渠登朝蚤臥郎官帳入幕還陪丞相車咫尺淮陽曹事簡郵筒莫遣少音書道元上人纍示禪偈詩筆并諸賢賡唱見索鄙作因成短句奉酬釋子南宗秀囊文數見過燈分壁觀後詩學寶書多摘句心游刃談空辨注河儒林盛推挹風勢張雲柯次韻宋次道學士重過禮院齊居永日坐重簾共嘆清才久滯淹詩格轉精緣大手風情不薄早斑髯曲臺論議于今美東觀翻讎載世兼孤學尸官猶有賴繄君餘潤逺相霑判祕閣何龍圖赴職燕集諸公同賦詩以紀出入之盛一去鴻都嵗始旬職更河澳與言綸出為戎閫蕃宣守歸作儒林典頌人寓直重遊唐麗正翻書還上漢麒麟參陪樽俎俱時彥獨愧非才踵後陳送職方赴天彭曉鼓頻趨宣政朝左符還領郡封遙三春車馬踰卭阪千里帷裳布漢條蚤接朋僚情欵欵舊傳詞筆氣飄飄西南留滯應非久可奈離襟重黯消和丁御史出郊雩祀夕雨初霽雩帝臨初孟涓辰用吉辛肄儀慙陋學司直接名臣出從籠街馭時觀避路人雨餘鮮野服雲霽變魚鱗觚陛牲匏潔公卿冕佩轃共期嚴薦享上副聖心純和楊直講寒食感懷永日輕風起暝隂傷春情緒苦難禁流連節物遊人意悵惜時光志士心桃李新芳添逺思龍蛇遺事感悲吟知君退直饒歡趣每向尊前賞奏音又和春日對酒倦遊城闕秖疏慵偏愛君家好事風後院按歌聲不歇雕章得句曲方終歡來趨向諸緣息醉裏情懷萬慮空誰道廣文官獨冷未曽虛度一春中再和朱門羅綺競珊珊未必儒官偏少歡隨分管絃娛性尚等閒唱詠過暄寒幽人棲遁心非適夸者經營席靡安一絓利名均是徇能遺斯事更為難送韓玉汝太博出守洋州州封繁㑹逼梁嶓繼世為藩盛事多遺德在人棠蔽芾舊遊經眼樹婆娑春生劒外壺漿隘花滿褒中駟馬過父老逢迎應善祝緇衣將入鄭風歌送集賢趙少卿出守淝州行色光輝水國春龍函畫弩莵分銀瀛洲舊侣還揮袂淮甸諸侯半望塵兼按一路甲兵三品新緺垂若若兩朱華轂去轔轔誰言貴仕猶榮滯二紀儒林最舊人送若訥上人歸衢州應供何來此囊書謁紫宸清閒頻賜對止觀久談真懇謝蘭袍寵恩頒寶字新重還鄉寺日學侣益歸親和林喬年學士高閣清寒夜未暝獨持鉛筆校中經燈殘短檠人初靜月上虛廊户不扄倚蓋星河簷際直玉晨鐘磬枕邉聽歸來欲記通宵景恍若曽遊上帝庭館西迎駕起居一梢鳴蹕啓重關廣殿傳呼趣就班瑞日初臨黃蓋外紫雲先繞翠裘間和鸞音裏趨翔過錦繡圍中拜舞還共詫書林清近地彤墀咫尺對天顔送邵裔員外尉長洲洞庭山側第新成門對湖隂水鑑明紫綬使君還政日綵衣仙尉拜官榮丘園自適親心樂桴鼓稀鳴吏局清退食不妨晨夕養人生從宦此難并和李子儀學士上元傾都繁盛數宵中知是鈞天第幾重岧闕開筵紆警蹕綵山張樂戲魚龍月華高下隨燈麗春色融和入酒濃擬逐勝遊行樂去長年于事亦無悰送襄州李觀察半符雙節鎮關東漢沔從來地望雄帕首諸侯趨道左題襟羣彥寄邦中江魴鱠玉飱盤貴霜橘堆金燕豆豐心厭紛華欣吏職當時朝議寵民功送僧務靜還吳琴詩清絶事靜也兩兼能技有知音許名因國士稱館閣諸君皆有詩贈故山何日别歸舫待春乘却遂林泉適絃歌結舊朋送都官辛七丈赴治江夏官栁春來巳可攀使君旌蓋駐江干逺頒明詔恩優渥坐使環封俗阜安西塞山川餘舊迹南樓風月有清歡幕中才雅今應盛暇日追遊興未闌送薛宗孺通理并州河東望族衣冠盛漢署潛郎閥閲優久擅才名宜治劇又分朝寄去監州民風近古藩房肅邊候無塵戍役休元帥正求賢者佐得君應喜助咨謀寄題宗室世澤太博修性齊人情安逸或驕惛君子操修有本原結宇近同閒燕處題顔深警聖賢言游心最樂羣書富寓目無窮百卉繁治世右文風教洽彬彬儒雅遍宗藩送唐安虞部趙侯朱紱郎官領要藩西南勝處蜀江源若非閥閲才資美豈稱朝廷選任恩路近烟霄經棧險山如錦繡見花繁郡民舊染文翁化禮教風流尚可論送石舍人得告還蜀寤寐家山謁告還錦衣駟馬路人觀逢迎喜識詞臣貴行役誰言蜀道難江上田桑應不改里中牛酒欲交歡岷峨信美毋多戀盛典方資大手刋公近被詔總領編修禮書又送石舍人豫告西還上寵優輝華行李照亭郵內朝簪橐虛嚴直故國山川想舊遊一去秋光連棧道及歸春色動皇州眼看景物皆清絶定有佳章到處留送達夫同年殿丞宰吳江嘗誇吳㑹土風嘉新領銅章一水涯豈為江山逰賞勝只貪晨夕㫖甘奢魚登盤俎霜縈縷蘋滿洲汀雪吐花舊令多才君繼美松陵賡唱未應賖送李屯田倅丹陽西津秋晚度歸艎新領監州建禮郎蚤伏能名動江左重聞謡詠入朱方部中句曲三茅阜境上吳門二陸鄉官近仙都家在望錦衣此日倍輝光楊君寵示嘉篇次韻奉和江湖一别嵗經旬攜手重遊上苑春華髮滿頭猶未仕少年得意果何人利名機淺貧奚恤道義交深老益親清世懷文終有用窮途寧久困無津送冀州向團練河外諸藩衛帝居美君家世領魚書舊傳將略名尤重却過親庭慶有餘使節頻煩民未息邊庭清晏候仍虛惟宣聖主威懷德長使天聲布斗墟送儀州李太保丈持節出西闉腰章入舊秦家傳虎韜術朝有象賢人閣閉關山月帷褰渭水春虜塵今向息正是雅歌辰同吕縉叔諸君寄懷希用師方袍為佛者學術以儒兼跡慕山林逸心從典籍潛白雲中寄趣浮世外安恬遐想觀書室焚香正下簾送祖擇之少卿學士出疆四方專對昔難人今輟文章侍從臣萬里光華宣使指百年恩信浹殊鄰出關飛蓋塵生路度漠輕車雪擁輪少别書林還隔嵗歸來期宴曲江春送王廣淵司門出守絳州仕宦人言為郡樂名藩古有絳臺雄居園幽絶刻樊記分國盛强歌晉風厯覽勝遊千騎上坐頒仁政兩河中當年誰似高門慶五守同時閒望隆送句都官倅建陽玉嶺名都古越疆監州今用上臺郎溪山絶勝神仙宅絃誦相聞禮義鄉龍焙槍旗爭早晚刺桐花葉候災穰朝廷恤逺頻頒詔更倚賢能慰一方送句湛太博通守汝隂天漢南通潁水清新恩監郡赴官榮數舟旗鼓家人喜兩岸壺漿父老迎暫試吏能收治績蚤聞時譽伏朝纓十年京國同遊者何日如君補外行和陳和叔秋寒夕雨初開霽晨霜已結寒增裘肌怯重對酒面生丹急節驚收潦歸心念採蘭昕趨更清栗委佩綴公桓又和蔡子直官局誠俱冷交盟信不寒風霜兩鬢白冰蘖一心丹未剖方州竹猶薰畫省蘭北宫陪論定應似漢丁桓章帝詔丁鴻與桓郁等于白虎觀論定五經同異又自和一入石渠署八逢霜樹寒任譏書尚白不廢研磨丹騎省愁看鬢騷人興佩蘭壯年幾已過遊樂謝曹桓即席分得秋字送張吉老學士移使京西賜對中楹喜暫留駐旌聊復到蓬丘朋遊少别三周嵗尊酒相逢半白頭頻拜恩光龍鑄節屢宣風力隼橫秋二邦已見澄清效更盡寬平緩主憂和陳彥升學士九月校書懷舊之作京國重陽冊府家正披墳史獵菁華思飄昔日龍山帽阻看殘秋上苑花近罷東園賜宴悵惜嵗華霜染鬢滯留歸思角生車自憐高閣窮年業青簡刋讎未有涯送張中正先生歸廬陵白首師儒學愈專未應褐博慕纓鮮離羣舊友青雲上負笈諸生絳帳前京洛風塵銷客袂江湖春色趂歸船飄然無復羈名纍道信鄉閭足謂賢二月晦日過范景仁舍人留飲聯句分夜而歸聞道星軺稅鞅鞿朋遊相繼欵齊扉正當春霽園英富况值時清諫疏稀共喜開顔論雅舊須留持酒玩芳菲屬酬新句尤歡縱不限嚴更未許歸和宣甫叔讀白傅丁相詩集二公清尚固難偕遷謫襟懷亦洞開得志已觀邪與正寓言寧校福兼災恬然委順誠高識展矣文華信雅才珍重佳篇堪繼美詠歌中遣待時來次韻和丹陽裴如晦學士寄示與蔡子直陳述古唱酬五萹登瀛忝繼唐詞客補郡仍陪漢望郎政事將何攀邵杜聲名空貴躡王楊三賢領劇緣才選拙者求閒屬倦飛幸得汝陰當僻左無能尸祿衆應譏二篇自記得繼三君之出處紞鼓吳門徹曙開郡人還喜鄧侯來政成嵗稔庭無訟誰伴南園舉宴杯上子直當年二邑絃歌洽所幸諸生簦蹻隨此日毗陵流美化風流應似贊皇時李贊皇栖筠治毗陵首建庠序自此嵗貢孝秀為得人今述古臨郡亦留意學校故以此議上述古惠愛昔曽留二浙能聲行復表三河更傳騷雅聯編富可是江山助思多上如晦次韻刁景純學士將至郡見寄偃伏聲名三十年當時倫輩有誰前曽隨貢籍逢標鑒更向詞林接俊躔上館久違牽夢寐歸舟將至想神仙襟懷曠達應如舊遲對清尊一問焉和梁簽判潁州西湖十三題涵春圃桃李陰陰一水涯因人封殖更繁華湖光凝碧花飄錦春物惟應此地嘉射堂射者如仁求審固美哉成室序朋儔今時賓禮存無幾捨矢猶堪一獻酬碧瀾堂北渚清泠十頃波偶來慿檻意如何且觀秋水䝉莊論休聽滄浪漁父歌野翠堂郊原西與莽蒼連隔岸人家小徑穿滿目風光杳無際栁如山色草如烟西湖椒擇疏源勢不休繞城冰玉湛寒流鳬鷖容與菰蒲亂占得江湖一望秋飛蓋橋朱橋矗矗兩園間湖水平時栁可攀車馬等閒湖上去遊人常踏月中還臨勝閣近郭溪流一衣帶中流鳬嶼小蓬萊西園勝事慿高盡到者踟蹰不忍回清風亭廣寒宫殿誠誇誕消暑樓臺久寂寥未似虛亭面空闊時時清籟濯煩歊擷芳亭春來何處最花繁湖水西頭百畝園無限遊人折紅蘂可憐桃李自無言四望亭高亭春望思無窮千里人煙指顧中比屋如雲濃被野頤頤醇俗樂時豐去思堂丞相臨人以惠和三年鄉校起絃歌至今旌斾曽遊處猶道當時樂事多西溪夾岸垂楊展緑陰倚空庭樹照波心遊人不泛西溪水豈見回環野徑深女郎臺荒臺孤映拂晴霓曽是諸侯築館基一郡人誇最高處年年長作㑹春期蘇魏公文集卷七
