body:
  text: 蘇魏公文集巻二十六宋蘇頌撰内制撫問資政殿學士光禄大夫知定州張璪口宣有勅卿頃避政機出臨邊閫適及嚴凝之序方勤宣布之宜諒協綏康良深睠矚撫問觀文殿學士知潁昌府范純仁口宣有勅卿近辭柄弼出屏圻封鎮綏一方翕受多福特加問勞式慰晤思白溝驛賜大遼賀正旦人使御筵兼𫝊宣撫問口宣有勅卿等聘旃將命修塗方冒於風霜郵館迓賓式燕少勤於行李諒惟安適深副眷懐撫問知河南府李清臣知永興軍韓縝口宣有勅卿輟自近班出分外寄嵗聿云暮職思其憂宜慎節宣以副眷矚撫問陜西轉運使副兼涇原秦鳳熈河蘭岷路縁邊臣寮及賜諸軍特支口宣有勅卿汝等出司外服恪守官經職事少勞嵗寒匪懈更宜慎護副我眷懐相州賜大遼賀興龍節使副御筵口宣有勅卿等肅將使指嗣講隣歡衝冒風霜暫休傳舎特頒燕衎少勞車徒冬節就驛賜阿里骨進奉人御筵口宣有勅汝等恭修方貢適憩都亭爰臨長至之辰宜集多祥之慶就頒燕禮以示恩私班荆館賜大遼賀興龍節人使到闕御筵口宣有勅卿等使傳斯來都門少止念驅馳於郵置正匽薄於風霜特賜燕肴聊勤徒御班荆館賜大遼賀正旦人使到闕御筵口宣有勅卿等肅將聘禮來慶嵗元眷言行李之勤已及甸圻之近特陳郊勞俾洽歡娯相州賜大遼賀正旦人使回程御筵口宣有勅卿等展幣元正巳終於使事回轅北道再歴於㑹藩燕以示慈行宜少止賜河北西路諸軍春季銀鞋兼傳宣撫問臣寮將校口宣有勅卿汝等封疆之守夙夜在公各效爾勞想無他苦以時賜予示我眷懐賜門下侍郎劉摯辭免恩命不允斷來章批荅口宣有勅卿邦之俊傑仕歴省臺黄闥論思政機委屬亟祗成命以副僉言賜知樞宻院孫固辭免恩命不允斷來章批荅口宣有勅卿樞庭宿望復冠舊班言綍既行允副僉屬宜亟就位毋或堅辭賜新除中書侍郎傅堯俞辭免恩命不允斷來章批荅口宣有勅比圖時望登用雋良副貳西臺預聞大政毋煩多避以副僉諧瀛州賜大遼賀正旦人使回程御筵口宣有勅卿等聘儀既巳方餙于歸鞍春律尚寒載馳於北道少留徒御就錫燕歡賜大遼賀興龍節使副銀䤬鑼等口宣有勅卿等建旜來暨授館云初乃眷寢興之勤特加服器之錫式將禮意用表恩私賜皇伯嗣濮王宗暉以下罷散興龍節道塲香酒果口宣有勅卿宗室近親朝班上列遘丹陵之誕日崇西竺之勝因嘉乃精衷錫兹宴品賜大遼賀興龍節人使辭訖酒果口宣有勅卿等修聘成儀北轅有日言念道塗之邈良多槖載之勞爰即賓郵少陳宴餞班荆館賜大遼賀興龍節人使回程御筵口宣有勅卿等使節遐征聘儀畢奏屬歸驂之戒旦聊供帳以餞行宜即郊亭少留車馭賜宰臣以下罷散興龍節道塲尚書省御筵酒果口宣有勅簪纓昕集共慶誕辰觴豆旅陳式頒宴禮載加醪果之賜用助獻酬之歡玉津園賜大遼賀興龍節人使射弓例物口宣有勅射以觀徳既集賓筵樂且有儀必資器備爰加寵賚用助和興班荆館賜大遼賀興龍節人使回程酒果口宣有勅卿等拭玉成儀回轅戒道屬冒逺衝寒之始備析酲可口之珍聊用頒霑庶昭禮意賜大遼賀興龍節人使内中酒果口宣有勅卿等持節兹來授館既定屬風霜之加凛資飲餌之輔和頒錫有加恩意斯厚賜大遼賀興龍節人使内中酒果口宣有勅使𫝊造朝巳達仁隣之好郵亭茇舎方休車從之勞錫以珍甘助乎燕適興龍節就驛賜阿里骨等進奉人御筵口宣有勅汝等逺持嵗貢慶我誕辰憩郵館以少休造王庭而惟恪特頒宴飲用慰勤勞賜大遼賀興龍節人使回朝辭訖歸驛御筵口宣有勅卿等誕辰展慶巳導於隣歡使傳言歸載頒於燕㑹少延行館冀肅多儀班荆館賜大遼賀正旦人使到闕酒果口宣有勅元正肆㑹隣聘通歡眷使乗之馳郵憩都亭而頓節言頒尊豆少勞車徒賜皇弟普寧郡王似生日禮物口宣有勅卿予之介弟早席王封當載育之令辰有匪頒之寵數膺兹惠渥集乃善祥賜大遼賀正旦人使䤬鑼唾盂盂子錦被褥等口宣有勅卿等逺持聘幣來慶春朝方少憩於都亭宜有資於器服特加頒錫用助寢興皇帝御大慶殿受朝賀畢宣勞將士等口宣有勅朕以元正協吉正宁受朝眷惟拱衛之聨咸預執陳之列亦既竣事宜各番休將士等好在否撫問成都府利州等路臣寮口宣有勅卿汝等分寄藩方思憂職守逮此凝嚴之候想多夙暮之勞宜各安强副我眷委賜大遼賀正旦人使春幡勝口宣有勅青陽司啓芳嵗發春節物惟華風宜所紀特頒使介俾襲時休賜大遼賀正旦使副嵗除日酒果口宣有勅嵗律峥嶸天時凛冽眷使華之授館講聘好以肄儀錫以醴肴少資燕飲正月三日賜大遼賀正旦使副内中酒果口宣有勅春朝協吉隣使講儀既已事於聘珪宜分頒於燕實少安攸館庶協多歡送伴正旦使副沿路與北朝生辰正旦使副相見傳宣撫問口宣有勅卿等聘圭巳事夙駕言歸涉道路之悠長值風霜之匽薄眷惟行役各協康休玉津園賜大遼賀正旦人使射弓例物口宣有勅宴以勞賓射以觀徳既嘉弓矢之審固宜有器服之匪頒豈特旌能亦將成禮正旦日賜大遼賀正旦人使酒果口宣有勅卿等慶臨元朔使講隣歡既夙退於館垣特分頒於醴實况兹寒栗少助燕休雄州賜大遼賀正旦人使回程御筵口宣有勅卿等使事既畢歸轅巳遥將馳度於𤓰亭宜少留於星節特頒燕飲用慰道塗正月六日賜大遼賀正旦人使朝辭訖歸驛御筵口宣有勅卿等拭圭展幣巳畢聘儀還軫辦嚴特頒餞禮惟是燕餚之具少勤徒御之行賜大遼賀正旦人使正月一日就驛御筵口宣有勅元正節届鄰聘禮成眷使節之方休即館垣而延竚佳辰共慶樂飲攸宜賜大遼賀正旦使副朝辭酒果口宣有勅卿等鄰聘已修陛辭云畢道途之役方促歸軒樽豆之珍少資飲御班荆館賜大遼賀正旦人使回程御筵口宣有勅卿等三朝之慶巳道隣歡四牡之歸特頒餞禮少延衎樂式示私恩班荆館賜大遼賀正旦人使回程酒果口宣有勅聘儀云畢使馭言歸歴近甸以戒行冒餘寒而涉逺芳醪美實載用頒霑外國書皇帝達太皇太后回大遼皇帝賀坤成節書七月日姪孫大宋皇帝謹致書於叔祖大遼聖文神武全功大畧聰仁睿孝天祐皇帝闕下執炬乘時遘親闈之誕日占書講信欽隣國之彛儀巳恭達於慈顔俾復修於報禮其為感懌未易敷宣今保静軍節度使蕭寅等回專奉書陳謝不宣謹白皇帝回大遼皇帝問候書玉律回秋寳隣修好因乗軺之使介窺溢幅之書詞方履初凉克綏繁祉更祈頥護用協願言皇帝達太皇太后賀大遼皇帝正旦書正月一日姪孫大宋皇帝謹致書於叔祖大遼聖文神武全功大畧聰仁睿孝天祐皇帝闕下履正嵗之元逺修於隣好禀慈闈之訓嗣講於慶儀使指於行幣將其意冀迎福嘏式協願言今差右朝議大夫試右諫議大夫柱國南陽縣開國子食邑五百戸賜紫金魚袋韓正彦供備庫使兼閤門通事舎人上騎都尉金鄉縣開國男食邑三百戸曹㬇充太皇太后正旦國信使副有少禮物具諸别幅專奉書陳賀不宣皇帝賀大遼皇帝正旦書正月之吉繼敦睦於隣歡維春之初庶導迎於壽祉耑馳使介往致幣儀欣祝惟深喻言靡罄皇帝回大遼皇帝賀正旦書正月日姪孫大宋皇帝謹致書於叔祖大遼聖文神武全功大畧聰仁睿孝天祐皇帝闕下嵗更四氣之端禮慶三朝之㑹隣邦講好載馳使乗之華函牘摛辭兼致幣儀之厚緬惟眷睦苐切感欣今長寧軍節度使耶律寛等回專奉書陳謝不宣謹白皇帝達太皇太后回大遼皇帝賀正旦書月正元日嵗祥允集於春朝國寳善隣書問兼陳於慈幄恭因省侍具達音辭感懌之懐言文㒺既皇帝回大遼皇帝賀興龍節書十二月日姪孫大宋皇帝謹致書於叔祖大遼聖文神武全功大畧聰仁睿孝天祐皇帝闕下星回周紀適臨震夙之辰嵗聘講儀繼沐仁鄰之問特紆使指彌厚世歡欣感之深喻言莫究今奉國軍節度使耶律常等回專奉書陳謝不宣謹白皇帝達太皇太后回大遼皇帝問候書誕節届期承逺馳於信使榮函示好兼致問於慈闈尋因省侍之間具達講修之意永言感懌靡逮文陳皇帝賜夏國主進奉賀正馬駝回詔詔夏國主省所差人進奉賀正馬駝共一百頭匹事具悉春朝講禮外服輸忠走專使以來庭縶良蹄而在御風宜所尚嵗貢靡愆省閱之餘嘉歎良厚今回賜銀絹茶等具如别録至可領也其差來人所賜物色亦具賜目故兹詔示想宜知悉春寒比平安好否書指不多及太皇太后賜夏國主進奉賀正馬駝回詔詔夏國主覽所差人進奉賀正馬駝共一百頭匹事具悉眷惟列土之邦世奉勤王之職載臨元朔逺效貢珍羈地産之竒毛實天閑之外廏言觀備物益見輸忠今回賜銀絹茶等具如别録至可領也其差來人所賜物色亦具賜目故兹詔示想宜知悉春寒比平安好否書指不多及賜夏國主厯日詔詔夏國主迎日推策校疎宻於一周欽象授時紀便程於四序眷言侯服作我翰垣爰錫小正之書俾興嗣嵗之務布宣於下共襲其祥今賜卿元祐五年厯日一巻至可領也故兹詔示想宜知悉冬寒比平安好否書指不多及蘇魏公文集巻二十六
