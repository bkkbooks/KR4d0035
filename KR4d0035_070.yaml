body:
  text: 蘇魏公文集巻七十宋蘇頌撰祭文祭濮安㦤王代宋相伏以國家系本仙源慶叢帝祚累聖積厚洪支益繁漢家二等之封並崇爵邑唐室百孫之盛咸萃京師盖上聖敦睦之禮隆故諸侯信厚之風著綿綿流澤永永無窮惟王以方重之資兼粹和之美居家樂善服東平之言好古知書得河間之尚向承繼世之典首膺開國之封位極公侯而無貴倨之失地長邦族而有孝恭之稱對時寵禄而益謙視古賢王而未愧故能保其富貴享是壽康為表儀于宗藩方加異禮掃内外于正寢奄謝明時國邸纒悲宸襟結愴追榮近壤陪𦵏崇陵惟善始與令終非至徳而奚逮某叨聨右府嘗接近班聆祖軸之在行空瞻前紼潔奠壺而薦信兾逹幽泉神鑒不遐丹誠是諒祭王參政嗚呼天以粹氣畀于格人公享其厚積為懿文帝倚羣賢登翊王度公被其用時稱哲輔爰初擢秀冠冒俊良凌厲霄漢羽儀周行書坊紬繹禁複徊翔發于事業見乎詞章謨誥雅畧詔冊昭莊公備體要訓言汪洋筆端膚寸利澤多方臺閣規模朝廷憲綱公所典領咸推練詳奉行故事才宜佐皇進登斗樞遂參時柄悟主以道矢言必正敝去多門朝無倦令天子謂之匪直也令公在廟堂于兹八禩四方宣力百為盡瘁密勿軍國寅亮天地才難善職用未殫志方加寵榮式光大議宜錫難老示登皇器寢疾浹旬訃音遽至宸扆興嗟輦輿出次載念忠良軫傷後事歸賵加等冊追端揆蜜印襚章以告其第恩榮始終是旌遺懿士倫戚嗟相顧隕涕凡我嘗僚舉同反袂清醑載觴肴羞式備薦以哀辭庶感誠意祭楊尚書天以正氣鍾乎賢人公禀其生㧞乎類倫皇鸞儀儀為瑞聖辰金相玉質内勁外温弱齡馳譽富以髙文躐取科甲跬歩青雲帝用嘉之擢于紫宸前視卿相進亦逡廵經綸之志始發復堙萬里之馳半塗而屯遭此大厲孰訊穹旻乃令士林愴失良臣嗚呼哀哉士以文稱或窘于用世豈乏才疇克兼衆觀公之為靡施不中其器無方所利則重鎭亂治煩不撓不縱其在内庭忠言日彰道宣上命德音鏘洋見于事業作為文章訓辭深厚詔冊和莊寸毫尺管利澤四方入爲御史百僚端肅出臨奥藩千里䝉福再尹京都風行輦轂三提計權事著條目簿牒放紛裁處彌速弊源窒除吏手歛縮平居與人侃侃樂易遇事果行正色無避外服來朝欲自矜異扳我官儀徼以殊禮人難其拒公立庭止且謂戎心浸不可啟抗辭無撓卒正朝體人謂公才效于巳試餘刃沛然銛若初礪使其且壽何向不濟今亡矣夫孰不揮涕某䓁嘗以僚契幸茲交從義分之篤心照誠通良友逝矣齎恨何窮緬慕遺徳徒留清風肴觴薄奠聊寄深悰平生不忘魂鑒于衷祭楊侍講嗚呼古之儒者專門明經師學相傳異端不行末流既敝小辯滋萌衆説譊譊講觧縱横孔鄭諸賢古訓是承優入聖域闢其閈閎排斥異議傳注乃興由是㣲言皦如日星後學尊宗視為凖䋲知其説者足以自名懿懿夫子業專志精守經據傳先儒是程通觧六學早擅厥聲由兹仕進躐取紫青僕射宣公時之耆英師友兩朝領袖諸生士㳺其門皆為名卿子以髙第被其薦稱入侍金華講勸西清惟我哲后好古多能清閒訪道眷于老成惟子被遇恪恭壹誠專用師説開悟上明陟降二紀便蕃寵靈陞官瑣闥躋職禁扄朝廷禮待均乎老更稽古之力何謝桓榮天畀五福貴壽康寕為儒始終茲亦鮮并今已矣夫歸于杳冥輤帷即路祖奠載庭言還東國反𦵏故塋凡與嘗僚興言愴情清觴告訣魂兮是聽祭劉丞相嗚呼江漢氣清廬衡地靈孕奇擢秀良才是生公鍾厥美逢時奮榮少也穎㧞性若天成倜儻魁壘稔于人聽挾䇿藝苑來儀帝庭文學髙第名實飛騰其器既利其發必異立朝勁挺不倚不陂施于有政流為慈惠江湖之間民謡吏治帝用嘉之召還近次乃尹京轂撥煩無滯乃貳台鼎預聞朝議中書政本國體攸係任以大柄非賢孰寄公之登庸上尤注意躬當衆責不疚毁訾剛果内持由義而濟委寵出藩亦諧雅志二邦偃息風力彌厲膚體且强歡言自遂如何奄忽頽然長逝嗚呼人生有涯寓形斯世旋復遷流詎非夢寐道信于時乃生之貴神歸其本非殁為累惟公通悟固得于是人情怛化徒懐風義奏訃來上中宸戚傷厚其賵典加以襚章君恩始終拊存念亡瞻彼輤車言經甸疆精爽如在㳺好未忘尊酒盈㫖爼羞令芳至誠是薦魂其迪嘗祭王宫保嗚呼人性之禀異其柔剛或失厥中非愞則强公履其和外温内方行不詭激道無迎將文雅雍容冠映周行歴踐世官無忝前良鉛槧職業勤勞不忘臺閣規撫時推練詳國史善志裁成義例禁林起草乆參嚴秘擅筆削之三長演絲綸之七制登貳公衮預聞政治啟沃嘉謨奉行故事進不矜乎重任退亦安乎閒地洎執憲于中臺復抗論于大議班聨為之􅋏動貴倖從而摧避盖語黙之適宜亦始卒之無媿方告老以歸休遽委順而長逝嗚呼吉人為善實獲于天富貴壽考德優祉全其所痛者不及百年道既行矣夫何憾焉凡我甞僚徒茲愴然聊陳樽簋之薦告訣帷裳之前冥寞可通神其聽旃代宋相祭王宫保夫天下之逹尊者徳爵皇極之享福者壽考是為具美鮮或兼全公以文藝博通行義修潔躋仕華旦則揚歴于臺閣預議大政則練逹乎典章踐履髙危之塗優㳺不競之地惟進退不失其正惟明哲以保其躬出守外藩入侍清燕用之不侈于權利巳之不易于常操盖守道能固自信不疑古稱善人在我無媿至于更仕任之美則掖垣之顯華憲臺之權寄近輔貳公之貴尚書八座之崇並中朝之要津極一時之清選公皆薦居世職克紹前烈曁夫年至傳家請懇納致聖主嘉其止足時論推其恬夷雖不及享期頥之齡遂喬松之志卒以中壽歸全巨室茲可謂善始令終全名無玷者矣某並逰榮路仰止才量痛故人之長逝嘆清風之莫追恭薦菲儀罙傷永訣代杜丞相祭范資政嗟嗟希文于是已乎哲人巳矣孰不悲吁吾失我友天乎祝予福善之報意亦何如我思若人才質美粹識通道廣心和色毅政事文學聖門髙弟蹇蹇匪躬王臣之義克全厥修以輔天子在天聖間猶為小官屬時無事法弛禁寛論䟽利病書聞扆前上察其忠擢寘諫垣國蠧民害造膝極言三黜無愠天下稱賢氐羌負固抗吾王旅召還逺邦更帥西府令肅而壹士豫以附書責戎酋虜氣敗沮果入請和復期其故告厥成功登賛台輔亦既遇時知無不為修明百度更張四維銓度流品經制邉陲事靡不舉政無闕遺始進以勤竭精宣力俄罷而休謂冝偃息忠臣惓惓逺不忘國王事一埤為我心惻寒暑交侵中若結轖東徂不歸大病俄革嗚呼大名罕兼五福難具人得其薄我享其厚仕歴三公不謂不偶年過六十不謂不壽所可惜者居位未乆經濟之謀莫克盡究今亡矣夫餘慶在後某也無似處時寡與辱爲交㳺聲氣相許契闊晩途南北脩阻不意一别乃成今古君䘮在徐我居于宋欲往莫得臨風愴慟言念平生奄忽如夢薄奠寄誠心焉茹痛代張端明祭范資政元間積粹降爲賢智華我王國居然廟器生都顯榮殁有徽諡全斯令名在公無媿公之處躬挺特不羣倜儻大志上干霓雲䇿名從仕英稱動人人皆謂之才宜致君公為文章㩀經守道時務華淫我尚體要論述古今發明世教非苟知之亦思允蹈公為諫官慷慨敢言自下劘上弗屈要權帝用嘉之擢寘禁聨終靡悼害三黜三遷公殿西陲歴更四帥躬提成師瞻威遐裔羌戎卒和請降納質我實尸之時爲長利公登廟堂佐佑聖皇更賛二府弊革維張肅將朝命拊循邉疆務在經逺煖席未遑公之出藩時乃均逸不詘下遷首公如一詔條敷宣民隠勤恤身居江海心存王室公適逢辰且更大用疇不屬之宜夀而寵云胡靡沈摧我時棟人之云亡士倫所痛某早嵗之幸辱公周旋鄉閭相從日接燕閒洎登禁闥甞從内班昨麾武林復踵于賢朋好之篤晩乃益堅議論相直中無間然江干交臂俯仰二年何言此别遂成終天薄祜多難家遭艱釁廬居睢陽咫尺徐鎮聞公之䘮百感交進欲往弔之滯留為恨言念平生聲容未忘設位寢門悲酸盈腸遣使致奠蔬肴絮觴精誠不泯歆此令芳祭呂侍講鼎族華裔載德秉誼慿承慶靈是生俊乂顯允惟君挺竒㧞類亷方閎深華國之器壯志矯矯吉仕登朝考室肯基有服王僚藹乎令聞卓爾孤標頡頏一世凌厲層霄渠閣校文義類有條詞垣演誥德音孔昭進階嚴近出殿藩郡帥鉞抗稜戎穹感信仁風四方歡謡三鎮還尹日畿并䝉河潤亦既罷煩沓承乃眷進讀金華侍㳺清燕臺閣規撫素號詳練旋更典領莫非華選爰彰美才見推諸彦在昔先正佐時積勲勤勞二紀迓衡秉均英聲未泯餘德在人我踵厥武佩荷紫宸天子命之曰惟帝臣時亦稱許當繼相輔璠璵之寳始入天府榱棟之材未陞堂礎康莊方馳崦嵫忽暮彼蒼難問殱良何遽才志弗就命力誰預仁者有後兹言則然允若而家積厚于前一門盛美諸季蟬聮奕葉流光有嗣象賢君子之澤曷窮其源如古所記魯臧漢袁某䓁乆接餘塵幸偕禁籍官或嘗僚情惟莫逆初聞告歸俄痛疾革詎期信次乃異今昔素旌翻翻東去都門哀歌咽歇祖翣愁雲何以致誠挹彼清樽何以洩哀寄乎斯文祭陳侍中代宋相若夫剛方直清上賢之性温恭誠懇君子之行公實得之氣全守正積是具美由孚善慶矯矯勁質來儀聖辰喬梓修榦璠璵粹温爰在初仕藹其令聞逺守一麾抗䟽天閽幄帷大議極陳本元先帝嘉公峭直敢言越從遐陬擢寘諫垣皇上謂公朝之懿臣登輔大政弼于一人顯允先正勤勞王國參預近政時推邦直清風未泯仍世載德至公益大遂冠樞極公卿不慚父子善職公爲大臣體貌嚴粹正色于朝不懈于位進惟主知退無外比兩當鈞衡權任在巳心持公平孰疚毁譽䋲以古人奚求勝彼公之處躬謙謹畏栗言無易由動以禮率萬石謹厚博山慎宻既明且哲克保終吉還政之請不待年至典冊命之三公還第優㳺餘年方諧雅志胡不遐壽頽然遽逝奏訃初上中朝愴悲趣駕臨奠恩加等彛衮衣貂冠命以襚之君臣終始千載一時公塋近郊連岡崔巍築闕道旁再世安兹芻塗即逺龜筮告期徘徊赤車駟馬載馳凢我甞僚永懐清徽音容邈矣興言涕隨薦以清觴靈其格斯祭張宮保文定公嗚呼景德後元協洽紀嵗連珠耀芒鶉火之次鍾秀于人爲時之瑞矧在九秋天晴氣霽月正下絃光連五緯公生是時得天精粹金聲玉質渾然國器岳立淵渟出乎倫類剛則不折柔亦不廢危行危言可止可仕兩䇿賢科簡在仁帝四入内庭晩登三事並嵗諸公孰不隆貴或踐亨衢半途而逝惟公始卒德充福備七紀康寕閒堂遂志一品晏安萬縁泯棄不怛物化考終蟬蛻生禀純靈没全浩氣騎箕入昴孰知所憩文定之名空遺永世藐是孤生早縁素契爰自弱齡獲聞教義提擕成就愛均子弟每侍燕閒兩忘年位名理之談或容難議間闗雖乆音書杳至昔聞公䘮適拘朝綴臨弔無從荷恩有地今叨守藩過公里第言瞻松檟交揮洟涕一觴薦誠百感中萃永懐德音没齒無替又惟公禀德河嶽王者之輔出而逢時道則靡阻初來公車晁董首舉言配乎經行應乎古禁垣黄閤雍容歩武逺猶閎議沛然孰禦公出在外心留帝所惓惓懐忠盡言不顧剛必摧之非柔則茹惟是全德一代之矩矧我先公金石之契臺閣同升道義一致伊昔侍側話言在耳辱登公門垂今四紀出處契闊造請莫繼謂公難老天錫之祉遘疾未㡬孰云不起訃來慟哭我則何巳薄奠致誠尚或鑒此代中書祭秦國公主帝唐之盛女曰娥英爰周郅隆王姬振聲粤我仁祖跨唐軼周温温太主實茂芳猷惟主之賢慈和柔惠其質蘭薰其儀玉粹結愛帝后孝恭天至執勤傅保言容日備徃擇好逑屬在下門恩降下嫁禮視維藩爰開湯沐爵命再頒成此肅雍車服以蕃寵冠三朝義先近戚帝錫之祉光華赫奕云何不淑遘疾斯亟捨此明辰歸于厚穸帝念仁姑曽不永年悲興長樂痛軫慈顔奠䘮制服追愴親賢邇臣督𦵏卜吉新阡肅肅惟裧嚴嚴鹵簿神閨啟銘扉斿即路潔此餚羞奠以清醑菲誠是將明靈斯佇代中書祭唐參政致祭于故參知政事贈兵部尚書唐公之靈惟公禀江漢之粹靈挺荆衡之材秀來儀上國自致青雲在仁宗朝以峻節清規擢踐臺閣登侍禁嚴在英宗朝以重名逺畧入長風憲出臨藩州今天子綜覈功名寤寐賢畯召公方面委職計庭不及一時參輔大政惟其彌綸之藴施設之宜資適逢時而命屈于中壽才可經逺而卷道于半塗公之云亡國之不幸兹所以甞僚之列周行之間靡不茹痛于哲人而齎咨于遺直也命龜協吉輤車云發酹以清觴愴乎永訣祭秦國太夫人粤若人倫之美惟德及齒婦道之榮在夫與子展如夫人備于是矣夫人之生禀質柔明始自華胄歸于名卿宜其室家是鍾慶靈毓我邦傑為時宰衡君臣一徳旦暮千齡夫人之賢辨通明智酒醴澄潔蘋蘩助祭季姜通逹行必由義鄒母善導處亦擇藝閨風嬪則流徽當世夫人之貴圭黻一門子登上台女從大臣衮服承顔副笄寕親晨羞列鼎昏定重茵階庭獻壽婦孫詵詵惟先令君徳履有素命不副才位止郎署君子之澤乃詒厥緒夫人克終享其榮祚朝尊元宰家承異数陪封大國冠班外婦嵗時入覲特隆眷顧壽歴耄期體彌强固委化而終伊神之祜夫人之亡哀戚道旁相君摧瘠天子嗟傷詔加恤典宴輟春觴内嬙視斂王人治䘮旬浹之間弔使相望婦之貴者前誰比方是亦徳茂乃兹流長某等並逰相庭恭承母德教義所敦頌嘆無斁今聞轊車言歸厚穸笳挽盈路羽儀連陌聊停繐帷一奠殽醳至誠是薦神其來格又代執政惟靈以淑質異禀克生良奥之家以懿徳令儀作嬪華顯之室動遵圖史行為楷模蘋蘩事公侯之宫輻軸知將相之事毓我元輔登于上台千載之聖賢相逢一門之忠孝兼備雖民心屬望本王佐之髙才而朝寵載加推母慈之善導是以襲封號者二紀冠嬪班者七年膳羞㫖甘食萬鍾而無慊康寕夀考享五福以斯全方且榮鼎茵之在前祝椿靈之難老極是孝飬樂乎盛辰何生理之有涯遽歸全而委順相君鉅創宸扆驚嗟厚恤而紆詔函臨宴而罷朝㑹内司賔省其歛服大謁者治其𦵏儀恩禮之隆本由乎上眷命婦之貴絶比于當時終始不移哀榮斯極某等備員公府接武相庭早聞積慶之餘竊増嘆企今愴遷神之逺祗益摧傷望祖紼以致誠潔壺觴而為酹芳魂不泯嘉薦是歆祭歐陽少師太夫人彭城郡太夫人之靈挺生徳門作嬪良人閨風閫儀睦于宗婣淑質懿行宜爾子孫恭則順婦賢則慈母鍾慶令子爲時良輔立朝汲直出藩召父躬扶板輿尹兹留都羞飱潔膳昏定晨趨華髪垂堂家人愉愉承顔順色能竭其力曽未百年遽䘮賢徳徽音巳逺孝慕何極太夫人之生既福且榮大郡䟽封再加寵名六紀歸全亦謂遐齡厥日惟吉輤車南出翩彼丹旐挽乎素紼哀動路人慘變朝日某等咸以備員趨府踰年實事令子有惠有恩聞夫人䘮孰不澘然哀意難見敢致薄奠聊寄悲酸非取豐腆靈鑒如存享此誠薦尚享又惟靈夙禀柔儀内藴懿徳歸我良士是生哲人湯沐啟封再被絲綸之寵㫖甘為飬奉承晨夕之歡方享輝榮遽傷殂逝眷留京之諸吏實子舍之嘗僚獲遵尹正之規素欽賢母之範旌車南邁傷永閟于徽音肴醑致恭敢少陳于菲禮芳魂不昧歆此至誠蘇魏公文集巻七十
