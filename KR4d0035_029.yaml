body:
  text: 蘇魏公文集卷二十九宋蘇頌撰外制中書試制詔三道御史中丞除河陽三城節度使制門下中執法之官內以肅正于朝宷十連帥之任外以揔馭于藩方非有浚明之良曷膺柬注之命出為屏翰特竣寵章具官某姿度清夷學緼淵懿至言足以折衆論閎略足以慮四方詳試事為寖觀明效頃擢才于禁侍俾長正于臺端伏奏青蒲動協盡公之義繩違白簡時推司直之風朕方綏御邇遐講求政實文武之道聖賢嘗述于弛張將帥之臣漢世亦求于左右眷盟津之壁壘控朔道之襟喉遂輟謨謀之賢往分節制之重授以戎律殿兹捍城於戲正色立朝爾既得為儒之效出封加等豫方示注意之私論七德宜先于安民長萬夫亦所以觀政祇服休命益圖懋勳可中書舍人除夀州觀察使制勑唐制觀察使統領一道亷案列邦亦古牧伯之任也故大臣出鎮近侍剖符實更處焉其寄重矣近世以來居是職者止視其秩而不綜其治權任雖異而恩數益隆非得周才未嘗輕授具官某學洞幾先慮經世務頃以文章之髙第置諸清切之通班七制坦明良多潤色之美諸儒論議咸服精通之才是用擢自禁塗出分方任畀以夀春之牙節撫于淮右之封疆爾其省觀民風勤求治效副豫重外之寄佇乃宿官之成可誡羣臣舉任必以賢詔勑臯陶之謨于虞曰在知人在安民然則致治之原安民為本欲黎民之安者非得其人而委之治則主澤靡宣欲人材之叙者非選于衆而舉所知則治功莫建聖賢相戒以為至難故前世天子任大臣大臣擇長吏長吏辟屬僚皆所以同寅協恭上下交濟使野無遺逸之歎而朝有明良之詠治之至也朕甚慕焉頃者屢詔中外之臣各舉賢能之士而進任雜遝愚哲混淆將何以副朕寤寐之求為時楨幹之用重敷明訓使諭至懷自今被命荐才當官任使宜各思于公舉且彚别于人流牧民者必擇循良之方將領者務求精敢之類負學者須通于貫變辦事者可試于劇煩果得其人悉宜上達朕將試之以事觀其所長苟器業之可嘉亦甄褒之何吝倘靡諧于公議則具有于憲章昔鄼侯成功鄂秋被進封之賞陳湯獲罪張勃蒙既死之誅治古若斯前規可監咨爾有位勿忘盡公皇族出官勑詞牒奉勑自我祖宗惇叙邦族大則疏封于爵土次則通籍于閨臺並留京師參奉朝請然而世緒寖逺皇枝益蕃屬有親踈則恩有隆殺才有賢否則祿有重輕今而一貫于周行是亦奚分于流别雖睦姻之道誠廣而德施之義未周故廷臣數言宰司繼請謂宜定正限以等彛朕惟親戚之間經史有訓漢唐之世典故具存或以九族辨尊卑或以五宗紀逺近或聽推恩而分子弟或許自試而效才能或宗子之賢得從科舉或諸王之女自主婚姻盡前世之所行顧當今之未備况我朝制作動法先王豈宗室等差乃無定著因俾羣公之合議將為一代之通規載攬奏封具陳條目以謂祖宗昭穆宜從世世之封王公子孫抑有親親之殺若乃服屬之既竭洎于才藝之並優在隨器以甄揚使當官而勉懋至于任子之令通婚之儀凡曰有司之常一用外官之法僉言既允朕意何疑告于將來遂頒明命噫自義率祖既殊升降之文因時制宜斯盡變通之利咨爾宗盟之衆固多博識之倫奉承新書當體朕意翰林侍讀學士尚書禮部侍郎集賢殿修撰范鎮可依前官充翰林學士勑學士職親地顯非他官之擬倫內則承宥命之權輿外則預清閒之訪問向非明于國家之體與夫老于文學之流疇克周旋副我優待以爾具官某識通器逺內徑外和擢于儒林置在禁序書命西掖則辭訓已孚視草北門則論思有助間嘗試以政事故使治于輔藩能平易而近民賦中和而樂職不待滿嵗召還近班眷久侍于經闈且垂成于廟史衆譽厥善朕嘉乃勤復咨鴻藻之華再入內庭之直夫惟號令之愼出獻納之資忠言成筆端澤布天下兹儒者之榮遇皆爾鎮之踐更益告猷為用符眷倚可觀文殿學士吏部尚書趙槩可太子少師致仕勑夫起儒者而仕公卿享髙年而歸印綬功名寵祿輝焕于一時好德康寧幾備于五福非夫吉履素茂聞望特隆克全始終蓋亦鮮矣以爾具官某躬秉一德用兼數器文章增典冊之美事業本經綸之才在仁祖英考之朝已推宿哲預機庭宰軸之議屢告嘉謨逮豫纂承實輔初政方仰成而尊禮俄委柄而願閒作屏東州甫就燕林之適為時大老尚期咨度之來而纍章引年抗志彌篤倘諉以事豈曰優賢東儲六傅之班上臺三公之亞俾歸榮于里第且遂志于養頥彌嗇太和益嚮遐夀兹朕所以勤勤于卿而不忘也可侍御史張紀可司封員外郎勑具官某御史紀綱之任治書謂之憲端南宫清要之司左曹號為華選惟是踐更之美實均出入之資以爾擢自文科屢登郡縣之最拔于逺守俾幹賦財之煩朕嘉其納忠置于言地自參持于臺務能振整于事綱方幅屢聞直繩無隱屬議言之應陟加閲實之既優移進望郎之華且聮主爵之副宜欽承于渥命尚思告于謀猷行佇逺圖以副甄用可屯田郎中權發遣三司度支判官吳幾復可都官郎中勑具官某先皇帝嘗謂財計之司地要事叢艱于數易故于劇部為擇佐僚且更久職之科以待不次之舉爾幾復實以幹治應乎選求比聞坐曹最號辦職今有司按閲謂爾頃倅邊州課登優格自改郎秩嵗滿三期較其在事之勤並應考功之令中都掌𨽻雖曰次遷支度均財尚仍故守惟爾經術足以飾吏文敏足以治煩益思逺猷用副甄擢可都官郎中集賢校理吳彥先可司封郎中勑具官某恭惟先帝留意藝文以謂養育賢材莫先儒館因命丞弼並荐所知覆以文詞授之美職者蓋亦衆矣朕嗣位之始爾彥先應詔來上是用試爾內禁置于書林皆所以成先帝之美也今有司又言爾正秩郎內凡滿四期校其積勤甫應遷比是用畀爾主爵列于左曹亦所以旌服職之勞也夫賢者之于國家豈待爵祿而後勸惟兹叙進之法蓋亦功令之常爾其休承益懋逺業可侍御史吕景可司封員外郎勑昔有唐之世由御史而升省郎者號為清選蓋以居紀綱之地則紏繩為煩贊喉舌之司則典領為重我得佳士俾之迭居以爾具官某文雅清修端方徑正早仕州郡廉能之譽聞于時其在朝廷獻納之言無所隱近召從于州棨俾復踐于臺端方倚忠規之良遽上年庸之最法當進秩寵以左曹所以厲風節之髙而副清望之擢也昔劉向有言忠臣雖在甽畝猶不忘君矧爾踐歷清塗進榮華省尚思往訓無忘納忠可岐王府記室參軍尚書度支員外郎直史館李育可司封員外郎勑具官某今夫仕郎官者以左曹為貴升文館者以太史為先向非大雅博達之倫不在優遷兼直之比選任之際良亦艱哉以爾早擢甲科荐游書府召從方守置在王藩使吾親賢日聞道誼之益繄爾善識不懈討論之勤攬攸司之議年嘉奏課之應格進聮主爵之副以增望府之華漸履榮階益收後最可翰林學士右諫議大夫知制誥滕甫可給事中充翰林侍讀學士知瀛州敕朕柬求時彥登置近班內則預基命之謀外則委折衝之寄出處雖異眷遇實均方將詳試于事為是用優加于寵數具官某文學足以濟時用論議足以輔朝猷升之掖垣則詞訓擅其美擢于憲座則啓沃盡其誠洎進直于復門益見推于善職朕以瀛關藩㑹之要朔野灾震之餘謀帥惟難得爾良重趙張之治京劇已擅宿名頗牧之在禁林宜膺閫寄對易金華之侍仍遷瑣闥之聮俾綏定于一方且盡護于諸將夫牧民貴乎安輯守邊務于威懷以爾敏明往必有裕佇聞職政之美用副虛懷之咨可右諫議大夫李肅之可依前官充天章閣待制權知開封府漢制以郡國二千石髙第者入守京兆故彈治輦下常為得人矧豫近序之賢久歷雄藩之寄委之尹正必有佳聲具官某生于名門素號敏達出將漕務入佐邦財心計有餘治績尤著近以河濵地變朔土民騷爾職撫邊疆日勤綏定繕完壁壘安輯民居曽不踰時克有成績是用升雲章祕近之列典王畿浩穰之都豈特旌寵于事勞抑亦佇觀于才美往膺殊渥毋替後勤可虞部郎中張兊可比部郎中敕具官某朕沿大比之制考庶官之成録其治能進以秩等所以均恩于在位而示勸于至公也今有司以爾有宿官之勤應考課之令宜叙遷于郎列仍故守于州封往復休恩益圖後最可前屯田郎中王覺前殿中丞袁庭芝前著作佐郎侍其瑋可並舊官服闋敕具官某等服勤效智早列周行銜恤去官近終喪紀日月云邁縞纎巳除宜還簮紱之榮來就班聮之次秩雖不改命則維新勉思移孝之方以竚揚名之效可屯田員外郎李鑑可都官員外郎虞部員外郎黃宋卿可比部員外郎敕具官某等古之在官者久而不遷故有三嵗大比之法今之從政者間或無職故議增年考課之令雖責實稍異而較勞則同以爾等夙以吏資置之朝序出敷民政並著事功攬齎伐之應條命推恩而進秩勉圖來效副我甄褒可職方員外郎董公彥可屯田郎中比部員外郎馬中庸可駕部員外郎屯田員外郎黎持正可都官員外郎國子博士司卞盛和仲可並虞部員外郎太子中舍張璯可殿中丞敕具官某設官以等則衆職舉有勞者進則羣臣勸歷古為治兹道實先以爾服在朝聮夙推幹裕嵗月之效甫臨比最之期閥閲之資亦應叙遷之典遞增美秩用奬久勤益念修方以圖來效可駕部員外郎李茂先可虞部郎中屯田員外郎馮稹可都官員外郎虞部員外郎蔣僅可比部員外郎敕具官某等昔有虞之熙衆功也九載而能否别周官之比羣吏也三年而治最升夫授方任能效功書過久則實已廢速則賞或僣四嵗遷黜我得其中以爾等夙以吏資仕于朝廷自登郎選屢試政條率職之勤訖無曠事議年之課且應功書並進等于右曹示酬能于往效尚思懋勉無忘欽承可前石州方山縣令王佐可著作佐郎前泗州盱眙縣令吳天常可睦州司法參軍前監溫州在城商稅務傅燮可並大理寺丞敕具官某等久從掾令之職咸有幹亷之稱使者交章攸司覆實言爾最狀甫應遷科朕親御便廷訾相其質可以才使因而叙遷進屬上臺之聮益思良吏之守可前權潤州觀察推官方仲謀前山南西道節度推官郭子彥可並大理寺丞前權虢州軍事推官談仲衍可著作佐郎敕具官某士之由選部而升京司者榮進之階漸也非計最如格未嘗輕授今荐者以爾有幹蠱之譽而有司又言應陟明之典臨引便坐擢為王官爾其益思登進之艱終圖逺到之效副我甄任不亦休哉可前賀州録事參軍夏侯戡可太子中舍致仕敕具官某方強而進不能則止蓋仕者之常分也以爾服官纍久視履寡尤來集銓臺願還王事其進宫坊之秩俾從鄉閈之居遂而宴休可謂光寵可前祕書省校書郎胡行修可舊官服闋敕具官某向從京省去執親喪當嵗月之再期屬縞纎之畢祭宜還舊次式漸榮階倘懷報德之誠益念移忠之效可太常少卿李獻卿遺表男景真可試將作監主簿敕某乃父任登朝列秩亞卿曹奄兹淪亡當有優恤以爾保家之秀俾霑延世之恩益愼操修克承餘緒可皇城使向寶可貴州刺史依舊皇城使內殿崇班閣門祗候段充可內殿承制餘依舊敕具官某等夫爵祿班等所以待有勞之臣勞而不圖何以示勸爾等夙以精悍之質禦于疆候之衝能戢種酋禀信威令攬元臣之列削述成效以良多爰嘉乃勤遞增爾秩或視專城之守或承內著之聮俾以寵名益重邉圉並為優異之典更佇撫綏之謀可文思副使王慶可左藏庫使敕具官某封疆之臣既勤撫輯嵗月之勞宜有甄酬矧帥略之上功顧恩書而豈吝以爾早從武辨寖服使聮自擢守于邉城能悉心于戎務稔聞治最加有年勤就升內使之聮不易舊符之寄益思來效以答寵榮可供備庫副使王諤可西京左藏庫副使敕具官某內使之聮副介有等考課之序遷次惟優非其纍勞豈應明陟以爾夙以才武服于禁廷數臨外局之繁方督中都之役校年庸而應最躐班等以升華更厲爾能以稱斯寵可前內殿承制李從吉可舊官服闋敕具官某早登勇爵嘗效邊勞俄服親喪既終祥祭奉追書而來集還舊次以參榮服內著之聮無忘厥守展四方之事佇集爾勞可前隴州録事參軍賈選可澶州别駕致仕敕具官某服勞吏役歷職郡綱今以老而自言嘉其勤之有素俾參州佐之秩以為鄉閭之榮既遂爾私是亦優典可涇州管內觀察使舒國公從式奏百姓醫人李詢可試國子四門助教不理選限敕具官某嘗學禁方能通診法近宗侯之苦疾訪髙手以視調屬覽奏封具言爾力因其藥喜之應假以版授之榮祇服新恩益勤善術可回鶻進奉大使李延吉可右監門衛將軍敕具官某代籍西安久陶于聲教職修方貢不替于忠純涉疆候以良勤護琛珍而逺至嘉其誠欵霈以恩章特升環尹之聮俾重裔夷之觀罙思恭順以答寵嘉可茭村族軍主李懷德可本族都軍主敕具官某屬者羌落內侵偏師外禦爾在捍邊之列自陳折首之功守帥為言纍勞可尚特推榮于命秩俾率厲于戎豪祇服休恩弗忘忠藎可蘇魏公文集卷二十九
