body:
  text: 蘇魏公文集卷四十五宋蘇頌撰表進乾元節功德疏臣某言伏以虹流協祉駿發於睿圖雲爛當期肇隆于聖旦屬正陽之紀月遘元聖之誕辰夷夏均歡旄倪共祝恭惟皇帝陛下祇承大統覆育萬方開隆億世之基契會千齡之運華封有祝咸傾向日之心神策無疆永固如山之夀臣竊分列守幸際盛明恭祈龍象之庭增集天人之福冀慿覺力俯鑒丹誠臣無任又臣某言伏以天命有開帝圖惟永是生元聖敷祐斯民當赤輝照室之辰屬嘉瑞乘陽之序誕承丕緒纍洽泰寧神人鼓舞以均歡山嶽喧呼而效祝臣仰陶盛化叨守近封將獻夀于南山乃投誠於西竺就嚴紺宇豫集禪流啓百座之清場演五時之淨教薰修敢怠誠懇必精允繄最上之緣願益無疆之算臣無任進乾元節絹臣某言伏以乾陽膺月震誕紀辰帝齡願祝於天長職貢敢修于篚實前件絹繭絲攸賦機杼非精蓋充任土之常用表傾葵之志獲陪旅玉有瀆宸階臣無任慰仁宗皇帝上仙臣某言此者上天降禍大行皇帝奄棄萬國伏奉遺詔摧裂五情臣某中謝恭以大行皇帝聖德仁明超貫前古臨御天下四十二年外無佳兵之虞內絶威刑之弊誠格異類恩結人心奉諱之辰率土震慟伏惟皇帝陛下孝思罔極聖情難居永慕纒綿何可支抑臣恪守支郡阻逺闕廷限以遺旨丁寧不獲赴哀班次臣無任賀英宗皇帝登極臣某言伏覩詔書恭承皇帝陛下以四月一日遵奉遺制光臨宸極者上天寶命集我皇家本朝慶靈鍾于嗣聖當重明之繼照慰萬宇之宅心凡在含生莫不同慶臣某中賀伏惟皇帝陛下紹四聖之丕緒對千齡之盛期爰自震闈入奉正統丕承之始洪化維新天地神祇永依于有道華夷動植咸戴于深仁百靈以和四海大定臣叨職近序荷知先朝恭聞德音欣逢盛際一麾在外顧官守之方拘萬玉盈廷赴班聮之莫遂企戀朝闕飛馳精誠臣無任又臣某言伏奉詔書皇帝陛下以四月一日遵奉先猷紹登寶位凡在臣庶永有依歸靡限華夷舉同欣蹈臣某中賀伏以上天眷命我祖宗所以肇基圖本朝慶靈惟聖哲所以膺統業屬兩明繼承之日副羣生欣戴之心大號維新百靈同慶伏惟皇帝陛下天挺明德神贊淵謨恭孝夙展于君親英睿早聞于遐邇爰自震邸入奉乾綱踐阼之初天人之符斯協德音所被雷雨之施惟均萬邦咸懷九鼎增重有以見列聖流光之厚先皇知子之明善繼善述之謨實超于古昔丕休丕承之烈佇載于典墳臣預職書林忝麾甸服仰遘重光之運親承渙汗之恩樂與吏民共慶風雲之會限拘印綬無階朝闕之趨臣無任謝英宗皇帝即位大赦臣某言伏奉四月二日制書可大赦天下常赦不原者咸赦除之臣即時集本州官吏軍民宣讀告諭施行訖者風雲會而聖人作雷雨解而品物榮自邇及遐以喜以忭臣某誠歡誠喜頓首頓首伏以人君發惟新之號所以麗澤于四方赦令出非常之恩故能鼓舞于羣動蓋春秋貴謹始之義而典謨重肆眚之文憲章具存今昔豈異伏惟皇帝陛下荷天明命應運勃興丕承先帝之謨光臨大寶之位乃於踐阼之旦誕布好生之仁刑無大小之差悉從原宥官無內外之限咸與躋遷軍和遍被于頒霑民里周蒙于隱恤舊章畢舉美利無垠人神為之交歡隂陽以之順序臣叨守州郡親遘盛明伏讀詔書有祇率舊章之言又有罔敢廢失之戒竊謂陛下虔恭遺旨善述先猷足以感動人心馴致孝治凡在臣子孰不歡欣昔帝堯能放上世之勳成王能酌先祖之道書詩所以稱載聖賢所以詠歌較于兹辰未為逺過升平之源可見甚盛之德在兹丕基益隆萬世永賴臣限以官守不獲稱慶闕庭無任謝敕書撫問臣某言六月二十九日供備庫副使京西路告諭曹繼明到州伏奉四月十一日敕書一道臣及本州官吏軍員將校僧道百姓等伏蒙聖慈特賜告諭并傳宣撫問臣即時稟受施行訖者先皇厭代百姓深喪考之憂嗣聖纂圖萬物荷由庚之澤矧次甸圻之近首霑雨露之恩布告俯聞悲歡交至臣某中謝伏惟皇帝陛下體乾居正繼照代明念綴衣顧託之難思大器置安之重是以初臨寶阼爰軫慮于邇遐臨遣使臣俾慰安于兆庶皇華所洎丹詔載宣惟郡邑之吏民逮屯防之師旅側聆天語親見王人莫不感忭于階庭妥寧于閭巷以孝而治德既形于四方丕休其謨功遂流于萬世臣叨分麾守躬被綸言愧無能吏之資上符朝寄姑稟細書之訓下慰民情伏限州印拘縻不獲趨赴闕廷臣無任進賀英宗皇帝登極絹臣某言伏以千齡接統屬聖嗣之膺期萬國馳心奉珍財而入贄臣叨聨朝序獲假州符敢陳實筐之儀冀效傾葵之志前件絹出于機杼賦自廛廬蓋任土之所宜愧充庭之不腆輕塵宰旅有黷典彝謹遣男習應鄉貢進士舉嘉管押詣闕廷上進干瀆宸嚴臣無任賀光獻皇太后受册寶臣某言伏審祇嚴先制誕受鴻名凡在生成率均慶忭臣某中賀伏以皇太后陛下坤元配德隂教移風輔先帝之憂勤廣睿圖之延永荷推尊于徽册巳正位於東朝內治久行比屋皆循乎婦道仁功潛被萬方寅奉于母儀夷夏同歡人神有賴臣守職列郡不獲隨例展慶闕廷無任賀太皇太后受册寶銀絹臣某言伏以繼祖尊親式頒于顯册承顔盡孝祇薦于鴻名凡處列邦率虔貢職前件物出于地寶賦厥機工雖非川嶽之奇竊效土風之獻充庭不腆發幣惟慙賀皇太后受册寶銀絹臣某言伏以禮册推崇母儀增重一人達孝首務于尊親萬國歡心式虔于修貢前件物惟金稱美厥篚充名敢因方物之儀願旅王庭之實懇誠斯在聳忭良深慰仁宗皇帝陵廟禮畢臣某言得本州進奏官狀報伏承大行皇帝靈駕以十月二十七日遷座永昭陵神主以十一月四日外祔太廟第八室者萬邦永慕痛仙馭之不留七月如期愴夀宫之永閟凡在臣子孰不摧傷臣某誠悲誠咽頓首頓首伏惟皇帝陛下純孝自天至神紹統繼述之心非怠葬祭之禮以時錮以南山遵霸陵之儉約祔于宗祏致清廟之肅雍事出宸衷風化天下臣叨聮閨籍限守州章荷兩朝樂育之恩未酬塵露望百辟駿奔之列如隔霓霄感咽自中涕洟交集無任賀同天節臣某言伏以月紀純乾日躔上宿渚虹樞電夙開載誕之祥神策寶圖繼撫重明之運臣某中賀恭惟皇帝陛下秉六陽之嘉會紹五聖之貽謀欽明文思道軼帝華之盛淳輝惇大世光炎厯之長屬臨出震之辰茂對乘離之祚函生均慶拱極同歡臣忝守維藩欣逢慶節九賓就列方拘北海之符千里輸誠願獻南山之夀雲天在望魂爽飛馳臣無任同天節進功德疏臣某言伏以四月維夏聖人應世而挺生萬夀無疆天下傾心而致祝臣叨分逺守甫屬慶辰恭趨龍象之庭豫集緇黃之侶誦貝多之典願皇圖符仙劫長延諷蘂簡之文冀聖厯與赤明共永歡呼蘄嚮倍萬等倫臣無任同天節進銀絹臣某言伏以上聖題期甫遘社鳴之旦庶邦述職虔修嶽貢之儀前件物賦自土毛珍非地寶千年嘉會庶歸宰旅之常萬夀無疆願協封人之祝臣無任又臣某言伏以德水澄瀾適遘聖生之旦侯封任土並趨王會之期虔奉舊章恭輸菲幣前件絹繭絲攸賦機紝非工蓋效土風之宜庸歸宰旅之入心存魏闕姑因物以達誠人比華封更望雲而致祝臣無任賀興龍節臣某言伏以月匝星回逮隆冬而成嵗虹流電繞啓元聖以開祥天道久而四時成聖人作而萬物覩臣某中賀伏惟皇帝陛下體乾嗣厯出震繼明宅九州四海之尊契千載一隆之運無為而守至正稽古而若大猷海宇治安神人協慶適紀吹銅之候肇開貫卯之祥於萬斯年共聽嵩呼之遠俾富而夀咸傾華祝之誠臣竊食宫祠便居廬里未改向陽之志徒懷存闕之心上金鏡之篇顧慚于往哲續南箕之算罙切于愚衷臣無任又臣某言伏以上聖膺期本神明之幽讃元冬建丑會日月之初躔運符龍德之興節紀虹流之旦言遵舊典恭欵殊庭丕宣大洞之科仰續後天之算伏惟皇帝陛下睿智神武靜逺疏通因天瑞以紀元布君綱而契道現赤明之華景夙顯祥經營碧落之真祠適臨誕日臣久塵位著退老丘園望嶤闕以天遙對靈場而心禱覬憑妙果式薦丹誠伏願皇帝陛下玉厯延鴻金枝衍慶舜循堯道虞書永協于重華周以宗強文子更登于二五藩輔保維城之固幅員臻奠枕之安凡在含生普同上願臣無任又臣某言伏以日月會于星紀肇開甲觀之祥富夀祝于聖人敢效華封之請集陽寥之靜衆諷龍漢之祕文冀憑神寶之威靈仰贊帝圖之永久伏願皇帝陛下凝神太紫獨化陶鈞無為無事而造道之真卜年卜世而過周之厯卿雲旦旦歌天地清寧之功瓜瓞綿綿享子孫千億之慶凡屬覆臨之類率同蘄嚮之誠臣無任興龍節進功德疏臣某言伏以建丑地正當萬物紐牙之際上弦月宿遘九龍浴聖之期驗星紀之初躔著倚蘭之令節電樞虹渚乾坤開靈命之符綬帶絲囊朝野著歡康之盛凡居戴履共效祝延臣某中賀伏惟皇帝陛下膺淳耀之烈光宅髙明之大寶無為而守至正稽古而若大猷亹穆顒昂靜淵寅畏丕承先志集下武繼文之勳躬祝上神遵嚴父配天之禮屬誕彌之在旦紀嘉會之發祥地平天成仰一人之有慶嵩呼華祝見萬國之歡心臣葵藿微生江湖逺迹徒切向陽之戀阻陪獻夀之班上金鏡之篇顧慙于前哲忝琳宫之職輒奉于真科冀憑道力之希微逺續帝齡之億萬臣無任又臣某言伏以星回於天紀季冬之上八帝出乎震嗣祚歷以無疆偶千齡降聖之辰會百辟稱觴之旦跂瞻嶤闕限層域之九重祇欵殊庭奏華封之三祝恭惟皇帝陛下太微育粹淳耀膺期聰明睿智以有臨禮樂征伐之自出雍都獲受命之寶丕顯國祥西母獻益地之圖屢歸戎捷考六義無以形容盛德備八音不足褒贊成功姑宣碧落之靈風上慶虹流之誕節伏願皇帝陛下乾坤齊泰日月並明御氣辨以調元建中和而立極天授神䇿萬世福以迎休姒嗣徽音百斯男而集祉民樂延康之化時揚保定之歌凡處覆臨皆同鼓舞臣無任賀神宗皇帝徽號臣某言得本州進奏官報今月日增上神宗紹天法古運德建功英文烈武欽仁聖孝皇帝徽號者敷揚國典祇告禰宫聖孝丕昭登明逺布臣某中賀臣聞唐文皇質傳言兼美大之稱乾始坤生易謂備元亨之德惟先帝之道豐仁洽邁前王之治定功成增上鴻名丕宣盛烈恭以神宗紹天法古運德建功英文烈武欽仁聖孝皇帝德貫三極恩浹九區興墜典而振宏綱耀德威而讋荒裔達聰明目雖甚盛德而無以加寬役劭農斯皆上古之所不及雖經文緯武之號已著而繼天稽古之業未彰皇帝陛下明發有懷孝思維則倣上世之道繼彼三墳昭下武之功施于萬祀銘勳簡册展事宗祊煥九廟之輝光副羣倫之屬仰臣蚤塵近列獲侍先朝恭聆大告之行竊深感忭限有一官之守阻與慶班北首闕門臣無任賀奉安神宗皇帝御容臣某言廣曲密之仙都俯鄰軒宇宅顒昂之邃表如見堯牆瞻榱棟之維新仰威靈而如在臣某竊以天子之孝莫大于尊親朝廷之儀無先于備物方聖主推崇于禰室本先皇肇建于崇宫增大堧垣聿嚴肖貌參酌事存之訓兹為善述之謀伏惟神宗英文烈武聖孝皇帝聰明文思淵泉溥博接千齡之統紀紹五聖之基圖臨御于一十九年之間制作以之詳盡損益乎三五六經之際聲名由是昭彰邁下武於往初順貽謀于永世皇帝陛下紹休盛烈循致丕平每懷僾愾之思將極褒尊之典謂宣光之隆構制有未周闢顯承之重簷禮惟其稱爰屬告遷之旦恭行妥侑之儀陳六寢之几筵佇臨燕息履四時之霜露間奉蒸嘗曲全至備之情文斯盡先王之愛敬發揮鴻業垂裕多方臣昔事先朝早塵近列講漢家之故事嘗與咨詢望渭北之衣冠莫遑奔走北首京闕內切肺膺臣無任進祫享絹臣某言伏以大祫之享盛世宜行申至孝以告虔罄函區而述職臣叨居下土仰覩純儀敢修貢篚之誠庶備充庭之末前件絹素惟州産出于民租冒瀆宸嚴臣無任賀擇皇后臣某等言伏奉聖旨云云伏以塗山啓夏渭涘興周豫娶于度土之辰親迎于造舟之地若稽盛典適契亨期將開前寢之模宜謹曲臺之議臣等中賀伏惟皇帝陛下天錫仁孝日新光明躬親萬幾雖稟東朝之訓表帥九御尚虛中壼之尊伊欲迓于家邦必先正其服位太皇太后陛下念宗祊之奉篤風教之先歷詢慶門咨求淑媛將協定祥之兆當陳備物之嚴嘉命惟行體二儀之牉合舊章可舉在六禮之親成自納采至于告期由命使訖乎上禮車服有等幣贄有常古今相沿方册具載臣等不勝大願伏望誕頒明詔豫敕奉常考沿革于前王參節文于通禮制為成式付之有司衮冕穀圭益重敬昏之義金根騩馬悉全象物之宜足以彰有命之自天知得賢之配聖靈承億載流化萬分凡在懷生率同大慶臣等無任慰宣仁聖烈皇后祔廟臣某言得本州進奏官報伏承宣仁聖烈皇后以二月十七日升祔英宗皇帝廟室者復土厚陵寧神宣廟仙遊益逺聖孝無窮臣某誠悲誠咽頓首頓首伏以宣仁聖烈皇后母儀三朝君臨九載佐萬幾于房闥治協丕平祔六世于宗祊禮尊配侑恭惟皇帝陛下聿懷祖德永慕慈儀喪過乎哀日月倐踰于祥禫祭致其敬嵗時克奉于享嘗臣籍綴殿塗躬縻州組舉朝晡之臨阻預朝班望雲日之遙但馳魂幹臣無任賀奉安宣仁聖烈皇后神御臣某言得本州進奏官報今月八日景靈宫徽音殿奉安宣仁聖烈皇后神御者闢宇殊庭寧神英寢禮成盛旦化被多方臣某伏以太姒徽音企仙遊而已逺閟宫有侐奉慈範以如存備法駕之祲威越儀坤之往制伏惟宣仁聖烈皇后厚德載物正位承天三朝尊奉于母儀十載輔成于聖政不出房闥憂勤見于動言以御家邦教令行于中外皇帝陛下躬有虞之克孝纂莘國之維行霜露感懷嘗蒸具禮仰視榱棟既嚴七室之祠出遊衣冠更具四時之薦斯盡享親之義兼隆尊祖之誠宫廟相望人神胥叶臣近司舊列昔更事于簾帷逺守餘生阻趨陪于班著北首京闕內切肺膺臣無任賀紹聖二年明堂禮畢臣某言闢九筵之太寢奉三嵗之親祠熙事訖成湛恩普被曠然麗澤浹彼寰區臣某中賀伏以嚴父配天所以教諸侯之孝眚災肆赦故能得萬國之歡慶逢極治之辰交舉上神之薦爰推大賚悉舉舊章咸與維新無逺弗屆恭惟皇帝陛下以乾粹離明之德兼堯仁舜孝之資祇栗寤興敬恭明察念饗帝享親之義思盡志盡物之誠日至燔柴于泰壇間行大報季秋奠玉于陽館復舉彞儀郊廟之祝畢修雷雨之施咸暨穰穰降福集帝祚以無疆啿啿懷生樂聖時而載忭臣圭符守土淮海縻軀初不獲駿奔明庭躬修助職今乃幸親承疾置宣布恩書姑與吏民俯同蹈舞賀紹聖三年元會臣某言伏以講嵗首之儀重元正而謹始受春朝之籍罄四海以來同方三隅交泰之辰實萬物棣通之候含生胥慶景福維新臣某中賀伏惟皇帝陛下繼聖膺期持盈守位積神智天仁之美致功成治定之隆七政以齊四時合序肇屆履端之旦躬臨正寧之朝鐘簴充庭衣冠就列梯航重譯傾衆星拱極之心椒柏稱觴同萬夀無疆之獻臣職叨真館恩假便居想八闋于鈞天幾形夢寐望九賓于漢殿莫聽臚傳仰祝帝齡漫馳魂幹臣無任賀立淑妃劉氏為皇后臣某言伏聞九月二十七日文德殿發册寶皇后成禮者建大長秋之官屬仰奉四星之居進內司服之褘衣丕承三册之命儷尊稱于皇極崇位號于中宫慶集宸闈風行宇縣中外臣庶鼓舞欣歡臣某中賀臣聞自古守文之君必有內德之助二南正始之道是為王化之基蓋以主宗廟之祼將化天下以婦道嚮非合成湯之法相何以配上帝之正妃允兹椒掖之賢茂對紫庭之選恭惟皇帝陛下憲章文武效法乾坤愛敬曲盡于兩宫仁恩溥洽于四海卓有俔天之貴夙膺履武之祥翕受純禧協敷隂教彤管有煒既貽則于九嬪象服是宜將垂福於萬世臣蚤塵班著老退江湖欣聆郵置之傳竊贊家邦之美天枝繁衍式符周瓞之綿綿國本延長更祝軒丘之五五伏限在逺不獲奔走闕廷臣無任賀生皇子越王臣某言伏覩德音八月八日皇子降生者大人繼明增煥前星之象長子主器肇開甲觀之祥夷夏宅心邇遐均慶臣某中賀伏惟皇帝陛下恩被動植孝通神明貊其德音若重華之協帝措之事業同下武之繼文是宜蒙天地之休于以篤家邦之慶乃仲秋之令日實上嗣之膺期嘉瑞藹乎宫闈湛恩浹乎寰宇龍犀日角已彰岐嶷之姿海潤星輝永副元良之望臣早塵班著老退丘園請聖人之多男允諧華祝上天子之萬夀徒效嵩呼雖阻奔馳罙深蹈詠臣無任元符三年慰哲宗皇帝上仙臣某言此者上天降禍大行皇帝奄棄萬國伏聽遺詔摧裂五情臣某誠殞誠劈頓首頓首恭以大行皇帝睿智聰明繼志神考德威烜赫瑞應屢臻四夷八蠻罔不率俾仙遊厭世宫車上賓率土哀號孺慕悲切伏惟皇帝陛下天倫至愛聖情難居追愴感懷何可開抑臣限以老病退居閭里不獲奔走道途赴哀班次臣無任慰欽聖皇后上仙臣某言伏覩今月十四日大行皇太后遺誥凡在臣庶罔不悲號臣某誠哀誠咽頓首頓首恭惟皇太后母儀三朝化被四海復辟嗣聖歸神昊穹皇帝陛下追慕慈幃悲纒宸極孝思罙切聖情難居伏望以宗社為懷副宇縣所望少抑哀抱以納福休臣嘗與近班屬在羸老不獲奔走道路赴哀班次臣無任熙寧賀斷絶大理臣某言竊以囹圄空虛周美成康之盛禁網疏闊漢稱文景之隆蓋教化行而俗醇則刑罰措而民服視今之治與昔為侔恭惟皇帝陛下出震垂裳乘乾御極不事征伐攻取以懷殊俗不重賦斂繇役以惠中區草木魚鱉之微霑濡盛德鰥寡孤獨之賤蒙被深仁上日甫臨方春啓序治象未出而億兆皆歡寬詔未下而煩苛已除廷尉無奏讞之留聖政有勝殘之善臣仕逢熙代職忝從臣未能發言為詩揄揚于樂府誠欲直書其事炳煥于史編上件斷絶公案欲乞宣付史館臣無任謝欽恤刑臣某言進奏院遞到敕書一道賜臣欽恤刑獄臣即時依稟施行及翻録下管內諸縣去訖者曦炎可畏聖慮遐周沛然發于德音欽哉恤于刑辟下逮容繫咸識天慈臣某中謝伏以國家恭授四時慎用三典每當盛夏之際俯念幽囚之拘內則齋室親臨閲攸司之讞議外則使軺案問戒羣吏之煩苛詔書下而寬和禁網號為疏闊蓋纍聖恤人之厚為盛辰致治之原恭惟體天法道欽文聰武聖神孝德皇帝陛下仁育含生施侔洪造憫庶民之多辟致五聽之猶繁顧兹叢棘之間或有然灰之歎于是爰周時訓敷述邦彞頒一札之璽書敕四方之守長俾親庶獄毋忽一侀加墁飾于圜牆乃溉濯于關木疾病者賜之醫藥惸獨者給以饘糜情可哀矜皆從于末減治當證逮亦戒于淹期恩生囹圄之中歡浹幅員之內兹甚盛德流于無窮臣任忝守封職當持法親承聖訓敢怠于布宣周察民情務歸于寬簡冀盡平反之效少紓中昃之懷臣限守州符不獲奔詣闕廷臣無任又臣某言盛德在火式臨藴暑之辰至仁如天爰念拘縲之黨特頒深詔訓飭多方本睿慮之好生致函靈之浹慶臣某中謝伏以國家千齡接統纍聖題期哀庶獄之尚煩恐一夫之失所罪之疑而輒讞情既得而猶矜乃屬流金之炎載寬叢棘之禁率由欽慎以底治平恭惟皇帝陛下駿遹先猷稽參洪造廣虞舜恤刑之志推成湯扇暍之心顧兹圜土之間或興畫地之歎講明常憲敷布德音敕守長以奉承使容繫之清肅濯其桎拲塗厥垣牆視皿器之必時蠲藥劑之無闕重輕之繫必致於安全小大之情不罹于寃滯臣竊分符竹寅奉教條知禁罔之闊疏惟思止辟味訓辭之深厚敢曠承流庶無暴戾之尤仰副憂勤之念臣伏限印章所繫不獲逺詣闕廷臣無任又臣某言璇璣齊政時臨建已之初皇極敷言上念惟刑之恤祗誦寬和之旨內深惻隱之懷臣某中謝伏惟皇帝陛下乾健乘時離明燭理布炎帝執衡之令軫武王蔭暍之仁內則省録于齋居不忘庶慎外則丁寧于守吏爰下細書順長育于正陽俾肅清于嚴棘情已得者仍從讞法罹不逮者悉免稽留至于渴飢疾瘐之人咸有廩給醫治之惠號令出而民説協氣旁流句圜靜而星虛繁刑幾措臣忝分州寄恭被訓辭出繫挺囚姑稟夏時之政承流宣化更勤漢守之忠惟竭疲駑仰酬生覆臣無任又臣某言盛德在火天開長育之辰折民惟刑聖有哀矜之訓被詔辭之深厚諭上旨之丁寧恩逮狴牢惠均遐邇臣某中謝伏惟皇帝陛下躬禹律度畫堯衣冠德教洽而刑罰清誠意修而上下察適紀朱明之候誕敷在宥之仁念五聽之所求雖存彞憲慮一夫之不獲常軫淵衷時敕守臣奉宣明令簡核多從于原省瘐飢悉務於安全廩餉以時寒涼適節歡欣動於幽縶恥格變于編齊漢網甚疏固有舟魚之漏召棠所茇將消牙鼠之爭臣叨析左符親承細札對時育物仰遵共理之言出繫挺囚上廣好生之德敢忘盡瘁少答鴻私臣無任蘇魏公文集卷四十五
