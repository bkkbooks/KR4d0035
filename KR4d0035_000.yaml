body:
  text: 蘇魏公文集别集類二宋提要臣等謹案蘇魏公文集七十二卷宋蘇頌撰頌字子容南安人徙居丹陽慶歷二年進士官至右僕射同中書門下平章事罷為集禧觀使徽宗立進太子太保纍爵趙郡公卒贈司空魏國公事迹具宋史本傳集為其子携所編宋史藝文志陳振孫書録解題皆作七十二卷今本與之相合蓋猶原帙惟藝文志尚載有外集一卷而今本無之則其書已佚也史稱頌天性仁厚宇量恢廓在哲宗時稱為賢相平生嗜學自書契以來經史九流百家之説至於圖緯隂陽五行律吕星官山經本草無所不通葉夢得石林燕語亦載頌為試官因神宗問暨陶之姓頌引三國志證其當從入聲不當從洎音神宗甚喜是其學本博洽故發之于文亦多清麗雄贍卓然可為典則石林燕語又稱神宗用呂公著為中丞召頌使就曽公亮第中草制又稱頌為晏殊諡議以其能薦范仲淹富弼比之胡廣謝安又稱頌過省時以歷者天地之大紀賦為本場魁既登第遂留意天文術數之學陸遊老學菴筆記又引頌起草才多封卷速把麻人衆引聲長之句以證當時宣麻之制徐度卻掃編又稱頌奉使契丹文彥博留守北京與之宴問魏收逋峭難為之語何謂頌言梁上小柱名取曲折之義因即席作詩以獻今檢是集凡諸家所舉各篇悉在其中足知完本尚存無所闕佚而頌文翰之美單詞隻句膾炙人口即此亦可見其槩矣乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6152122702c4792e4d077e9decd3f465b19980a1ac90c9b45315fdc8cf6fe55f
