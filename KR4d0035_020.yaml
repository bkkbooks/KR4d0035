body:
  text: 蘇魏公文集卷二十宋蘇頌撰奏議請詔儒臣討論唐朝故事上備聖覽因臣寮上言請留意近代典故遂詔儒臣檢討唐朝故事日進五條曽未朞嵗省閲逮遍嘗聞德音宣諭近輔以為有助聽斷臣伏見陛下祇紹先烈勤勞萬幾治理之間多用仁宗故事外則邇英講讀經史內則臣寮進獻封事古今得失之迹忠賢治安之䇿固已溢黈聰而積淵慮矣而臣愚管之見猶有所陳者誠見陛下稽古奉先之心孳孳不怠故敢復僣越而盡言也臣聞之荀卿之言曰道不過三代道過三代謂之蕩言其逺而難信也本朝去唐正同三代其事近而易考所宜宸扆之留聽也臣欲望聖慈特舉慶厯故事詔史官學士采録新舊唐書中列帝所行之事與夫羣臣獻替之言每日上奏數事清燕之間特賜覽觀所冀螢燭末光增輝日月臣不勝惓惓之願尋詔講讀官不講日進漢唐故事二公每於逐事後論其得失大旨同列遂以為例論屯兵漕河大要臣今月初九日入侍經筵進讀三朝寶訓至咸平六年契丹南牧真宗皇帝嘗命輔臣條陳禦戎之䇿因謂宰相李沆等曰今巳屯大兵遼未有隙聚兵廣費民力何以充給自來建議營田河道多為帥臣所沮臣伏䝉聖問屯兵漕河孰長臣尋上對以為屯兵漕河二事相須闕一不可蓋天下無事兵雖不用而邊防武備在乎戍守則屯兵不可闕也既有戍守必資糧餉積儲糧餉須由運漕運漕小阻其費百倍是漕河不可闕也方契丹連嵗繹騷邉城謹備真宗以露師纍嵗思長久控扼之術故語及營田設險儲糧贍軍之議蓋為息民止戈之漸而帥臣不能逺謀但矜甲馬雄盛反以設險為示弱故李沆又陳功之難成蓋人人互執所見參驗而行實為至便欲望聖斷决行是後雖與契丹講和然而運河營田終亦不廢至今沿邉以為大利又國家禁旅大兵多駐沿河州縣皆取運漕之便也臣故曰屯兵漕河二事相須闕一不可臣退而伏思聖問淵奧皆經國裕民之先務臣前對疏淺不甚周悉輒復稽考書傳所載前世已行之事進言其一二仰備聖覽臣聞古者內諸夏而外夷狄故有侯甸要蕃之限祭祀享貢之令蓋異逺近而别夷夏也逺人不服則侯伯之國得以文告而懲艾之故文王命南仲伐玁狁城朔方而玁狁于夷宣王命召公平淮夷至江漢而淮夷來獻此攻伐征討之備素具故也秦并諸侯天下混一而强胡未服始皇使䝉恬將兵攻取疲敝中國卒無成功此無外禦之所致也韓安國將兵屯漁陽上言方佃作時請且罷屯罷屯月餘而胸奴大入上谷漁陽掠其人畜而去此失備虞之所致也自爾以來中國未嘗無戎狄之患郡縣未嘗無戍守之役千金之費嵗月相乘由是轉漕運糧之䇿興焉秦使天下飛芻挽粟起黃腄直瑞反又音誰琅邪負海之郡轉輸北河率三十鍾而致一石六斛四斗為鍾計道路所費凡用百九十二斛乃得一石止卒困民力漢守滎陽軍無見糧蕭何轉漕關中以給食糧道不絶遂興漢祚此運漕有䇿與無䇿相去之萬萬也趙充國擊先零請罷騎兵以步兵萬人留屯要害因田致榖威德並行大費既省徭役豫息以戒不虞唐姜師度守易州始于薊門之北漲水為溝以隔奚契丹之冦又約魏武故迹傍海穿溝號平河渠以避海道運糧者至今賴之此皆屯兵漕河前代之明驗也臣聞帝王之都必據形勢故三代居河洛之間漢唐宅咸洛之壤我太祖皇帝嘗愛洛陽山川之勝始有建都之意用軍校李懷忠陳汴渠運漕之利遂東還京師此實聖斷睿謀因時適變貽萬世之長䇿今京師有汴蔡廣濟轉輸之饒沿邉有塘濼營屯之固鎮壓夷夏踰于金湯非三代漢唐之可擬倫也臣頃在先朝竊聞今太子太保致仕張方平嘗䝉神宗顧問汴渠興置利害方平奏曰古者建國必依山川今國家都汴實據平夷之地所以為形勢者禁旅也資禁旅者粟帛也所以富粟帛者汴渠也望戒有司以時開塞毋輒輕議天下幸甚神宗深以為然審此言亦可見屯兵漕河之大要也臣愚僣易開陳庶幾上禆聖政之萬一議疏濬黃河臣竊以方今河北之患莫大乎河流未復故道冀瀛之間民被其苦者多矣雖朝廷遣使臣僚建議而疏塞之䇿未聞定論臣元豐四年知滄州日正值河决小吳北流入御河直注界河同入於海當時詔㫖順水所居便為河道不復修塞决口臣在郡日曾遣官按行及詢采民言以為向之東流自澶淵至鹽山皆獨行不與諸水雜隄防甚逺猶或時有湓溢之患今既北行則與御河胡蘆滹沱并合其恩兾之間但瀰漫濶逺稍自成川居占民田未為甚害下至五遷渠數道皆合於徒駭俱入御河直注乾寧軍界只有木門廣濶既受衆水必須壅遏難行至臣代還曽上言乞先相度下流之勢竊見滄州東北三堂濼縱廣皆百餘里下連海道地名黑龍港其濼西與御河破藏口及范莊橋鎮相去不過三五十里可以分引洪流東注濼內濼既滿溢即由黑龍港以入于海雖非經久之畫然亦足以紓一時瀛冀瀰漫之患尋聞事下都水監後來不復施行近者都水相度欲開孫村口入故道若可行水則用功少而除患多是為上䇿矣或聞以地近北京恐有浸溢故議亦未决臣以謂河流泛濫未有所向災及州郡已五六年若不早為經畫異時夏秋大水則其患轉深矣臣愚欲望特降朝㫖下都水監及河北轉運司合議孫村口若故道尚存鹽山海口不至堙漲可以承納下流即速計功開道萬一以北京逼近及海口堙漲未敢便行疏導即乞重别相度滄州界御河破藏范莊橋水口增築三堂濼南隄以限水勢即開口放水由濼入海少寬瀛冀積水之患使目下居民稍獲安堵然後别行經度久逺之利與其坐俟河清曷若兩圖以救其患伏望朝廷留意不勝幸甚臣陋儒淺識愚無他長塵㸃近班每慙曠職伏遇皇帝陛下開廣言路博訪在廷敢竭所聞仰應詔㫖雖肉食者鄙非有逺謀而狂夫之言或䝉聖擇僣妄之罪萬死莫逃奏乞罷起夫修支家河臣勘會揚州近得江淮發運司牒准元祐八年十月二十六日朝㫖令發運司總領開修楚州漣水縣至海州石闥堰下運鹽河并創開支家河要見揚州管下縣分鄉村等第人户立定式樣取索五等人户內有係灾傷去處及出役錢不出役錢人户等事并放稅分數詣實供報本州雖已依應施行臣竊見淮南係灾傷路分又得轉運司牒經冬未有雨雪請差官祈求本州自十一月上旬于諸神寺觀祈禱備至並未有應訪聞民間尚未下得麥種已是過時來春必是闕食若更起夫役竊恐民情嗟怨有傷和氣臣伏見朝廷故事每遇灾傷之嵗諸色工役並權罷免今來楚海及本路諸處夫役亦非目下急務欲望聖慈特降指揮下發運轉運司應係諸處夫役雖巳得許差朝㫖以今來亢旱並且權罷候將來豐熟日再取朝㫖所貴人情安帖灾沴自息貼黃議者或謂官出錢糧雇召人夫豈妨農事臣以為若雇募情願只合出榜招召人自應募今來預行勘㑹取索鄉村限定人數諸縣必須據數差科雖不願行官司督迫豈得避免如此何名雇召奏乞减定淮南鹽價臣伏見淮南一路財賦之數最為浩繁尤藉每嵗賣鹽額錢一百餘萬貫資助經費而近嵗以來連併不敷議者咸謂不能禁絶私販之人侵奪公利而致然耳且瀕海之地潟鹵所生而又宿亳諸州連接京東西通商地分販者不宿昔而獲厚利雖峻以刑誅亦不可禁絶加以私貨美而價賤官貨惡而價貴民間既利于私易則官鹽無由出賣得行往往只是抑配與傍郭人户及過往舟船如此課額何從而登辦也夫鹽味之于人日食而不可闕者非同茗酤用之有時也以一路生齒之繁食鹽者不可勝計而百萬之課前後登虧不同非昔之食者衆而今之食者寡也蓋未思所以制其本爾臣竊聞曩時數有建言者欲將一路官鹽設法减價出賣或有欲只减出産州軍價直者臣以謂逺近一概减價誠未易遽行若且于出産地分通泰楚海州漣水軍及通商鄰境宿亳夀泗等州减定使公私之價不甚遼絶則民間樂買者必衆而私販之人自知利薄而重犯法矣苟度越一州而販入他州界則道路潜匿必艱于鄰境官司捕搦亦易為禁止也若行之三數年間課額稍登然後於近裏州軍一例裁减此誠移私貨增官利之法也奏乞移屯禁軍於真楚泗州就糧臣竊見真楚泗州枕江帶淮連接海隅四方輻湊最為繁會其間隱藏奸慝之人固亦不少伺間為盜不可不虞而州郡兵防曠久不講內楚州猶稍有備真泗特為闊略逐州雖有本城兵士數千人除差出外所存不過三五百人各占色役未嘗教閲其屯駐駐泊兵士又亦不多平居無事以巡防坐鋪尚或不足一有寇盜何以枝梧誠宜過為之慮也臣伏見京畿諸縣界及近甸州郡各有就糧禁軍不少欲乞朝廷相度那移近下軍分逐州各與三五指揮往彼安泊如遇合該出軍則更互起發常留一兩指揮在州一則就彼糧儲稍省漕運之艱二則張大州郡聲勢使寇盜不敢萌窺窬之心三又可以應援東南諸路緩急討賊之備議者或謂連營久安重于遷移臣以謂近者揀選逐處兵士遷補上軍其經揀指揮有少闕人數欲乞令本處相度將殘零兵士併入一般軍分就多依足數目空閒指揮便可廢罷却移此軍額并量差人員往逐州置立營房招填土人充軍仍逐旋教閲候數足則别立將窠如此處置兩無所妨諡議司空侍中臨淄公晏殊諡元獻大理寺丞館閣校勘同知禮院蘇某議曰終官繇三品而上得以諡易名非特寵貴臣而假優禮將以因恤典而示勸監舉字之美惡視行之賢否至公之道也其法曰主善行德曰元文賢有成曰獻惟二義之美合于故相司空臨淄公之行為宜矣司空神機警異器藴夙就初起江介已被先帝知奬訓言敦勉許以逺至歷文館登掖垣翼儲闈直禁署寵榮便蕃待遇莫二聖皇纂嗣注意圖舊乃踐樞極乃贊冡卿出藩入輔垂二十年而至于大任若其操履端固議論誠慤居官任職所至有聲讜言嘉謨入則造膝辟在近密見謂忠謹如張少儒居朝位除擬公當若崔貽孫至于好賢樂善特出天性平生以風鑒自許未嘗用喜愠加人此又人之難能也故士或被薦用者至有十數年間躋顯塗置廊廟若故范文正實同列台司孔給事嘗代為御史又稱今觀文富公于上使報鄰聘亦不以親疑為間昔胡廣與陳蕃並為三司漢史紀之謝安引從子幼度往備北陲晉人為善焉較之前良在我無愧可謂能知人矣公不私矣始以文藝自著資適逢世進官早成遍歷華要總幾宥登宰府持憲綱主邦計爵祿名數極矣而處之若無有也遇事持正動循規凖不為勢怵不為利回篤志文史老而益堅作為文章蹈道自信蓋得四教之忠信三德之剛柔禮之中和詩之溫厚傅經義以飾行事宜乎遭會兩朝大節無玷可謂能保躬者矣有始卒者矣夫委質入朝當政任事有知人之明而濟以不私得不謂之主善行德乎保躬而由禮則行已而有始卒得不謂之文賢有成乎前考功狀司空功閥且告葬期請以元獻諡謹議贈太師王嗣宗諡景莊殿中丞充集賢校理同知禮院蘇某議曰太師少以雄雋聞于時起徒步舉進士會太祖皇帝收攬天下才傑之士始就便座親䇿詞藝而太師以文章應對稱㫖擢在第一初仕州掾則有强濟之舉數以言抗上官上官不能屈時人固以竒才目之纍守藩要更使别部咸有能績其最章章者若說崔翰用兵摘甘陵謀卒禁淮南窄神去豳土妖狐皆明識所照人以䝉利景德祥符間种放以隱遁自高先帝屢詔敦迫留置儒館以有道禮之豫告歸終南朝之公卿大夫希風仰髙歌詠相繼時太師守雍獨謂其賈名過實獵取爵位豪斷鄉里豈退士之節也歷疏詆之言極切至詔放徙嵩山以避之其在朝廷風采尤厲任御史日請間言事繩紏在位無所顧憚及贊樞管力陳致治之要上頗開納又論折權貴不容私間當時或詆其矯激太甚而太師處之沛然不疑嗚呼古所謂正色立朝者豈近是夫惟春秋之義著媺惡以勸來者國朝之制視爵秩以易其名在書有之布義行剛曰景嚴恭臨民曰莊若其事上無隱强而能斷得非義且剛乎布政持法人不敢犯得非嚴且恭乎即是懿行合諸前典太師無愧矣請諡曰景莊謹議駙馬都尉贈右僕射王貽永諡康靖殿中丞充館閣校理同知禮院蘇某議曰中令以名家子出綺紈中性若少成卓然有立刻意墳史志尚恬夷不以門閥自髙思與英游共騖藹乎令聞見于士評章聖皇帝雅知其賢特所稱激屬王姬築館甲族求儷衆歸清雅之範乃膺選尚之恩自兹貴顯日隆眷待尤異內外使領多歷煩要時以珍符薦錫鑾輅四巡陪護王遊顯相儀則在帝左右見謂忠恪今上纘戎謨烈圖任勳賢薦付節旄更委符竹所至之郡皆名雄劇以條教率下以慈惠及物人用懷畏號為吏師再朝京師留管樞宥當本兵之地通執政之司簡在上心朝夕納誨外强戎索內輯軍和敏於敢行不陂不倚深籌密畫時多賴焉慶厯中夏戎欵歸與講成算皇祐間儂蛋騷嶺參受伐謀功成不居謙畏益甚名遂能退識量彌髙歸全考終一節無玷諡法曰安樂撫民曰康和德考衆曰靖議者謂中令以帝姻之貴樂民政之勤方時治平尤重外守領鎮十數美聲沛然得安樂撫民之義贊燮機務垂十五年循晦逺猜不怙權寵雖據要地人無間言非和德考衆疇能及是有司告葬禮有易名旌勸之典惟至公是徇伏請諡曰康靖贈右僕射高若訥諡文莊大理寺丞充館閣校勘同知禮院蘇某議曰僕射純學懿行著于州里顯于朝廷而稱于士大夫其為御史也摧詆幸進不顧權戚疏論大慶外朝憲章法度之自出不宜集緇黃輩廣為供會請沿唐開延英故事進見輔臣使得從容坐論以究治道及在政府患州郡兵冗稍革招募之法病文武官濫極陳泛遷之弊又傳丞相言斜封徼恩一切願罷外戚肺腑不可預政皆具為令王守忠叙遷岐路以求節鉞白以家臣其將用將帥之禮處之邪騫永濟坐法夤緣欲覬牽復乃引受賕須㬰赦還官格以沮之奏議恂恂劘切于上主可于行而不主于激訐所務周密畏人聞知故其讜言嘉謨時多不得而傳自始登延閣暨解幾密皆聫職金華日侍清燕援經據古切于比方上深歎其辨洽歷二府通五期嘗謂不得其責行當引去會南師凱旋懇章得罷識者謂其知止足行巳清約不喜俗為蹈道自信譽誹如一雖位為公卿而家若韋布疾且革自云診證乖盩卒不進藥臨終慮後不以家事諉朝廷時人善其有始卒蓋古所謂知命君子者僕射其人乎惟易名考行之義稽于典禮擬諸形容宜擇其稱者諡法曰博聞多見曰文履正志和曰莊若夫學通古今而長于辨論是為博聞識造賢逹而明治要是為多見值貴幸之勢而抗議毋撓是為履正當功名之途而處之不爭是為志和以一惠之大配二字之美誄兹遺德實惟至公請諡曰文莊蘇魏公文集卷二十
