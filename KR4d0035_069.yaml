body:
  text: 蘇魏公文集卷六十九宋蘇頌撰劄子辭免知河陽府臣今月二十一日准閣門告報奉勑差臣知河陽軍府事臣禀賦拙艱自取罪戾聖恩寬宥復委要藩殫竭愚駑無以報塞伏念臣先臣翰林侍讀學士某慶厯中曽知河陽在任亡殁臣今被命復忝臨州得繼世官雖為榮幸追念往昔實不遑安欲望聖慈持許别換近南一州所兾少安愚分臣惟以軀命上答生成辭免侍讀臣准閣門告報伏䝉聖慈除臣兼侍讀聞命倣徨不知所措伏念臣齒髮衰瘁學殖荒蕪方且充位省曹典領衆職常懼不暨朝廷更令參侍經幄進讀羣書實恐寡聞難備顧問伏惟皇帝陛下誠性天至登延俊哲敢期衰朽預在選掄不待人言自知非稱伏望聖慈特矜至懇追寢異恩庶使賤愚免貽罪戾干冒天聽辭免承㫖臣今月三十日准閣門告報伏䝉聖慈特授臣翰林學士承㫖知制誥者聞命震驚不知所措竊以學士之職朝選甚高非惟取文章翰墨之工蓋亦有應對顧問之責而況專承密命首冠近班寵待固異于常貟事任尤艱于虛授伏念臣短才極陋朴學甚迂遭遇四朝奬拔之私叨塵六職銓衡之任嵗月逾邁齒髮巳衰居常閲簿領之書猶有不逮將使司典冊之任實謂非長自省甚明實難堪處伏望皇帝陛下太皇太后陛下如天飬物以器使人閔察丹誠許還成命庶安駑蹇之分不孤覆幬之恩臣無任祈天俟命激切屏營之至所有告命未敢祗受辭免左丞臣今月初八日准閣門告報巳降告命特受臣守尚書左丞者聞命惴恐如蹈氷淵揣分揆能誠非所據竊以出納王命本自天臺糾正治綱必由丞轄內則預聞于朝政外則振舉于條章事任非輕簡注尤慎伏念臣孤學無知自知甚明本惟議郎博士之才非有納言鳴玉之望遭遇聖世仕階顯塗洎登翰墨之司寖迫桑榆之景在禮固宜于謝事荷恩猶許于備官巳積厚顔敢希妄進豈謂伏䝉皇帝陛下眷求宿舊收擢滯遺遂致孱庸誤膺奬拔豈惟朽質負才不勝任之譏抑慮近司有官非其人之纍實係事體須控懇誠伏望聖慈垂亮丹愚收還前詔改授俊傑俾乂政樞庶幾衰遲獲安分守所有告命不敢祇受又臣今月十月伏䝉聖慈特差中使齎降詔書一道以臣辭免尚書左丞新命未賜俞允者恩出非次靡許避辭理有未安罔憚僣瀆伏念臣福基甚薄識致無竒遭時竊祿以尤多忨嵗愒日而巳耄在朝無毫髮之補臨事苦筋力之衰使之恪守一官尚虞墮敗若乃擢在四輔益懼顚危況越等夷實踰儀典輒殫愚志上訴天聰伏望皇帝陛下愼重名器之頒審察才愚之分憫憐不逮巳合退藏追寢誤恩别除閒職誓勤晚節永戴生成辭免立班臣昨䝉聖恩除受守尚書左丞續准閣門告報奉聖㫖令臣立班在韓忠彥之上臣竊見近例同知樞密院與尚書左右丞以除授先後為立班之序臣叨䝉進擢巳荷聖眷至於序位躐次恩禮尤異在臣愚分實不遑安欲望聖慈許依近例令臣立班在韓忠彥之下辭免右僕射臣伏覩制命授臣左光祿大夫守尚書右僕射兼中書侍郎聞命震驚不遑寧處伏以宰輔之任海㝢所瞻職贊萬機位崇三事內附百姓外鎮四夷同王體則況之心膂股肱論材品則比之棟梁柱石用人當否係國重輕伏念臣固陋之姿朴野之學詳試巳久績效無聞向者太皇太后皇帝陛下拔自天官置之詞禁未踰期月擢列近司揔轄省綱預聞朝政謀謨寡效誅譴是虞敢料聖知更加褒進升揆路儀刑之地兼西臺基命之司禮秩並崇責任罙重伏況臣才非穎特年巳耄荒處于承助之間尚多曠事據乎端右之要益懼疾顚願寢異恩俾安愚分所有除命伏望聖慈特賜追寢待罪臣伏覩內降侍御史楊畏彈奏昨差賈易知蘇州留滯詔命二十餘日謂臣獨主其事乞施行者臣才識愚暗久汙近司論議疏違致有臺劾案其罪戾宜即嚴誅夙夜戰兢不遑寧處臣已請朝假見歸私家待罪伏望聖慈早賜施行又臣近以侍御史楊畏彈奏差賈易知蘇州留滯詔命私家待罪伏䝉聖慈特賜詔書所請宜不允者聞命震惕愈不遑安伏念臣識性至愚迂闊于事預聞幾政忽涉三期以樗散之材荷棟隆之任常懼曠職上纍清朝昨議差除初謂奉行于故事未及奏覆遂致稽留于詔書果取人言盍從吏議雖聖恩天覆察其本欲盡公而輿論波騰乃謂專任獨見愆尤至此典憲寧逃伏望太皇太后陛下皇帝陛下案用臺章早賜黜責庶幾修明法令有罪必行警肅周行不才知懼又臣近以侍御史楊畏彈奏差除賈易知蘇州留滯詔命事再具劄子奏乞早賜黜責伏䝉聖慈特賜詔書所請宜不允者聖恩深厚仰戴曷勝孤迹兢危倣徨靡所竊以宰輔大任表率百官人望所歸則議論行而必信物情不與則名器輕而易搖而臣猥以朴愚誤䝉任使上不能謨明國體以熙庶工下不能甄别人才以協衆望誤朝有譴擢髮寧窮致招人言上瀆天聽名一注于白簡罪當置于丹書雖二聖覆之如天未令投迹于四裔而羣臣謂其失職豈宜包羞于近班是以屢貢封章冒塵旒纊再紆中札曲諭宸衷捧詔驚惶重自思省本欲便祈于歸老屬兹方負于罪辜倘布懇誠懼為僣越在臣進退之分敢計重輕于國廢置之間實關勸阻伏望太皇太后陛下皇帝陛下矜憐甚戇本無他腸案舉嚴科亟行幽黜一則安全于介拙尚保餘生一則厭息于煩言遂淸朝路辭免觀文殿大學士集禧觀使臣今月初九日准閣門差人賜到官誥伏䝉聖恩特授依前左光祿大夫充觀文殿大學士集禧觀使者方俟譴投遽聞寵命局天蹐地莫敢遑寧臣伏以仁宗皇帝置大學士寵待師儒之官真宗皇帝建宮觀使非見執政未嘗兼領近年雖有除授前宰執之例皆時望宿德然後授之而臣輔政無狀坐致臺劾聖恩寬大未忍加誅許其善罷巳為徼幸而又授以美職處之宴閒雖天地生成之恩何以過此然念臣早以疲憊屢控懇誠乞還印章願歸田里久未獲請深愧强顔反因赦過之私并有非常之命懼玷名器不厭人言伏望太皇太后陛下皇帝陛下矜憐戇愚收還新命許遂前請得飬餘齡所有誥命巳牒閣門未敢祗受伏乞聖慈特賜俞允又臣今月十三日伏䝉聖慈以臣近上劄子辭免新除觀文殿大學士集禧觀使恩命特降詔書不允者仁聖保全非不知幸禮秩優異懼弗克堪伏念臣德薄位髙犬馬齒耄日積悔吝辜負厚恩自為吏部尚書後來纍曾引年謝事比期便獲歸休敢謂二聖誤知擢預政事才踰再嵗進位宰司雖木石踈頑豈不知報德之所倘可自效不憚捐糜然以竊位偷安實愧公議受祿過量必有後災故于春初再露前請重煩睿聖惇諭再三臣內感眷知猶思强勉不敢固守一介之節以勇退為髙方積氷淵之危果貽負乘之誚遽速罪戾招致人言謂當必置典刑豈敢復求安便今者伏䝉太皇太后陛下皇帝陛下察見孤直本無他腸寵以職名使同善罷則臣之素願尚可重陳伏望聖慈矜臣懇誠追寢新命許令休退庶可以上全朝廷之大體曲盡寬恩下遂孤愚之初心竟諧佚老再瀆宸聽伏俟嚴誅又臣近再具劄子乞追寢新命許令退休伏䝉聖慈再降詔書不允者露章重叠蓋出憂危被命優隆益深罪戾尚有懇誠之未盡敢殫底裏以上陳屢瀆天聰難逃國憲伏念臣顓愚一介遭遇四朝仕宦凡五十餘年實懷止足荷恩非一二可紀未報毫分福過灾生老至耄及纍祈休退巳踰越于禮經尚此磐桓果招來于物論自惟踈拙幾至顛隮荷聖造之曲全解政司之重務良懼所䝉之厚固多徼幸之慚倘不踐于前言是自隳于素守重念臣禀賦至薄年病交侵冬春以來內感寒壅之疾朝謁之際常恐遲慢之愆近又失于飬調發則幾于委頓雖欲貪冒于崇秩豈不取誚于衆觀況臣本是書生粗聞義訓若材力猶堪于任使顧重祿而敢辭既精神巳迫于耗昏雖門官而莫稱義之所激處亦難安伏望太皇太后陛下皇帝陛下推天地生成之私察臣鄰誠慤之意閔憐孤特曲賜允俞許上印章俾還閭里遂克完于晚節得涵泳于太平不殞天年莫非帝力或恐謂故事以宰臣致政恩禮優異不當自請緣臣巳䝉制命罷政事自與見任不同臣乃再三干冒伏乞聖慈特賜矜察乞依例赴朝朔望臣伏奉今月二十一日詔書以臣三上劄子乞追寢新命許上印章俾還閭里所請宜不允仍除大朝㑹外特免朝㑹者禮恩優異非昧陋下臣所宜當受然以纍辭朝命屢承詔㫖不敢再有陳乞已准閣門賜到官告即時祇受訖見擇日入謝次伏念臣誤䝉任使久積愆尤以老疾獲解近司荷聖眷尚塵重職雖腠理寒壅未遂痊平然拜跪伏興尚能勉强居在城闕坐廢朝趨不惟偃仰棲遲自招物議兼恐宴安鴆毒必致天殃進退倣徨莫敢遑處其免朝㑹指揮欲望聖慈特賜寢罷所兾少安愚分不至顚危干冒天威不勝戰栗取進止臣伏見前馮京任宫使之初猶朝朔望今臣便䝉優禮深不遑安伏乞聖察辭免知揚州臣准閣門告報巳降敕命差臣知揚州軍州事者聞命震驚不知所圖伏念臣齒髮衰殘智慮昏耗久玷近序深負厚顔是以纍上封章願歸田里天衷涵育未賜允俞夙夜倣徨方懼罪戾忽䝉聖眷授以要藩雖朝廷進退近臣務全事體而老成愒忨晚景常恐顛隮豈可更冒寵榮不知止足力所不逮義實難安伏望聖慈察臣欵誠本蘄閒退收還新命特賜哀矜聼用纍章許令致仕保飬餘息實自生成退處衡門敢忘報稱所有敕命巳牒閣門未敢祇受又聖恩深厚眷禮敦隆臣雖至愚實知優異便合奔走承命信次之官緣臣本以暮年懇求致政豈期異渥更授要藩不惟朽瘁之餘難當寄任兼于進退之際殊失亷隅反復省思未知所措是以不避僣瀆重布悃誠伏望聖慈特賜矜察閔臣齒髮衰邁疾病浸淫若或更冒寵光苟貪祿仕爵非德報諒譏議之難逃福過災生懼死亡之無日仰兾聼卑之造俯推從欲之仁霈發德音許遂前請倘未填于溝壑敢忘惠于乾坤夙夜倣徨恭俟俞㫖又屢奉德音伏深戰兢情有未盡義難自安仰瀆邃旒甘從顯黜竊以東南都㑹揚為巨藩平時長臨猶藉重望豈兹老朽宜竊麾符況臣占數潤州境候相接糾恤親屬展省松楸在臣之私至為榮幸但以遲暮之景精力巳衰當此要衝恐不勝任是以內懷止足外懼傾危冒詬控誠俟命纍日倣徨顧慮愧惕兼深伏望聖慈察其懇欵曲推洪造特賜允俞俾遂退閒免貽譏議稍還晚節上報天恩乞致仕臣近以衰病告老纍上封章伏䝉聖慈再降批答未賜允俞仍斷來章進退倣徨不知所措伏念臣生質甚陋才不踰人仕宦四朝竊祿五紀年加耆艾而無經緯本末之能位在公台而有棲遲偃仰之誚固宜引分難久冒榮加以自冬涉春寒壅遘厲晨夕趨務咳涕弗禁每侍殿墀常虞委頓頗隳儀範深積愆尤雖二聖包荒務全大體而萬幾有責豈可曠官是以叠控危悰上干宸聼丐還印紱退處田廬待命纍辰稽誅有日矧今朝廷貴德俊傑在官去惑治煩固多善類守文應變尤藉通才豈茲羸老之軀猶妨賢者之路伏望陛下矜臣不逮察臣無它廣天地生成之恩任鳶飛魚躍之性許行前奏使遂私誠如此則得請以還餘息皆由于上賜沒齒之後營魂猶荷于洪私迫切之誠殫竭于是取進止又臣近以老疾纍上封章乞守本官致仕伏奉三月二十六日詔書所乞宜不允仍斷來章臣拜捧之際荷戴天恩貪戀聖辰不敢再有陳請姑欲勉强在官更俟年嵗懇祈休老不意旬月以來故疾頻發胸脘咳頓腰足拘攣步履艱難膚革癯瘠閲視簿領不能勝任接對吏民益自羞愧實緣衰暮每懷日昃何久之嗟稽諸訓言亦有夜行不休之誡以此憂懼益不遑安重念臣今年七十六嵗仕宦五十四年歷事四朝遭逢五聖積日纍久遂致公台復忝通班出守藩郡冒榮尸祿又巳踰年陛下寵待舊臣天覆地載不忍遽見棄遺恩禮稠重可謂至矣臣愚叨竊可謂極矣所恨疲頓不堪驅䇿若更因循自取殆辱非惟上負眷寵曉夕靡寧將恐遂至膏肓漏刻難保是敢罄殫危迫之懇仰冒髙明之聼倘上䝉矜惻賜以餘齡雖退處草茅敢忘報效伏望特降聖㫖檢㑹臣前後奏章許守本官致仕臣無任祈天俟命激切屏營之至取進止臣實為日近故疾頓有發動雖上體眷懷强親職事然筋力有所不逮常恐顛仆玷辱近班伏望聖慈特賜矜閔許令致仕倘得退就田里輔飬衰疾稍獲安痊則朽質餘齡皆出陛下生成之造臣無任迫切之至又臣近者纍上封章乞守本官致仕伏䝉聖恩叠賜詔書不允所請仍斷來章臣具劄子再控懇誠至今未奉朝㫖伏念臣齒髮衰耗疾病沉綿雖祇奉德音勉親職事然而精神終是昏短筋力愈覺疲羸日對吏民嘗虞顚仆非惟自取譏議抑恐上汚朝班伏望聖慈矜憐特降指揮檢㑹前奏早賜施行所兾退就丘園稍獲安飬保全終始實荷天恩臣無任旦夕倣徨俟命激切之至伏取進止蘇魏公文集卷六十九
