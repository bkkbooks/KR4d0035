body:
  text: 蘓魏公文集巻六十宋蘓頌撰墓誌太中大夫陳公墓誌銘太中大夫陳公諱繹字和叔其先大名人皇考諱見素以尚書屯田貟外郎通判河南府卒官即葬緱氏縣萬安山子孫因家洛陽遂為洛陽人公年七嵗能屬文機警有成人風屯田公尤器異之景祐中年十七從開封府進士至廷試誤用韻不收慶厯初再舉為别試第一早與賢士大夫游已名聞于時自此蓋大顯矣明年擢乙科調梁山軍判官改鎮東軍節度推官舉賢良方正試秘閣幾中選矣以書等異同報罷再調西京留守推官嘉祐三年召試學士院充館閣校勘編定秘閣書籍改著作佐郎秘書丞進集賢校理刋定前漢書誤謬以母喪去位詔聽即其家校讎終制還朝當是時英宗即位二年矣猶恭已淵黙政事仰成輔相公以謂承平日乆庶事寖弊乃人主大有為之時因密獻五箴欲以感動上意其一曰主斷其大畧言主道雖不以事詔任賢故在勿貳然威福之柄當出獨斷則權綱攬于上矣其二曰明微言馭臣之要在知下之邪正邪正分則姦人無所容而賢者進矣其三曰廣度言養徳兢畏則聖度未廣退託謙虛則事有所不治故定國家之大計者不必徇小節小謹也其四曰省變言天之譴告當應之以實人事修則天意得矣其五曰稽古言觀古所以治今願詔近侍博采故實度可施于今者倣而行之亦南面簡易之道也遷太常博士賜緋衣銀魚同判尚書刑部每閱天下奏案有情法不相當皆請讞之或謂刑司惟駁正是非不當有所輕重公曰持法者欲得其平苟有未安豈可循黙故事耶卒持前議賴以末減者甚衆一日奏事上前英宗面諭曰聞卿文學乆矣真可任也遂除仁宗實錄院檢討官神宗嗣位遷尚書祠部貟外郎書成改度支故事當次遷左右史公獨求外補出知涇州為治皆有條教民懷其惠至有繪其像而祠之者就徙陜西轉運副使時常平法初下公以被邊七州春旱奏免散歛事雖不報上亦稱其無隠尋改使京東過都入見留為三司判官詳定令式直舍人院修起居注遂拜知制誥賜三品服逾年為翰林學士未幾以疾請郡上遣中使勞問賜以良藥俄換侍讀學士知鄧州兼本路安撫使滿一嵗召還知通進銀臺司兼門下封駮事神宗甞謂侍臣曰陳某論事不避權貴此可嘉也又詔掌皇子牋奏權發遣開封府前此都畿獄稍疑者多從中覆故常壅滯得容吏姦上知其才特聽闊畧舊制便宜處決由是府無淹繫乆之還翰苑兼侍讀充羣牧使俄真領府事每奏對甞累刻所言多合上意人謂行且大用矣值劾司農吏盜用官錢獄未竟中書五房檢正張諤實領寺事懼有失察舉之罪遂用白帖詰其滯留狀公遣主吏持案牘示諤明無違滯而言事者以為曲徇宰屬將縱出有罪公亦不自明也罷職出知滁州自謂近臣謫守當夙夜勤職不得與它官比是嵗淮甸艱食不待報出官廩以振浮殍民用安集郊祀推恩復知制誥既而改秘書監集賢院學士知廬州徙蔡州又徙潭州未之官拜右諫議大夫知廣州兼本路經畧安撫使撫輯蠻蜒逺人安之海舶大至編户富實遂繕城郭浚溝池不勞民而功辦上賜詔書奬諭官制行改太中大夫龍圖閣待制知江寧府逾年左遷中大夫知建昌軍今上即位復為太中移密州元祐三年正月已已終于州宅之正寢享年六十八公為人矜嚴有禮馭家人如官府其為政急豪黨而寛善良所在宿奸巨猾畏縮不敢犯與人交不苟合一相契則驩欣無間視異已者猶冰炭然枉直必較無容毫髮雖僚友皆敬憚之然亦以此取悔在廣州時甞戒子弟市藥物必案方劑銖兩示無過取其㢘畏如此而粤俗尚鬼有病必禱于佛祠方霧潦薫蒸瘴癘大作公命以帑錢製浮屠像置郡廨日為之祈禬俄而幼女亦被疾禱之有應遂用私財倣為一像既罷郡持去適與部使者構隙亟案奏其事詔獄窮治以為以私像易官像剩利數百金寘之深文神宗閱奏案其情曰以事佛故被重辟亦太甚也遂薄其責聞者乃知其非以毫末之利自汙也公屢遷謫而未甞芥蔕于心胸躬在逺方而斯須不忘朝廷初至髙密聞洮河守將獲畨酋鬼章生致闕下州郡當奉表賀公因表又奏疏曰陛下即位之初凡興邊事無大小疎近之臣一切廢不用于今二年四鄙無患比聞西帥獻戎俘圖賞功級誠恐由兹生事邊陲漸不可長臣甞預修仁宗實録見康定慶厯間論西事者爭言攻討之利惟范仲淹獨異不合自好水川之敗方深懲艾願以此戒邊臣無貪小利使徼外懷服恩信天下幸甚公性至慎密甞對上自陳不敢有毫髮欺在内廷造辟之言子弟亦不得聞以此天子尤聽信之方年少時銳意功名自謂遭時遇主事無不可為者亦既遭遇矣動輒齟齬晩嵗益甚徊翔州郡猶謂尚可為也而卒不得如其所欲齎志以歿此士友所以為之太息也在郡遘疾且革矣猶不廢事前一日顧謂其子曰白太傅詩云遲迴且住亦何妨豈足為達理世事何可窮耶吾于此了然矣凌辰整衣冠隠几而逝嗚呼可謂能知終者也公文格清峻無塵言累語尤長于論事甞被詔修宰相拜罷錄撰東西府記及其他所著十數萬言諸子編集為三十巻藏于家自登朝所領職事知太常禮院判登聞鼓院者再判司農寺昭文館尚書祠部禮部提舉司天監進奏院知審官東院主管三班院館伴遼使者一勲累上柱國爵開國侯食邑千六百户曽祖諱瑩祖諱光晛累贈特進皆隠徳不仕公之貴贈其父開府儀同三司追封母樂氏襄國夫人配謝氏太子賔客濤之孫女將作監主簿綸之子封樂平郡君男七人彦輔承奉郎彦威彦恭並先亡彦成宣徳郎彦達太廟齋郎彦瓌承務郎彦武未仕女四人長適屯田貟外郎姚甫三尚幼孫男七人靖端靖宣假承務郎靖直靖洵靖柔靖國靖莊未仕孫女一人適溧陽主簿饒䝉諸孤將以元祐四年四月庚申𦵏公于先塋之次前期彦成與季父太府紘敘公之履歴事迹屬秘書正字張君繢為之狀抵予求銘以誌其壙予惟與公同遊場屋再擢科第登儒館歴近班領臺閣且五十餘年雖中間契闊而音耗不革撫事懷往不覺涕洟之沾體因抒長言以寄情抱銘曰剛柔勇怯本乎性用捨行藏固有命愚達賢窮力匪競人能順之受其正猗嗟和叔敏而通始亨終否由其逢方當遇合言聽從一罹口語智盲聾心在朝廷迹州郡江海雖遥言屢進再斥復還地益峻逺蹠未奮修途盡文章縱横經世才命不我與徒巻懷英風偉蹟空沉埋刋石幽堂示方來朝奉大夫提㸃廣西刑獄公事胡公墓誌銘建安胡氏自職方府君諱順之壯年官豫章感目疾遂致政卜居本郡子孫因家焉今為豫章某縣人職方府君以文學政事聞于時明道景祐間數上書論朝政得失已退仕矣仁宗特詔許驛奏言事當時名卿莫不髙其風範生吉水主簿諱奕始冠進士第終于一命生大夫諱及字考父初名克儉避嫌更之職方既致政得補郊社齋郎調饒州餘干泉州晉江二縣尉遷黄州軍事推官改大理寺丞神宗登極轉太子中舍知建昌軍南豐縣南豐在江西最為大邑編户數萬多豪右著姓訟爭既繁胥吏操其柄前後令罕能勝之者考父夙富吏能復得家法初為邑尉已嶄然出鋒頴摘奸鋤强民不敢犯至是察見俗弊欲有所為故先召里中父老坐廷下訪其土俗利病所在鉤得其實然後為條教纎悉必盡故令出而人伏犯者一切不貸前後發吏宿贓黥𨽻者九人又甞籍其鄰里鄉黨如伍保法使相幾察以索姦盜邑故多掠良人子售為奴婢逺近相䝉莫肯窮究至是有犯必得其弊遂絶逮將滿也邑民千餘輩列疏其政事之尤著者十數條叩軍守邀監司願留借再任事聞于朝神宗異之代還吏部試治煩令差知潭州長沙縣熈寧初常平法行今丞相章公察訪兩湖案募役平徭法而長沙獨得其要領奏書為諸縣之最又被使檄均徭人禁田與毛漸呉居厚分行山嵓篁竹間區處其生熟獠有獷悍拒命者面告以王師誅逆拊順之意無不歡呼服役不旋日而一方遂定賞功遷國子博士驛召赴熈河准備差遣尋通判通逺軍凡論邊事以逺斥堠謹疆境為先務與帥臣議不合乃以母老求便鄉帥臣以為如其言則人人欲去矣以此坐免既歸朝釋不問差知楚州漣水縣是嵗淮甸旱蝗禱神祠修湖堨一日雨澍蝗殪邑人以為宰君誠感所致京尹蔡公延慶薦為左軍巡判官出通判登州官制行換朝奉郎遷朝散勾當京東排岸司從貳卿蹇公辟命為開封府推官舊制京尹得辟府僚一貟官制行悉罷矣蹇公面薦于神宗翊日以語執政曰周輔欲且仍舊自辟寮官得否執政唯諾又問胡及何如皆曰才于是特以命之今上即位進朝請郎坐治書生妄為詔草獄不竟左遷通判定州今樞密韓公作帥喜得賢佐待遇尤厚屬嵗之不易北道艱食安撫監司悉以荒政之事付之于是開廩庾代薪蒭以哺流冗施設有宜民復州處在郡進朝奉大夫徙知吉州去定之日老幼遮道呼曰我曹前日免殍亡皆公之賜也遭母夫人之喪不之官外除知濟州未行改提㸃廣西刑獄公事在道感疾至泗州不起享年六十二考父性敏悟自修飭介立不倚于吏事特為明辨所至有治狀當路多推薦之端明蔡公襄政事為當世表寮屬鮮有合其意者守泉州日謂人曰郡官中胡及葉康直吏才皆有過人者王荆公初執政聞其南豐之譽數詢廣坐曰識此人否暨見之問曰乆于縣道知民疾苦宜莫如君之詳也有可以補于時幸一二疏示因具近嵗州縣得失十數事上之荆公雖不盡用其言然奬待甚至自熈河歸過洛見司馬温公公勞苦之曰西垂舉事得志者數百人君獨不意而歸其有以乎後温公得政未甞通訊問名聲以此不相聞終亦齟齬晩嵗稍階進任又復不夀嗚呼才非不試也卒不得一如其志知之者非不力也竟不見用豈所謂分定不可移耶其適然耶此有志之士所以為嘆惋也少好讀書然不能守章句故不以此進取作詩效杜甫體往往有佳句聞于寮友喜風角術在通逺甞予主帥書曰晨起西北有赤氣冒城郭占曰其下殺萬人惟戒諸將毋擅興事可以免耳不數日景思立戰敗如其言夫人蘓氏封仙源縣君予之姑也次孫氏太和縣君某官某之女某官某之弟七男子曰潛某官曰某曰某皆未仕二女子長適承務郎彭詢次未行景祐初先太師通判洪州先祖司徒公方待次郡中與職方公素以道義相契數相過從予在侍下常應門左右時大夫與姑氏齊年襁褓遂議姻好自兹通家殆今六十年矣考父于予尊行也相視如敵者蓋自幼少從游絶去形迹一無間然𦵏也諸孤求銘予操觚牘感疇昔不覺涕下之沾頥也銘曰薛宣有言凡今為吏自有資材非學能至有若考父得之尤邃豈特天資亦自家世維祖逮孫政以能聞亞尹倅戎已試吏煩賦幏植榆亦著邊勤析符為州掲節奉使曽未設施或從或躓時亨命塞孰能付畀我勒斯文誌于羨隧太常少卿李君墓誌銘太常少卿李君諱規字子震其先世曰知謙自冀州徙籍于開封之祥符縣是為君之曽祖有子曰延美是為君之祖實生皇考諱從憲雖不仕居家而能教子以問學猶及見其成名當君擢進士第于景祐之初歴官為鄭州之新鄭江陵之江陵兩縣主簿而皇考始以夀終服既除調許州長社主簿就遷舞陽縣令改著作佐郎知汝州梁縣㑹秦邸之喪葬于邑中𨽻卒輩挾勢其所傷平民者君械繫于獄其家厚為之請卒亦不釋自是至其境者無不肅然徙知漢州綿竹縣以不便親養請監陜州商稅雅為故樞相張康節公所知公帥秦慶連辟掌其府機宜以行樞筦又薦之于朝累遷尚書屯田貟外郎簽書陳州觀察判官公事以母憂去職終喪為陵臺令兼知永安縣事諸陵嵗時之祀皆有常制而宫嬪宦官或私有所厚薄君辭日對便殿言之仁宗稱善少室山𨽻縣境林木茂美望之鬱然異時甞為佛寺據其地一日民有伐薪為炭而為寺僧所毆者兩造于縣僧曰此地自唐以來皆在寺籍碑識具存請以為騐君一見辨其偽悉治以法因諭民曰凡境内之山林皆得樵牧來者遂如歸焉有中使自邊州還致一山鹿命郵卒負之而趨道于邑中因卒有辭怒而擊傷之君暴其事乃聞于朝中人由是坐貶歴通判河陽官為都官郎中矣是時朝廷方擢取材臣以為三司寮屬故用君權管度支判官公事判使薦其才改鹽鐵判官三司嵗料江湖草茶以輸京師吏常廣調其數至所積陳腐不可食君乃量一嵗之出以為賦入之限自是嵗嵗省五十餘萬斤迄今便之改判開折司接伴契丹朝正使使者近郊辭疾欲就外館改服君使人譙責之曰外館宴所常服而趨是慢上也使者不復敢言卒如禮而入今上初嗣位詔羣臣轉對君上陳强本足用阜財安民之說其言當世之務皆有條理見之者可以知其志也君為人寛厚沈敏恂恂似不能言及其遇事敢斷介然有守雖貴有力者不可干以非義其㢘畏尤有過人者秦庭故事郡官射㑹中的者公帑以銀給之君以為取之傷亷辭之違衆故終其任不赴公㑹自歴官未甞役使官匠甞語諸子曰古人有言當官雖木枕亦不可為况什器乎在計省三年建議居多不為苟合以希進累請補外得知絳州代還若有所不釋然者將老于家遂求監嵩山崇福宫既再任而以疾終于西京延福坊之居第享年六十八時熈寧十年正月二十九日也其孤以明年七月十三日𦵏君于河南縣太尉鄉偏橋里之東原夫人杜氏祔焉君既升朝累贈其父至尚書刑部侍郎母孫氏天水縣太君王氏仙遊縣太君配杜氏封福昌縣君繼蘓氏仁和縣君子九人男千之河南府澠池主簿卒于官舉之大理評事二女嫁潘瑜張保源皆為州掾餘早夭孫九人君平生篤于友愛弟觀未仕請以一官回授之事雖不從人多其義予舉進士時識君京師連墻而居者三嵗出入相從尊酒相歡未甞有間也後三十餘年而偕仕朝廷見其粹和淳篤之守始終不少變嗚呼可謂有常者矣銘曰君子之徳不競不絿在義則固于仁也柔孰允蹈之匪質而修君克保之始終無尤特立起家亞卿是秩入朝出麾皆見稱述其進既裕其退則佚嵩髙巖巖聊以永日命雖不延生亦能全豐祿居第白首丘園其藏也固有子之賢其室安在橋里之原西上閤門使王公墓誌銘甞讀前史觀國朝以來將相大臣子孫保有其家室迨數世而不墜門法者不十數家而建雄軍節度使魯國武康王公其一也魯公諱超在太宗真宗朝提禁兵帥三路為時名將生忠武軍節度使檢校太師同中書門下平章事魯國武恭公諱徳用在仁宗朝以髙才偉略名暴邊徼累殿藩翰再歴樞筦始終一節勲在盟府魯公之弟徳基官至延州觀察使鄜延經畧使徳恭蘄州刺史魯公之孫二十八皆以材武聞于時繼登顯仕或遥領州郡或擢在横班而魯公之長子東頭供奉官贈左金吾衛上將軍諱咸熈初仕早卒生二子伯諱澤以强敏習知民政累典州郡終皇城使仲諱淵字巨源結髮為右侍禁閤門祇候七遷至皇城使閤門通事舍人更歴煩使出權陜州兵馬鈐轄神宗初即位厲精治道細大之務罔不修舉至于典謁贊導之事無一不經聖慮者一日以閤門缺貟而在職者有不嫺詞令故自陜州特召公還上既見宣奏如禮顧謂其寮列曰相儀當如王某可也通事嵗滿擢西上閤門副使乆之自請于上曰臣世以武力受國大恩臣名復在右列當竭股肱之力任疆場之事願得乗一障盡死節以報朝廷上曰朕方屬卿以職事未可遽去甞預修閤門儀制龍圖閣直學士宋公次道典領其事宋公一代名儒練達典故每稱于同列曰王君凡事詳熟議論有本末定此易耳繼領御前忠佐軍頭引見司勾當皇城司皇城司内廷要任晨夕侍衛宫禁以嵗勞自引進陞客省副使今上覃霑拜西上閤門使初元豐三年始復州郡武備置諸路將官制九軍營陣定鄉村保甲皆稀闊不講之政在職者或未盡悉其禁令公數被命案舉初往河北訪兵民利害及當官不習職之人條例上之今永興韓丞相時在樞密見奏謂之曰辭簡而事該皆可施行後用其言裁制其過與不及者十七八又案京畿將兵河東及晉絳澤潞威勝五州軍團甲振舉其職皆稱上㫖六年親郊侍祠大慶殿末疾暴作肩舁歸第在告且乆未任朝謁上三遣使就問以所苦如何治者何人日望平愈無事早出待卿往閱京西陜西兵馬既而再予告百日七年夏以疲憊請閒局詔提舉兖州仙源縣景靈太極兩宫觀公事居家養疾皆出特恩非常比也既閒居每自念荷聖主非常之眷未知所報而死不能興死有餘責矣八年三月聞先帝遺詔强起望哭移時幾絶者數矣裕陵發引前方將扶舁臨哭闕門忽夢先帝召如平生既寤感慟乆之以其年七月二日疽發于背而卒訃聞詔䘏其後遷季子一官補長孫為三班奉職初金吾之亡公與伯兄俱在乳抱母延安郡太夫人夏氏躬自鞠育推燥居濕逮于長成魯公矜而憐之賞延之恩先于諸子又使受學于諸儒出則從士大夫游以習禮法其後兄弟競爽循蹈規矩抑由母慈至而祖訓嚴故也自登朝從宦未甞逺左右間被選為成都利路鈐轄亦以親年為言力辭不拜延安後公二年歿疾且革猶曰吾不得死于吾子之手為大恨審斯言則平日之承順顔色有以慰母心者可知也平居樂易若無不可者然剛中謹嚴不妄舉動喜飲酒而未甞至于酣醉善音樂而不以為能事接人初若簡淡乆而益親桂人歐陽闢旅居京師不求自達公一相見契合如平素遂留館于家日與講論義理十餘年無少間闊至今不忍舍去自少長不雜交游不妄出入視權門尤畏懼與今新州蔡丞相有舊新州當政日每相招延則一往旅見語不及私子弟或問故應曰仕宦當爾爾輩亦宜知此則寡悔矣神宗因間語及對曰臣愚不能周旋人事耳非有他也三使契丹北人首訪其族曰得非兩世太師之後乎答曰曽大父大父也及燕射屢中的衆駭曰是果有成法也四為南郊明堂御營四面巡檢皆以辦職䝉賞初仕時年尚少入侍殿閣以勤恪著稱仁宗巳識其姓名甞以御飛白字賜之後詔伴髙麗使人南苑燕射神宗以御弓一御箭四賜之是二者皆羣臣所不能與及班列中咸以為榮遇也夫人蔚氏殿前都指揮使保靜軍節度使昭敏之孫封永寧縣君治家嚴飭雖累世大族而門内清約室無玩好旁無姬媵有若儒素熈寧中諸父俱亡伯兄外守邊要家事悉以諉公拊循嫠弱教率羣從使就問學賙給均一内外欣欣以睦如是且十年無一日替舍内有猫相乳者人以為異焉子四男子曰任内殿崇班曰价供備庫副使曰俁右侍禁曰侁右班殿直六女子五適人一未有行壻曰明州錄事參軍夏大同右侍禁張宗陶蔡州汝陽縣主簿李元弼右侍禁石京鳯翔府司理參軍張克勤孫九人曰􅀈三班奉職曰珝曰璠曰珦曰璟曰璞曰璨曰瑶曰琳並未仕孫女九人並幼王氏之先世為趙人而占數常山真定縣自魯公徙𦵏河南府密縣密今𨽻于鄭故又著籍于鄭州管城縣諸子卜以元祐四年八月戊申舉公之柩𦵏于新鄭縣旌賢鄉尹固村前期任以狀託銘于予其請勤勤至于十數且曰先人操守介特平生交游雖多而知之者鮮非公眷記終始則懿行遺美懼無述焉予惟疇昔之好重之以熈寧初同使契丹尤相親愛每聽其言多及朝廷政令之要問其所趣皆忠義謹厚者所尚之事其矯訐刻覈之行則曰不能為也予又熟其伯兄之所存亦相類于是竊嘆曰王氏家訓如此宜乎世有其人今雖亡矣而後嗣競勸若然其子孫又有成立者則門構益不墜矣因為之銘銘曰璠璵之珍産于荆崑公侯之貴亦出名門懿彼上閤遐哉慶源常趙之族將相之孫少登顯職多聞博識贊揚命令雍容謹飭神宗所知中外宣力受命按兵勤躬體國資適逢時數亦多竒中年而逝雅志終虧岡陵鬱鬱塋兹新密世徳不忘曽雲襲吉贈右屯衛大將軍趙公墓誌銘公諱叔趾秦悼王諱廷美之裔孫曽大父徳彞為潁川郡王大父諱承矩贈相州觀察使考諱克循追封東陽郡公惟王之子孫在屬籍中特為繁衍而朝廷敦睦之厚無有疎戚恩禮一均故公生五嵗以賜名例授太子右内率府副率十餘年而遷至右千牛衛將軍年十九不幸感疾而逝詔贈右屯衛大將軍兹所以見恩䘏始終之至也准狀公東陽之第七子母曰安定縣君彭氏生于皇祐辛夘四月六日卒于熈寧已酉五月二十七日其為人純和質重喜親師學于父母孝于兄弟睦而儀觀甚偉在稠人中見之者無不聳然以恭是謂公族之秀者也以服父喪繼罹國恤故未及昏媾其葬也以卒之年冬十月十三日從故相王發引而西以十一月十日祔于汝州梁縣秦王之墳次有詔詞臣為之作銘曰孰畀之資生于國宗胡奪之年甫冠而終其生未室其藏有封于汝之墳先王之從夀昌縣君王氏墓誌銘皇朝宗室之盛敦睦之恩至其子孫之嘉吉禮一皆主于朝廷凡通昏于諸臣之家非夫氏族之著而婦事之宜者蓋艱其選右武衛大將軍栁州刺史叔賾故夫人夀昌縣君王氏其人也夫人之先為河朔大姓後以仕宦徙汴今占開封曽祖諱審𤦺忠武軍節度使同中書門下平章事追封秦王其配曰秦國太夫人曹氏祖諱承徳東上閤門使㑹州刺史其配曰西平郡君石氏父諱世厚内殿崇班其配曰平原郡君趙氏此氏族之著也夫人資質修嫮和柔敏慧其族中甞推異之年十六而歸宗邸奉事尊敬動有禮法治家以寛嚴稱在夫室七年謙恭柔順無媢妒之行左右有過失則以理責數未甞施鞭箠而衆自畏稟閨門之内雍雍然無間言此其婦事之宜也年二十三不幸早世其初被疾甚力武衛憂見形色為之歴訪醫診砭餌交進繼之以禳禬之事無所不至其亡也武衛念伉儷之賢淑悼其不得偕老喪禮之外又為之屏去暈味日誦浮屠言以資㝠祐雖親戚開勉乆益不廢非夫好合之徳素茂則安能感其良人若是耶夫人以熈寧二年三月二十日卒于宫邸以其年十一月十日𦵏于汝州之梁縣秦悼王之墳域先姑李夫人冡次男曰擇之今為太子右内率府副率其二男一女皆先亡銘曰相王之孫宗侯之婦有美淑質云何不夀生宜厥家𦵏從先姑令問不已納銘幽墟蘓魏公文集巻六十
