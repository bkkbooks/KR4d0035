body:
  text: 蘇魏公文集卷三十四宋蘇頌撰外制尚書屯田郎中張徽可度支郎中敕某三省左曹之聮一方漕挽之寄皆朝廷清要之選也非得優通敏裕之士豈嘗輕授之哉以爾文中雋科仕登朝路用能治劇擢贊計於甘泉屬委使華出案條於閩部休有聲采稔於人言方攸司之議年嘉治課之應最特遷支度之列且酬閥閲之勞茂對寵光彌勤逺業可太常博士張戩可依前官充監察御史裏行敕御史之職所以振舉臺綱糾正朝位顧其責任豈易其人以爾具官某典學修詞決科從仕時推幹敏之裕加有端良之稱肅政掄才中司言狀俾從簪豸之選入聯棲鳳之班勉務直繩副茲清舉可太子賔客解賔王可守工部侍郎致仕敕引年謝事禮經之訓也優賢佚老王者之政也矧夫官列三品壽彌六紀惟其進退之際豈無旌異之恩以爾具官某久歷閨朝嘗踐臺閣進陟儲賔之貴出分郡組之榮以老自言知止可尚起部二卿之秩東牟喬木之邦遂爾榮歸加其寵命俾優遊於里閈益保飬於天和可將仕郎試祕書省校書郎充國子監直講焦千之可大理寺丞依前充職散官如故敕具官某昔唐之學官嵗終考其殿最本朝之制限以年資擢才校功其義一也爾以敦朴有道薦於士鄉經術通明置在庠序外內更試於今五年顧其施為是可官使進丞卿寺之屬仍蒞師儒之聯益懋爾能以副逺用可職方員外郎夏旻可屯田郎中駕部員外郎俞康直可虞部郎中散官如故虞部貟外郎鄭諤可職方貟外郎散官如故虞部貟外郎薑正顔可比部貟外郎國子博士傅共可虞部貟外郎敕具官某周之六亷唐之四善皆天官比吏之法今之考課參用其制視功賦祿厥惟舊哉以爾早聯閨臺稔服吏政一官恪次四載於茲治以最聞行無過事稽於有司之令應彼增秩之條勉思忠規以對休命可祠部郎中充集賢校理丁諷可金部郎中依前集賢校理散官如故敕尚書郎皆謂之清望而左曹尤貴今雖限年序擢自非臺閣之選不得豫遷焉以爾具官某地胄髙華器質和厚榮踐世職稔服省闈會課應條進曹有典自列諱終之禮且援換秩之科易以司金皆聯左户往膺寵異之渥益懋公忠之為可尚書虞部貟外郎張興宗可尚書比部貟外郎祕書丞費琦可太常博士敕具官某等夫尚書副郎奉常掌故皆臺閣之顯秩非俊良而不登考課而遷蓋疇善最以爾等或仕承世閥或文中秀科咸有吏資之明歷更民政之美姑緣嵗比敘進班聯且增寵於外官當益勤於治狀可昭宣使入內內侍副都知忠州刺史張若水可充陵州團練使仍舊昭宣使入內內侍省內侍副都知敕朕纂承丕緒尊事兩宮按故事以薦崇名揆嘉辰而考成室方慶晨昏之奉豈忘典領之勞寵以華資旌其幹裕以爾具官某早推忠藎久侍禁嚴出護塞垣之防入聯內監之長夙宵匪懈績用兼優屬中寢之即安嘉庀工之無曠俾因符守進領兵團外參握節之榮內重珥璫之貴恩褒益茂報效宜堅可皇兄茂州防禦使申國公世清可特降依前左武衛大將軍郢州防禦使申國公敕國家並建戚籓所以惇敘於九族優加命數所以表異於諸王惟繼世之既殊固推恩而必異豈容僣冒以躐寵榮以爾具官某胄出皇支系承公國間膺嗣爵之貴靡念亢宗之艱而乃屢上奏章自言統嫡有司定議當從别祖之封季春詔書巳格泛遷之典弗思悛止重有敷陳意在徼榮益彰矯妄宜從貶秩之責仍罷奉朝之趨尚追省於過尤勉欽承於彛訓可大理寺丞李得臣可守太子中舍光祿寺丞吳立禮可著作佐郎敕具官某爾籍𨽻京司職更民政廉方之守既已效於官成纍久之勤茲亦應乎功令宜甄疇於善最俾敘進於榮資爾其欽承以永來譽可前虢州虢略縣令錢公縝可大理寺丞前代州軍事判官張佑前權知果州團練判官鄭士衡可並著作佐郎敕某官等今之仕於郡縣者既限以積纍之資則其器能可見矣又難以保任之法則其操守可知矣會課來上閲實靡差置之京司是謂慎選以爾等或起於門調或進自儒科典邑佐州咸有善狀廷尉之屬蘭臺之聯皆曰美官俾之並命偕此榮路益思後勤可前岢嵐軍嵐谷縣令陳安靜前威勝軍武鄉縣令張焞可並著作佐郎前永州零陵縣令梁宏可大理寺丞敕具官某國家掄才之路至廣而銓選之法惟艱既限其纍年之勞又責于上官之薦小不應格未嘗序遷以爾勤於首公廉而寡悔知巳言狀有司校功擢置王官進階榮路其思始卒之效以副奬拔之恩可大理寺丞致仕趙賁可太子中舍致仕敕某向者大賚天下增秩庶官退休之人所宜先及蓋知止之可尚而髙年之當禮也爾早由仕綴得謝盛辰薦逢慶恩並應陟典擢列朝閨之籍足為暮齒之榮服我殊私益嚮多祉可太常寺太祝賈公述可舊官服闋敕具官某服勤效智早列周行銜恤去官近終喪紀日月云邁縞禫已除宜還簪紱之榮來就班聯之次勉思移孝式佇揚名可大理寺丞馬孝孫可太子中舍敕具官某今之仕者去銓調而列京司由考課而陟朝著雖序進之惟舊亦審核之良艱爾向以幹亷從知巳之薦今用年次應有司之條遷秩儲坊通班閨籍惟爾試吏之久宜稔修方之勤漸履榮階更圗來效可衛尉寺丞劉士彥可大理寺丞大理評事田彥卿可將作監丞太常寺太祝孫龜年可大理評事敕具官某爾出于華胄能紹世風筮仕方初服勤可紀既更管庫之效且收嵗月之勞稍進一官漸階榮路爾其勉懋以副甄升可大理寺法直樊功立可光祿寺丞充大理檢法官敕具官某祖宗以來慎用刑辟詳評審復以求厥中凡在理官實重其選以爾拔從銓調職於平廷持法不苛校年應格進擢膳丞之列仍司契令之煩益盡乃心往贊而長可守鄧州録事參軍前監道州黃富場貟素可大理評事致仕敕具官某久從銓調薦著吏勤既引年而自陳願還事而休老嘉其退尚之佚特示寵遷之恩增秩京司榮歸里社往欽厚渥足慰素懷可虢州朱陽縣主簿李庚可國子監丞致仕敕某爾仕於州縣而能持巳以廉不蹈尤悔齒既耄矣自言不能是亦知止可嘉者也秩以成均之僚俾為晚節之寵服我恩渥歸安里閭可太皇太后遇同天節親堂姪內殿崇班曹誨男易可太常寺奉禮郎敕某近者朕以載誕之辰承顔之禮乃眷近屬例均慶恩以爾長信之諸侯舊勳之昆裔嘉其幼立延以京司當念起家之榮無忘學古之訓可京朝官知縣磨勘詞敕具官某亷能之選早列於仕階撫字之求方紆於邑綬屬攸司之比課謂滿嵗以應條進以一官甄其纍效勉思勤警往服恩榮可承制以上磨勘詞敕具官某夫仕者久而不遷則才愚同滯進而不以其效則流品弗甄今有司所以限年而校功循階而進秩者由此道也爾以材武擢於治朝內外煩使之勞訖無曠事嵗月薦更之比巳應陟書稍升等於官聨且疇庸於閥閲往承新渥無怠後勤可莊宅副使兼閣門通事舍人周永清文思副使賈秀可並右騏驥副使敕具官某夫守邊乘障之臣或失於悍勇而輕進或失於畏懾而不為向非練習之有方何以綏懷而得所既彰陳力何吝賞勞以爾擢自周行列於逺塞深知兵要復察邊情嘉其任事之能宜有宿官之寵內司峻秩躐等而遷益思忠藎之誠式副褒優之命可文思副使任有方西京左藏庫副使錢昌符可左驍衛將軍致仕供備庫副使馬清可左武衛將軍致仕敕具官某夫陳力而仕不能則止是亦知夫進退之分者也得不優以名秩徇其素心哉以爾武幹吏資仕於班列勤勞之役更歷固多以疾告休所冝矜惜特遷環尹之列俾為里閈之榮服我殊私保爾多祐可供備庫副使侯元吉可西亰左藏庫副使西亰左藏庫副使王思可文思副使東頭供奉官施惠可內殿崇班敕具官某國家官人之法靡有文武之異一用考格限年敘遷所以嘉久職而勸吏勞也以爾早列周行綿更吏幹廉能之守固有可嘉嵗月之庸亦應茲令進秩一等漸履榮階益思忠藎之方以副甄升之命可內殿承制楊從先可西亰左藏庫副使敕具官某夫盜積山藪不時翦除則鄉閭之間人靡安堵乃嚴賞格以勸事勞爾為廷臣出司巡警能用方略屏擒冦姦凶徒既除逺民無患校其勳等當有優遷躐升內使之聨用奬武才之效欽承渥命益懋來勤可內殿承制杜該許士臻可並供備庫副使敕某等咸有武幹服在殿塗或案讞于邦刑副我欽恤或訓齊于州旅不懈拊循質嵗課以薦周嘉吏勞之可紀冝推陟典擢二使聯勉思宿業之勤以稱褒恩之渥可前內殿承制宋景先可舊官服闋敕具官某爾為三班吏有年數矣曩逢慶渥當陟內朝復用嵗勞再遷殿著屬罹親恤遂去班聯日月其除祥禫俄畢宜悉還於舊次俾入敘于周行祗服恩榮益虔事守可內殿崇班阮大有可內殿承制敕具官某奉朝內著秩視閨籍之榮奏課中樞嵗比吏能之最允如令格何吝恩褒以爾久踐通班亦更煩使勤庸可紀遷次有常進升等級之優用示才勞之勸勉收成效無懈守官可未復舊官人內殿崇班蘇濬可內殿承制敕具官某郊祀之澤其施普矣在位者加以勳等左遷者還其職秩所以示記功忘過之義也以爾早列周行嘗絓吏議禠官斯久逢慶云初俾進復于舊聨宜益思于後效可東頭供奉官閣門祗候趙思齊可內殿崇班依舊閣門祗候敕具官某爾以禁廷之聯通上閣之直贊名典謁服職有年校其事勞嘉有善狀考課之令遷秩有常擢列殿塗之榮仍參門籍之貴惟爾舊族歷仕近班當懋舉于官儀且無忘于世美可東頭供奉官張宣禮朱興可內殿崇班敕具官某爾補吏三班有年數矣而能勤于治職謹而寡尤校其事勞甫應遷格宜升華于殿著且通籍于朝聯益思遷次之艱更圗報稱之效可天武右第三軍都指揮使昌州刺史胡元可武衛將軍致仕敕具官某夫壯而陳其力老而謝其事固當優異使之便安以爾歷職和門兼榮州棨迫于衰耄願遂歸休擢居環衛之聯俾遂飬頥之適欽承寵命足慰暮年可翰林醫官守少府監主簿陳易簡翰林醫官守勤州富林縣主簿秦宗古可並守殿中省尚藥奉御依前充翰林醫官敕具官某周官醫師有上士中士之秩每嵗稽其醫事而制其祿食所以校能否而疇勤勞也以爾學農黃之書通扁和之技𨽻名中禁恪職有年特升六尚之聯益懋十全之效服茲優典無懈厥官可皇太后殿樊氏可典賔馮氏可典贊吳氏可掌籍楊氏可掌記敕周官女史掌內宮內令之法則今兩宫給事之職是矣閲嵗既久增秩其宜皇太后殿具官某氏言德有聞間和自飭早升宮掖祗奉母儀嘉其積勤推以優渥俾進司於典掌宜益務于欽承可太皇太后殿典言吳氏可司設典言杜氏可司正吳氏可典贊李氏可典記花氏可典珍張氏可典綵劉氏可典正王氏可典計董氏可典設敕宮省有秩典司各殊矧長信之置官事掖庭而寖久宜頒渥命用奬能勤太皇太后殿具官某氏性稟間和體姿柔婉自入承于嬪御嘉薦歷于嵗華遞升婦式之班俾重慈闈之侍往膺恩渙無怠祗欽可檢校尚書水部貟外郎充成州團練副使吳靚可依前檢校尚書水部貟外郎充定國軍節度行軍司馬不得簽書本州公事敕具官某赦者所以推大德于天下靡有逺邇咸與維新矧曰士人可無銓敘以爾早通閨籍自致敗官黜佐方州再逢恩霈宜稍遷于大府尚無詘于散僚益思省循佇期甄録可檢校水部員外郎充秀州團練副使鄭民先可依前檢校官充昭慶軍節度行軍司馬不得簽書公事敕某近嵗之法以賄敗官者雖坐輕典亦置之散秩所以責亷隅于士大夫也爾一絓吏議于茲有年慶恩滌瑕府佐移秩其益思於修省毋自怵於廢淹收之晚年豈終汝棄可萬載縣尉劉永清可蔡州真陽縣令敕夫民愚無知至為剽盜賊殺不辜其惡甚矣爾作尉逺邑能勤厥官姦宄就擒即置于法捕賞之格表勸在焉命爾長民酬茲成效尚圗來譽以副寵遷可相州安陽縣尉劉子駿可知蘇州録事參軍敕具官某爾為邑尉而能擒捕寇攘肅清里閈斯謂善於其職得不酬之以恩擢糾郡綱用勸能者益勤後效式佇甄升可祕書監致仕祝正辭男延賞可守將作監主簿敕某士大夫以老致為臣而歸斯亦始終之節可尚者得不延以世祿而慰其素懷乎矧爾父歷仕三品年至告歸秩爾京司是謂優典爾其勉懋以亢厥宗可光祿卿陳鑄遺表第四男公彥可試祕書省校書郎敕某生而任其力殁而恤其家此朝廷所以篤羣臣始卒之義也爾父致位諸卿考終明代祈爾一命以承厥家俾試秩于蓬丘且聯華于郡幕服茲厚寵勿怠清修可光祿卿知楚州竇彰男太廟齋郎汝礪可試祕書省校書郎敕某任子之令尚矣雖班等有異而世仕為優乃父方居於列卿嚴禋屬逢於大霈蘄爾試秩使之起家茲為階漸之榮宜務清修之誨可太常少卿直龍圗閣知廣州張田遺表男輔之可試將作監主簿敕某爾父才質器幹時推能臣宣力四方著稱五嶺不幸淪棄用茲憫傷俾爾一官以續其世爾其深自勉懋期於有成且無忘厥考之勤事也可禮部侍郎致仕盧士宗孫盧君佐君傑可並將仕郎試祕書省校書郎敕某時乃大父朝之舊臣方告老以言歸宜推恩而及後嘉爾幼立能紹素風特優試秩之榮俾遂承家之美無忘善訓往服殊私可守許州長史李評可守鄭州長史敕某向虧亷守遂絓刑章置于散曹示不終廢再逢寬宥從涖便州尚思省循毋謂沈恤可尚書屯田郎中致仕薑鎬男子厚可試祕書省校書郎敕某爾父仕歷閨臺位正郎列不待年至謝事而歸惟退尚之可嘉宜賞延之及嗣命爾試秩俾承厥家勉慕前修無墜門構可追官人前儒林郎守司户參軍尹良佐可鄭州别駕敕具官某爾作掾列曹在法除籍適均霈典稍濯前愆收于州佐之聯無謂恩章之薄可光州團練使同提舉集禧觀公事向經奏百姓醫人華詢可試國子四門助教敕某方技自名診治盡善屬攬通侯之奏且援試秩之科操術既明推恩何吝祗膺一命之渥益務十全之能可西亰留司御史臺正名知班驅使官王德明可將仕郎守蓬州蓬山縣主簿勒留敕某𨽻名憲府給事西臺閲嵗再周勤公寡過命勾書于逺邑尚留職于故曹彌思恪恭無怠朝夕可河東進納空名助教三十道敕某昔卜式請輸其家半財以助邊費漢世善之爾能發貨資應募郡國嘉其誠意宜有甄表假以州秩俾榮鄉閭承茲渥恩用勸厥衆可蕃官右武衛將軍兼監察御史柱國香布咩布􅷌拸可並加上柱國右監門衛將軍兼侍御史驍騎衛儂宗旦右監門衛將軍兼監察御史武驍尉嵬名山可並加騎都尉敕具官某向者禮行泰畤恩浹羣方眷言忠順之臣宜厚厖鴻之澤以爾才雄邊部心遡本朝環衛榮階早膺于嘉命禋燔慶渥特霈于殊私進加勳級之華益壯裔藩之觀爰茲受寵無怠勤王可府州靖化保屯毛州族子弟屈移可銀酒監武充本族副都軍主敕某爾父世居邊土籍𨽻轅門俄遘疾以淪亡覽守臣之保仕言爾勤事宜承舊名往膺甄擢之恩益務撫寧之效可南郊百官封贈父母妻共五道敕某夫為人子者以揚名顯親為孝非夫委質昭代陳力周行則安能推榮以逮先世曩朕郊丘已事之日肆慶天下乃俾士大夫得以陳追述之請所以隆舊章而廣孝治也以爾生而慶善之積志不得充殁而緒餘之傳報乃在後嘉爾有子仕吾通閨屬霈恩之普加推恤典以示厚營魂未泯滲澤斯承可亡母敕某郊為大祭既格于上下神祗惠浹庶邦靡間于幽明隱顯矧乃閨朝之士有懷鞠育之慈爰舉舊章優加寵命以爾婦德之順既宜其家母道之修遂貽厥子屬精禋之霈澤胙封邑以開榮用增飾壤之恩茲慰寒泉之感可父在敕某朕初卜郊大賚天下無有逺邇均蒙福釐乃眷在廷之臣咸切逮親之寵因推朝渥庸逹孝心以爾某善積于躬慶延厥後有子而仕通籍于朝宜承霈澤之榮茲顯教忠之美永錫爾祚對時之休可母在敕具官某母某氏乃者朕郊見天地祼獻祖宗承神之休均澤于下嘉我庶士方逮承顔之榮冝推渙恩用彰錫類之美以爾慈嚴之範見推內姻鞠育之仁成乃子志舉茲慶典進以邑封欽膺褒寵之光益享夀康之報可妻敕具官某妻某氏古者上有大澤則惠必及下祭其是歟日朕初見郊廟承神之休推福于天下士之立朝者既已加乎恩級而又推榮及乎私室其惠澤可謂大矣以爾能執婦道歸嬪士家時惟爾儀服我朝宷舉茲慶賜之典寵以號封之榮茂對殊私益勤內助可兩制母在改封敕郊祭之推恩也上以均天地之貺下以揚祖宗之休福釐紛然中外時若嘉我髦士方逮承顔之榮厚其寵章用光錫類之祉具官某母某氏慈嚴有度明智兩通從夫之賢固多內助之美有子而貴尚深側眄之規克成令名服在清禁宜躐封於大郡且旌善於北堂欽承優渥之恩益享夀康之福可兩制妻改封敕祭有惠下之文所以明神貺婦有從夫之貴所以厚人倫禋燔方畢於陽郊慶澤用霈於家壼具官某妻某氏德通四教行表六姻詠君子之好逑嬪風素懋循大夫之法度內治尤彰列豫近班實惟爾特屬遘邦熙之慶宜旌主饋之賢寵以封君進乎善郡祗服褒華之渥益宣輔佐之勤可太常少卿田照鄰母彭城縣太君劉氏封仁壽郡太君敕朕向以初郊大賚加禮髙年有疏封錫命之榮緣貴老近親之義某早鍾善慶克享期頥從子方仕於亞卿承顔既嘉其逮養攬州僚之列奏寵夀母以宜優特出殊私進加善郡為爾慈堂之美彰我孝治之風可故內殿崇班范願妻錢氏可封永寧縣君敕夫封疆之臣既以死而勤事朝廷之法當加等以推恩念往矜存用旌壯節以爾具官某妻某氏良家之子能臣之妻屬乃夫之戍邊由捍冦而畢命爰推殊渥俾逮厥家特疏湯沐之封用表閨門之美欽承恩奬善撫惸孤可遼山縣令賈祥母著作佐郎周綸母並年九十一嵗封縣君南宮縣令董亰父年九十一歲可守祕書省校書郎敕某向者巳事泰壇均釐列位厥有親年之耄未登封賞之科特霈殊私式彰孝治以爾夀康之福實應詔求慶善所終誠宜表顯寵以蓬丘之列湯邑之號用為子舍之榮益保餘齡無忘休渥可歸州巴東縣令元大章母年九十一歲封長夀縣君敕某夫耄期之年前世之所加禮者曩緣郊慶特俾推恩以爾既夀且康從子而仕兹誠五福之所嚮是亦積善之有憑寵以邑封旌其孝飬往承茂渥益享遐齡可台州百姓王延贊年一百一歲求歸年一百二歲可並守本州助教敕某夫貴老尚齒王政之所先矧夫百年之人五福之貴者得不加禮而優寵之乎以爾居鄉有聞介夀克永宜因郊慶之澤假以州秩之榮且俾里閭知所推尚斯亦有助於風教也可南郊致仕率府副率加恩敕某祭有大澤惠均庶工屬郊畤之禮成眷丘園之佚老例推優渥敘進榮階祗服恩華足慰恬尚可南郊諸州軍衙前加恩敕某服勞吏役歷稔公庭屬逢郊霈之恩宜被言綸之命例加試秩用奬久勤可蘇魏公文集卷三十四
