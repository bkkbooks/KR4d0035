body:
  text: 蘇魏公文集巻一宋蘇頌撰古律詩進南郊大禮慶成詩狀右臣伏以禮行於郊由古謂之大事祭得其道先聖著於格言皇帝陛下受命皇穹繼昭仁考爰初纂嗣不忘丕承大報圜丘恭展三年之禮祗見宗廟遍祀八世之靈至於朝享道宫肆赦端闕奉事長樂尊上册文惟是親行之儀莫非盛德之事上意專慤熙事備成宜有咏歌被之金石臣幸塵詞館恭覩禮文思所以攄發精微形容萬一愧無鴻筆藻潤之美徒有蕪音累句之慙出於至誠不敢自蔽謹夙夜齋祓課成大禮慶成詩五首繕冩隨狀上進干凟宸嚴臣無任惶懼屏營之至謹奏大禮慶成詩五首惟宋五世將郊泰𤣥祗若前典欽崇道尊其日吉午天時薄寒帝出齋寢朝神紫垣降輅就次被龍搢山禮薦蒼玉樂歌太安酌以瓊醴羞以靈飱飆御來格上誠益䖍思我基命系於帝軒真祖膺符錫類貽孫皇繼其志受祉彌繁炎炎景厯億萬斯年右朝享景靈宫天命有宋系軒纂唐祖武宗文積厚流光奕奕清廟八祏同堂五祀備饗百順儲祥皇帝孝思明發不忘躬執圭瓚再薦嘉觴公卿陟降鼎俎芬芳廣樂九變羣神迪甞昭我先烈緝熙萬方永思繼述成不敢康始朝于廟詩歌嗣王烈聖在天保佑我皇右薦享于太廟惟皇繼天宅位三禩靈德及逺嘉生茂遂仲冬月良一陽氣至上將告成禮嚴肆類自廟徂郊萬靈拱衞天收宿雰日麗佳氣月踰既望再登午陛對越蒼祗配以太帝奠玉酌匏升烟燎幣志盡䖍恭備成熙事玉輿旋衡歡聲沸渭皇專乃誠下䝉厥惠右有事于南郊帝陟圜丘天降之祜嘉與士民均承福祚還御端闈躬布皇度雞星驗占鵠書臚句慶浹天淵恩霏雨露滌垢棄瑕蠲租薄賦三泉靡封五刑幾措太和充塞羣心率籲自古無赦孰除詿誤我朝本仁實清弊斁赦匪其私仁則有裕萬民以懷邦基鞏固右賜赦宣德門大孝尊親治本人倫自家之政所以刑民天正元日帝郊畢禋將崇母儀爰即嘉辰正朝乾闢羽衞星陳金石既作公卿荐臻帝步西序躬咨爾臣授以册寶極其禮文羣官在位靡不歡欣謂天子孝感于人神祝天子年後于靈椿皇心匪懈聖度惟新右發册文德殿元日鴻慶宫朝拜二十韻皇祐三年任南京留守推官上國房心次仙都太紫微璧門開倣雉金闕立如翬昔聖躬三祀乘時動六飛奠圭渦曲已鳴蹕渙陽歸孚號興王澤尊名象日畿經營原廟制䖍鞏上天威祖系崇軒鼎宗祊奉漢衣豫游恩甚盛謁欵禮無違却顧和鸞跡咸嗟歳序非璿源流永永堯德冠巍巍我后遵鴻烈聲明極範圍乾坤扶寳厯日月拱琳扉朝㑹元正始班聯内著依叙官風憲肅就列羽儀輝北面鸞分黨東隅斗轉機寒銷冰玉砌風繞大龍旂瑞色花藏緑歡聲霧散霏未竣真館集遙仰帝陽晞至治尤遐邈先猷重發揮邦人徒望幸延首向端闈恭和御製賞花釣魚四照仙花次第開上林重覩属車來雨晴馳道紆天步風引濃香到壽杯瑞燕入簷時拂掠恩魚窺釣更徘徊栢梁絶唱容賡綴獨愧非才亦與陪恭和御製上元觀燈元豐五年正月畢仲衍押伴高麗賜宴樓下賜詩寶杯蓮燭豔宫臺萬户千門五夜開樓下舞韶清吹發雲間鳴蹕翠華來九賔宴集占風使四近班陞構夏材自愧周南獨留滯十三年隔侍臣杯恭和御製賜太師致仕文彦博五言六韻詩一首曉日清明霽華林物色新詔頒慈惠宴恩厚老成人衮冕三川客杯觴四府臣獻酬同飽德愷樂盡含醇帝惜營丘去民思尹氏均宸章一褒賁道不愧如仁恭和御製賜太師致仕文彦博七言四韻詩一首出處逢時道不殊當年功立老閒居來膺冕紱三公命歸奉雲章五色書社稷元臣名已遂山河雄鎮寵仍疏瓊林詔餞衣冠盛豈止都門百兩車謝賜御書詩五言十二韻聖學天攸縱宸文日又新因摛鏤牙管分賜挈囊臣玉几繙經暇瑶宫錫宴辰清躬忘旰食睿藻出絲綸才賞唐詞客人稱賀季真開編掇風什灑翰落霜筠楷法前無古書評妙入神良慙孤陋甚獲對寵光頻得異登牀誚藏過韞匵珍護持同始卒荷戴等穹旻職幸聯簪筆憂常念負薪惟勤黃巻業仰答大君仁進皇帝初郊大禮慶成詩狀右臣伏覩今月十四日皇帝躬祀南郊禮畢者三歲一郊漢唐以來為定制二儀並侑祖宗之世皆親行蓋王者謹於承天而經典重於饗帝國之大事兹實為先伏惟皇帝陛下稟堯舜之聰明監夏商之忠敬明德恤祀靡神而不宗精意曰禋無文而咸秩爰卜天正之吉躬修郊見之儀前詔攸司聿遵先典内則稟訓于文母外則詢謀于邇臣稽皇祐舊章既兩行于宗祀案熙寧故事當合祭于圜丘尊泰元富媪之靈徧六宗羣神之祀義兼聖孝禮盡情文瑄玉嘉牲合二精于志物黃鍾太蔟備六樂于神祗煙燎配黎而四施休氣欝葱而竟夕膺萬壽而褆百福叢慶于三宫暢九垓而泝八埏覃恩于庶物臣親逢熙旦叨領近司從警蹕之奔趨望廟丘之陟降贊盛德之事雖莫究于儀形聽輿人之言輒載賡于歌詠顧慙鄙俚難逭譴訶謹夙夜齋戒賦成皇帝初郊大禮慶成七言二十韻律詩一首繕冩上進冒瀆冕旒臣無任惶懼屏營之至謹奏皇帝初郊大禮慶成詩六帝貽謀聖繼明兩宫崇祀上躬行熙壇初展嚴禋報觀盥三終孝享成仰法祖宗尊本始致隆高厚罄純精告䖍並薦圓方玉在滌交充繭栗牲吉土兆南殊漢畤景圭迎至協周正羽旄備物甘泉仗觚陛層垓委粟營齋寢累朝思志意真廷穀旦奉粢盛八神警蹕敺氛沴九貊梯航入貢菁過廟徂郊紆步武撤茵停蓋肅公卿服裘尚質遵前製配册修辭正重名篆鼎割烹工奏夏午階登降斗旋衡先時非霧滋鱗隰竟夕祥光燭縵城鐘虡四廂庭樂畢樵蒸千石燎煙輕龍回雕輦昇嶢闕鶴負㤙書下采楹海外雞星占澤霈樓前鼉鼓震霆驚風雲氣應靈臺候雷雨仁深犴圄清有昊感通欽輔德聿修寅畏念持盈旁求遺逸搜巖穴寛舍租逋惠𨽻氓天錫泰元神䇿瑞民歌華黍歳豐聲老臣扈從知何補敢次輿言頌太平恭謝慶成詩十韻嘉祐元年九月代劉相作時二府皆有詩議者云皆不逮劉公者公聞之曰某久不事筆硯此親倩蘇校勘所作也人嘉其不掩善聖孝當天世繼明兩全能饗禮交行路朝躬欵三年報齋寢先端七日誠穹厚博臨通肸蠁祖宗嚴祀極專精冕章從質更新製鐘虡鏗純復舊聲先是命禮官重定衮冕制度務從簡質仍詔用舊樂舞佾前陳徽烈茂燎煙升逹上儀成不祈厚福歸諸已務達厖㤙及庶氓還御端闈孚大號載頒元厯慶鴻名歡謡沸渭盈都輦協氣旁流浹海瀛百辟旅庭紛嶽抃四方延首效葵傾帝心䖍鞏常無怠億萬斯年享治平蘇魏公文集巻一
