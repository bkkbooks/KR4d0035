body:
  text: 蘇魏公文集卷四十宋蘇頌撰表謝翰林學士承旨臣某言今月日東頭供奉官充待詔董士隆至臣所居奉宣聖旨召臣入院充學士承旨者綸出王言擢預內廷之直星馳使指頓生陋巷之光惴栗於中倣徨靡措伏以禁班親近莫如學士之榮密命對􅏡更優承旨之貴自元和之置職逮聖世之右文常擇有年德可任用之人使専大號令興廢置之事時則有若趙公之多聞博洽鄭絪之小心兢謙崔羣識明治亂之分李絳言為國家之利入贊基宥上副聖情乃如昧陋不肖之倫豈稱疇咨曰俞之命伏念臣稟生不厚操術無奇姑緣門業之傳預數文林之末歷四朝之久浸塵簮橐之聮荷二聖之知置于喉舌之地以天官掌選之重兼金華進讀之員內省至愚最為孤立每自憐於介特況巳迫於衰遲向祈辭劇而引年再被發中之賜詔復遷延于省部實出優容雖勉強于簿書愈深惕厲豈謂伏蒙皇帝陛下矜憐孤直曲賜生成因圖任于舊人俾奉行于别旨望復門之祕邃恍若神逰念繼世之遭逢重為榮遇惟先臣之昔仕被仁祖之深知再踐禁林常承于書訪屢陳讜議每見於褒稱愴徂嵗之如流偶遺孤之未殞逮此非常之寵復叨罙厚之恩對捧紫泥感極而繼之以泣仰酬渥澤力殫而豈敢愛生惟當夙夜在公靖共爾位視甎花而直入始務恪勤問溫木而不言益思毖慎自餘謹職業之守罄傾輸之誠知無不為死而後已臣無任又臣某言今月日東頭供奉官充待詔董士隆至臣所居奉宣聖旨召臣入院充學士承旨者內廷進職方拜于綸函使馹臨門復膺于召節恭聆宣語益集汗顔伏以王者之言出為大號令學士之職入與上謨謀故李肇謂樞機之慎微執誼以刀筆為餘事矧惟承旨之貴預聞密畫之先職雖清間事實要重往當兹選未易其人必也忠言嘉謨可以動中于幾會隻簡片削可以風行于邇遐見於事功乃為宜稱如臣者學如涉水愚甚守株偶傳業于箕裘幸繼榮于軒冕越自仁皇之在御獲參東觀之讎書周旋衆務之間歷更臺閣叨被兩宫之眷擢在省曹自司冦之祥刑領天官之大選三經嵗序慚無吏課之優再荷帝俞入備經闈之侍而臣衰年巳暮孤立于時嘗陳告老之誠未許容躬而去銓衡務重久任則鑒裁易疲犬馬齒衰勉強則顛隮是懼豈謂伏蒙太皇太后陛下如天之無不覆用人而不求全眷履歷之最深雖耄惛而不棄深嚴禁路蒙非次之優遷密勿邇言俾居中而專受因對時之異渥動追往之至懷言念先臣嘗更是職相望四紀顧陳迹以猶存再踐復門愴遺孤之已老永思榮遇益念教忠固當佩服訓辭勤修素業如或使定禁中之詔草當竭見聞固不敢恃天子之私人輒踰分守誓堅此志論報畢生臣無任謝入院襲衣鞍馬等臣某言伏蒙聖慈以臣入院特賜衣一對腰帶一條金鍍銀鞍轡馬一匹者仰對頒宣內深愧畏竊以給五時之服自漢巳然賜三花之驄在唐為貴况復佩金校鈎環之飾乘具裝釘轡之華皆所以著朝廷之采章異名器之等級茂惟聖世優待從官方內庭進拜之初有上日對􅏡之寵自非才傑曷稱恩輝而臣誤被咨俞顧承密命始踐朝門之禁遽叨內式之頒袍帶橫金已集曳婁之誚鞍馬照地兼貽負乘之羞此蓋伏遇皇帝陛下甄别賢能憫憐耆舊擢繼世官之美優加異數之褒思報上知誓殫晚節臣無任又臣某言伏蒙聖慈以臣入院特賜衣一對腰帶一條金鍍銀鞍轡馬一匹者賜豫優隆愧惶增積中謝竊以禁林就職占謝在廷禮式循名加賜于下便蕃異數萃集微軀伏念臣孤特寡儔顓愚自守忽膺選任直入凝嚴翰苑玉堂始識蓬瀛之祕笥衣廏馬洊承雨露之私帶環無寬急之譏駿足出上中之品粲然在目驟賁飾于躬章沃若代勞用馳驅于朝路此蓋伏遇太皇太后陛下任賢不二隆禮有加何期一介之微併叨三賜之渥仰圖報稱豈憚糜捐臣無任乞致仕臣某言臣聞四十強仕七十致事禮經之善言也壯即馳驅老宜休息前哲之遺範也自非守經據古如貢禹正色立朝如趙熹山濤之坐執銓衡柬之之躬任社稷時方有賴義不得辭苟非其人固宜遵禮臣某中謝伏念臣本惟孤進早遘休辰忝科第者四紀于兹歷臺閣者三十餘載荷先朝之奬育玷近侍之登延每念遭逢常思補報官三黜而復進恩萬分而未酬奔走四方濱鄰九死終蒙許以直道遂獲脫于丹書升二天官遷延星紀奄罹家難分委丘墦伏遇皇帝陛下纂嗣丕圖搜揚遺老誤收朽質擢置通班刑曹文部之煩洊司要劇經幄復門之祕參侍清間向以年逮傳家章言引紱仰紆賜詔未即投間雖上戴君仁寬矜彌厚而自量齒耄勉強終難况獨直於禁嚴愈懷憂于曠弛間然自視耄矣無能欲丐餘齡稍全晚節伏望皇帝陛下天恢全度川納微誠閔臣之壯不如人未嘗營于私計在禮則老有加惠莫若處于安間惟曲軫于淵衷俾遂諧于宿願聽還印綬退就里閭如此則春震秋坯同蟄戶之隨氣候勞生佚老逰天均而善始終倘未至于填溝固不忘于報國臣欲乞守本官致仕臣無任又臣某言臣聞忠以事君進退必由于禮典老而謝事倣徨忍去于朝廷倘量力之不能雖戀軒而莫及矧乎年政七十吏長子孫冒寵祿之既多顧筋骸之已憊誠宜自訟罔避黷煩臣某中謝伏念臣猥以朴儒早竊科第仁祖置之館閣十有餘年英皇擢于省臺屢更煩使暨神宗之初載自將漕以召還擢在從官典領名命每念纍遭于際會皆出聖衷常思自激于懦愚欲圖報效然而才拙于用力不逮心自取顛隮久負釁纍先帝察其戇直收自外藩官制復于省曹任以左選嵗華屢易家難重嬰偶獲生存分甘棄置伏遇太皇太后陛下擁佑嗣聖總覽政綱博求遺才誤及孱品官遷省座歷秋卿文部之煩職列內朝兼經幄禁林之直深慚昧陋無益毫分向以齒髮既衰封章疊遡雖懇祈于解組尋再被於賜書又復強顔浸淫纍月敢自期於晚節猶冒處于內廷不惟舊學之荒疏無施潤色加以衰顔之憔悴有點班聮警以官針恧于士論竊自為計亟欲就間伏望太皇太后陛下軒鑒察微堯雲覆物閔孤愚之久仕諒悃愊之無他霈發德音聽還王事俾退歸于田里聊保養于形軀雖疲曳餘年無以庶幾于先進而優遊卒嵗尚能歌詠于太平冀于未殞之前獲果畢生之願臣欲乞守本官致仕臣無任辭免尚書左丞臣某言伏奉制命蒙恩特授右光祿大夫守尚書左丞者仰對綸言進參省務揣循叨冒進退倣徨臣某中謝竊以聖政維新允資耆哲之輔治體所繫兼用儒雅之流矧今丞轄之司實亞公台之位萬幾密勿論議得以預聞六職典司得失由其糾正自非才周世務識照事先言合嘉謨舉無遺策則何以上贊國論外協人言伏念臣涉道非優瘝官寖久四朝樂育獲陪英俊之遊兩禁踐􅏡空塵侍從之事以內廷畨直之貴奉邇英晝接之咨日望清光已極榮遇惟齒髮之遲暮禮在引年顧簪橐之光華絶無進望詎期聖奬曲記舊人録其寸長委以重任雖由久故而見用自惟職秩之非輕輒抗遜章仰煩諭詔伏惟皇帝陛下亶聰稽古則哲知人盡羣下之智愚察孤忠之朽鈍拔登近輔將以責其施為揆度寡聞無以稱于眷待伏望俯回睿鑒追寢誤恩息器小任重之譏遂人欲天從之願顓蒙所守譴斥是虞臣無任又臣某言伏奉制命蒙恩特授右光祿大夫守尚書左丞者久塵法從無裨補于萬分進二政樞敢覬覦於大任忽被發中之詔驟加非次之榮自度瑣才豈堪冒處臣某中謝竊以中臺議政蓋待天下之豪英近輔登賢實贊人君之聽斷自非器識足以達大體論議足以折羣疑素為時望之所歸豈副淵衷之虛佇如臣者齒髮衰耗知識迂疏以積日纍久之勞寖階華顯遘二聖重光之運徒幸遭逢惟是斗筲之才固非廊廟之器敢圖隆眷猥賜俞咨二轄紀綱俾之糾正萬幾密勿得以預聞側聽恩除益增震悸封章雖罄于誠懇莫動天心名器實假于孱虛懼貽物議伏惟太皇太后陛下凝神道奧留意人才稽堯舜之建官法乾坤之造物修明治體方期表正于庶邦圖任柄臣豈謂甄收于一介伏望曲回睿鑒深諒丹誠許追寢于誤恩庶稍安于愚分誓堅晚節少報鴻私臣無任謝尚書左丞臣某言伏奉制命蒙恩特授臣右光祿大夫守尚書左丞纍具辭免蒙降詔不允仍斷來章者進二鼎司豈瑣才之宜稱遜辭綸命荷中札之批還悃愊莫從寵光逾渥臣某中謝伏以尚書百官之本二丞六職之先法天運平猶北斗之為喉舌掌邦典憲處中臺而振紀綱恭惟元豐之治官大復南宫之故事特升省轄超亞公台故每用久歷侍從之官參以更踐藩垣之守進聮揆路預聞政機委任責成絶覬倫等必也素有時望顯著事功列在近司乃厭羣議如臣者朴學無取老智益惛以七十衰頽之年遘二聖重雍之運典衆職之務既不能振舉于朝規侍清燕之間又無以發明于聖學浸淫嵗月靦愧面顔亦嘗自訟以告歸猶念上恩之未報詎謂聖神之圖任思用老成曲收簪橐之舊人使參大議自惟昧陋曷副咨俞繼瀝懇以控陳終賜書而趣拜倣徨受命進退惟艱此蓋伏遇皇帝陛下體天德之清明攬治典之纎悉因任原省使人各盡其器能周爰咨詢舉衆必求于公議何兹僉屬誤及孤愚雖祿厚官尊本淵聰之虛佇而識迂才薄惟報稱之仰圗臣無任謝賜生日羊酒米麵臣某伏蒙聖慈以臣生日特遣中使降詔書賜臣羊酒米麵者丞轄備官猥叨于器使弓蓬記日嗣辱于匪頒荷飲賜之所加顧人流之非稱臣某中謝伏念臣才非逺用仕遘亨辰守朴學以為資躐通班而冒進荷囊就列久塵清切之塗陪幄宣謀初預弼諧之寄所慚菲陋上誤咨俞適經載育之辰罙切免懷之念豈謂伏蒙皇帝陛下太皇太后陛下推隆盛禮假寵輔臣發詔璽以敷言豐燕肴而示惠餼牽物腆廩稍數優對使馹之光華悚家庭之榮觀雖親生劬瘁愴弗逮于承顔而君賜便蕃誓益思于砥節仰酬鴻造敢愛微生臣無任權樞密院謝傳宣入伏早下臣某等伏蒙聖慈特降中使傳宣樞密院入伏值無公事商量早下者金火相乘屬炎威之方熾絲綸誕告念官守之服勤俾夙退以少休荷宸慈之彌厚伏念臣等揆材無取被遇過優肉食寡謀空預聞于國論臺居甚寵曽靡觸于歊蒸伏蒙皇帝陛下道運乾行德恢天覆循纍朝之典則順時令之慘舒候屬藴隆恩周近輔堯雲在望共分美蔭之仁樊衮無裨益切進思之效苟惟報稱敢憚捐糜臣等無任又臣某等伏蒙聖慈特降中使傳宣樞密院入伏值無公事商量早下者炎曦可畏適臨上伏之辰官次恪居特軫清衷之慮屬當晝景俾遂燕休伏念臣等猥以瑣材叨塵近列髙官厚祿每懼素餐之譏愛日視隂敢有獨賢之念伏蒙太皇太后陛下恩霑動植禮遇臣鄰曲推扇暍之仁更廣濯風之惠雖沿故事蓋出至慈黽勉在公方欣逢于化日委蛇夙退當益念於匪躬庶效涓埃少酬覆育臣等無任乞致仕臣某言臣聞時來則仕既階華顯之塗年至而歸蓋重初終之分矧朝廷之故事在典禮之明文義固當然辭非妄飾臣某中謝伏念臣本由平進誤被上知居無閥閲之可稱每懼負乘之取纍目營耳剽顧雖勞而無功嵗會日成謂有餘而不足晚遭際會驟見甄收執讀代言常不離于帷幄贊元經國復參管于機衡幸逃逭于大何已侵尋于暮齒送車祖帳敢希疏傅之榮良藥善言庶遂孟詵之志伏望皇帝陛下仁同天覆恩遂物宜矜犬馬之力疲許丘園之佚老桑榆晚景猶均化國之暉松柏素心終守嵗寒之操臣欲乞守本官致仕臣無任又臣某言臣聞事君以義貴全進退之宜行已有方莫重始終之節矧過傳家之嵗難逃竊位之愆敢布懇誠仰祈天鑒臣某中謝伏念臣性質甚戇胸臆無奇生遭纍聖之右文世守顓門之陋學居官任職自知無以過人置散投間固亦分之宜爾勤勞未效憂患相仍已迫衰齡驟蒙殊用纍踐更于朝禁遽擢二于政司中臺綱轄之權既叨典領內管樞機之務復使預聞事無補于毫分慮徒殫于千一容躬而去幾同車相之處中舉善而成猶愧祁奚之請老伏望太皇太后陛下心推善貸仁憫無能俾退伏于丘園許上還于印綬優遊聖代尚陪擊壤之民休佚餘年庶養負薪之疾臣欲乞守本官致仕臣無任第二表臣某言臣近上表引年乞致仕伏蒙聖慈特賜批答不允者抗章引分粗陳止足之誠出綍敷言更示優隆之禮恩厚而莫知為報情迫而尚復有辭臣某中謝竊以曰老而傳古有引年之制不能者止義當謝事之時自非德業被于生民勳勞在于王室繫當時之輕重難自遂於便安則何以既越挂車之期獨忘竊祿之咎在臣愚慮實愧斯言念忠孝之規固無云補憫官職之事願賜少休伏望皇帝陛下天縱至仁山藏不逮矜巳衰之齒髮既久事于軒墀筋力無堪難處喉脣之地田園自適冀從斑白之遊倘或保全于天年尚能歌舞于聖治臣欲乞守本官致仕臣無任又臣某言臣近上表引年乞致仕伏蒙聖慈特賜批答不許者需牘輸誠緣犬馬之齒耄言綸示眷知天地之恩深既迫衰殘尚難寢默臣某中謝竊以髙位厚祿朝廷所以待雋賢佚老全生古人所以善終始矧在孤愚之分纍遭際會之榮夙夜在公雖股肱之力是竭日月逾邁顧桑榆之景已侵屬貪戀于熙辰久倣徨于近序浸隳禮典益懼人言願還三徑之居避賢者路冀寓一㕓之籍為聖人氓伏望太皇太后陛下洪造全功至仁從欲憫年齡之遲暮俾閭里之安間倘盛德有容得遂保全於晚節則餘生未殞猶能陶泳于聖時敢忘頂踵之恩永戴乾坤之施臣欲乞守本官致仕臣無任蘇魏公文集卷四十
