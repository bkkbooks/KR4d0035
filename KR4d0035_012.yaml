body:
  text: 蘇魏公文集卷十二宋蘇頌撰律詩三月十七日三舍人宴集西省劉叔貢作詩貽坐客席上走筆和呈簮纓曉入鳯池西雨過重廊不踏泥禁掖英僚初拜慶儒林舊侣許攀攜兩朝雲露陪嘉宴二紀塵埃愧舊題四户對開參國論風流無復羡南齊和胡完夫侍郎再次前韻見寄荷橐相從兩掖西清塵自不間汙泥恩頒玉醴同霑醉坐簇宫花任折攜幸接劇曹聨四選曽觀大筆賦三題因吟將相門生詠牛白聲名便欲齊和陸農師侍郎三和前韻主人滿酌玉東西坐客無辭醉似泥此日逢迎皆笑語幾年南北歎暌攜早登雞省先諸彥陸農師自西掖入南宮合入鼇坡試五題唐賢將入翰林皆先習制詔誥詩賦凡五題雅道寂寥今復振士風一變始於齊和農師四和前韻仍有推奬鄙薄之句再次韻敬輿平日始來西老拙方叨掌武泥初見魚龍起騰躍從陪鵷鷺共牽攜儒林盛會霑恩飫雲閣新圖預客題是日農師出榻寫美成殿將相橫卷令坐客題跋更聽髙談造名理人間無物不均齊坐中農師多談莊語答胡完夫示及四和前篇書名曽伏庾征西詞命宜封玉檢泥前日星垣同屬詠即時墨客巳潛攜豈惟家集分門録直待郊居滿壁題更覽晉祠新石刻從來文體壓梁齊完夫兼示親書河東二碑刻胡完夫再示西省唱和詩特記曩遊過有謙屈率爾𢋫次當年覆實子亭西嘉祐四年三月殿試某忝覆考官宿次在景福殿水亭之西曽見春龍起蟄泥晚接官聫方喜幸老憂顛踣待扶攜入蘭遊霧蒙薰潤激濁揚清望品題蹇步強攀英俊躅終然駑驥力難齊陸農師又示第五和篇褒借益勤輒復酬答講序嘗登虎觀西璽書封罷武都泥前言往行推多識細管纎鋒不自攜信史巳成知有法好詩頻寄更無題就中醉墨人偏愛應與南朝小謝齊諸公唱和多記經歷之事因感昔遊復用元韻凡三首十年不到掖垣西舊路重尋壁巳泥某自元豐初赴西掖蒲傳正李邦直黃安中三舍人禮上逮今十年方再來而舊院改移不復昔日故云四戶貴同公鼎重近制舍人分預朝政與昔時事體不同九門髙共斗杓攜追思往事驚陳迹欲和長言怯巨題老見諸賢雖縮忸不量綿力尚思齊又朝鞍早過鳯樓西雨浥輕塵未有泥頒宴百壺人共醉演綸雙筆客同攜紫微舊刻蘭堂閟仁宗篆賜紫微閣四字舊在院元豐中遷入羣玊殿不得復見矣朱字新牌藝院題神宗更新舍人院命翰林待詔朱書牌額以賜更識訓詞深厚意言成膏澤惠編齊又平生南北與東西豈是揚波與汩泥晚入金門諸彥接來同綺席賜尊攜時逢寵渥欣陪預老遇風光懶詠題共戴君恩何以報惟將聖壽祝天齊重次前韻奉酬子由子開叔貢三舍人二首都堂直北正衙西同日三賢拜紫泥供張府泉批敕賜刋碑朱墨典籖攜姓名非夕金甌覆手筆他年玊簡題制詔溫純詩什健若非元白更誰齊又公宴將闌日欲西酒酣揮汗浥如泥重陪簮槖聫鑣出仍得篇章滿篋攜直舍恍迷新戶牖賜書猶識舊籖題中宴憩於東廡見舊院所賜監書盡在几案歆動久之豈惟夢想鈞天路更似聞韶子在齊鄧聖求承旨疊貽佳句過有褒稱無言不酬雖復牽強以多為貴固已數窮大雅旁通諒無誚斥召節從來蜀道西遺思人尚襆青泥禁中手筆由裁制天下英雄在挈攜公屢試多士及知貢舉密議金鑾應有記韓偓承旨有金鑾密記登庸石刻佇重題元稹為承旨學士作題名記云十七年中在是職者一十人而九人參大政次年稹亦入拜綸闈盛宴仙鼇會飛集翩翩五鳯齊是集內外制五人次韻劉叔貢舍人從駕鼇頭星掖貴兼清不似南宫散六卿繼踵棣華聫禁直並時蘭玉占髙名甘泉法從皆才傑皇祐孤臣獨老生某皇祐中忝職館閣領博士數預祠事得陪從官之末自歎荆枝半凋落若論宗戚亦霑榮某早蒙子瞻昆仲敘宗契貢父亦舅氏姻家固嘗通舊李公擇尚書見示出郊奉雩祀馬上口占七言四韻走筆繼和雩郊幾夕見龍星盛樂初諧六變聲前四日按宫架大樂薦幣禮同匏爵重潔牲人比玉壺清幕中閎辨通宵接馬上新詩頃刻成精意預期甘澤應隨軒飛入鳯凰城是月閔雨次韻諸公從駕景靈宫二首青鵷如跂萬椽勻地接璇流隔世塵三后在天歌下武一人膺福見君陳珠旒漆漆懷濡露玉案年年侍薦新廡下丹青從臣列左趨蕭丙右甘辛太清宮廟近蓬萊唐正內號蓬萊宫而太清宫有列聖真像每嵗朝享連日天門六扇開萬乘旌旗衝曉過兩宫輿輦詰朝來城中三水河通漢庭下千官棘映槐老稚扶攜同祝聖年年常此望昭回次韻王都尉團練押賜髙麗歸使宴射贈館伴舍人兼呈諸公通侯年少侍中郎主客名園滿國香賜酒九行勤貊使一帆千里送吳航鳴弦屢奏前籌捷摛藻俄傳秀句長更與詩翁相屬和驪珠數百透函光事見元微之集外詩和門下侍郎東臺夜直見寄五年班綴望夔龍曽托帡幪庇雨風末路自矜黃髮老平時曽識黑頭公升沈不改交情見出處雖殊趣舍同謾叩蕪音答髙唱終慙下管應清宫和門下相公從駕幸太學聖主恢儒率舊章首冬鳴蹕下膠庠生師褒博趨鱣序文武端嚴列鴈行承詔敷陳商戊甲執經環立晉袁王三千學者多才秀定有同升孔子堂次韻陳元輿待制新懷州呂侍講見寄繕性雖知衆射標頽年無奈羽譙譙覃懷新守紆髙斾寧海元侯駐纍喬重喬纍荷憶擬曹鞭渦水賦某早嵗守亳社與待制同官屢有唱和嘗陪戴席德陽朝侍講在邇英數相接郡齋繼日聽餘論不復牢愁詠大招答陳再次前韻牛斗經年望建標忽聞行李度南譙元輿自廬易杭陸行由滁陽路至廣陵仙舟復喜逢元禮飛御仍煩接子喬已試演綸成典册尚勞分竹偃藩朝海沂邂逅誠多幸繼日相過不待招竊憶舊遊再賦一篇早見登龍奪錦標繼聨官契仕蒙譙某守亳日元輿知蒙縣雕章屢愛函京作宰樹常論故國喬久歎徊翔淹禁閣方欣良直贊清朝前篇謾約林泉訪祗恐羣公賦反招走筆次韻察推見别二篇行藏無意但隨時不為人知我者稀負殼蝸牛初就舍馴鷗海客已忘機緘收卷軸塵生蠧合和丹丸醭有衣久雨茶藥損壞久冒寵榮無所補敢煩從事歎巍巍巍巍見吳志陸遜傳又老愛詩書志益堅不成魚網謾臨淵幽居喜見新松菊病目愁看舊簡編事任間忙常自適心忘毁譽敢求全知君有意論騷雅何日從容話極玄和通判白同朝散見别樂土民勤不帶牛觀農時得看耕樓隨犂下粟謂之樓種老慙卧閣思投紱恩假祠宫換典州就第未荒三徑菊初冬晚菊盛開過江無俟五湖舟題輿别乘方騰逸詎肯相從物外遊和劉明仲都曹見别三首二年為郡樂刋坡喜遇豐年萬物和政拙未能觀水薤氣衰時復詠煙蘿朱方亭下歸心速揚子橋邊别淚多禁職祠官容佚老晚蒙恩澤更雱沱久汙朝寵老非宜祿厚躬間不爾虧優詔還令使真室特恩仍免覲京師力疲都是垂頭馬志適何殊曳尾龜年事巳髙心慮息山堂無俟德璋移幽居鄰有萬窠松豫所居北鄰有刁氏園號萬松嶺坐見京江四面峯形若橛株隨倚徙愁如頑礦漸銷鎔尚紆軒冕心顔厚但覺林泉興味濃茗飲藥苗留待客時時賔友自過從豫飲酒絶少但喜啜茶家山多藥芽可為籩實太平守梅學士隔濶纍年會遇京口喜道舊故特枉篇章勉次來韻二首老汙朝紱退方榮真室官猶寓帝城中太一宫敢詫丘園蒙賁飾深慙韁鎖濫名聲安居幸巳歸間燕飽食將何答聖明珍重雕章勤奬借久要情好見平生其二學海儒珍昔所知于今刮目異常時蝸廬何幸紆千騎螢燭多慙對九枝見牛僧孺集鉛摘次書才贍雅麈毛揮辨狀清羸竹符藝省翻留滯可是青雲緩步遲大夫七弟有慶新居二百四十言次韻和之勿謂衡茅陋門墻亦僅全山連京峴外水接漕渠邊喬木傍行列幽花晚秀妍子孫環舍後兄弟對齋前樹果非求息臨流靡察淵卜鄰同晏宅任地得周廛城中多屯田地所居係兩稅往復康莊路過從鄉里賢招來三徑士見明山賔傳疏引一人泉東園小池微有泉水金谷雖慙石蝸廬已勝先焦先蒸嘗時近享香火道心虔左右岡兼阜縱橫陌與阡思歸誠久矣到此是終焉籬援叢芳枳庭除繞碧鮮尚之南學逺休璉北邙偏街栁長垂帶堤榆未墜錢忩間靖節傲梧老惠施眠去國魂勞斷銘恩骨待鐫幸安蓬戶奧烏用鐵樞堅刁嶺東隅見林莊幾世傳杉松髙掩抱嵓麓勢聨綿搆築多遺址經營信昔緣豫營此居有年矣初惟得一山麓地甚窄刁景純學士割栁南數畝相助其後又買十餘契方稍完考其舊址皆南唐林太師仁肇故園宅板築時猶得舊磚瓦林亦溫陵人而家此今豫居有之信非偶然耳毋勞借官地裴子野借官地數畝為茅屋而居便可入寥天歌哭于斯室耕桑待有年誰知真趣在平地即神仙七弟示詩後又改緣字為川字因再次韻幽棲新得地朴飾敢求全一畝真儒有三年近道邊營搆此居巳三年矣鋤荒還見舊地本蔬圃平治見磚甓乃是林太師舊宅革陋遂成妍棟宇依嵓畔煙雲入檻前人非勝土木心每懼氷淵州處來間燕山居隔市廛軒忩橫列岫屏嶂對先賢近造十屏畫昔賢事迹以為座右之戒念昔初經始惟蘄逺水泉丘園寧待賁宗廟貴為先幸免靈臺寄後漢第五頡鄉里無田宅寄止靈臺中重叨真室虔豫一領集禧再叨中太一宫頤生無異術送死有新阡近得樂安亭山亡室葬于彼世慮都忘矣勞生此息焉道腴甘淡薄食邑減芳鮮士譽言功德僧談半滿偏未從招隱客不費買鄰錢謂刁景純輟地相助欲以結鄰晝靜龍鬚坐宵寒龜殼眠近創蒲團紙帳藉莎毋剪剃即石不磨鐫假職恩良厚歸田志益堅秋毫知帝力清白自家傳吾弟欣堂搆長言紀瓞綿思親樂京口懷土限閩川江左步兵酒華陽小有天銜杯蠲痼疾行藥助修年更有扶衰物鄰家十八仙前日會王正仲家衆客評酒品十八仙清而味美飲之不病潤守修撰見招與左丞王公大夫俞公東園集會賔主四人更無他客某頃為南都從事值故相杜公與王賔客煥畢大卿世長朱兵部貰馮郎中平同時退居府中作五老會一日大尹廬陵歐陽公作慶老公宴而王畢二公以病不赴中座亦只四人某時與諸僚同與席末言念往昔正類今辰然自皇祐庚寅迄今元符巳卯整五十年矣撫事感懷輒成七言四韻曽覽祁公五老詩仍陪三壽燕留司今逢北固開尊日正似南都命席時喜奉笑言揮麈柄却慙衰朽倚瓊枝定知此會人間少白樂天詩云除却三山五天竺人間此會定應無五十年才一再期發句米奉議見示與諸公唱和北山壯觀佳篇因索鄙製老病久棄筆硯勉強口占小子次韻奉酬岡陵起阜崇花木露夭濃襟帶湘泯水屏圍晉楚峰地全居爽塏人不厭迎逢倣佛觀平逺分毫見栝松欲狀江山秀無如格律詩形容天際美假借筆端奇注目臨滄近沿流北固卑不因篇詠見絶景有誰知右和壯觀亭省座來分聖主憂仙翁常作北郊遊瓜田接畛尋期會菊蕊浮杯阻獻酬壯觀風騷歸作者平山歡宴集清流從兹淮海登臨趣樂事良辰屬二州右和王崇禧寄揚州尚書吏部頓郎中起陸尚書佃與同年因迎哲宗神主集班西苑追思昔預聞喜逮今三十一年再至感舊𢋫唱長言逺垂寄示老病讀之不覺感嘆強次前韻以答嘉貺集英親䇿際天人曽見諸賢解褐巾薦棘校文欽藻思華林頒宴接車塵年光世故推移久士論朝咨寵遇新老病忽紆懷舊作長吟猶憶曲江春熙寧二年神宗初御集英放榜豫時以知舉官侍立扆前及賜聞喜宴亦預班列廣陵芍藥盛開品目比舊又多纍日與同官賞歎不足因記嘉祐中西臺吳大資與留守宋丞相唱和二篇吳詩有不逐新竒爭世玩却憐陶菊與莊樗之句宋答云松篁何意常如舊間倚霜空不肯凋意有未盡輒成二章應是圓玄降瑞精見舒元輿牡丹賦散為穠麗遍𨝍城重苞疊蘂三春後膩臉豐肌百態生一自毫堂甄異品至今花譜續嘉名都緣尤物多奇變豈為繁華逐世情稟質由來自絶倫誰將巧思變天真鄭風謔贈緣情密謝守翻階得句新菊聚萬鈴樗大本松添七鬛竹浮筠未知妍陋從何辨等是生成一大鈞蘇魏公文集卷十二
