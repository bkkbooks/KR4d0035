body:
  text: 蘇魏公文集巻二十七宋蘇頌撰内制明堂奏告太廟八室册文維元祐四年嵗次己已九月戊辰朔十三日庚辰孝曽孫嗣皇帝臣某謹遣某官臣某敢昭告於僖祖文獻睿和皇帝伏以徳厚流光發祥自逺子孫萬世以顯以承顧惟眇躬克荷隆構季秋吉卜宗祀明堂前飭攸司祗嚴祼獻惟誠克孝庶或享之謹以嘉玉量幣柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦清酌式達至誠文懿皇后崔氏配尚饗宣祖册文宣祖昭武睿聖皇帝伏以維天之命有開必先挺生真人繼育神聖文謨武烈奄有多方式舉宗祀載懐祖徳先期備物用展孝思有菲惟羞至誠是達昭憲皇后杜氏配太祖册文太祖啓運立極英武睿文神徳聖功至明大孝皇帝伏以運當五季天祐下民上聖膺期光宅四海削平多壘載張皇綱肆及菲凉獲承統業祗循祖武敢怠時思享嘗大庭前期祼獻遣臣攝事尚監兹誠孝惠皇后賀氏孝明皇后王氏孝章皇后宋氏配太宗册文太宗至仁應道神功聖徳文武睿烈大明廣孝皇帝伏以武定天下文致太平盛徳成功重規疊矩子孫承繼方夏謐寧時維季秋霜露既肅大庭宗祀清廟告䖍祗荐苾芬用達誠懇率禮弗越維其右之淑徳皇后尹氏懿徳皇后符氏明徳皇后李氏元徳皇后李氏配真宗册文皇髙祖考真宗膺符稽古成功讓徳文明武定章聖元孝皇帝伏以祖宗受命維皇繼之禮樂告成于時備矣保和戎狄勒崇岱宗治道粲然敷遺後嗣季秋大享夙展時思永言保之福禄攸降皇髙祖妣章懐皇后潘氏皇髙祖妣章穆皇后郭氏皇髙祖妣章獻明肅皇后劉氏皇髙祖妣章懿皇后李氏配仁宗册文皇曽祖考仁宗體天法道極功全徳神文聖武睿哲明孝皇帝伏以崇道尚徳持盈守成四紀君臨萬方底定仁霑動植恩及蠻夷翼子謀孫後世永賴涓卜秋季祗事上神荐告宗祧用嚴孝享皇曽祖妣慈聖光獻皇后曹氏配英宗册文皇祖考英宗體乾膺厯隆功盛徳憲文肅武睿神宣孝皇帝伏以昊天睠命文祖受之至徳升聞萬方歸往靈承前烈汔致隆平遹駿有聲用開厥後顧惟眇質獲嗣丕圖宗祀路庭陟配昭考聿嚴薦享用達衷精庶幾顧歆永綏福禄神宗册文皇考神宗英文烈武聖孝皇帝伏以聖徳神功文經武緯臨御四海十有九年修己安民仁霑恩洽肆惟寡昧荷兹燕貽大享總章祗修嚴配先辰荐祼庶達孝思表皇帝宿齋第一日問太皇太后聖體表臣某言齋幄端誠恭致總章之祀寢門問膳阻趨崇慶之朝定省以時晨昬在念仰惟興止彌固福禧問皇太后聖體表臣某言奉堂筵之大享預㓗齋居侍晨夕之温顔少違慈幄興言視膳惟切馳誠慎御太和益介丕祉問太妃牋某言禮嚴宗祀方㓗慮於精明躬逺慈顔闕問安於晨夕乃誠眷戀不捨斯須仰惟興居克保休福皇帝齋宿第二日問太皇太后聖體表臣某言合宫致孝禮先内外之齋西朝問安心結晨昬之戀迨兹越宿阻於承顔益御天和永隆邦祉問皇太后聖體表臣某言交於神明將奉帝親之享思其志意載嚴祭祀之齋瞻望庭闈不遑朝夕仰惟比日燕御安和問皇太妃牋臣言嚴父配天屬謹齋祠之恪晨羞夕膳少違就養之方宫閤非遥瞻言尤切届兹霜序順履嵗祥皇帝為禮畢謝太皇太后表臣某言肅若舊典大庭具舉於宗祈燕及皇天文母誕膺於繁祉惟是熈成之備率由慈訓之隆省侍非遥慶欣兼集謝皇太后表臣某言講三嵗親祠之典奉季秋大享之儀宗祀禰宫克配上帝遂慶成於熈事盖承訓於親庭即獲瞻承倍深慶豫謝皇太妃牋某言季秋仲辛大庭宗祀上帝是享文考配神惟鉅典之休成本慈躬之訓助即還寧省竊抃衷悰明堂禮畢奏謝内中諸殿閣三清諸聖等表伏以厯吉季秋展祠陽館躬執珪幣並享帝親荷神靈之顧歆蒙貺施之均溥永思昭報敢怠衷精明堂禮畢奏謝内中欽先殿諸帝后表伏以三嵗親祠國之大事合宫禋享月以季秋祗薦上神陟配昭考竭至誠於備物祈厚福於黎元荷天降祥已事如禮敢忘翼勵仰荅靈休諸帝后等陵奏謝明堂禮畢表臣某言近以季秋仲辛明堂大享獲休成於熈事賴敷祐於明神言念貽謀后云先慈敢忘勵翼即陵宫而展報冀冥鍳之丕昭恭達孝思永期福祚明堂禮畢奏謝諸陵帝后表伏以禮行世室遵嚴父配天之文澤布寰區遂協氣祥風之應實孫謀之燕翼致熈事之備成顧惟眇沖敢忘祗率式陳薦報冀達精誠明堂禮畢奏謝内外諸神廟嶽瀆等處表伏以合神事於内朝聿嚴宗祀致燎煙於太一遂底熈成荷錫羨之降康實敷天之蒙福仰惟靈祐相此成儀是罄芳馨不忘貺施明堂禮畢奏謝内外諸宫觀表伏以大事在祀躬展享親之儀精意曰禋克遵配帝之典薦盥云畢神靈居歆汔此休成率繄沖貺爰致吉蠲之報永孚穹昊之休永厚陵等處泥皮墜落修完奏告懿徳皇后英宗皇帝表臣某言伏以式瞻陵闕近在都圻嵗月屢遷風雨攸斁禮有増飾工用圬墁興事之辰不敢不告臣無任精䖍激切之至謹差某官某奉表奏告以聞臣某誠惶誠懇頓首頓首謹言元祐四年十月日孝孫嗣皇帝臣某上奏永昌陵下宫前殿廊屋等處疎漏奏告太祖皇帝表臣某言伏以祗奉崇陵式嚴閟宇嵗月滋乆風雨攸侵慮摧剥於榱楹當繕完於土木恭因揆日敢告僝功臣無任精䖍激切之至謹差某官某奉表奏告以聞臣某誠惶誠懇頓首頓首謹言元祐五年二月日孝曽孫嗣皇帝臣某上奏罷散朱表臣某言近以霖雨不時原田寖害託居人上懼失農收罄精禱於天神冀廓清於雲族芳薫始荐霽景遽開荷陰隲之昭融致函生之泰豫有䖍報禮式竚監觀祈萬靈之降休俾庶證之時若益加嚴恪仰對明威神宗皇帝忌辰朱表臣某言永懐昭考遺弓劍以上賓始屬諱辰案科儀而殖福延企列真之祐仰資仙馭之游罙竭孝思䖍希㝠助謹奉表奏告以聞臣某誠惶誠懼頓首頓首謹言在外諸宫觀五嶽四瀆等處罷散明堂禮畢道場朱表臣某言近者殊庭荐鬯太室升煙克成帝享之儀實賴淵宗之廕禮嚴昭報誠盡吉蠲仰依沖妙之功永祚丕平之運坤成節奏告内中露香表伏以祗荷慶靈協臻泰定適届誕彌之吉載殫精慤之誠肅荐芬馨上通霄極庶回况施益嚮壽康永昭陵神臺泥皮墜落奏告仁宗皇帝慈聖光獻皇后表臣某言伏以陵寢崇嚴塈塗完宻偶兹摧圮即用修墁敢祗告於祠庭冀克寧於神宇仰瞻如在尚鑒兹誠青詞中太一宫謝晴青詞嗣天子臣某謹遣某官臣某請道士三七人於太一宫開啓謝晴道場七晝夜罷散日設醮一座二千四百分位謹上啓元始天尊太上道君太一老君混元上徳皇帝近以常陰作沴滛雨彌旬下民其咨多稼將害因肅嚴於真館期降格於昊穹精意上通膚雲遽斂感不旋日實賴於神休嵗亦有秋敢忘於美報尚繄沖廕冀底登平無任懇倒之至謹詞景靈宫天興殿雅飾了畢開光明奉安奏告聖祖御容青詞維元祐四年嵗次己巳九月戊辰朔二十七日甲午嗣皇帝臣某謹遣昭宣使和州刺史内侍省内侍押班管勾景靈宫臣趙世長謹上啓聖祖上靈髙道九天司命保生天尊大帝伏以帝福萬世開景命於皇基道法自然奉真儀於靖館屬載嚴於像飾用祗告於常居仰竚飆遊即安䆳宇寧神斯在介祉無疆無任懇倒之至謹詞西太一宫開啓神宗忌辰青詞維元祐五年嵗次庚午二月丙申朔五日庚子嗣天子臣某謹遣供備庫副使管勾西太一宫臣任克明請道士三七人於太一宫開啓神宗皇帝忌辰道場一月罷散日設周天大醮一座二千四百分位謹上啓元始天尊太上道君太上老君混元上徳皇帝伏以先皇厭世垂盛烈於無窮大道案科荐洪禧於罔極式臨諱日預叩真乗庶憑齋禱之功永助仙遊之邈無任懇倒之至謹詞中太一宫真室殿開啓祈雨道場青詞維元祐五年嵗次庚午二月丙申朔二日丁酉嗣天子臣某謹遣入内内侍省東頭供奉官勾當龍圖天章寳文閣臣王綬請道士三七人於中太一宫真室殿開啓祈雨道場謹上啓元始天尊太上道君太上老君混元上徳皇帝伏以春為陽中萬物待資生之澤雨弗時若庶民懐焦亢之憂敢致潔於清場用祈靈於真室伏冀穹旻降鑒甘澍普霑獲五稼之豐登俾羣生之茂遂仰繄神貺克底時康無任懇倒之至謹詞明堂前二日於景靈宫保寧閣上下分獻青詞維元祐四年嵗次己已九月戊辰朔十二日己卯嗣皇帝臣某謹遣翰林學士承㫖光禄大夫知制誥兼侍讀上護軍武功郡開國侯食邑一千二百戸臣蘇某謹上啓聖祖上靈髙道九天司命保生天尊大帝六位仙官伏以涓季秋之仲辛奉大庭之宗祀禋類上帝升配禰宫敢率祭儀恭陳荐禮無任懇倒之至謹詞在外諸宫觀五嶽四瀆等處開啓謝明堂禮畢道場青詞維元祐四年嵗次己巳某月某朔某日某甲子嗣天子臣某謹遣某人請道士某人於江寧府茅山開啓明堂禮畢道場某日罷散日設醮一座二百四十分位謹上啓元始天尊太上道君太上老君混元上徳皇帝近以宗祀明堂克配上帝仰資沖廕遂底熈成敢遵科醮之儀昭達衷精之懇尚祈道妙敷祐邦圖庶臻泰定之祥永荷清靈之貺齋文後苑華景亭開建謝晴齋文維元祐四年嵗次己巳九月戊辰朔二日己巳皇帝遣入内内侍省内東頭供奉官勾當後苑譚扆等請僧三七人於後苑華景亭開建謝晴道場七晝夜近以候屬秋成時恒雨若民憂害稼禮有禜門即禁籞之華林闢祇園之净㑹覺慈垂祐陰沴遽消載嚴贊唄之儀用荅休嘉之應庶蒙神貺永庇人天謹言相國寺開啓謝晴道場齋文皇帝遣某官某請僧三七人於大相國寺大殿上開啓謝晴道場七晝夜近以天作滛雨民閔有秋致禱仁祠式殫精意祈覺皇之垂祐庶氛祲以潛消不越匪朝遽升杲日丕顯諸方之應翕臻四氣之和再闢清場恭陳謝禮庶蒙善利永庇含靈後苑華景亭開建祈雨齋文維元祐五年嵗次庚午二月丙申朔二日丁酉皇帝遣入内内侍省内東頭供奉官管勾後苑譚扆等請僧三七人於後苑華景亭建祈雨道場伏以自冬徂春稍闕滂沱之潤彼民望嵗深懐愆亢之虞爰仗佛乗仰祈神貺修舉六時之供導迎四序之和冀甘澤之霑濡俾嘉生之茂遂緬維大覺昭鑒丹誠謹言五臺山等處謝雨齋文維元祐五年嵗次庚午某月某朔某日某甲子皇帝遣入内内侍省内東頭供奉官李嗣元於五臺山請僧三七人開啓謝雨道場啓告於文殊菩薩近以氣序愆陽冬春閔雨恭禱羣望祗叩覺慈惟善應之無方召至和而來格雷雨作解獲霑足於農疇力穡有秋遂慰安於民望敢忘至懇仰荅鴻休謹言祝文五龍廟賜㑹應廟為額祭告五龍之神祝文維元祐四年嵗次己巳八月戊戌朔十日丁未皇帝謹遣某官某致祭於五龍之神伏以雲行雨施實賴陰功廟食壇祠抑惟舊典粤瞻靈宇載飾崇堂方屬考成特加顯號神其安妥惠此黎元尚享景靈宫天興殿雅飾了畢開光明奉安奏告聖祖御容祝文維元祐四年嵗次己巳九月戊辰朔二十七日甲午孝曽孫嗣皇帝臣某謹遣昭宣使和州刺史内侍省内侍押班臣趙世長敢昭告於皇髙祖考真宗膺符稽古成功讓徳文明武定章聖元孝皇帝伏以靈徳在天豈忘處語時思有廟䖍奉衣冠屬増煥於晬儀冀即安於寧宇恭陳薦告永譽燕詒尚享五嶽四瀆等處祈雨祝文維元祐五年嵗次庚午某月某朔某日某甲子皇帝某謹遣某官敢昭薦於東嶽天齊仁聖帝伏以春序方中驕陽為沴託居人上深軫農收邈瞻靈祠䖍致精禱伏冀無方善應有渰上隮流膏澤而徧大田消祲氛而為樂嵗敢申至懇仰荷神休尚享㑹應廟安掛牌額奏告五龍之神祝文維元祐五年嵗次庚午二月丙申朔二十八日癸亥皇帝謹遣左宣徳郎知開封府倉曹㕘軍公事史邈致祭於五龍之神伏以四靈之長時乗黙助於化工五方之神廟祀特崇於顯號載嚴棟宇式表題顔敢告就工冀蒙後應尚享天地社稷宗廟宫觀等處祈雨青詞祝文維元祐五年嵗次庚午三月丙寅朔四日己巳嗣天子臣某謹遣太中大夫守尚書左僕射兼門下侍郎上柱國汲郡開國公食邑三千九百戸食實封一千戸臣吕大防敢昭告於昊天上帝伏以雨暘弗若稍愆六氣之和穀麥未滋慮失三農之望託居人上祗畏天明䖍齋祓以致誠冀神靈之降祐霈滂沱之澤普浹原田廓氛祲之祥化為樂嵗將俾動植均䝉福休尚享在京㑹應廟等處祈雨齋祝文維元祐五年嵗次庚午三月丙寅朔四日己巳皇帝謹遣朝奉大夫試尚書刑部侍郎上護軍河南縣開國男食邑三百戸賜紫金魚袋趙君錫恭告於五龍之神伏以驕陽為沴時雨稍愆庶民其咨嘉種將槁仰憑神化垂恤黔黎合膚寸之雲霈為大澤育來牟之實登乃有年彌罄精衷恭期善應尚享五嶽四瀆等處為謝明堂禮畢祝文維元祐四年嵗次己巳十月某朔某日某甲子皇帝某謹遣某官敢昭荐於東嶽天齊仁聖帝近以度堂格廟嚴父配天克成宗祀之儀實賴神靈之祐式修報禮祗秩祠宫冀錫純禧永庇蒸庶尚享景靈宫分獻諸帝后祝文維元祐四年嵗次己巳九月戊辰朔十二日己卯孝曽孫嗣皇帝臣某謹遣翰林學士朝奉郎知制誥上騎都尉賜紫金魚袋臣蘇轍敢昭薦於宣祖昭武睿聖皇帝伏以講三年之親祀將享合宫奉七世之宗祧式瞻原廟崇嚴文考陟配上神祗荐苾芬庶殫誠孝尚享五嶽四瀆等處奏謝明堂禮畢祝文維元祐四年嵗次己巳某月某朔某甲子皇帝某謹遣某官敢昭薦於東嶽天齊仁聖帝伏以卜吉季秋肇禋陽館既成熈事實賴神休載欵嚴祠式陳報禮冀垂歆鑒永祐黎元尚享景靈宫石橋安构欄子動土祭告里域真官祝文維元祐四年嵗次己已十一月丁卯朔二十八日甲午皇帝遣西京左藏庫使嘉州刺史入内内侍省押班管勾景靈宫梁惟簡致祭於里域真官伏以崇嚴閟宇秘奉真游屬有欹摧再加完飾顧兹吉土主爾明神涓選嘉辰敢告興事尚享蘇魏公文集巻二十七
