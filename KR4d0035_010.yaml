body:
  text: 蘇魏公文集卷十宋蘇頌撰律詩觀潮三首海門雙峙隔滄溟潮汐翻波勢若傾萬疊銀山橫一線千撾鼉鼓震重城來無源委逢秋盛信有盈虧應月生今古循環曽不涸談天閎辨豈能名嘗觀七發論濤篇比物侔形恨未妍聲入閭閻家十萬勢陵組練甲三千馮夷海若慿深險種魄胥神竟後先縱使風波能鼓怒終歸漩澓作澄淵橫江白浪湧崔嵬應是波神羽衛來陛㦸百重馳道逺舳艫千里峭帆開緩如積雪飛霜路急似砯崖轉石雷惟有東西爭渡者暮還朝往任相催次韻和前漳守馬郎中三篇遊山西山髙下極深幽十里清波一棹遊喜逐御風真造適遍題僧壁更遲留松間覓徑因窮險亭際披雲盡露秋却羡官閒無檢束徜徉何異五湖舟碧波亭感事華堂直北望雲烟勞逺勤歸此待賢下榻喜逢徐稚至登舟常羡李膺仙知君將奉三年最感舊曽歌一夜憐紅粉若能留客醉不辭飛盞共陶然郎中屢話陶尚書奉使至此事迹續觀潮江臯空濶見東溟兩訊潮隨逺近生夾岸炎天迷雪嶺居人晴日駭雷聲客帆朝暮乘風去漁罟東西逐浪行盡道波神久恬靜應緣四海正清平次韻錢塘周寺丞獄空網踈由世教訟息偶年豐圜土無留繫黎氓識變風時方還治古令欲訓民中宣布來千里興行自一同吏寧嗟畫地書亦簡司空共對承平理惟思盡至公和兖弟遊湖上諸寺二首叢林四百見州經盡在錢塘舊縣坰十里湖光連北郭千尋嵓翠繞南屏松間幽徑迎冠蓋竹裏飛泉入户庭勝境無因朝日到羡他禪伯老林扃湖山不到每馳情與客逢迎暫駐旌鷲嶺飛來詢慧理龍宫吟就續延清僧房有竹循門見磴道攀蘿盡日行交臂晤言欣得侣上臺專使對仙瀛韓君著作丘君節推皆被命專幹使事與明州梁况之學士同㑹和兖弟與梁况之學士同作四絶句南山到處待揮毫逸似凌雲羽翮飄好著碧紗籠寺壁更將金刻置巖標右紀况之學士題壁偶陪嘉約出重闉自覺超然隔世塵若欲遍遊山下寺直須經嵗駐征輪右呈况之常叔立之湖上歸時暮氣侵松香花露拂巾簮萬家燈火沙河裏月色相和廓暝隂鄞江東望水連空越嶠明峰幾萬重誰識此行多樂事揮毫一曲飲千鍾右二首並和况之元韻次韻兖弟忠懿王祠五君相繼擅吳方坐視羣雄取亂亡侍子奔馳先入貢鄰邦旅拒獨勤王豈惟佛利傳遺像自有孫謀襲懿芳應似竇融歸漢日功名纍世到瓌章漳州知郡郎中見示旅次感事輒次元韻江干邂逅再經旬每挹清風歎絶塵鍊得輕軀同槁木養來和氣勝陽春官閒不廢修金訣功滿終須禮玉宸自顧衰殘多俗纍何時方外去相親郎中留意丹術有年矣次韻簽判同登介亭紛紛塵事厭煩冥何處能令爽氣生簿領欲迷頭不舉烟霞才望眼偏明門臨滄海千重險地壓髙丘一再成若論三山方外境須將此地擬浮瀛次韻和錢穆甫答簽判殿丞臨安道中作吳越開基舊土疆鑑山仍是種瓜鄉七朝賜履加尊寵五世苴茅奉憲章里社依然題晝錦昆雲不絶佩鞶囊人懷餘德能封殖猶有當時似蓋桑武肅起臨安并吳越嗣王歷五代迄本朝皆加策命故宅為院至今宰木猶有存者次韻葉希虞祕校同遊天竺寺五絶句蠟屐終朝踐石苔飛鳶不動絶塵埃片雲忽作人間雨盡道靈山應禱來鷲峰何代落山隈每到須清一世埃歎息俗緣常窘束半年才得兩回來山半僧軒四面開下看城市一浮埃此間真趣誰能辨飛鳥空中自往來叢林澗水盡縈回嵓室雲房不染埃若使此中容小隱㑹須卜築賦歸來檻前常有施生臺窗隙都無野馬埃掩室道人偏得意經年未省入城來和許祕校同遊雨天竺栁浦重城忝建旟舊吳星分斗牛墟鷲峰遺跡竒難狀大士靈光應不虛遊伴偶陪賓結駟肴蔬深愧食無魚是日素膳髙談終日窮幽賞俗慮塵襟頓釋除和簽判郡圃早梅緑萼丹跗炫素光東園先見一枝芳凌晨霜㸃鉛胡粉滿檻風飄水麝香味入和羮來傅野聲隨邊角動漁陽山亭最好通宵賞微雪相輝映月廊和安上弟遊湖山諸寺二首四百僧居勝沃洲北連髙嶺萬松稠似將天下江湖景都作雲屏置一州十里湖山繞四門遊人朝暮隘重闉樓臺逺近連郊郭到處皆為水石鄰和棁弟矮松寺留題曲幹隱騰蛇樛枝展翠華何年喬嶽種移植法王家得地烟雲潤盤根嵗月賒縱橫齊殿角偃蹇拂簷牙數粒宜充釀收黃好代茶風生驚砌鶴日照亂城鴉墻仭髙藏節河津暗長芽息隂人接席題壁字如麻據類眠梧隱攀疑摶獸拏宫槐低可並譙檜大無加雖異明堂柱終同象載車殷勤與封殖莫使溷塵沙和安上弟雨雪應禱絶句霰雪為霖近浹旬江湖清氣壓冬溫應時豈是誠能感作物宜同易畫坤和安上弟雪中登介亭滴瀝泉池亂蘃珠悠揚僧壁㸃赬糊登髙偏見逺山好萬瓦參差篆玊符次韻姚倅正月三日遊山道中口占車馬西郊踏曉光城隅一徑繞羊腸泉流帶雪添膏脉山色逢春變鬱蒼雲外樓臺晴挂影風前松檜逺飄香仁祠久禱䝉嘉應預慶農疇嵗襲祥是日彥聖禱上天竺次韻禱雪有感終過元朝欲首春條風先度海東門寒凝一雨成飛雪泰長三陽應上坤疵沴漸消和氣滿詠歌頻發味言溫人情共喜年光好不向樽前未易論次韻朝美叔遊山見寄巳踐修塗到急流暫回俗駕喜同遊名為外物知難必學悟無生信若浮美叔近留心禪觀騷雅深情追李杜林泉髙興拉巢由遲留更愛靈峰境青桂風來不待秋奉使還至近畿先寄史院諸同舍書林輕别紫雲邊史院在燕殿南軺傳重行北斗間正類子卿悲異國不同太史訪名山次道出相臺正仲子中禱衡盧安中謁告淮浙邦直案刑京東雖經出入皆有山河之賞與使異域不類也鞍韂騰踏雙腨重風日煎熬兩鬢班待得使回翻舊藁只應新例又刋刪其二倐忽經冬又涉春年光冉冉暗催人要荒一去三千里晦朔俄驚十二旬絶代方言空問俗蓬山直舍巳凝塵汗青何日成書去頭白常慙竊祿頻和宋次道戊午嵗館中曝書畫鴻都清集祕圖開遍閲真仙暨草萊是日諸公觀畫尤愛梁令瓉題吳生畫五星二十八宿真形又謂淳化豐稔村田娶婦圖曲盡田舍佚樂之意態氣韻最竒知鹿馬丹青一定見樓臺韓幹馬東丹王千嵗鹿荆浩山水屋木皆為精絶宴觴更盛華林㑹坐客咸推大厦才久事簿書拋翰墨文林何幸許參陪次韻孫莘老司諫見寄來詩云聞有修史之命而作比至而豫出守濠上矣雖非文史足三冬豈類無心但有胸曽讀丘墳叨典領再分符竹荷矜容君恩欲報微螢爝親祿方營苟釡鍾平日交情今楚越徒勞瞻望景山松龍舒太守楊郎中示及諸公題咏洛陽新居見邀同作輒依安樂先生首唱元韻繼和仲長買宅近髙山饒得羣芳不費錢地接伊渾宜水竹門臨嵩室足雲烟未拋簮組真朝隱更有田園即世仙滿篋新詩俱大筆鑿楹留待子孫傳抱朴子有住世神仙次韻林次中九日都下感事二首桃杏初開巳去家又逢蘭菊綻新花感時謾綴茱萸佩惜别應憐棠棣華次中是日别雄倅令弟歸迢遞宦遊來日下悠揚歸思繞天涯一尊重到平津閣惆悵文忩舊緑紗登髙能賦屬詩家况值嘉辰對菊花乍感商飈流素籥故摛鴻藻艷春華邊關禮命行看至淮海歸期亦有涯早晚霜寒侵旅榻又懸復帳換青紗次韻致政華殿丞懷舊見寄佩韘相從四紀前鯉庭論契荷忘年文如潘陸傾江海學造重黎絶地天簮紱棄來名巳厭鄉閭歸後樂應全冥飛尚隱樊籠舊未副初心愧昔賢天聖中先人宰無錫某生十二年矣初為舉業與宣卿接陪硯席不以年輩遼隔論議無間蒙益尤多一自暌違南北深阻追懷平昔不覺愴然和孫節推雪臘催時雪到江涯雲壓寒空凝不飛臺榭風光先有意山川秀色逺相輝人懷姑射清難見詩似陽春和者稀聞上髙樓尋勝賞緬懷嘉尚重依依又兩絶江天慘淡物華新四望漫漫起玉塵但怪長衢已盈尺豈知閉戶有髙人看雪宜臨廣路津年年光景見長新不知滋液功多少且慰東臯首種人又和十二月十一日雪臘前寒雨巳為霖一夕皚皚變暝隂春圃暗驚花萼早客舟偏覺漕渠深都無車馬塵過眼唯有尊罍酒愜心共喜時和成美嵗預知氛祲不能侵方公說通直見示與小子京和答棋詩四篇因次本韻繼䝉寵惠前後凡十五篇牽強奉答思湧如傾潮汐池才髙早契聖明知丞相荆公昔薦才美即時召對擢使江西省中一語開天意江表三年得吏師通舊辱投文舉刺可人欣對費禕棋更觀麗句貽初學豈謝韓公薦士詩衰病常求飲上池藥投堅痞苦難知某久苦腹癖漢晉方書以服藥應病為知閒揮緑綺歌三樂靜玩韋編誦九師縱有文章憂瓿醬劇無機智懶行棋淮南子云行一棋不足以見智愛君髙唱多才思撩摘羈懷入小詩久從閒僻向滄池忽見嘉賔喜可知觸熱正煩思美廕卧疴方苦遘良師欲留盡興時須飲要取忘憂祗有棋二者已欣陪造適解頤仍得鼎來詩和前三篇其一孟郊篇什况咸池唐人題孟郊三百篇為咸池集取退之作詩三百篇杳默咸池音之義夫子文章我所知豈特曹劉同品目固將蘇李是宗師語如轉彈逢真賞事見南史王筠傳喻到鏖兵詫國棋所集若攜歸闕下諸公應序盛山詩其二山公偏愛習家池每出遊時醉不知既見國僑如舊識何須阮籍乃吾師亭邊菡萏鋪新錦水際閭閻近布棋欲作宣城十日飲留連夢得似敦詩劉禹錫赴歷陽崔羣在宣城以書招云不十日飲不置子其三百雉金城十仭池天聲遐憺逺戎知剖符但報三年政推轂無勞六月師胡馬逸歸常見畫塞鴻征盡著殘棋欲歌盛業𢋫周雅須假清風吉甫詩再和三篇其一莫歎潛鱗久在池巳喧才譽滿朝知雄辭自可吞雲夢博識應能對仲師沈約問劉杳曰何承天纂文載張仲師長一丈二寸有何所出杳曰事見王充論衡榮辱早諳真采選競謙不校古儒棋後魏游肇製奕法名曰儒棋云以崇謙止競使還即見金門召况有中和樂職詩其二聞君八法擅臨池擫押工夫世少知陸希聲書法有擫押鈎格抵五法南唐李後主又增導送二法學者伏膺虞祕監時賢求範永禪師某舊藏楊師道帖稱智永書云欲求一二字範之流傳異日須懸帳交質何人敢對棋近世士大夫多以書畫對奕斂手薑芽栁家樣解嘲幾困老劉詩劉栁相戲絶句見子厚集其三兵厨釀酒宅連池龍堂池在州廨東不滿百步為郡優悠每自知鈴下文移歸幕府案前頤指走籖師宋齊郡府史有典籖及籖師之名農桑課罷聊行樂朱墨閒來好序棋栁子厚文序棋一篇其格以朱墨書貴賤為勝負飽食將何報豐祿歌時惟咏阜財詩公說再和并前十五篇輒復課六章用足前篇之闕其一汪汪雅量若陂池才略縱橫未易知振藻詞場無怯敵游心藝苑有餘師獨醒繼日長辭酒坐穩閒時但校棋塞北山河遍登覽吟哦馬上足新詩其二皇華幾月案鹽池鉤按從來未有知隱伏無由逃計最勤勞長足警官師事逢錯節皆投刃利析秋毫類算棋他日朝廷詢北事講論風俗待陳詩其三欲養蛟龍謾鑿池惟應道術兩相知論年校德豫慙老强識多聞子可師監彼盈虛門若市明于取舍智猶棋幹時已副寬民詔沈俊休吟詠史詩其四封境東連浴日池川源近盬四方知水官無事延年計估客應求范蠡師樓閣嵯峨千里鑑田疇夷坦一枰棋追尋燕友南皮㑹誰繼曹劉七子詩其五荷葉田田水滿池東堂真趣幾人知折華暇日尋園吏競渡經春習棹師隨分命賔仍授簡不妨問易更看棋殷仲堪袁尼事見世說歡懷既適從何見事事忘言盡在詩其六莫笑凡龜戀澤池不蘄刳灼效前知親逢日月光華旦勉慕淵源浸漸師義切仰山勤景行事迷當局戒貪棋衰遲猶竊君侯祿深愧曹風伐輻詩和孫節推寄羅發運一瓢賢巷僻如山十部文移日滿前輟得閒時常命駕和來新什已盈編交遊莫逆心相照出處雖殊道兩全能使清風激頽俗世情誰得議髙堅又五言道卷門常靜心閒眼倦開忽聞賔榻掃為喜使車來世事浮雲過時光暮雪催放懷何所係卒嵗自游哉元豐已未三院東閣作十四首元豐戊午夏豫尹京治陳氏獄言者以為推劾不盡詔移大理而理官推迹陳氏姻黨干求府政縱出重辟事下御史推求巳未嵗豫自濠梁赴臺訊鞫卒不涉干求之迹而大理反有傅致之狀雖蒙辨正聽命久之不得出邑邑不巳作詩十篇記一時事非欲傳之他人但以示子姪輩使知仕宦之艱耳防人不善自為謀對吏方知口起羞本為追胥寬逮繫何期僚屬致增尤初有司欲追太湖縣藥行人以證買藥豫以為非切要道逺不追及被坐獄官歸罪于豫溺灰竟欲焚安國書牘誰將念絳侯惟有丹誠貫金石風波飄蕩任沈浮搆虛為實盡枝辭直道公心自不欺衆口鑠金雖可畏三人成虎我猶疑軍巡官吏指豫平日語言中甚有鄙俚之談豫亦自疑何至云爾皆為承之忠邪所賴圓穹鑒通塞須慿大衍推况是聖神方燭理深寃終有辨明時豫方自誣忽䝉辨正吏議推窮舊話言畏途迢遞冒風瀾兩詞罷對文移絶一室常眠枕席寒鬱鬱久居人共歎皇皇求義我知難誰將羑里匡陳事便作閒堂紫極看平日論心友與親白頭臨事斗如新裸衣難喻疑金客束緼應無乞火人三省行藏知有命十年流落困無津物情世態經諳練不假虛詞問大鈞御史推治平日語言有涉豫親友者移文訊之輒不承又有指為在禁妄引他人見治者而法不當坐飛語初騰觸細文廷中交搆更紛紜綱條既甚秋荼密枉直何由束矢分御史皆稱素長者初御史見訊干求之實云知公素長者同列有屬料不能免豫曰無之不能自誣府徒半識故將軍院吏洎府史有府中舊輩多致恭却憐比戶吳興守詬辱通宵不忍聞時蘇子瞻自湖守追赴臺劾嘗為歌詩有非所宜言頗聞鐫詰之語縱出由來古有誅徇私無實荷寬紓已知公冶本非罪免似鄒陽更上書刀筆任從文俗議風霜方識憲臺居自慚衰拙將何用學術無堪政事踈名絓臺章冒典刑聖仁無濫許原情尹京雖愧四方則廷尉亦非天下平三已自知無慍色一㕓歸去碩為氓君恩天地何由報九死鴻毛比尚輕推治無期任猛寬苛留纍月尚盤桓風霜幾日經摧挫案牘踰旬未省觀失勢我如魚在網操權吏甚虎而冠南班小吏猶知禮朝夕時來一問安院中小吏頓姓者朝夕來就閣中問安否秋杪拘留冬欲䦨一旬參對纍旬閒適逢御史俱釐務祖宗時不領他局專治臺事近嵗三院並兼要職故不暇治獄更值中朝久絶班獄具御史求對乃釋適遭國恤久無班次故淹留又踰月矣壁觀無言休問祖坐忘遺照且晞顔是非榮辱知難必反覆須臾覺夢間罷尹一年重置對去家千里涉寒溫青雲交友難傾蓋白髮慈親正倚門目斷濠梁橫涕泗夢回京口役形魂寬恩若未投諸裔好奉安輿葺故園已未九月豫赴鞫御史聞子瞻先已被繫豫晝居三院東閣而子瞻在知雜南廡才隔一垣不得通音息因作詩四篇以為異日相遇一噱之資耳早年相值浙江邊多見新詩到處傳樓上金蛇驚妙句卷中腰鼓伏長篇子瞻觀雨望湖樓壁有電光時掣紫金蛇之句又示豫近詩一軸首篇答鮮于郎中云有如琵琶絃常遭腰鼓閙前人未有此意仳離嵗月流如水抑鬱情懷積似煙今日柏臺相望處隔垣音響莫由宣詞源逺逺蜀江流風韻琅琅舜廟球擬䇿進歸中御府文章傳過帶方州前年髙麗使者過餘杭求市子瞻集以歸未歸綸閣時稱滯再換銅符政並優歎惜鍾王行草筆却隨諸吏寫毛頭源流同是子卿孫公自多才我寡聞謬見推稱丈人行應緣舊熟祕書君文章髙絶誠難敵聲氣相求久益勤莫為歌詩能數眯聖朝終要頌華勳近年出處略相同十載邅回我與公杭婺鄰封遷謫後湖濠繼踵縶維中詩人囁囁常多難儒者悽悽久諱窮他日得歸江海去相期來訪蒜山東蘇魏公文集卷十
