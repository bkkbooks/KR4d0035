body:
  text: 蘇魏公文集卷二宋蘇頌撰古詩送鄭無忌南歸我家本南閩處世若羇寓侍親從宦逰東西遷者屢因循歷年載未識南中路間歲至都城始與里儒遇嘗聞閩中竒英雋所叢聚山川降靈氣稟肖時魁梧往在祥符中黃李稱獨步當時盛文物在廷充振鷺二子簉其間軒軒並鑣驅得志何所如康莊躍騏馵時文變新律高辭無纍句人傳幼婦碑朝奏客卿賦竒器擅圭璧至音有韶濩當寧喜同時士林爭景附淵澄或無魚木秀乃生蠧嗟哉士之賢入朝嘗見惡叔才亦稍遷祕書觀四庫命窮時不偶伶仃獨翁孺名雖鼎甲貴官止塵勞汚蹉跎三十年困躓卒顛仆伊豫生後時舉頸徒企慕鄭子乃其甥肖貌何穎悟讀書博而詳偉詞亦能鑄朅來至京國首與豫欵晤吾嘗念古昔人賢猶愛樹况遇賢之出何必緣雅素從遊遂無間往來靡常度近遭試秋官報罷不知故飄飄歎窮途歸橐不能具當路少知已腹心誰可布我嗟近世人齪齪何足數見善不能舉徒然用烋噢士有處憂困豈嘗一䝉顧勸君自求已何用頻齟齬還家樂詩書養心益堅固無因一傷手乃欲改前措澤豹未成文尚能隱深霧齊禽戢其翼久亦䝉傅羽去况子氣方剛丁辰年未暮勉勉信豫言勤勤蹈前趣更想渭陽賢懷道當有遻王忱希范寧羊曇宗謝傅武子稱衛玠逢時乃騰騖深源賞康伯傳經有訓注子其慕斯人戒哉惇向素還來取高第擢俊膺帝籲更發翁孺名後來益垂裕作歌送子行豫言豈虛諭送王秀才出京都城大雪酒價高我送故人傾濁醪酒闌置杯欲話别不覺中心生鬱陶丈夫聚散豈為念所歎人事多徒勞憶昔我年未弱冠西來觀藝遊神臯金門獻賦嗟失路因循四載何所遭京華碌碌少知已但聞嘲弄聲嗸嗸今年詔書恤西事大開言路蒸羣髦因思平生負氣槩臨事始可觀持操長纓羈虜豈無計䇿慮未獻心徒忉感君壯志正凌厲術業沈究鈐與韜上書論畫兵家事直請西去親鞬櫜又言若將衆十旅可為手足除紛搔踰時待報不聞命西秦便欲從遊遨束書㩦劔瞥然去却顧名利輕如毛我謂方今正急士帝言屢下搜英豪公卿悉意奉詔㫖推賢好善如干旄勸君失意且韜養有能必見時稱褒中朝列爵本馭衆進任將相皆儒曹一時未遇何須歎吾輩豈久居蓬蒿和丘與權祕校詠寶寄林成之進士天下豈無寶此寶常曠乏渾然肖天質不與璆璠雜萬産蓄精粹百靈常護押天王得而興人事留豈盍問將安所施邦國慿鎮壓問誰能為售靡物可酬答孰嗟道不行將以補千衲孰憂大厦摧用以支衆庘在昔夏及周相繼登天榻搜索罄寰瀛異物悉歸狎萬玉㑹諸塗九鼎安於郟人神為交歡海嶽在呼欱無逺不奔趨無强不折拉區區霸者君猶能救收扱譬夫至音奏所聽才鞺􅝅晉强由一戰齊盛成九合小邦願輸幣鄰境求盟㰱至寶既見用光價日以洽豈若秦與趙爭璧相蹂踏其下數十代交攻事矛甲月捨亦異道盛衰勢相沓得之權綱震失之基本塌吾君系皇統威稜海隅匝大器固神扃衆竒萃緹匣山瑰及海靈盡獲諸羅罨揀金磧礫中或不間砂鑞求珠淵泉底或見取蠯蛤珉石尚珍藏理寧斥圭玾其間偶棄遺誠堪為嗟􅸢或是選擇殊非由道路狹淵哉二君言相投豫意恰誰能借其辨九重貢君闔上以啓聰明次以廣開納冀于涓塵中收拾祕箱笈明時寧自疑本無雙刖法送閻祕丞宰雩都江西劇藩曰南康其山空青水貢漳環封千里十巨邑邑皆萬室居相望地窮吳境雜楚粵民生窘急矜豪强積姦疊訟狃成俗吏治紛擾多頽綱緩其銜轡乃縱弛繩以密網還滋彰中和之政固難立要在教化完隄防爾來守宰尤慎擇長人之計非尋常儀儀閻君文且敏風韻粹潔含圭璋昨從管榷薦稱最就委墨綬雩川旁周才治劇有餘地猶以驥騄騰康莊牛刀砉騞解衆理排擊曽未嬰銛芒聲華早已擅朝寀羣公稱薦交封章况今知已正當路拔擢賢俊登周行謂宜平步陟清要何乃逺官天一方平時進人用資履詳試政事觀循良毋嗟邑令尚沉滯昔賢為吏多踐揚漢庭卓魯終作輔孔門言季俱升堂于時百里振嘉譽逮今史簡傳清芳勉哉逺繼數賢迹坐使慈惠流江鄉政成績茂奏丹扆行矣臺閣看徊翔天禧寺竹萬箇碧琅玕兩傍䕃潭沼叢深蔽巖麓幹直露雲表剎影下交加山房上環繞昔嘗止鳴鳳今肯棲凡鳥笋抽龍種瘦籜墜孫枝小美勝㑹稽箭珍逾汶陽篠園名非竒渭川比終少樵删草根變客玩茶煙燎創亭僧意高諭佛禪心了吾愛有霜筠一到忘昏曉一本云每來到霜筠愛玩忘昏曉寒食後一日作和林秀才寒食初過一百五陌上風輕斂微雨宫花鋪繡淺深紅蜀栁垂絲千萬縷都人士女趂時節郡圃山樊樂樽俎肯教容易度春光來日清明更姸煦暮春與諸同寮登鍾山望牛首清明天氣和江南春色濃風物正繁富邦人競遊從官曹幸多暇交朋偶相逢並驅出東郊乘興遊北鍾陟險不蠟屐扶危靡搘笻上登道林祠俯觀辟支峯辭山次阡陌長江繞提封蕭條舊井邑茂盛新杉松攬物思浩浩懷古心顒顒念昔全盛時兹山衆之宗天門對雙闕霸業基盤龍六朝遞興廢百代居要衝人情屢改易世事紛交攻當時佳麗地一旦空遺踪惟有出岫雲古今無變容首夏即事與丘與權同韻作朱曦漸永煩暑添薰風當晝飄前檐庭幽門邃搴帷簾景物軒豁欣窺覘方池緑瑩波文恬兩傍森森生葦蒹新荷未展排青尖上下交映開鑑奩園林果實繁李棎原野麥秀勝稻稴羣飛衆走羽毛彡求陰息影愁烹爓江南鬱蒸非類痁時雖早熱人心懕欣欣笑語喧閭閻言此豐歲將飫饜正陽用事何太廉乃使隂沴相陵詹正當汗浹絺衣粘凄風忽生增纊縑淫霖旬日橫流霑市井郊郭皆淹淹林實墜落誰扯撏麻麥散亂如刪鎌斯民愁嗟言成譫我時憂思坐閒櫩方食不知味苦甜整齊几案抽書籤發䇿一以天人占少陰乘陽時最嫌小人當此多欺憸君子遇之難懷謙天道雖逺誠可瞻上曰高明下沈潜四時中分寒與炎一氣不可相并兼推本事理知悉纎災害所起由漬漸豈非姦孽當除殲又非直道傷詖譣孰居鼎鼐調梅鹽孰任閫闑懷韜鈐聖皇言動謀於僉布為利澤濡蒼黔將消祲沴頻深砭感召沖氣安危阽嗟嗟直口不可鉗誰當一探龍頷髯與諸同僚偶㑹賦八題不期而㑹泛交以勢利君子期久要道義苟契合出處無阻遙龍興雲必從宫鳴商亦調樂哉此席㑹固非夙相招待燈黃昏蝙蝠飛空堂蟋蟀吟相對語未闌不覺更漏侵呼童持短檠注以蘭膏深皎皎見寒光良宵愜豫心坐久月初上高軒微雨過初夕凉風生兀坐正幽寂雲間月華明移榻向寒階遙望孤蟾清所思故人逺對此傷豫情邑署獨鶴常賦士衡雲兼懷惠連雪庭前聞清唳天外見寒月舞愛素琴橫飢思朝露潔問爾誰為羣威鳳在丹穴府庠小沼面向秦淮流背枕清溪水當軒觀未足鑿沼近可擬月明練光寒風動漪漣起不用植菰蒲惟將鑒容止華藏竹竹性本孤潔况在祗園中經年蔭華宇永日吟清風心虛大道合幹直賢人同雪霜任摧挫寒姿獨青葱秦淮栁古樹枕淮流橋邊與亭畔借問植秦堤何如在隋岸南朝正佳麗綺陌多攀玩嗟今非昔時榮悴俱可歎登賞心亭秦淮接長江活活流不已高亭出城角四面盡湍水山川孤雲飛檻閣清風起望逺何所思故人在千里與丘程凌林四君同賦食河豚水族誠萬種兹魚非衆儔形厖而味異名與畜豕侔江南春風和乘時泝江流貪婪爾之能腥臊固相投膨膨逞怒腹駢駢競尖頭靡因梁笱獲謾汚筌餌求虛傳百金貴不充四時羞假以薑桂芼薦之尊俎酬飽飫有奚適包藏乃為憂嗟豫鄙異食顧此偏憎尤河魴風陳詩蝦䗫譏栁州臘毒戒厚味兹言實嘉謀盍投㑹稽犗更垂渭濱鈎一釣蓬山鼇復連東海鰍割鮮輕屠龍和羮小函牛誰同厭若魚何必誇食鰌遊保寧院練光亭同丘程凌林四君分題用業字韻寺本梁瓦棺地臨吳建業何人構虛亭勝槩壓危堞巖扃豁常開江練靜相協洪濤雖震騰迅流終妥帖逺窮滄溟盡近與長淮接水色古今同潮聲朝暮愶中間數洲渚來往拏桴楫搖深鳴根喧渡閣孤帆怯到此是安瀾遊人無病涉滿檻霽光浮平林風勢獵黃昏煙引素清曉波成褶歸雲閒自飛列岫平如帖秋岸狎鷗鳥春城噪批頰園橘冬垂丹隄榆夏飛莢竹徑粉筠墜松梢飴露浥老檜倚軒簷幹徑如雄俠野花鬭黃紫格頑若婢妾離觴歌栁枝江人憶桃葉往事杳難尋欲問言成喋惟惜建邦都形勝敵岷鄴後人奉竺乾創寺據山脅邑居正佳麗棟宇爭煒燁山遊鸑鷟羽池變炎灰劫鳳去臺遂空國移人亦懾興衰既代謝榮悴固相躡幸今明世逢早䝉湛恩浹安堵四民居飽食千僧饁吾儕正閒暇來遊失疲薾心朋况遨從雲梯屢登躐山川思慮清風雲抱懷愜百里見毫釐萬象入眉睫南望牛首峯雙闕儼重疊却視虎踞基石城猶岌嶪北阜盤虬螭三山樹矛鋏風流非昔時事跡看載牒開尊忘醉醒縱論鄙嚅囁念當時值泰豈嘆徑未捷經綸苟韜藏鼎飪終調燮攬景且留連無為利名攝詠丘祕校山水枕屏逺山近山各竒狀流水止水皆清曠煙雲到處固難忘筆墨傳之尤可尚古人銘枕戒思邪高士看屏助幽況左有琴書右酒尊怠偃勤興時一望和林成之五題客來有客過我門開顔喜相見貧居何以待案上書千卷高論到古人終日自忘倦非同豪富家絲竹留飲宴城南心樂郊原景人應似我稀城南時一到山寺幾忘歸新竹當行徑飛雲戀客衣誰能咏招隱向此息塵機江上何處偏傷江上春天涯失意未歸人片雲極望添鄉思孤棹隨波寄客身塞鴈來時慿逺信海鷗馴處見吾真休嗟進取無成去幸有榮名足慰親西鄰西鄰擊鼓北鄰聽飲馬持戈密相應一朝奮躍事爭鋒朔氣充盈誇戰勝中原太平日已久刃頓兵閒空細栁二疆欵附歲奔馳捆載金繒萃淵藪飫肥服暖四十年但欲包藏忘德厚謀夫憤憤壯士憂屢獻忠言曽苦口廟堂尚論正無為肯向平時議攻守朔方三十有六郡户斂家輸佐行陳非無碩畫破妖巢直遣萬里威稜振皇天愛人猶赤子縱欲驅之言亦訒彼方束手聽誓盟重獲歲時贄琛賮斯民懷德樂休兵戍卒歸來解鋒刃皆言鄰徼復清夷嗟哉異類終難信惜别吟丈夫豈無淚不學兒女悲今日獨澘然為别良交知交知不易遇一别㑹何時念兹出門去空有長相思非無樽中酒亦有桐與絲未飲先歎惋欲歌還喑噫誰能諒豫心惜哉此别離蘇魏公文集卷二
