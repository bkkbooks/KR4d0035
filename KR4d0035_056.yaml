body:
  text: 蘇魏公文集卷五十六宋蘇頌撰墓志太常博士張君墓志銘太常博士張君諱大有字損之先世占數華隂自其曽祖諱圖避五代之亂于湖湘因家潭州遂為長沙人祖某三世仕宦皆不過縣令州佐至君以天聖五年進士乙科一命為隨州節度推官翰林胥公偃薦監夀春茶場由明州推官改著作佐郎知河南府澠池縣再遷太常博士河東都轉運使施公昌言奏辟簽書晉州判官公事徙知忠州過都貽書抵宰相陳恭公以為大臣當如古人推轂天下士徒以絶謝賔客取公名非是以此􅘅時而有司適言君在河東入糴不如法坐削一官監廬州酒未幾會恩還故秩最後簽書應天府判官公事是時豫同在幕中接尊爼論古今從容談笑間以唱酬歌呼縱放纎介無所隱故尤相親厚嘗愛其為人疏爽豪健有志于功名文章議論足以自表一時所至上官賴其能委之以事輒為平處其中無所私撓明州廣德湖灌溉之利由古然矣先時患民侵冒壖地太守李夷庚築大堤以限之嵗久堤壞而冒耕者衆請奪滋益繁轉運使移君往案視得故迹而復之于是人均其利而訴牒自息其在澠池建學校以延諸生又治縣廨得二古鑊寫之以補其邑之刀矛機械于是戎器為之一新已而郭邈山盜起嘯聚陜洛間騷掠近邑獨不入澠境知有備故也留守范公雍喜其所為召見與語留數月不遣時久不雨邑之父老詣府訴災因請還君既歸而雨作民益歡然有龍騎卒自邊戍還過縣以事逗留不去民不知所為頗相驚擾君密畫計白府請捕治之卒伏辜而一道帖然君雖為小官每于朝廷政令大體意有所得慨然忘其躬之卑逺而敢言也故諸公貴人多所尉薦幕府交辟焉初河東行鐵錢君再疏極陳利害大略以官罏有數而私寫無藝恐終為民患自以言輕不足動朝廷又為歌詩四百言上之覬託民謠可以開悟于上其後果以不便罷嘗奏書仁宗請擇宗室之賢者建為皇嗣以繫天下之望御史中丞王安簡公得其藁而竒之欲以為裏行而君卒矣時皇祐四年八月某甲子也君既登朝贈其父國子博士娶同郡馮氏號仁和縣君繼卞氏永安縣君一男子曰聃舉進士嘗試于春官三女子適考功郎中鄭民憲進士周郁曹知微君卒後二十六年聃以長興宰陳之才狀屬于豫曰先人之仕于時官不過博士而夀止五十四曽不得少究其才志今將以某年某月某日舉君夫人之喪合葬于某山且念知先人之深無如公者幸一言以銘之遂為之銘曰少而學兮將有為壯而仕兮逢所知才信美兮生孔時命不究兮進則違厲風力兮排雲霓賈其良兮售不疑抗直論兮通天墀忽焉逝兮吁可悲職方貟外郎知泰州蔡君墓志銘錢塘蔡君子難以慶厯六年擢進士第起家為應天府榖熟縣尉再調房州司法參軍監亳州酒稅移宿州蘄縣令改泰州觀察推官以銓課轉大理寺丞監建州都茶場再遷殿中丞太常博士監在京雜買務知開封府襄邑縣召充編修樞密院例策歷尚書貟外郎以職方知泰州服父喪去位既外除矣以熙寧六年四月甲子寢疾終于家卜明年十一月丁酉遂葬富陽縣之仙山鄉瑞相原君年五十二諱某子難其字也少從安定先生胡翼之學經術尤長于春秋同門生丹陽姚闢嘗以三傳異議數十事探索其有無終日應答亹亹不窮闢曰安定之學盡于此矣及從仕則專意文法簿書之務纎悉靡密辨論上官前一無避憚至于不可屈而後已初在榖熟豫適為南京從事每見其邑文移精詳有理致屢持以白府府中滯訟疑獄數以委之于朋僚中特親厚豫嘗察其所趣舍操守甚悉且曰士之所以貴于學者蓋在適于時而有用也然古之人不患無時而患無知已者蓋欲其道有所信而不愧苟得耳豫以是知其有志于事業而不為陸陸者也是時故相杜祁公退居雎陽君以文章謁之一見嗟賞待以異禮留守觀文王安簡公嘗謂君曰祁公時所欽屬數道吾子之美子其勉之君既遇知已益自慎重由是當位者多稱薦之自酒官至編修凡七命皆從辟舉非由有司選擬也今參知政事王公北都留守文潞公太師張丞相故相梁侍中翰林沈文通樞直何公南皆所薦者而襄邑實用豫言領命梁公張公又以秦庭嘗僚連薦儒館之職朝廷再籍其名矣樞密府爵賞威刑之出動循故事國朝百年已行案草所謂例者以萬數或一事數例或徒具文而無定論異時引用去取往往先出吏手故前後繼擇才能士付之編輯有年數矣君至則區别類例日料十數事質于諸公著其可行者為令其重復無用者一切刪置甫四年而就緒凡得四百餘帙其别有開寶兵目暨驛馬令又被旨兼檢閲英宗一朝樞府故事送編修實録院書成再奏御詔賜金幣仍改五品服章以寵前勞特升秩一等留俾再任會御史言省冗官者編修其一也而君前此以便親請外官已得海陵矣因謂同寮曰此局必不應廢未幾二府置屬官並兼編修條例如其言治平四年秋夏國主秉常遣使朝貢京師官稱不與常年類既錫宴則欲敘官就席君時為押伴毅然責以屬國陪臣之禮當偃蹇若是耶其使戄息遂坐上丞相聞之皆曰善治郡政尚嚴整事無劇易一出于已每慮重囚則燕居審訊盡悃愊求其所以生之或諗曰彼罪當辟欲生之其可得乎既不能生之徒引日月何益也君曰獄情至隱難見一成不可復今使之辭窮且知無枉則死者與吾兩無憾矣民有坐教令毆人而過誤致死者情得覆讞于朝刑寺疑非實然再移旁郡又移别路皆不能易初劾一辭卒從末減議者乃知其下無寃民也于時農田使者督察郡縣求民疾苦而興置之君預條其利害可行不可行者待其至使之財擇上不違新書期會下無擾民趣辦之弊人便其政至舉州邀憲臺願再留君三年以終其賜監司第課為淮南諸郡最君既明于世務而慷慨敢言為編修時樞府諸公嘗詢以兵要輒隨問啓畫深見聽納故留在職最久當時臺閣文雅之士亦多與之遊接而喜聽其論議若毗陵錢君倚臨川裴如晦陳留孫聖塗並稱其才適時用然方一施之州郡其效已見使之年且久則其風力必復有過人者耶父諱某以君登朝洎郊霈恩三遷太子中允賜緋衣魚袋其卒也集賢校理劉君贛甫為之銘矣始中允君在吳稱善士能殖生産教子弟至君而棄其家事篤志于學問家之餘資常推以賑親戚之不能婚葬者平居不妄出入與過從者亦寡或問其故答曰省事逺怨于已足矣所為文章論議尤多自集為四十卷藏于家其配曰仁和縣君同郡孫氏女也生男子二長曰彥輔舉進士次曰彥弼齒始稚矣女子二一適永康縣尉丘沆一幼未從人去年春豫罷東陽守過錢塘見君之病止謂豫曰某起白屋遭時得科第仕宦幾三十年以朝郎典近州不為不遇也今日之疾革矣念今相知莫如公厚如不朽之事敢以為託豫色然顧其笑談如平生無他苦但勉以自力而去後二月果有訃至乃知其神宇素定不怛生死豈力學信道之有素者歟後又得其孤洎壻之狀請銘以成逝者之志義不得謝因為之銘銘曰君生錢塘氣溫質良佩服儒雅周旋吏方君葬富陽仙山故鄉神藏既固澤施彌長名在士林惠留海旁載辭遺後刻此隂堂工部侍郎致仕掌公墓志銘許之郾城有儒學之老曰尚書工部侍郎致仕掌公諱禹錫字唐卿起布衣取進士第補吏州郡以外臺保任試四才俱優改大理寺丞故觀文殿學士丁文簡公薦為侍御史故相杜正獻公薦試學士院帖館閣職凡仕四十六年年七十五由太子賔客遷二卿謝事還里中居二年而卒自結綬訖挂冠公私未嘗有小過失以夀終鄉閭君子以為行完而福茂宜有銘矣惟掌氏先出任姓黃帝之後魯有大夫黨氏者其别祖也黨掌音近故後世以掌稱而著者二族其一居琅邪曰掌同仕晉為顯官一居燉煌曰掌據前燕時封遂興侯公琅邪之裔也世占齊之禹城曽髙以來未有顯者皇考諱宣始以明經起家官至殿中丞贈其父諱庭暉大理評事殿中君既仕而徙家郾城因著籍其邑及公貴纍贈户部尚書公之始官歷蘄道二州司理參軍改秩知亳州鹿邑滑州胙城二縣通判安并二州知廬州未行留為御史出提點河東諸州刑獄公事入館閣以兵部貟外郎為集賢校理以刑部郎中遷直集賢院兼崇文檢討至光祿卿改直祕閣兩為三司度支判官徙判都憑由理欠司出省管勾國子監判司農寺同判太常寺兼禮儀事公少自刻厲力學以進取既為吏則益持其操檢故所居以幹廉聞倅并門日故太子太傅李康靖公洎杜正獻公相繼為守為之稱譽于朝由此名益顯景祐四年冬并欣地震民墊覆而死者什二三公以朝命案視其處賻死者而賙生者人用安輯其為御史論事務大體而略細故方是時元昊反大議入討公疏歷代禦戎周宣薄伐為得漢武逺討為失且言為今之畫宜省騎兵增步卒以固圉于內然後誘諸羌籍其衆以侵擾于外不三二年元昊之頸可坐而羈係矣明年三月有黑風晝晦冥之異公援洪範傳五沴侵陵之説以為此應西賊蓄鋭必圖內侵望敕守臣先事為備未幾賊殺金明羌帥李士彬覆其族而去公請急遣使者持璽書存拊其餘衆其援兵不救者望正軍法以固諸羌之心通判延州計用章坐逗撓軍事下獄流嶺南既而經略判官田京尹洙亦坐參謀失律降通判公合諸御史共論其事以謂用章之貶所以重者推劾盡文法之過也京等之責所以薄者特旨本明恕之恩也幸徙用章內地則仁恩之施溥矣用章卒得放還又論舉邊任官同罪非是曰親民錢榖之吏所以同罪者責其廉隅也用兵之法或使貪愚豈皆清方之士望令舉者但保明其材武則翹勇之人皆出而為用也其為提點刑獄奉詔募河東民為宣毅兵得二萬七千人調鄉民為義勇得七萬二千人皆教以兵技不數月而軍律用闕繄公課責之嚴也慶厯三年冬大河冰合邏者曰虜騎旦夕徑度矣朝廷患之命公護役疏鑿即時通流邊人賴之觀公之言與其施設豈特不為者然以刻意儒學不喜外官頗用此留滯終老文館而中心裕如也讀書無所擇經史之外至于五行星厯占筮地理百家之説世有傳者無不鑽鑿推求略皆通習藏書萬餘卷猶患不足月購嵗閲志不少怠嘗謂翻討書傳最為樂事一有會意如得竒貨人知其如此故求怪僻難知之事以窮其學之深淺公皆推本其自出以示之有未見者纍日尋究至忘寢食必得而後已故當時士大夫多以博洽推之雅為陳恭公器重當國日嘗召至中書謂曰上知君有學問故授以祭酒之任它日被旨與故翰林王公洙同撰皇祐方域圖志既成五十卷上之王公奏略曰並是掌某討論辨證非臣敢冒均其能仁宗面加褒語再命繪圖置便坐繼有金紫繒幣之賜是後刪修地里新書重纂類編補注神農本草編撰本草圖經公皆在其選三為開封府國學發解官所試詩賦論題必擇竒奧人不經意者由是士子望風畏憚至目為難題掌公然考核精審得人為最多故將作監丞楊置今直集賢院孫覺皆其所取解頭也再為殿試編排官預賜御書文儒考校字即日上詩稱謝優詔奬答其著述藏于家者文集二十卷晉陽刀筆六卷郡國手鑑一卷周易雜解十卷公為人疏闊與人言率直無緣飾初不知者謂為矯偽久而乃察其誠心無他也性至兢慎居常惴惴恐若有失在朝二十餘年非疾病慘恤未嘗移告當朝趨日則聞鐘聲而起未辨色而立馬闕門之側所蒞官局不以間劇日必一往雖祁寒盛暑大風雨雪率以為常非公事足不歷權要門嵗時禮慶則先至一謁而罷僕史知指是日往往不戒而集其舉動有常如此奉巳廉約衣服飲食一如布素時家無妾媵躬操几案之事人或譏其刻苦公亦不為改平生篤好推命之術自撰周易流演遁甲圖一卷以言人生受天窮通一出于命毫髮不可逃嘗推已之見生演其説為一卷曰年庚寅月庚辰日乙酉時壬午當易之歸妹困震所謂初中末三卦者也以世應飛伏納甲五行軌析數推之卦得二十五少分三卦合七十五年餘半祿秩算數休咎盡于是矣夢奠之前出其書以置枕旁遂易簀焉後豫取而視之雖不盡通其説然所書乃公中年時手筆推考始卒蓋不謬焉嗚呼可謂信道術而能委順者耶公四娶周氏張氏盛氏扈氏而盛氏故太保文肅公之女扈氏故翰林蒙之孫女逮封內黃郡君先一年而歿生五男世基世京並早亡世康和州防禦推官世程太常寺奉禮郎世衡大理評事七女子五皆從人而亡一適殿中丞文彥璋一適某軍節度推官劉翯孫十四人而五巳仕子孫皆傳家學勤吏事以持守其門户積善之慶于是乎見矣公于先人天禧中進士同年也而某自皇祐以來辱在館閣接公几研且十餘年又得與世衡為姻婭故諸孝嗣以紀述見屬義不得辭比葬之日以斯銘納諸壙中蓋熙寧元年八月某日甲子也其地則汝州鄉何延原先塋之次也其合祔則四夫人之柩也其銘曰士所以學貴乎博通潛心聖賢稽求大中得其本原治心養性探其枝葉保躬完行有如唐卿其志于是浹洽羣言沈酣衆藝既仕臺閣亦履通班不祈苟進卒老編研人謂之迂曰吾所好人譏其陋曽不改操今亡矣夫餘風可導來者不知斯銘以來光祿卿葛公墓志銘葛嬴姓出臯陶後以國為氏或曰與琅邪諸葛同族至漢晉有顯者仙翁稚川皆以道德稱于時時人以為神仙其後世居丹陽公蓋丹陽之系逺祖自新安徙新定至今為建德人祖贈太常丞諱某寬厚樂施悉以先世田宅推諸族人獨營郡之東山甲第以延接士人賔客使諸子從學焉父諱昂由進士起家為興化軍莆田尉充館閣校勘終尚書祠部貟外郎集賢校理纍贈户部尚書公諱閎字子容少年以名家子挾藝文一上擢天聖五年甲科當時士大夫之知者即以世職期之景祐中豫初涉場屋見公以文編贄先公先公謂某曰此該洽士爾宜從之遊自是相與往還情好莫逆故其出處閥閲得而悉之慶厯二年先公知貢舉與諸同僚奏辟公為點檢試卷官時故參知政事吳正肅公亦在貢部知公尤深既而合當塗貴人數公列削稱薦召試有日矣而以蒙山之纍止得升秩初公娶建陽陳氏故太常少卿直昭文館商之女殿中侍御史洙之妹赴官蒙山道梧江暴得瘴厲發狂自溺陳宗意其護視不如方死非其所自嶠南奪二從婢歸榜掠以求寃狀卒無倣佛殿中為之左右寬譬親意終不可解會御史章頻出為本道轉運使將案其事而無可驗者因謫公所部賣買小不如法坐是免官其後公卿間皆知出于捃托為上章論辨者又數十人幾三十年而大司徒魏國公方當國尤以為枉遂得湔滌敘緋衣銀魚不閡薦舉法然有薦監司者垂得移旨復以前纍而議格遂卒不偶焉公始解褐為大理評事知信州上饒縣親獲強冦當改服章以不欲自言而止尋徙知蒙州既罷官監在京藥蜜庫出知婺州蘭溪縣移知化州轉本寺殿中丞太常博士通判常州歷尚書屯田都官職方三曹貟外郎郎中用召試恩堂除知江隂軍始至以鹽冦梗江濵奏增黃淡落流二巡檢以扼賊衝因事召其黨類謂曰捕吏既密犯則不可解矣若輩有田者可以歸耕遊手者可以易業衆以信服犯者為稀少及代去有唐興者率江民市黃柑緑橘越境外以謝公使鬻之為歸糧又口占五字詩以遣之且有佩犢帶牛之勸明年積潦害田自午卸堰至黃田港徹大江四十里大議疏導料民丁充役募里豪得粟二萬斛以餔給之不日而功集餘粟尚數千斛又為奏留以資後來河役軍守圭田比他郡特厚公謂土少租重取之無名所得幾七百斛悉輸之官庾或謂太廉近名曰吾以免過耳以治最選知潤州西津巡檢卒因襲鹽冦匿商人財其主將構訟羣卒反側不自安公知使謂曰事有失誤能償其財足矣衆意乃定遷太常少卿光祿卿連知漳台二州漳潮之間素多冦暴公為嚴警候募勇敢士與巡捕吏約期必禽之屬尉有連貴要之戚者而失期會立案以法賊黨望風破散天台嵗苦水災每洪發則漂蕩民舍雖有捍水臺城斗門而緩急不能禦公至則相其地勢曰此髙下不相直耳命工鑿山石增培臺基峻導溝澮民皆便之後郡守吳可幾貽書于公曰台人二年無水憂前政之惠也觀此可以見治效矣臨海尉舒亶自逐羣盜手刃拒捍者監司以為專殺欲置之辟公力為直之至移鞫他郡亦不能奪其推心平恕又可知也然性介近狷又過謹畏與人接其意本勤然有終日相對或不交一言及遇同好則至誠悃愊談論亹亹通昔不厭故不知者謂其有城府往往待之如仇敵卒用此坐獲謗構轉運使一日得飛語謂台不治倉猝按部至郡留半月求其所以不治狀無毫毛私匿才得本岸修籠官船及公帑市外縣海物二事劾奏之大理當杖九十公坐遂以本官致仕公平生喜讀書傳寫對讎無有虛嵗所蓄幾萬卷常以自隨雖逺官閩廣﨑嶇山陸間亦未嘗置之初罷歸里中氣力尚健而生事素薄或勸其營産旁郡可圖豐厚者曰丘墓在此將安之乎所居惟故屋十數間陳文史于前日以遊目其家之有無一切不問病革猶不捨卷可謂好學也已所為文章溫粹辨博尤長于詩什舉進士詩賦御題南風之薰其警句曰氣生唐殿爽聲泛舜絃來初在優等為覆考誤降抑之猶不失上第後預編入仁宗羣玉集中尚方字扇亦有題此句者嘗進治安策二十五篇續策數十篇忠言十卷請塞詔舉不報其精心致思蓋亦勤矣終不以時不見用而廢翰墨此可見其所存也雅好評論時文每得一篇一詠摘其佳句成誦于口兩為南宫點檢試官凡經賞識者數十公後皆大顯于時其為郡亦崇尚儒學之士在丹陽尊禮章望之江隂劉洎新定倪天隱或親聽其講解或表薦其履行學者以此翕然稱譽之公享年七十以熙寧四年某月還政以五年三月甲子捐館舍以六年八月甲子葬于郡西建昌山之某原與繼夫人某縣君胡氏同塋夫人同郡人賢明有清操前五年卒公以失內助躬為治喪既得此地即于其旁自營夀藏比襄事其孤奉遵治命皆如素焉二子長曰平恕常州團練推官監歙州鹽酒稅次曰某尚幼也七女六皆適人一未嫁而卒前進士胡英才河南府户曹參軍鄭介卿祕書丞提舉江東常平倉何琬淮南節度推官知泰興縣程筠乾德令鮑祇陳留主簿周彥崇皆其壻也初公母王夫人早亡而集賢君以恩敘封止及繼室盧夫人痛不逮適偶時公尚幼解曰異時子有登朝者則追命自及矣洎為列卿王盧夫人皆進封郡太君在仕賙其宗族疏近均遍其貧不能葬為之助舉者凡二十一喪女兄先適蘇州司法參軍馮彭年既寡并其四子取歸以鞠育之至于成立又移俸錢給甥姪輩比退間俸益薄矣猶不取其移券考終之日家無羡財其子竭力稱有無以時遷厝由是南人士大夫益歎其清而有子以成志也時豫方守東陽頗聞此言悲夫公之文雅篤學如此而為當時公卿大夫稱道又如此同時輩流負藝能者無不升用公獨以小疵齟齬終老不得志豈其命耶抑人力耶豫至和中與今王府翊善馮廣淵同造正肅公公言疑似亂政不可不察古之傾家敗國者往往由之葛同年不幸遇此平生無以自明吁可畏哉豫嘗以為吳公有謂而言故記之詳也銘曰公以儒學遭明世又以文詞策榮仕有知已以薦其才有名卿以藉其勢合是數者宜遂厥志卒用不偶云誰之致達人所以安命君子所以貴義昭其懿實刋此沈志殿中丞華君墓志銘華氏出齊平原唐季之亂一枝徙吳居常州之晉陵者諱勳為郡著姓不干仕進槃樂于家生宏以季子太常博士參登朝贈大理評事生昂纍贈尚書駕部貟外郎君駕部之長子諱直溫字宣卿稚齒有立不類常童惟秉筆讀書外一無他好嘗慕藺相如之為人故志在功名既冠拔州進士薦已為鄉里稱美天聖末我先君宰無錫君與其從弟直清同以文章為贄先君一見大加賞異留君門下使豫從其遊因得接硯席習文史君性至勤刻所閲書傳皆手自抄撮日以三千言為凖雖甚寒暑或課試燕私則繼之以夜未嘗廢其程豫時羈丱趨進士科舉為君牽勉蚤暮不得息日至抄誦數書作詞賦歌詩雜文如是者幾二年因得通經術知古今繄率厲切磨之效也康定元年朝廷以西師連嵗不解詔致天下能言之士問所以攻取方略翰林葉公樞副孫公上君所著舉茂才䇿論其言兵有決勝之畫召試學士院補試祕書省校書郎充寧州軍事推官以駕部君年髙不赴既而遷保平軍節度推官鄭文肅公范文正公陳文惠公再舉君賢良試祕閣報罷復調廣濟軍判官徙池州軍事推官滿嵗考課用今定州韓丞相洎部使者五薦章當遷秩以親疾不俟引對而歸遂求還政改太子洗馬致仕君平昔志尚超邁學藴既厚思欲有所攄發嘗謂儒者事業以致君澤民為先務非乘時藉勢不可行已之志故始時鋭于進取三仕幕府雖不適其所懷然連佐貴近名臣亦欲因之有所施設故不屑小官亦不為權要而移其守以是諸公多稱其有風力前後薦者三十餘人而卒不得遷初國子監薦直講而講官方限年五十以君少不如格嘉祐中朝廷選該洽之士編校館閣書籍時韓忠獻公執政欲用公以君休老而罷是可以謂之命耶今上即位泛恩遷殿中丞賜五品服元豐元年八月十六日以疾卒于家享年七十三始君求致政時年且四十九自謂士非無時而知我者不為不多然動輒齟齬欲強不可故勇于退休既還家杜門不復接世務以文酒自樂間命子弟講説義理欣然如有所得交親相過從則酣飲笑歌極歡醉而後止如是者餘二十年如一日也去年豫自錢塘還京師道毗陵過君留連道舊故悉出諸子為拜意勤勤且言少年相從時慷慨論時事一何壯耶豈意離闊四紀而才一交臂人生出處不可期如此今僕優遊鄉閭而無所求一見故人足以慰平生矣今又以七言詩見懷豫方屬和未達而君逝矣嗚呼可悲也君娶同郡李氏早卒追封南宫縣君又娶丹陽周氏司勳貟外郎陵之女生三子逢遘皆舉進士遇尚幼三女並歸進士君所著文章三十編凡三千餘首風格渾厚論議純正引據深切大抵宗範韓栁而歌詩尤多手録舊抄今存者猶百餘秩其用意專篤又可知也逢遘卜以其年十二月庚申葬君晉陵縣萬安西鄉油澆墽之南原先期以書屬豫曰知先人之深且久莫如公者不朽之托敢以請豫感今懷昔不覺愴動遂為之銘銘曰古之君子學以為已或出或處視其所履得時而行不能則止在義不虧視彼猶此宣卿克勤篤好斯文旁通浹洽論著淵純壯志超鋭陵厲霓雲進而齟齬退亦逡巡年甫知命遂還官政安頥里閭沈酣觴詠其生既全其終乃令刻銘隂堂以鴻後慶蘇魏公文集卷五十六
