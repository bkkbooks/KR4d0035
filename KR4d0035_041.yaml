body:
  text: 蘇魏公文集卷四十一宋蘇頌撰表再乞致仕臣某言竊以禮有傳家之制既巳過期官無治職之能固宜引分苟逭大何之責豈邀易退之名輒露心精庶回天鑒臣某中謝伏念臣學非適世才不過人自童稚見聞粗知臺閣之故事至聖賢功業徒識君臣之大倫謬齒諸儒浸階膴仕典領衆職出入四朝荷化育于乾坤久鶱翔于禁近器小誠難於受大恩深罙覺于命輕逮兹膂力之愆尚玷紀綱之寄達于從政愧非戴胄之宿名行而後言竊慕魏舒之辭位伏望皇帝陛下矜憐晚節惻軫睿慈謂君子之業欲及時何資衰耄而匹夫之志不可奪曲賜照臨聽善解于朝冠獲退居于里第戢鵷鴻之弱羽勿用為儀收牛馬之殘軀俾無失性縱諧散佚敢忘生成臣欲乞守本官致仕臣無任又臣某竊以蒞官無補揆才力之易窮謝事告歸審筋骸之難強矧久踰于禮制敢固戀于恩榮祇竭懇誠仰祈昭鑒臣某中謝伏念臣所憑薄陋洊遘休明學古入官顧時才之無取考言詢事校治行以非優十年抱槧於書林二紀持荷于禁闥始緣孤進誤被上知每懷竊位之慙但念捐軀之報松柏之操始無變于嵗寒桑榆之隂忽見收於晚景參陪國論再閲嵗期肉食寡謀職與憂而並撓蓬心多慮年兼病以俱侵懼髙位之疾顛豈羸軀之可逭伏望太皇太后陛下心推善貸仁憫無能保全進退之方砥礪亷隅之守察知衰苶聽釋官常至德有容亦不違于人欲散材無用俾自遂于天年雖處丘園寧忘朝闕臣欲乞守本官致仕臣無任第二表臣某言伏蒙聖慈以臣近上表乞致仕特賜批答不允者需頭露奏姑罄危誠出綍下書更叨優禮仰循詔意祇見上衷餘懇未殫嚴誅罔避臣某中謝臣聞竭股肱而任職所以盡事君之忠量筋力以使人所以示優老之禮當齒強則仕逮年至而歸斯進退之大方實古今之通誼敢懷貪冒瀆紊典常伏況丞轄之司紀綱是寄釐百工而欲庶官之無曠開衆正則使羣枉之並消而臣年迫衰遲學尤迂闊自入陪于大政常內省于非才贊一日萬幾之謨何堪助治居三事大夫之列久巳妨賢閲嵗月以既多視面顔而有靦因祈引老尚冀投間雖聖詔在寬未忍遽遺于舊物而人言所指固宜允蹈於前修苟尚偷安懼難終吉伏望皇帝陛下中恢淵度下徇物情推天地之至恩察禽魚之所欲許其遂性賜以殘骸將使皓首清朝歌詠太平之盛角巾私第優遊羣萃之間得請為期沒齒知報臣欲乞守本官致仕臣無任又臣某言伏蒙聖慈以臣近上表乞致仕特賜批答不許者抗章有請念舊不遺跪讀訓辭內深感涕臣某中謝竊以不能者止否則至於敗官自知者明行之在乎審已矧寵恩之既過加年制之宜休雖君親之眷未忘而卿庶之言攸戒終期賜可敢重陳情伏念臣人本下中任叨顯近久負素餐之誚尚寬司敗之科稽按禮經當還職事皂囊露奏敘遭際之有年尺詔敷言荷矜存之盡禮未令置散復俾冒榮伏況南宫二丞總王官之六職太微四輔贊天子之萬幾自非強有力之才必致罷不勝之責顧兹昧陋加以耄昏入侍殿帷每虞于顛仆出釐省務益苦於沈迷縱勉強于夙宵難遷延於嵗月倣徨再黷惕息無從伏望太皇太后陛下恢天德之清明審人才之能否壯而任其力可以責于事功老者遂其情俾處之於間燕特頒俞旨聽解見官西夕餘光倘未淪于濛泛東郊卜築尚依止于王畿臣欲乞守本官致仕臣無任辭免右僕射臣某言伏奉制命特授臣左光祿大夫守尚書右僕射兼中書侍郎加上柱國進封開國公加食邑七百戶食實封三百户臣尋具劄子辭免伏蒙聖慈特降中使賜臣詔書不允者告廷命下鼎司誤擢于非才捧制魂驚囊奏輒辭于異數祇被璽書之寵答恭承天旨之恩褒義有未安理難中默臣某中謝臣聞昔聖王之命相也必先審觀器能稽參行實知其可任也然猶考之蓍龜謀及卿士而後授之其重如此故能表率百官緝熙庶績以輔成王業而寅亮天工屬逢治朝慎重名器公台並進豪傑相望如臣至愚本非大受有能俱短自知甚明核其藝文不離刀筆箱篋蓋史官博士之才發于事業惟在期會簿書非大臣公輔之器徒以荷知二聖預列近司閲嵗再期汙朝纍久贊功論道硜硜不逮于衆人詢事考言碌碌每虞于大譴加之暮齒已絶進心驟膺右弼之咨兼重二臺之委力小任重罙負不勝之憂福過災生斯為必至之理敢殫再瀆之懇仰俟曰俞之音伏望皇帝陛下太皇太后陛下推鴻造之生成察羸軀之疲曳博求時望參聽師僉必有築巖兆夢之賢來符爰立庶使鑿址益髙之纍不在孤危干瀆宸嚴臣無任第二表臣某言伏奉制命特授臣左光祿大夫守尚書右僕射兼中書侍郎加上柱國進封開國公加食邑七百戶食實封三百戶臣尋具劄子辭免伏蒙聖慈特降中使賜臣詔書不允者再殫危懇期力避于誤恩洊拜批章尚未俞於素望雖言輕莫能動蓋髙之聽而情至無由避三黷之煩仰叩睿明恭祈可旨臣某中謝伏以尚書之設二揆昔稱師長之官春秋之尊上公是為天子之宰有其人則起巖穴辭釣築用不為過非其任則覆鼎餗橈棟梁人將謂何蓋四方百辟之所瞻豈積日纍久之可致矧當核實之旦尤見進人之難如臣者履歷無奇遭逢惟舊學將落而智巳耄任益重而志罙衰其在朝廷典領雖更於事任試之丞轄毫分無補于公家坐閲嵗成寖加齒耋據經告老每懷止足之心輔政持衡固非衰遲之任驟膺殊渥進躐中階黧貌塵纓豈稱袞衣之貴秩孤誠小節願回麻制之新恩非邀沖退之名實覬保全之幸伏望皇帝陛下太皇太后陛下察言觀行選衆舉知深惟體貌之隆更重股肱之寄三公之官不必備當待異才一國之人皆曰賢乃加圖任收止揚庭之命免貽遊校之譏所係非輕得請是望臣無任謝右僕射臣某言伏奉制命特授臣左光祿大夫守尚書右僕射兼中書侍郎加上柱國進封開國公加食邑七百戶食實封三百戶尋具表辭免伏蒙聖慈特降中使賜臣批答不允仍斷來章者天工人代而無曠官聖王所以重于命相德薄位尊而鮮不及前哲所以審于量能顧惟衰朽之餘猥被弼丞之選躐三階之名秩兼二省之事權恩數寖隆責任彌重趣拜往俞之命益深非據之憂臣某中謝竊以大臣國家之股肱蓋同一體卿相人主之几杖用正四方稽在昔之聖明委政事于輔佐任稷契之筋力唐堯所以和萬邦得良平之腹心漢髙所以成大業肆我朝之致治放上世之休功承平者百三十餘年登用者四十有九相勳猷允集豪傑相望炳若丹青見于圖像重明在御建輔尤難自非得髙世之真賢何以蹈羣龍之偉躅如臣者資無異稟仕偶亨辰出入四朝殫竭千慮居官任職非汲黯社稷之臣激濁揚清無山濤廊廟之器徒以遭逢既久憂患兼深差池寖迫于桑榆蓄縮每懷于枌梓詎期晚節猶點榮塗荷二聖之甄收首六官而進用洊陪經幄繼直禁林省轄左綱輔政未收於薄最天臺右相位槐遂列于上司忽驚非次之恩屢上固辭之請循牆而走漫勤三命之恭坐廟以行深負萬人之責此蓋伏遇皇帝陛下廓規橅于三代核名實於羣臣克勤于邦體乾健之不息注意于相致泰亨之大來方圖舊于耆明將仰成于幾政豈臣昧陋足副登延鎮俗移風固非公權之宿望守文持正敢希宋璟之精忠倘有補于萬分敢憚辭于九殞臣無任又臣某言伏奉制命授臣左光祿大夫守尚書右僕射兼中書侍郎加上柱國進封開國公加食邑七百戶食實封三百户尋具表辭免伏蒙聖恩特降中使賜臣批答不許仍斷來章者求賢以備近職上輔邦經孚號以告外庭蓋參公論詎意耄荒之質猥當簡注之求仍進峻于朝階復躐升于公爵勳封並進名器益隆首戴嶽以難勝背負芒而集懼臣某中謝竊以統理庶務師長百僚在今二揆之崇乃古三公之任廟堂論道極天人精祲之微帷幄陳謨盡文武弛張之術非賢罔乂惟帝其難俾之預裁成輔相之宜必俟得明允篤誠之士如臣者進惟一技仕歷四朝少履亨塗升黜僅踰于三紀晚叨非任甄收特出于兩宫秋曹選部之踐更浴殿邇英之延訪每思齒髮之衰暮屢丐田廬之退休豈惟未遂于素誠更乃重蒙于奬擢入持綱轄參預政機乏贊襄熙載之功負委任責成之意敢期聖度未棄老臣制書忽降于帝俞宰職使承于人乏南宫右相西省內樞併假寵于非才懼疾顛於重任輒殫僭懇丐寢誤恩輸誠巳至於再三趣拜屢頒于尺一雖絲綸誕告綍罙大而莫收而楶梲扶傾棟且隆而必橈省思其分造次靡寧此蓋恭遇太皇太后陛下垂衣裳而取諸乾坤柄爵祿以馭其富貴親賢為急法唐堯之用心降已不遲邁商湯之臨下察羣才之能否矜一介之孤愚拔于稠人付以大柄位非所據臣猶自知惟當盡至公之心不敢懷苟得之幸衣冠藴藉常戒韋平之譏臺閣規橅願遵房杜之業用兹許國誓以捐軀臣無任乞致仕臣某言臣聞物壯則老蓋天理之固然器滿則傾在人情之攸戒矧夫齒髮衰謝爵位隆髙倘猶昧於退藏行必招於顛覆懇誠所迫冒黷寧逃臣某中謝伏念臣稟賦無奇遭逢有素􅏡歷中外竊祿者逾五十年校量事功報國而無萬分一逮兹羸薾尤切歸休不圖疲曳之軀簡在聖明之眷擢由省轄旋正宰司每慙誦數之儒久玷訏謨之地木將腐朽難荷棟梁之材衡僅錙銖莫勝鈞石之重不能者止自知甚明敢殫量力之誠再露乞骸之奏伏望皇帝陛下太皇太后陛下至仁惻隱盛德包荒均委照于大明推曲成於全度使人以器方圓大小隨其宜造物如天生長收成遂其性矜臣愚耄許臣便安七十傳家俾克諧于私願尺一歸第獲保養於頽齡雖處丘園敢忘朝闕欲乞守本官致仕臣無任第二表臣某言伏蒙聖慈以臣近上表陳乞致仕特賜批答不允者至誠上露丐還印綬之榮中旨下頒洊降絲綸之語未從願望敢重叩陳臣某中謝伏以委質清朝固念忘軀之義引年暮景蓋思歸骨之期矧既迫于耄齡實巳踰於禮制尚尸官秩益負靦顔伏念臣猥以孱虛久叨任使位崇三事職贊萬幾進無特立獨見之明上禆國論退忘量力知止之分自為躬謀勉強立于周行之中浸尋至于嗟耄之悔筋骸寖憊精爽彌昏悴質羸軀視簪纓而有愧孤誠小節議帷幄以何堪是用控布腹心之微干祈旒冕之聽仰紆睿眷特諭褒言雖鴻造曲成未忍棄捐于陳舊而危心自揣固難貪冒于寵靈但虞覆餗之愆上玷知人之哲煩言喋喋中抱兢兢伏望皇帝陛下太皇太后陛下察見精衷灼知衰朽賜保全於晚節俾休逸于餘年聽解政機許歸里第所冀遊化國之日遂安養于天倪與擊壤之民共謳歌于聖治臣欲乞守本官致仕臣無任辭免郊禮加恩臣某言禮行郊廟之祀慶浹綿區內出絲綸之函恩均近著顧備員于丞弼叨進律于戶封側聽明􅏡實增憂惕臣某中謝伏以報本反始禮經所以尊大神發政施仁霈澤由之逮黎庶內則公卿扈從之列外則方嶽封疆之賢咸有來助之勤宜先賚善之錫詎期愚陋首被旌褒伏念臣樗櫟材疏犬馬齒耄誤蒙二聖之眷擢在四鄰之班位上中台之階久塵顯要講南北郊之議靡有發明伏遇皇帝陛下逺法祖宗之謀躬嚴聖孝之享薦祼九廟彌盡時思之恭合祀二儀欽修昭事之敬煙燎云畢人神以交嘉與夷夏之間同均雷雨之施遽頒明制假寵非才增書社于千家衍真租於百乘雖官居衡軸推命數以惟優而效乏涓塵聞德音而靡措量能揆已將恐且驚伏望皇帝陛下如日燭幽均天豫祿慎假人之名器重為國之典常特徇愚衷聽還前詔庶幾在官逭無功受賞之譏勉慕古人盡以道事君之節兢凛之悃殫竭于兹臣無任第二表臣某言肆類圓丘靡有相祠之效貢章宸極願還增邑之恩祇被詔函尚煩敦諭顧迫難安之義敢辭再瀆之尤臣某中謝竊以饗帝與親非聖孝不能兼其事詔王以柄先爵祿所以馭其臣欲無虛受則當念量能可以勿豫則或虞傷惠苟見得而忘義必近辱而招憂伏念臣學昧大方仕無小補幸遭時而取寵久充位而蒙譏方國家報本之初乃臣子竭誠之際既不獲執豆籩而陳力又未嘗陟壇陛而致恭徒參扈蹕之勞敢有貪天之效例叨優渥深愧踰涯伏望皇帝陛下特軫睿慈曲從人欲許遂匹夫之志聽歸千户之封不稼取禾庶逭伐檀之刺無能倍賦免貽鳴鼓之攻傾俟俞音俾安愚分臣無任蘇魏公文集卷四十一
