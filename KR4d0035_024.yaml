body:
  text: 蘇魏公文集巻二十四宋蘇頌撰内制賜五臺山寺僧正省竒以下奬諭勅書勅五臺山十寺僧正省竒等覽所進奉坤成節功徳疏等事具悉眷彼仁祠奠兹臺岳集慶門之清衆祝誕日以延洪載閱疏封良嘉誠懇今賜省竒等紫僧衣一對絹二十匹故兹奬諭想宜知悉秋熱各比清休否遣書指不多及賜前兩府并待制以上知州初冬衣襖詔勅書勅某清風戒寒獻良裘而在御邇臣守位殿藩服以方勤禦兹霜律之嚴宜有衣章之賜既安且燠益體予衷今賜卿翠毛細錦旋襴一領至可領也故兹詔示想宜知悉冬寒卿比平安好遣書指不多及賜諸路知州職司及總管鈐轄至使臣衣襖勅書勅某肅祗朝寄外恪官箴式臨寒律之初用錫功裘之寵服兹純麗毋憚凝嚴今賜汝紫羅錦旋襴一領至可領也故兹詔示想宜知悉冬寒汝比好否遣書指不多及賜諸路蕃官及溪洞蠻人初冬衣襖勅書勅某汝恪居邊土祗服朝經爰及歲寒特加時賜寵被纊繒之麗益勤忠順之方賜汝方勝練鵲大錦旋襴一領至可領也故兹詔示想宜知悉冬寒汝比好否遣書指不多及賜諸路屯駐駐泊就糧本城諸軍員寮等初冬衣襖勅書勅某州諸軍員寮等冬律方升良裘始獻爰念扞城之旅特推賜服之恩被此衣章毋忘固圉今賜汝等初冬衣襖餘從宣命指揮故兹詔示想宜知悉冬寒汝等各比好否遣書指不多及賜于闐國進奉勅書勅于闐國黒汗王省所差人進奉某物事具悉卿守在西陲心馳上闕爰遣梯山之使荐修任土之儀深諒乃誠不忘予意所進到物色今就整回賜錢二百貫文馬依估價回賜錢五十貫文以浙絹充並交付差來大使黎撒囉瞎征等至可領也故兹詔示想宜知悉秋熱卿比平安好遣書指不多及賜于闐國示諭勅書勅于闐國黒汗王省所差人來進奉大使黎撒囉瞎征等進奉到某物事具悉卿逺馳信介入覲王庭效川珍岳貢之勤厚地産風宜之品特隆報賜用荅忠嘉黎撒囉瞎征等進奉到上件物今依估價就整回賜錢一萬五千貫文故兹詔示賜于闐國男進奉勅書勅于闐黒汗王男丙令渧根省所差人進奉某物事具悉汝夙禀教忠罙勤向化因使人之來覲展方物以効勤省閱之餘嘉稱在念所進到物色今就整回賜錢五十貫至可領也故兹詔示賜西南蕃程以途等進奉勅書勅程以途省所附進馬二匹氊二領事具悉汝世守封疆心馳象魏歴涉逺道來貢風宜載認忠勤良多歎尚今回賜汝紅中錦夾旋襴腰帶衣著至可領也故兹示諭想宜知悉冬寒汝比好否遣書指不多及賜南平王李乾徳加恩制誥勅書勅南平王乾徳近以季秋仲辛稱秩元祀禮成太室澤被綿區眷言分土之臣不懈勤王之職純誠益著信賞攸先加地進封載隆命數承神之惠罙厲忠規今差使臣齎卿加恩制誥付廣西經畧司令於界首就賜到可祗受兼賜卿國信物等具如别録至可領也故兹示諭想宜知悉冬寒卿比平安好遣書指不多及賜西南蕃龍以利等進奉勅書勅龍以利省所附進馬二匹朱硃二十兩氊二領事具悉汝守封遐域嚮義中華欵塞來庭效珍修貢忠勤弗替嘉歎良深今回賜汝紅中錦夾旋襴一領八兩渾金鍍銀腰帶一條衣著一十五匹至可領也故兹示諭想宜知悉冬寒汝比好否遣書指不多及賜西蕃邈川首領河西軍節度使阿里骨加恩制誥詔勅書勅阿里骨國家講禮九筵獲奉帝親之享大賚四海用廣神明之休乃眷世臣宿勤貢職爰推祭澤寵進官儀當體至懐即欽成命今賜卿制誥到可祗受故兹詔示想宜知悉冬寒卿比平安好遣書指不多及賜知渭州劉昌祚等進奉助明堂馬詔勅書勅昌祚等省所進奉助明堂馬五十匹事具悉宗祀配天國家之大事職來助祭臣子之至誠乃眷守藩之良勤修任土之式載觀厥貢深諒爾衷故兹詔示想宜知悉冬寒卿等各比平安好遣書指不多及賜南平王李乾徳厯日勅書勅南平王乾徳朕克謹天戒敬授人時眷乃炎陬被我聲教奉若新書之告遵修嗣歲之宜率俾提封共知叶紀今賜卿元祐五年厯日一巻至可領也故兹示諭想宜知悉冬寒卿比平安好遣書指不多及賜外任臣寮進奉坤成節功徳疏詔勅書勅韓縝覽所進奉坤成節功徳疏一軸銀軸頭事具悉卿任分守土義切愛君秋令協時適紀誕彌之慶真乗演法逺輸善祝之誠披閱嘉歎不忘予意故兹詔示想宜知悉冬寒卿比平安好遣書指不多及賜溪洞進奉賀明堂并興龍節及冬正溪布示諭勅書勅彭儒武省所進奉賀明堂并興龍節及冬正溪布共六十匹事具悉汝介居裔土向慕華風越川陸之修塗展歲時之方貢忠勤備至歎尚不忘故兹示諭想宜知悉冬寒汝比好否遣書指不多及賜知大名府馮京進奉賀明堂禮畢馬詔勅書勅馮京省所進奉賀明堂禮畢馬二匹事具悉近以禮行太室澤霈綿區荷上神並况之仁繄羣后職來之助卿國之耆哲外守都圻不忘象闕之心逺致材駒之貢省閱之際注想尤深故兹詔示想宜知悉冬寒卿比平安好遣書指不多及賜徐州觀察使知渭州劉舜卿進奉賀明堂禮畢馬詔勅書勅舜卿省所進奉賀明堂禮畢馬五匹事具悉近以宗祀合宫布澤綿宇乃眷藩方之列固多職助之勤逮此慶成允修貢式益彰䖍恪良用嘉稱故兹詔示想宜知悉冬寒卿比平安好遣書指不多及賜五臺山十寺僧正省竒等進奉興龍節新正功德疏奬諭勅書勅五臺山十寺僧正省竒等省所進奉興龍節并新正功徳疏等事具悉適届誕辰繼臨嗣歲眷靈山之浄衆演竺土之真文延祝彌勤嘉歎于再今賜省竒等紫帽衣一對絹二十匹故兹奬諭想宜知悉冬寒各比清休否遣書指不多及賜溪洞進奉賀元祐二年三年四年興龍節端午冬溪布勑書勅向永勝省所進奉賀元祐二年三年四年興龍節端午冬節溪布共四十五匹事具悉汝介居疆裔恪奉朝經嵗時之貢不愆風土之宜沓至益堅恭順深體忠勤故兹示諭想宜知悉春寒汝比好否遣書指不多及批荅賜新除右光禄大夫知樞宻院事孫固辭免恩命不允斷來章批答省表具之卿老成重徳乆任近司昔在先朝巳長樞柄比圖宿望入踐東䑓忠諒之心始終弗替再踐帷幄方竚逺謀繼上封章懇辭寵命惟朕志之先定矧成命之巳行雖諒由衷抑難從欲所請宜不允仍斷來章不許批荅覽表具之樞機之政方藉舊賢封章之陳欲辭新命惟卿徳業之茂乆副士民之瞻表儀近司師僉允穆毋事撝謙之守副予注意之隆往服恩徽竚觀逺畧所請宜不許仍斷來章賜新除守門下侍郎依前中大夫劉摯辭免恩命不允斷來章批答省表具之昔龍筦納言帝命惟允在今台輔之任兹惟喉舌之司自西省而次遷盖柄臣之更踐以卿儒林舊徳足以逺繼於古人何其露奏陳情乃欲固辭於成命朕言巳布謙守難從所請宜不允仍斷來章不許批荅覽表具之中書政事之本黄門出納之司皆為輔臣共幹幾務以卿文學行義為時宗工更踐二臺實允羣望奚過持於抑畏乃控露於懇誠雖嘉遜爵之髙難廢出綸之命所請宜不許仍斷來章賜新除護國軍山南西道節度使守太師開府儀同三司河中興元尹潞國公致仕文彦博上第二表辭免兩鎮恩命不允斷來章批荅省表具之貴徳尚齒三代所以事老更加等出封九命所以尊牧伯卿祖宗輔相朝廷表儀三冠台衡七換旄鉞故事留於臺閣威名憺乎戎夷再陟師垣言歸里第功名既遂恩禮宜殊特加雙節之榮以寵上公之去繼披需奏願襲舊藩雖明哲所存不移於素守而老成得謝固異於昔時宜體至懐勿復多避所請宜不允仍斷來章不許批荅覽表具之卿以天下之望輔相祖宗之朝以元老之猷再起里閭之逸左右初政勤勞五年多士仰之如蓍龜朝廷尊之為師保力辭大任復歸舊廬三公職儀巳極師臣之重兩鎮旄鉞猶有前詔之加假兹貴名示以殊禮何封章之屢抗援故事以為言雖遜爵之誠則然顧崇賢之禮具異宜無固執亟服新恩所請宜不許仍斷來章賜新除中大夫守尚書左丞韓忠彦辭免恩命不允斷來章批荅省表具之卿慶門毓徳近著躋榮内外踐揚績用尤著擢居承輔實允僉言遽覽奏封載形謙叙惟朕志之先定方嘉汝賢况省務之難停尚何所避所請宜不允仍斷來章不許批荅覽表具之二轄之任四輔維均嘗歴選於時材宜莫如於世徳禀金籯之訓諒家學之不忘詠緇衣之詩乃國人之所好往就厥職毋勞固辭所請宜不許仍斷來章賜門下侍郎孫固上第二表乞致仕不允斷來章批答省表具之朕臨御丕圖聿懐先帝疇咨近輔思用舊人昨起卿於近藩遂任卿以大政庶幾謀議尚有典刑近屬爽和屢求去位詔書敦勉仍予告以養頥封章繼聞復力言於疲苶初則有謝事引年之請重之以忘公廢禮之憂再味遜辭實為過慮惟寢興之自護副嵗月之仰成即俟痊平毋煩懇慤所請宜不允仍斷來章不許批荅覽表具之卿儒林舊老先帝輔臣重外居多復政未乆偶縁膚腠之病遂有丘園之思屢抗封章堅不回於素守再頒詔諭仍優給於假休復覽需章力言曠事矧朝廷之待近弼豈責以筋力之勞而律令之於大臣亦分於予賜之告其少安於燕處毋深念於職憂雖諒至誠難從雅志所請宜不許仍斷來章賜新除殿前副都指揮使武康軍節度使劉昌祚上第一表辭免恩命不允批荅省表具之卿早以武才帥於戎閫綏懐羌右有長轡逺馭之謀鎮靖疆陲得輕裘緩帶之體録其邊最召以鋒車授英節於梁洋委親兵於環衛出命惟允何名以辭即宜拜恩往服厥職所請宜不允不許批荅覽表具之近以柬求環尹慎付節旄眷彼才臣乆勤戎畧督護諸將寛明得於士心綏附三陲威信行於羌種擢居嵓衛允副僉言遽閱奏章固辭恩命雖嘉所守難即爾從所請宜不許賜新除中大夫同知樞宻院趙瞻辭免恩命不允斷來章批荅省表具之夫名位不同設官所以峻亷陛嵗月累乆序進所以旌勤勞况乎預議樞衡朕所體貌既觀宣力之效故有加等之遷官次當然爾其毋避所請宜不允仍斷來章不許批荅覽表具之國家慎重名器以待賢能既得其人乃命以位卿預本兵之政固已有勞推進秩之恩盖示優禮宜亟就位毋或過辭所請宜不許仍斷來章賜新除中大夫守尚書右丞許將辭免恩命不允斷來章批荅省表具之士之立朝豈不為道朕之注意亦欲仰成既嘉卿中外治蹟之優故任以左右省綱之寄宜攄學緼輔我政幾毋或固辭竚觀逺業所請宜不允仍斷來章不許批荅覽表具之卿文學有以髙世議論有以過人入輔出藩多歴年所代言視草再直禁林已觀詳試之能遂擢丞疑之任何其謙慮欲避寵章體予至懐往欽成命所請宜不許仍斷來章蘇魏公文集巻二十四
