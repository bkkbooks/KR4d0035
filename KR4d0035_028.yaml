body:
  text: 蘇魏公文集卷二十八宋蘇頌撰內制正月一日皇帝御大慶殿受文武百寮朝賀行上夀之儀樂章曲名皇帝舉第一盞酒奏靈芝之曲嘉端降靈應我皇德燁燁神芝不根而植春秋三秀晝夜五色物播詩歌聲被金石皇帝舉第二盞酒奏夀星之曲倬彼見象於昭于天維南有極離丙之躔既明且大應聖乘乾誕受景福億萬斯年皇帝舉第三盞酒奏甘露之曲泫泫零露雲英醴液和氣凝津流甘委白飴泛柈杯珠聨竹柏天不愛道聖功允格賀冬年節詞語內中侍御已下賀皇帝冬至詞語伏以日南逺極驗景至于地中斗北中繩候陽萌于物種福釐均被寰海攸同伏惟皇帝陛下盛德膺期至仁御宇堯雲在望上當書物之祥禹璧惟輕獨念惜隂之貴宜民受祿羞耉惟君降兹有永之年嗣乃無疆之厯妾等幸逄休運獲𨽻禁庭仰瞻咫尺之顔願介厖洪之祚太皇太后詞語伏以八景朝元奉太微之遊宴五雲辨物占魯觀之禨祥海宇隆平宫闈泰豫伏惟太皇太后陛下功參化育道契清寧神靈合謀與日還而斗轉晷景循度驗嵗美而物成默而應天地之和靜以待隂陽之定保邦基而永固延福夀以無疆妾等備數宸闈聮榮婦職仰祝松椿之算但傾葵藿之心皇太后詞語伏以日候清臺景下盈于尺表陽生密室氣上應于飛灰萬國同休六宫均慶伏惟皇太后殿下德隆軒曜道應坤元躬孝養於東朝內隆隂教推慈儀於正寧益懋聖功當七日來復之期膺萬夀無疆之慶妾等幸叨女職祗事掖庭奉觴共罄于歡心頌履敢傾于善禱內中侍御巳下賀太皇太后年節詞語伏以獻嵗發春肇三陽之交泰履端于始為萬物之權輿恭惟太皇太后陛下繼善體仁正心率下布德行惠順時令而罔愆知人安民固邦基于不拔肇履維新之序更增有永之年妾等祗事宸闈幸逄聖治趨玉階而致禱祈寶厯之無疆皇帝詞語伏以嵗移木德會天運之更端歷用夏時候人正而謹始恭惟皇帝陛下大明善照洪造無私不言而行四時靡愆消長正本而理萬事自致中和方嵗旦之荐祥宜天休之協吉妾等幸叨嬪御獲𨽻宫庭仰瞻咫尺之顔願祝靈長之祚皇太后詞語伏以太蔟回律物萌震起之端招搖指寅時布寬和之令恭惟皇太后殿下仁覆邦國德配乾坤徽音不忘克嗣齊莊之美彤管有煒尤髙貞靜之風肇履端元倍迎釐祚妾等叨聮禁掖獲事宫闈敢同九御之誠敬上萬年之夀春帖子皇帝詞六首五言其一乘震司春令先天布政經人時頒鳯厯農事視龍星其二光宅唐堯日暄和太昊春德如天溥愛性與帝同仁其三西昴昏當午諏訾旦在東聖君南面治常候四星中七言其四律管已當人統月斗杓初建孟陬辰新修元祐萬年厯今日才開第五春其五五時讀令王春禮大駕臨朝晉室儀東作西成皆有序欲民敦本使前知其六四時嘉節宴遊稀盛德先從學士知每嵗惟呈簇金帖新春不和綵花詩太皇太后閣六首五言其一氣至風條達陽升土墳盈藝藝生物遂兩兩泰階平其二聖詔頒寬大天恩遍邇遐雷風孚號令草木動萌芽其三寶厯書推律春觴頌獻椒年年似今日三萬八千朝七言其四冬後五旬逄嵗朔臘前三白遍民田朝來淑氣先時至又見春秋大有年其五荆楚牛人驅厲氣安豐棗臘祀蒼精聖朝雖舉前朝事不為禳祈為勸耕其六上夀春朝覲外庭詔恩不許會公卿即時二史書謙德只使羣官進姓名皇太后閣六首五言其一九扈方司啓潛陽已發春瑤觴進椒柏眉夀祝靈椿其二冬至四十六三陽生此辰帝令天下夀鑽燧教斯民其三晝景添宫漏慈闈念女功常時浴蠶日親到濯龍宫七言其四東郊青幘拜春回迎得陽和次第來風向烏竿千里應氣隨魚鑰九重開其五蓬萊殿裏春開宴長樂宫中帝奉親婦順母慈流美化萬方歌頌贊娥莘其六花影遲遲轉午隂漸聞宫栁變鳴禽休呈金綵矜工巧但閲圖書鑒古今皇太妃閣五首五言其一愛敬承三殿慈柔化六宫常膺萬春祝永繼二南風其二甲觀翔雲覆新宫晝漏長栁條初弄色梅蘂巳飄香七言其三聖皇欽翼孝心存宫閣深沉母道尊初慶新陽生嶰律又聞清蹕過堯門其四天下太平今有象宫中行樂但迎新萬年枝上看春色三素雲中望玉晨其五冰散瑤津波隱隱雪殘鳷鵲氣蔥蔥新春遊豫祈民福紅傘雕輿從兩宫夫人閣四首五言其一曉漏催銀燭新春趂賀朝御香煙馥郁宫佩影飄颻其二嵗近寒風薄宫深愛日遲欲知春到處梅杏有新枝七言其三良辰孟月長新陽和氣中宵遍未央不待望春宫轉漏便趨崇慶殿稱觴其四君王崇儉化邦家禁掖承恩絶泰奢只擬討尋鉤盾籍何曽雕刻上林花教坊作語坤成節集英殿宴教坊詞教坊致語臣聞日在鶉火當東朝誕慶之辰班集鷺庭奉聖主惠慈之宴候涼風之始至望隂魄之初生鏘洋金奏之和懇倒玉階之祝伏惟皇帝陛下繼天開統協帝重華休承六聖之謨日視三宫之膳堯仁舜孝本天性之少成禹度湯銘思日新而自戒伏惟太皇太后陛下乾坤合德軒極儲神總裁萬務之微保祐丕圖之固遐邇一于正寒暑平而三辰全中和致其誠天地位而萬物育屬千秋之啓瑞闢三殿以均恩鄰邦之使傳星馳絶域之貢琛麕至韶奏九成之曲人神以和嵩呼萬嵗之聲中外同樂臣濫居法部參聼輿言上祝天休敢進口號口號首秋初望斂階蓂侍宴千官供大庭法部重翻慈夀曲譯場初上貝多經寶鄰雙節遙馳傳玉塞重關盡撤扄企望璇宫同祝聖天南已見老人星勾合曲涼風應律天地之氣正中廣樂充庭金石之音載協望堯雲之布濩延羲轡以舒遲上悅天顔教坊合曲勾小兒隊龍墀赫昈敞平樂之都場雞唱紆餘上章溝之晝漏爰命左觴之子恭陳右翟之儀上奉宸歡教坊小兒入隊隊名咸英調帝樂象勺舞童裳問小兒隊燕惠方宣皇歡允洽集沂童而在列聼舜樂以來庭並當總角之齡早肄結風之妙雖嘉儀矩未辨音辭進步天階各言爾志小兒致語臣聞厥初生民頌邰室興周之美豈樂飲酒歌武王在鎬之歡適遘慶辰盛陳燕禮伏惟皇帝陛下德侔穹厚道繼羲軒豐宜日中萬物荷照臨之盛養以天下四方形孝愛之風當辰火之西流近隂靈之中宿紀神符于夢月錫嘉會于需雲擊玉摐金奏葛天之八闋望雲就日祝崇慶之萬年臣等齠齒無知禁坊綴籍願進交竿之藝預隨疊鼓之音未敢自專伏候進止勾雜劇鈞天廣樂方終萬舞之儀齊庭滑稽尚騁六章之辨瞻采眉之兊説當玉殿之風清少停促節之繁式佇觀優之樂徐𢋫雅韻雜劇來歟放小兒隊髧髦就列聼儀鳯之純音霓袖回風盡翥鴻之妙態偃旌既畢投𬒮言歸再拜天階相將好去勾女童隊德能大于諸夏仰贊帝猷舞以行于八風佇觀樂節何彼凌波之侣來陳曳繭之工上助宸歡兩軍女童入隊隊名簮纓三殿集干羽兩階陳問女童清商應律方歌既醉之太平長袖趨庭共獻無疆之萬夀罄霞裙而霧集望蓂陛以葵傾必有剖陳一一敷奏女童致語妾聞祥雲入户天開降聖之符湛露晞陽詩載燕賔之義屬金行之啓候瞻玉輦之臨軒肴醳旅陳君臣胥樂伏惟皇帝陛下能哲而惠持盈守成廣庶績以釐工罄九圍而式命日致其孝承顔靡怠于晨昏嵗習其祥慶節繼頒于宴衎嘉秋成之告稔應坤德之乘時觴禮九行盡獻酬之厚意封人三請祝福夀之多祥妾等適在初笄親逄盛際敢奏七盤之技交修八佾之行未敢自專伏候進止勾雜劇輕裾應節已觀蹈厲之工前部獻能㸦進俳諧之戲宫商徐引雜劇來歟放女童隊霓衣度曲隨戞敔以停音竿木逄場騁隱辭而畢奏宜收逸綴用協多歡再拜天階相將好去興龍節集英殿宴教坊詞教坊致語臣聞德水澄清表一人之命世需雲宴樂荐萬夀之無疆仁鄰通二國之歡旦暮慶千齡之遇伏惟皇帝陛下亶聰稽古繼體膺期廣列聖之休聲奉東朝之慈保兵寢刑措邁帝王之髙功地平天成契君臣之胥樂載臨誕日躬御廣庭王公獻甘露之觴法部奏承雲之曲臣技非矇瞽籍著工師聽立我蒸民之謡幸逄堯世有請祝聖人之語竊效華封瞻望宸嚴謹進口號口號赤龍應世季冬初上八開祥電繞樞金石宣和韶九奏乾坤薦夀嶽三呼善鄰兩使星軺集拱極千官蘂綬趨共捧堯鍾歌既醉洋洋朝野正歡娛勾合曲八音克諧天地之和斯應百獸率舞人神之感攸同上奉宸歡教坊合曲勾小兒隊九奏和聲已洽鏗鏘之韻兩髦侲子咸知蹈詠之儀上奉宸顔教坊小兒入隊隊名子襟來鄭校長袖集虞階問小兒隊童裳兩兩初聞歌沛之音舞袂蹮蹮漸轉浴沂之態威顔咫尺廣樂諧和必有獻陳一一敷奏小兒致語臣聞日在北陸會日月之初躔天生聖人將天地之交泰適遘誕彌之旦恭宣贊祝之誠伏惟皇帝陛下睿智有臨惇大成裕中昃每勤于聼政晨昏不懈于承顔學有緝熙于古先神功日就文以經緯于邦國睿問川流當九龍浴聖之辰覩萬玉盈庭之盛指南山而獻夀挹北斗以稱觴臣總角無竒執旌就列願效婆娑之技庶形郁穆之風未敢自專伏候進止勾雜劇德音感人盛樂稍更于節奏笑言近道前書亦紀于優辭方受景之初長奉宴慈而飾喜金絲徐韻雜劇來歟放小兒隊觀旅進于嚴塗式歌且舞既畢陳于衆技宜詠而歸再拜天階相將好去勾女童隊分行颯沓飄然曳繭之姿應節紆餘儼若交竿之狀羽旄在列鼓吹參和上奉皇歡兩軍女童入隊隊名七盤儀鳯集八佾綵鸞翔問女童隊麟殿深沉遐想鈞天之奏霓衣搖曳言觀激楚之工進步宸庭悉陳來意女童致語妾聞瑶星虹渚啓皇王載誕之符金鏡露囊有臣庶交歡之禮惟是歌詩之詠流為祝聖之詞伏惟皇帝陛下凝命穆清儲神淵默體乾坤健順之德用致中和盡日月照臨之區咸歸化育斗位建丑帝司執權嘉辰協慶于冬成曼夀允符于地久妾猥聮綴兆擬贊睿神雖德與天同詎發揚于仿佛而功由樂舞庶昭顯于毫分未敢自專伏候進止勾雜劇舜樂既成尚少留于八列齊諧喜隱猶附益于三章望天表之粹溫奏伶工之獻笑再賡雅韻雜劇來歟放女童隊圓步方趨逐雅音而畢奏飈回風轉宜退旅以言歸再拜彤墀相將好去紫宸殿正旦宴教坊詞教坊致語臣聞氣和而天地應慶集三朝燕飲而福祿來禮稱萬夀會仁鄰之講好嘉使介之在庭享禮畢陳宸歡允洽伏惟皇帝陛下膺圖御世稽古承天孝治形于家邦仁風翔于海宇馳王騖霸貫三代之質文遊凱步元任羣材之智勇凝成至治丕冒多方當春令之始和御廣庭而肆會周魚在藻簪纓同愷樂之歌虞鳯儀韶金石播克諧之奏臣猥緣末藝獲造彤墀聆鈞天九奏之音如遊帝所效上林千人之唱竊抒蕪詞仰奉皇歡強進口號口號敦牂開嵗斗回杓共慶元正視朔朝仗下法官陳禹會宴開平樂奏虞韶北邦膚使星持節近侍詞臣頌獻椒共效華封人吉語勤勤三請祝唐堯勾合曲千官雜遝廣樂鏗鏘方羲馭之晝延望天顔之豫悅引商刻羽擊玉摐金上奉宸慈教坊合曲勾小兒隊詩詠君德樂舞后功允屬聖辰式資備物惟彼髫髦之侣將陳蹈厲之儀上悅天顔教坊小兒入隊隊名簫韶虞氏樂歌舞沛中兒問小兒隊春陽駘蕩雅奏諧和彼觽韘之分行逐羽旄而應節初如詠于沂水又若歌于沛風必有所陳盍言爾志小兒致語臣聞夏正孟月紀庶草之權輿漢會春朝受四海之圖籍清蹕臨朝而置酒通班拱極以稱觴仰贊休辰式陳盛樂伏惟皇帝陛下接千載之統題五精之期繩烈祖之燕詒奉慈闈之謀訓陶鈞萬類物無疵厲之傷玉燭四時氣協中和之應荐臨元朔夙講鄰歡禮食以勞於使人樂舞以飾乎燕喜臣等方當蒙稚欣遘泰辰雖童子之何知亦能蹈抃歌太平之既醉欲效揄揚未敢自專伏候進止勾雜劇聽咸英之音備聞雅正觀優孟之戲佇獻俳諧綴兆少留金絲徐韻上資兊悅雜劇來歟放小兒隊日移昳稷樂闋承雲蹁蹮之態備陳獻笑之歡已畢徐收霓袂還斂羽旌再拜天階相將好去祭文故美人陳氏祭文維元祐四年嵗次巳已七月巳已朔十九日丁亥皇帝遣延福宫使寧國軍節度觀察留後入內內侍省副都知張茂則致祭于故美人陳氏之靈惟靈早以柔淑充尚宫闈稟賦不融痛傷何已奠以殽醴慰兹營魂尚享故美人陳氏菆塗祭文故美人陳氏之靈眷言柔範奄謝芳年爰即菆塗特陳奠酌淑靈不昧尚或歆承尚享故贈太師追封沂王曹佾啓殯祭文維元祐四年嵗次已已十月丁酉朔十三日已酉皇帝遣中大夫試尚書吏部侍郎監護葬事范百祿等致祭于故贈太師追封沂王曹佾之靈惟靈奕世勳賢外門尊屬襲重侯纍將之貴享上公王爵之榮居富貴而能謙處燕間而自飬未登遐夀奄謝休辰將啓菆塗載深感愴聊陳薄酹用寄哀懷尚享舉靈祭文維元祐四年嵗次已已十月丁酉朔十八日甲寅皇帝遣中大夫試尚書吏部侍郎監護葬事范百祿等致祭於故贈太師追封沂王曹佾之靈惟靈親則舅家貴為王爵四朝寵遇位極公侯三命謙恭福兼康夀遽收神于太素俄卜兆于佳城祖載有期盡傷斯至奠以殽醴慰兹營魂尚享下事祭文維元祐四年嵗次巳已十月丁酉朔三十日丙寅皇帝遣中大夫試尚書吏部侍郎監護葬事范百祿等致祭于故贈太師追封沂王曹佾之靈惟靈外戚賢王上公貴秩蕃朝出入克保令名富貴始終奄歸窀穸載涓良日式啓隂堂夙設奠筵庶殫恩禮尚享贈貴儀林氏祭文維元祐五年嵗次庚午二月丙申朔十八日癸丑皇帝遣昭宣使康州防禦使入內內侍省副都知梁從吉致祭于贈貴儀林氏之靈惟靈粵自先朝入充九御乃眷良家特承恩顧詎謂嬪風奄先晨露將啓幽堂復增逺慕尚享殯日墳祭文維元祐五年嵗次庚午二月丙申朔十九日甲寅皇帝遣昭宣使康州防禦使入內內侍省副都知梁從吉致祭于贈貴儀林氏之靈惟靈婦德之茂世胄之華恩承先眷慶集王家芳年奄謝德音不瑕殯宫設奠恤禮有加尚享故蔡國長公主權􅑼前一夕夜祭文維元祐五年嵗次庚午二月丙申朔十八日癸丑皇帝遣昭宣使惠州刺史入內內侍省押班馮宗道致祭于故蔡國長公主之靈有菀天孫承華椒掖粵在齠年遽淪月魄愛篤靡忘音徽永隔奠以清觴慰兹厚穸尚享故蔡國長公主墳祭文維元祐五年嵗次庚午二月丙申朔十九日甲寅皇帝遣昭宣使惠州刺史入內內侍省押班馮宗道致祭于故蔡國長公主之靈惟靈分輝寶婺育質禁庭瓊瑤夙茂蘭苕早零嗟我同氣遘兹促齡嚴塗既啓精魄攸寧尚享蘇魏公文集卷二十八
