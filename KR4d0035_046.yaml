body:
  text: 蘇魏公文集卷四十六宋蘇頌撰表哲宗皇帝明堂宿殿起居第一表伏以商飈應律式嚴宗祀之期法駕鳴鑾出就齊居之次伏惟皇帝陛下聖能饗帝孝極顯親考制度於國陽肅陳備物致精明於殿幄內盡誠心臣初肄少儀阻陪熙事躬雖留於紫闥心竊嚮於丹墀第二表伏以昭配合宫形四方之孝治凝思正寧儼萬乘之威容伏惟皇帝陛下稽古守文憲天御極厯季秋之吉日躬嚴父之上儀精意感通交神明而有道至和充塞嚮福祉以無疆法駕在行天倪益固辭免明堂加恩第一表伏以霈如春之澤滲漉於羣方推出綍之言增陪於多賦體仁恩之至厚眷凉瑣以何勝中謝竊以嚴父配天本聖人之能饗布德行惠蓋王者之無私凡百辟之在庭逮九州之修貢從而加寵孰曰匪宜如臣者力僅勝衣學方肄簡左右就養早依禁闥之榮夙夜在公未踐朝閨之地例叨進律益負恩顔伏望皇帝陛下堯日照臨湯雲覆護矜其稚齒未堪國邑之多賜以俞音聽免綸函之拜由𠂻之懇得請為期第二表伏以命出惟行固難反汗賞如不僣孰敢循牆蓋在義以當然故控誠而未巳中謝伏以祭有十倫之義職或逮於翟閽國有千户之封功必先於閥閲顧臣之分實愧於斯論職則不預於饗祠語功則未趨於班列猥當慶賜之澤懼有僥踰之譏抗章敢辭批札尋下既喻以明神之惠又示以惇族之仁雖仰戴於天慈終未諧於公議伏望皇帝陛下稽參多實詢考事功憐稚弱之無知豈堪多邑諒忱恂之至懇聽罷誤恩渠渠之誠喋喋是懼明堂加恩謝哲宗皇帝表伏以奉昭考而配上帝盛典斯行流厚福而浸黎元庶工咸洎內省孱莩之質何勝爵土之榮受命倣徨臨深震惕中謝竊以祭有惠術蓋廣於神休官有攸司乃霑於帝澤昨季秋之大饗紆上輦之躬行三獻禮成神明歆而福祉降肆赦恩普勳勞重者爵賞加詎容罔功例叨布德伏念臣寅緣天屬生長禁庭上承愛育之仁擢預公侯之例歲時朝請恕綿弱之未任宗祀肅雍復優容其不至逮兹拜慶實謂無名雖嘗列於巽辭終莫回於渙令此蓋伏遇皇帝陛下明德恤祀重祿養賢爰頒雷雨之恩遍霑文武之籍在於䝉稚曷稱褒旌幼未有知嘗事斯語為善最樂冀上合於詔書俾躬處休幸長為於藩屏謝皇太后表伏以太寢總章宗祀云舉弱齡稚齒顯制誤加循揆寵靈交深兢愧中謝竊以國家明德恤祀聿嚴報本之儀至諴感神茂介自天之佑始前期之齊潔逮昧爽之孚恩皆清蹕之躬行有庶工之陪相既畢上儀之舉宜膺大澤之均伏念臣資乏慧聰年方幼弱主上以同氣之愛加彼官封太母以含飴之慈重兹鞠育雖玷分茅之秩未陪奉玉之祠承言綍之嗣頒雖辨髦而不間良慙冒處罔獲牢辭此蓋伏遇皇太后殿下內德輝光母慈愛育峻儀中寢治早贊於正拜外位東朝道益光於佑聖加憐蕞質致錫龎恩學彼大成庶知潔己以進報兹罔極勉思就養之方謝皇太妃箋皇太妃宫閣德兼圖史愛逮宗藩躬朝禮於兩宫贊祀儀於正寧逮此熙成之慶贊揚渙澤之優命數益崇顓侗豈稱責其智效雖未克於宿官習以性成尚可期於學政冬節賀哲宗皇帝表伏以律中黃鍾驗一陽之來復天授神策膺百福以攸同屬逢至治之辰允協踐長之慶中賀伏惟皇帝陛下紹膺淳耀纂嗣丕謨三靈昭眷命之祥遂臻治定四海盡榮懷之美播在詠歌順履良辰茂迎協氣臣承華韡鄂接潤仙源君恩等於乾坤敢言報稱國夀隆於箕翼惟罄祝延賀太皇太后表伏以復見天地之心象標至日律有陰陽之應氣始黃宫時肇初辰天開景貺中賀伏惟太皇太后陛下德超三母功被兩朝不下堂而教化成官師式序未窺牖而內外治朝野無私順履天正之休翕膺神貺之集臣生䝉鞠育幼被恩榮稽天保報上之言惟思孝敬衍皇極錫民之義仰贊聖明賀皇太后表伏以天行反復應純乾初九之爻元氣回旋肇太極函三之數紀為令節交舉慶儀中賀伏惟皇太后陛下敬德思任徽音超姒受天下之養理極於尊崇應地道之光功兼於持戴順承天序茂對神釐臣藐在弱齡親承慈育願上萬年之聖夀庶同四海之歡心賀皇太妃箋伏以氣由子始星開珠璧之躔道至復亨卦啓地雷之象至和默㑹多福來同中賀伏惟皇太妃宫閣道協二聖化流六宫茂德內修早應夀房之兆慈儀上極不忘練服之謙氣序更新宫闈增慶某聨華子舍集慶宸居仰懷愛育之仁但祝延洪之祉年節賀哲宗皇帝表伏以太皡司春肇啓發生之候青陽布政茂宣寬大之恩端朔迎祥人靈胥慶中賀恭惟皇帝陛下誠明充性禮義宅心日就月將益懋緝熙之學任大守重每懷祗畏之心嚮用純禧茂延景鑠臣幸緣天屬叨備宗藩劒佩肅儀未預大庭之㑹椿靈等算敢祝聖人之年賀太皇太后表伏以陽氣發乎童首品物更新斗杓正乎孟陬歲功云始遂行慶澤孰間華夷中賀恭惟太皇太后陛下天造覆民坤元生物躬先勤儉邁塗山興夏之勞嗣履齊莊越文母佐周之德屬肇更於春律諒協吉於時和臣幸遘休明叨䝉養育一元之始方宣木德之仁億萬斯年願介春褀之茂賀皇太后表伏以寶厯更端時紀人正之首條風協序天開獻歲之祥品物惟新宫闈均慶中賀恭惟皇太后殿下名髙馬鄧德嫓皇英古訓是依著彤管女圖之戒前修自警嘉素裝大練之風導迎上日之和茂對自天之佑臣地親禁闥才謝維城敢稱椒柏之觴仰祝椿靈之算賀皇太妃箋伏以璇璣觀運方齊七政之元椒柏稱觴式重三正之首風雲淑暢宇宙開明中賀恭惟皇太妃宫閣孝奉兩宫美全四德動中環佩之節謙尊而光居享羶薌之嘗上安而敬適臨榖旦倍擁繁禧某童稚無知親憐是賴願介春陽之吉增延睂夀之期哲宗皇帝明堂宿殿大寧郡王起居第一表伏以辰房朝覿届明堂宗祀之期詔蹕晝嚴謹宣室齊居之慮伏惟皇帝陛下追養繼孝敬神事天度以尋筵深廣應乾坤之䇿思其居處寤興忘夙夜之勞臣託庇禁扄馳神法坐方佩左觽之飾阻趨鳴玉之聨第二表伏以世室嚴禋禮莫隆於報本瓊房祇祓道允契於集虛伏惟皇帝陛下昭顯先猷惇宗元祀四阿重屋倣體象之圖方太寢南闈致心思之精一言瞻帷幄阻侍典儀竚聞畢饗於欽柴即遂趨迎於還蹕咸寧郡王起居第一表伏以三歲親祠載舉國陽之禮五思致敬聿嚴聖饗之心伏惟皇帝陛下以舜孝事祖宗以堯文欽厯象明德恤祀潔牲玉以告䖍唯道集虛通神明而有序臣竊懷幼志仰慕朝儀竚華蓋之天旋肅內班而磬折第二表伏以清廟明堂古史合五名之義路朝便坐聖辰躬三日之齊伏惟皇帝陛下欽翼宅心穆清凝命案禮經之宗祀祇事天神即陽館之嚮明昭配禰室肅磬內心之美茂膺虛室之祥普寧郡王起居第一表伏以闢大報之宫對穹旻而肆類告七世之廟奉文考以配神恭惟皇帝陛下奏孝天儀有懷明發謂物無以稱其德致志一誠惟神有感而必通荷天百祿臣勝衣忝秩拱著末由曕雲日以馳情姑夙宵而在念第二表伏以歲物順成將展合宫之報宸輿夙駕載臨重帟之居恭惟皇帝陛下順考舊章誕修嚴祀規模九室祇崇陟配之儀齊定一心益盡交神之道仰天光之泰豫延帝祉之嘉休祁國公起居第一表伏以太室蕆儀展季秋之宗祀左房潔慮䖍三日之內齊伏惟皇帝陛下一德清明九功昭序惟聖為能於饗帝縟典斯行嚴父莫大於配天先期以戒臣才通方甲未習朝趨望咫尺之威顔阻晨昏之覲禮第二表伏以欽若昊天大舉三年之報稱秩元祀預修百順之名伏惟皇帝陛下誠致中和功躋巍蕩精名內固有盡志盡物之䖍聖孝兼隆協饗帝饗親之美方履霜之在序想玉食之延休大寧郡王辭免明堂加恩第一表伏以陽館宗祈慶涓成於盛節雉庭孚號均嘏福於羣倫徽章例及於近宗蕞質何勝於異渥中謝竊以愛之欲其富實出至仁之心食之浮於人固有前經之戒隆恩親而既過度分義以難安伏念臣弱甚蘭支華連棣萼有寶玉展親之賜乏大邦維屏之功寵靈已溢於平時僥幸敢期於嘉命局髙蹐厚曷勝長育之慈履薄臨深祇益兢凌之懼伏望皇帝陛下天聰垂聽雲施無私深察叩心之誠許收渙汗之命昭大公於羣聽從所欲於微衷雖曰無知尚思自警第二表伏以恭布由衷之懇既已報聞尚懷不盡之情期於必逹蓋處富貴者欲其長守居髙危者防於疾顛涯分或踰憂悔斯至中謝臣聞唐叔分相土之邑本以德封晉侯啓南陽之田亦由功賞在義則以為寵錫言禮者猶曰僣踰伏况臣方在幼齡未知宦學備數周藩之列䝉休堯族之親賜命增多省躬曷勝雖天慈篤愛逺追華萼之情而性資至愚深懼負乘之悔伏惟皇帝陛下刑家以及國制義而斷恩念其本出於至情許以收還於成命傾心於此待報益䖍咸寧郡王辭免明堂加恩第一表伏以大饗熙成祭澤普沾於率土陪封衍賦褒章曲被於孱軀顧優渥之踰涯輒控陳而有請中謝竊以加地進律非有功而莫疇惟器與名慎假人而為寵賞如有僣受則為虛伏念臣綿弱薄才顓䝉寡識苴茅擁節已兼華衮之資鳴玉奏章未預外庭之謁逮兹禋慶例進户田雖博施之無私敢冒榮而安處伏望皇帝陛下曲矜幼志特軫清衷收如綸出綍之言免濡翼在梁之刺庶安分守無玷龍光第二表伏以瀝傾愚款祈還益地之恩洊捧批章重拜出綸之誨荷皇慈之至渥揆眇質以知慚情所未安義難自默中謝竊以無德而富前史之戒甚明受爵不辭詩人之譏尤切况臣以髫童之陋早歲䝉土宇之封大纛髙牙位參帥帥之列衮衣朱芾秩視公台之榮奉璋未接於時髦進户例霑於祭澤顧孱昧則爵既踰德受亦無功在朝廷則名以假人衆將啓寵永言及此豈敢遑寧伏望皇帝陛下軒鑑照微堯旌聽衆下徇寡求之志庶無僣賞之差罔避繁言尚期可報普寧郡王辭免明堂加恩第一表伏以配天盛禮屬熙事之休成麗澤洪恩雖尸臣而畢逮顧無名而服寵輒瀝懇以祈辭中謝竊以恩勝於義則處之有未安賞非其功則受之為不韙而臣自惟弱質未親保傅之嚴弗離禁庭巳忝王公之貴伏况才非早慧學謝少成德祿不酬每有鑿墉之戒髙明難處竊懷瞰室之虞何補盛時乃叨厚貺伏望皇帝陛下曲從人欲特軫天衷察其取少而辭多不為虛矯母使貪榮而冒寵自速滿盈懇款之誠矜憐是冀第二表伏以義有弗安輒具陳於前奏恩無與量猶未賜於俞音敢冒威顔更殫餘懇中謝臣聞功多而賞厚則下無覬覦德薄而位尊則盜思奪伐故聖人慎於賦祿而賢者戒於貪功寵或踰涯滿必招損伏念臣猥緣支屬曲荷眷憐生成皆自於禁中朝夕不離於上側雖帝舜之惇叙九族明皇之友愛諸王在臣所䝉方古巳過若乃講三年之宗祀致四海之歡心慶未遍於有勞惠乃先於慈幼僉言靡協衷懇寧安伏望皇帝陛下徇羣議於大公抑私恩於內治聽從自列亟寢前褒俾無虛受之譏不纍承平之化祁國公辭免明堂加恩第一表伏以嚴父而配上帝克享靈心受福以浸黎民布為皇澤恩猥加於䝉稚衷實負於愧惶中謝竊以三歲親祠禮成而雲施博百官顯相勞著者神惠加凡有褒封莫非公議伏念臣年才髫齓質本顓侗託庇宫闥之嚴僅親方甲之學未能佩玉致阻預於朝趨雖欲奉璋顧不勝於祀事坐糜厚祿已竊重封更叨加地之隆罙益循牆之畏伏望皇帝陛下廓乾坤之度回日月之明垂諒丹愚許從避免臣無虛受儻下遂於素懷賞不私親亦少禆於聖治厯殫危款恭聽俞音第二表伏以愚衷惻怛批札丁寧雖螻蟻微誠莫動蓋髙之聽而腹心至意寧虞再瀆之非中謝竊以國家若嵇古昔之謨循踵漢唐之制徹疆啓土雖不涖於國都益户增租實用疇於功閥而臣躬居禁闥秩視台司未陪鵷鷺之行弗預豆籩之事驟加多賦濫拜明緡兹謂無名詎逃顯責伏望皇帝陛下考至公之論盡羣下之情遍覆兼容誠曰大鈞之默運難進易退庶明小子之有知言巳重陳日冀開可大寧郡王謝哲宗皇帝加恩表伏以盛禮休成允答上靈之貺湛恩宣布猥霑近屬之親顧弱植之無堪冒隆私而過厚省循非稱震惕靡寧中謝竊以頌載魯封廣彼土田之錫雅歌韓奕美其畝籍之豐方朝廷加惠以懋功非勳德固難於虛受矧多與邑是謂濫恩伏念臣生質無竒稚齡未立託愛本支之未逢辰信厚之時位已列於公侯跡未離於宫禁朝班阻造每慙車服之榮祭澤旁流更衍賦租之數懇辭莫獲拜貺何名此蓋伏遇皇帝陛下鴻化曲成至仁丕冒教由內而及外禮先親而後疏建爾國家奉丁寧於漢䇿莫於兄弟荷敦睦於周邦言綍所加愧芒並集誓謹春秋之教庶知忠孝之方上報君親敢忘興寐謝皇太后表伏以天子居政教之宫宗祀上帝外朝臨象魏之闕肆眚多方顧在弱齡均䝉異數辭不敢固制亦難稽中謝竊以嚴父配天本一人之孝治布德行惠致萬國之歡心方齊輅之蕆儀有祠官之顯相奔走承序皆勤俎豆之恭慶賜遂行宜預絲綸之命如臣者禀姿不厚賦祿已多未聞詩禮之方初尋保傅之傳寵踰三命位並五侯逮兹祭澤之頒復被户租之賞載增封食深懼滿盈竊懷遜爵之誠莫遂循牆之懇此蓋伏遇皇大后陛下化刑宫壷德茂母儀當聖孝之親祠助夙宵之齊潔優推恩典實賴鴻私自推輶薄之資未知報稱之所姑勤問學勉副生成謝皇太妃箋皇太妃宫閣以柔明之德當信厚之時奉順東朝風化行於逺邇佐佑皇極德施遍於親疏䝉陋何知恩章斯厚惟講求於義理期報稱於慈仁咸寧郡王謝哲宗皇帝加恩表伏以禮成宗祀廣推大澤之仁恩及藩臣均有爰田之賜辭榮弗獲臨寵若驚中謝竊以三歲躬祠莫大帝親之饗十倫重祭實先爵賞之施况聖上祇栗以事天明合宫嚴配以昭考烈燎煙既逹神靈並下而居歆渙號式孚卿士悉䝉於褒進豈曲私於公族蓋賚豫於善人儻異至公是為寧僣伏念臣年在髫齓地處崇髙初無宿晤之資早受懿親之奬上方嚴於將享躬不預於駿奔仰承加等之封自愧無功之賞此蓋伏遇皇帝陛下廓乾坤之量髙卑皆在於函容均雨露之濡動植溥霑於潤澤惟兹慶錫攸謂異恩豈意顓侗適遭際㑹維屏維翰慙無賢智之名為龍為光徒有燕安之幸誓克勤於幼學期上副於淵慈謝皇太后表伏以禮嚴宗祀既格神靈之休恩廣大封猥加䝉稚之陋遜辭靡遂啓處不遑中謝竊以大孝尊親莫先於配侑聖人饗帝無尚於肅雍嗣講縟儀時惟大事方萬靈之儲祉有羣后之相祠誕錫言綸式彰惠術兹雖有舊詎及罔功伏念臣乏秀嶷之姿偶熙平之運早膺典冊濫畀土疆握旄節之榮方有垂髫之愧相豆籩之事曽無在廟之勞豈圖慶澤之行亦玷恩章之及陪敦井賦增衍户封循已踰涯拜嘉增愧此蓋伏遇皇太后陛下致誠育物昭德睦親奉先聖之詒謀佑清躬之秩祀眷福祺之丕擁思宗族以共承致乃幼冲有忝斯冒仰答生成之賜永勤忠孝之心謝皇太妃箋皇太妃宫閣道光柔順行著淑均有德有言佐先朝之內治以享以祀贊太寢之禮成茂推福禧致乃愚幼承祭之澤既荷賜於龎鴻報國之恩誓竭誠於長立蘇魏公文集卷四十六
