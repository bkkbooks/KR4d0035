body:
  text: 蘓魏公文集巻十四宋蘓頌撰挽辭慈聖光獻皇后七首内德方㜪茂徽音比姒超詒謀二聖託燕䖏兩宫朝功被人間滿神歸帝所遥巍巍光獻策萬世配仁昭晨夕東朝路鑾輿問寝興蟠桃未再熟羽駕忽西昇逝水還天漢流光下玊繩聖心哀㒺極時望永昭陵帟室深攀慕仙都去不歸悲凉虚水殿彷彿見銖衣難復金龍駕終開白獸扉西郊三百里雨涕萬人揮越從景祐至元豐儷極坤儀四紀中復辟先朝尊啟母助勤熙旦廣堯聪深居髙拱收淵黙盛德成功絶比隆太史方修長信注續詩應首二南風冀王隂德在髙門南院功名燕後昆慶衍曽沙鍾聖女尊居東殿見神孫糺宗新廣宣平第尚主重開沁水園自昔后家稱累盛誰如終始六朝恩初頒遺誥大廷中百辟悲號四海同過越䘮期天子孝便蕃恩澤外家豐橋山弓劒開高寝原廟衣冠入閟宫玊輦三元朝象帝年年長慕闕門東亭搆依然掲大椿宮闈無復駐飈輪清衷念切承顔日長樂悲深奉質辰六御驂騑開道路五陵松栢慘風塵周南舊老偏摧感曽是初元奉策臣熙寜二年文德殿上尊策臣預行事官宣仁聖烈皇后五首辰極閟軒輝天人覆玉衣兩朝臨大寳太皇太后在神宗末年已聽政九載運璇璣永巷私門絶通閨外族稀蕃釐崇搆闢應待媪神歸及物深仁逺流光内德昭徽音繼任姒至治恊黃堯崇慶纔虧膳延和遽罷朝千官號慕處聲動九重霄避殿尊先后垂帷祐聖孫憂勤萬機政聽納七臣言功載生民詠神遊永厚原鴻名兼四德難盡賛坤元六月因山𦵏三年率土哀風雲金殿暗霧露石門開羽衞環神岳衣冠返帝臺悲涼九虞禮不見大安回元禩臨朝日群賢輔政辰孤臣起南國再命入洪鈞雨露恩彌渥涓埃報未因守藩垂老恨無路従靈輴濮安懿王夫人二首國邸留慈範皇家肇慶基思齊京室配祔廟濮園祠改卜三川兆尊名一品儀禮隆由聖作萬世仰洪規大電光流慶歸雲去莫攀千齡悲逝水七月㑹因山陵闕乾坤壮岡原鞏洛環王家傳爵土世世奉神班中書令程文簡三首邦國藩宣老階符陟降賢朝方尊舊德天不畀遐年勲載奉常誄神棲京兆阡悲笳聲未㫁壟日下虞淵星墜寝門夕歌興夢奠時騎箕良弼去罷社國人悲富貴驚川逝功名白日垂祗應金石刻無愧伯喈辭都門簫鼓動哀音丹旐西歸詔祖臨故府簮裾空墮淚高原松檟巳成隂藩朝宣力由忠藎彛鼎書功映古今他日甘棠知不剪五州遺德在人深贈太師中書令王公二首族茂仙緱系恩隆帝渚姻兩朝全寵遇一節貫忠純敦説耽儒術冲和味道真樞庭十五載當宁倚良臣汾曲名家相國孫翊登樞鉉繼承恩旂章禮秩連三府彛鼎功名載一門棺歛衮衣哀冊異路驅班劒𦵏儀存清規素履知無晦金刻雄文賁九原錢起居二首地席賢王寵官分右掖司文華天所賦政事吏為師始見良言進俄驚哲士萎平生公輔業所頼聖明知制䇿詞科世得賢諫垣書殿繼為聫皂囊封奏名宏議丹扆書箴著舊篇朝許臧孫為有後人嗟賈傅不遐年一門盛美時難及家學于今令子傳司徒侍中杜正獻公五首具美生名世熙工職代天規橅在臺閣風采著藩宣大議方尊老清時遽䘮賢無言桃李感聞者共澘然任重嘗當國功成急引年榮華脱屣去名節掩棺全白日佳城逺清風舉世傳誄終朝有法大行特髙前當扆思遺直推恩厚䘏終衮貂官秩貴駟馬𦵏儀雄天老宵躔暗髙陽舊里空従兹使車問不似十年中卜築東畿謝事還㝠鴻髙蹈孰能攀朝廷寵遇三公禮園館優游十載閒此日精誠騎列宿他時歌詠歎頽山慮終不及傳家事獨有忠言貢九闗几杖初來宅次睢孤生従此被深知翹材館盛親師益綠野堂閒奉燕私恩紀難忘空隕涕緒言如昨重銘肌渙陽松柏無因見延首東南倍愴悲侍讀給事王公三首當代儒林老誰知蘊學精典章推練達經術號通明簮橐何時去堂坊一旦成漢庭傷賈傅仕不至公卿禁序方尊寵雍容侍紫宸忽驚疇昔夢遂失老成人史藁留天閣銘旌去國闉龍門賔友散揮涕想遺塵經幄咨嗟舊學臣誄章追冊兩優恩平時寵祿由稽古不朽聲名在立言駟馬嘶鳴還故國素車奔走送髙原諸儒師表今亡矣惟有清風􅋏後昆贈吏部尚書建安郡正肅呉公三首間代生人傑髙文擢雋科立朝風采峻臨郡惠慈多勲業傳青簡音容逐迅波百年誰不至與善果如何疇昔商楹夢吁嗟魯鳯衰清朝橈隆棟多士失元龜墳闕開京壤帷旌出洛師孤生懷舊感西望涕交頤他日容臺議功書預討論禭章三品貴誄策二名尊遺直将誰繼清風想尚存戢棺何所恨牖下史魚言翰林侍讀學士尚書右丞李公三首西李風流逺中朝族望幽寵榮三學士試守六藩侯不見登時棟還驚失夜舟平生喜名理一致視浮休儒雅名公子承平輔相孫臺儀尊右轄世職重髙門富貴今如夢便蕃殁有恩邇英前席地無復進嘉言嵗晚轘轅道神歸嵩少原百年封域廣三品𦵏儀尊笳吹迎風急帷裳蔽日昏洛人應墮淚幾世見銘旛觀文殿大學士刑部尚書贈左僕射兼侍中劉公三首特起來南國登庸歴宰卿立朝弦載直遇物稱如平一夢榮華盡千年封襚成秋風暮江起悽咽逝波聲星墜寝門夕鵩來州舍辰人悲䘮遺愛帝夢失良臣勲業經綸逺文章氣𦦨新殁猶榮故里宸筆鏤堅珉蚤歴平津館嘗䝉鮑叔知笑言㤀位貌論議切箴規豈悟三秋别遂成隔世期英風今巳矣遺恨滿江湄宋中道都官二首儒雅名公子風流粉署賢精神清比鑑論議直如弦朝巳期登俊天胡不畀年永懷三友益一慟寝門前文章微婉氣清遒議論精通學贍優方見璠璵為國器忽經蘭菊隕霜秋夢中應講隂堂奥天上須刋白玉樓聞道遺編已成帙何人列上載蓬丘致政少卿邵公三首屢試循良政兼推幹裕才惠和綏列郡風績振行臺始見彤襜去遄驚晝翣回甘棠猶蔽芾髙隴巳崔嵬江左推華胄朝端挹老成官登九寺貴跡寄五湖清治行當年立家聲繼世榮書林有賢傑名德豈慙卿呉苑新開第都門遂掛冠俄聞曳杖歎未適散金歡舊跡餘三徑髙風戢一棺只應名不朽沈誌史臣刋彭城縣太君二首封邑従夫貴傳家嗣子賢初聞板輿去忽愴夀宫遷樹隠長平外川流濩澤前髙門餘慶在足以慰沈泉壽考人間福賢明閫内宗銘傳史官筆墓遶故鄉松雙劒歸還合南陔養莫容登堂曽拜客悽愴望新封僕射文荘髙公二首學術儒林老人流國士尊立朝惟直道寤主有嘉言髙議留帷幄清風遺子孫音儀嗟日逺隧路閟東原寵祿功名孰與同平津儒者仕三公前言往行通今古素節清規壹始終巖廟猶傳風采盛燕堂俄愴笑談空従來操尚人知少獨有遺思在聖衷尚書祠部郎中大理少卿鄒公二首早日文章譽他年法令師官終廷尉府𦵏用貳卿儀參佐征南畫哀矜讞獄詞平生經濟學不愧伯喈碑公墓刻端明蔡公之文齎志齡雖趣傳家徳巳流里門開駟馬子舍直鼇頭不見車茵貴頻加紱冕優簫笳歸𦵏處聲㫁漢江秋彭城郡鄭太夫人二首姓系山東胄鄉閭建業城有家歸吉士従子尹留京望郡䟽封美黃堂侍膳榮終焉貴與夀無一慊平生他日虧常膳呼醫走數州初欣藥瞑眩俄痛疾彌留子舍終天恨都人挽紼愁春風汝隂道貴母𦵏新丘贈大理寺丞陳公一首隠德稱鄉閈清風遺子孫未榮三釡祿先逝九原魂𦵏得眠牛地家開納駟門足令來者慕信有教忠言留臺賔客李公二首奕世儒纓胄清朝翰墨臣裁成五色詔出擁兩朱輪柏署分曹佚銅樓拜命新如何止中壽志未展經綸當年開府鎮金陵賤子嘗䝉國士稱俯仰緒言猶在耳齎咨遺恨遽填膺人歌梁木空傷魯兆啓佳城欲𦵏滕引紼都門時一慟悲風悽咽更難勝秦國太夫人二首昭文富相公母象服朝儀貴封君國壤陪従夫乘五馬見子躡三台静樹終難止東波遂不回棘欒吾相慕行道有餘哀上宰隆恩禮中闈集寵光膳蘭金鼎味衣綵衮龍章不見文軒駕遄驚葆挽鏘宸慈均愴䘏臨宴輟清觴王子直二首嗟若時之彦懷哉昔並遊十年追几硯一别見墳丘滿目皆陳迹傷心未白頭風流何處盡潁水去悠悠逝者日云逺人情尤感傷素車來隧路奠哭起髙堂集紀論才備阡銘叙事長友兄成雅志不朽是文章司徒侍中賈魏二首仁聖隆儒有漢風平津經術位三公君臣契合千齡際文武名尊二紀中再謝貂蟬深畏寵屢提貔虎不言功一朝賔客銜悲散寂寞延賢閣向東大邦開國賞元勲秘殿陞班寵舊臣公鎮北門日以出師助平貝壘遂開安國還朝納旄鉞仁宗特置觀文大學士班同宰相以寵異之飪味幾年調鼎鼐丹青何日畫麒麟千官祖軷都門外駟馬嘶鳴潁水濵巳見刋碑新隧路無窮墮淚故州民公再鎮許田兼封本國蘓明允宗丈二首觀國五千里成書一百篇人方期逺到天不與遐年事業逢知已文章有象賢未終三聖傳遺恨掩重泉嘗論平陵系吾宗代有人源流知所自道義更相親痛惜才髙世齎咨涕滿巾又知餘慶逺二子志經綸王侍郎二首四紀文章老三朝侍従賢安車初就第華髪未垂顛道巻留藩翰才豪付簡編風流一朝盡士類共澘然獻賦初従淮海來漢皇欣得馬卿才絲綸誥命追三代山水歌辭冠一臺甲第圖書遺舊跡壽原松柏長新栽故州民吏餘思逺畫翣凄涼薤唱哀廣東轉運張公二首清白家傳業中和吏嚮風一門臺閣仕入使弟兄同讞議民無訟均輸國不空職勞終損壽勤事有遺忠寄委頻承寵經營未盡才方従輿轎去忽逐逝川回返𦵏京阡逺遺思粤俗哀人知有餘德嗣子躡蘭臺歐陽文忠公二首并序某久不聞中朝士大夫新作忽得潁上故人書録公㑹老堂唱和詩詞為示逺方見之不勝企聳輙遍和以寄獻未幾聞公訃音且思昨寓書時乃公夢謝之月因愴前事作哀辭二篇以述感舊懷德之思焉道濟三千子文髙二百年朝廷得王佐經術有師傳筆削書纔就彌綸志未宣平生思潁事倐忽啓新阡早向春闈遇品題繼従留幕被恩知何期濲水緘書日正是椒陵夢奠時感舊緒言猶在耳愴懷雙淚謾交頤誰将姓字題延道共立門生故吏碑駕部郎中畢公二首世德公髙裔家聲相國孫丞相文簡嘗自稱公髙之裔見于私記飾儒成吏事訓子服忠言道直躬難進流長慶有源推牛方返𦵏納駟已髙門早仕潛郎省通才適世資衣冠推吉履州郡載遺思喬木陘山外隂堂洛水湄令名千古在沈刻争臣辭國史龍圖侍郎宋次道五首臺閣三朝舊絲綸載世承早年欽妙譽末路愧同升論議無吾間文章豈衆能二經垂絶筆天䘮沈呉興接武由童冠論年並已庚切磨三友益終始一交情少别才經夏何言遂隔生空深寝門慟不見繐帷旌告卧春明日灾逢本命年英靈百人敵奄忽一朝捐妙墨宗祧秘次道嘗奉詔題仁宗皇帝祏主遺文太史編家書四世學嗣子復能傳前日聞君撤瑟初傷心悲憤不能舒平生鮑叔偏知我垂老荘龍獨棄予人物風流今巳矣交游零落痛何如従兹道義誰相告毎欲臨文輙廢書君嘗齟齬更三巳我亦邅迴再下遷趣舍既同髙誼在升沈雖異素交全斤従質䘮知何用蕙為芝焚亦自憐重詠十年情味句吁嗟生意轉翛然次道送予守杭詩有十年情味與君同之句朝議大夫致仕張公二首清修聞校議慈惠布州蕃奉使功雖最遺榮道亦尊卜居隣楚澤反𦵏近秦源自得尋真趣髙風世所敦公喜修養致政甚早年八十精力不衰憶寓龍陽館曽陪布素遊登朝俱老大分袪幾春秋脱屣追三景遺衣復一丘無因素車送感舊涕雙流予稚齒隨親寓武陵接公後同在朝列今幾五十年致政侍讀孫蔓叔二首秘殿除書降經筵特詔開未聞陪幄議忽起奠楹哀卜𦵏青烏兆臨䘮白馬來平生我投分灑淚向天臺某忝天官寔繼公後英祖修官日先皇出震年甘泉方授職少海繼登賢望積公台久恩従誄册宣遺思滿京邑曽議市租錢司空贈太傅康國韓公五首厚重資天粹忠清襲世芳周臣言諤諤漢相貌堂堂見象中台拆傷時一鑑亡罷朝仍制服䘏禮厚公王前日崇明路初聞撤瑟時兩宫馳道哭三市輟舂悲精爽騎箕尾功名載鼎彛誰修鳯池錄直筆載蕭規文物衣冠萃一門如公終始見輿言三登慶厯三人第公慶厯中舉進士自秋賦泊禮闈及廷試皆在第三四入熙寜四輔尊公熙寜初自副樞遷參預拜首相六年再為史館凡四命輔相繼世拜封前及後並時當政弟連昆漢袁楊與唐蕭杜更有清風在裔孫甲第初開汴水陽安車歸後體彌康交游欵密情無間尊酒歡娯興未忘懷舊毎論場屋事傷離為惜潁川装朝來重過里門外感物思人淚數行六紀増年福未涯三公歸第寵頻加逹逢雨木官雖怕二月中屢有木榢賢值辰年夢已嗟中祀牲牢開祖道太常鐃吹送靈車傷心前月登門後臨别殷勤貺手華某二月九日謁公公再三話平日相従之事久之又云此行恐不再相見不果欵别既而又貺手筆意益勤重後一月聞公不起悲傷尤切司空平章軍國事贈太師開國正獻呂公五首二聖臨熙運元精降佐臣人承太嶽裔生在敦牂辰六紀登遐壽三期秉大均公在相位三年還騎箕尾去仍值在蛇春運偶千齡旦家傳萬石風五朝京兆尹文靖公乾興中尹京後公昆弟相繼至今三世大司空文穆公文靖公並以司空平章至公三世登台致主唐虞上論經伏鄭中公前嵗上尚書論語孝經要義百篇又稱極有益於學問生鍾維嶽瑞𦵏復近神崧公塋在新鄭縣神崧里首建司空府前臨魏闕門特留黃髪老對直紫微垣故事傳臺閣清風遺子孫四方桃李滿不待史官言漢代明經相唐朝鎮俗賢時方尊長孺天遽奪公權衮冕頒新隧笳簫入故阡文成内外服二美冠周篇自歎羇屯世少同平生知巳莫如公早參直諒多聞數晚入坯陶一器中存殁交情成契濶晤言名理謾研窮追思五十年前㑹巳識河東父祖風景祐四年舉進士開封公與故呂紫微縉叔毎相期于場屋始獲拜接當時流輩皆知公公輔之器蜀公范景仁忠文公四首雅麗文園令深湛揚大夫初為蜀詞客終作漢真儒榮遇封公爵歸休職禁塗逢時致君事自與二賢殊仁祖倦勤日公居獻納司累朝論國本三接歎忠規未奮經綸業空留典冊詞二名彰美行千古有遺思追憶詞場舊交㳺四紀餘編年逢絶筆公修仁宗實錄成遷秩某忝當制議樂見成書公進大樂書䝉以副本為傳忽愴題丹旐無由走素車傷心寝門慟南望涕漣如嵗在龍蛇㑹思賢屢感傷未收空土淚又送蜀公䘮公與呂司空相繼薨謝士類将安放交情何日㤀共傳金石刻俱是大文章知樞密院孫温靖公二首位冠樞幾輔名髙羽翼臣一言曽寤意四近久同寅丹旐都城逺青松隧路新西瞻裕陵道想従属車塵疇昔逍遥曳杖時鑾輿臨哭従官悲三朝弼亮推公望一品哀榮厚𦵏儀陪幄謀猷存故事出藩慈惠有餘思伯喈辭刻雖無愧還作鄉人墮淚碑太子太保致仕李公二首衣冠元禮舊龍門旄鉞西平奕代勲官是唐家貴公子名髙漢室故将軍四朝人地推時望千載丘園脱世紛國器幡然臨摯殞齎咨遺事謾傳聞治平中公自相臺被召将有進用以疾而止子厚論先友文章憶稚年一時陪俊傑四紀奉周旋蘭玊髙門盛松筠晚嵗堅風流今巳矣感舊獨澘然景祐中先人在朝與公相接某因獲拜挹前嵗奉謁公公道舊勤勤一聞公訃悲愴累日秦國夫人二首安樞密母母儀兼婦德訓子復宜家舊宅隣三徙新恩副六珈累茵榮養久八秩享年遐宗族稱賢行詵詵福未涯大國膺朝寵樞庭慰母慈生為命婦首大臣之家赴朝惟夫人為母行殮用貴臣儀夫人在殯聞特恩賜水銀龍腦鈴紼傳哀闋金犀巻賛祠攀車泣公輔行路共齎咨宣徽南院使太子太保贈司空馮公三首特起來湖海詳延入雋科三登褎然首再續喜哉歌巖廟勲勞積藩宣惠愛多超遥脫屣去誰嘆逝川波清潤慈明玉汪洋叔度陂不憂仁者壽早作哲人萎黃鵠歸無日青烏𦵏有期隂堂介邢密相望國僑祠皇祐登瀛日同升愧妄庸皇祐中予與公同召試入館我年先一飯君學富三冬久要平生好分攜晚嵗逢無因素車去執紼望丘封尚書左丞贈開府儀同三司鄧公三首氣緼江山秀人如圭璧溫一登文石陛遂直紫微垣公熙寜初召試除館職未久直舍人院論議中司見謀猷内制存公孫宿儒譽垂老上金門未正階槐位先登省轄崇帝方咨傅野天遽奪楊公黻冕恩褒德簫笳禮送終淮濵故人闕一慟向西風貢部掄才選髙風素所欽方聞二道策公嘗上賢良䇿以罷舉不試獻納百官箴榮滯登台晚周爰注意深有時無命嘆遺恨古猶今中書侍郎贈銀青光禄大夫傅欽之三首賈傅少馳譽平津晚遘時生賢不俾壽造物孰能知故事留烏府清規載鳯池上思楊綰直當扆屢嗟咨璞玉渾金量經邦論道賢肖形真間氣委蛻歘終天繐帳羣公奠楹書奕世傳云誰哭之慟慶厯老同年平生出處與迍通五十年中事事同晚嵗金門陪末議一朝華簀見将終晉賢巳失蒼生望魯國還嗟我道窮衰病無因送歸紼商聲聊復寄深衷龍圖閣學士贈銀青光祿大夫滕元發二首逸氣雄詞昔自将文場獨立見軒昂飛騰正近煙霄路獻納嘗依日月光去國丹心那易折臨州惠愛想難㤀葢棺未畢經綸志精爽猶應在帝鄉大器何妨更晚成當年師友盡豪英髙談每及功名際壮志元無寵辱驚天上玊樓須作記人間白日覩佳城傷心宿草東呉路雲水淒涼萬古情蘓魏公文集巻十四
