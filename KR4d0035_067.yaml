body:
  text: 蘇魏公文集巻六十七宋蘇頌撰序送郭京評事序康定二年春西宼犯渭城涇原守以聞天子閔然念邉民之數被其患思謀永逸之計乃更命近臣往督師律元戎偏帥奔走率職罔懈其勤居無㡬何又詔吳興守滕公爲刑曹副郎直集賢書殿往鎭涇陽維是涇原諸軍皆𨽻焉滕公奉命馳至闕下進見之際荷聖主知遇之厚思得竒瑋魁梧之人以助軍旅之畫乃言處士郭君於上曰斯人博學而多謀重義而輕利一舉進士不上第而退居九華蓋三十年遂亡仕進心若擢居戎幕必能出竒吐謀以贊帷幄之論上曰是嘗一二臣爲吾言之者行用之矣即日制誥池陽郡守給裝錢起生傳赴京師至則特㫖賜廷對口陳兵家成敗之策邉徼之利􅊣攻戍之得失諸臣所未能言者悉爲之對可不可皆合當世之務天子恱之乃以廷尉平命生往參謀陜西軍事于是公卿相贊於朝廷士相慶於閭巷以謂天子用處士矣自茲下情得以上通矣主恩得以下逹矣草澤之賢者得以自進而議時政矣如此而不治者未之有也或有謂生曰天子所以擢滕公滕公所以薦先生於天子而幸用之而未聞先生所以論報主恩感遇知巳之意先生曰吁是言也于我何有哉夫滕公自尚書散郎陞名曹直書殿職由刺中州而任方鎭要衝兵屯之地直匈奴之孔道國家倚之猶藩屏焉寵遷之若是豈天子私其人而授之耶蓋知其才之可任而效之可責耳天子用公之言而吾自布衣召見不由覆試而授官蓋國家擇人而委任耳豈私于我一布衣哉彼旣不以私而荐任豈可以私而言報耶雖然固當早夜思之籌慮愊億期績用之可成焉某時聞生之言而内喜且言曰是舉也可謂上下俱適其道耶誠使朝廷爲官用人推擇信任皆若是之篤則何云上有曠官而下有遺才乎使當時公卿百吏修職奉上皆若滕公之感遇主知郭生之盡心公家則何云政事隳墮國聼壅塞耶上舉之若彼之得下行之如此之善予將見俘匃渠于藁街旋凱歌于京城休戈息兵拯人罷勞其斯舉矣不曰美哉生之行也士大夫多以言贈予獨并敘其所嘗道者以爲其規送施龍圖赴延安序自陜以西釐其州郡爲四道以建帥府而延安特據其要隘日者興師被邉又嘗節制四府故其軍政雄重不與他鎭侔膺推轂之任者非有文武經緯之才莫得以處之自夏戎欵歸兵實内郡是四帥者各治一道不復相權然延安之守猶重于他鎭蓋其封境與畨戎交錯外距羌邑弗十數郵每羌人來請皆先出于是由帥府覈其事之當否而拒納之方用兵時内謹戰備講肄師旅正合竒勝以誅弗順勢甚易也今朝廷方以德綏諸戎不欲生事疆外覊縻之䇿專責方任急之則托辭以生釁弛之則乗間以爲患則夫措置威懐在柅其㣲一失所御姦萌滋啟是安平之守不亦難于禦侮之將乎皇祐壬辰嵗六月天子用前帥爲樞貳扞城之寄構于後選乃以内閣施公頃者更使三邉又嘗秉安化之鉞皆有能績聲重闗内俾涖厥政僉曰冝之仍受棨㦸往護諸將復增美秩以寵其行制下之日士大夫咸以謂邉藩得人西顧益無虞矣先是朝廷進公卿歴選于衆多由閫闑之任上意若曰疆隅既寕人復忘戰且慮夫左右之臣恬于文鋒而怠于武律也是以詳試其能必先觀以軍旅之事而後付之政柄欲其勞于外而不廢于内也故公之是行雖抗章懇辭卒不獲請茲所以見朝廷之于公將有意大任乎惟公莊重淸方剛毅不撓其臨郡也寛簡而果于斷其刺部也精敏而濟以和觀是二者可謂周通之賢矣夫以周通之賢加之巳試之效握節大府坐制一方寓令以治軍師持重以靖邊警所務逺畧不徼竒功守于平安在公不爲艱矣一日上思舊勲使者持急宣召登公輔揔衆職附四裔盖練達已稔聲名暴聞不時日而功業成于時士大夫又可以慶廟堂之得人也送楊該下第序取士之柄不專于有司舊矣今天下之爲士而進取者以萬計爲有司者旣不得素專其任而與察其能否也一旦當大比間則雜遝羣至有司持尺度糊其名以較其一日之藝苟用其言合規矩無甚高論者謂之中程乃留以充選焉雖其素所弗能有司豈得而知之耶士或持卓越之才不能委曲以盡一日之試小有疵累則以尺度去之是昔之所恃者有司亦不得而采之也夫有司所恃取士之柄不專若是將以罄天下之眞儒實亷而舉之不亦戾乎雖然任其責者豈不欲進賢者而退不能者耶而所取者非必盡賢所去者非必盡不能何耶拘于尺度而不得素專其任以與察其能否之謂也夫璠璵璗璆世皆知其爲難得之貨非䂥石瓦礫比也及混而置之使皆能知其爲寳者辨而異之則眞僞㡬判焉雖甚疵釁不足爲累也異于是者必求其渾然無瑕慝乃以爲眞如此物之果眞者鮮不棄矣又不幸而以璠璆爲瓦石者有之矣幸而以瓦石爲璠璆者有之矣彼物之精觕瑩然易别也而人之所取者猶若此之患況乎英豪跅弛之士雜然並進有司不知其素之能否其所舉者特一日之藝又求其渾然無累則進退之間豈無幸不幸乎得明有司焉則于斯亦可幾夫不失人矣故今士之于進取也不以得失厲于有司蓋知其得失者係夫幸不幸若然可謂志于道而能自信乎吾友楊君唐彦豈非斯人之徒歟唐彦前此嘗舉進士于開封矣是嵗四方之士畢集京師其多不與常比朝廷選擢有司尤艱其人今紫㣲吳公實任其柄焉而唐彦與丹楊邵興宗程文初中髙第以疵累不合程式有司用制格不得留又懼後之弗知者以謂不盡才也于是首署二君名揭于道曰試考皆第一以聲病不預奏名方是時試于公所者㡬数千人仰公之鑒裁若龜鑑焉以謂奏籍未上而是二人者首被優異雖名不在選中而衆皆以爲必天下之士也其後興宗應詔科奉延對又言邉兵得失擢居西州幕非所謂天下之士乎而唐彦再舉進士復不預名當時之知者往往爲之傷惜以爲有司之失人唐彦處之獨恬然無芥蔕之意復謂人曰我之不逮邪有司豈不明邪不然則吾時之未至也吾將泛舟而東游于吳㑹以就閒燕而惇勵吾志操以俟吾時豈當戚戚於一得失哉士於是益知唐彦爲志於道而自信者也吳公昔爲明有司而善鑒裁者也而方今取士之制拘以聲病非爲能得人也後之爲有司者不必爲不失賢也東山長老語録序宣城太守史館刁公景純始闢東山寳惠佛寺爲禪居䟽召海惠師居實以主之徇衆欲也師東陽右姓雙林淨徒少遊諸方遍參知識最後得法於琅琊惠覺禪師世所謂臨濟宗門而南院後裔者師其流也自涖叢林宣揚佛道一音旣演四衆畢臻虚谷洪鍾有來斯應量根器之深淺隨機縁而引導晨咨夕叩虚往實歸如是累年大振宗㫖雖道本無體非文字談說之可明而人亦有言故應對酬酢之不一于是有升堂答問洎入郡揭榜等語録三巻傳焉其說曰庶品萬形同出一性無古今逺近之别無髙下細大之殊達其指歸則六合内外不離乎方寸局於形器則一念起滅巳隔於多生至人冥觀動與理㑹以爲獨善不若利人以心傳心其來有自後之學者返本循元一悟眞空無復餘事如深夜出曉迷塗得歸非敢黙黙不傳此無量善知識所以祖述於𤣥綱而大資政南陽公所以不吝於言說也公以文章器業翊亮三朝入輔出藩自蜀移越每經綸制置之暇教條宣布之餘游心定慧之門得意言象之表於是禪流輻輳爭望門庭迅機電激動形篇什其在劒南則有與峨眉中白洎郡僚府佐徃復抑揚及拈提古語别爲兩集其在鎭東則有與法雲重喜唱和雜述幕府紀録鑱於豐碑秀句英辭播在人口叢林駕說之盛不愧於昔賢宰官倡導之風復見於今日某忝隣對境稔熟傳聞限有帶水之遥末由丈席之侍䝉寄墨本實㑹初心未幾令姪先軰東来見過因語及此且曰嚮之兩集有蜀州吴醇史君祕閣文與可作序印行今茲唱和石刻之外復盈緗帙亦將鏤版見屬冠篇某游公之藩蓋有年矣聆師之譽固無間然不見異人旣得書而啟發以爲作者宜序事以著明大凢偈頌賡載揔若干首其餘覿靣髙談隨機縱辯不立於文字者則不在焉昔莊生之得惠施喜有忘言之對謝安之與支遁將期塵外之狎賢德相値今古同風況公夙殖德基明見佛性入游戯三昧超圎頓一乗闢稽山之道場付慧照之適裔彼上人者難爲酬對得大檀越共爲證明異時揮麈之間皆契投針之妙人境不奪照用同時賔主歴然言語道斷自非渉異境自是巳家消揺以遊造次於是其於道也不亦廣矣其於言也豈可巳乎門人某等以予於景純有心照世交之契於實師爲道存目擊之知逺詣京師見求序述予以謂宣城山水之郡古今故實之傳賢守髙人往往相値昔唐相裴休爲亷察嘗致黄蘖運公於開元道場以談性理故有傳心法要休自序之今景純作鎭又爲實師崇建法席以唱宗風復有茲録見屬鄙文予師心有年闢道來達披文游目茲見辨才之不窮覽今懐昔良嘉名德之相遇姑用讃歎思有激揚夫至理𤣥㣲見於言者巳爲粗迹一時對問序其事者豈盡端倪兩皆虚談斯亦奚用然而空有互見語嘿對持非因事而顯發孰見道之著明厠足致泉無用所以爲用因蹄得兎忘言而後可言强爲摽題巳慙聲綴黙識之士願姑忘聴焉趙大資與法雲長老唱和集序見聞覺知出乎性哉而達識之士以之明本心動静語黙出乎情哉而知言之人以之觀要道自竺乾調御洎諸方導師接物應機當人答問標揭新理旣有㑹元敷暢㣲辭遂成章句或一字至于七字以有言對於無言指事明心莫辯乎此故仲尼目擊於伯雪淨名杜口於文殊形雖淵渟聲巳雷震給孤四句之偈等善法百千之妙頌理有未盡言豈憚繁大用現髙蹈於佛祖孰能探賾於淵源三復牽珠粗見抽緒所期眞友知覺路之司南聊書卷端爲寳月之標指云耳明義大師集菩薩戒羯磨文序繹經證義明義大師淸衍旣修正觀行遂杜門蕭寺依古懴式建立道場晨夕加持歴十餘年未嘗一日廢也薰修之外嘗閱藏典至菩薩戒案其科條疑有差舛三復尋繹得其中文害於義者數事焉大槩以戒有大小乗之别而行持之人有頓漸之異據其宗㫖皆先佛所說不離於藏教也行法經云古文惟請五師而今文所引普賢觀經啟請六師藏典不載瑜伽大論本無次序而今羯磨文依次受戒又唱相結界有内外之限受戒和合失先後之㫖是皆小乗下根之所持不可與上㡬解悟之人同日道也其所以混淸參錯若是非作者本意由末學傳授引據非當故失其歸趣耳衍旣依義刋削捨其細而從其大復集諸經律以訂正其非謬將令學者開卷披文反本尋原悉見端緒譬夫觀水于海寧顧於蹄涔逢嵗有秋奚資于蟻粒宜乎大善知識留心而不已也一日持書相示見屬叙事予嘗謂為佛者始于戒而成于慧戒者所以持巳實萬行之本也蓋有能持巳者外物無以撓其中而純明由是生焉然後逺覽廣照㧞昏拯迷濟物而不倦此佛之序也今衍之精進如是吾知其非僻不可入於胷次也讀書求義而能正數百年之舛訛非純明之效歟不獨明巳又將利於人使修習之徒䇿入三聚棄凢趨聖共證無生之理蓋迦文之所存也蘇魏公文集巻六十七
