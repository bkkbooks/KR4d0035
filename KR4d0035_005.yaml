body:
  text: 蘇魏公文集卷五宋蘇頌撰古詩次韻司徒富公耆年會詩古人稱宴安居處必擇地諸公來河南有若不期會巖巖大司徒早辭槐鼎貴嘉謨納淵衷故事留臺寺構第銅駝坊開門瀍水次居守德爵同位重官三事高軒每過從縱言談道藝復有鄉里賢夙昔承嘉惠嵩嶺高橫空洛波清見底履道追昔遊行厨載芳醴燕毛禮所重安車皆戾止年尊二國公齒序衆君子願公壽千秋慰民瞻具爾三載一來朝當陪天子祀次韻王宣徽太尉耆年會詩古來賢相稱高竒虞有臯夔商傅伊帝臣王佐見謨訓千載相望如同時我朝公輔代間出鍾秀辰象分躔離堂堂太尉實異稟風質粹美和而威仁皇始擢自藩翰渭水兆告非熊羆立朝早已擅風采料敵曽不失毫釐聖聖相承倚時棟入登槐鼎出擁麾司徒相繼據魁軸勢壓諸夏摧附枝一言寤意尊社稷萬里奔命來戎夷君臣一體自同德下鄙漢相矜規隨功成治定預告老還鄉治第當西圻十年休佚養沖氣泰宇充茂心欣嬉二公勳德誦人口載于彛鼎歌于詩吾皇得相柄文武調燮四序齊璇璣孟軻嘗稱聖之任乃曰百世人之師固宜天畀兩元老期頤常保松筠姿規橅載在廟堂上自使風俗淳澆漓前年召自大名尹對罷纍請莵裘歸帝曰公今更強固閔煩幾政留清規兩加金貂百官首再剖玉麟三水涯洛人聞之喜且抃如在旱嵗逢雲霓朝臨留府暮私第偃息又將彌再期今春欲作耆英會涓日象值神俱比謂宜飲食與宴樂對接賓客心忘機康寧壽富復好德嚮此巨福全者稀席間諸老盡賢傑相得歡甚欹冠緌飲盈百榼似尼父歌有三樂同榮期杯盤衍溢逮輿𨽻割肉釃酒如林池衣冠填咽兩城市車馬照耀清漣漪夜闌百炬列紅燭天寒四座添重幃巨儒灑翰序嘉會義薄皎日垂清暉諸公半酣各賦詠含毫疊紙魚鱗差詩成纍幅燦珠玉光艷宜若陵鈎奎歌聲旖旎嘯鸞鳳酒氣冷冽噴酴醾長篇立刻在金石楷字高揭當軒墀晉公延賓就緑野謝傅卜宅臨清溪當時貴客亦有數詎與今日爭光輝謄書逺報鄴都守開緘摘句情融怡答言遂起歸與興迹雖未往心先飛三賢事業固同道用舍安得常情知官尊邦國之柱石望重士林之羽儀退舍進用自殊致大義當以公言推不能則止固達識陳力可行當有為聖君知臣賢達節事有輕重須從宜寧拘經禮致為政自有邦人歌衮衣三台明潤少微爛光彩並照大紫微子房辟穀方壯嵗張蒼作相當厖眉曹參置酒坐公府晉賢高蹈來東籬昔人出處固有意造適自與時推移光隂可惜且行樂任從鷤鴂方春啼次韻君實內翰同遊范景仁東園鑾禁限沉深鼇頭雄贔屭主人出休沐秋色正明麗偶為東園遊便有中林意縱言得造適覽物增意氣風清濯煩襟日永忘歸轡朝野本無間簪組何用棄未必幽棲人識兹真樂地效范景仁侍郎次韻和君實端明長句奉呈龍舒楊守公居幽絶誰能紀欲到應須勞屐齒從官出入路縈紆況今又去藩龍舒人在天南居在北鄉心千里雲山碧山庭不用勒移文時樂中和歸未得他年若尋仙老會洛下諸公盡中外百二十坊山水間甲第相望門巷對過從不獨賞芳珍造適何妨談道真回頭却望朝市裏多少思歸未去人六月六日訪朝美叔吏部越宿蒙惠長篇因次其韻近伏值休幹端居無所為觸熱事造請有如褦襶詩偶到昭德里主人不吾非惟今吏部郎望清秩非卑而與兩銓選事聯相附離每聽人物論尤詳臺閣儀沿襲尋本原左右逢津涯登朝鬢猶緑繼世衣仍緇歡然久相接甚矣嗟吾衰誰言同趣舍何力能噓吹但慚蒹葭陋坐對瓊林枝時或把書卷不厭顔生飢間亦忘形骸任譏嗣宗癡喜君方得塗騫騰復何疑豈此哀烏省能留威鳳姿君才適時用早聞天子知荷囊與鳴玉獻納無不宜寧校嵗月勞求為法令師次韻蘇子瞻題李公麟畫馬圖霜紈橫卷書縚垂軸以玳瑁囊青絲披圖二妙駭人目筆畫徑利如刀錐龍媒迥出丹青手勢若飛動將奔馳韀銜如在赤墀立僕御猶縱紅纓羈子虔六轡衒沃若長康駿骨稱天竒雖傳畫譜入神品未有墨客評黃雌六詩形似到作者三馬意象能言之竒蹤莫辨霸或幹高韻壓倒陸與皮從來神物不常有未遇真賞何人知君不見開元廄馬四十萬作頌要須張帝師元祐癸酉秋九月蒙恩補郡維揚十一月到治蒞事之始首閲題名前後帥守莫非一時豪傑固所欽慕矣然於其間九公頗有寅緣感舊思賢嗟嘆不足因作長韻題於齋壁以寄所懷耳維揚禹九州淮南唐四鎮地據江海衝星占楚吳分五季劇荒擾我朝夷僭閏督府時稱雄守帥選常遴由來竹符使莫匪邦家聞其間九賢者尤推萬人俊太原文章伯師友淵源濬五事陳便宜七制推典訓屢薦官雖崇三已色無慍王元之一登翰林三踐西掖屢被譴逐皆以直道嘗作三黜賦其末云令尹無愠豫之所師下惠不耻豫其庶幾先祖少舉進士時嘗獲贄見公有池亭詩石今在西圃歧公老藩朝惠愛浹吳晉荐士言有味偃兵功不陳鼎飪方燮和丘園終委順杜公自河東提刑移鎮于此尋遷淮南轉運使後登樞府議西師守用策未幾元昊請命登庸才半歲出藩遂還政居南都十年而薨其薦士于朝達者最多而豫被遇尤異淵哉文肅公生遘休明運三朝翰墨工二府謀猷奮道卷任推遷名全蔑緇磷盛公始以文學被知太宗召置館閣真宗仁宗朝再入翰苑遍歷二府兩黜皆由人纍再典兹郡卒以夀老致政考終先公銘志其墓鄭公梁棟才天質璆琳韻大筆弟兄同萬事朝廷問徊翔極宰樞終始無疵吝宋公自參預出麾郡人安其寬簡去後作愛思堂以懷其德在郡賦詩有刻石僧寺豫在館閣最蒙稱奬仁宗初倦勤魏公復來覲堂堂真相尊謇謇嘉言進十字篆勳勞大蒸報忠藎韓公在郡日大葺府城自此方鎮事體始備郡人思慕立祠堂于雍熙浮屠逮今尤盛其墓碑神宗御篆十字以表勳烈又配享英宗廟廷公在朝豫屢獲欵接樂安豫舊館早歲窺墻仭儒林仰宗工政府發閎論雖無鼎銘勳却有書傳信豫舉進士日歐陽公主文衡誤見賞拔後留守宋都豫在幕府自爾相知尤厚始終不替大明寺平山堂公所作最為一郡之勝吾友仲邍父利器發硎刃論經鄙章句縱辨摧凌誶音訊經緯夙志違風流壯年盡豫與侍讀劉公少同硯席每愛其論經義談歷代高才博識謂當輔相承平中年而殞士友痛惜今雲山閣有留題詩時會堂唱和詩並刻于石文武惟秀公將相紆雙印入輔復出藩撫淮兼帥潤憶昔獲攀稽後來嘗慕藺陳公倅符離日豫為郡從事其後入朝屢同官局嘗相期卜鄰丹陽後以潤帥兼相印鎮是郡司空一代宗纍葉清風振繼父漢韋平致君古堯舜時嘆人云亡上嗟天不憖吕公與豫少時相得于場屋及仕朝廷接迹最久後公薨二聖嗟悼曰國家不幸司馬相吕司空相繼云沒豫亦嘗預聞聖語有祠堂在興教院昔人企前修景行仰高峻聲氣或相同古逺視猶近馬遷稱晏嬰羊祜交陸遜異代思執鞭仇鄰通饋餫粵豫望諸賢先後來兹郡既非鎮俗才仍抱終天釁先公嘗領是州辭不赴砂礫自澄汰鉛鏌殊銛鈍將書名在石終慚駑附駿前人固難追遺德猶可徇鞭後志良勤思齊言亦訒顔㥏章在懷年侵霜滿鬢俯仰復奚為兹焉俟嘉遁纍年告老恩旨未俞詔領祠宫遂還鄉閈燕間無事追省平生因成感事述懷詩五言一百韻示兒孫輩使知遭遇終始之意以代家訓故言多不文我昔就學初齠童齒未齔嚴親念癡狂小藝誘愚鈍大戴禮曰八歲就外傅教小藝履小節始時授章句次第教篇韻我生五嵗先公口授孝經古今詩賦皆成誦又令從諸父教學不數年而誦五經習爾雅知聲律蒙泉企層瀾覆簣期九仭十齡獨侍行千里赴朝覲靡依心向吳能事躬在浚應門待賓客睦族周分親去聲雖免逃杖愆猶虞裕蠱吝天聖中先公服楚國太夫人喪外除自維揚赴調適值外祖龍圖陳公出守餘杭以先妣魏國太夫人久别欲邀同行時豫十歲獨侍先公入都會盛文肅公在翰林薦先公文館法當投進所業使豫管勾裝寫進卷及接待賓客相過諸公皆一時之望豫獲侍側頗蒙奬顧時盛仲謨學士坐中試豫以省題詩豫即時賦成尤見賞激十三從師友羣彥得親近音附近之近箕裘襲素風蘭芷漸腴潤先公宰無錫日即縣廳西圃開學舍延諸生郡進士華直溫新安閔從先輩數人同結課豫時十三歲與從叔宣甫山甫同硯席預課試後二年先公通判洪州又延鄉先生萬君特講書豫與諸父及臨川蔡元道元翰昆弟皆同聽學時南城李覯泰伯贄文謁先公亦留館齋中得以切磋蒙益多矣占畢自忘勞攻堅常切問六經日沈酣百氏恣蹂躪禮樂原夏商春秋道堯舜論詩識溫柔講易知謙巽書要通上古史亦蘄盡信復熟中庸篇推名善惡混楹書逮今存手澤亦未泯賴此漸摩益稍知賢聖藴先公舉賢良暇日試筆手寫中庸一篇付豫令熟讀誦之可以見性命之理其書至今祕藏篋笥十八隨鄉書三冬閲文陳同時韋帶倫共試棘闈濬少年事矜豪屬辭少繩凖程文竟乖疏貢籍果遺擯豫十八預府薦時主司吳正肅公頗以博學識題見奬便許以逺到自此士大夫稍稍稱道明年春省試以犯聲病格不收時主文盛文肅公謂先公曰試文當在高等以點檢官指摘詩中押聲聞字退落誠可惜也內負未蹉跎不能忘起僨既知以聲病黜落遂刻意音訓之學自爾頗知字書賞延輒辭官雅志將自奮康定元年乾元節推恩近著先公任中書舍人欲奏薦豫乞且應舉先公初不懌既而大稱許復勉以勤篤又延建安黃晞先生數公置門下及與長樂王深甫子直清江劉原父貢父兄弟同硯席凡五六年後豫已忝科第往來京師猶相從講論筆苦手成胝眠稀目生暈常患涉獵疏肯效揣摩困再上忝乙科初筵習磨楯綢繆結官課奄忽罹憂疹靈光未及賦陟岵遽銜舋後漢王文考父逸欲為靈光殿賦使文考往魯中訪求事迹比還乃獻此賦父問其故對曰為文損思慮大人思苦今年高不宜復爾父遂不作先公常戒吾令習六科業未就而遭大禍每痛不及文考之獻賦星行赴幃堂雨泣護歸櫬先疇閩嶺遙寓舍京口近逺近之近葬營帶郭田地得兼山艮豫登科初補宿州觀察推官值先祖太尉薨背先公持服寓金陵朝廷特就移豫知江寧縣才滿秩先公在河陽下世豫星行護喪南歸治命以泉山鄉里道逺不可歸令于升常間卜葬謀居既過京口會故人錢起居子高作守治館相留時有道人自真善山水學從豫行常潤數州擇得今青陽墳地起乳山艮來南走京峴巽岡西北枝艮落即今先公墳術者皆言善地遂安葬自此謀居郡中占丹陽為鄉里送往極充窮拊存急賙賑三釡須自謀一官姑孟晉見班固幽通賦恤孤逢舊知溫故拾餘燼薦衡荷德璋嗣向憐子駿給札恩特殊除職選尤遴遂去州縣勞入陪臺閣俊豫既除先公喪祖母徐國太夫人先妣魏國太夫人在堂及諸姑弟妹未婚嫁家素無資不暇擇祿急趨銓調授南京留守推官食貧纍嵗先友少師趙康靖公少傅孫文簡公洎諸翰林連章薦文繼先世蒙取索先公遺稿及豫投贄乞召試職名先是言事者奏近嵗文館太冗乞加慎選時預試者如梅堯臣宋敏修宋充國楊忱并弟慥文詞皆入等止遷秩或賜科名及升差遣逮豫被薦執政進呈云近臣薦父子文學優長仁宗問誰人子執政以先公名對上曰特與試乃試兩題俱書高等時翰林曽胡楊田四公皆云近預試者惟馮京蘇頌皆入髙等因此遂得職此並梁丞相所喻云校文擲三折食貧嵗四閏君相嘉宿官圭符假名郡地望號優間公租稍充牣二偏豐旨甘百口免飢饉豫在館閣九年與同舍陳述古孫聖途俱請外補久之無報遂同見執政丞相富鄭公問九年不遷未有前比莫且别移一京局豫再三言食貧且久難更伺候翌日特為奏陳獨豫得汝隂善郡陳孫歲淺得常郢皆常調也方喜私願諧遽叨召音迅素非幹時才屢試投虛刃治績愧無聞官資謬超進持橐入記言演綸漫燥吻事無補毫分心常懷憤悶一言偶寤意三已固無愠豫守潁將二年匆被召遷府界提點踰年徙三司度支判官又二年出為淮南轉運使神宗初登極因送邉使還陛對特蒙訪問北邉事頗合旨仍宣諭二府故到淮南才五月召還修起居注遷西掖掌誥二年因論差除御史事蒙中札召對詢問本朝故事上初甚以為然及有褒語無何執政以為違忤見黜歸班趨常朝者一年半遇恩出領東陽移譙郡還朝兩領三班銀臺又出南都知餘杭入為史官尹京府以孫純陳世儒事貶濠梁凡五換推及入對獄卒無一事結吏議乃罷濠領孟辭以先公薨逝之地改知滄州再違金門籍七換竹使印賜環元豐初解組橫海鎮虜信使約修周官預詳攈居運切見前漢書刑法志上號太宫辰奉册陪發軔復土裕陵日杖桐方守殯阻趨七月期莫從百夫殉豫到滄才數月上喻執政云要蘇某來修一書令速召歸遂有判吏部修官制之命及進對上曰朝廷與契丹通好歲久故事儀式舊章案牘遺散者多每使人來生事無以折證朕欲裒集國朝以來至昨代州定地界文案等以類編次為一朝典章使後來得以稽據朕思非卿不能成之又宣諭云近日修書臣僚多遷延嵗月只如密院機要已七八年近方奏請差人檢閲巳令罷之卿該通勤敏此書何日可成對以案籍浩大幾數十架急急編次亦須二年不知果可成就否上曰二年了得甚善有旨就樞密院第四廳置局仍許辟官檢討指射密院人吏于是曉夕比次逐時面奏商議立例類不踰期成書二百五十卷奏藁日上大喜乃御筆賜名華戎魯衛信録是年南郊加上仁宗英宗徽號豫預五使奉册乘輅入朝明年先帝升遐豫適丁先太夫人憂寓維揚不得預挽紼之列于今痛恨衰麻雖未除淚血猶未抆誤被兩宫知首頒一札訊入長天臺班復冠鼇坡峻太夫人服除蒙詔書已除刑部尚書令乘驛赴闕踰月改吏部二年除翰林承旨拔擢登台司咨俞陪坐論屬時久承平狡羌未誅震誅震見陳湯傳任重才難勝位高躬易隕丹衷徒蹇蹇明誠乏斤斤靡憚嘖言煩姑守王臣藎聖神眷始終進退禮周盡禁殿陟青規琳宫叩虛牝再辭淮海藩未許丘園遜豫自承旨拜左丞二年忝中揆又一年言者論臺雜牽復事云豫獨主之豫聞言即時出省歸私第待罪同列見喻云且須翌日見上略敘陳然後求罷貴全進退之禮豫答以宰相一有人言乃是物議不允豈有解紛之禮連上三削一劄獲罷拜大學士領集禧觀使恩禮優異近嵗未有中謝日兩宫褒語知卿無他意只是避人言其年出守維揚再告老復有宫使之命許還丹陽風霜經六紀蓬葆垂兩鬢躬間猶冠帶祿厚足儲餫貢餘香龍團上尊白羊醖嵗時荷恩霑漿藿對饋賮豫久參近著俸賜甚厚然族大家虛贍給常苦不足故每飯不過一肉非賓客未嘗飲宴每蒙恩賚極知慚感春園乘間灌冬户隨時墐入對書甲乙出驅車簿笨扶杖拜先塋攜觴問田畯蕃室倦掃除綦几聊慿隱於靳反養浩希子輿學生同祝腎念昔多艱勤誨爾宜悱憤見賢弓在檠遇事驂從靳見左傳競情思昔非視舌知柔韌高門訓序畏早聞先訓以謂門地高華可畏而不可恃豫刻心遵守常以為戒後因讀栁氏訓序乃有此語欲使爾輩知之以代韋弦刋腹摩兜慎榖城國門有石人刋其腹曰摩兜鞬慎勿言唐劉洎少嘗遇異人謂之曰君當佐太平得富貴然宜愼兜鞬之戒洎後為侍中以議論不常獲譴名教樂有餘異端戒多紊其要本誠明烏在問圓頓美璞不雕琢安得懷瑜瑾良器不深藏渠能免瑕璺學問不沾洽何由垂望聞去聲見詩音操守不堅純久必成緇磷進修欲及時行違要無悶士行惜分陰伯陽嘆往運當年倘因循晚嵗必悔恨更思祖先勳相傳清白訓世胄閩與吳宗姻期及絻衣冠布中外椽土無尺寸逮吾老鄉閭始得營畦畛蝸廬庇風雨稷田助饔餕幸與仁智鄰仍逺市城慁沈侯東陽居陸叟頤山遁陸希聲退居陽羡自稱頤山遁叟出處雖殊途豐約已過分豫初置京師西岡宅甚隘陋罷相日二府諸公見過以為不稱相第豫答以曽高以來忝仕朝廷下逮子孫輩已有官而四方無尺椽寸土今有此第已為過分比還潤又營此居處及近創少沙田追思先世已為華奐若非遭遇上恩何由至此但恨未有報國之地耳考室俟構堂肥家在忍順見栁氏訓序常使棣華榮無致荆枝忿中冓須自防外誘不可徇懼爾志悠悠故吾言諄諄去聲力行儻不渝家聲期遠振蘇魏公文集卷五
