body:
  text: 蘇魏公文集巻三十一宋蘇頌撰外制右諫議大夫權御史中丞吕誨可落御史中丞依前官知鄧州勅御史之職所以表正朝位分判忠邪舉錯或違綱領疇寄以爾具官某分卿華冑文學清流踐履閨臺休有風力伏蒲抗論稔聞獻替之嘉冠豸在庭方竚猷為之補而屢陳奏牘訾毁輔臣黨小人交構之言肆罔上無根之説比令辨析遽服過差四句係中添朕雖務于含容爾奚安于要近姑仍正諫之秩出擁南陽之麾噫正色立朝固忠賢之所守言事失實在典憲之當行既觀過之則然亦原情而非甚尚從薄責俾就外遷勉勵省循䆒理自訟可翰林學士兼侍讀學士寳文閣學士禮部侍郎吕公著可守御史中丞勑朕惟御史之任内承本朝之風化外為列位之表率治古所尚官儀特崇諒非正人未易稱選以爾具官某文章識度諸儒所宗論議風采中外推伏先帝置之經幄複門掌于命書嘉謀屢告于膝前善政巳施于京劇兼是數器可謂大臣惟爾一門公卿三朝侍從乆宜登于近用尚有避于當塗况朕方以至公待人不疑羣下豈以弟兄之任事而廢朝廷之擢才矧在仁祖之時已格親嫌之制臺端之拜無以易卿是用輟三學士之清班委中執法之要地爾其深體至意言念匪躬無自拘于細文亟往踐于厥位肅正朝宷敦厚時風竚觀猷為以輔台徳可尚書刑部郎中判三司都理文慿由司秦玠可兵部郎中勑夫考功課吏之法雖不足以待非常之人然居官幹職者嵗乆而不遷則不免夫賢愚同滯之累議年進秩其可闕乎以爾具官某識用純明姿韻恬曠奉使稱最治郡有聲正籍郎臺乆擅宿官之效賛煩計部荐推應務之才姑閱吏勞稍陞班等七兵華序實冠右曹三使别司尚仍故守毋謂次遷之薄足為階漸之榮勉務欽承式副登擢可尚書屯田郎中諸王宫記室葉紓可都官郎中勑具官某迺者參擇宿儒為僚宫邸使以經藝諭吾宗親爾以學術之該通從邇臣之保任始專講勸復主文書勤且歴年謹于率職攬攸司之上課在恩格以應遷即其郎闈陞以班等茂對甄褒之命益思訓導之方且俾藩侯樂于為善繄爾之能事也可不勉哉可王銑可左衛將軍駙馬都尉勑王姬下嫁詩美車服之隆主壻奉朝唐増階品之貴矧惟先帝之子巳正藩侯之儀歴求士倫克對嘉禮以爾具官某出于華胄茂乃素風蚤服習于詩書喜親近于儒雅藹然令器見推舊門是用擢于環列之班參彼副車之職台司視秩憲坐兼榮用光選尚之恩并示褒優之命噫連姻帝室接武外朝寵冠一時望髙三尉保其禄位當務于矜修乂而室家更思于抑畏服我辭訓無忘夙宵可權濮州團練推官充呉王宫教授姜潜可大理寺丞差遣如故勅具官某先皇帝念宗室之衆多顧學校之廢缺並擇時彦以為教官宜有勸率之條俾專講習之益以爾潜髙誼著于東國善誘聞于上庠選自成均置之國邸洎傳經而涖職加閱嵗之屢周教導有倫安恬可尚命遷丞于卿属且旌善于藩僚爾其欽承訓我宗属且無忘先帝之舉也可都官員外郎權發遣三司都磨勘司兼主轄支収拘収司公事杜訢可職方員外郎差遣如故勅夫公卿子弟習聞朝廷之典故周知臺閣之儀範擢處要任必有能稱盖有唐之舊事也以爾具官某出于名門稔服忠教嘗主臺劾近更郡符號為㢘平克紹前烈向用邇臣之薦超備司計之員析利既精議年且乆姑縁考課之比稍進右曹之前爾其休承益思率厲大爾門構副予寵章可屯田郎中李杲卿可都官郎中勑具官某朕逺攬周漢上法祖宗縁考功課吏之程著議年増秩之令所以待有勞之士而嘉乆職之人以爾生于徳門仕以科選稔聞吏治之譽方貳皇華之行積有年庸應我恩格矧累更于郎列復進秩于中都雖曰汎遷且酬善最尚仍煩使之舊益懋逺圖之休可職方員外郎陳傳可屯田郎中虞部員外郎孫昱可比部員外郎勑具官某等考陟之典尚矣自有虞以來未之或廢盖疇能比吏勸功賞善有國之法不可闕焉以爾等委質策名居官任職民政有拊循之效郡綱藉闗决之明稽閱四期嘉事勞之可録進班一等亦酬勸之所存服我恩榮終期報稱可都官員外郎新差通判南安軍劉炳可職方員外郎差遣如故勅具官某夫山澤之禁所以佐助大農通貨豐財待是而出以爾朝宷之望幹器有聞頃仕嶠南專司地寳能督兆人之役用資圜府之供績效甚明賞格斯在叙進省曹之秩尚仍倅乗之行祇服恩榮勉勤職守可虞部員外郎崔復可比部員外郎國子博士徐稹李舜元可並虞部員外郎勅具官某夫考功課吏之法雖不足以待非常之人然士之懷能抱器雜進有司不有甄陞何用勸善以爾淹歴朝序稔更嵗成于法當遷進官有等爾其體我恩意勤宣政事倘素緼于才用宜勉力于施為毋曰汎遷而薄後最可殿中丞致仕許弼可虞部員外郎致仕勅具官某朝廷推慶賜之澤而不遺退休之人者所以旌尚止足而示寵髙年也以爾早階仕綴得謝盛辰兩逄優渥之行未逮叙遷之比特縁往霈躐進華階南宫右曹俾榮鄉閈爾其祇率益務保頥可殿中丞賈忱可國子博士守衛尉寺丞侯可可守大理寺丞勅具官某㢘能之選早列于仕階撫字之求方紆於邑綬属攸司之比課謂滿嵗以應條進以一官甄其累效勉思勤儆往服恩榮可大理寺丞晏祇徳可右賛善大夫勅具官某爾以丞相子仕𨽻京司能持謹循保守門法試以㡬征之局頗彰幹辦之稱克逭過尤有足嘉尚攬攸司之㑹課属累乆之當遷進陟春坊之僚使通朝著之籍其思自勉益振緒風可衛尉寺丞劉士劭可大理寺丞勅具官某夫任職四嵗有勤最而無悔尤不有遷叙則士之沉滯者衆矣以爾為丞卿寺歴試吏條攸司類能加秩有等其進理官之属益思政治之宜可前權知雲安軍判官馮越石前華州下都縣令張杲之可並著作佐郎集慶軍節度推官前知磁州文城縣彭天麟可大理寺丞勅具官某等士之由選調而陞京司者始用外官之保任加復有司之視成最狀上聞便廷臨引貲相其質敷納以言然後命之良亦艱矣惟爾閥閱之茂咸應斯格有如辭章之美並由科級而仕擢以臺秩俾為王官漸階通顯之塗益愼進趨之守可袁州分宜縣主簿前䖍州受納板木場兼監排岸司劉最淮南節度推官前知鄆州中都縣事王仲安可並大理寺丞劒南四川節度推官前知梁山軍梁山縣事趙清可著作佐郎勅具官某等或决科從仕或延賞入官並有亷能之資綿更縣邑之課臺章言状銓筦條勞辦職者敏幹可稱字民者拊循著效用擢京司之列兹為貴仕之階勉思後勤勿渝素守可前建州建安縣主簿監南劒州石牌場郭綱可大理寺丞勅具官某國家謹山澤之禁非惟專利公上抑亦止民爭端官或有勞賞亦用勸以爾詞科進擢吏調淹囘以閩邑勾稽之員督丱人物地之役五歴年稔倍登貨程特遷卿棘之聮盖示賞條之信爾其欽率思稱恩榮可曹州南華縣尉王洎可太常寺奉禮郎勅具官某朕以東畿積冦多出曹南故嚴設捕格之科以除生聚之患以爾得調銓筦往專尉循能奮勇謀悉擒兇黨擢爾京司之秩欲示信賞之行其益祇欽以對光渥可常州無錫縣尉扈大亮可杭州餘杭縣令勅具官某夫萑蒲不戢則閭里靡寧賞典不行則儆勸安在以爾調名銓筦為吏江湖謹于尉循號有方畧属彼冦攘之黨肆為戕賊之謀一舉成禽羣凶就戮嘉其善職之效寵以長人之官其勉懋于逺圖善撫綏于美俗副我甄擢無忘瘁勤可皇叔前右監門衛大將軍克眷皇叔前右監門率府率克迓克慕皇兄前右武衛大將軍榮州團練使仲論可並舊官服闋勒具官某孝子念親情何以極惟三年之中制盖天下之通喪眷吾近宗動必由禮既畢居廬之慕宜還拱著之榮以爾慶衍皇支位通閨籍向縁銜恤乆去辨朝閔寒暑之再離属縞纎之云釋俾仍舊次庸示新恩勉惇信厚之風茂對休嘉之命可前左藏庫副使曹誦西京左藏庫副使曹識可並舊官服闋勅具官某天下無事兵革不試仕武列者咸得喪親以禮所以盡人子孝愛之情也以爾生于慶門早服義訓銜恤去位釋􅎭從公斯得孝忠之全宜還位著之列欽承新渥益勵後圖可文思副使胡拱可左藏庫副使勅具官某朕以累朝陵邑邈在澗瀍並建官司典領封域爾向由内使祗事眞園職為寢郎累更嵗稔朝夕起居之奉無曠爾勞春秋荐告之儀亦㕘厥守比代還而言状嘉往效之良勤稍還主帑之聮兹謂疇庸之命往承優渥益務欽修可文思副使李惟忠可左藏庫副使西京左藏庫副使蘇信可文思副使供備庫副使李惟清可西京左藏庫副使勅具官某等内朝諸司參設使介所以待材武之士為帥領之基惟謀勇兼資乃副超擢而課最應格亦得稍遷爾等勤能守官才任禦侮積日累乆之課既應陟書歴階加等之榮寖居前列宜益圖于方畧且無廢于事勞服我訓言以永終譽可左藏庫副使曹繼明可供備庫使西京左藏庫使雍規可文思使内殿崇班閤門祇候王文郁可内殿承制依舊閤門祇候内殿崇班韓見素可内殿承制勅具官某夫仕者乆而不遷則才愚同滯進而不以其效則流品弗甄今有司所以限年而校功循階而進秩者由此道也爾以材武擢于治朝内外煩使之勞訖無曠事嵗月薦更之比已應陟書稍陞等于官聮且疇庸于閥閱往承新渥無怠後勤可前文思副使衛克明可舊官服闋勅具官某列職禁庭早擅勤恪之裕服喪堊室已終縞􅎭之期宜釋素冠超還舊著内司之介班等惟優勉遵移孝之方無怠首公之志可西京左藏庫副使蔚世長劉輔可並文思副使勅具官某内朝諸司並置使介所以視典領之閒劇為遷次之等差惟其職儀亦號通顯以爾仕以才武能輯吏勤陞諸使聮荐更嵗律齎閥來上有勞當遷稍増陛級之榮庸示甄疇之渥承兹寵典厲乃公忠可供備庫副使宋惟渥可西京左藏庫副使勅具官某朕所以屢戒邉疆之臣不使生事夷狄者誠欲慰安吾民綏靖殊俗也爾向以廷中之籍出監嶠外之兵歴稔三周善撫師衆外虞無警成效可嘉俾遞進于使聮示不私于賞格往服休命更勵後勤可前内殿崇班康昺可舊官服闋勅具官某任繇武弁服在朝行属時偃兵靡事衽革遘家艱而銜恤遵禮式以行喪嵗月其周縞􅎭云釋宜起還于舊次當益念于教忠祇服訓言勉勤職業可内殿承制王懷淳司允可並供備庫副使勅具官某等武爵之選籍𨽻于樞府者是為朝班由此而升諸司者又為優選雖議年而進秩亦寓令于擢才爾等資適逄時官亦乆次應是寵格叙躋使聮涖事局者宜勵于亷勤䕶師屯者益思于訓輯祇服休命勉圖後功可右屯衛將軍致仕徐用文可右武衛將軍致仕勅具官某朕初嗣鴻業大賚四方首覃慶恩靡限遐逺惟彼引年之類例加増秩之榮以爾給事禁庭夙推勤愿退居近甸克享夀康宜沾渙澤之優稍進衛環之列祇服休寵益保餘齡可内殿承制郭昭誨可供備庫副使勅具官某夫武爵之設所以待材勇之人方無事時士特以積日而進取然揔戎幹邉皆由此出授任之際良亦難矣以爾克有幹力嘗試事勞較其年勤甫應遷格進陞内使之貳漸履華塗之階無以易進而自安當念逺謀之可致斯謂勤奬爾其欽承可内殿崇班王世安可内殿承制勅具官某夫考課之法議年有等並甄閥閱之最非有文武之殊以爾早用材謀服勤官次淹歴巳乆亷能可稱且縁計最之程進陞班制之列褒遷之寵勉懋其承可東頭供奉官陳永齡可内殿承制勅具官某南海百貨之所叢四方商賈之駢集惟其繁富之㑹是亦剽盗之招以爾官守遐陬職在循警能殄除于冦黨且安慰于民居成效既然推恩何恡往服内朝之籍益思方畧之圖可東頭供奉官趙渥孫穆之可並内殿崇班勅具官某等仕之𨽻三班者其任使特為冗而遷次又復稽緩然由此而陞内著者盖積日已乆而陳力且多矣以爾服勤吏役能寡過尤應課攸司亦在最等命通聮於殿籍斯漸履于榮階宜益矜修以稱甄録可東頭供奉官趙定可率府率致仕勅具官某夫仕貴量力而進欲知止此士大夫之所美也爾居武弁能蹈斯言壮而從官老而謝事是可嘉尚所宜顯褒擢于儲禁之班俾從家居之秩保爾暮齒承兹寵榮可西頭供奉官郭右之可右清道率府率致仕左侍禁李昭懿可左清道率府副率致仕勅具官某早從職守充集吏勞洎列庭班亦更事任自言耄及願獲歸休宜擢進于儲僚俾退居于里閈承兹秩老之命慰爾暮塗之榮可右侍禁吕嬰可左清道率府副率致仕勅具官某爾以州郡之課得列仕階以嵗月之勞屢陞班等自言齒耋願謝官榮特遷宫率之聮俾遂家居之佚可守少府監致仕王山民男漸可守將作監主簿勅某男某乃父仕宦三品年至告歸閔其乆勤延以世禄以爾早聞家訓克紹素風擢寘京司俾階榮路往承新渥益懋爾思可翰林醫學冨州龍平縣主簿潘務本可少府監主簿餘如故勅具官某爾以方技之能為王官之守向逄霈澤方役遐陬嵗滿言歸慶條具在擢預京司之秩且甄執藝之勤服我休恩益精素業可左諫議大夫知瀛州李肅之奏醫人孔世卿可試國子四門助教不理選限勅具官某方技專門診治有法給事帥邸服勤累年属覽奏封之陳且援近侍之比寵以一命足為爾榮可秦州東路弓門寨界蕃廵檢副都軍主張朴令狐可銀酒監武充本族都軍主原州之安寨白家族都虞候薛乞可銀酒監武充本族副軍主勅某職于邉候號有才謀俾式遏于諸戎且無虞于外境藩臣列奏寵命惟行進膺帥領之榮罙盡封陲之效可蘇魏公文集巻三十一
