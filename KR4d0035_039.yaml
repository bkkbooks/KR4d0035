body:
  text: 蘇魏公文集卷三十九宋蘇頌撰表謝光祿大夫臣某言近者伏遇車駕臨幸新省推恩官屬尋具奏陳辭免蒙降詔書不允伏奉告命特授臣光祿大夫依前尚書吏部侍郎仍加上護軍進封武功郡開國侯食邑四百戶者中臺成室紆詔蹕之天臨司列備貟奉王言之綸出敘進上階之貴且旌服采之勤不獲避辭交深惕厲臣某中謝竊以上之所行曰幸人皆被於恩私官以稱任為差吏乃知於奬勸屬更新於會府因親屈於帝尊萬乘一遊愈重南宮之故事羣司百執均蒙天子之龍光顧慙充位之聨竊與録勞之賞伏念臣材資弗茂遭遇最先出入禁闥者十有六年典領銓衡者兩登三品飛蕤鳴玉濫肩簪橐之遊入墨出朱每負簿書之殿昨恭陪於法從遍觀歷於省曹中謁者之臚傳側聞聖諭正大夫之位序遽忝平除復推郊霈之釐賜轉王功之等進封侯社衍賦戶田名數併增雖舉泛遷之例階勳並進實為非次之榮况臣久荷聖知寖蠲往咎超資匪一寓祿已髙惟今甄擢之優逈越輩倫之擬加官貴乎四職遂躐通班典領首於二卿仍兼舊服服彜甚寵揣分奚勝此蓋伏遇皇帝陛下稽古建官因時立制方修明於墜典先崇大於列曹既得其真賢實廉委之事任又加以髙秩厚禮勉彼修方如臣譾涼豈稱褒陟三朝漢省已叨過輦之恩六典周官願謹書屏之戒惟悉心於吏課兾少補於治綱自餘傾竭之誠更厲初終之節死而後巳言豈敢渝臣無任謝降詔已除刑部尚書右臣八月初八日揚州遞到賜臣詔書一道為已除臣刑部尚書候服闋日發來赴闕者躬有親喪才踰中月詔還朝序忽降新恩捧對言綸交深感涕伏念臣夙遭際會久玷近嚴罪負神明禍延鞠育銜恤在疚茹痛無窮泣血終天永慕何及州傳俄頒於朝命草廬獲拜於天書仰荷甄收強扶痛疾恭俟外除從吉掃墓盡哀勉力辦嚴即時就道倘未淪於顛殞期入覲於威顔論報君親誓竭軀命臣無任謝除刑部尚書臣某言奉告命伏蒙聖恩特授臣守刑部尚書者省座位崇天書寵過祗膺渙渥內切兢惶臣某中謝伏以王者制五刑之中以期於治尚書為萬事之本用正厥官惟典領之既煩故事任之尤劇臯陶之明克允乃作虞之理官仲尼之智且仁嘗為魯之司冦其重如此可繼者誰方嗣聖君臨之初革有司文峻之敝秋卿之屬皆知堯舜之在寬風化所先幾致成康之不試長臨其職未易其人伏念臣才術非長遭逢有素先帝見謂愚直曲加眷憐收從三黜之餘升置二卿之列天恩疊委未施毫髮之勞家禍重仍俄抱充窮之痛方切倚廬之念遽驚下席之悲君親之慕交深霜露之濡再歷既更中月偶獲餘生復遘聖明之期旋蒙收恤之惠詔還京闕擢在省曹輒揣分以辭難俄賜書而趣拜銜恩愈厚受命思憂此蓋伏遇皇帝陛下天錫至仁日新盛德將肅清於流品因綜核於人材以命令之宏綱非賢罔治謂福威之大柄惟辟所專故拔用於文儒俾參持於邦禁豈伊衰朽亦預選掄敢不祗率乃僚各共其事念哀矜而用法兾盡人情罄勤瘁以在公恪循官守庶無敗曠少答生成臣無任又臣某言奉告命伏蒙聖恩特授臣守刑部尚書者位崇德薄貴重人輕仰對寵光伏深戰懼臣某中謝竊以出納王命尚書為喉舌之司糾度天刑秋官取震耀之象昔惟議事以制既而執禁以齊非有厚性寬中之人審於用法則夫峻文深詆之敝浸以成風在君子之盡心使天下之蒙福屬時隆盛留意侀成深懲密網之科幾復畫冠之化疇若豫采慎簡乃僚自非慈惠之良莫副讞平之寄伏念臣寡聞淺識已試無功荷先帝之誤知歷近班之煩使萬分未報三黜終收初復省曹首列周卿之二旋罹家禍遽聞荆鼎之成痛交切於君親慮將填於溝壑偶延視息獲遘聖明方周祥禫之期忽被絲綸之詔召還朝闕擢在天臺再惟摧瘠之餘靡稱優隆之遇懇辭莫獲詔奬彌優拜命以還負芒益懼此蓋伏遇太皇太后陛下宵衣求治當扆咨賢鑒觀六職之原總覽萬微之要惟刑之恤欲輕重之適宜因能任官謂久勤之可用寵非其次恩出於中臣敢不勉䇿疲駑奉循憲度不懈於位但思夙夜之靖共非訖於威上廣朝廷之德恕少殫薄效仰答鴻私臣無任謝賜對衣金帶右臣伏蒙聖慈特賜對衣金腰帶及銀鞍轡馬者再命受服周官以辨於朝儀三品佩金唐令用旌於貴仕矧材駒之在御兼組轡之如濡爰因就列之初併侈臨軒之賜伏念臣顓侗所稟憂毁未完方忝冒於省曹遽分頒於輿服仰循衣被之渥內集負乘之憂此蓋伏遇皇帝陛下禮待庶工恩推舊典慎擇官師之長優加錫豫之繁自省無堪何勝異數才非陸遜濫叨脫帶之榮老過文淵尚及據鞍之寵深慙匪服益念在公惟堅盡瘁之心少報非常之遇臣無任又右臣伏蒙聖慈特賜對衣金帶及銀鞍轡馬者車服之儀所以旌有德朝廷之命所以優近班弗圖衰朽之餘并荷便蕃之寵伏念臣起於憂患預在甄收任方忝於六曹例有隆於庶錫笥衣鐶帶兼金艾之光華廄馬文韀加貝裝之鮮澤雖循臺式實出殊私此蓋伏遇太皇太后陛下德廣無疆仁周在列既掄材而授職仍加惠以推慈不間瑣微均蒙賚豫寵深靣命禮重躬章佩魚非稱於蕞軀躍馬遂榮於暮齒仰酬鴻造願畢餘生臣無任謝修史畢賜銀絹對衣金帶臣某言伏蒙聖慈以臣嘗預同修仁宗皇帝英宗皇帝正史特賜銀絹各五十兩匹并對衣金帶者紀事兩朝慶就編於大典第勤衆史均庶錫於常僚寵優器幣之頒增賁服章之美恩榮疊委捧對兢惶臣某中謝伏惟皇帝陛下躬堯舜之明聰承祖宗之謨烈永懷二聖極成功盛德之隆參擇諸儒輯廣記備言之載奏篇悉上正寧親觀動惻怛於清衷用褒嘉於直筆凡經典領並預甄稱而臣向以顓蒙首叨選任依經發例曽未效於小勞待罪廢官已屢更於他職敢謂等功之賞亦霑去位之人束帛兼金出大盈之良貨襲衣寶帶分上褚之珍華異數併加孱軀豈稱雖繼志述事上欽聖孝之垂謨而因人成書俯愧支離之受賜捫襟知懼覽物增憂從容有常敢不勵古人之守夙夜匪懈益當念王事之堅誓畢微生仰酬洪造臣無任謝吏部尚書臣某言伏奉告命特授臣守吏部尚書尋具奏陳乞辭免蒙降詔書所乞宜不允臣已於今月七日祗受赴部禮上訖者初聽臚傳驟驚恩擢揆才匪稱服寵為憂臣某中謝竊以古有六卿位崇八座出納王命是為喉舌之司綜核人才坐執銓衡之柄恭惟聖考肇正官名革近世之權宜復先王之典制文武大選既並屬於吏曹封勳四司亦兼統於官長自一命之著籍逮五品之具貟隨資入選者凡以數千注名得闕者十無三四每當啓擬之際未免沈滯之嗟向非詳明體要之人制為簡易疏通之法稍甄别於倫類用振舉於綱條則無以上助時風允諧公議伏念臣行能無異齒髮已衰緣積日之久勤荷四朝之樂育服喪去國逮素韠之外除賜詔還臺預荷橐之入侍總司刑典僅易時暉惟案牘之是親無閥閲之可紀敢期鴻造弗責罔功之尤特録舊資就遷司列之長超升非次菲薄奚堪昔蔡謨之辭尚書懼有維塵之纍劉毅之論人物謂如窺管之微仰景前言固難虛受因瀝輸於丹懇俄再被於言綸即拜恩章愈增危懼此蓋伏遇皇帝陛下繼繩祖武總攬乾綱方庶政之維新欲羣才之並用假事權於典領責幹用於官司惟兹譾才未副殊奬臣敢不悉心乃職竭力於時雖無蹇諤之名豈敢浮沈於調選竊慕公方之士亦當循案於官常兾於遲暮之間少集涓塵之效臣無任又臣某言伏奉告命特授臣守吏部尚書尋具奏陳乞辭免蒙降詔書所乞宜不允臣巳於今月七日祗受赴部禮上訖者寵靈驟及遷次殊優祗服訓辭有慙顔靣臣某中謝竊以天臺故事五品長於尚書官制新規兩選歸於吏部顧其任職之重常在列曹之先坐執銓衡考求才實或略其朱墨則流品為之不分或格以年資則賢愚由其同滯守文之弊在古巳然自非識量之明通加以綱條之簡要據兹重地誠謂難才伏念臣士品非髙福基甚薄差池老於仕宦遲鈍乏於功名向從憂患之餘適遘清明之治圖任耆老辱在舊人之名典領省曹叨居大憲之任冒塵巳過績效未收常有愧於濫官固無求於榮望會宰卿之更易荷宸扆之柬求越自右行擢先諸彥聽除書之報下靡測端倪輒抗疏以自陳敢辭煩劇遽承詔札趣就班聨拜絲綍之褒嘉集冰淵之戰栗勉臨所治尚未遑寧此蓋伏遇太皇太后陛下與日並明如天廣覆總核官師之效登延俊乂之倫付以成規使之共政若臣蕞陋曷副選掄敢不夙夜在公黽勉從事考三銓之政雖未致吏潔而俗移敘九品之流亦庶幾言揚而事舉倘毫分之可致在筋力以何辭底裏之誠終始于是臣無任謝兼侍讀臣某言昨奉告命伏蒙聖恩除臣兼侍讀尋具奏辭免今準詔書所請宜不允臣巳於今月日供職者拜言綍之優恩預經闈之進讀寵非其次懼積於衷臣某中謝臣聞考古道所以驗今觀人文所以成化鑒於前載厥有成規惟昔帝王之典謨布在方册至我祖宗之故事炳若丹青將啓發於篇章備顧問於帷幄自非博識之士莫盡聖言之微伏念臣才薄性迂年侵智短始緣孤技誤蒙先帝之知因藉纍勞擢在天官之長空糜廪稍無益縣官但虞職業之隳絶覬光華之選伏遇皇帝陛下萬機求治五學尚賢緝熙光明晝訪耆儒之議燕見紬繹樂聞讜正之言詎期衰朽之餘輒冒延登之命控辭弗獲就列增慙將何以摘句於講筵侍言於帝席對闕疑之問既無禇馬之長應義理之文又乏嚴吾之辨謹當盡瘁夙夜遊文簡編究前言往行之殊雖非善説贊帝典皇墳之美悉兾上聞倘誦數之有長庶涓塵之少補臣無任又臣某言昨奉告命伏蒙聖恩除臣兼侍讀尋具奏辭免今準詔書所請宜不許臣巳於今月日供職者仰對明綸內慙虛薄入趨邇幄益負兢凌臣某中謝竊以書陳二帝之謨則曰順考於古道禮稱三代之學亦云習近於古人蓋將恢廣於猷為是必鑒觀於往昔洪惟嗣聖纂紹先謀覽上世帝王之書周知治忽選耆儒博碩之士悉俾討論預陪清燕之間敷述微言之緒往當厥職未易其人伏念臣少無頴拔之才老有耄昏之纍徒以荷四朝之奬育寖而假六職之典司以簿書刀筆之勞遂升於要劇惟章句誦數之習絶覬於清光驟膺宸扆之知擢置經闈之列能非倚相使進讀於典墳貴謝富平復得聨於簪橐莫遑遜避實冒榮恩此蓋伏遇太皇太后陛下總攬治綱周旋聖學思用該通之彥鋪陳德義之經深懼顓侗難勝柬拔敢不溫尋素業澡雪煩襟摘句上前期盡聖明之奧悉心官次不忘早夜之思倘有補於毫分誓不渝於始卒臣無任乞致仕第一臣某言臣聞七十致仕大夫之常經耆艾傳家前古之通訓自非勳在王室名重本朝上方仰成義不得謝若乃居卿士之列有職任之繁當血氣方剛則進思盡效及股肱既竭則退免為宜矧惟寖迫於衰殘豈可不知於止足輒援告老之例兾遂就間之私臣某中謝伏念臣朴學陋儒鮿生小器逢辰筮仕勉力首公馳驅州縣之勞服役簿書之務仁祖知家世之儒者擢居鉛槧之司英宗念履歷之歲深授以臺省之秩先皇帝臨御之日賞拔最先召自漕輸置之禁從聲過實而毁至福逾分而災生失於求全終以獲罪仕嘗三巳猶蒙簡記於清衷望絶九重終見收還於舊物方膺器使遽遘家艱三年之視息偶存二聖之龍光曲被遷司會吏刑之任預邇恩講讀之員愧非銓藻之能靡續金華之業頻更歲月俄至耄昏日暮天寒固有倦飛之嘆鐘鳴漏盡宜無疾走之思徒切戀軒之心已殫戴嶽之力載稽年禮盍自退休伏望皇帝陛下御世體仁如天從欲曲盡羣才之用不遺一物之誠憫久仕於朝廷粗輸勤瘁許上還於章紱俾遂休間完全衰憊之軀涵泳太平之澤雖不能力服田畝為災畬耕穫之勤猶可以躬率子孫謹孝弟忠信之行尚堅晚節仰答鴻私迫切之誠殫竭于是伏望聖慈許臣守本官致仕臣無任又臣某言臣聞忠以事君靡有辭難之義老而去位蓋循知止之常論年既迫於傳家引分固宜於納祿輒援禮典之舊願賜骸骨之歸臣某中謝伏念臣才無他長性惟嗜學守經據古迹豈晤於蘧廬論世誦書味徒甘於糟粕進惟知於直道動罔識於先機出入禁嚴周旋彌於二紀便蕃任使奔走遍於四方見危豈憚於忘軀慮患敢思於擇地仕類子文之三已謫過中山之九年歷更夷險之塗粗保始終之節向罹私恤無望生全荒迷多難之餘遘遇重明之運適終祥禫洊拜言綸典領吏曹既不能甄敘於流品參陪經幄又無以開發於淵聰蒲柳之質易衰桑榆之景向晚方少壯強勉猶患無以逾人逮心志蕭條豈復堪於辦職伏況臣本緣衰緒遭際休明一門共荷於國恩六世獲霑於仕版坐塵華貫無補毫分迫臨遲暮之年久居要劇之任若不因於罪廢亦可謂之榮歸伏望太皇太后陛下甄敘羣工生成庶類曲矜耆艾之齒俾全進退之方倘牛馬餘生得遂放歸之逸則樗櫟無用終逃掊擊之傷安居里閭日從父老但歌時而樂聖或挾䇿而讀書議朝廷之疑誠不敢期使者之問效華封之請猶可以祝聖人之年懇迫于衷兢惶莫措伏望聖慈許臣守本官致仕臣無任第二表臣某言臣近抗封章丐還官政恭承詔答未賜允俞體聖君眷待之私實為優異在人臣進退之分固有典常蓋恩禮厚則報稱益艱齒髮衰則精力難強非求全而自便惟度已以為宜敢罄竭于愚衷仰干祈于淵度臣某中謝伏念臣稟生弗厚涉學甚迂操心雖危而慮患甚疏用力雖多而見功尤寡自叨塵于嚴近無少補于涓埃徒歷歲時坐糜廪稍筋骸憊矣幾同稿木之枝志意索然思戢驚禽之翼積憂傷而已甚任煩劇以奚堪生也有涯况餘齡之向暮戒之在得豈竊祿以遑安伏望皇帝陛下深諒丹誠特回睿眷憫衰遲之無用許休佚而就間遂營環琽之居稍養負薪之疾雖天地之恩未報非敢愛生而犬馬之力已疲固難任重倘諧開可實荷生成臣欲乞守本官致仕臣無任又臣某言近以齒及引年禮應謝事露章布懇誠知昧冒于宸聰中詔敷言未忍棄捐于老舊上恩至厚私願莫從既量力之不能敢匿情而遽已臣某中謝伏念臣才資甚陋稟賦多竒仕宦久而備嘗險艱遷謫頻而屢驚寵辱玷簪纓之列彌周四紀之間領臺閣之司無補萬分之一歲月逾邁筋骸寖疲荷兩宮之眷隆尚加容貸顧六卿之任重實慮顛隮在引分以宜休每省思而自揆雖葵藿之心不改向日常傾而蒲柳之質已凋望秋將墜倣徨念此怵惕尤深伏望太皇太后陛下軫惻淵衷閔憐瘁迹老將至而耄及難責事功人所欲而天從曲推全度俾遂完於晚節獲保養於餘生雖就宴間寧忘朝闕臣欲乞守本官致仕伏恐聖慈未賜俞允即乞先許解罷吏部職事臣無任謝賜御筵并御書詩臣某言伏蒙聖恩特賜御筵及蒙就賜御書詩一首者玉座觀書既盡一經之藴寶跗揮翰遍頒四近之聨愧白首之在庭覩仙毫之眩目捧承以往愧懼交深臣某中謝伏念臣誦數陋儒頽齡弱質越從憂患遭值聖明掌治天官叨綜銓衡之務侍言帝幕猥參講讀之員伏遇皇帝陛下堯德克明舜聰好問率迪祖宗之訓憲章墳典之文東學貴仁每詳延而盡禮西清訪道逮中昃以忘勞屬演義之終篇因示慈而錫宴羣公卿士咸霑既醉之歡一札文書洊出非常之賜在臣末至並預殊私竊觀上意之褒稱抑重昔賢之髙尚誓堅晚節益厲愚衷聖世尊經雖謝卞耽之執讀異時求老敢希賀監之榮歸始卒之懷殫竭于是臣無任蘇魏公文集卷三十九
