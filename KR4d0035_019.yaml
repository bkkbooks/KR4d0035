body:
  text: 蘇魏公文集卷十九宋蘇頌撰奏議奏請考校知縣縣令盜賊為殿最臣伏覩條制約束捕盜官吏至為嚴密而鄉村盜賊未甚衰息及不盡敗獲者蓋由賞罰止于巡檢縣尉而不及知縣縣令故也臣以為巡檢縣尉但能捕盜而不能使民不為盜若知縣縣令則其職在按察所部無所不統使之肅清一境勢不難也竊觀今天下縣邑有得人處往往預為條教暗設方略既備之有素則姦凶無能措手縱有竊發終亦為之擒擲其因循之人則不然見責任所不及至有以盜賊為非已職事而不留意故姦黨得以容隱重為鄉村之患者良為此爾臣謹按考課令每年尚書省諸司得州牧刺史縣令盜賊多少並送考司是古之長吏有考校盜賊之明文近世遂廢其法甚無謂也况今州縣場務課額稍虧官佐猶不免纍豈良民罹剽劫之害而親民之吏獨不任其責乎臣欲乞朝廷下審官院流內銓共加詳定自今知縣縣令任內遇有強惡賊盜并獲與未獲並即時批上印紙厯子候成考或罷任日校其殿最量立賞罰如此則當官之人各知警勸制盜之本斯亦一端奏乞糶官米濟民臣竊聞近日甚有近北災傷人民流移往鄰路州軍逐熟尋有朝旨下諸路令州縣常切存恤恭惟聖恩溥施靡所不逮然恐州縣拘文不能上副仁憫之意何則流民所之惟是嵗豐物賤便為安居之地今並淮諸郡雖稍登稔若食口既多必致物價騰踴萬一將來秋成失望漂泊之民未有歸業之期坐食貴榖便見失所彼時須煩縣官賑救為惠差遲則其敝益甚矣臣以謂存恤之法莫若先平物價欲物貨之平則莫若官為糶給使之常食賤價之物則不覺轉移流徙之為患也臣欲望特降朝旨應有流民所聚州縣權將上供或軍糧米斛比見今在市實直量減分數估定價例將來更不得添長專差強幹官一員置場出糶直候流民歸業日即罷其約束事件並依昨來在京糶場施行收到價錢却委轉運司和糴斛斗充數如此擘畫比之出粟賑濟所費寡而所惠溥惟朝廷垂意幸甚論東南不可弛備臣伏以杭州東南要藩控壓江海鈐轄司總領一路兵甲賊盜公事其間郡縣皆邊江湖雈苻嘯聚蓋常有之而人情輕揚易為搖動當平居無事之日尚須隄防况值嵗時不易編户失業者多盜賊乘間伺隙可不預為之偹耶臣竊知向來有南京曹鄆州廂禁軍三五指揮在彼駐泊前年盡巳抽歸將下未曽添填或聞近日亦曽差撥前去猶未及元舊人數臣欲乞朝廷因此災傷盜賊稍多之際特賜掇那近郡廂禁軍三數全指揮往彼駐泊委自鈐轄司常切體量本路如有羣黨盜賊州縣力不能制者立便相度人數差撥應副協力捕捉免致展轉結集騷動州縣奏乞開修破藏口復三堂分殺黃河水臣伏見河決小吳繇澶魏恩冀瀛滄諸州乾寧軍境內北流至界河東折入于海詔旨順水所居使為河道不復修塞決口此誠治河之上䇿而千古之大利也竊聞水官行郡縣圖方略但欲循水繕營防竭而未議下流函納之利害臣詢諸道塗之言以謂向之東流自澶淵至鹽山皆獨行不與諸水雜隄防甚逺猶或時有湓溢之患今既北行則與御河胡盧滹沱并合其在恩冀之間稍自成川則無復為害下至五遷渠數道皆合于徒駭俱入御河直注乾寧軍界只有木門朴樁劈地三處通流界河而界河河道亦不甚廣闊既受衆水必須壅遏難行見今滄州界御河增減不常時或逆行乃下法不快之驗明矣即目未甚湍猛而乾寧軍巳告危急異時萬一秋水暴至界河疏泄不迭則滄州御河亦恐泛濫為患宜乎預為之慮也臣竊謂治河之急最在先度下流之勢大禹釃二渠播九河是也漢之議者所謂多穿漕渠以分殺水怒太宗朝案河使者劉錫趙孚等亦曰治隄防不若分水勢近年興二股之論皆其例也今濵滄州乾寧軍界乃古渤海之故地而大禹九河之下流自漢迄今皆為大河所經歸海之路雖數移徙而不離此境其勢使然也臣竊見滄州東北有三堂泊縱廣皆百餘里下連海道地名黑龍港自來停滀濬流以為塹限近嵗隄防失完見巳淺涸但為汙瀦葭菼之地其西與御河破藏口及范橋鎮相去不過三五十里可以分引河流東注泊內既滿溢則由黑龍港以入海其勢甚易臣在任內先曽差官相度方議奏請尋以解罷未果上其事今若稍興工開治以為河道決水入泊緣泊隄防有缺壞處更加增築以限積水此功一成不惟可以紓滄州御河泛溢之患兼得塘泊瀰漫足壯北道之形勝欲乞朝旨下水官相度可否施行奏乞修疊京北驛路臣近經過京北韋城長垣祥符等縣界多有積水衝注道路五七步至百十步泥淖沮洳往來車馬阻滯甚多蓋由官司拘文非時不敢輒差人夫是致因循如此臣竊謂三代之時諸侯之國道有穢茀川無舟梁識者猶以為譏方今封域萬里皇華四逹蠻夷面內藩方職貢皆由此塗而出若使行李阻礙亦有司之失官也夏令曰九月除道十月成梁皆所以便行旅而使無病涉也近制秋夏稅賦輸納之際亦常舉行治道路修橋梁之令此皆民事之先急當官者宜為之預慮也臣欲乞特降朝旨下開封府界提點司指揮諸縣那官檢視道路應有水積泥淖阻滯處並許量事差遣人夫如法修疊須令高廣使往來者兩不相妨其係溝河通流舊有橋道處即官中支破材植重别創造務要壯實可行車馬候了畢日令佐常切提舉遇有損壞立便完葺其外處州縣亦乞下諸路轉運司依此施行如此則四方載乘負擔之人無不均受其賜也奏乞重立不以赦降原免條約臣伏覩不以赦降原減條敕因慶厯中殿前馬步軍司并開封府奏請軍營家口作過將欲敗露便即逃走指望赦恩即來陳首皆得原罪自此遂有雖會赦降不在原減條臣昨知應天府日有宣毅軍人家口犯在登極大赦前以百日限內不曽首後來改嫁又纍經赦恩及德音減降近方事發勘結成案有司拘文不敢斷放臣與僚屬商議以其曽經大赦難為却科決十年前所犯罪名尋已别作施行訖伏詳元起請本為倚赦作過之人情涉蠧害須當戒勵及後來因事續降條敕亦多此比臣愚竊度恐不謂再經赦宥或非時減降皆不得原減且再經赦宥動須纍年冒犯之人容其追改非時減降豈可預期而指望釋放哉諸如此類若皆不與原減是無知之人一時犯罪偶未發覺則畢生負纍雖欲改悔其路無由恐非朝廷原情立法之本意又慮法意當然有司不能盡曉未免使人枉陷深文欲望聖慈許下刑法寺重加詳明諸稱不以赦降原減條並謂犯事後遇赦降自當依法施行若事發或未發間再經恩霈並許依例原減如此則德澤所施蒙恩者廣愚民抵冒得以自新奏乞增修南京大內臣伏以南京國之東門當吳楚閩越舟車走集之會蓋周之寰內而周之北門也自建都迄今六十餘年人物風流一時甚盛而宫殿城闕都未修崇惟大內正門以真宗皇帝車駕巡幸曽駐蹕于此肆赦觀酺因賜名重熙頒慶樓當時雖稍完飾然猶是雙門不改列郡之制內中只有御製詩碑亭子二座外更無屋宇俱是榛蕪非所以尊藝祖肇基之邦慰都人徯望之志也臣伏覩大中祥符七年建京制曰可升應天府為南京正殿以歸德為名即以牙城為大內尋降圖修造事雖頒下即未施行天禧中知府王曽相度減省舍屋别具圖進呈乞行營建景祐中知府夏竦韓億相繼奏請乞改內前正街中隔城祥輝門及正南外城崇禮等門皆作三門適值嵗時不稔并以陜西事宜未暇及此然亦逐次降朝旨令候豐熟日奏取指揮嘉祐中知府張方平亦曽經畫得旨只是修葺過祥輝崇禮二門餘尚仍舊臣近叨守鑰目覩其事闕門摧側棟宇隳頽蓋由守臣失于檢舉欲望聖慈頒命有司令討尋王曽等所奏再行相度酌中制度修蓋歸德一殿并前後門四面軒廊仍改正門為三門大約不過一百餘間度其所費亦不甚多若自京師事材場八作司般輦事造了材木量差工匠役兵等逐旋修蓋亦不至勞擾若謂間架稍多難為遽辦即乞只降指揮應天府支破係省錢赴京西木場收買材植先且修蓋內門令稍合闕廷制度候工畢日漸次經營崇建殿宇等二三年間便可就緒庶幾興王舊都稍為壯麗近圻别鑰得以尊嚴表式四方事體誠重奏乞差防河將副臣伏以南京府城兩縣一鎮正當汴路敖倉營壘官守民居夾河萬家最為繁庶舊例每遇汴流泛漲即差府縣就糧禁軍防河本處兵官自當總轄近以諸軍皆隸將下兵官更不統領準條沿汴合差防河兵級逐將依舊例權暫差撥即不言統領之官臣昨知本府日值汴水泛漲尋牒逐將下差撥兵級上河而本將官以别條非本職事不得差委勾當逐官亦不得承受本條又無部領明文其差到兵級連夜在外將官皆不敢往前照管竊緣府縣地分約二百餘里兩岸擺鋪不下數千人並無兵官管勾誠慮曉夕暴露失于提振深為不便臣欲乞今後如遇防河差出將下兵級許依賊發火起條逐將下那將副一員上河往來巡覷所冀軍旅在外稍得整肅臣所起請只是乞令將副巡轄差出防河兵級即不衝改前後條貫亦不妨本處訓練等事論制科取士乞加立䇿等增取人數臣伏覩今年四月戊申及七月乙卯詔書復置賢良方正能直言極諫科并立定䇿入三等四等次推恩條制有以見陛下勤求俊良樂聞讜論士之抱術略懷憤悶者當繼踵而赴詔矣然臣竊觀本朝故事制科程式太嚴取人太窄自真宗以來每舉中第者多不過三人少或一人至有全不收者使豪傑之士有老于科舉而不預甄擢恐非朝廷聽言求士之意臣謹按漢文二年始詔舉賢良時對䇿者百人而朝錯為上第武帝元光五年詔舉對䇿者亦百人而公孫𢎞為第一歷代沿襲廢置不常至唐而特盛每遇親䇿賢良等科中第者常不下一二十人建中元年薑公輔等二十五人貞元元年韋執誼等一十七人四年崔元翰等一十七人十年裴垍等一十七人元和三年牛僧孺等一十五人長慶元年龎嚴等一十五人寶厯元年唐伸等一十九人太和二年裴休等二十二人自餘幽素將相等幾數十科取人亦衆其得士若蘇瓌蘇頲父子張説張九齡韓休裴垍楊綰崔羣韋處厚薑公輔牛僧孺元稹裴休輩皆出此選卒為輔弼名臣此外竒才博識之士垂名于後者不可勝數信乎制科親䇿可以收攬英俊有補于治道也而當時應詔之人或命州郡薦舉或許上書自陳被召者徑赴御試其推恩等第則第三等中書門下超資與處分第四優與處分第五等即與處分由是言之程式蓋不甚嚴而推恩亦不甚厚至周顯德四年始詔逐處州郡依貢舉人式例别試解送尚書吏部量試䇿論三道共三千字內取文理俱優者方得解送上都本朝之制又加以六論或試于中書或試于祕閣合格方得赴御試其所試論題務求深奧每舉轉加艱難致合格者少蓋以推恩過厚故取人益艱况國家承平日久天下學士陶染風教競習藝文而應此科者尤號該洽其程文縱非優長未合上等亦皆于古今義理潛心有素若蒙采收施之為政必須優于專經之人不為無益于朝廷也臣竊謂今來既立定䇿等推恩有厚薄則所取亦宜稍加人數臣愚欲望將來或請應人稍多即乞優加分數如合格人少即乞更加第五等分為上下入此等者只依進士第二甲第三甲注官亦不為徼幸若恐更添入流之人即乞以進士諸科御試不合格人數留充制科數目彼此通融俱無所礙如此則四方特起之人咸有榮進之望聖世搜揚之路蔑有壅蔽之嗟矣蘇魏公文集卷十九
