body:
  text: 蘇魏公文集巻七十一宋蘇頌撰祭文祭杜待制代歐陽故慶州經畧待制杜公之靈惟公之才時推佐王有文有武萬夫之望頃自郎署使于南荒夷䝤震讋請命不遑更鎮北地威懐西羌戎有犯命立寘斧戕邉陲晏然帝稱其良如公之賢宜壽而臧胡爲不憗今也則亡秋風蕭蕭汴流湯湯扁舟西來載公之䘮故人守土逆于河梁一奠致誠我心増傷尚享祭李賔客故留臺賔客李公之靈若夫三品通班五紀中壽惟公享之福善之祐聞望在時清白遺後歸全美名殁且不朽逺日啟塗素旌引柩一奠薦儀哀誠莫剖尚享祭杜監簿将作監主簿杜君之靈挺生慶門禀服義訓初仕卿屬方廣家聲灼灼其華秀而不實割慈天性均愴路人薦以菲儀達乎幽壤尚享祭王秘校嗚呼予與子直世篤朋契越在稚年㳺從講誼兩家情親各有兄弟輦寺同館秋闈並試爱子襟懐脫落閎肆嘉子文章俊雄雅麗謂如子才必用于世吾儕齪齪曽莫跂至不見数年聲名益熾先後相望並收科第子尉宛丘予職京師傳聞治聲民歌詠之竊私嘉歎有友如斯子罷陜官予方忝麾承以疾苦相見無期既來汝隂子以䘮歸不見神鋒乃見裳帷興言愴慟涕洟交頥念昔相從情彌眷眷二十餘年流離憂患同輩㡬何㑹而復散今乃與子生死間斷長年多感動増喟嘆況復懐感心摧意亂邊城子居鯛陽子藏日月有期吉在仲商㓜子未立母兄治䘮交友來吊撫事悲傷肴醴奠之詞以侑觴祭王侍御惟公德業之茂資歴之美盖有朝廷辭命諸公状誌賛之詳矣固非晩生末學所能稱述其彷彿也重念曩以世契獲拜座隅復得與公諸子交㳺義同子姓是以䝉顧之厚不與他比今兹守郡見公松楸感舊愴懐不能無慟恭奠薄醴以薦丹誠祭韓殿丞夫以萬石承家累葉濟美能用優學仕于明朝振鷺在庭早通于閨藉左魚為郡巳試于吏能方将凌厲亨衢顯揚先構才用既適志局叵量降年弗長中道而畫相君動猶子之戚士友傷秀林之摧輤旐将歸豆觴為奠來歆菲薄用表信誠祭故潁州通判鮮于都官嗚呼君之立朝淑慎端純君之奄忽哀感路人藐爾諸孤㷀然老親頼君以生天胡不仁既奪其壽其居則貧翩翩旌旐潁水之濆酒醪既酌薦爼交陳詞以寄哀聞乎不聞祭張職方惟公行實内緼名爲衆聞學以干禄忠而事君孰謂中道遽䘮仁人公之季弟與余同第今又同官實敦厚契聞公之亡澘然隕涕徒臨殯柩音容莫際魂其有靈歆此誠意祭外舅辛駕部昔公守遼旌斾去國秋郊莽蒼愴離行色昨公罷郡還朝有期日望西域車音何遲忽見公書情罙眷眷語以疾革留于南甸初聞驚駭恨莫得見曽未旬朔遽罹禍變人生契闊固不可量自昔别公膚體方强豈伊三載乃發公䘮一念及此百憂盈腸嗚呼哀哉公之業履清方粹美孝稱閨門道信閭里人皆趨時我獨用巳甘節令名始終無毁公之涖官嚴而不殘䋲吏以簡敺民以恩柄臣薦之才宜治煩三郡風績遺爱猶存天于善人慶常在後才不必貴賢不必壽古皆有死磨滅誰究惟餘徳澤殁在不朽公之世胄義烈相承忠獻之裔雜遝簪纓晉國諸孫亦既顯榮朝閨郎舍弟聮兄繼公有令子是詒是似伯也實才自爲良吏仲也多文足致名第肅肅清風兹焉不墜某早以愚藐獲奉姻逑名非蕭咸愛同張侯風期相許恩意綢繆追念平昔容音莫留帷堂在望奠觴遥隔馳兹絮漿貳以肴核禮毋菲廢哀縁情極魂鍳不忘歆此誠愊嗚呼哀哉祭外姑髙夫人恭惟夫人之令徳壽考柔聲懿範某巳紀銘于石傳告來裔非兹詳言而後信也顧惟鄙陋叨預姻列蒙被厚愛二紀于兹而以薄仕覊縶得侍几席者曽無㡬時恭聆訃音愴恨何巳又聞巳得吉卜合祔先兆復以匏繫朝籍不獲躬陪執紼之末追念音容永隔泉壤恭託薄酹用将㣲誠摧痛在心神其來享嗚呼哀哉漏港灘祭男穎士三十一郎穎士之靈汝生十年而警慧超特盖有過人者誦書秉筆志趣已髙承順親顔未嘗譴忤而又奉侍太夫人朝夕不離左右衆人知汝為孝子矣應接中外吾方有頼于汝吾遷東陽汝喜其行不幸道途遘迍遂罹覆溺之患䘮爾淑質時我之辜觸事寃摧痛徹五内以爾之夙悟早成雖遭横夭必不至于為妖為厲使人惡忌固宜證無生而入有生應變而現當為賢而為才光顯将來不然桐山之髙嚴臺之清可以㳺神接靈與川岳並秀亦汝之素情也寄殯佛舍倍愴吾心拊棺致誠一慟永訣祭亡妹張氏五縣君爾生有懿淑之質故先君僕射特鍾爱焉早孤不天予主宗事為爾擇配乆之始歸呂氏呂大宗也爾能恭順協睦不失婦道未㡬而䘮其夫予以爾又歸張氏張志士也爾能淡薄静専克成夫志不幸復失良人以子㓜未立來還吾家予方謫守東陽奉太夫人之官爾實在親側晨昏就飬宜無慊于爾心也今者舟過漏灘忽有覆溺之患實予薄祜致汝無辜寃痛號呼不能止抑爰以吉日塗厝于新定佛舍惟是窀穸之事則張氏有墓可以歸𦵏矣呂氏有子可以承祭矣冥識不昧必知所依臨殯致哀心焉如割祭甥張氏子念二郎獐老爾父懿行清文士林之傑既不克施于時中道而隕神理祐善謂宜鍾慶于爾躬未易量也方從母氏歸寧我家且使就學以成爾善不幸道途罹覆舟之厄遂致不救寃痛摧切我心如何權厝僧坊又從爾母氏之柩酹以薄酒用寄悲懐潁州謁廟刺史奉天子命長臨一郡境内之祠禮當有事必修謁而後敢治惟神福民祐善一境所依頼奠獻之數不敢缺也南都謁廟伏以大火故墟興王奥宅建都立國主社與民明神是依命祀攸謹致恭謁欵舉有常經某近忝授符爰兹守鑰初臨署位君命斯䖍越瞻嚴祀望祭惟舊敢用羞幣祗薦懇誠所兾聰靈歆此菲薄誕格純嘏孚祐兹邦非惟長人獨受其賜又某忝被朝命獲守郡疆肅瞻靈祠實奠奥壤適兹臨涖之始敢薦吉蠲之誠仰欽明神大庇庻士惟時降福俾民用康祗報鴻休敢怠常典南郊禮畢祭諸廟此者國家精禋太室配帝圓穹熈禮甫成大賚斯洽眷靈祠之遺烈飭守吏以備儀祕薦苾芬庻陳昭報諒惟神鑒歆此德馨儲福祉于生民息沴災于列境和平之格遐邇願同英宗皇帝即位祭諸廟此者皇帝祗遹先猷嗣隆丕構霈宣大賚敷告多方欽修三止之宗祗欵萬靈之奥勅守臣而致禮在祀典以必䖍爰罄吉蠲用嚴昭報仰祈聰鑒備享徳馨相邦祚于㤗寕擁神休而錫羨唯誠所格雖逺必通祭雙廟祈雨唐故張許二公中丞之神自昔至徳之初公以忠果殞于睢陽後人感慕風誼祠而享之于今且三百載而嚴奉如存者得非以公生旣有禦災捍患之功殁當有遺芳餘烈福于生民宜乎嵗時報祈載在祀典不為無益也今渉秋閔雨将害粢盛某為長人惟兹是恤心雖深念而力不能救是敢夙夜齋戒致禱于公公既血食此邦惟民是依固宜享于潔誠應以甘澤使巳稔之稼槁而復茂将耨之種時其稔登繄公之賜也公其鑒此祭喬太尉廟祈雨漢太尉喬公之神合宋之境古祠以十數其最為民所向信者公之神也去嵗冬旱某始齋祓請禱祠下未信宿而獲雨雪之應于是嵗時報賽未甞懈于禮焉今年自六月不雨至于仲秋禾菽既秀而将揠來麰巳種而不入農疇咨閔某實念之不敢不再告于神惟神既嚮受報于民固當恤此災沴復興雲雨潤澤一方使時無艱食之嘆然後神享豐盛之祀益無媿也祭喬太尉廟謝雨惟公特起睢陽逮事漢室威名振于郡邑勲勞顯于朝廷當官靡憚于權豪外學不懐于仇敵有知人之鑒則時雄慕其徳有息民之志則夷貉肅其强至于屈邦君之尊以徇幽人之節可謂通矣割幼子之爱以除質刼之患可謂果矣其懿績殊勲伯喈之銘見矣其令謨明訓孟徳之文備矣故去世千禩而英風凛焉梁碭之間里名未改陵墓之側喬木猶新肇彼京都巍然廟貌春秋奉享典令具存昨以急景窮冬愆陽為沴天澤差候而弗作時令當寒而尚温顧惟長人莫遑寕處徧走羣祀交薦令芳緬瞻故墟黙致精禱以公生而利澤天下殁而血食此邦必能顯如在之靈動至誠之感曽未經于累日果獲應于其雱千里王畿畢流于滋液百嘉生物咸逹于枯荄冥況如斯誠心敢怠是用躬率僚吏潔滌牲牢咸造閟宮祗陳奠斚少通精意用答神休尚期嗣嵗之間更頼隂功之助冀風雨之時若俾粢盛之畢登則夫賢傑之威靈亘古而不泯吏民之祈報以時而益䖍豈不偉哉祈雪嵗云暮矣時宜固隂而天澤未臻冬温為沴地爽膏潤民虞熯災封圻之間神靈斯主是用祗祓殽醴恭陳懇誠兾隂隲之下通格至和而來應使同雲之瑞邑自府以皆流則潔粢之心吏與民而敢怠至誠之望神其鑒茲謝雪昨以候戒迎冬時愆膏澤爰陳嘉薦致禱嚴祠曽未浹旬果獲冥應其雱之瑞巳洽于農疇休證之和抑由于神造敢具芬馨之禮少陳報賽之勤兾與齊民共䝉隂隲祭喬太尉廟祈雪向以渉冬愆亢編户愁嗟不遑寕居是有齋禱今兹時雪猶及天正萌甲稍滋均種不爽敢具嘉薦聿恭誠報䖍佇丕應嗣滂甘澤兾獲豐楙以康兆民昭事之勤敢懈常禮祭諸廟祈晴封圻之境綿數百里生齒且億仰于嘉生今兹嵗成水潦洊降菽粟被野稔而未穫田萊既汙種將弗入而隂曀彌月淫霖數來天灾之行實自人召幽有神化主宰其間夫政事失時咎由守吏粢盛不告職在有司編户何辜反罹于害長人無狀當被其責敢用䟽瀹祗薦懇誠惟神聰直為靈惨舒是任宜恤羣望收霽層隂使收登不害于有秋播殖無妨于嗣嵗豐和期報祲沴畢銷民獲阜安繄乃有神之賜又雨之霖淫二麥垂害必有所以戾隂陽乎今天子聖神恵慈以䖍天命以仁下民宜無是得也傳稱宋大水公曰孤實不肅天降之災今刺史古諸侯也千里䝉病咎将誰執潁之人荐饑者累嵗祭祀不豐禮節不舉此即開霽尚大有年倘刑罰鮮中實歸守吏神其鑒之祭張公龍王廟祈雪祭于張公龍王之神伏以應龍之徳神化無方静而淵潜則其用莫見動而天飛則其利尤博故大易之所賛三聖之所述其至徳盛美豈虚也哉潁之近境地有靈泉神物所蟠廟貌斯在風俗向信州邑報祈嵗無饑㓙實頼神貺今亢陽為沴雨雪不時嘉種將枯民用咨怨某受天子命作吏于兹惟民疾苦之是憂惟時災𤯝之是恤所以夙夜惶懼將祈于神案俗舊儀挹彼源液惟神昔嘗應化于是邦今則血食于一境必能奮起利用隂運化工驅風召雲灑潤流澤使千里浹洽五稼滋茂時格和平人叶康靖非獨守吏䝉其福釐抑所以延神休于無窮豈不偉歟祭張公龍王廟謝雪近以冬暘為厲農畆愆澤徧走羣祀未獲嘉應粤瞻淮壖盖有龍穴嘗顯異跡奠此一方爰徇民心遵用祠法靈泉甫曁隂雲遂興雨雪其滂逺近告足恭惟龍徳潛用利見莫測豈守吏虚薄所能感動因荐肴醳昭報神休兾無後艱以永賜貺祭諸廟謝雨向以自秋渉冬旱氣為虐並走羣望嘉應猶虚所以夙夜祗懼不遑寕處念人事之未盡不敢歸之于天時恐誠意之未孚不敢慢之于祈禱果蒙神鑒爰降甘澤田疇稍蘇播種漸入廼㳙吉日用荐嘉牲昭報厚賜以光靈德尚兾滂沛之惠無為後艱登成之祥亦兾冥助祭張公龍王廟謝雨向以常暘寖諐歴時不雨農疇罔闢播種後期雖徧請于近祠尚有遲于嘉應俯因衆欲單竭至誠顧瞻靈湫實惟龍宅挹兹泉液置彼淨方罄夙夜以致䖍迨浹旬而非懈隂雲甫集甘澤沛然長人之心少獲寕處千里之廣頗遂膏蘇因荐醑肴昭報休惠光令名于不朽兾丕祐于無窮春祈嶽廟惟帝作鎮岱宗奠居震位眷言兹土夙奉嚴祠仰慿威神大庇生聚春陽戒序精意告䖍式竚善祥普安氓俗俾嵗時之有獲庻瘥癘之潜銷遵奉鴻休益䖍大報春賽諸廟伏以壤地千里畫為封疆必有神鑒隂為主宰惟是春秋嵗時祈報之事載于禮式守臣奉詔豈敢怠常惟神歆此馨香賜以冥祐使嵗時無水旱之沴疾疫之灾繄乃有神之貺也秋賽諸廟伏以州壤千里山川之神禮有常祀為守土者當奉事焉夫神者惟民是依民者惟神是庇今嵗事登稔時無凶災實由神之賜潔粢豐盛薦享不匱亦為民而報也聰直之靈庶㡬其聽之介以景福使無後艱實守吏之幸矣祭勾芒惟神體配乾坤功施先稼條風啟發脉土震渝俶載有期早晩宜示庶禳疵𤯝將獲豐登祭土牛爰出土牛示農早晩因兹肇序恭薦令芳教民有初抑用敦本神其昭監佑以善祥災沴不生蠶稼登茂敢忘毖祀用答純禧又條風解凍陽律兹始土牛著象以示農耕惟神協輔帝功發育生類用是昭荐黙祈純祐宵雪屡降壠苖既滋庻蒙善祥克遂豐衍民食無害蕃禧所臨敢忘禋祀祗答靈貺祭魏武帝帝肇興王業大庇生人血食此邦威靈如在式臨春序䖍奉祀儀冀錫繁禧垂祐羣品民所仰止神其格思祭窮后神官有世功廟食此土方春發育潔祀神靈䖍奉國章載陳牢醴冀蒙丕祐普及黎元以時降康慰民望嵗報功之典吏職敢忘祭城隍神奠守封疆實司水土惟城郭溝池之固頼聰明正直之依式届仲春聿陳嚴祀冀曲垂于靈貺期永庇于民居祭牛龍神以坤順之體協乾剛之靈瞻彼城隅奉兹廟貌仲春戒序薄祭致䖍冀霈澤之時行慰庶民之望嵗祭五龍神四靈之長五方是司肇興風雲繁育稼穡適當春仲用展祭儀冀時澤之不愆俾嵗功而有獲祭土地神施生庶品大庇羣倫式瞻靈祀近奠公宇仲春戒序薄具告䖍敢祈及物之功曲降順時之祐祭天王神佐命上穹奠居北落䕶連營之勝氣夙仰威靈鎮堅壁之嚴闉式遵䖍奉仲春届序薄具致詞敢冀神聰洊降時祉蘇魏公文集巻七十一
