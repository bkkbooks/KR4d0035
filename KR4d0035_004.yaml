body:
  text: 蘇魏公文集巻四宋蘇頌撰古詩次韻蔣穎叔金部遊介亭望湖山二十四韻我昨來餘杭孟陬值杓建春色正融怡皇華紆睠眄言此佳山水巧麗極怪變有如畫屏風羅列圍四面城南古浮圖又為一郡冠聯驅松徑中信步蒼崖畔莓苔粘履屐虬枝拂簪弁縱覽識高深顧慕増詫嘆心迷真賞竒意覺旅遊倦物色雖難窮指注亦粗遍樓臺鬱相望無異挂盤線向非適幽遐何由盡聞見惟昔吳越君塔廟務華煥依山鐫大像疊石累高岸經構無已時貲費豈復筭較其輿地中佛寺占過半榮華一朝盡金石空殘片欵識刻猶存排衙行不亂虛亭復増修郡府餘壯觀故人栢臺彦早嵗歴監殿自從交臂來幾回傷聚散聲光日以高使節復頻換江湖偶追陪旬浹停車傳更有山林期兹焉適予願次韻蘇子瞻學士臘日遊西湖臘日不飲獨遊湖如此清尚他人無唱酬佳句如連珠况復同好相應呼君嘗聽事嗟罪孥雖在樂國猶寡娛是社稷臣魯顓㬰直道自任心不紆最愛靈山之僧廬彼二惠者清名孤案上梵夾床龍鬚爐銷都梁饌伊蒲潔行自欲敦薄夫長吟擁褐忘昕晡坐客不設氊氍毹對鏡如看方輿圖君懷經濟才有餘名聲妖孽懲顔蘧且來山林尋遁逋更玩四營兼參摹陳和叔内翰得莊生觀魚圖於濠梁出以相示且邀作詩以紀其事公堂四合臨中衢翰林壁挂觀魚圖傳之近自濠梁客云是䝉邑先生居先生昔仕楚園吏傲世不蘄卿大夫逍遥淮上任造適高岸偶見羣鯈魚清波出遊正容與潭底傅沫喣以濡悠然餌綸不可及誰知此樂真天娛惠施好辯發閎論謂彼固異若與吾至人㝠觀盡物理豈以形質論精粗稟生大塊厥類衆合則一理散萬殊淵潛陸走各自適天機内發寧拘拘鳶飛戾天獸易藪螣蛇游霧龜曳塗味色誰能辨帶鹿足頸烏用嗟蚿鳬蜄筐信美害愛馬鐘鼔雖樂愁鶢鶋青寧久竹代生變螽蟲風化相鳴呼方游溟海大空外坎井詎能談尾閭若知飛息分皆足圖南未必勝搶榆人生均是受形氣好惡歡養同一區死生壽夭亦大矣自本而視奚有無方當在夢則栩栩及其既覺還蘧蘧入榮軒冕不累性獨往丘壑非為愚不求刻意不徇利孰是隱几孰據梧惟能應變不囿物天籟自與人心俱一從郢匠喪其質狂言空見傳于書當時陳迹復何在客有過者猶踟蹰先當朝士題咏處不見綦履空遺墟畫工智巧良可尚景物縱異能傳模古今變態盡彷彿旦暮烟雲隨巻舒遂令都邑繁㑹地坐見淮山千里餘泛觀既已忘物我企想豈直思𤣥虛惟公雅尚每耽玩持示同好良勤劬自憐衰老喜求舊况荷明照均友于朝陪玉堂暫晤語暮入蓽門還宴如欣然共樂濠上趣相忘正在于江湖次韻蔣穎叔同遊南屏見惠長篇青山橫莽蒼萬石出南麓古刹表耆闍高聲聳羣玉居惟擇岡巒近靡數松竹郡郭路非遥遊人舂不宿陟巘極躋攀循崖勞傴伏架筒引流泉跨嶺構重屋講座據妙峯禪堂對枯木幽尋難屢期將往誰能獨偶逢霜臺客暫駐驄馬足聮步訪叢林終朝走郊牧相期方外遊頓忘河上曲夷路喜君騰高閣慙予束更聽名理言俯愜中心欲况已證真常詎止齊寵辱願言挹清風可用警浮俗次韻蔣穎叔同遊超化院賢良才識明御史風望清命駕千里至穎叔自毗陵特來杭高談一座驚舊故偶獲道離憂自兹平朅來湖上寺共語堂西楹念昔一交臂幾年兩摇旌契闊信靡定邂逅欣偕行日薄聊頓轡興來再飛觥霜林隕丹葉泉坻結新冰湖月金炯炯竹風玉玲玲峯巒對三山樓殿如九成南州足竒麗此地尤兼并因君發題詠足使増嘉聲次韻三弟學士題七寶英師壁巖居得幽勝俗累無憂傷占彼鳳山腋建兹法雲堂宵眠一氊蒲晝食幾稻粱浄衆集善緣勇猛能自强瑞相嚴中楹梵夾羅四旁軒窗據蒼崖松竹圍重岡不雜人世喧更覺禪味長我嘗命賓友間或攜肴觴中休憩丈室逺覽登上方念昔保城塹屹然壯金湯列刹以百數息民殄千殃爰居盡樂土利用無缺斨遂使吳㑹俗長為禮義鄉何獨竺乾域寶山亦清凉與䝉城知縣陳著作同賦吐綬鳥羽毛之美其類衆雉曰吐綬世尤重靈姿異稟來何方有客攜持自咸雍朱籠馴習繡墪調珍貴不與常禽共庭前愛玩不能已欲買未有千金俸一座嘉賓共詫誇留連為倒春醪瓮送將題目與詩人要待清才如屈宋斑斑赤質鬭花紋瓅瓅明珠絡衣縫暖風晴日正閒暇綺翼丹趺時􅀢鬆垂胡兩組錦舒張約髪雙笄玉浮動倐忽披開疊勝文䝉茸亂綰青絲綜初疑瑞草銜鶻啄又訝氂纓彯馬鞚行縢赤芾交脛足羽服袿衣曳蜺蝀漢官綬䓞何須染鄭公書帶徒勞種引頸纔盈尺寸間鏤彩盤絛無缺空未容俯近復卷收頃刻無由發清哢向人顧盼雖無言奮臆猶如將告控有生之樂貴得所所樂山林殊市鬨斥鷃飛翔本蓬蒿鷾鴯社稷存梁棟不慕爰居享鐘鼓要逐鳬鷖唼菰葑臨流照影刷羽翰朝飛求偶隨羣從十步一啄百步飲烏用樊中久羈􅀈主人提挈誠厚恩豈若郊原使閒縱我聞章服以旌禮物有等威須折衷鞶囊厲帶最光華寵錫或招三褫訟惟兹異類亦何知被服文章安所用得非造化育羣倫美惡短長皆適中凡物有用固為災矯性傷生尤可痛介特一死古士摯得時三嗅子路其晉室文裘或遭焚羽山夏翟先修貢解顔亦取如臯獲離罦巳入王詩諷旌旄甚盛見楚人樂綴有數聞衆仲嗟嗟才用既若斯竄伏何由脱羅總今雖窘束苦籠檻猶勝烹燖充調供徘徊且逐稻粱肥莫厭庭除資好弄方今太平物遂性異獸竒禽罷供奉庶民咸樂萃靈臺上苑虚開發雲夢西雝既已翔振鷺阿閣終當集靈鳳佇見觚稜神爵棲重歌蜀使碧雞頌惟爾文華固異常效祥薦祉宜飛羾近郊藪牧好遊遨應須一借扶摇送次韻陳䝉城金風堂射飲南都綠蟻封初拆西圃芳條換新碧賓僚相遇惜餘春樽俎留連因促席百夫决拾看和容何用娛賓循飲格前者新詩嚴武事幾日毬場較鋒鏑幕中賴有從事賢抱器逢時隼當射聊從把酒發笑談豈獨鳴弦觀凖的分明争計筭多少舉令都忘歌節拍䝉邑大夫富才藝早擅詞林名藉藉昨來州序偶淹留幸接話言踰宿昔行籌不必苦辭觴得雋况曽先射澤多慙病守鮮歡悰出口無竒但喑啞貪榮竊祿未能歸每聽春禽愁杜魄今朝何似强開顔為喜尊前有嘉客和蔣穎叔亳州矮檜檜生本修直此種特殊異高不盈尋丈廣乃遍堦砌短幹自堅强附枝交蔭翳森然葆羽欹隱若虬龍墜不知何代有木老色彌翠嘗聞古仙者應化在兹地手植有遺跡深根幾千嵗神靈應䕶持道宫存欵識自此物色繁因為圃人利封殖雖地宜屈蟠由巧智以彼凌雲姿還同蔽牛類拳曲如能壽輪囷不為器誰云矯生質終亦遺世累詩伯一留題禪叢重増貴豈若榴檉然空傳草木記暇日遊逍遥臺覩南華塑像獨置一榻旁無侍衛前無香火對之歆然起懐古之思因抒長句一千四百字題於臺上憶昔初讀南華篇但愛閎辨如川源沈酣漸得見真理馳騖造化遊胚渾潛心四紀不知勌閒日講解時尋温其言無端極放肆大抵順物尤連犿芳煩反六經髙深如韞櫝百氏蔽偏迷蹢閽伯陽語道最淵邃中士尚或疑亡存竺乾權實信廣大妙用不出我藩垣偉兹三篇粹精奥推本一化開幽􅀈反覆孝慈去願譽胎育仁義除詐諼情類相親自才德踶跂不立存樸惇寓言本為大方設弔音的詭難與常人論祖尚𤣥虚滅理學乖背宗㫖由後昆遂矜放曠為任達由此道真流亡反平聲自非通識造閎逺安能超悟還淳元大鈞斡旋本何有相禪以種紛無垠載其形聲直喑醷感彼氣類相嬗媛死生之辨在旦夜夢覺之異分形䰟神竒臭腐㸦美惡蜩甲蛇蛻奚代迍卵胎無以易生種風化自爾成蟲蜫出入于機冺無際始卒若環焉可捫芒乎萬致始同體明以一指彌滋繁異則肝膽為楚越同則蕭竹猶枅圈真宰難以眹迹見靈臺莫由形器援何者非彼何者是孰為親愛孰為怨平六鑿相攘有利害兩溢類妄成鬭諠至細不必陋蠻觸倪大惡用驚鵬鯤天機所動體各適足行豈異唾者噴外物既重内固拙瓦注則巧金乃㱪物之儻來莫禦止心所希跂俄屯睯音昏有疾無用亢豚免其迹已陳芻狗燔全生難恃社之櫟移是不定臘者䐊音昆逢真令尹魄栩栩恍醜全人脰肩肩胡恩反因知禍福相倚伏故于得失無螴蜳上音陳下音惇惟能膽闋以生白是乃孰耰而厭飱道非處服無不在人以德性為之原有情有信非可致一滿一虛常不騰九年大妙得之野參寥疑始傳諸孫豨韋以之挈天地堪坯以之襲崐崘明此南鄉唐堯帝明此處下素王尊衆人逐物但役役一曲自守常暖暖音喧修躬明汚躬則殆飾智矜愚智彌惛單豹治裏外逢害張毅修襮中成殟退不為賓潁陽樂盪而傷性窽水踆音存二子高節去孤竹三閭獨清浮湘沅棄世終亦餒薇蕨行吟徒自悲蘭蓀彼為禮義矯末俗猶以佩玉趨櫜鞬將明是非崇世論何異狐白資紲袢禮義治則忠信薄是非著則名實翻尚賢貴德下滋偽信賞明罰民尤寃宋榮猶然在譏世其于毁譽方汶汶音門列子待風乃輕舉豈若御辯常掀掀至人達觀齊物我直往上古惟愚芚音屯内通耳目外心智旁挾日月超乾坤安時處順任天倪音詣抱德煬和遺世喧悗乎忘言喙鳴合窅爾自静鯢桓潘音藩養生之主悟文惠治氣其勇過孟賁形形不形睨初始物物不物隣羲軒得計棄智任魚蟻勞形怵心嗟虎猿呼我牛馬誰毁譽夢為魚鳥還潛飜其窮不屑涸轍鮒其高乃况南方鵷方其息死樂枯髑亦既恬生慕孤豚嘗聞藏言乃笑杖既見偃室聊歌盆畏龍不羨宋人乘覩鵲自感雕陵樊廣莫將植擁腫木江湖可浮瓠落樽不將不迎随物化一龍一蛇更蟄蜿以道泛觀未切著得時而行或曲巻皇王上下惟變適周魯舟車殊運奔顧指不為天下化排進靡使人心僨音奔人于應問見影響物被生殺通淒煖音喧賞罰九變得其序澤流萬世非吾恩相䪡乃合儒與墨小辨豈數衍與髠河伯不逢海若語豈知至道無窮門雲將未得鴻䝉問烏覩生物復其根神而化之不蘁立未之盡者能誨啍音惇長波所盪滿今古異代相應猶篪塤喟予所稟實樗散作器自愧非璵璠逢辰偶得仕通籍徼倖當與游西崑材力未足勝螽股取舍徒思擇熊蹯行年六十粗知化藏經十二無能繙平時有志在寥廓遇事無意從緡昏攖而後寧亘嵗月老之將至忘寒暄盱盱未免囿於物擾擾不異風中幡昨從京輦絓丹筆復得淮壤乘朱轓偶逢樂嵗少休息歴覽士俗因周爰提封乃是昔仁里訪古時復登平邍城中蝶巷接蓬頭郊外魚臺連漆園悠然清風隔千載獨有遺像當高墦山川世異改城郭嵗時人罕羞蘋蘩先生縣解出無有後世景仰空擎拳大布緳履生弗飾豈蘄朽壤衣如璊烏鳶螻蟻死不避安用丘墟祀有膰虛堂雖異生存處操趣猶令貪薄敦我懷方外想音采坐視劵内敺㝠煩曳塗竊企濮水釣投犗更思東海蹲子葵雖未得其道意而固願遊其藩聖人之書議者扁妙斵之質良在懮漢書音義郢作懮音温空遺糟魄寧咀味縱有履跡焉投跟何當一發雞瓮覆因而更焚駒項轅天光内照宇自泰人益不累中無悶云誰嗣響可晤語至理竟亦歸無言蘇魏公文集巻四
