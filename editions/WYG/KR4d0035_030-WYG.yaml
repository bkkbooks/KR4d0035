body:
  text: 蘇魏公文集巻三十宋蘇頌撰外制觀文殿學士兵部尚書知青州歐陽修可檢校太保充宣徽南院使判太原府勅國家規恢裔邊並建帥領惟河汾之一道搤獯狁之二垂爰咨衮路之賢往付并門之筦仍遷近府用壮奥藩以爾具官某道徳文章為時矜式謀猷忠亮預政累朝自獲解于台司已再更于郡寄委逺時柄爾雖樂于燕安尊任賢能朕豈忘于寤寐眷言大鹵方擇守臣俾從表海之邦就改近邊之鎭班通四貴所以褒寵于舊勲節制諸戎所以倚成于外閫惟爾同寅之徳體予注意之隆亟即新州毋辭逺畧可前户部尚書㕘知政事張方平可依前官充觀文殿學士知河南府兼西京留守司勅三年之喪聖賢不可踰禮六職之任朝廷所以仰成粤予鼎飪之良近闋苴麻之制甫更中月當復通規就委居留之權固無中外之間具官某藴天人相與之學挺金石不移之心被遇累朝極清崇于禁複逮予初政遂擢賛于鈞衡適告訏謨俄嬰鉅創服衰去位乆深欒棘之情鑚燧變時已畢縞纎之祭矧任崇于體貎方渇佇于猷為姑還革履之朝仍錫玉符之寄殿塗秘職盖優異于老成洛宅中圻俾尹釐于王㑹是惟付畀之重式示眷毗之隆宜諒至懐往欽成命罙務同寅之守副兹注意之勤可翰林學士右諫議大夫知制誥王陶可依前官充侍讀學士知蔡州勅左右之臣内則參毗于國論屏翰之任外則綜輯于民經矧予禁複之賢屢啟偃藩之請特推寵數使遂宴安以爾具官某風節峻凝謀猷敏濟預兩朝之言責陪望苑之雋僚肆朕纂承間咨忠益典領臺閣嘉言日聞于前宣布中和惠問風傳于下入揔大計再登内庭方竚有為之圖俄聞移疾之告懇辭事柄祈析州符既重違于至誠姑為擇于便郡陪京而近莫如淮右之優進職而行遂易金華之秘爾其敷施寛政迎導粹和神明泰寧則何恙而不已邦國順否當乃心而不忘深體眷懷尚期來譽可翰林學士承㫖兼端明殿學士翰林侍讀學士給事中知制誥王珪可禮部侍郎勅惟我仁祖享國永年盛徳成功將傳于萬世備言廣記必藉于三長間咨博洽之材入預刋修之職筆削之載方覽奏篇之來感愴之餘良嘉善志之美以爾具官某文章髙第經濟閎才承密命于内庭屢聞忠益領諸儒于東觀甫就編研追書四紀之見聞大備一朝之典法言觀類例咸自裁成惟史氏之懋官有前書之舊比宗伯典禮天臺貳卿用旌善職之勤且慰述先之念欽兹寵渥體我眷懷可翰林學士守尚書禮部侍郎范鎭可守尚書户部侍郎勅夫廣記備言之書編年繋日之史古稱善志時謂難才矧乎仁祖之聖德神功一朝之文紀武律載述之任刋輯良勤既克成于信書宜顯褒于直筆以爾具官某識通器逺學富文髙内庭嘉獻納之謨東觀預編摩之選發凡起例有古良史之風積思潛精成我一王之法奏篇甫上懋賞宜優中臺常伯之聮左户地官之貳叙陞厥秩用奬爾勞往膺遷渥之華益竚猷為之美可尚書祠部員外郎充集賢校理陳繹可度支員外郎依舊充職勅具官某昔揚雄稱太史遷所記謂之實録然則實録之名盖取夫不虚美不隠惡而為言也今夫紀一朝之典法事有巨細辭有詳畧載述之際去取良艱必資衆才以禆闕漏以爾博學敏用乆次詞林往行前言多識古義命討論于史觀助刊約于信書發例惟精奏篇益善序進望郎之秩且甄載筆之勤茂對寵章無忘勉懋可昭宣使入内内侍省内侍副都知利州刺史充本州團練使張茂則可宣政使餘如故勅先帝之史朕不敢輕自丞相至于儒館之士預其職者更五六人焉可謂重矣而又擇親信之臣以闗掌世務所以欲其謹嚴而無廢闕也以爾具官某端良矜恪乆侍禁庭典領周旋備觀才致揔史闈之政令更嵗律之炎凉属其成書嘉乃勤事寵進使名之美用増近序之華往服恩章益宣忠藎可尚書刑部郎中充天章閣待制再任知渭州都總管經畧安撫使蔡挺可右諫議大夫依前充天章閣待制令再任勅朕以平凉之郊搤戎夏之要乃眷西顧每念謀帥之艱既得其人良思責任之乆就加顯命式壮塞垣以爾具官某時才敏明士論嘉美服朝之寵陟天臺禁閣者累年由陜而西更漕節將牙者三府矧自殿臨于藩隴益能控制于氐羌保鄣繕完士伍服習方倚保邊之重遽聞換郡之求雖諒乃誠尚難其代夫將帥戒乎數易夷狄畏乎宿名宜躐進于右坡俾重留于外閫爾其體國深意毋憚乆勤講邊善謀克終厥譽坐恢逺畧用副眷懷可屯田郎中張次立可都官郎中勅具官某六書之學世乆不傳文字舛偽通俗交錯非夫貫習于古𨽻詎能訂正于簡編以爾博學名聞潜郎嵗乆游心墳史之暇刻意蒼雅之餘典校鴻都既復中經之備體章言字學多沿鏤版而失眞刋而定之成篇來上嘉其積思寵以一官往惟欽哉膺兹顯命可未復舊官人都官員外郎董經臣可職方員外郎勅具官某或謂赦非公平之典然而在仕者或縁詿誤而寘于理非有寛宥則㢘良之士曷由而洗滌乎以爾向典方州縱逸有罪在法當黜度情非它属逄慶霈之恩固有原官之比復還舊秩仍列清郎毋以一眚之㣲而忽逺圖之效可屯田員外郎鄭顗可都官員外郎太常博士陳紘可屯田員外郎秘書丞彭慥可太常博士勅具官某士之通籍于朝而服職于外積累日乆且四期矣既克成于治效又能逭于過尤兹而不遷何用勸善以爾詞學中科選閥閱陞閨臺荐者稱其㢘勤有司上于課最咸應恩格宜有甄揚稍進一官之榮使有羣吏之勸體兹恩渥懋乃事功可金部員外郎沈扶可司勲員外郎虞部員外郎張宗道可比部員外郎勅閨臺之選昔重為郎閥閱之優法當遷秩属攸司之上課加在事之歴年用示恩褒具如令格以爾具官扶仕富吏資之敏任更使節之煩以爾具官宗道地承世胄之華職預計籌之佐咸有善状應于最條况乆陟于省闈宜遞陞于官次等功清列司計右曹嘉爾有勞使之進拜茂對疇庸之命益思任責之艱可屯田員外郎李景融等轉官勅具官某南宫為郎昔號清要太宰計吏法有黜陞嘉上課之應條宜甄能而進秩以爾士科擢秀朝㑹參華涖官聞敏給之稱布政協亷良之善省闈承務蚤踐于六聮恩典陟明復遷于一等服我甄褒之渥勉思忠藎之誠可秘書丞充三司勾當修造案公事孔嗣宗可太常博士餘如故勅具官某夫列朝閨之籍雖以次遷參計省之僚本由才選閱乃年資之乆嘉其治等之優所宜甄疇稍進班級以爾學緼充茂才資敏明試吏有勞知巳言状寘之大農之属亦既宿官陞以奉常之聮聊用旌伐欽承奬擢之命益念忠良之為可國子博士李及可虞部員外郎勅具官某仕宦至尚書郎者在古為要今雖不涖省事徒假名秩顧其品列猶為顯華以爾䇿名清時通籍閨著入奉朝請出為民官結課有司校勞累嵗擢進中臺之序兹為近路之榮祇服恩褒勉勤績用可守殿中丞姚稱可國子博士勅具官某國家校羣吏之勞有四載之比雖積日頗乆而辨材益精苟非顯庸不在遷比以爾仕列通籍職更治民幹敏有聞循㢘可任爰覽計書之上當陞班著之榮祇服恩華勉収治效可前權大名府推官蘇轍可西京留守推官勅具官某富文敏學早擢秀科大對危言繼膺清舉方講圖于才畫助寛析于計條遽有開陳願從補外復優參于賔幕且賛務于留都既遂爾私益思逺用可西京左藏庫副使髙遵裕可依舊西京左藏庫副使兼通事舍人勅具官某惟上閤賛司之職盖右列清要之塗非夫材稱顯聞不得兼領以爾勲門華緒内使宿名乆戍邊防克奮忠毅圖上方略嘗聞善謀守圄封疆方収逺績擢預典儀之秩用増武爵之榮益思盡規以答殊寵可皇城副使桑湜可西京左藏庫使勅具官某井絡之野畫為二川帥節撫臨毎擇近班之彦兵防督䕶參咨内使之良以爾素練機鈐累更事任提兵隴右已著能名易地劒南荐分優寄仍進京司之長用光蜀道之行體我推恩更思竭節可海州刺史充本州團練使王振可左千牛衛大將軍海州團練使勅内領諸衛外揔團兵視武爵以甚髙非勞臣而弗處將優舊望使得兼榮以爾具官某拳勇之謀早司禁旅公忠之守屢試邉防閔其年事之侵思有華階之寵陞之環列仍彼使權既遂處于安榮尚不忘於報稱可西京作坊使知忻州孫京可尚書虞部員外郎勅具官某士之懷材抱器惟所以見用於時然後功名可兾豈有文武之異哉爾向列朝閨荐者謂爾通知四夷故易以内使之名而付以邊兵之寄属時無事不克設施章言自陳願還故守郎官清要復以命爾治人循法皆爾所宜惟其盡規乃有成效可内殿承制王克昌可供備庫副使勅具官某守邊之吏以綏靜為功滿秩有勞寵褒何吝爾向由廷列往䕶蠻陬撫字之勤汔無曠累㢘平之守復逭過尤宜進秩于内司用甄能于逺效荷兹優典罙盡忠規可内殿崇班任雍可内殿承制勅具官某夫列職廷中秩視閨臺之貴提兵塞下任均師律之嚴皆右著之優遷非良才而靡稱以爾精剛之質乆事周行積累之勤亦應比最特遷承于朝制仍往䕶于師屯益思盡忠乃克任事可樞密院兵房主事李景先可吏房副承㫖勅具官某宥密之嚴地均公府丞史之任職專吏門雖曰次遷尤為遴擇以爾首公勤辦在事謹亷嘉積乆于勤勞當進聮于曹務益宜欽愼思對恩榮可東頭供奉官南永可内殿崇班勅具官某内殿之列秩有二等皆通籍于朝閨而𨽻名乎樞府由三班吏以次遷者校其年資亦已乆矣惟爾治效有應斯格擢陞近序所以甄勞罙堅瘁勤用稱恩奬東頭供奉官竇世隆可率府率致仕勅具官某七十致仕禮經之訓也爾為吏有年飭躬寡悔顧筋力而難強豈簪裳之可縈嘉其自陳宜有優寵陞以東儲之秩俾為居里之榮祇服恩私足慰遲暮可奏舉人前權知䕫州節度推官張擇言等改官勅具官某等九卿之属皆有丞佐視其閒要以為等差非得㢘良不在兹選以爾等或詞科之秀或世緒之華試吏有勞荐章交至宜各因于資籍俾並列于京司被兹寵擢之優益念公忠之報可奏舉人前杭州昌化縣令章蒙等改著作佐郎勅具官某在昔明世莫重親民之官肆我治朝爰開舉吏之法得人既效懋賞必行以爾術業甚修亷方自表乆從銓筦之調已試宰字之能累嵗有勞知已言状擢序蘭臺之秩漸階鸞黨之榮益愼持操乃副甄奬可前權雄州防禦推官張天占前天平軍節度推官知遂州遂寧縣事韓繹前權府州軍事判官張禧可並大理寺丞勅具官某等或决科從仕或延賞入官並有良吏之資外從諸侯之幕臺章言状銓筦條勞辦職者敏幹可稱字民者拊循有效用擢王官之列且丞刑寺之聮勉思後勤勿渝素守可試秘書省校書郎知海州海豐縣黄長裕可大理評事勅具官某瀕海之郡去朝廷逺甚而冦賊乗險剽掠使民不得寧居斯長人者之所共病也以爾為令于彼能勤厥官親格奸兇遂平宿黨擢升京寺之籍用勸才勞之臣往服優恩益圖後效可太子少師致仕趙槩奏男光禄寺丞元緒可大理寺丞親孫大理評事嗣眞可光禄寺丞勅具某官等大臣請老當推寵異之恩世嗣傳家爰錫顯揚之命以爾等蚤由門調並列京司属我耆英歸休里第特厚賞延之渥遞増禄秩之榮列卿之丞初仕為貴宜勉遵于緒業庻能保于慶宗可行太常寺奉禮郎席延年可行大理評事勅具官某仕者世禄所以承家官以賞延是亦近古復沿考陟之比間有次遷之榮循致華階由此始矣爾之資履既應于吏條國有彛章當陞于班等往承斯渥益念後勤可丁憂人前寜州司户㕘軍楊傳可特免持服充忠武軍節度推官同管勾鄜延路機宜文字勅具官某親喪之重情不可違王事之嚴禮有權奪爾為邊州掾以才畧聞遭憂免官倚廬行服宜起腰于墨絰且陞宷于賔筵往典軍書而賛帥畧毋堅爾恤當體在公可文林郎守南康軍都昌縣令裴士章等職官知縣勅具官某縣令之于民最親也一失其人則下有受敝自保任之法興而多以稱職聞者甄勞奬善其可廢乎惟爾之能實應兹選宜陞賔幕之秩再付邑章之榮爾其善撫元元克終厥問褒擢之典吾豈吝焉可徳妃苗氏奏遇南郊乞親侄習進士苗仲淵可將作監主簿勅某朕親祀郊丘布慶中外眷惟妃戚之族例有賞延之科而爾之諸姑職崇宫掖言爾有立祈寘仕階京籍起家勉思宦學可儒林郎前乾寧軍司理㕘軍孟英可試大理評事勅具官某爾從乆選調歴職掾曹齎閥天官之銓試吏丞相之府事稱勤辦法應次遷姑從事于奥藩典支計于外府宜収課最竚副甄揚可翰林傳寫待詔承務郎守少府監丞顔和可河中府榮河縣太寧廟令勅具官某居工技之列擅冩照之能執事有年服勞可紀因自陳于暮齒願退居于祠官既遂爾私宜勤厥守可右班殿直孔竧可洺州别駕致仕勅具官某爾為吏有勞擢陞仕籍效官寡過進列廷班年未至而告休力不能而知止宜遷州佐之秩使遂退居之安既適爾私是謂優渥可登仕郎守利州文學趙象可利州司馬勅具官某登名為吏坐法奪官向叙散曹適逄大霈稍遷典午之秩庸示棄瑕之恩可溪洞髙州四甲廵檢田守元男洪惟可銀酒監權充溪洞髙州四甲廵檢勅具官某介于邊裔服我聲明属乃父之云亡攬邉臣之列奏命爾襲職特示推恩美秩榮階並優于渥澤深溪重嶺就俾于邏循宜罄忠純用保寵禄可河北都轉運司空名攝助教五道勅漢法使民入粟縣官得以拜爵今爾以貨貲應募州郡得不推恩而奬勸之假秩一命俾為爾榮益思良心以對甄渥可磁州空名助教二道勅某朕閔民阻饑遣使賑恤且俾土豪之入粟用助縣官之振窮爾財雄州閭義服隣里來應募格願輸滯藏嘉其嚮勸之誠錫以甄旌之命尚安鄉校足為寵光可蘇魏公文集巻三十
