body:
  text: 蘇魏公文集巻四十三宋蘇頌撰表謝中太一宫使臣某言令月日進奏院遞到勅牒一道并尚書省劄子伏蒙聖恩特遣充中太一宫使許任便居住臣即時受命交割本州公事與監司權管勾訖見起發徃潤州居住者臣本以衰遲懇祈休退淵衷眷舊未忍遐遺琳館增員仍從遙領坐叨要職特免莅官遂獲安居皆為異禮臣某中謝伏念臣性稟中下生遭盛明荷四朝樂育之恩歴三省訏謨之地非才輔政不能有所建明失職弗誅尚且容于尸素殿廬通籍淮海出藩顧筋力之已疲視章印而有愧冒兹名器負乗每懼于盜招念彼禽魚棲宿猶知于日暮殫誠牘奏干聽黈聰敢期從欲之仁上軫恤功之念明緍降命中㫖推慈假使職于元都許家居于故里官尊祿厚頓增桑梓之輝光迹放心閒實便丘園之頥養此蓋伏遇皇帝陛下乾坤博施坯冶一陶生物必因其材使人各得其所曲矜蕞耄久預禁嚴未遽絶于班資俾遂諧于燕息始終弗替􅏝薄難勝病木婆娑雖殆忘于生意老馬躑躅猶結戀于君軒欲報生成未知死所倘肺肝之可鏤在溝壑以無忘瞻望宸庭但深洟涕伏限所居在逺不獲躬詣朝闕臣無任謝郊禮加恩改封趙郡公臣某言伏蒙聖恩賜臣官告一道改封趙郡開國公加食邑七百戸食實封三百戸仍令臣孫男承奉郎處厚齎賜者祭則受福頒大號于黎元賞不失勞推茂恩于庶位曲記近司之舊猥加異數之隆案輿地而擇名邦徹土田而與多邑循揆無功之寵愈驚非據之危臣某中謝伏念臣橈棟匪材西嵫餘景夤縁資歴久玷職于殿廬荏苒年華獲備員于道館當官無閥閱之勞退老遂鄉閭之願一昨五室親祠百工率職肅雍顯相既不預三吏掃除之勤夙夜駿奔又不在諸侯来助之列既均釐于中外輒比數于等差再膺開國之榮更益爰田之食仍令孫息齎賜命書即郊次以奉迎集私門之榮觀屬巳頒于渙汗難固避于走牆捧對芝泥若負芒刺此蓋伏遇皇帝陛下繼天紹統灑澤為春遵六聖之宏規躬三年之盛禮宗祀而配上帝致聖孝以並行大賚而富善人布神休而悉遍自顧曠僚之久難勝拜胙之恩雖燕閒方就于士鄉無階報稱而䰟夢常游于帝所圖謝生成瞻傃九門姑懐萬感臣無任再乞致仕臣某言臣聞禽魚微物猶知棲宿之安韋布諸生不忘殆辱之愧矧在士鄉之老既踰時制之期謝事未俞厚顔罔措臣某中謝伏念臣稟資不厚徼幸實多荷四朝拔擢之恩乏一善著聞之事姑縁舊弼久塵冒于近班洊領真祠復遷延于再稔處燕閒而竊禄致盈滿以生災初罹手足之痾寖苦膏肓之病秩滿而造朝有格力綿而跬步難前日薄虞淵視光隂而已逼心存魏闕役䰟夢以徒勞若猶綰于印章懼遂填于溝壑况臣頻年告老猶此饕榮年過六紀之餘章凡十數而上朝廷容養幾同游隋之人州里觀瞻寧免婆娑之誚輒陳情之終始覬得請以歸休伏望皇帝陛下恢天地覆載之仁廣日月照臨之惠憫衰遲之暮景貸尸素之往愆賜以殘骸從其所欲倘能起無妄之疾游息于田廬庶幾為太平之民謳歌于聖域誠心所迫邦憲寧逃欲乞聖慈指揮檢㑹臣前後奏章特許守本官致仕臣無任謝致仕表臣某言伏奉告命蒙恩特授臣依前觀文殿大學士太子少師致仕仍差臣男通直郎詒齎官告就賜者結髮立朝歴載將周于五紀解巾就第拜官叨列于三孤士夫進退之優君父保全之惠寵踰所望感極難名臣某中謝伏念臣朽質薄材華顛黧貌早嘗更于器使老猶冒于寵光福過災生幾致膏肓之疾鐘鳴漏盡未知骸骨之歸奏封屢瀆于䆳旒俞音特加于命數仍循舊相之比躐遷儲秩之榮而臣久任聖辰驟違班著念流波之出浦嗚咽難前顧疲馬之戀軒嘶鳴未已雖獲傳家之幸豈忘存闕之誠恩重命輕莫稱丘園之賁日暮途遠無階象魏之朝回望雲天徒深涕淚此蓋伏遇皇帝陛下陶鈞萬彚化育羣才俯矜菅蒯之微嘗與鼎槐之末全其晩節賜以餘齡非惟示覆載之不私抑亦見生成之曲盡顧臣之分徼幸巳多尚冀安居養頥衰疾倘未填于溝壑得雜處於芻蕘謝轉太子太保臣某言伏奉制命蒙恩特授臣太子太保依前觀文殿大學士致仕加食邑四百戸食實封一百戸仍差臣男通直郎攜齎告身前来就賜臣已于今月日于潤州朝京門外望闕祇受訖者芝泥温詔初降命于九重蒲栁殘骸遂通班于一品自慚悴陋莫副甄陶事出非常感深載抃臣某中謝伏念臣才非敏達仕遘休明荷樂育于五朝嘗叨陪于三吏與聞國政固乏佐時之謨退老丘園猶霑馭富之祿熈辰累洽興運有開帝出震以乗時照臨溥暨言如綸而求舊奨擢併加進儲保之崇資衍户封之多邑仍令賤息齎賜賛書病悴有年久棄人間之事寵靈驟及實為望外之榮姑慶暮塗親逢亨㑹此蓋伏遇皇帝陛下宅中圖大發政施仁推布徳行惠之文靡謝事就閒之隔念此故老早陳力于周行霈然徳音特加優于異數臣敢不濯冠聽命捨杖拜恩誦深厚之訓辭仰欽天造詠光華之復旦竊效壤歌雖畢餘生莫酬洪造臣無任遺表臣某言臣聞稟質太和生有涯而必盡戀恩聖代死可忍而猶言苟延頃刻之期少布平生之懇臣某中謝伏念臣性識庸陋生長遭逢仁宗召寘書林英廟擢為臺省肆神考維新于大政而微臣獲覲于清光便荷眷知躐登侍從臣以口耳無用之學驟蒙睿聖非次之知思自激昂少圖報稱竟以議詔除之非是遂止罷書命之要司三巳三遷未嘗以冗外而擯棄再召再用率皆由主上之記憐入備史官進居京尹尋復以片言而坐累俄見謂直道以自明與修進于六官仍典司于四選遽罹家難曲軫淵衷使璫洊至于里門賻恤特殊于等列未畢苴麻之制忽悲弓劒之遺沐二聖之深慈矜累朝之舊物中臺内制徊翔敢歎于積薪左轄三台忝竊但虞于覆餗寸長靡効微罪以行蓋引年辭位者歴八九朞露奏陳誠者章數十上始獲歸于印紱久退處于丘園仰聞龍徳之升大慰海隅之望至仁溥博上下與天地同和湛恩涵濡人物暨鳥獸咸若豈圖暮景復遘盛明鼓缶酣歌方逐畋漁之樂視隂愒日已嗟鐘漏之催且鳥将死而其鳴哀天雖髙而其聴邇矧懐欲報之徳敢愛垂絶之音雖無補于萬分僅或能于一得伏願皇帝陛下法堯舜之修已過中髙之歴年進有徳以尊朝廷示敦樸以先天下延讜直則下情無壅省營繕則民力不勞毋邇宵人以防私謁之害政無作奇巧以見所寶之惟賢若乃當太平持盈之時思既濟豫防之患志不期于逸豫慮常懼于幾微不忘来事之師以永無疆之譽則臣雖闔棺長夜諫弗假于陳屍瞑目九泉報猶當于結草精誠徒切惛憒不倫臣無任謝厯日表臣某言今月日進奏院遞到宣勅一道伏蒙聖慈賜臣某年厯日一巻者聖人之治厯數恭授以時下國之荷頒宣奏行有職仰乾文而備在戴君賜以無忘臣某中謝伏惟尊號皇帝陛下保極奉元愛民恤物功越農軒之表慮窮象數之微前飭日卿豫推天運校諸家之疎密審一嵗之權輿氣朔推移躔離稽合杓攜魁枕固無辰次之差日永宵中大正春秋之序屬新書之甫就欲庶俗之周知率循舊章頒布列郡臣任叨守土職在訓民詳觀細札之文斯蓋先天之藴敢不朝夕從事嵗時省功勸耕于土起之辰趣務於火見之後所期遵奉無失經常臣無任又臣某言欽厯授時新四方之耳目觀文察變記萬世之章程覩細札之下頒俾列藩之寅奉仰承優渥退積兢榮臣某中謝伏惟皇帝陛下憲天聰明稽古謨典正一元而端本審六物以題期上承軒頊之規俯鑒羲和之職諸家之算皆課于清臺先甲之期率循于治象隨閏餘而消長順斗建以盈虚中朔正而嵗成隂陽調而景至導五行之和氣徧育嘉生視七宿之中星肇隆丕律臣任叨守土職在訓民覿乾宰以敷文繹辰猷而布度将使出作入息皆不緩于農時夕思晝行冀㕘修于吏事所期遵用無失經常臣無任又臣某言清臺運算将觀嗣嵗之宜列郡承流猥被新書之賜祇戴上恩之厚俯増逺守之光伏惟皇帝陛下體乾綱之粹精總治典之纎悉奉若天道恭授人時南面視四星之中靡差昏旦彞倫協五紀之叙備著綱條日官方上于奏篇乙夜親紆于宸覽鉤校疎密脗合經常㑹三統於一元成百年之精嵗詔頒近列下逮方州臣幸預典藩例叨寵錫竊尋時訓之紀每切農時之先夏后小正尚記昆蟲之細呂韋月令兼推躔次之行皆所以求隂陽之大中示耕桑之要務洪惟聖典曲盡天時掩七厯之精微髙百王之制作當官據此自識刑賞之後先編户見之咸知發斂之早晩臣敢不修明所職謹視斯文露冕行春益勤勸課之業坐曹閱日不渝寒暑之期豈止閟藏以為榮遇臣無任又臣某言昔聖人處璣衡而欽天故日月星辰以之序象金火而治厯故氣物分數得其平蓋推步之術既精則制作之文乃定有大創革屬我聖明伏惟皇帝陛下攬商周之質文躬舜禹之厯數損益百世旦暮千齡前勅日卿鉤校諸家之疎密仰觀乾度稽㕘三極之短長索隠鈎深改差用驗盈朒于是以象見中朔不能以候移克固信書昭示列辟乃眷官封之吏使知告朔之頒一札十行荷甄紆于訓令九章五紀使盡識于嵗年臣忝在長人竊榮拜賜朝夕從事惟思務穡而勸功寒暑不渝益勵首公而盡節臣無任又臣某言仰觀天象豫考日星之行恭授人時使知氣候之至詔頒列郡惠浹羣生臣某中謝伏以王者稽古以奉天順寒暑隂陽之運百姓厚生而利用在農桑衣食之原數既合于珠躔氣遂均于玉燭伏惟皇帝陛下徳侔覆載智察幽微合三統以正一元撫五辰而凝庶績清臺運算摠七厯以裁成方底封函遍九州而誕布臣任叨守土職在訓民求庶政之所先案新書而盡在奉承寶典知協紀于萬年咸與編氓趣成功于三務臣無任乞賜六典臣某言伏以先唐著六官之典是為考古之書荀况稱三代之隆不貳後王之法恭惟皇帝陛下稽若上世允釐庶工謂開元之職儀有成周之體範因命刋讎于簡册又将宣布于方来凡預通閨均蒙寵錫伏念臣夙遭際㑹獲齒大儒方朝廷更正于官名荷制詔對遷于階品聖明作述親逢千載之一時臺閣規橅願識有司之大要敢縁等比輒冒守藏所是新印唐六典欲望聖慈特許依例宣賜臣一部庶得披覽前載習熟舊聞時亮天工倘獲觀于衆職之治日恪位著庶自効于一官之勤臣無任謝賜六典臣某言奏牘之求恩寛罪戮册書之副詔許匪頒捧縹袠以生榮刻丹衷而萃感臣某中謝臣聞在昔建官之制沿革靡常開元著令之初典司尤備辨其秩序具有綱條事名雖見于當時莫遑遍舉春秋以竢于後聖兹用鑒觀恭惟皇帝陛下躬親萬務之微損益百王之際謂成周之治典可舉而行以有唐之職儀最得其要時書不布後學罕知命鴻都之直官定蘭臺之善本模傳鏤版盡刋魚魯之訛宣布在廷使識雲龍之紀伏念臣迂儒曲藝文館充員考載籍之古陳嘗聞粗畧顧朝廷之體要莫究源流幸逢至治之期新下正名之格文階貴品荷假寵以優遷御府新書輒抗章而自請忽拜緹囊之賜併増經槴之光啓發篇章雖曰一朝之制作講求義類是皆歴代之故常足以備訪對于清閒資討論於聖治豈其闇陋得以探詳讀三五之書自同倚相識太平之跡竊慕劉歆矧與綴于官聨固當勤于事守仰酬隆施誓畢微生臣無任謝賜常平免役勅令臣某言今月日准詳定一司勅令所公文奉朝旨伏蒙聖慈賜臣紹聖常平免役勅令一部者察俗五書總利害康平之目任民九職盡轉移生養之宜坦然帝制之明載在官成之法徧頒列郡下逮具僚臣某中謝伏惟皇帝陛下祇遹先猷監觀治本謂法必生於衆適而令欲順于人心爰詔近司講修前訓視嵗年之上下發斂以時校財力之重輕有無相濟著綱條于畫一均多寡于大中有司遵承既簡允而易守編户賦役悉均安而不勞炳焉垂世之謨是謂不刋之典豈期閒迹與拜恩書重念臣早以芻愚嘗聞政論暨兹退老久廢吏文恭啓籖幐但疲精于編摘秘藏巾槴冀傳寶于昆雲仰戴宸慈竊深感涕臣無任蘇魏公文集巻四十三
