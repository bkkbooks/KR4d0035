body:
  text: 蘇魏公文集巻五十宋蘇頌撰啟濠州到任謝二府右某䝉恩差知前件州巳到任上訖者非才尹劇誠不厭於人言有罪出麾復得臨於民政去都不逺便道匪勞初省詔條有慙面目伏念某識無逺大智乏周防誤被宸俞使承府治謂諸僚皆朝廷之選故信任而弗疑以兩造非姦慝之人故寛舍而不問豈意吏曹之乖謬致煩詔獄之推窮無由自明分甘重責荷上恩之含垢原所坐之因人止免一官仍除善郡此葢某官致君以道用法不私方百度之惟新靡容於曠事或一物之失所每惻於深仁俯矜多難之餘隂有曲成之造迂踈獲譴固宜置散以投閒衰暮貪榮尚爾為貧而竊禄敢忘内省仰答殊私滄州到任謝二府右某䝉恩差知前件州已到任上訖者上盟津之符特寛旣徃之咎假滄海之節再荷曲成之私逮此布條徒深嚮徳伏念某所慿不厚自知甚明智畧不足以適時宜操修非有以過人者冐塵禁近初以妄言而下遷試守劇繁復縁縱舍而連黜每思薄祐絶意榮塗誠宜置散以投閒姑務省非而責巳收還印綍巳慚天幸之多擢守藩方抑懼人言之嘖矧兹邊寄匪用次遷顧敗官不職之餘才非其稱惟振廢起淹之舉恩有所歸此葢某官心推至公道在博愛賞刑無濫雖賤微皆軫於哀矜故舊不遺在鄙薄尤䝉於假借委之善郡慰彼衰年惟堅匪石之心少答在鈞之賜恩閎千里魂幹九升戀戀之誠云云何及回運使兵部右某啟伏審某官露章辭劇剖竹為藩輟使務於冀方殿鄕邦於江國主知素厚暫諧卧治之榮士論所歸行聽節趨之寵眷言屬部悵失餘光方深去德之思忽枉摛華之貺圜函縟禮拜手迹以彌勤大斾嚴行望車塵而益逺更祈良食少緩遐心回知郡郎中右某伏念壤甸相望徽音坐隔雖嘗寓訊未諭馳情逺承教牘之貽過篤謙撝之意聆風為慰銜徳無忘伏惟某官生質渾深材資敏邁本閨臺之積譽副州郡之選能師帥承流巳報成於政治朝廷重外方表任於循良願益將頤佇聞咨擢乃誠所嚮臨啟罙勤賀禮儀待制右某伏審某官進膺言綍榮踐禁塗辱與交從竊深慶抃伏惟某官耆儒宿望懿行深資逢辰早躐於文科奮藻不離於經術先帝天飛之日眷注巳隆邇英晝訪之游登延且久近序偏更於典領同時共歎於淹回黼帷動求舊之思天閣慶登賢之拜内備顧問雍容持槖之榮入告謨猷旦暮沃心之熟某久暌風晤喜聽咨俞方嬰簿領之勞早闕緘縢之貢敢圖厚眷先貺華牋雖親踈而禮意均本由謙重然貴賤而交情見罙荷撫循徒深悚戢之懐莫喻傾輸之素上致政郎中右某伏念攖郡鈴之紛擾少曠馳郵瞻燕几之優閒常深企德緬想興居之暇益臻輔養之和伏惟某官樂道希夷處躬溫厚早遂冥鴻之志髙辭振鷺之羣歸里巷以安躬推先士望賁丘園而養素用固天倪漸屇熈春尚遥省晤倍祈保攝式副傾翹回提舉著作右某啟近因歳首嘗寓慶緘尚未徹於省觀忽先紆於翰尺曲敦禮範備見愛思矧在州封方承使㫖惟奉循之恐怠頼寛假之已多敢冀謙撝過垂眷奬拜手筆八行之貺愧荷殊深限淮山千里之遥披承永日更期珍䕶别佇寵遷欽企之誠一二奚究回恩州知府皇城右某啟近者之藩假道獲欵於賔閎折爼飛觴復陪於燕衎屬迫官期之近不終朋舊之歡去徳未幾合符伊始託善隣之庇方企於風期裁占吏之書先承於惠好且審侍鈴之多暇允臻泰宇之嘉祥宣布中和巳協惟良之譽登延近宻行膺不次之榮適届春和益綏冲履其於感系未易殫陳回冀州知府左藏右某啟自承榮領使權幸依河潤沈迷鮮暇未遑竿牘之儀謙假過隆首辱牋縢之貺仰循重意載戢丹悰伏惟某官忠諒承家詩書蘊學稔武名於朝寀藹政譽於邉藩鎮撫外夷方頼折衝之畫光華近著行膺簡在之恩尚阻晤言倍祈遵養傾依之素鍳寐不忘回知縣太博謝改官右某竊承某官上課天官拜恩綸制榮進曲臺之秩益開近著之班夙忝與游欣聞新渥猥辱書幐之貺曲形謙槩之隆銜戢於中諭言靡託矧以某官才名夙茂風譽兼優百里之洽絃歌久彰善治三年而比績用已被榮褒佇别對於寵陞乃奮揚於素蘊未期占晤姑罄禱䖍賀新恩先輩右某啟伏以右文興治盛徳撫辰廣求天下之英皆與彀中之選詔書一下士類四臻承平百年用此數路刈薪之效而得乎翹楚育材之久而見乎菁莪必須異能以備優等伏惟先輩學漸聖域文舒國華寖遊俊造之林久待弓旌之聘飄然麗賦嘗親乙夜之觀赫爾榮名高視東堂之集方聆駿舉俄沐華緘味詞意之稠重増鄙懐之企悚回舍人右某伏念跡寄近藩坐企閨臺之彦書傳便驛欣聆金玉之音荷恩眷之稠重慰羇懐之勞吝恭審順綏福履保固天倪伏以某官道探古先學臻典則資嘉猷而悟主發素業以濟時言成絲綸方演筆端之妙禮有沿襲更資綿蕞之精朝倚碩儒日期柄用式臨庚伏正逺賔趨敢冀上為廟朝精調寢餗回致政龍圖右某啟竊審某官通奏中宸請辭近著援大夫傳政之禮慕至人佚老之談矧久踐於禁塗加累藩於戎翰聲猷茂著體力方強遽懐止足之心深伏冲髙之度猥承華幅曲謝堅誠雖景企以良勤載銘銜而弗巳乃情所嚮臨啟寜周回杭州知府待制右某伏審某官出殿名邦升華内閣暫輟中臺之貳徃專方面之權地據上游控全吳之都會兵鈐一道制百粵之襟喉允屬髙才式當重寄敢意撝謙之徳曲敦求舊之情竿牘為儀獲覩春華之麗藻風期罙篤更欣寒栢之後凋感抃兼深敷陳曷喻任左丞回外任兩制右某啟此者叨被恩綸擢升省轄才非其稱愧積於中伏念某生質無奇福基甚薄流離多難出入四朝㑹府複門巳玷一時之選逺塗暮景本期三徑之歸詎意僉諧更加奬擢此蓋某官素推公議每借味言方慙誤寵之優繼辱榮函之貺仰銜眷惠曷勝名言任右僕射謝前宰相右某啟此者欽膺朝制擢預宰司惟幾政之倚平豈瑣材之足任辭恩弗獲充位為慙伏念某識昧大方器非逺用荷四朝之樂育逮二聖之眷知進叅管轄之謨殊乏涓埃之補方丐退藏於閒燕敢期冐寵於鈞樞不愆不忘素乏胡公之善非勲非舊但懐文本之憂此葢某官表式斯文衡平多士曲記與游之舊隂推引類之私施及孤愚越叨圖任望平津之東閣莫遂披承覧蕭相之前規徒深景仰方修竿牘遽枉緘縢祗承惠好之音倍深感銘之素任右僕射回外任兩制右某啟此者冒恩庭制登職宰均重惟衰耄之餘猥被咨俞之寵位槐匪稱據蒺為憂某官義篤相先交隆久敬樂贊言綸之出首貽占牘之儀摛藻為春情與文而俱縟發函如面感將抃以交深祗服謙撝莫殫言諭乞致仕上二府右某啟伏念某所賦不厚自知甚明少無過人之才累歴清貫晚叨輔政之任終致煩言自解去於近司尚冒承於異數假真祠之使領就樂土以家居荷全度於大鈞獲保躬於晚歳優閒過甚疾疹彌加膚革不仁固難勝於冠冕桑榆已暮姑待盡於衡茅輒傾肝鬲之誠仰凟黈旒之聽丐從散秩歸保餘齡伏望某官推惻隠之深仁運代工之洪造入陪坐論特啟俞音倘縁陶冶之私俾遂丘園之逸不獨退處閒燕幸終老於士鄕庶幾訪尋巫醫稍扶持於病質果諧願望實出生成蘄嚮之誠夙夕於是致仕謝二府右某啟此者拜恩朝綍歸老鄉閭擢孤卿崇貴之官躡舊相退休之秩寵光踰分感懼交懐伏念某一介儒生四朝榮遇出入將周於五紀夤縁偶玷於三階鼎足弗強幾覆鹽梅之實葹心巳拔尚霑雨露之濡久竊燕安寖成沈痼視隂愒日每驚疲曳之年苟禄饕榮自愧婆娑之事屢抗章而告老䝉賜命以曰俞聨禁職於真游奬其歸志返衡門於京口養此餘齡恩數過優甄成有自此蓋某官代天化育秉國平均啟沃心而在公進退人而盡禮曲徇孤危之懇免貽殆辱之譏敢言願棄於人間希蹤前哲姑欲待終於牖下歸骨先原荷徳不貲馳誠無已回殿前太尉右某啟伏審顯膺庭告進職殿巖擁新鎮之節旄視上公之禮秩逺趨嚴召榮拜異恩竊以某官識洞韜鈐學敦詩禮世服忠勤之節躬兼儒雅之風入則總親校於内庭出則抗威稜於邉閫勲勞夙著聲誼益隆輟帥府之閎謀肅提禁旅陞將壇之重寄宻衛宸居方慶寵光遽貽華翰欣銘兼至敷諭奚殫回中書侍郎右某啟此者上閔衰遲詔容退老仰拜遷除之命俯全進退之方企望時賢固慙伯玉之在後重惟恩舊最叨鮑叔之深知已布懇誠具於竿牘豈謂某官情敦雅素義篤始終不忘久要之言薦講平懐之禮尺牘隨天書而並至宣毫與手跡以相輝雖子孺逺權不在自言於長短而孟公隠几率皆有意於親踈姑恨殘骸難勝重貺崢嶸晏歳修盪遥塗無階賔閣之趨但祝生經之衛上符注意下慰具瞻回殿前太尉右某啟言念衰遲暮景久辭拱著之榮誕育初辰方切免懐之念豈謂某官敦修契素講叙彛儀白雪長言借華襃於麗句南辰妙相形善祝於餘齡集鑪薰壽斚之芳兼篚帛仙巾之飾義全金石豈輶薄之能勝地隔川塗悵披承之攸阻永言佩服姑用傾馳回中書副閣舍人右某啟近審榮膺詔檢峻陟詞垣進増近著之光華雅副清衷之簡眷竊以帝王之制煥典册之文章臺閣之規著雷風之號令鋪張治具鼓舞人羣必資博雅之才共贊幾微之務伏惟某官文髙體要識洞淵源以昻霄聳壑之姿副絶類離羣之選紬書史觀夙推良直之風持槖從班益盡論思之效方欣明命遽枉幐音獲窺破的之辭深歎湧泉之思仰銜謙徳罙激懦衷回知府待制右某啟向審易鎮雄藩升華内閣式表循良之效實叅侍從之榮賢業有光僉言惟允某官器能閎博智識淵微踐更要劇之權著見事功之敏囊錐脱頴庖刃發硎擁節分符出則倚蕃宣於巨屏簪筆持槖入則備顧問於邇聨葢能兼政事文學之科是宜居方伯連帥之任將疇治最别副眷求詎意謙撝逺紆華翰欣銘兹極敷諭奚殫回校書學士右某啟近審某官拜命嚴宸校文中秘輟璧水橋門之望躋蓬山藏室之華絳帳傳經巳發韋編之奥青藜照坐正刋蠧簡之訛聊假清塗遂階近著竊慶絲綸之寵遽煩竿牘之儀祗味雄辭罙欽高致悵拊塵之未逮徒置袖以無忘感佩之誠敷陳曷喻回給事右某啟伏審自蓬閣之上遊升瑣闈之要路淵衷圖舊輿議允諧伏惟某官學繼聖門譽偕賢世久次師儒之任益推經行之高鳴玉納言入則侍清閒之燕左符半竹出則宣愷悌之風縈滯有年峻遷特異東臺審讀之政出令惟嚴西清訪對之謨沃心無間竊聆成命増慰私懐豈期眷顧之勤先枉牋幐之貺出於謙借姑用銘藏回奉禮宣徳右某啟近審顯膺明命再擢詞科録成均升選之恩正司馬論賢之日名實旣定資格遂殊矧惟適變之才素擅通倫之學考言詢事固嘗超拔於賢關發䇿決科巳復攬收於英彀迨茲寵渥實啟華塗猥煩占牘之儀獲閱栖毫之妙乃誠感抃曷喻名言回秘書學士右某啟近者某官簡自上心擢居秘府錯薪刈楚選於衆而拔其尤䑛墨和鉛博以文而審其是朝惟籲俊時號得人矧繄素履之賢雅著士評之譽一言合契萬乘改容亟頒芝檢之優恩躐進蘭臺之美職平日育才之地聊刋正於舊文異時廸哲之功佇鋪張於偉蹟辱榮辭而見及佩雅眷之不遺感與抃并情非言諭轉宫保謝宰執右某啟此者祗恩中詔進秩青宫事出甄成感盈心抱伏念某所慿不厚徼幸實多少也入朝寖竊器名之重老而謝事尚叨禄秩之優適當時制之期仰矚天飛之運大賚四海仁恩溥洽於函生叙進百官寵數特加於舊老逢時有慶服寵増榮此葢某官夙播大鈞曲全晚節遘風雲之亨會被綸綍之優除一品班崇豈耄昏之宜稱三階路隔思占叙以無由佩服恩私漫馳誠素回廬州知府舍人右某啟伏審光膺制詔移鎮淮圻復書殿之清資總兵鈐之要地寵榮増煥朋舊相懽竊以某官夙富宏才少馳敏譽論經帝學名動公卿之間奮藻詞林職居禁近之要三巳豈渝於直道九遷寜滯於逺途再陟近班仍藩舊治郭伋之再至所部聊慰兒童望之之雅意本朝豈淹郡吏上知巳久峻召非遥士論傳聞方喜俊賢之進用行人遽至逺承牋牘之謙撝自顧衰遲何勝眷記炎歊在候披奉未期冀倍保於寢興庶少符於系詠回通判都官右某昨者被命中宸得麾近壤側聆時彦方貳政條匪徒適求舊之懐兼亦遂依仁之願忽紆華幅逷示遜辭荷曩眷之未忘刻丹誠而不已伏惟某官富文敏學博識周才始擢秀於上科累試能於劇務郎官清要久更踐履之榮詔㫖寛和參頼布宣之畫顧慙拙用幸接事聨佇諧親揖之期併抒傾輸之素蘇魏公文集巻五十
