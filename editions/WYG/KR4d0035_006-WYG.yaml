body:
  text: 蘇魏公文集巻六宋蘇頌撰律詩金陵府舍重建金山亭二首地出城隅闢故臺斬茅删竹受良材春塘夢草成詩後畫棟飛雲式燕開一境山形天際望四時風物坐中來府公經構民偕樂魚鳥猶知喜躍迴故時臺榭對池心空有名傳擬穴金鬋理茅茨修竹茂經營軒檻綠楊深橋橫㫁岸虹流彩花滿芳園鳥囀音盛府多歡頻命席每容疎外共窺臨潤州錢祠部新建寶墨亭王蕭書迹衛公詩流落江南世少知古寺購尋遺刻在新亭龕置㫁珉竒模傳遂比黃庭字埋没非同石鼔碑墨藪書評多逸事何妨揮翰與題辭和俞仲素太博遊茅山二首宿明真觀平林行盡到巖扄一昔恬然道味生爽籟逺隨林谷響飛雲時拂棟梁輕閒傾仙斚流瓊液高論神方錬日精更想真遊成不寐坐聽松韻到黎明馬上初望茅峯三士隱淪地上林句曲前朅來思訪道属望賦遊仙松引飛輪路雲收積玉巔華陽不知逺趣駕似行天次韻和丘秘校登長干寺塔九劫半依山經營昔甚艱周遭嚴佛宇直上俯天關登陟緣梯險淹留布坐慳椽楹亦塗附櫺檻遍朱殷白日分明到青雲咫尺攀龍潭斜影落鳥翼怯飛還基構從吳晉聲名動朔蠻燈然時照耀梵唱每循環往事稠重問前朝指顧間誰知息心處香火老僧閒次韻約諸君遊長干寺寺按郡東南僧嘗為我談初因晉大士來獲古靈龕晉時有沙門惠達至金陵長干獲古佛塔因于其地建佛刹後代廢撤至天禧中僧惟政乞重建塔寺俱䝉賜額厯世名空在重興德乃堪先朝賜新額此地建精藍億載扶皇統生民息戰函刹仍存故里龍復止深潭九級惟塗甓千梁盡架楠亭臺各軒豁巖谷更空谽殿角芝成玉殿柱嘗有芝草松稍露隊甘松林每有甘露穴棲多禮鼲池怪集神􅀈可愛臨岡曲何人結草庵欲來尋隱逸誰與其歡酣念往須勤到來詩有念往曽高枕之句登高已舊諳予累登絶頂低頭小城市舉目遍村嵐静境由兹達塵容却自慙常思真趣響可抑俗饕貪宇宙開懷適江山極望涵相邀幸多暇命駕即追參同賦山寺郁李花小樹扶疎若剪裁新英濃淡對山齋青紅相間􅂷羅帶華葉同開綴寶釵未必無言芳徑列須看成實翠珠排禪扄掩映情多感藥譜標題品最佳衆卉分敷争欲並三春顔色此誰偕誰憐寂寞遊觀少便與移根向玉堦丘林諸君以春雪三絶見寄走賦長句奉酬彼美春工用意多剪裁瓊蘂綴庭柯妍辭重識梁園賦寡和還推郢國歌莫嘆餘花皆慘悴共看修栢自婆娑尊前謾愛風光好不見山陰泛棹過來篇有惜花之句次韻江南感事京洛倦遊後江南感慨多壯懷傷嵗月醉眼小山河無路通談說窮年謾揣摩知音如有遇終采擊轅歌春日㑹飲懷丘思同林成之作四首濁酒澆腸遣旅懷春宵常苦漏聲催坐中不見丘夫子明月無光厭舉杯次林韻二月中和氣序均酒酣偏覺長精神之人歡㑹何稀闊惆悵尊前更惜春又和前韻詩論心膽見天真酒逐羇懷若有神一夕所思惟我友四時最樂是熙春又次林韻右持巵酒左持螯慷慨酣歌憶藉糟因想良交成不寐清談終夕未為高景德寺飲㑹丘思同作述懷詩兼紀一席之事見約同賦輒次元韻瀕江多勝宇兹地更推高結友為文㑹開樽較飲豪春華今始盛聖代况親遭美景堪行樂雄談任呌號數家供法饌百斚和春醪異味頻登俎良庖旋奏刀盤豐介象鱠手把畢生螯極量觚并榼㤀形甖與槽憐君皆曠達獨我嘆徒勞俗狀區區外剛腸漸漸熬壯心雖不屈讒口亦奚逃感寓嘗懷古愁來幾悼騷宦塗蝸鬭角世事蝟森毛自得猶千慮誰能挫一毫無煩惡蠅㸃須擬效龍韜暫適惟詩酒難兼是燕敖縱歡忘倦厭論契甚堅牢峻節凌修幹清風遏怒濤就賢知不倦營道豈云叨此席今誰繼知音盡俊髦和惟晤師遊鶴林寺寄頴長老黃鵠山前古梵宫參差樓殿倚巖中羣峯重疊圍松徑三伏嬉遊愛竹風牛首禪宗懷馬素寺實馬素舊居襄陽耆舊憶龎翁潁谷隱門人長思勝㑹真幽適誰使句嬰不與同和刁節推郊居寄説晤二詩僧勌賦從軍詠式微山齋重此理松扉春來園圃朱櫻遍霜後盤飱綠芋肥瓶錫時邀高士駕臺緇多學野人衣白蓮詩社方求友喜得支公與共歸又和月夜理笛答晤見寄聞説羌戎出塞行征人纔聽淚交橫三秋霜氣先時至萬里鄉心半夜驚子野踞床思逐弄季長臥鄔亦牽情闋終更想關山月不惜新辭記舊聲送惟晤遊廬山飛錫指湓城秋風一衲輕溪雲隨晩渡嶺月伴晨征敏思登臨發空談舉動明他時二林㑹名字繼融生送沈太博倅滑臺早嵗淮陽宰邑初相君連上薦能書新從墨綬諸侯國便領油泥别駕輿東郡提封今輔屏南都接軫舊鄉閭優游樂職人應羨官便家榮兩莫如次韻王伯益同年留别二首桂籍昔叨聯署等蓮帷今幸接芳塵塤篪契合均天属金石交深過古人直向嵗寒期茂悦肯同時俗論甘辛優游且作江南令惠愛於民此最親再次前韻從宦飄飄九見春共嗟名跡尚埃塵相逢梁苑留趨幕不鄙池陽去長人蚤向文科分甲乙嘗於命厯校庚辛窮通定分非嬰慮惟有交情久益親伯益生于辛亥予值次庚申嘗共考術者所言休咎多驗卞巡檢重建蘋節堂棟宇更新構亭名即舊規和容君子志歌闋大夫儀官政捜兵暇賓賢命席時弦開秋月滿矢落曉星馳疊中朋籌勝交醻飲樹移連鼙呈畫的急管送金巵更得蕭齋榜重看沈壁詩㤙勤主人意雅志最相宜和刁推官蓼花二首􅃄雨寒塘外蕭條廣隰中花逢秋至盛人愛水邊紅碎纈排霜葉纖㽔拂露叢尊罍不見賞留得伴溪翁蓮踈菊未破野艶獨敷榮濯水紅纓細鋪園步障平露寒偏發色風勁不摧莖採掇聊供餌丹房助氣清次韻簽判張太博移竹梁苑有脩竹移來正得時新開一齋館分植兩軒墀璅碎青金影纖圓碧玉枝物應人共美性與地兼宜漸喜聲成韻毋傷色暫衰寧因惡土變自與好風期窻闥常相對闌干不用施看憐朝露爽坐覺晝隂遲擬富非侯等親隣見鳳姿燕杯留几席畫筆置藩籬䕶長防將折刪枯欲更滋破憂談將解化恐誤仙騎節聳蛟螭骨苞翻虎豹皮竿長終勁挺根困任離披肯顧柯亭賞休思渭水持吟餘毫亦健灌罷器頻欹戴譜須書此淇園未羨之七賢嘗伴侣六逸重猶夷緬繼斯人躅如吹仲氏篪蕭然發清思賴爾作良知再和倒韻新值蒼筤竹欣欣若感知日隂紛展蓋風韻巧吹篪幸對人瀟洒兼依地坦夷二年官此者一日可忘之抱節疎仍密交柯挺復欹藂生相友善特立甚矜持長處苔微破看來露亦披鳳姿聊側翅蛇變但存皮莫作恂兵伐留為介杖騎雪霜饒欲冒雨露巳先滋初見猶齊架俄驚漸出籬中虛緣物性外勁是天姿比畝雖云少成林亦未遲廟丘當見採栝羽豈勞施鵲尾冠須製鵷鶵食可期拂雲思栢悦盈畹笑蘭衰任土前書貴名園此地宜縱難聽嶰管肯學唱巴枝既許親齋几寧辭局甃墀更煩勤愛䕶有用在他時次韻簽判梁寺丞阻水見寄京府偕趨幕彌年接坐隅駑駘攀驥足魚目混驪珠風誼敦貪薄吹噓變朽枯交親齊魯衞政事擬阿蒲契合寧容間情通不鄙無邀歡困萍蟻較味賸蓴鱸氣盛吞雲夢文雄獵具區報投均縞紵應和念篪竽巢閣行觀鳳為裘佇薦狐世家傳鵲瑞職業在鴻都聳壑方騰幹乘風好縱艫一飛嘗得志平步即夷塗見比親瓊樹清如隱玉壺終當拾青紫詎止學盤盂少别如旬日相望似五湖荒郊逢轍涸激水待雲膚窟穴増蛇䑕腥臊惡蚋蛄尊思孔北海釜嘆范萊蕪始見生蓂魄俄驚遶樹烏初猶甘杞菊久漸厭粱苽晝詠依依栁宵看歴歴榆晨興常過午朝膳每通晡閒逸輸吾子馳驅属鄙夫無因隨李郭長日想田蘇沙漲舟猶膠去聲河流軌不濡行郵纔咫尺命駕只須臾坐俟聆金玉來應笑碔砆多慚昏鈍棗難慕湛精醐安得生雙翼徒然處橛株重吟贈我句足以豁䝉愚謝太傅杜相公惠吳柑任土呉邦果分甘故相庭纍纍朱實爛馥馥蜜筒馨玉液三重釀神丹九鍊形盤中堆火齊案上鬭銅釘玩比韓嫣彈飱勝楚子萍瓊津融不竭塵慮滌還醒近比𤓰稱瓝休誇李似瓶南樓今匪貴東望亦虛靈盛乃長洲苑傳之大禹經秋包千樹富霜葉一林青薦味同飴露淪輝信景星租園輸嵗賦守吏占官丁貢罷中都府供先綠野扃緘封重篚襲道里百郵亭想憶金華宴須傾縹瓮醽同棃資可口與棗助延齡豈意殊方物頻霑俗吏㕔食珍時有媿拜賜敢遑寧顧乏齊瑶報宜追戴帶銘永言難紀美應念思飄零太傅相公以梅聖俞寄和建茶詩􅂷示俾次前韻近來不貴蜀吳茶為有東溪早露芽二月製成輸御府經時猶未到人家太官供罷頒三吏東閤開時咏九華從此閩鄉益珍尚佳章竒品兩相誇送句判官赴大理詳㫁廷尉咨賢佐讞刑辟書連上得翹英時推黃霸持平久衆伏兒寛定奏成尺竹汎疑資審劾惠文彈治要詳精從來法吏多陰德勉務哀矜助聖明府尹歐陽公以臨書智信篇為貺謹以長句酬謝八法能工世罕精帥鈐多暇錄遺經言稱智信文毋害體具真行筆不停勢似公權題殿壁心希逸少冩黃庭下僚何幸䝉垂贈循覽留為座右銘次韻簽判太博謝府公新詩墨迹幕府雍容但省文筆精詩格兩難倫臨池得法毫端健擊鉢成篇藻思新征虜雅歌追樂事蘭亭賡唱掩芳塵梁王賓友鄒枚在末至慚非賦雪人次韻和宣甫叔父遷謫過都見寄解組從戎五筦城壯謀期欲盪蠻腥數竒不意同飛將肺腑何因學衛青報國有心猶慷慨謫官無悶但沈㝠竹林此日重相過高論時欣側耳聽宣甫以栟櫚茶刷見惠繼之以詩依韻奉和装橐分餘具茶筒使拂塵製時工匪易得處賞尤頻常與輪槽並宜為焙匣珍齋中延客語供辦未應貧宣甫宿約見過既而不至翌日有詩為示謹次元韻夙昔成嘉約朝來不見過出門非有礙掩室返多魔咫尺且猶爾分攜將奈何徘徊延望久雲際待金波宣甫隨行有端石茶匣甚佳道中為僕夫所損某見之謂微瑕無傷㝷蒙送示有二絶句依韻拜答物重齎輕豈易持何時登頓損瑰竒曽為什襲緹巾寶一見寒姿不忍遺鐫礱圭角制尤精豈為微瑕用便輕且賞巖珍終耿介休思人事有虧成蘇魏公文集巻六
