body:
  text: 蘇魏公文集巻十七宋蘇頌撰奏議論前代帝王追尊本親及嗣王公襲封故事漢宣繼昭帝即位詔議故皇太子號諡園邑有司奏請故皇太子宜諡曰戾史良娣曰戾夫人置守塜三十家園置長丞親史皇孫諡曰悼親謂父也母曰悼后比諸侯王漢諸侯王母夫人皆曰后園置奉邑三百家後八嵗有司復請悼園宜稱尊號曰皇考立廟因園為寝以時薦享戾夫人曰戾后皆益奉園民光武中興上承元帝建武二年以皇祖皇考墓為昌陵後改曰章陵縣置陵令守視皇祖考不加尊稱皇考仍舊稱南頓君十九年尊宣帝為中宗始祠昭帝元帝扵太廟前此十一帝主皆納高廟成帝哀帝平帝扵長安舂陵節侯四世以下扵章陵節侯光武之高祖東晉元帝由琅邪繼統即位之後以父恭王無他子立皇子裒為琅邪王奉恭王祀其後王薨琅邪皆更立王終晉王世前代帝王自諸侯入奉大統尊其本親不失禮者三帝也宣光於其父祖惟塋墓置園邑令丞所以異扵諸侯也而不加尊稱不封國邑尊本恭親之義也不加尊稱尊正統也不封國邑子無爵父之義也文雖不著其義可推也亦見扵師丹議其曰親曰皇祖曰皇考者有司之失也何以言之父祖之尊不容改更稱謂但以上承大宗不得復顧其私恩故服有除降而名無異稱儀禮喪服傳齊衰期為人後者為其父母師丹議亦曰降其父母期所以云者取其别扵他親扵義無嫌也今不曰父而曰親而扵九族旁宗尊卑無所别異扵義安乎不别加稱謂直曰史皇孫則中外無嫌尊卑之義自見也至若皇祖皇考之稱是天子諸侯大夫士奉祭祀之文禮記祭法曰王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟鄭康成云王皇皆君也顯明也祖始也名先人以君明始者所以尊本之意也若是則豈可稱扵羣臣論議之間乎故宣帝詔直曰故皇太子是也然則考與父豈有别乎禮記曰生曰父母死曰考妣郭璞注爾雅不取此義然則學者當從禮記為正白虎通曰父矩也以度教子者也考成也言有成徳也廣雅云母牧也言育養子也妣嫓也匹扵父也曰教曰養親親之辭也曰成徳曰匹父尊之之辭也故禮有世父母叔父母之文而無世考妣叔考妣之說此其所以别也宣光之世議者不能推本此意以開導時主使盡禮意故曰有司之失也晉元帝雖越在江介而能定其大義不失統紀者以當時諸儒若賀循輩非一皆有禮學國爵詳正本末不違越扵先代不致譏扵後世誠有由也先帝紹位之始深惟其故追賁宗室諸王獨國爵濮安懿王無所加進崇奉之禮不過置園陵立國廟而巳此合乎宣光尊本恭親之美也初議稱親後亦罷寝特封王之子為濮公使世世奉祀以正其國統此又徳過扵二帝區區晉室不足儗倫也光武為皇考南頓君立後後世使羣臣郡國奉祀此師丹所謂無主不正之禮是也哀安桓尊其父祖為皇而使王子孫奉祀此失禮之大者也其尊曰皇者禮如天子天子不敢臣之髙祖之扵太上皇是也今使諸侯羣臣奉祀神不歆非類皇豈得享之哉故三代所以尊王者後待以不臣得用其國之儀物服色祀其先王者為此也唐立孝敬皇帝奉天皇帝廟京師皆有司行事追尊讓皇帝以其子孫為嗣寧王奉祀事亦因循前代之失也今欲因改封故王議追尊之禮莫若増陵廟以奉園之户加本國以嗣王之名既合扵古義又不違先帝之本意也先帝不追尊仙游縣君益見聖慮之深逺也魏明帝詔曰哀帝以外藩援立而董宏等稱引亡秦惑誤時朝既尊共皇立廟京都又寵藩妾使比長信僣差無度人神弗祐其令公卿有司深以前世行事為戒是哀帝一失禮取誚後來本欲尊親反詒重毁如是豈得為孝乎東晉孝武帝太元中崇進所生母為太妃范寗亦曰子不得爵命其母妃是太子婦必也正名寧可稱母今議尊崇謂許其所生宗室子援羣臣封育母之例請加封號朝廷以誕育先帝之故優詔褒述特進大國既緣宗室之請則不失正禮推以先帝私親則其他宗室不敢為比亦可以成先帝之志也或嫌爵母則母濮國以為號可也論王公封爵故事唐令王正一品嗣王郡王國公從一品貞元二年五月勅御史中丞竇參等奏文武官辭見宴集請依天寳三年禮部詳定勅親王嗣王任卑官職事仍依王品郡王任三品以下職事者在同階品上自外無文武官者嗣王在太子太保下郡王次之國公在正三品下郡公在從三品下縣公在正四品下貞元四年五月勅御史中丞竇參等奏文武官辭見爵雖髙官或下列扵上官之上非制也自今以後宜列扵本官班之上貞元二十一年五月勅御史臺奏准公式今諸文武官朝參行立各依本職事官品為序緣有檢校官髙職事卑及嗣王郡王任職事官髙卑不等今請應檢校僕射及尚書以上及嗣王郡王任職事官者一切在職事本品之上已上書見禮閣新儀國朝故事惟親王恩禮優異外餘郡王嗣王國公郡公縣公皆無異禮惟立班在本官之上又唐諸侯王薨子得襲封為嗣王永徽元年濮王泰薨立其子欣為嗣濮王垂拱初章懐太子賢薨授其子守禮太子洗馬為嗣雍王嗣王薨子皆襲封嗣韓王納官至員外祭酒卒以其子璩為韓王國子員外司業有不襲封者嗣曹王臯薨子道古為朝官不襲封有降爵為公侯者荆王元景坐法貶死追封沈黎王以渤海王子長沙嗣仍降為侯嗣楚王靈䕫薨子福嗣降爵為公有初但為嗣後數年乃封嗣王者嗣舒王津天寳二年卒子藻嗣至天寳九載封嗣舒王有由嗣王而遷郡王者其帯職事官有為國子員外祭酒司業者韓王納并子璩之類有加銀青階者景龍四年嗣鄭王希言等一十四人並加銀青光禄大夫有為諸衛将軍者嗣霍王暉開元中左千牛員外将軍有為員外洗馬者嗣徐王茂卒子延年除員外洗馬為嗣徐王有為宗正卿及州郡上佐官者此例最多不可悉數皆出朝廷一時之命即無定制其恩禮厚薄以封户多少為限中葉以後封户皆為虚名今所不用本朝未有嗣王之號若欲封拜謂宜先委禮官及兩省參詳定制然後行之奏乞将常平倉等公事付逐路轉運司其提舉官改差充本司勾當公事臣竊聞議者以謂諸路俵散青苗錢侵害人户中外臣僚數有論奏皆曰不便臣等見主判司農寺青苗文字多由本寺行下竊尋先降勅意本欲優民公家無所利其入今乃人情不安論議如此臣等訪聞得葢是逐路提舉官不能上體朝廷之意務要張大其事州縣畏懼承禀不暇是致民間不能無煩擾之弊且人户所信者莫如州縣州縣所禀者獨知監司今提舉官逐路自置一司與轉運提刑既不相管攝文移徃復其間事有異同則州縣莫知所禀此是非之論所由起而人情不得不驚憚也今言不便者既衆朝廷業已遣使未見灼然利害不欲遽罷若執而不變誠恐中外喧騰無有巳時臣以為緣事増損莫若以常平廣惠倉農田水利差役利害等事一切付之逐路監司其提舉官改差充轉運司勾當公事名目凡有興置事件並須咨禀轉運使度可否施行其今年秋料青苗錢亦委轉運司候收歛得夏料錢斛了畢日與州縣當職官同共商量體當民間物力有餘易為輸納委實利便方得俵散若或民力不易難以勝任即且止住将來春首别行相度如此則事有統一人無異論更張之際扵事體亦無所損也議武舉條貫臣等昨奉勅差考試武舉人伏覩條制有未盡事理今具起請如後一䇿論武藝俱優者為優等今定弓射一石一斗力馬射八斗力各滿不破體及使馬精熟臣等竊以唐制定舉人簡試長垜馬槍歩射穿札翹關負重身材通取五次上者為及第長垜以箭十隻為限弓用一石力箭重六錢以箭入暈多少為等第長槍以刺中木人上版子為等第歩射取把捉如法弓矢鳴快并二十歩内穿鐵甲者為中等馬射弓七斗力取射中鹿子者為等第翹關者限十舉以上負米五石行二十歩為中等身材長六尺為上五尺八寸為次其箭有不入暈及槍關不中等者亦得通計折除葢科目如此之衆較試如此之備所以收取材武之人緩急有可任使今制但取箭滿不問中否又無長槍翹關負重射札之科誠慮舉人中有材藝者别無條目收録較試之際未免遺材竊謂其餘條目恐難卒復惟射親命中之法扵今取人最為要急臣等欲乞扵此條下添入如有歩射弓一石力十箭俱上子垜六箭以上入暈馬射八斗力三箭俱中笋椿並為藝優歩射十箭八箭以上上子垜四箭以上入暈馬射兩箭中笋椿為藝平以上除發箭不去及不跌垜出垜者便行黜退外若箭去上垜雖些小不為不合格並與馬歩射通計入暈及不上子垜不中笋椿箭數相折除考較外依得今來所請射中箭數為入等其垜子廣狹高下逺近射帖方圓大小並以今中軍之制為定一䇿優藝平者為次優今定弓歩射一石一斗力馬射八斗各滿但一事破體及使馬生疎臣等竊詳下條藝優䇿平定歩射一石力馬射七斗力各滿及使馬精熟為次等今䇿優藝平條却無此一等弓馬設有䇿優而射得此歩射一石馬射七斗力弓馬者以條無明文便行頒降為藝優䇿平正相背盩欲乞扵此條下添入或歩射一石力馬射七斗力各滿及使馬精熟與前項陳請射親歩射四箭以上入暈馬射兩箭中笋椿者並為優互相考較一藝優䇿平者為次等今定弓歩射一石力馬射七斗力各滿及使馬精熟臣欲於此條更添入或歩射一石一斗力馬射八斗力各滿但一事破體及使馬生疎者與前項起請射親歩射四箭以上入暈馬射兩箭中笋椿者並為次等互相考定一䇿藝俱平者為末等今定弓歩射一石力馬射七斗力各滿但一事破體及使馬生疎臣等竊詳上項所定弓馬兩等並以箭滿為合格其間或有前箭俱滿但後箭把齊便為不合格如此誠恐有武藝之人偶然一箭蹉跌便被黜落深可嗟憫欲乞今後有射第一等弓馬箭有不滿非全然開拽不得者如情願更試第二等弓馬亦聴若合格便依本等收録及更與前項起請射親歩射四箭以上入暈馬射兩箭中笋椿互相考定一䇿略雖下而武藝絶倫者未得黜落别候取㫖今定弓射二石力弩踏五石力射得臣等欲乞扵此條下更添入或弓歩射一石一斗力十箭八箭以上入暈弩踏三石力射十箭俱入暈者並為武藝絶倫别奏取㫖一䇿下藝平或䇿平藝下者並為不合格臣等竊詳條意既言策下藝平或䇿平藝下者為不合格是䇿優藝下䇿下藝優者未為不合格今來兩次考試除武藝絶倫者自許陳状就試别奏取㫖外其䇿優藝下者别無明文收録是致一例退落及䇿在下等者既不關送歩軍司其中雖有武藝之人無由得預呈試弓馬欲乞今後将所試䇿考定雖在下等但非文理全然紕繆不答所問别引外事及雜犯不合格者並許一例關試弓馬如弓馬在優等䇿雖在下等者並許比其䇿在優等而量試武藝歩射馬射各只一箭不滿或把齊附末等收録者亦許别奏取㫖如此則取士之路稍寛而習學之人知所激勸也奏乞專差官開修府界至京溝河公治平元年上此議四年京城大雨溝渠壅滯道途水深數尺始務開修遂無水患臣昨奉勅就差體量災傷擘畫疏導積水竊見京畿縣界多是溝河阻滯決泄水勢不快雖逐年檢計開淘然以河道數多夫力有限無由盡料應副是致頻有水患兼臣相度得近京城汴河以南諸水多入自盟圭河汴河以北諸水多入白溝河京城西北縣界諸水多入刁河上件溝河四道決泄諸水最是緊急見今例各淺狹合行先次開淘兼為地歩遼逺連接京東西淮南地分甚多若非大興夫役無由集事臣昨曽奏請乞下都水監指揮與諸路同共計料巳䝉行下除本司檢定畿内定歩合計四百二十萬七千餘工外諸路未應開今准朝㫖府界諸縣溝洫河道權住興修候來年别行檢計差夫開修臣再詳四河檢計夫料不少若将來只依常年例量差人夫應副竊恐虚費工力無由除去水害臣今擘畫欲乞朝廷特賜選差有心力知水利朝臣使臣各一員或即委都水監奏舉使專管勾開修上件溝河四道仍令預行計度夫料至時先且逐一道自下流至上源併力開淘如一年人夫未得了當即候次年接續開修以次道興役若三年以上了當即與理一任差遣五年以上與理兩任仍候住役日别差官重行檢視如委是依得元料及經霖雨别無阻滯其差去官即乞優與酬奨若稍不如法并依前更致水患即重行責罰其餘溝洫只乞令都水監提㸃司逐旋相度委自本縣量差夫力漸次興修如此必大段分减得京城水勢乆逺不復為患論胡俛罪名臣等伏見前尚書度支員外郎充集賢校理胡俛昨因解賔王論告先知登州日将斫伐到廨宇内桐木製造籠子入已坐監主自盗法計贓不滿一貫文遂至停廢竊聞俛被劾之日曽攀援法寺斷例有廨宇内斫竹賣錢入已者只作收到地利並不書罪及有依前官言說将賣公使菜園錢入巳者只作誤認官私財物罪名定斷兼稱賔王自是前任知州其所論告顯非干已而有司拘文卒從深坐情輕法重衆所嗟憫棄置散地巳一年餘後來聞有近臣為之奏雪乞朝廷原情特與叙用臣等竊以俛乆在儒館累歴差使數有臣僚論薦觀其操守固非貪猥之流昨者所犯葢以失扵周防至為仇人捃摭文致其罪無由自明然比之斫竹貨賣及收公使課利之人過亦未大况賔王本是登人與俛結怨非一朝昨因待闕還鄉日乆求俛過失無所不至惟得伐木一事足明俛之當官别無他惡徒以賦性狷急不能容物致與賔王不恊終為所訟此俛之短不得無過從而廢棄抑又甚矣臣等以謂法禁之設所以防奸萌而抑澆敝自俛坐罪怨仇得志増長偷薄無甚扵斯豈朝廷用法之本意耶臣等欲乞将俛元犯因依及攀援體例詳酌情理早賜牽復足以彰治朝之寛典懲好訟之薄俗也同兩制論祖無擇對獄臣等聞古者命夫命婦不親坐獄葢不使始嘗貴者與徒𨽻辨訟所以養㢘恥而崇禮節也賈誼曰㢘恥節禮以治君子故有賜死而無僇辱是以黥劓之刑不及大夫以其離主上不逺也又曰古者大臣有坐不㢘而廢者不曰不㢘曰簠簋不飭坐汚穢滛亂者不曰汚穢曰帷薄不修坐罷軟不勝者不曰罷軟曰下官不職故貴大臣定有辠猶未斥然正以呼之尚遷就而為之諱也古之所以待士大夫一以禮義如此之重也國朝推鞫之制命官犯贓罪亦先勘干連人證驗分明方得追攝其餘有犯如事状明白三次拒抗即勒令參對是一命以上犯罪與庶民法有等差若其職列貴近主上嘗所加禮以待之者誠宜寛其容繫以存事體也近聞龍圖閣學士祖無擇昨知杭州日有不公等事發已降勅命就秀州置院推勘仍差内臣押伴徃彼竊以無擇郡政因循自詒物議固當窮治以警具官然以遭遇三朝擢在近列出典藩服案轄一道罷郡未乆一旦有罪便與嘗所統臨羣吏辭對曲直不惟彼處吏民聴望不足抑扵朝廷事體頗有虧損嘗聞祥符中樞宻直學士邊肅知鎮州日以公費錢貿易規利又令部吏强市民羊及買女使王嗣宗以其事聞真宗皇帝以肅居近職不欲屬吏特命劉綜任中正以嗣宗奏示之肅即引伏遂坐貶官嘉祐中觀文殿學士孫沔知杭州日在任不法諫官御史交章論列仁宗皇帝止令本路體量得實而黜之翰林侍讀學士吕溱知成徳軍日侵用公使本路追劾當時不令溱就鞫直行責降今無擇所犯未甚扵此三人者仍該今來徳音自非贓汚盡當原减而不候取問便令赴彼對獄其為頓辱甚矣况已有御史章奏制院可以依憑根究不必親令即訊然後當罪也臣等欲望聖慈以無擇職在近列嘗為本路案轄之官特許免赴秀州制勘只令淮南州郡聴候指揮俟彼獄具日朝廷據案就問引伏即依例責降如其拒抗自有常法如此足以彰聖治之朝待遇臣下進退以禮免令州郡長吏虚被困辱在扵朝體抑有禆助也奏乞今後不許特創寺院臣近主判尚書祠部竊見天下寺院宫觀計三萬八千九百餘所日近又賜三十間以上無名寺院以夀聖為額者二千三百餘所其間勘會未到及不滿三十間者仍不在其數而大臣節将又例得以看墳為名陳乞修建者無嵗無之且建一寺院便須増置荘田營造舍宇崇飾堂殿及修設齋供僧徒從而緣化鄉村不能無困擾之患兼臣訪聞得鄉村無名寺宇所以衆多者始由僧徒緣化造屋數間謂之佛堂漸次増添不數年間便成院宇次第嵗月既乆州縣不能窮究因依或遇朝廷推恩因指為古跡為之保明奏報一䝉賜額則永為僧居矣臣嘗閱奏籍其間甚有屋宇七八十間而看守僧徒止扵一二人者莫非安處廣居坐享良民之供饋天下之人共知其敝而不能去竊謂民之財力土田有限而僧徒貲費無涯以有限之物而供無涯之求若不禁止竊恐更三五十年民被其患轉不細也臣伏見永昭永厚陵並只増葺永定舊院别無興建寺宇此誠聖意所慮者逺而臣僚及民間反無制限此有司之失也臣欲乞朝廷明立條約今後不許特創寺院宫觀其經今來已賜聖夀名額外所有不及間架去處並令州縣檢括指揮一切毁拆其土田元是百姓稅地即令給還本主若係官地亦行没納許諸色人收買請射永為已業其臣僚之家例合賜院額者並許指射有名寺院僧徒看管墳塋仍依舊例一年或間年與剃度行者一名充為恩澤若去墳側近無寺院者即與依前代守塜之制差本處末等鄉貫户永充看管墳塋人數即隨品秩高下仍與免户下諸般色役若被差之人經乆家業増進合陞入上等者即與改差下等人承替如此稍可以革創寺之弊又於大臣墳塋别無虧闕惟朝廷裁幸蘇魏公文集巻十七
