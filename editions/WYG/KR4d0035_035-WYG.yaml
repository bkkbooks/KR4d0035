body:
  text: 蘇魏公文集巻三十五宋蘇頌撰外制皇叔彰德軍節度使左僕射同中書門下平章事宗樸故育母樂安郡太君吳氏追封永嘉郡太夫人勅朕惟祖宗敦睦之義定爵禄名數之差雖位為公侯猶不以親私而干寵恩有顧復乃當用子貴而議封禮亦為宜朕安敢恡具官某故育母某氏謹幽閒之治有柔潔之風奉事王宮夙彰於賢範挺生懿戚方嗣於慶宗向縁禋類之恩載形追命之請稽諸甲令抑有舊章以副筓象服之儀為厚穸華阡之賁尚兹冥漠歆是寵榮可皇兄故金紫光禄大夫右武衞大將軍世符可贈鎮海軍節度觀察留後北海郡公勅夫睦親之恩生則有班爵之等恤後之義殁則有􅈖禭之榮特舉彛章用寄哀戚具官某天枝擢秀宗邸稱賢寖陶信厚之風克謹驕盈之戒早膺時寵荐服衞環假節兵防秩視通侯之貴奉朝禁籍日勤拱著之趨詎謂盛年奄兹徂謝九州近鎮兩使隆階用加飾壤之儀仍胙封公之爵營魂未泯漏澤是歆可皇伯故右龍武大將軍克友可贈華州觀察使華隂侯勅班爵之榮所以表孰睦之義贈䘏之典所以厚始終之誠眷言宗邸之賢乆預朝閨之列奄兹淪逝宜有追褒以爾具官某挺生王家早聞邦教不以貴寵而易其守故能謙慎而保厥家籍在衞環峻官儀而益重任兼團結持使節以參華何圖盛年遽遘凶閼禭以亷車之秩胙之侯社之田寄我悲懐慰爾冥路哀榮之禮兹莫重焉魂而有知歆此殊渥可皇弟右千牛衞將軍仲涂可贈右屯衞大將軍勅國家之於宗族惇睦之恩至矣生則有寵貴之榮殁則加追賁之典惟其禮秩皆不與外庭比所以厚親戚而厲人倫也以爾具官某温良之性得於天資謙慎之儀成於邦教處貴而能循禮法奉朝而匪懈夙宵假寵衞環方參聮於表著棄捐館舍遽淹質於泉塗宜推褒恤之文且示哀榮之渥八屯峻列大將通班刻以蜜章告於循路顧明靈之未泯諒滲澤之可承可故楚國大長公主可追封秦國大長公主謚莊孝勅外館懿親生而視王侯之貴曲臺故事殁則推贈賻之恩言念平陽之婣素鍾長信之愛方見尊寵遽兹淪亡宜加䘏典之優用寄悲懐之切以爾某氏麗穠華之質分星婺之輝生於宸闈蔚有賢範降嬪戚里蚤開府屬之榮胙土名區載徹粉田之賜朕以仁祖之息諸姑之倫荐崇秩儀固越彛等不幸罹於美疢奄然奪於盛年追惟淑靈當有褒表夫節惠之義實重於二名進封之科莫先於成國以顯服而旌遺徳以刻章而告幽途情禮並隆明誠斯饗可故永嘉郡夫人趙氏可追封蕭國夫人勅貽彤懿範生則有脂田之封漏澤深仁殁則有禭章之飾追懐遺美特示榮褒以爾故某氏體質柔閒性資循裕夙謹女圖之鍳内參宮尚之聮而淑質靡留徂年早謝嘉乃柔風之茂宜推象服之華國壤疏恩壙宵増賁想芳靈之未泯宜寵典之斯承可皇太后姑故右侍禁李守慶妻髙氏可特封延安郡夫人勅朕丕承先烈欽奉母儀矧彼諸姑實冠親姻之黨特加異數式隆惇愛之風皇太后姑故具官某妻某氏備有徳言能循法度早歸嬪於華族方尊寵於外家以推恩章抑惟舊典爰進封於善郡且加號於小君所以上慰慈顔兼褒懿範膺兹嘉命克保殊榮可皇太后妹右班殿直聶宣仲妻髙氏封平恩郡君勅外家之愛禮有惇隆從母之倫恩宜顯厚加崇命數豈限等彛皇太后妹具官某妻某氏毓質粹和秉心柔令結衿褵於夫室夙擅華腴侈車服於親姻尚稽表異躐進號封之美仍開郡壤之榮祇服褒章永綏福祚可皇太后妹皇姪故鄆州觀察使令典妻髙氏封長樂郡君勅朕惟長樂之姊弟相在藩侯之室家戚屬並優禮意宜厚稽諸令甲當有寵褒皇太后妹具官某妻某氏系出舊勲望髙外族有閒和之範來嬪宗婣有介靜之誠能保婦操爰推惇叙之澤超進號封之榮善郡美名用旌賢懿隆恩異數當克欽承可皇太后姊皇伯文州防禦使宗逵妻封咸寧郡夫人勅朕惇睦九族尊事兩宮惟國藩世母之賢本長樂天倫之愛宜加顯命庸慰深慈皇太后姊具官某妻故某氏藴柔德之和襲舊勲之慶夙推婦順歸我宗英雖懿質之早零想芳猷而未泯載稽典式寵進號封追榮象服之崇用賁壙宵之貴淑靈不昧厚渥斯承可太皇太后姪孫曹詮女皇叔克頠妻曹氏封同安郡君勅長信族屬宗室世婣案諸典章所宜寵異矧夙承於愛育宜特茂於恩徽以爾具官某妻某氏資禀靜專幼聞禮教出於椒禁歸我藩侯亦既宜其室家能不失於婦道因疏郡壤命徹號封祇欽奬綍之榮益念荐蘩之助可皇兄右千牛衞將軍叔皮妻曹氏可封永嘉郡君勅具官某妻某氏宗室諸婦禮有賜封長信外門恩先近屬厚親廣愛在義則然以爾承地胄之華富柔明之美早被慈闈之訓育能勤女史之箴規鞶佩有行既歸於邦族粉田均澤宜茂於寵章進開郡壤之榮用顯戚藩之盛膺兹麗渥保爾令名可祁國長公主乳母侯氏可封壽光縣君勅某氏朕以長公主先帝之息我之同氣築館於外筮日有行恩禮所加固宜優異惟其阿保之列夙勤燥濕之安寵以邑封蓋循邦制往承渥渙毋替謹柔可左羽林大將軍令圖故母同安郡君王氏可追封南康郡夫人勅向者禮成郊報恩浹幽明惟班著之聮咸被顯親之澤矧宗藩之秀方深念母之懐加厚䘏章抑惟舊典具官某妻某氏柔儀有度順德不愆嬪我懿親夙彰賢範雖歎徂年之謝尚嘉有子之良縁兹慶條進以封號俾追榮於象服姑用慰於寒泉㝠漠有知寵靈是享可尚書吏部侍郎叅知政事韓絳封贈三代曾祖處均贈金紫光禄大夫太師中書令可特贈兼尚書令餘如故勅任人共政國體之所先揚名顯親人臣之尤貴屬我登賢之始爰推率祖之恩峻以職儀慰彼誠孝以爾某生禀純德世服文儒居則仁義充其中不以紛華悦於外養浩然之氣自樂於鄉閭遜貽厥之謀遂開於似續作我良輔時其裔孫因進擢於台司俾再加於冊命以中臺總領之秩告三世享嘗之庭臣子之榮可謂至矣所宜歆識益祚爾家可曾祖母追封秦國夫人李氏可追封秦國太夫人勅貳公演化方登用於柄臣追孝奉先宜褒榮於世配荐推恩數用賁家庭以爾具官某曾祖母某氏挺柔順之姿躬德言之範夙成壼則茂振嬪風雖乆閟於音容尚克流於惠聞曾孫之慶大政是毗副笄六珈巳屢頒於象服沃野千里宜載徹於粉田併爾寵章式旌遺懿可祖保樞贈太師中書令尚書令可追封燕國公餘如故勅今夫與我共守祖宗之業而裁成天下之化者非二三輔弼之臣歟故於進拜之初優其禮命而追榮及於祖考所以欲其移孝而為忠也以爾具官某祖某天質渾厚噐識閎通有長者之風而自晦其德有君子之澤而垂裕於後克生賢嗣為時大臣今而令孫復嗣厥位薦厯機庭之貴進毗台宰之司奕世三公宗祏巳崇於典册封爵五等燕邦載徹於土田告諸幽扄識兹茂渥可祖母追封魯國夫人周氏可追封魯國太夫人勅登四近之臣賛萬幾之務恩隆體貌義切股肱諒非積慶之有源曷副疇咨而入用爰推異數用表先芬以爾具官某祖母某氏禀訓姆師能勤婦道約珩璜而制禮動中音儀潔蘋藻以承家克修宗事藴是懿德鍾於後昆翟茀之儀巳加於象服脂澤之邑載錫於名區不易故封式昭遺美淑靈未泯厚渥斯承可祖母追封魯國夫人郭氏可追封魯國太夫人勅登用二府所以圖國家之治追寵三世所以教臣子之忠我有碩臣方毗大政封崇先代抑有彜章以爾具官某祖母某氏性藴淑和道遵慈儉出於華胄歸彼令人曾微出梱之言居有擇鄰之訓積是餘慶克昌後昆維子洎孫繼顯庸於台路徹田胙國屢加寵於國封曲阜舊邦小君美號再加錫命庸慰孝思維精魄之未亡尚寵靈之是識可父億贈開府儀同三司太師中書令尚書令上柱國可追封周國公餘如故勅流之長者由夫源深枝之茂者自乎本固眷我碩輔出於名門若時奮庸克大前烈將慰述先之念載疏錫壤之恩以爾具官某父某在仁祖世以嘉謨碩畫進貳機衡忠規具載於廟彛義訓乃貽於子舎朕以絳體質方重論議純深願為良臣善守先代擢於世職可謂象賢當其拜衮之初必動履霜之感相爾舊國時維成周再加九命之崇用顯三公之世告於宗祏尚或歆承可母追封普安郡太夫人蒲氏可追封崇國太夫人勅陟台衡而預政方擢幹臣飾泉壤以疏封盍旌懿範屬此疇庸之始爰推錫類之恩以爾具官某母某氏挺生慶門作配君子有四德之美成二族之和室家之宜既克成於婦道日月其逝愴弗逮於朝榮宜因嗣子之登台載徹脂田而錫命小君之號啓國於崇并示寵靈賁於廟室可母追封平陽郡太夫人王氏可追封榮國太夫人勅禮傳所稱女子有三從之義册命之錫封爵有四等之殊緬維芳風實兼具美以爾具官某母某氏丞相太尉之子中令周公之妻出自慶門歸彼時傑生見榮盛殁餘慶靈有子而賢載世預政属咨俞之拜後念顧復之有懐俾擇名區用胙乃國二族顯赫無若爾家前史所謂婦人之貴其謂是乎魂而有知當歆茂渥可新除右諫議大夫叅知政事王安石封贈三代曾祖勅禮稱天子之大夫祭及三世又曰父為士子為大夫亦祭以大夫蓋從生者之禄由古然也今夫執政之臣同體元首顧其名數豈特大夫之比則追賁祖禰禮宜有加具官某曾祖某江左之秀德噐素髙義訓之傳世風自逺榮名不顯於當世慶善乃流於後昆惟其令孫作我良輔方属登台之始用推本祖之恩以儲宫保輔之崇為宗祏追崇之美精爽不昧寵靈是歆可曾祖母勅國家登用輔臣躐加命數參六卿於朝路預我政幾享三室於家庭逮其世配均推滲澤庸逹孝思具官某曾祖母某氏明智自將慈嚴合度宜其家室蹈嬪則而不踰貽厥孫謀賛台司而伊始命追榮於大郡且加號於副筓既啓有家之榮冞光積善之報淑靈如在厚渥其承可祖勅夫積之厚者其流光位之崇者其禮異我得棟幹擢在柄司立於朝廷則有協心同體之義念其祖考豈無進封飾壤之榮稽若故常具存彛典具官某祖某服道秉誼含章葆和寘彼周行未登貴仕之列施於孫子蓋有隂德之慿用裕厥宗再世而大王室其乂祖構是承惟東儲二品之班視前世三孤之秩錫此明命賁於私庭魂其鍳兹罙祚爾後可祖母勅國家待執政之臣禮亦重矣既尊寵其人又追賁其祖妣所以嘉似續之慶因以勸夫在位重其本而厚其報也具官某祖母某氏挺賢明之識兼婉淑之儀善行積於厥家慶靈乆而後大參予近弼之貴時乃令孫之賢諗是忠規本乎門法彤管有煒既彰家道之成象服是宜乃正封君之號兾爾㝠漠嘉兹寵靈可父勅前史稱臧孫逹之有後又美鄭公業為不亡蓋繼之者賢則美濟厥世未若父為儒者名稱於一時子為輔臣寵延於三世非其善訓夫豈享兹具官某父某素履清修周才敏邁䇿名從政進乃望郎之華佐郡典州藹然良吏之稱位弗充量福固有基若時嗣子之賢登我台司之貳逮親之感方對於鼎茵追往之恩用加於冕紱以儲師之峻秩為禰室之褒榮魂而有知饗此殊私可母勅朝廷莫如爵故二府有異數之加寢廟莫如親故三室有同牢之享矧惟妣德之懿豈吝䘏章之褒具官某母某氏言憲典常德馴慈順歸儷良士寔生令人諷召南之詩則蘋蘩之薦不失服季姜之戒則經幅之喻以明時其邦傑之奮庸抑自家庭之垂裕參聞國論既聮三事之崇追述母儀用錫六珈之副兹所以彰我闓澤之漏慰彼寒泉之思緬兹淑靈享是嘉命可母勅仕之貴者莫貴於作弼孝之大者莫大於顯親登賢既預於政司報德宜先於禰室推存念往我何吝焉具官某母某氏備有言容能循法度從夫而仕則内助之德修有子而賢則隂德之施顯属兹圖任之始固切慈顔之懐用加號於小君且進封於大郡侑爾宗祏既開家采之榮利於嗣人無忝公台之寄可觀文殿學士兵部尚書知青州歐陽修父勅郊之祭也上以恭天地之報下以揚祖宗之休屬告成於盛儀遂推行於惠澤眷吾台衡之舊適宣方面之勞懐其先芬既極顯揚之美胙以成國式章尊寵之名具官某父某毓德士鄉䇿名聖世藴濟時之用位下而不得施慿積善之祥澤流而逮乎逺果有賢嗣大其門閭衮衣蜜章已峻九儀之貴國封公爵俾増千乗之榮非徒嘉爾教忠之能抑亦成吾廣孝之義精爽不昧優渥是承可母鄭氏勅精禋類帝所以訓天下之恭揚名顯親所以教人臣之孝曰予邦彦有懐母慈宜推慶恩用光賢範具官某母某氏生有淑質歸於德門詠蘋蘩之詩則婦道克順明經幅之喻則母儀備存貽此哲人作我良輔生雖不及鼎茵之享殁而屢有湯沐之加承此神釐進以大國夫封爵錫命誠未足慰孝子永慕之情而旌善表賢抑可以成公朝奬勸之義惟爾㝠漠歆兹寵靈可妻薛氏勅夫祭祀之澤廣矣既已推於群臣而又逮其家室所以明神惠而厚人倫也矧吾舊德之配夙聞主饋之賢慶典所覃寵章宜厚具官某妻某氏出髙明之胄有柔婉之風作嬪良人克相宗事潔蘋蘩以承祭匪懈温恭服副筓而預朝薦膺榮渥属遘邦釐之洽載陪郡壤之封且擇美稱益光内治往對褒華之命勤宣輔佐之功可翰林學士右諫議大夫司馬光父贈司空勅朕宅位之再歲考卜郊之三年天其相予既克成於熈事福不專享是用惠於庶工且追賁於先芬俾顯揚於世美具官某父某德器閎茂風規峻凝徊翔臺閣之華宣布藩朝之政經綸之業猶未究其施為燕翼之謀蓋有貽於似續時其子舎服在禁林方見尊寵於朝廷固已崇大其門構姑縁禋燎之慶載加襚服之榮秩以上公位乎空土豈特章名臣之餘烈抑以慰嗣子之孝思㝠漠有知寵章其享可龍圖閣直學士工部侍郎張掞父贈司徒勅朕因郊以承天之序念親以及人之先爰推慶恩式叙在位矧予名德之舊夙紹素風之傳䘏典所加褒章宜厚具官某父某躬服道誼内懐器能䇿名清時仕不充於雅望垂裕後嗣職乆列於近班蓋源之深者流自長而位之隆者禮亦異姑縁肇祀之渥用顯教忠之能秩以上公總乎五教尚歆告第之寵益胙有家之蕃可侍衞親軍馬軍都虞侯楊遂父勅郊丘之祀所以訓天下之恭贈襚之恩所以逹諸臣之孝甫成熈事爰覃慶章且先追往之恩用慰因心之感具官某父某吉履有素鄉評所推善行在躬而未彰慶靈至子而乃復勤宣職業良嘉父教之忠欲報劬勞俾進尹環之列尚歆殊渥永裕後昆可母勅郊祭之推恩也上以均天地之况下以揚祖宗之休福釐紛然中外時若眷言拱著之列方逮承顔之榮宜厚寵章用昭報德具官某母某氏以柔賢之美既宜夫家以慶善之慿獲從子貴俾躐封於大郡且均寵於北堂欽承優渥之恩益嚮壽康之福可妻勅朕初郊泰元大賚天下思與士類均承福釐眷言拱衞之聮並開爵邑惟其家室之慶宜懋寵章具官某妻某氏備有言容能循法度從夫而顯主饋是承属大祀之休成均湛恩而下達進榮大郡増美華宗益宣内助之勤用稱重封之渥可樞密使劒南西川節度使守司空兼侍中文彦博奏汾州介休縣草澤史釗妻文氏追封永嘉縣太君勅某氏鍾慶德門歸嬪吉士属徂年之早謝閔昆裔之靡承眷我台宰之賢方有諸姑之愴願移恩施正以號封俾開爵邑之榮慰彼幽泉之路顧惟精魄尚識寵光可蘇魏公文集巻三十五
