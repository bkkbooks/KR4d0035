body:
  text: 蘇魏公文集巻二十三宋蘇頌撰内制賜新除門下侍郎劉摯辭免恩命不允詔勅劉摯省所劄子奏辭免恩命事具悉卿敏識周才宣力中外自預幾政屢告嘉謀南省西臺動為故事擢居東掖時乃次遷惟兹喉舌之司益重腹心之寄亟就厥位毋煩固辭所請宜不允故兹詔示想宜知悉賜孫固辭免轉官知樞宻院事不允詔勅孫固省所劄子奏辭免恩命事具悉卿向在先朝嘗搃幾宥委柄去位於兹累年暨處東臺又復踰歲老成之徳中外式瞻還長西樞乃原舊職本兵之政方竚逺猷辭劇之言無煩至再所請宜不允故兹詔示想宜知悉賜新除中大夫守中書侍郎傅堯俞辭免恩命不允詔勅堯俞省所劄子奏辭免恩命事具悉卿徳器人流乆推士論四朝綿歴荐著事功其在班聨最為耆舊朕髙選近輔預政西臺無若汝宜遂命以位剡章來上畏寵為言已諒乃誠宜毋固避所請宜不允故兹詔示想宜知悉賜通議大夫新知亳州鄧温伯不許辭免龍圖閣學士詔勅温伯省所奏蒙恩授龍圖閣學士乞賜寢罷事具悉卿文苑宿名禁林舊望服衰去位中禫終喪往分譙社之符仍進羲圖之序始優耆哲均重輔藩遽上奏封過自退託矧乆勞於侍從固宜厚於寵章其即欽承以副眷待所請宜不允故兹詔示想宜知悉冬寒卿比平安好遣書指不多及賜新除中大夫守中書侍郎傅堯俞辭免恩命不允詔勅堯俞省所再上剳子奏辭免恩命事具悉中書政本大命所基自非通才莫稱斯任以卿有忠嘉之論士議所歸使之預丞弼之謨僉言惟允奚自退託欲避寵榮雖由爾衷殊昧朕意巳行之命宜即欽承所請宜不允故兹詔示想宜知悉賜殿前副都指揮使武康軍節度使劉昌祚奬諭詔勅昌祚樞宻院奏勘㑹卿前任涇原路經畧安撫使奏請經營措置奉行朝㫖專切置局根括打量到隴山一帶及安化縣復置弓箭手地上并招刺印到人馬事眷彼隴山控於平夏異時疆埸之警介在阸隘之衝卿向以武才出按邊瑣圖上方畧奉行新書封畛既明卒乗斯復遂俾戎亭之境永無甌脫之虞繄爾有勞紓我西畧故兹奬諭想宜知悉賜外任臣寮進奉謝恩馬詔勅某省所進奉謝恩授某官并賜月俸公使馬共四匹事具悉卿初拜恩綸言輸貢物惟是右牽之駿用將致逺之誠再省忠勤不忘嘉歎故兹詔示想宜知悉冬寒卿比平安好遣書指不多及賜太師平章軍國重事文彦博四上劄子陳乞致仕示諭詔勅彦博省所四上劄子陳乞致仕事具悉朕纂服之初任賢圖舊以卿躬富道徳昔有勲勞輔相我祖宗位冠羣后思見其風采召自别京尊以上公委之重務謀謨四載終始一心方有賴於耆明乃屢辭於事任雖詔書敦諭對見面言而不奪之諴乆而彌篤浩然之志固難必留屬以氣候凝寒道塗涉逺深虞偃薄靡遂便安姑俟及於春和即議從於所欲尚宜勉强以副優隆故兹詔示想宜知悉又詔勅彦博覽所四上劄子陳乞致仕事具悉卿仁祖之舊相社稷之元臣位冠台司勲在王室功成謝事士望尤髙向特起於燕居俾輔成於初政忠言宻議固多軍國之謀請老告歸疊有封章之遡不轉之志其堅若山雖駟馬安車當遂里閭之佚而増冰積雪尚艱道路之寒須及中春議從所欲姑體至眷尚安厥居故兹詔示想宜知悉賜戸部尚書吕公孺乞致仕不允詔勅公孺省所上表伏望檢㑹前奏乞致仕事具悉地官之長省務尤繁爰擇時髦總領邦計卿朝之舊老世載忠規尹正王畿早聞治效均節財用實竚猷為何遽引年遂欲謝事士有致於為政雖嘉乃誠時方藉於耆明難從所欲姑安職業用副眷毗所請宜不允故兹詔示想宜知悉不許詔勅公孺覽所上表伏望檢㑹前奏許致仕具悉卿公卿華胄經濟通才宣力四方藹然治績典司六職總彼邦財心計有聞齒髮彌壯何屢陳於奏牘遂欲去於里閭雖援據禮經良嘉止足而益埤王事方賴老成尚安厥官以副予意所請宜不許故兹詔示想宜知悉賜保寧軍節度使知大名府馮京上表乞致仕不允詔勅馮京省所上表為年七十陳乞致仕事具悉古者大夫有還政傳家之禮時之元老乃同心一體之臣進退之間豈限常格矧卿年耆徳茂為近著之表儀位重任隆守北門之管鑰顧惟都㑹之地方賴保釐之功何為抗章遽欲謝事雖懐謙知止深嘉明哲之風而圖舊尚賢未體朝廷之意惟勉遵於事守副委屬於予衷所請宜不允故兹詔示想宜知悉春寒卿比平安好遣書指不多及不許詔勅馮京覽所上表為年七十陳乞致仕事具悉卿擢甲科於仁祖之世輔大政於先皇之朝文物典章載於臺閣號令風采布於藩宣方提節制之師外委北門之管年徳兼茂體力素强何嫌而上封引禮而告老雖嘉知止之分未副任賢之方尚專精神務近醫藥坐鎮樂俗綏安遐邇克終逺猷時乃嘉績所請宜不許故兹詔示想宜知悉春寒卿比平安好遣書指不多及賜西蕃邈川首領河南軍節度使阿里骨進奉回詔勅阿里骨省所差人進奉事具悉卿保有封域作我翰垣逺致風宜入充貢式言念傾輸之志良増眷奬之懐卿所進生金乳香象牙䃃砂碼碯等各依例估價就整回賜錢銀綵絹故兹詔示想宜知悉春寒卿比平安好遣書指不多及賜御史中丞梁燾辭免兼侍讀不允詔勅梁燾省所奏蒙恩除兼侍讀伏望特寢誤恩事具悉卿文館舊賢士林偉望立朝多補衮之益執憲有直䋲之風朕登用耆儒入助講學闕疑資訪方延褚馬之才俞往汝諧難徇桓彭之遜往祗成命傾竚嘉言所請宜不允故兹詔示想宜知悉賜知大名府馮京進奉興龍節馬并冬節馬詔勅馮京省所進奉興龍節馬一十匹并冬節馬二匹事具悉卿中鉉耆英北門重寄向屬天正之序繼臨星渚之辰載擇材駒入充貢式嘉乃傾輸之意益深注想之懐故兹詔示想宜知悉春暄卿比平安好遣書指不多及賜侍衛親軍步軍副都指揮使徐州觀察使知渭州劉舜卿進奉賀冬節并賀正馬詔勅舜卿省所進奉賀冬并賀正馬各一匹事具悉正至稱觴邇遐效貢嘉乃帥垣之長載差地産之良逺致連編益彰忠藎故兹詔示想宜知悉春暄卿比平安好遣書指不多及賜保寧軍節度使知大名府馮京再上表乞致仕不允詔勅馮京省所再上表陳乞致仕事具悉貴徳尚齒先王之令猷入輔出藩大臣之常職朕尊優耆哲委任事為輟卿坐鎮於朔陲彼俗方安於善教何乃徇大夫之禮必欲致為政而歸在進退之則然顧簡注之宜異難從所守當體兹懐毋或重言以煩多訓所請宜不允故兹詔示想宜知悉春寒卿比平安好遣書指不多及不許詔勅馮京覽所再上表陳乞致仕事具悉卿文學政事名重於朝廷器識才謀功宣於巖廟方委北門之管縂臨中冀之區何遽厭於事權屢請還於印紱雖引年避位良髙止足之風而經逺殿邦兹賴耆明之望再披章牘深亮冲謙宜體至懐尚安厥職所請宜不許故兹詔示想宜知悉春暄卿比平安好遣書指不多及賜保寧軍節度使知大名府馮京辭免加恩不允詔勅馮京省所上表辭免加恩事具悉昨者宗祀禮成神釐施普惟卿先帝樞衡之舊方守北門管鑰之嚴雖不在顯相侍祠之班而逺修公侯助祭之式加地進律固宜先於庶工遜爵辭封何遽形於需奏時乃常典毋煩多言其體至懐亟成服命所請宜不允故兹詔示想宜知悉春暄卿比平安好遣書指不多及不許詔勅馮京覽所上表辭免加恩事具悉惟我弼臣為國良翰九筵宗祀雖不與陪祠之勤四海職來抑亦有助祭之貢禮成之慶恩數有常其在臣工咸均於况施矧卿舊老何疑而遜辭毋持過謙其即祗命所請宜不許故兹詔示想宜知悉春暄卿比平安好遣書指不多及賜新除䕶國軍山南西道節度使守太師開府儀同三司河中興元尹潞國公文彦博辭免兩鎮恩命不允手詔省所劄子奏辭免兩鎮恩命止以本官致仕事具悉卿四朝重望七紀髙年朝廷之所仰成夷夏之所蘄嚮浩然歸志確乎莫留閔勞以幾政之煩俾遂其燕居之適三公典册兩鎮節旄皆所以尊禮帝師褒顯耆哲雖非外庭大臣之比抑有先朝念舊之恩矧卿謝事而歸佚老宜異比之將相之任職固無權寵之為嫌何其過謙乃欲辭避宜悉兹意亟對徽章所請宜不允付彦博不許手詔覽所劄子奏辭免兩鎮恩命止以本官致仕事具悉爵位崇髙在禮宜加於異數公師進退推恩抑有於隆名矧卿徳齒之尊職秩之重弼亮四世始終一心告老之章凡數十上優賢之命恨無以加故以蒲梁之節旄俾光伊洛之里第况有前比固非過私毋煩遜辭宜即膺受所請宜不許付彦博賜新除護國軍山南西道節度使守太師開府儀同三司河中興元尹潞國公致仕文彦博辭免冊禮允詔勅彦博省所劄子奏今以舊官致仕乞免行册禮事具悉名位不同禮亦異數上公之行册命盖有舊儀來奏之辭寵章願如前請自非趣向之髙逺渠能遜慤之再三省閱之餘嘉歎無已所請宜允故兹詔示想宜知悉許詔勅彦博覽所劄子奏今以舊官致仕乞免行册禮事具悉國家尊上公之秩為帝者之師命數有加册禮尤重六登上衮三拜維垣再致為政而歸懇避臨軒之寵良嘉謙徳特徇至懐所請宜許故兹詔示想宜知悉賜保寧軍節度使知大名府馮京三上表陳乞致仕不允斷來章詔勅馮京省所三上表陳乞致仕事具悉貴徳尚齒帝王所以禮髙年尊賢任能朝廷所以圖舊徳矧在耆哲時方仰成致為臣而歸卿固欲潔去就之分煩官職之事朕亦思得忠嘉之謨雖屢閱於封章必難從於雅志卿其深體眷意勿忘公家保釐我朔都鎮綏我邊裔無輕進退益茂猷為今差入内内侍省東頭供奉官勾當内東門司馮世寧賜卿詔書及茶藥各一銀合至可領也所請宜不允仍斷來章故兹詔示想宜知悉春暄卿比平安好遣書指不多及不許斷來章詔勅馮京覽所三上表陳乞致仕事具悉公卿大臣中外所屬進退之際去就非輕職閒無事則或許引年任重有守則難言佚老矧卿年耆徳茂名大位尊論舊則輔翼於先朝語寄則居留於朔甸雖欲自便諒非所安三復來章徒嘉致懇尚當體朝廷之意豈在言筋力之勞勉安舊邦宜停後請今差入内内侍省東頭供奉官勾當内東門司馮世寧賜卿詔書及茶藥各一銀合至可領也所請宜不許仍斷來章故兹詔示想宜知悉春暄卿比平安好遣書指不多及賜皇弟賀禮畢荅詔勅某王朕遵先王之舊章躬季秋之大享祗見上帝配嚴禰宫方竣事於路朝遽披文於奏幅再嘉謹禮益喜早成賜在外公主賀禮畢荅詔勅某人陽館親祠遂逆釐於神貺棨封上奏慶已事於宗祈嘉彼懿親率由禮則披省之際褒歎在懐賜内中公主賀禮畢荅詔勅某公主朕即明堂布政之宫展嚴父配天之祀薦祼斯畢神人以和汝適在㓜齡習聞盛典露章稱慶率禮良嘉賜吳楚國安仁賢壽夫人張氏賀禮畢荅詔勅某氏比者卜秋之季吉日惟辛並享帝親既燔牲玉宫庭之舊儀典惟詳馳上慶函深嘉能事賜貴妃苗氏以下賀禮畢荅詔勅某氏早事先朝著表儀於宫禁逮兹宗祀載順美於封章形於温縟之詞見乃恪恭之範省閱于再褒尚尤多賜内中慶國夫人竇氏以下賀禮畢荅詔勅某氏奠玉合宫親展三年之祀貽彤内屬恪居衆職之先遘此休成普同贊喜再披來奏益顯盡恭賜内中左右直御侍郎君掌賓王氏已下賀禮畢答詔勅某氏等早序禁庭克勤内職宗祀方行於鉅典慶成爰上於封章再披贊美之詞兹見恭勤之意蘇魏公文集巻二十三
