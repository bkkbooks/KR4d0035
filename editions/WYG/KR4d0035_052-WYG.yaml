body:
  text: 蘇魏公文集巻五十二宋蘇頌撰碑銘太子少保元章簡公神道碑國朝登用輔臣盡循唐舊乾德二年太宗皇帝始置參知政事以貳宰職六聖繼承遵守不改自乾德訖熈寜百餘年間得人之盛見於國策者七十有六人或以文學進或以武功顯或自右樞而叙陞或由夙望而入用或以臺閣久勤而次遷或以藩州治效而超拜卿材國器相望於廟堂從而正宰衡執邦柄者常什七八焉若乃耆德宿名體備數器政事為良吏表儒學為羣彦先出入藩朝旣勞且舊有如故太子少保致仕贈太子少師魏郡元章簡公者幾希矣公諱絳字厚之杭州錢塘人其先本危氏案崔琳姓苑危姬姓也後封於新世久寖微秦漢以來雖有仕者未甚顯大其一支著臨川郡之南城縣世力農以財雄鄕里唐季江淮㓂盗充斥公之曽祖諱仔倡與其兄全諷鳩合鄕人即所居立壁壘逺近依以為援中和五年破黄巢之黨栁彦章於象牙潭天子以全諷為撫州刺史仔倡信州刺史吳王楊渥克定江西撫州降吳徙江都信州奔錢塘遂易元氏生公祖諱徳昭武肅王稱制用以為相官至右僕射兼侍中晉國公晉公九子其八廕補王官幼子諱守文入朝中咸平進士第官終大理寺丞知白州公之考也公幼孤流寓江湖卓然自立向學不怠九嵗謁荆州太守孫公冕面試三題以神童薦於朝貧不克行十八拔開封進士薦廷試優等以聲病降同學究出仕廹於親養不遑擇祿調楚州淮隂縣主簿嵗惡蟹蝗害稼民户訴災轉運使按狀以為無損公親履田畆覈實蠲租上不能奪是嵗楚之四邑獨淮隂民免轉徙之患鄕貢再上擢乙科授江寜府觀察推官明道旱災江淮薦饑官發廪米為糜淖以哺流民公職其事躬自給視饑病者數萬皆得以濟大尹李康靖公安撫范文正公上其事召見改秘書省著作佐郎連知吉州永新通州靜海二縣或以治劇選或以幹裕薦並書課聞於朝擢江西轉運判官職罷願試繁郡會天台水溢城郭漂溺千餘家被命知台州至則出公庫錢即民故居作廬舍令自占期三嵗償所逋又甓其城牐其門以捍江濤之患自是水不敗城郭代還權三司度司判官屬甘陵兵旱之後道殣相望庾無見儲責在度支公為之校耗登調盈虚轉它州贏粟給助其乏踰年出為江西轉運使奏除一道民籍丁錢貧老者蒙利尤多皇祐三年廣源儂蠻㓂二廣守漕皆坐失律免官朝廷旰食為擇使者就加公直集賢院充廣東轉運使始踰嶺徑趨賊衝躬相隘險瀕江建水砦數十繕治諸州城樓堞戎器纎悉如法上聞特遷一官歴兩浙河北轉運二司鹽鐵副使擢天章閣待制知福州治平初拜右諫議大夫以給事中知應天府兼南京留守徙河北都轉運使過都陛對奏陳中外利病英宗皇帝面稱之曰論事者無如待制忠朕弗忘也神宗即位進尚書工部侍郎以待制換集賢院學士是嵗遷龍圖閣直學士知廣州時南方嵗凶盗熾州郡多故凡五嵗中連徙越荆鄆三州皆兼一路使職未至鄆召入翰林為學士公早以文學擅而久更吏劇負其夙志雖簿書填委而未嘗輟簡編捨翰墨晚遇知巳之主翺翔禁複得以攄發其藴故制書詔令純深溫潤切於事理至於一篇一詠徃徃出人意表秉筆之士以此多稱美之加又抒思精深長於應猝初景靈宫諸殿落成須上梁文詔以屬公薄暮受命黎明奏篇上上深賞激都下競傳誦之明年知開封府滿一嵗罷兼侍讀學士未幾權三司使坐屬官遺火焚省舍落所兼學士無幾何復職領羣牧使熈寜八年冬拜參知政事公自預政每進對上前敷奏詳悉曲盡誠欵諸公論議或同異公無所委隨惟正之助而謹畏慎宻雖對子弟未嘗及省中語也上雅稱公文詞高妙近世少儗足為朝廷光采雖在中書猶欲以辭令諉之每蕃夷書詔必令視草而後遣越三嵗告老於上曰臣年政七十矣願乞殘骸歸故里前後表請面陳至踰十數上敦諭再三又遣中人持還其章他日謂曰聞卿子耆寧孝謹好學今使之校書崇文以畱卿二朞公惶恐固辭不獲旣而謂親友曰上恩如是非孤臣之福自兹吾不知稅駕之所矣元豐二年春太學起虞蕃詔獄扳公嘗以族人伯虎語博士孫諤風祭酒補小學教諭辭逮耆寧名捕甚遽公駭不知所謂入訴於上曰耆寧幼失所恃未嘗跬步去臣左右父子更相為命二十餘年矣倉卒對獄實虞非意願納臣平生祿職以贖其命使即訊於家事之是非輕重一切聽報上惻然許之御史猶脅廹伏辜又詣府第以簿急責公公不復視遽取筆答具獄曰御史所訊皆是遂以本官出知亳州初獄成或謂公曰伯虎補職且半年耆寧未捕前數日方知以白公是豈有禱也諤又未甞造請安得私語事此一言可以自辨公曰吾大臣也旣以告上矣今若自明是前言不盡也豈有大臣對上言而二三者内省無愧復何辯為卒無一言及之至陛辭上察無它賜坐慰勞曰亳若非便易陳許可乎公謝曰旣蒙保全不誅又使擇地其敢自便若聖恩不遺得支郡如潁足矣即命改知潁州曰一嵗即召卿仍使服金艾如學士以寵異之明年加資政殿學士知青州詔許入覲遂留提舉中太一宫公志欲休老章又十餘上告病者數四一日上臨講邇英特召公面諭曰卿志力未衰尚可備左右勉為朕留進讀對曰西夕餘景無幾不幸顛仆而去或溘死不得歸骨先隴即目不瞑矣上深喜其誠至四年以太子少保致仕旣辭上曰卿預政中立不倚比有間言者朕自知之今旣罷去無嫌可營居京師且便耆寧仕宦朕當助卿費公曰臣有吳中敝廬倘可售即如詔旨特命二子分領鴻慶洞霄二宫俾居家就養行次畿縣又遣中使賜白金千兩戒以早為還都之行其恩意終始隆厚如此旣至吳脫略世故不問家之有無優㳺宴樂吟詠情性超然若出風塵之外後三年薨於家寢訃聞輟垂拱朝一日贈太子少師初上覧遺奏謂左右曰此表必元某自為者即日馳内侍問諸孤法賻外特賜百金戒其家集平生所為文章來上凡四十巻藏於秘閣公生大中祥符已酉終元豐甲子以天聖丁夘登仕以元豐辛酉納祿起州縣歴中外華要而至丞弼自著作佐郎十三遷至尚書工部侍郎官制行换正議大夫五易封爵至魏郡公凡九鎮藩郡而兼一路安撫鈐轄者四六經使任而江西河北皆再至入朝典領臺閣諸宫觀更踐省府揔十一職所至皆有治效而閩廣京兆善績尤著至今人猶稱道之以二品致政耆老富貴康寧考終夀七十六在仕五十八年修潔寡過保躬全名善始令終世鮮其比薨之明年某月某日葬於杭州錢塘縣某鄉某里去祖塋幾里所夫人太原王氏封某郡夫人蜀郡王氏封某郡夫人並祔公塋二子長即耆寧今為某官次耆弼某官兄弟孝謹善守門法敦睦友愛未嘗相離出入動息如公存焉二女一適尚書司封郎中李平一一早卒五孫延祖似之早卒紹京紹直紹孝並假承奉郎公生始孩稚頴拔不類常兒乳保嘗負之過佛室見所謂觀音像者輙喜笑若素所熟又指黄巻中普門品經欲持取去家中止之則啼號不已聞者嗟異以謂宿習之說不妄也性至孝自幼服勤親側不懈晨夕太夫人嘗寢疾寖亟公憂悸不知所為黙禱於天願以已代親所苦怳然若神示其象已而遂愈洎太夫人棄養服䘮毁瘠葬祭不踰禮制昆弟六人及子孫未有官者皆用公廕補入仕又市良田以賙族人之無禄者自少長拊存周至卒無異言其孝友敦篤行義如此公少歴艱苦周知物情儒術吏資葢得之天賦非勉強所能及接物極和易與人言洞然見底裏至臨事則嚴毅立斷下不能以毫毛欺紿在江寧攝治府下二邑戢狡吏撫疲民治譽藹然鍾山有民妻訴夫夜醉歸道為仇人折足至家而死公黙察妻泣不悲遽使歸聼命旣去隂遣吏躡迹見與一浮屠笑語立捕繫一訊而得姦狀實浮屠私其妻期是夕會於家旣至夫寢覺而遽起為所戕卒寘於法横山王氏子恃富不法常賊殺不辜里民目為王豹子莫敢與校一日因事追下獄公數其宿負榜殺之鄰里親戚莫不稱快永新土豪龍聿者嘗誘同里少年周整飲博以姦勝整千緡凖其上腴田以償直初猶代耕輸榖嵗久遂割占其田整母方知博事訟於縣則母契存焉於州於使者至撾登聞鼔皆不能直公至母又以告公視契一言以辨其偽聿具伏歸整田或問公以何見其偽曰始視契日月在母手印上是必得母他牘尾印以續偽契問之果然一縣驚嘆以為神明其典州使部不為赫赫名察見吏民隱慝纎悉不差然意本在寛情旣得則縱舍不窮其細故未嘗以文致人罪有􅀈獄集十三巻揔五十五事觀其書可以知公之所存皆得於平易忠恕也公病世俗靡薄朋友道䘮嘗後巳以從衆故與人交久而益親人皆稱公長者還吳日與鄉閭耆舊相過從遨逰江湖處布衣野老間無辨也内外掃之日初無吉疾無治命嗒焉順化人以為吉履之報焉公之薨也門人某官某狀公之行以告於太常考功集議諡曰章簡其葬也今資政殿學士龍舒王公銘公之德納諸隂堂舉是二者可以傳不朽矣而嗣子猶以為未也曰狀藏於官府銘置於泉塗見者葢寡禮令有碑揭於神道可以聳來世之觀聼也謂予早與公周旋尤詳行實假文以劖於石言念疇昔音旨如昨追而叙之一二可記公之在翰林也予方在朝廷每訓辭之下及應用手筆碑表詩歌多得覧觀其體制深重章句清裁傳在人口皆出新意由是知公之文無所不長也又嘗與公持論前言往行講尋源流或推究天人善敗之應互叩其所蓄往往更相推許由是知公之學無所不綜也昔公使南海當宼鈔之餘經畫尤多時予邕州從父守英州禦宼亦與有勞嘗云方宼之去也東廣生聚無不被其毒者非惟獠虜之遺孽抑吏卒乘亂剽掠甚於賊鋒無能摧郤者洎公之來也戢兵保民咸有條畫饑凍者得其衣食流冗者復其居處與夫驅除俘馘之勞殆不侔也由是知公之䘏民弭患之功逺矣公之得謝也予方謫麾横海相遇都下留連眷眷幾不忍别遂媾姻好至誠悃愊不以先後改觀此又知公篤於舊故雖古人之所謂久要不忘者何以過此故予嘗懷之未始忘也因孝嗣勤請得以詳其實告於後人亦公之雅志也銘曰元出於危其原自姬始有新邑世久寖微南城之族力富農貲逮公曽門遂顯於時曽門弟昆殄平孽虜臨川上饒析唐符土上饒入越從事伯府授氏承家實生公祖憲憲公祖遂相錢塘克大厥宗九子騫翔大理逢辰詞科奮揚徳厚位卑再世其彰其彰謂誰宫保是嗣特起江湖拔出羣萃方進孤童不汙下吏平津經術再登上第試政州縣惠弱鋤强上嘉治行寘彼周行中庸萬事勤勞四方有威有惠一時之望入陟公台神皇所簡曰惟汝賢恨用之晚公亦感慨傾輸誠款懇辭異數懼將不免訟興璧水譖起蚳泉刋章横逮朝聼驚諠上察非意公終不言去位未久朞年復還公屢告老章踰十上召對邇英一一咨訪詔寵其歸道塗賚餉官其二子使歸就養公旣還吳丘園是居朝昏湖嶠左右琴書耆老過從肴尊宴娛安時處順冥然化俱公葬武林反祖舊服墳闕崔嵬江山重複過者下車敬瞻喬木誦歌遺德清風肅穆錢起居神道碑仁宗皇帝濬哲聰文臨御嵗久朝廷治定天下晏清雖天德高明神機黙運人不可得而度思然跡其可見者虛懷納善樂聞讜言天聖中詔復方正直言之科慶厯初増置諫官御史之員於是抱忠懷道之賢博古能言之類策慮愊臆傾輸腹心啟沃聖聰日月相繼一言寤意則襃揚奬進聼用無間其逆㫖拂心詆訐過正則優容曲全甚者黜而復用終不以言廢人故四十二年之間近臣盡規衆職修理朝無闕政理絶名言士有特起遘辰雜遝並進登仕宻位公台出此途者葢十七八焉非特竒才異倫間出一時實由天衷樂育奬而成之所致然耳於時有若故起居舍人直集賢院知諫院會稽錢公越自朝行入奉大對受䇿察問五千餘言推原天人指切時政天子親覧稱歎移刻考官奏第三書異等超擢臺郎試守藩郡士人傳槀遍於海内咸以謂仲舒之淵源劉蕡之切直劉向之發於至誠郤詵之對揚天問復見於兹時矣先是真宗皇帝景德中再闢六科公之先君翰林公襃然首舉慶厯初公之亞弟端明公復中兹選後四年公又繼之一門之美前世未有當時詩人詠歌有賢良方正舉父子弟兄同之句士大夫載述以為衣冠卓異焉公諱彦逺字子髙系出錢塘吳越武肅王之裔曽祖諱元瓘晉天下兵馬大元帥嗣國王薨諡文穆祖諱倧遜位於其弟以王爵為東南面都元帥國朝累贈太師尚書令中書令父諱易少舉進士名動京師歴内外制典兩朝書命累贈太尉妣盛氏江東著姓太子太傅文肅公之族屬追封平陽郡太夫人公弱嵗而孤與仲氏僑居輦下執䘮盡禮奉養太夫人溫凊弗怠刻意家學至於大成初以賞延再命將作監主簿三遷大理寺丞景祐五年登進士乙科簽書忠武軍節度判官公事賈許公任御史中丞辟為推直官許公預政繼職者奏留倚其繩正朝列辭以四推獄官不當越職尋出通判明州在郡摘州卒謀亡竄海外者鞫會稽累年田訟数十人兩郡稱治遂以太常博士應詔遷尚書祠部員外郎知潤州六年秋九月也是冬涉春京畿旱災天子責躬詔訪中外得失公旣以言見擢雖在外官而懷不能已復奏䟽三千言上塞詔意是時江淮嵗歉丹陽復苦蝗孽公募民捕掘蝗子以常平粟計升斗易之焚瘞殆盡復上其事遂著為令又平粟中價貸下户計司以為專命損上責所由備償餘直公請歸罪守長金山寺主僧承前宣勅補授郡官待以客禮公至令班諸寺僧首廷見不與交語旣而寺罹火災其徒訟庫錢乾没持貸籍欲汚郡官公立命焚之止坐僧罪奏釐甲乙為禪林盡革宿弊吳俗信巫郡官妻病巫俾出錢十萬禱神請命公竟坐巫詐欺境内神祠非祀典者期一月毁撤率諸巫習醫自業錢塘繕江堤轉運使調木石諸州逮潤報以越數州科斂其擾倍常遂止是時籍宣毅卒𨽻京步軍司使者留詔須越軍至同遣其衆籍籍重遷公為奏就選官部閱給舟載其妻孥以西他州籍兵過城郭騷然至或罷市抵潤則關外巳具糧糗薄暮舍止晨炊徑度城中莫有亂行者治迹表諸道八年秋召還拜右司諫嵗中遷右史帖職公自以逢辰遇知已之主居得言之地夙夜惟念知無不言言無不盡其宻啟顯奏凡八十餘章深動明聼今摭其十數大者足以見經世適變之畫有過人者其言毋數赦曰三嵗郊霈盛夏慮囚祖宗之制不可闕自外非時曲霈不宜屢下啟小人之幸擇牧守曰請分望𦂳上中下州為三等上等政府擇才其次吏部選任又其次依資注擬増俸以表顯覈實以陞降則四方平理可待也慎名器曰文武近臣陛下宜周知其才否稍取其功狀圖列於别殿燕閒省覧凡遇除授案見勞惡而賞誅則朱紫自别矣侍讀待制宜立定員如舎人學士格其勞臣久外當襃進者别製美名以寵之則流品分而中外辨矣議取士曰貢舉法弛士不循操檢宜下詔戒飭俾知所畏有不率者屏棄不齒則佻薄革而亷良進矣議法制曰法令者一民之信也不宜以小害而妨大利數有變更逺惑民聼格式者立事之綱紀也惟稍増損唐舊今律令並行則一朝之典憲備矣宫省出入宜著門籍以謹誰何衛士犯法不覺有刑不可以近臣而輕其罰則姦萌自絶矣議職制曰諫官御史舊聼風聞言事近稍沮止請舉行天禧詔令所以廣人主之聰明而防壅塞之弊外戚非任邉劇有顯效不當授以軍職所以慰三邉將帥之心大臣年至尚冒寵祿望優加名數聼其致仕所以全君臣終始之分出疆使介循次而遣苟非其人或為逺方輕鄙望加遴擇無俾失辭取侮勸農之官職事不修請立考課法以墾田户口増損為殿最則吏知本而民勤力矣古者外官更代有圭節魚符之信今則新官執勅赴上州郡别無信驗請如舊制復降信勅庶幾四方有所稟承而絶詐妄也監司案察自有常矩近之奉使者多事邉幅專愎不通所至鞭笞人吏信任險巧州縣頗罹其毒望嚴加戒警俾修實効議黜陟曰賞罰之行惟均與信前年宋祁誤進册告王拱辰等薦舉非其人並坐罷職守郡今拱辰等巳遷用而祁猶滯留進奏院宴會館閣職事被黜者十數人今吕溱巳陞擢同坐者未復望悉推恩以示均一内王洙嘗以學術侍經幄望亟召還舊職其論朝政闕失曰先帝嚴塗金之令所以戒滛侈而敦質素也今近戚服用出入宫禁漸不可制宜謹舊防抵工匠法其弊當自絶也京師無名土木勞民費財望戒内外不急修造及佛祠神廟悉皆禁止須財力稍豐取旨興造方今天下兵籍十倍祖宗時望遣使蒐選罷其疲癃擇精銳以實禁旅官司冒占踰制者悉罷之州縣白直有虚名廣占者宜著定限數溢者悉放還南畝商胡決河累嵗不塞議者欲簡力就功此尤非便謂宜重責水官等預計確實功費政府議定然後起役則一舉而成效見矣河北義勇巳習兵技屬嵗荒徙望詔諸路招諭續食遣歸以窒嘯聚之漸内侍黎用臣黥𨽻原恩除環衛官致仕是罪人與周行勞舊均禮宜仍𨽻籍示有以懲肅景徳寺病僧言死而漆其尸寘舊院宜依浮屠法焚瘞郊外以釋羣惑凡此並當時刓弊事有甚微而干國體議者或以耳目所熟或以流俗所蔽或以權戚所閡置而不問公直据利害不恤羣誹先事開説為上指陳或言入即行或播在臺閣開廣聖聰補益民務者多矣又有事繫刑賞下情不得上通國憲抑而不行公以為利病較然儻言者不為繩直則抑鬱徼倖終不復辨方朝廷厭西兵旣許議和元昊用事野利大將梗其謀延州青澗城使种世衡遣間王嵩諜殺之由是和議遂定延帥抑不以聞會世衡卒其子古詣闕直其事時延帥方長樞府登聞院遏不得通古以書述本末抵公公即為言朝廷按覆得實贈世衡觀察使錄古上縣簿尉郭承祐籍舊恩至節鉞領殿前親兵旣罷為宣徽使出知應天府希恩欲留職内院公三䟽摘其宿負以為爵位過重猶深玷國體即日詔趣承祐行楊懷敏先職皇城不覺衛兵驚撓宫寢出為沿邉安撫又坐妄言虜事不實罷安撫猶總塘濼入奏遷延幸進旣而擢入内副都知公累章彈擊及請間面陳詔錄章示之令却還本任猶不行再言小人傲忲難恕朝廷綱紀須振於是責授三陵副使權倖由此知警議者謂以片言移人主之意古人以為難視公之舉則無間言葢至誠悃愊聖聰察見如水投石不極不止耳於時中外泰寧上方圖垂世詒燕之䇿一日内出手札訪近輔公即日上對復數千言箴時之闕纎悉無隱皇祐元年春廷試進士公為編排官上御後廡手書博學二字賜之四月穫麥後苑觀三朝寶字訓鍳圖於内閣特旨召公預坐并賜本如近禁公精於治道每預晝訪占對詳盡時以京師久隂諸路大水上封援洪範傳下人有謀之應願深遏惡源消隂沴長陽德言甚切至未幾步直張安挾刃埋謻門欲有誣告公因事入對上猶記前章語慰諭嘉納面賜五品服是時安南交趾窺伺邉隙忿爭細故戎瀘蠻嘖言妄有徼索公以為此必蓄異謀將構外患請預擇守將亟徙東南重兵先事制其漸可以厭服後二年邕管有智高之變朝廷經制戎瀘幾數十年方帖然其前識逺圖補患消難之效又可見矣天子方諏咨眷屬待以不次時論亦謂納言鳴玉髙議廟堂階術在前步武而至矣嗚呼天不俾夀年止三十七以其年季冬寢病某日終於司農之官舍訃聞上為嗟惻詔錄其孤移恩於次壻張升卿釋褐許州長社縣主簿非常例也仲氏方尹京劇趣辦襄事以明年正月已酉葬開封汴陽鄉從先公之次隧夫人丁氏故相晉公諱謂之孫某官拱之女累封蘇國夫人某年月日逝於子舍合祔公穴四男子勰翰林學士朝議大夫燮朝奉大夫通判臨江軍龢朝奉郎通判陳州臨以滑州韋城縣主簿卒官三女長壻奉議郎李之邵次即升卿今為朝請郎知泰州幼西京軍巡判官沈述孫男十三人杲卿宣徳郎東美瀛州防禦推官朝隱承事郎並前進士魯望端已承務郎夀朋德輿廷碩賔王伯言君魚邠老汝士學進士業孫女十人壻皆士人曽孫男女今三十一人公之風度器識奥學精藝趣尚超俗文章爾雅凡所著述其科舉應詔之文為士人傳誦外得遺稿摭為十五巻名諌垣集故友龍圖學士宋公次道叙之詳矣惟錢氏世自武肅王宅有吳越方五季紛擾羣雄割㨿擅勝兵僭稱號戕害生聚毒甚塗炭獨吳越一方包貢不絶朝廷䇿命恩禮如平時元帥避賢遜位有季子之節忠懿王最先入朝䝉邾儀之襃弭亂戢兵恭順不失隂德有後今為信然故二家子孫累葉顯赫近世罕倫翰林君繼三世冞入之榮簡在聖衷光昭前烈而霜露之感嵗時不愆以謂宰木已拱而麗牲未建以某於公平日從㳺之舊朋好尤篤嘉言美行皆耳目之聞見將圖金石之刻表章門闕之路以文見屬義不得辭感舊思賢托銘叙意其辭曰錢氏自唐跨有吳越屬時紛披羣雄僭竊惟彼武林世載純節遘我皇運首朝帝闕吳越五君東府逡巡退棲會稽貽慶後人掌武惟子二惠惟孫賢良方正父子弟昆赫赫仁宗孳孳求諫司徒朅來大廷利見制䇿五千奏篇稱善封章八十沃心無間惟天生德惟聖知賢荃宰契合藥石功宣時亨運徃道巻名全承家有子嗣德昭前徳有報矣神所勞矣考室構矣門閭高去聲矣春秋時思祝宗孝告巳禭九章將陞四廟言曕喬梓在汳之陽夷山拱其後京水溢其旁諗堪輿之宿兆非豨韋之能祥觀金石刻兮過者必下積善之裔兮德音不忘蘇魏公文集巻五十二
