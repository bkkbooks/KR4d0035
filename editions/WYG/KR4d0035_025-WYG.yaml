body:
  text: 蘇魏公文集巻二十五宋蘇頌撰内制賜太師文彦博辭免恩命不允批荅省表具之朕之祀明堂也盖奉遵於先憲卿之相仁祖也預講定於大儀旌嘉顯相之勞抑有故常之典眷言元老特峻寵章惟是泛恩豈為異數何執謙之彌固以遜爵而為言雖受命益恭有古賢之茂範而尊師重傅盖朕意之所期宜體至懐即膺褒策所請宜不允不許批荅覽表具之古聖王之治天下也貴徳而尚老所以篤君親之義而崇忠厚之風卿輔相四朝嚮用五福謨明弼諧則臯陶伯益乃其比康寧壽考雖太公衛武無以加人所具瞻有如巖石爰因大霈是用褒尊毋煩謙執之堅深體眷毗之意所請宜不許賜文彦博上第二表辭免恩命不允斷來章批荅省表具之朕嘗觀周漢之君皆有耆老之佐畢公之弼亮四世桓榮之尊為五更恩禮所加可謂盛矣卿道徳名世文武濟時輔相我祖宗逮兹四紀左右我文母不愧前人因宗祀以推恩盖舊章之當爾未為異禮夫何足辭雖勤慤之誠見於累牘而神明之惠難徇至懐宜畧謙撝往欽新命所請宜不允仍斷來章不許批荅覽表具之卿以經緯之髙才為廊廟之重器權衡百職柱石四朝輔成王業如周公奉行故事如魏相功名兩極恭慎罙加近以鴻祀禮成湛恩雲施乃眷元老再推寵章加進戸封抑惟常典懇辭名級再抗封章惟歎褒之在懐固循從之莫遂其體隆眷亟往欽承所請宜不許仍斷來章賜李瑋苗授上第一表辭免恩命不允批荅省表具之昔仁宗之祀明堂也復希闊不講之典故推恩特異今朕之躬大饗也用郊丘三嵗之制故行慶有常而卿以節制之崇領郡牧之寄預顯相之列増加封食抑惟舊章胡然遜辭盖出謙重已行之命宜即欽承所請宜不允不許批荅覽表具之國家敬恭神事祗率舊章三嵗親祠禮莫為重四海來祭物無不共方仲辛之禮成推大澤以雲布凡百卿士普同慶休矧乃殿邦之賢侍祠之官位為節制之重爰加大命以廣靈休適觀奏封尚蘄遜避言綸已布寢罷固難所請宜不許賜平海軍節度使駙馬都尉李瑋上第二表辭免恩命不允斷來章批荅省表具之朕稱秩元祀事天承親欽翼温恭備盡誠孝推廣神惠霈及邇遐以卿外館之親陪祀惟恪増之邑賦之廣益以真食之多胡然克謙欲遜光寵披閱來奏不忘歎嘉莫遂允俞宜即欽受所請宜不允仍斷來章不許斷來章批荅覽奏具之卿素藴才猷復聨姻戚早膺節制之寵乆奉内朝之班陪預宗祈勤恭夙夜逮告成於盛禮爰推錫於渙恩増衍戸封盖出常典遽閱需章之奏極陳遜避之辭雖嘉乃誠固難如請所請宜不許仍斷來章賜新除中書侍郎傅堯俞辭免恩命不允斷來章批荅省表具之朕咨用柄臣以輔台徳惟賢是任豈計素資卿歴事四朝早著謨明之效載總六職屢觀典領之能右省近司方得君重是宜攄發於素藴助予宣布於政條乃執謙撝尚辭寵命姑體至眷亟就新班所請宜不允仍斷來章不許斷來章批荅覽表具之卿早以時望仕於顯塗内之臺省之煩外之州使之劇宣力滋乆稱譽日聞擢陞右弼之聨且專内史之務贊揚命令實賴猷為不必固辭重違予意所請宜不許仍斷來章口宣賜新除中大夫同知樞宻院事趙瞻辭免恩命不允斷來章批荅口宣有勅卿自聨基宥屢告謀猷朕嘉爾勞擢進厥位毋煩固避其即欽承賜新除中大夫守尚書左丞韓忠彦辭免恩命不允斷來章批荅口宣有勅卿人地並髙才謀巳試擢登左轄允叶僉諧其即欽承用副虚竚賜新除中大夫守尚書右丞許將辭免恩命不允斷來章批答口宣有勅卿文雅望隆猷為效著擢其材實寘在省綱卿其勿辭趣宜就職賜皇叔徐王顥生日禮物口宣有勅卿惟叔父之尊位冠宗藩之首處家自得樂聞為善之言誕日載臨禮有匪頒之式丕承異數茂集繁禧宣召新除内翰蘇轍入院口宣有勅卿儒學名家賢科特起試之左戸巳彰周敏之才擢在内庭更竚論思之益亟趨嚴直用副虚懐賜大遼賀坤成節人使銀鈔鑼等口宣有勅卿等肅將使指慶誕節之届辰修講隣歡弭聘旃而伊始式頒器服之品用助寢興之勤班荆館賜大遼賀坤成節國信使副到闕酒果口宣有勅卿等張旃修聘涉悠道以良勤夙駕趨朝次近郊而伊始載頒醪核式示眷懐賜皇叔祖宗景以下罷散坤成節道塲香酒果口宣有勅卿等國之宗英慶逢誕節集竺乾之勝利祝文母之永年載認傾輸特加錫予賜殿前副都指揮使苗授以下罷散坤成節道塲香酒果口宣有勅卿等提兵之要宿衛於朝遘崇慶之誕辰演迦文之宻義助兹賛祝宜有頒宣賜駙馬都尉李瑋以下罷散坤成節道塲香酒果口宣有勅聖母誕辰幅員同慶乃眷列侯之貴共祈萬壽之祥既集勝縁特加蕃錫就驛賜大遼賀坤成節人使内中酒果口宣有勅卿等肅馳使乗言戾都亭載惟行李之勤特出醪羞之錫少將恩意式示眷私坤成節就驛賜于闐國進奉人御筵口宣有勅汝等貢琛向闕就館歴時慶逢載誕之辰禮厚示慈之燕想承恩渥共集歡榮班荆館賜大遼賀坤成節人使回程酒果口宣有勅卿等巳竣使事言趣歸程方飲餞於都門宜寵頒於燕品少勤履跋式示恩章賜殿前指揮使劉昌祚赴闕沿路茶藥口宣有勅卿夙戒輕車逺趨召節惟闗河之跋履冒風露之凄清特頒茗餌之良用慰道塗之乆就驛賜于闐國進奉人朝辭御筵口宣有勅汝等逺馳驛傳致貢風宜逮兹旋軫之期特有加籩之惠用勤行李式示恩私賜皇弟祁國公偲生日禮物口宣有勅卿以介弟之愛胙諸公之封屬秋仲始生之辰加康侯庶錫之寵服予恩數増爾壽祺賜劉昌祚辭免恩命不允批荅口宣有勅卿師帥之才稔於衆聽殿巖之職盖以次遷雖嘉避寵之誠難返已行之命賜劉昌祚辭免恩命斷章批荅口宣有勅提禁旅於殿中分節旄於閫外爰擢才望並付事權無用固辭以稽成命送伴賀興龍節使副沿路與賀正旦人使相見傳宣撫問口宣有勅卿等張旃入境頓節在塗方匽薄於寒風想勤勞於次舎特加恩喻少恤于行送伴賀興龍節使副沿路與接伴賀正旦使副相見傳宣撫問口宣有勅卿等講修隣聘馳邁使華適臨凝冽之辰少勤行李之役爰加問勞用慰道途閤門賜平章軍國重事文彦博加恩告口宣有勅合宫展采巳畢帝禋涓日告庭即頒顯册帝師國老恩數惟優就錫綸函用昭眷禮閤門賜宰相吕大防加恩告口宣有勅季秋歴吉太室肇禋翕受繁祉霈為大澤眷言上宰首舉慶章就錫命書往欽神惠閤門賜徐王加恩告口宣有勅朕䖍恭大祀對越上神縟禮告成湛恩溥浹眷言叔父之貴特崇命數之優巳告大庭往欽惠渥閤門賜嗣濮王宗暉郡王宗隠宗愈國公宗楚宗祐加恩告口宣有勅總章禋祀翕受純禧端闕頒常即孚霈澤眷宗藩之尊屬加采邑之戸封就賜恩書用昭禮遇閤門賜殿前副都指揮使劉昌祚加恩告口宣有勅祭有大澤以惠庶工乃眷帥臣寵加爵命明庭大告僉言允諧賜以命書宜即祗受閤門賜節度李瑋加恩告口宣有勅竣祠陽館發號雉庭眷言外館之親列在秉旄之著巳頒渥典孚告外朝往其欽承副予恩意白溝驛賜大遼賀興龍節人使御筵并傳宣撫問口宣有勅卿等使傳及闗候人在界眷言跋涉宜安少休爰錫燕觴用勤行李賜太師平章軍國重事文彦博上第一表辭免恩命不允批荅口宣有勅熈事備成中外䝉福眷言冢弼恩有常均用廣神休不為異數雖嘉謙抑難即徇從賜太師文彦博第二表不允斷來章批荅口宣有勅大祀推恩首褒元老需章避寵罙認至懐盖惟神惠之祥宜自公台而始其即膺受無煩再三賜皇伯祖嗣濮王宗暉皇叔祖華原郡王宗愈安康郡王宗隠鞏國公宗祐鄖國公宗楚上第一表辭免加恩不允批荅口宣有勅祭有惠澤命巳告庭眷彼宗英進加封戸何其謙挹而欲遜辭雖嘉乃誠難從所欲不允斷章批荅口宣有勅訖成大報翕受純禧誕舉慶恩用褒近戚封章再上謙巽罙堅成命已行至誠難徇賜門下侍郎孫固中書侍郎劉摯同知樞宻院事趙瞻尚書左丞韓忠彦右丞許將上第一表辭免恩命不允斷來章批荅口宣有勅卿典儀奉祀極齋慎之勤恭益地推恩示神休之溥博兹惟惠澤奚必遜辭宜即欽承毋稽成命賜皇弟大寧郡王佖遂寧郡王佶咸寧郡王俁普寧郡王似祁國公偲上第二表不允斷來章批荅有勅朕逆釐上神灑澤綿宇方舉褒親之命再觀避寵之章雖諒冲懐難從至請宜即祗受不必再三賜殿前副都指揮使劉昌祚保康軍節度使苗授上第二表辭免恩命不允斷來章批荅口宣有勅近縁宗祀誕布慶恩眷彼帥臣朝有褒典再披奏幅過守謙冲命巳告庭理難從欲賜平海軍節度使駙馬都尉李瑋上第一表辭免恩命不允批荅口宣有勅霈神之澤禮典具存辭寵之言謙撝乃過惟爾近戚宜被徽章勿固避辭往即祗受賜皇伯祖嗣濮王宗暉生日禮物口宣有勅卿賢世嗣封主大邦之宗事陽爻將復記載誕之初辰就頒車服之儀用助門閭之慶服兹寵數祝以壽康賜太師文彦博乞致仕不允批荅口宣有勅眷惟元老位為師臣忽覽封章復欲去位矧方倚重無至多言賜太師文彦博生日禮物口宣有勅帝師國宰誕日載臨尊酒燕肴寵頒加厚體兹眷禮續爾壽祺雄州撫問大遼賀興龍節使副口宣有勅卿等隣邦修好使傳在塗方涉沍寒少休次舎想惟安適深副眷懐趙州賜大遼皇帝賀興龍節使副茶藥口宣有勅卿等修塗于邁華傳良勤眷方冒於風霜命往頒於茗餌節宣其氣兹有助焉賜皇弟遂寧郡王生日禮物口宣有勅眷彼維城之貴時予同氣之親良月就盈初生在旦備物加賜俾壽而昌蘇魏公文集巻二十五
