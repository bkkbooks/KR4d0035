body:
  text: 蘇魏公文集巻三十六宋蘇頌撰外制真宗皇帝忌日齋文伏以仙馭夐遥禮極如存之奉殊庭薦祝歲嚴奉諱之辰慿覺路之勝因導孝思之逺慕恭惟真宗皇帝丕承謨烈馴致治功作聖述明繼三五六經之美登封降禪踵七十二君之髙尊道貴德以垂休翼子謀孫而永世今皇帝接千載之統紹五聖之基頌文祖之清明感終憂之􅇶惕式䖍寶所載舉梵儀諷祕密之真文贊逍遥之邃境真宗皇帝伏願穆清凝命泰定發祥敷聖政以日躋恢徳㝢之天覆然後願君臣一體詠元首股肱之歌宗子維城固枝葉本根之庇嘉生茂遂黎庶綏安獯戎共戢於威懐中外均䝉於福祉章懿皇后忌日齋文伏以尊閟宮之祝載属於諱辰修竺國之儀聿嚴於勝㑹式資㝠祐仰達孝思恭惟章懿皇后德配坤元體儀宸極夙挺俔天之表早符夢日之祥愴真馭以雖遥想徽音而如在今皇帝紹隆洪緒緬慕懿慈不忘追逺之誠用謹終憂之禮博謀梵教廣植福田章懿皇后伏願安處浄方超登覺地布法雲之靈潤助皇器之置安今皇帝伏願天廣睿謨飇馳景化帝與齡而益永民歛福以無疆然後願据鼎元臣宣泰階六符之耀維城懿戚協本支百世之期五風十雨以順調九種百嘉之茂遂元德皇后忌日齋文伏以仰太姒之徽音式臨於諱日集覺皇之勝利上薦於㝠塗恭惟元德皇后道合靜專體躬柔順内茂契塗山之範誕彌開甲觀之祥啓迪孫謀嗣隆寳構今皇帝重明繼統下武膺期念生民尊祖之詩謹君子終憂之禮欽崇梵教允答懿慈元德皇后伏願受記内宮超神浄域廣一乘之妙理貽萬世之丕猷今皇帝伏願福固岡陵壽齊箕翼大器恊置安之喻彛倫臻攸叙之功然後願元首股肱載詠康良之美百辟卿士共修屏翰之能四時宣玉燭之和萬物遂崇丘之盛翼祖皇帝忌日齋文伏以王業所基式仰貽謀之盛梵宮斯闢聿嚴追逺之誠屬諱日之載臨仗福田而是薦伏惟翼祖簡恭皇帝穹旻毓粹淳耀發祥同太王之好仁周由是盛類懿祖之潜德唐以之興今皇帝繼體承乾因心篤孝奉廟祧之薦靡懈於時思崇佛事之嚴上資於㝠報翼祖皇帝伏願一乘悟理萬行超縁逍遥因地之尊福祐皇圖之永今皇帝伏願聖謨廣運神化博施並日月之代明與乾坤而齊泰然後願君臣同體夷夏宅心廟堂宣鎮靜之風藩屏恊維持之固雨暘寒燠感順序於天時黍稷稻粱獲登成於歲事宣祖皇帝忌日齋文伏以基命有開逖仰貽謀之盛等慈無上式崇追逺之嚴記撤樂之曩辰切因心之永慕伏惟宣祖皇帝靜淵載德濬發儲祥契敷教以在寛道隆商祚豳好仁而貴恕命集周邦今皇帝纂紹丕圖大凝至治宗祏奉尊於祖始靡懈時思仁祠崇殖於勝縁載懐終諱宣祖皇帝伏願三明悟理十號登尊棲神極樂之方流祉無疆之祚今皇帝伏願道超䆳古化格殊邦靈臺臻偃伯之期仙石永拂衣之劫方隅底定夷裔懐徠然後願藩屏親賢維城而作固廟堂輔相迓衡而弗迷官師咸盡於忠規兆庶永躋於壽域太祖皇帝忌日齋文伏以真聖膺期肇鴻圖於億世嗣皇尊祖薦㝠福於五天薦臨稱諱之辰彌切聿追之念恭惟太祖尊號皇帝昊穹凝命淳耀發祥剗五季之荒屯邁百王之遐武卜年定鼎遂開周室之隆厭世乘雲俄復帝鄉之邈今皇帝大明紹統至治格天當明發之有懐記登遐之逺日漢家原廟世逾乆而禮逾嚴竺典上乘歲有崇而月有薦太祖皇帝伏願棲神净土授記迦文證大覺於密圎祐丕基於永乆今皇帝伏願萬神薦祉百順儲休櫜兵革於靈臺納編齊於壽域百嘉茂遂恊春秋之有年四表輯寧類成康之美俗宗邸保磐維之固台司宣燮賛之謨周行共效於忠純率土永臻於泰定懿德皇后忌日齋文伏以賛塗山之内德逺記於諱辰開摩竭之道場盛陳於佛事式遵舊典祇達上誠恭惟懿德皇后毓粹俔天體尊儷極宣六宮之隂教睿問無窮侑七廟之神班音儀如在今皇帝繼承邦統緬慕祖慈雖孝切時思靡懈春秋之祀而禮嚴終忌用修香火之縁庻慿無上之功克助往生之願懿德皇后伏願逍遥金界步武鷲峯受密記於雙林祐丕圖於萬葉今皇帝伏願諸天降福六氣導和邁垂衣執契之時過定鼎卜年之厯華夷砥厲號令風行然後願長信母儀永享於璇極休明卿佐交輸於藎忠孝明皇后忌日齋文伏以閟宮尊祖懐懿範於河洲竺典崇因薦往生於淨域式臨逺諱夤舉舊章恭惟孝明皇后禀粹坤元宣風隂教茂娀莘之内德繼任姒之徽音仙馭雖遥神靈如在今皇帝紹休鴻緒緬慕先猷賛厥德之俔天記斯辰之撤樂恭慿佛寳仰助真游孝明皇后伏願證十號之明因超登覺地佑千齡之興運永固皇圖今皇帝伏願乾健粹精天臨溥率綿區安堵若泰山之四維寳厯過期等河沙之數量然後願維城近戚共敦信厚之風佐鼎羣公協賛休明之治萬國效傾葵之志千官輸拱極之心和氣充盈嘉生茂遂太宗皇帝忌日齋文伏以繼天開統功成早棄於人寰尊祖奉先孝治聿追於王業式臨諱日廣植勝縁恭惟太宗皇帝躬濬哲文明之姿撫重熈累洽之運朝玉帛於萬國異俗率懐考聲明於百王休功莫並今皇帝丕欽謨烈嗣守基圖内奉宗祧之嚴以時孝享外崇佛寳之薦載慕神游太宗皇帝伏願乘惠力之神通悟法縁之清淨三明四智超覺地於如如億載萬年燕孫謀於永永今皇帝伏願道躋治古恩浹懐生與日月而並明等椿靈而齊乆皇闈集祉宗邸延鴻台宰樞衡克恊良肱之詠王畿藩屏常臻奠枕之安茨梁之稼薦臻玉燭之時不爽章獻皇后忌日齋文伏以三代賛娀莘之德式仰徽音六時誦華竺之文用資㝠祐載崇嚴薦允逮諱辰伏惟章獻皇后坤德靜專母儀慈聖佐佑仁祖深居長樂之尊配祔真庭永奉不祧之祀今皇帝繩祖之武念親以誠當撤樂以永懐望褘衣之益逺䖍遵梵教崇勝利於無邉想望神游薦徃生於彼岸章獻皇后伏願超神淨土受記迦維㫁三界之塵遊悟一乘之妙理今皇帝伏願恢明皇度翕受純禧壽量等妙髙之山福聚比甚深之海兩宮集祉前曜宣明然後願宗室五侯盛休風於麟趾台司百辟増重望於鷺庭四方同元鼎之安萬物遂崇丘之盛章獻皇后忌日齋文伏以賛内德於塗山有懐曾世啟真文於靈笈式助飈遊甫臨奉諱之辰敷賛往生之願恭惟章獻皇后軒文毓粹坤載儲靈布隂教於六宮義尊配極盛母儀於四海道載臨朝今皇帝祇紹寳圖緬懐懿範嚴閟宮之睟穆深切孝思闢琳館之沈深載嚴法㑹章獻皇后伏願霓霄躡景瑶闕棲神契至道於逍遥佑丕基於綿永今皇帝伏願功符不宰治恊無為欽承衆妙之宗順撫重雍之運皇居宸極永同不拔之基慶壽寳慈共享無疆之福宗子惇和于藩屏宰司鎮靜于廟堂夷裔懐柔烝黔富庶仁宗皇帝忌日齋文伏以仙馭升遐歩霄虛而不返殊庭駐景肖廟貌以如存載臨撤樂之辰想望登真之路庻慿道妙上助神游恭惟仁宗皇帝人文化成神武不殺宅位四紀猷謨躋聖域之優升遐七年華裔極軒臺之慕今皇帝酌先祖之道廣文王之聲孝切因心匪懈廟祧之享禮遵奉諱載陳科籙之儀諷三洞之秘文資九清之遐駕仁宗皇帝伏願棲神碧落飛歩黄庭悟道之真得元珠於罔象作邦之祚齊大劫於延康今皇帝伏願並日照臨與天長乆誕布不言之教恢隆無上之宗長信母儀常遂承顔之樂宗英宰弼咸宣衞社之忠百官承式以一心六合同風而内嚮仁宗皇帝忌日齋文伏以奉衣冠於原廟追述先猷諷經唄於仁祠式資㝠祐諱辰斯逮勝利是崇恭惟仁宗皇帝睿智如神聰明冠古四紀盛仁風之布萬邦從壽域之躋厭世乘雲俄復帝鄉之逺配天作主聿嚴郊祀之尊今皇帝下武膺期重明繼照念太平守成之訓寔本貽謨遵忌日不樂之文盛陳法供仁宗皇帝伏願三明證理十號登尊度沙界之群生䕶金輪之景祚今皇帝伏願道齊佛佛功濟元元廣開西竺之䖍門増固南椿之壽紀兩宮聖善永慶於承顔百世本支爰膺於錫羨宗邸各安於惇睦公台咸副於倚毗百穀順成三邉底定明德皇后忌日齋文伏以姒幄流芳仰徽音而益逺梵宮植福資㝠祐以無邉爰舉舊章式嚴諱日恭惟明德皇后禀靈清漢棲景皇闈賛内德之肅雍丕昭懿範廣孫謀之燕翼垂祐鴻基今皇帝欽紹寳圖追述祖武孝切因心之感匪懈時思禮遵撤樂之文載崇佛事明德皇后伏願超登十地安住三乘悟法忍於無生助邦風於長懋今皇帝伏願光文恊帝盛業際天増千億之長齡保丕平之景祚兩宮慈飬永對承顔之歡五等宗侯更重維城之固承弼副具瞻之望宮師堅盡瘁之誠九鼎冞安百嘉茂遂開啟同天節道場齋文伏以千齡誕聖甫臨維夏之期百辟傾心共致後天之祝即祇園而布懇賛寳祚以延洪伏惟皇帝陛下繼體承乾持盈保國先昭五聖之緒茂建九疇之中相公參政秉國之均事君以道罄純臣之一德頌天子之萬年皇帝陛下伏願道格皇穹德侔司契躋唐虞極治之際過宣髙享御之期相公參政伏願彛鼎銘勲椿靈薦壽荃宰永符於重寄康良載恊於賡歌然後願軒冕衆賢同底賛襄之績藩宣群后共成夾輔之勲編齊臻富庻之期夷裔戢威懐之德祭文中書祭秦國大長公主文帝唐之盛女曰娥英爰周致隆王姬振聲粤我仁祖駕唐軼周温温太主寔茂芳猷惟主之賢慈和柔惠其質蘭薫其儀玉粹結愛帝后孝恭天至執勤傅保言容日備往擇好逑属在外門恩隆下嫁禮視維藩爰開湯沐爵命再頒成此肅雍車服以蕃寵冠三朝義先近戚帝錫之祉光華赫奕云何不淑遘疾斯亟捨此明辰歸於厚穸常念仁姑曽不永年悲興長樂痛軫慈顔奠䘮製服追愴親賢邇臣督葬卜吉新阡肅肅帷裧嚴嚴鹵簿神閨啟銘扉斿即路㓗此餚羞奠以清湑菲誠是將明靈斯佇尚享中書祭唐尚書文致祭於故㕘知政事贈兵部尚書唐公之靈惟公禀江漢之粹靈挺荆衡之材秀來儀上國自致青雲在仁宗朝以峻節清規擢踐臺閣登侍禁嚴在英宗朝以重名逺畧入掌風憲出臨藩州今天子綜覈功名寤寐賢俊召公方面委職計庭不及一時㕘輔大政惟其彌綸之緼施設之宜資適逢時而命屈於中夀才可經逺而道巻於半塗公之云亡國之不幸兹所以甞僚之列周行之間靡不茹痛於哲人而齎咨於遺直也命龜恊吉輤車云西酹以清觴愴乎永訣尚享表賀日蝕㑹有隂雲遮蔽臣某等言伏覩司天臺奏今月一日辰已間太陽當虧有隂雲遮蔽者日月之行適合二交之次天人之際聿彰丕應之符當見象之蔽虧睹層雲之掩靄躔離所距不過中星之分漏刻未移巳消内壤之異誠由德感事異常均臣某等誠欣誠喜頓首頓首伏惟皇帝陛下保御邦圖祇畏天戒考日官之推歩驗晷景之晦明前敕攸司遵行舊典感不踰於旋日隂沴潛消善乃格於降祥沖和可召臣等叨聨近路親瞩殊休同詠歎於聖功積欣歡於悃臆伏請宣付史館以彰盛德臣等無任上尊號第一表臣等伏聞道被四表必享尊髙之美名恩浹群生當膺億兆之大奉蓋君人者以含容為廣而報上者以愛戴為公是故延鴻軒昊之稱睿哲聖神之號或以配其盛德或以昭其成功若古皇王以來無廢厥命惟我祖宗之世咸備斯文属逢泰定之期輒效推崇之舉臣等誠懇誠切頓首頓首伏惟皇帝陛下天錫勇智日新健剛紹五聖之重光不忘於欽翼當百年之盛際益戒於盈成若乃法乾之始亨則物䝉其美利象春之布德則時播於中和建號紀年協廣帝安人之訓推天校厯謹求端頒治之程斯可謂之奉元矣萬幾聼㫁之間羣臣進對之際非典訓之言不道惟治亂之本是咨講論六藝之文則日昃而靡懈收合諸儒之議則躬行而弗違斯可謂之憲道矣制宏逺之規橅孚温雅之號令經緯禮律而大備罔羅幽逸而畢升正朝位之儀則九賔以肅躬郊丘之報則羣祀用修此合乎周人之文也憺威四方矯正羣枉奮神靈之獨㫁成天德之髙明問罪西垂不勞兵師而狡羌請吏懐徠絶域靡待文告而屬國内朝此類乎成湯之武也發敖庾之粟以息轉徙之艱罷河防之役以寛追胥之急訪髙年之人而賜以爵命續功臣之世而授以秩官雖唐堯之仁無以過也三年無改於先帝之道一日不廢乎兩宮之朝封爵以厚乎藝祖之昭收族以正乎宗室之叙雖大舜之孝有若是乎所謂治定功成冠百王而稱首備道全美包四大而獨髙方斯之時有生之類靡不游泳於德澤鼓舞於祥風咸欲上薦鴻名表章茂烈萬衆俯伏而勤請者數四陛下退託而不從者彌年且人謀不可以固違而國典不可以乆闕敢縁前議率籲羣情臣等不勝大願謹昧死請上尊號曰奉元憲道文武仁孝皇帝伏惟陛下體至公之行察輿望之乆不以道大而薄其禮不以謙尊而抑於人濬發德音誕受徽冊如此則羣公庻尹得盡傾輸之誠百姓黎元共安歸往之義臣等無任同天節謝錫慶院齋筵竊以瑶光貫斗欣逢震育之辰湛露晞陽載荷燕私之禮旅星肴之豐㫖釃玉醴之清醇百辟盈庭共識惠慈之渥萬年獻壽咸傾愛戴之誠伏惟皇帝陛下德盛離明道躋乾健一中和於夷夏躬勤儉於邦家臨御再朞動植畢沾於仁澤誕彌嘉節邇遐悉播於頌聲臣等生偶盛期職塵近任祝聖方輸於懇欵推恩遽被於眷懐詠太平既醉之詩巳陶至化念王臣匪躬之故益厲丹誠臣無任笏記里社告符慶恊千齡之運法筵集祉仰延萬壽之期薦沐燕慈俯均飫賜臣等叨陪近輔欣遘休辰上蒙恩禮之隆益負素餐之愧賀皇帝為太皇太后入慶壽宮臣某等云伏覩宣示今月二十七日太皇太后入慶壽宮者坤靈寳勢肇新壯宇之橅帝室皇居克正母儀之位掲鴻名於永乆彰懿範於多方孝治所先人倫胥慶臣某等誠歡誠抃頓首頓首伏惟皇帝陛下體乾宅粹順帝頒常承顔日逮於兩宮廣愛風行於四海間徇輔臣之請聿崇長信之居鐘鼔考成並擁神明之祐膳羞就養不違晨夕之歡極大孝尊親之嚴兼聖人能事之美臣等叨聨近任獲遘盛期宮寢攸寧兹享無疆之祉岡陵比壽敢傾善祝之誠臣等無任賀太皇太后入慶壽宮皇居華奐式奉於母儀坤德靜安載彰於孝治鴻名昭示列辟胥歡臣某等中賀伏惟太皇太后殿下德配姜任道超隂馬當仁皇臨御之乆輔佐益勤逮英廟繼承之初保佑罙至属重明之撫運闢長信之新宮棟宇攸寧永享神靈之貺晨昏就養不違恭愛之心足以廣風教於多方厚人倫於庻俗臣等並叨輔政側聼成儀竊欣即寢之安共罄永年之祝臣等無任賀皇帝為皇太后入寳慈宮臣某言准閤門告報今月十一日皇太后遷入寳慈宮者揆日作宮肇新於帝制承顔展慶欽奉於母儀御華寢以即安掲崇名而永大仰符吉卜人極歡心臣某誠欣誠抃頓首頓首伏惟皇帝陛下躬濬哲之資保盈成之戒内奉長樂靡怠晨昏之恭旁據坤靈克成棟宇之壯雖斯干考室之盛南陔戒養之勤未若聖心克諧懿德盡人子事親之義見明王孝治之風臣等叨賛化鈞側聞徽典幸慶千齡之遇徒傾萬壽之祈臣等無任賀太皇太后為皇太后入寳慈宮臣某等言准閤門告報今月十一日皇太后遷入寳慈宮者大明崇構瞻帝宇之邃深長樂新宮慶母儀之尊奉考禮經之成寢本孝治之因親凡在覆臨率同愛戴臣某等誠欣誠忭頓首頓首伏惟太皇太后殿下道先慈儉躬執謙虛復子辟於前朝詒孫謀於嗣聖太微紫極宸居上法於二垣東序西廂就養並行於兩殿實千齡之盛事恊四海之歡心臣等輔政備員逢辰至幸九重集慶側聼於臚音萬壽祝延載傾於丹悃臣等無任賀皇太后入寳慈宮臣某等言准閤門告報今月十一日皇太后遷入寳慈宮者母儀四海載崇盛麗之居孝治萬邦思盡愛恭之意方即安於寢宇慰奉養於晨昏掲徽稱以惟新率羣倫而胥抃臣某等誠欣誠喜頓首頓首伏惟皇太后殿下躬涵淑聖道協靜專先朝推輔佐之勤嗣聖荷誕生之慶太微帝宇雖同環極之軒房長樂后宮抑有尊親之故事肇新規而取壯案盛禮以考成坤德攸寧皇圖永固臣等逢辰盛際備位近司仰三宮正位之辰見萬乘承顔之美徒傾至悃永賛熈辰臣等無任謝重陽宴表清霜貫序慶萬寳之登成湛露推慈錫千鍾之燕飲嘉㑹掩龍山之集近班諧鳬藻之娛臣中謝伏惟皇帝陛下體具乾剛仁深天覆察璿璣之運動調玉燭之均和節戒九陽有登臨之故事恩均百辟盛愷樂之多儀臣等叨備政司預沾飫賜簪纓就列獲游漢籞之嚴樽俎交歡如醉楚醪之享仰承洪造彌激丹誠臣等無任蘇魏公文集巻三十六
