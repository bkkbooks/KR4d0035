body:
  text: 蘓魏公文集巻十一宋蘓頌撰律詩次韻楊立之見别梁苑昔傾葢膺門嘗贈鞭幾回留客舍四紀度星躔染翰頻穿硯繙書屢絶編文章傳累世功業慕當年懷寳思求售趨時輒遘邅宋忠徒問卜孟子本知天得䘮時難必窮通命使然半生淹貢部晩節困乘田事盬才非稱歊喧性未便畏途嗟坎􅇄野思憶潺湲解紱無終競同􅂁毎共憐老來心更逸歸去樂應全鳯翮翔千仭鯢蟠入九淵舊交尤惜别後學欲鑚堅湖嶠新營第河濵促放船一經勤教子三徑往鄰賢顧我今耆艾投閒竚冶甄何時江海上拂榻重相延次韻敖姪書懷傳家累世奉遺經竊祿清朝足代耕雖是丹心比葵藿其如黧貌㸃冠纓時乎易失年加我來者安知畏後生戒飭爾曹惟道術逢辰須用佐安平次韻陽孝本遊翟家灣書院二首又一絶淮上陂陁百畝岡誰言形勢占髙强郊居擬卜東陽宅屋壁将營闕里堂予家三聖像将龕置於屋壁四面松篁分種藝百家圖籍待收藏何人欲課三冬學向此潜心事素王翟市西傍一徑開偶攜親友陟崔嵬莫言第舍衡門陋已有仙翁步屧來日欲銜山迴返照風還吹雨壓浮埃纔歸便得詩盈軸氣猛才豪豈易陪絶句謾誇三島冠靈鼇咫尺龍岡去靡勞若使南陽人獨卧風雲寜隔海山髙次韻陽行先遊招隠古屋蕭森數十間禪扉幽寂叩常闗少微處士遺塵逺靈鷲髙僧得地閒穿石到池泉滴滴磨崖生蘚字斑斑山林真趣誰能辨乗興時來興盡還又同敖姪韻不見山翁住翠微空傳金刹自前齊曉猿夜鶴休驚恐澤雉林烏自雊啼客到上方思寄傲僧攜素板乞留題重尋黄鵠飛翔處盡日無人為指迷次韻楊立之觀韻海六學先聲病羣書欲備詳摛文資引據結字辨偏旁篆楷顔毫妙編聨蜀紙光殘篇雖脱落猶可挹遺芳次韻李希荀寄念七姪荘并用前韻和十七姪彀送其行初從童丱祝千春俄見騫騰祝更頻巳喜吏資能可問又嘉文筆速如神室堂冝念承先搆鄉里須教號善人我待兒曹上霄漢便歸林下岸仙巾里閈相從秋復春矜憐幾類黨頻頻摛詞已識言浮物學藝兼知義入神荘姪治易縱使聲名髙世俗直須慈惠及生人吾家自有青氊在豈羡林宗墊角巾送滑道人遊廬山康王觀裏採芝田董奉家邊種杏壇雙屩一笻行到處應尋巖室養神丹次韻曽子固舍人上元從駕遊幸雪霽蓬萊瑞景新槐楓迎日麗重宸鐘殘長樂千門曉輦過章街九陌春星列從官齊拱極風驅前蹕旋清塵一篇未易歌鴻業三願還将祝聖人讀楊文公集文公名節冠當年沒世清風更凛然梁父舊廬空徳里西州華屋慟時賢平生奏御三千牘不朽文章二百篇瀟灑建溪遺俗在至今弦誦滿山川王宣徽見示延駐慧海長老詩因次其韻南禪北祖亦何常足歴微塵自不傷病腦窮雖居一室妙緣心巳應他方禽魚固欲求棲息鳬鶴寜須較短長京府宰官頻問訊且将竿木戯逢場次韻王正仲蒲傳正二月十五日奉祠髙禖二首視草名臣奉漢祠祝禖才勝長卿遲詩成雅類占宜芾樂闋欣同夢射羆宫殿肄儀臨百子神明歆徳薦三釐凌晨拜胙歸天闕杲日煌煌照上枝滌牢宫醴被禋時物吐華心睡景遲禁掖嘉祥開覆燕祠官先兆應維羆陽郊類帝重封土近禮官奏請增築禖壇宣室思賢正受釐天錫子孫千億報年年玉葉長新枝留守太尉潞國文公寵示耆年㑹詩次韻繼和四登台衮垂三紀公慶厯丁亥春登台迨今三十六年三鎮神崧第二春㑹老特過丞相閣開筵仍具大官珍漢侍臣五日一賜大官珍膳追尋故事圖形在喜遇承平笑語頻叙述須歸大手筆唱酬俱是兩都賔貴如方岳虞咨牧清比西山晉列真前韻私稱不便借用此字盛集古今應未有謾誇靈鷲㑹中人和富公十二人中第二人絶句再遷蟬冕官三事早上龍旂節一雙富貴兩㤀心不動天魔如見亦歸降和文太尉第一無雙絶句未遂退休時望繋再煩居守主恩優自緣齒德髙羣牧須在山河最上流次韻蹇侍郎天元殿門芝草列聖儲靈貺坤珍應祀儀分葩對牟首觀瑞駐華芝毓德繇皇始彰功在聖時早聞縈殿桷復見孕門楣自有雲成葢非因水聚脂黃英苞五德古字秀三枝戸牖瞻丹幄簮裾從􅄢緌乘輿佩綬以青􅄢蕤畫圖稽大隗黄帝受神仙芝圖于大隗君歌詠入咸池孟郊詩號咸池集九廟流光逺千齡復旦期将書符命志寜比玉靈詩又次王侍郎韻禮藉標三瑞靈篇首五芝忽傳神草植髙出廟垣楣物色甘泉詔形容繆襲辭敷榮連刻桷滋液本華池運應承平旦辰臨孟夏時階蓂符厯數豐芑協聲詩尊祖誠斯洽稱觴禮所宜共知天輔德萬葉固皇枝又次中書蔡相公韻彼美三華瑞儲靈四大宫色分嵩谷外抱朴子六黃芝生嵩山山谷中地近漢房中玉質榮同本蓮莖出並叢載形非博厚錫羨自穹窿列賀馳文舄旁觀眩秀瞳道書云仙人方瞳秀朗中規綠䈥珍符彰聖孝天應甚昭融又和蹇侍郎七言四韻金支􅂱􅂱映宣宫致福誠由上德崇九廟靈光流自逺七明嘉種感潜通瑞圖丹采終難状藥譜神功未易通更覽諸公賡和句方知漢祀曲非工開府潞公太師得謝西歸謹賦七言四韻詩五首拜送幾夕華星動紫躔少微光入太微垣帝臨便座延公衮人喜安車到國門懇叙官儀還漢節親承需宴酌堯樽朝家貴老超三代惇史行看記善言聖代登庸年獨少清時得謝齒尤髙國朝以來惟公四十三入相吕宫師雖同而拜不在正月近年張太傅陳宫師致仕年最髙亦未及七十九官如中令躬無疾文似司空思不勞趙中令雖以太傅歸第時巳卧疾李司空素病心悸發輙彌嵗自謂久任文字職勞役思慮而致是耳皆不及公之壽康玉座案經涓對日金壺加禮賜春醪公初至都門詔生餼外别賜御酒仍宣諭選擇剛日與公相見祝公倍享靈椿算長副吾君序燕毛官崇真是帝王師八十歸休亦未遲不似孔光辭位日早於姜望出封時儀形昔巳圖麟閣藁草今應集鳯池鄭畋集號鳯池藁草其間多是措置軍國大事故府諸僚終有愧甘陵猶欠紀功碑君臣一德千齡際柱石三朝四紀中天下重輕常繋望膝前謀議不言功位髙少有名兼美體健方知福更隆謾道汾陽貴且壽若論勲考亦慙公久持邦柄擅斯文却掃丘園脱世紛巳用三篇作霖雨回看萬事似浮雲何須棨㦸榮歸路自有旂常載舊勲欲别延英猶造膝老臣雖去不㤀君三月二日奉詔赴西園曲宴席上賦呈致政開府太師三首幅巾私第巳歸休當宁虚懷更欵留避寵雖辭持節冊送行猶用濟川舟城南舊圃扃花洞洛下新荘引御溝詔諭兩京居密邇不妨乗興徃還遊邦人欽佇見儀刑詔使相望對寵靈位冠三公師尚父劉向云師之尚之父之故謂之師尚父躬全五福壽康寜久留行色春過半乍别天顔涕欲零誰識上心優老意從行仍許鯉趨庭昔美都門祖二䟽太冲篇咏貴良圖不聞賔主俱公鼎未見篇章出寳跗河岳英靈添賦詠都人士女競歡娯皆言元老歸休盛恩禮便蕃自古無次韻開府太師留别諸公經濟才謨沛有餘幡然髙謝意何如青雲路盡尋歸鞅綠野堂成憶舊廬漢苑宴遊聫魏丙鄴都賔客記應徐某頃年奉使過北都伏䝉留連累日早來請見亦嘗語及他時若到城南第入副宸衷對綺踈次韻宋次道慶黃安中李邦直二舍人皆自史院拜命右垣更直寵新班便坐通名聽别宣詞訓巳髙長慶代事權不下永明年除官草罷諸畨制執簡研餘萬嵗煙史官例賜墨皆廷珪父子所製其法煤用黟縣萬嵗古松煙曽向蘭臺陪筆削喜聞嚴近擢班遷和王禹玉相公三月十八日皇子侍宴長句三首紫雲樓外擁天香初見前星帝座旁庭樂聲長歌燕翼朝簮色喜動明光仙巾縹緲尊三弁環帶玲瓏襲九章遥聽相君稱賀語心傾堯日薦霞觴是日公就班中口占致賀辭語又從臣環極宴披香唐髙宗嘗宴近臣于披香殿帝子趨庭揖在旁皇子侍宴初至位恩㫖令揖左右臣僚日御舒長延晝景星輝明潤照天光沉沉殿幄三雲邃簇簇宫花五采章四曲漢歌齊祝聖東漢有日重光月重輪星重暉海重潤歌曲凡四解九賔周衞盡班觴又奉宸班近殿中香香案𨽻殿中省人在金鑾日月旁瀛州有金鑾觀刻火齊水精為日月常有風雲在日月旁魚藻君臣同愷樂露蕭遐邇荷龍光巳聞幼海歌重潤更得清風誦十章三省樞密皆再和凡十篇嘉㑹古今應罕遇未饒西母白雲觴穆天子觴于瑶池西王母歌白雪謡次韻子瞻鎖院賜酒燭暮召従容對浴堂歸來院吏冩宣忙郢醪獨賜尊常滿龍燭初然淚有香起草才多封巻速把麻人衆引聲長百官班裏聽恩制爭誦雄文出未央次韻孔平仲學士詳定次口占多士盈廷待指南老枚何幸接徐嚴子亭覆實參髙議時引清風拂畫簷次韻孔學士密雲龍茶精芽巧製自元豐漠漠飛雲繞戯龍北焙新成圓月様内廷初啓絳囊封先春入貢來千里中使傳宣下九重自省何功䝉上賜青蒿應為倚長松再次韻上尊百倍勝新豐御茗珍兼大小龍頒賚併䝉中使䧏捧持猶見守臣封露芽輕嫩研香馥雲朶纎濃印跡重拜賜頻繁何以報惟堅名節比寒松送周尹郎中守梓潼曾攜佳句使淮隅離合差池二紀餘旋見豸冠三院貴晩陪丹地一臺居涪城又領銅魚契錦里先馳駟馬車况是論年俱老矣送君因復動歸與王都尉示及吕丞相栁溪圖詩見邀同作走筆奉呈愛君圖冩栁溪遊想像濠梁問子休正觀公私畫錄有射雉濠梁圖漁釣每懷班嗣壑煙波疑在志和舟張志和自號煙波子作漁歌詩清時未易忘軒冕大隠何妨傲葛裘應笑龍鍾老朝士飛翔髙下似輕鷗和題李公麟陽闗圖二首渭城悽咽不堪聽曽送征人萬里行今日玉闗長不閉誰将舊曲變新聲三尺氷紈一絶詩翩翩車馬送行時尊前懷古閒開巻見盡闗山逺别離次韻韓康公對雨即事有懷五弟燕閒誰伴泛金焦注想鴒原望泬寥接客後堂聊造適偃藩臨汝正逍遥齊名孟季須爰立一致夷􅅨異反招筆札文章俱第一風流今不數三蕭次韻韓康公和曽令綽范景仁喜五弟改知汝海見寄之什許汝相望畫㦸深裴劉􅆳唱遞筩臨兩忘出處俱安節不得親踈共照心幕府尚傳詩寡和持國嘉祐中自史館告歸潁川與晏公唱酬甚多士林重誦斗攸斟景仁省試北斗賦天下傳誦今復議詞賦士子爭求其本追思五紀詞場舊何日逢迎更盍簮景祐慶厯間某與四公前後同場屋至今五十餘年矣雖出處有異而老拙粗爾時得問訊亦云幸矣次韻李公擇送新賜龍團與黄學士三絶句紅旗筠籠過銀臺赤印囊封貢茗來社後三旬頒近列須知郵置疾奔雷黃金芽嫩先春發紫碧團芳出焙來聞説採時爭節候喊山聲動甚驚雷團團龍鏡未磨開馥馥新香滿座來試酌靈泉看餑沫見丁公茶錄猶疑盞底有風雷次韻李公擇謝黃學士惠文潞公所送密雲小團一絶小團品外衆茶魁杜牧詩云茶稱瑞草魁宅相分從宰相來魯直公擇之甥南省同僚得傳玩朶頤終日味山雷諸公和雷字韻茶詩四絶句外復有繼作輒續二篇團膏纔就貢綱催度嶺踰江萬里來共看雲甌輕攪雪還如春架動研雷見李郢詩數杯茗飲沃羈懷消盡酲醲爽氣來若使伯倫知此味寜誇酒後不聞雷承示黃君詩再和韻先春百品避東洄兩溪名龍茶所出曽按茶經較勝來除却黃家雙井白其餘布鼓敢争雷昨日納還公擇詩巻相次復示三篇不獨説茶曲盡其妙加以敏㨗不易追攀輒罄鄙言聊答嘉貺近聞朝客建溪回説得茶園次第來何事社前先厥篚只緣春晚尚無雷今嵗驚蟄差晚兼復晴霽芽不暴長最為精妙昔年叨預通閨籍曽得紅囊貢茗來今日中臺重受賜回頭巳度十春雷吟君三絶重徘徊不復言詩為鼎來詠到茶中精絶䖏猶如筆下役風雷蘓魏公文集巻十一
