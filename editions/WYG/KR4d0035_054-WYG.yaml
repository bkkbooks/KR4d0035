body:
  text: 蘇魏公文集巻五十四宋蘇頌撰碑銘二樂陵郡公石公神道碑銘某嘗為史官躬覧國籍伏見祖宗列聖進用輔臣其選至遴雖軼才偉望或夙遭際會巳知其可用矣然猶舉於衆試之以事功實著見而後命之太祖皇帝以神武定天下左右將相皆文武大勲猶曰宰相須用儒生仁宗皇帝臨御歳乆英豪羣萃後先命相謂學士曰前王求賢於夢卜朕為取人望蓋聖主任輔相為天下公不以已私進退慎重如此居其位者有不得人手考簡册之所載洎士論所傳聞事迹之顯著者於樂陵石公僕射少師父子見之詳矣僕射自太宗皇帝潛邸歴藩僚府佐者十餘年逮天飛已踐左右省時謂不待資級便當入輔初政然卒以湘潭之勞陞近侍參宥府從征太原乃進上樞少師以功臣子早得名位更真宗仁宗兩朝文林詞禁老於近班乃預政事故主明佐良克有始卒魏鄭公所云君公顯號臣荷美名其是之謂乎謹案石氏之先胙土於衛邑相國於漢世都督於晉代其後自趙徙温隋唐以來又徙河洛今為河南府洛陽人唐客省副使諱質贈太子太師太師生幽州節度判官諱延威贈太傅太傅生處士諱繼逺贈太師太師生僕射諱熈載字凝績少長五代戎馬間獨守先代為諸生周顯德二年舉進士宗伯尚書竇公儼稱公所試賦有致君育民之志擢置上科自是聲振京洛間韜光待用不應諸侯辟命建隆初太祖受周禪太宗開侍衛府召公入泰寧軍節度使幕為掌書記尹正京邑奏為府推官昭憲太后特召入見即日拜右拾遺充職再轉左補闕幕府文書畿甸牒訴悉委參畫凡經裁處皆合上意旣而遭太師憂方議墨衰權奪適有飛語聞朝廷遂格出除出為忠武軍掌書記再徙崇義公識度沈逺不以内外為間參贊如常僚太宗踐極之月召復衮職上方蒐擇天下賢俊黼藻人文之化命公同知太平興國二年貢舉號稱得人故相司空張文定公翰林韓公丕給事徐公休復皆進士甲等也未幾梅山蠻獠寇湖外偏師南討以公權知潭州軍州事督軍戎拊疲瘵踰年湖嶺悉平入為尚書兵部員外郎充樞宻直學士歳中以本官兼職同簽書樞宻院事學士簽書院事自公始也四年車駕幸河東遷給事中充樞宻副使繼元銜璧即行在進刑部侍郎充職如故五年制授户部尚書充樞宻使公以純誠結主更試中外入為心膂出為股肱夷險一節上心知其賢欲倚以為相故位秩屢進自尚書郎纔二朞升省座而素苦足疾至是稍妨朝謁上親至樞宻院視醫灸久之賜告居家將護一日所苦浸劇乘輿幸其第問勞如平生勅上醫旦夕診治又賜手札有忠孝之事衆所聞之之語又曰火艾久逺得力亦當大災觀詔㫖懇惻如此屬任之意可知也公益畏盈滿累章乞骸辭情切至上不能奪八年秋特制超拜尚書右僕射聽解樞柄國朝故事不歴平章事未有升端揆者上以素有爰立之屬故以授之寵數雖厚而疾不加損九年正月某日竟以不起聞上哭為之慟即日徃臨其䘮罷朝葬禮皆加常等詔贈侍中有司諡曰元懿上悲歎累日顧謂侍臣曰熈載事君之心可謂純正無它適當委用奄忽至此深可惜也近世執政旣罷而卒車駕臨視亦自公始咸平二年八月詔配享太宗廟廷慶厯某年加贈太師中書令兼尚書令追封代國公夫人清河張氏南陽郡太夫人繼張氏安定郡太夫人皆以子預政推恩也二子長中孚早逝次即少師也少師諱中立字表臣生十三年而僕射薨居䘮如禮天子欲速官之一命為西頭供奉官早服名教不為綺襦事折節讀書從諸儒游誦六經百家言作為詞章如老成人十八獻文闕下換光禄寺丞賜朝散服咸平三年以殿中丞入書館為直集賢院屬時右文天子修盛德之事君臣􅆳歌雅頌之音播四海内相楊文公一代英才主盟斯文公與中山劉公筠潁川陳公越成紀李公宗諤游其藩更唱迭和合如一律朝廷每有論譔公與諸公常在其選而公尤勤鉛摘中外書無不請校有疑舛不輕塗抹一經其手四庫以為善本入尚書省為員外郎以祠部判三司理欠慿由司以刑部賜銀青服兵部充鹽鐵判官遷郎中以禮部判南曹移户部勾院仁宗即位轉户部充史館修撰糾察在京刑獄天聖四年以吏部知制誥同知貢舉歴諫議大夫給事中景祐元年入翰林為學士轉禮部侍郎加承㫖兼龍圖閣學士於時公踐臺省幾四十年近司要局文武選部無不總領朝廷典章文物無不綜練兩禁雜定見謂議論有餘而未嘗矜已上以為長者可用四年拜參知政事在位謹文墨循故事不求赫赫名明年罷為户部侍郎資政殿學士判尚書都省久之加大學士兼提舉祥源觀慶厯四年告老於朝以太子少傅致仕皇祐元年遷少師其年八月某日薨於私第享年七十八天子廢朝有司歸賻如禮太常諡曰文定夫人張氏先亡後夫人王氏封太原郡夫人七男曰居簡少以文名顯諸公間終太子中允集賢校理曰夷簡大理評事曰昭簡太子右贊善大夫皆早夭曰從簡國子博士服公䘮甫五月以毁卒三女子長歸孟氏次范氏次沈氏七孫男曰祖仁祖賢祖元祖方祖良祖溫祖冲惟二公父子相繼逢辰得位立朝有勲節祀大烝易大名其踐掦如此若其操行履方士大夫所稱道者又可得而述焉僕射事太宗由府從事至右相更中外筦樞極恭乃職一乃心造辟而言奉制而行是非好惡無所顧避上深詧其忠實委任眷待終始不間時論稱其長者事繼母牛太夫人服勤竭力雖躬負沈痼無一日廢定省甚則扶杖而前不見疲曳之容母弟終䘮欲還本宗公曰在同亡别豈如存之事不聽其去分貲保任與同氣等其在官也主平恕通簡居顯要不異小職時事劇易一切倚辦待士盡禮敬出已上者不能屈在下流者不使怨志欲成就人物表甥故參知政事趙公昌言少將二親依公家躬為教誨授書學文至長立遂以大顯素善梁縣令蕭守勲後貧困公分祿以贍及卒遺四子諉公悉為婚姻不失時如蕭之存親族之孤寡不能立者聚而衣食之僮𨽻之吉凶不能舉者憫而資給之聞公之風者歎慕而則效故趙公作銘以叙其事曰公忠孝恭義惠全德具美求之古人無間然觀斯言則公之行實可悉矣其家政門法蓋有繼述者焉少師樂易寛裕出於天資行不為崖異仕不為苟合操修施為惟才分是守自解褐掛冠未嘗去朝廷淡然安所職凡領二十官五學士皆久次平除徊翔禁省幾遍而不處急流平時比牒並肩或子姪行多躐取右職獨無一語咨歎對上前有所問但援故實沿革復熟講解聽上裁可議者謂真得儒臣體在政府時有啟奏不顯斥是否或見聽納終不漏一言内制除命多不傳稿其慎宻不近名如此故平生寡過惟在外制日一坐舉官不如狀奪修撰糾察屬員旣不多取名又能協和與衆故未嘗為人所訾怨蓋古所謂明哲保身者歟善與人交凡游從無親踈貴賤先後輩相與宴飲笑語諧隱亹亹不窮終無一言忤物嘗以論議小戻楊公退而移書引咎自責不逮及相歡如初乃已家素饒財少時悉聽諸父昆弟掊取一不問有無所羡即用為賔客飲食費晚年産入比其初纔二十之一亦不増殖惟待俸賜以為養退居遘疾醫藥殆不給仁宗知之特賜銀三百兩及薨第舍無存者䘮事待賻而後具世稱其清尚書宋景文公評之曰如公才能門閥使之少事聲利蘄黨助嗇先貲徇務近時則亟顯而易富今舍是不為非蹈道者莫能辨其得失雖然初若偃蹇難進卒以長者大用是何耶聖主知人明而進賢之道廣也嗚呼二公之進退所存見於事業者又若君子之澤必在其後殁世五十年而顯者蓋寡其有待耶元祐中予為吏部尚書嘗言於上僕射太宗功臣少師仁宗執政其後嗣獨一孫祖溫陞朝籍名臣之世宜蒙襃顯祖溫自爾稍見任用今為朝請大夫利州路轉運判官樂陵之裔其庶幾乎石氏自唐占数河南世墓皆在洛陽縣宣武原二公繼封樂陵郡亦不去洛薨皆歸葬焉僕射食實封一千七百户為侯爵其葬也以太平興國九年四月十三日少師食三千七百户為公爵其葬以皇祐元年十二月某日二冢並祔太師塋之次穴子孫從葬者又数世矣闕垣之松檟森然如林盪矣朝請君旣承祖重每念孤立寡兄弟懼弗克勝後事惟是修飾墳墓表章遺烈可以塞嗣人之職謂予嘗有言詳知本末礱石禭道求文以終其事其請甚勤至於数四故不得辭銘曰宋有良臣世席台宰文學彬彬吉士藹藹運屬勲華相惟元愷君臣一德旦暮千載西樞東府謀謨亮采武律文經光天之縡懿行清規為時模楷四朝百年遺風未改猗歟樂陵之宗德音如在藝祖天飛羣龍翼隨朱邸元僚風雲並馳漸階記室試劇王畿神功求舊協贊惟幾南抗州節殄獠平夷北從戎路俘元走奚奮庸宅揆同儀鼎司雖稽拜衮卒配烝彛於戲元懿之勲一何巍巍章聖治定仁皇繼聖樂善好賢詢咨舊姓英俊並逰義理相應鳯掖鑾坡代言書命徊翔二紀不絿不競終以夙望參毗大政難進易退委逺時柄歸老都門考終順正是為文定之行後終有慶盛矣二公孰亢厥宗象賢是繼克紹餘風田園將蕪門闌益充鞏洛天中三世丘封維祖維父墳闕相通維孫維子堂構斯崇載銘隧路丕昭世功嗚呼樂陵之塋垂裕無窮祕書丞贈太師劉君神道碑惟劉氏世為望族蓋二漢享國歳久分王子弟幾遍天下千餘年間小宗别子枝離𣲖析或顯或晦散在四方而河間之胄自章帝之子開始胙王土傳國久逺遂居河間之樂成王之十世孫通仕後魏封樂成侯樂成今樂夀是也樂夀之族其别有四一徙尉氏一居饒陽一在平昌一畱故土不去其後尉氏有仁軌以功名顯饒陽有君良以孝友聞平昌有蕡以文學髙第名重當時惟樂夀之子孫最多至以劉名鄉其仕者或入朝為郎官或入諸侯幕府無甚逹者侯之裔孫曰繢避地遷安陵以財雄鄉邑而不仕宦安陵今曰將陵𨽻永靜軍之東光縣累世葬其地曰五德鄉遂為東光人繢之四世孫曰崇少長謹厚輕財好施予鄉里稱善人有子曰盛克繼父業盛之子曰溫潛德鄉閭號稱處士處士之子曰格力儒自奮治左氏春秋兼通公羊榖梁二傳景德初契丹入宼瀛關郡督士民城守以功補三班奉職試書判入等改吏銓選終滄州觀察推官生三子長曰允恭治毛詩次即府君也諱居正字安行季曰居業並承家學舉進士府君中天聖二年丙科歴大名府館陶棣州陽信二主簿陽信圭田之入素厚然無見土大姓有占名輸租以庇里役者府君案實履畝取租無土者皆除其空簿使歸役籍郡官初哂其迂且疑其獨異它日訟起旁縣扳援證逮連坐者千餘人始悔不用其言遷漢州軍事推官用薦者改祕書省著作佐郎知青州博興縣兼兵馬監押剸劇析煩治為一道最邑之富民李氏子以常與進士鄉貢使氣任俠隂結貴要以張聲勢至使郡大吏移書縣官蘄善遇之府君得書立捕於庭下䟽其前後不法事李叩頭汗伏聽命請自新遂戒告而釋之或諗曰得情不治無乃惠姦乎對曰知過能伏釋之所以勸善於是或者又歎其恕而有教就移道州江華縣楚俗喜訟雖健令決之盡理猶恥不勝則又赴訴於州於使者前後相望弊浸不革府君則悉索新舊案牘剖析開譬使之曉然兩造皆懾慄而止監司知其能多以它郡疑獄屬之若衡陽譚氏訟家産事累劾不能竟府君一訊情得不復異詞自是逺近信聽獄訟為之衰息至嘉祐中有令曰黄照亦以㤙信得人其里民為之謡曰我民無忘前劉後黄至今東南人猶能誦之凡世之言吏治者莅事明察或喜於得情而以不失有罪為能持心平恕或狃於不忍而以省刑縱出為允是皆中有所徇者不中情實遂成偏黨之蔽若乃明恕兩得切近人情察見奸伏而舍其旣徃不自以為明治有威愛殁且二紀而人猶懷其德此其實跡明效見於事為者非夫至誠不疑内恕及物其能致是乎府君夀四十有四官祕書丞自江華千里鞫獄衡陽遘疾考終於官舍時康定元年八月初十日也夫人陳氏都官郎中希古之女先府君一年而逝生二子伯摯嘉祐四年進士甲科歴監察御史御史中丞尚書左右丞中書門下侍郎尚書右僕射今為觀文殿學士知鄆州兼京東北路安撫使仲周六幼不育女子四三適人壻曰梧州司理參軍梁諮某郡尹之才某郡唐灌一幼亡孫男四曰跂雄州軍事推官前知鄭州管城縣曰蹈奉議郎早亡曰蹟越州會稽縣主簿前監國子監書庫曰路右承務郎孫女三壻曰右承務郎蔡蕃韓誠右承務郎趙仁約曽孫男七曰長吉長庚長守長厯長言長廣長書而長吉長書皆右承務郎曽孫女未嫁此其家世源流之逺非積德之報孰能盛大如此乎府君好學敏文詞平生所著甚多以早亡弗克編緝放失之外今有論議詩賦雜文總若干篇嗣子類次為二十巻藏於家少好書籍初模範二王後兼採唐人用筆法有得其行草帖者至今猶藏去以比李西臺建中其篤學多藝雖出於天資然亦家法所漸有自來矣府君早失怙恃昆弟敦睦敬上撫下家庭雍雍世故饒財其弟年少好逰數欲析産府君弗忍亦不能奪辭所分又不得因受臨津田數百畝隂畀族人佃之終不取也及官陽信買渤海田占於郡籍而躬未嘗一到其歳租亦以贍族人以墳墓所在爵里惟稱東光府君性莊重寡言望之若有標置而即之甚溫訓子極嚴或勉以一子盍少縱之耶答曰政以一子故不可不爾耳其亡也子纔十齡夫人之季弟孝若從行在旁伯氏得訃自蔣陵走五千里抵衡陽與孝若擁孤輿櫬歸菆東光佛寺其孤煢然服衰寓外舍鄉人共哀之伯氏曰吾弟孝友不欺鬼神所鑒豈止是而巳也士大夫知者亦曰斯人世著德義其興未艾也熈寧四年丞相為御史謁告於朝自東光奉府君之柩自將陵遷大王父母王父母以八月庚申同葬於鄆州須城縣盧泉鄉太谷山之陽將陵故塋封植久矣比歳數有河患乃謀改卜三世同壙用甲庚壬穴山陽重岡水出辛兊地合寶典語堪輿者咸曰劉氏其不亡矣初丞相自御史至中丞五經霈恩累贈府君自尚書屯田員外郎至通議大夫夫人自福昌縣太君至潁川郡太君由執政洎元祐四年明堂恩兩贈處士君太子少保妣倪氏北海郡祁國太夫人推官太子少傅太傅妣李氏隴西郡崇國太夫人府君太子少師太師夫人潁川郡康國太夫人又以宰相初拜贈處士司空妣衛國推官司徒妣定國府君太尉夫人慶國七年以殿學士郊恩贈推官太傅妣韓國府君太師夫人燕國三世墟墓以一品封域崇臺築闕如今丞相殿本邦歳時展省以牢醴奉祀又得造浮屠於塋側勅號將陵寺曰崇先承慶須城寺曰昭善崇報每歳興龍誕節得度净人如例追崇顯赫極人臣之榮非獨稽古之力抑孝誠所感神之聽之信不虛矣府君殁世三十年而葬有故太常少卿任公粹為之狀故參知政事元章簡公為誌葬之二十有三年又有今龍圖閣待制趙公君錫狀其逸事以告史氏於時丞相鎮天平之二年將勒銘神道假文於嘗僚某某與丞相逰從有素望府君為前達雖未嘗接迹固亦講聞其德義矣然於閥閱葢有不知今考三公誌狀與所聞皆合故得詳述其本末以慰孝嗣追逺之志而系之以銘曰公侯之興有來自逺源流深長支實蕃衍武穆文昭不興者鮮盛德有後雖微必顯奕奕劉宗肇於沛豐河間樂成漢魏再封世踰十八爰逮司空系胄蟬聯慶鍾在公公以學仕文科丙第資適逢時儒雅飾吏婉娩通閨徊翔中祕德厚位卑光流後裔有行有言鄉黨稱賢不取中貲無占虚田明見隱匿仁寛宿愆人謂隂德其後信然英英冢嗣國之碩輔據鼎廟堂擁麾帥路故國新邦便蕃寵數維孫曁曽稟承厥緒大谷之陽有封若堂坎庚壬申三世之藏葬以士禮朱芾銀章祭則三公衮衣黼裳遺風餘烈有銘在穴耽耽梵宫峩峩石闕拱木成林豐碑象碣於昭德音綿祀無絶隴干姚將軍神道碑銘皇城使雅州刺史姚君兕與其弟西上閣門使英州刺史麟旣葬其先府君三十有五年矣會天子熈寧十年冬十一月親郊肆赦推恩在廷得以追賁先世如故事於是列上府君前此所贈官加贈某衛大將軍制書始下伯仲相語曰著令三品得立碑墓左我先人以忠義死於國事關隴莫不稱其大節雖壯年凶閼不克終其功名而吾兄弟幸得承緒餘班朝列䝉國厚恩漏及泉壤者數四矣然而丘墓未表神道不嚴非所以旌功烈而崇孝思乃狀其閥閱丐銘史氏時予適與英州同使臨潢每接緒談必及先世因得詳其本末遂揭辭於螭石云將軍諱寶字某家世五原人父諱某少以武健稱其挽强中逺葢有絶於人者故鄉里皆以硬弓目之羌戎與相遇輙惴慄不敢校景徳元年曹武穆公瑋守鎮戎知其可任召與語曰若知六盤山西良田萬頃久陷虜疆若能以力開拓歸中原則世為邉圉將不亦善乎於是發私財募五原子弟千餘人大城隴干遂闢其西境四十里築壘其傍土人謂之姚氏堡曹公嘉之為四寨民兵巡檢漸完使南牧隆消河有勞聞於朝廷未推賞而卒關隴之人咸謂功顯名晦必將有後繁衍之澤其在將軍將軍好學知書長於騎射以翹勇繼父任前後降黨畱生羌破煙景雲等畨部功力居最守將連章薦其材武仁宗皇帝召對便殿擢左侍禁隴干都巡檢時元昊負固西師連年不解將軍獨乘一障志期自效康定元年春賊欲由東沿州乘夜寇邉掠近山居民將軍得其要領隂募死士至期伏隘路縱賊入境居民悉遷避他境賊無所得旣歸伏發皷噪迎擊斬馘首衆其獲生口悉畱不殺亦不自言功由是邉人歎服而謂有隂德前後大小三十餘戰皆為先登體被數十創而勇氣不讋親友或勉之云數以孤軍當賊鋒萬一失利餌敵何益異時遇寇冝稍居後殿以竒謀破虜足以邀美利不失為良將也將軍以謂凡被堅執銳者望敵聞聲便當奮擊何暇自營顧慮而以軀命為計乎苟不負國家雖死寇讎吾得其所矣定川之戰涇原副帥葛公懷敏與虜較者十餘日官軍不利將軍同陷於賊朝廷惻傷優制贈某衛將軍厚恤其家官諸子弟者幾人是役也雖軍帥失律偏師不返而殺畧戎馬破盪區落葢亦相當自是元昊勢益窘矣未幾遂有納降之請則諸將死戰功不為薄嗚呼古所謂名將帥者或建殊功或立竒節或自致富貴或不脫患禍葢義之所在不以勝敗為重輕若將軍起疆陲捍邉圉雖不能俘戎首覆虜巢以成其宿志然躬當矢石卒死虜境顧其平日自誓之志是豈苟免以蹈不義者耶古人所謂援枹皷立於軍門使百姓皆加勇焉者其將軍之謂乎其後二子以才畧相繼取貴仕七孫皆用戰多補官抑由忠義之訓貽謀來葉卒如隴之人言云耳夫人同郡杜氏實生三子仲曰熈早卒兕麟孟季也累封夀安縣太君以熈寧八年二月終於秦州季子官舍其婦德家範具於涇原帥龍圖閣直學士王公才叔之誌焉將軍以慶厯二年冬十月二十二日殁於陣以明年閏九月某日葬於朝那縣中安堡隴絡川之北峗社夫人後亦合祔其壙銘曰四序殊時五方異土霜秋氣勁崆峒人武夏戎不庭王師濯涇有帥有士作我長城在章聖世武穆作帥殪遷拊明威肅遐裔帥之爪牙姚出良家開斥土境革戎為華仁宗伐叛平陽血戰將軍從之卒同死難我雖棄軍虜亦遁奔帝念邉戍復許稱藩人道所貴曰生與義義苟有在死復何愧攘狄惟雄盡節惟忠世亦有人繼成顯庸矯矯嗣子能濟其美並收戰多偕取榮仕天子親郊推恩在朝再頒䘏典賁彼泉蒿朝那故里涇水之涘丘墳在焉過者必止隴人有言姚為壯門功名才武父子弟昆定川之殿衆懷忿怨視彼讎方終期盪殄請碑道旁以警諸羌忠義所激人思奮揚蘇魏公文集巻五十四
