body:
  text: 蘇魏公文集巻四十八宋蘇頌撰啟謝館閣校勘右某䝉恩充前件職者覆實胡門之禁觀藝非長寘名渠閣之聯饕榮為甚異恩所被内省奚堪竊惟在昔承平之隆崇右儒雅之選並建冊府内儲祕文時登翹又之流以分繙於類例又擇該通之士以刋正於舛訛至於讎對之員漸聞増置之目取人之路其任攸均逮祥符好文廣鴻都之書副跡開元故事有麗正之官名中經既充列職隨衆雖弗為通籍之貴方雜處寫宫之間然而啟發篇章竄定朱墨並資殫洽之藴是正文字之殊如匪直能誰云稱選伏念某才性弗敏識致本迂逄辰亨嘉就士閒燕初聞家訓戒餘力以學文濅誦師言務及時而進徳旅從鄉賦僅䇿詞科得調三銓從事四府卒因累日之課稍進列卿之丞刀筆為勞久奔馳於外吏縑緗所志益愧負於初心希光英俊之游何階榮進之望嚮者禁林為之列牘朝廷恤於孤臣料從隨牒之卑収預試言之召愈慚陋學入賦嚴闈羣公尚葢其蕪辭假之優署上宰不遺於介善賜以甄成冐詔綍之平除預書筵之亂綴磨硏編削頓離簿領之煩躐纓整襟日接閨䑓之彦省循其幸遭㑹有繇此葢伏遇某官協贊邦猶主平時論樂烝髦於皇寀思致治於賁文人挾寸長靡聞於棄用士名一藝咸見於奬収是令眇㣲亦玷掄柬眷所䝉之已厚期欲報以難輕固當負袠宿官潛精志業考㑹字書之牾叅訂於前篇詳求畧録之餘更資於新簿冀成鉛槧之効弗累權衡之私潁州到任謝二府右某奉勑差知潁州軍州事已於今月日赴上訖者久玷書林驟紆州組去閒就劇既懼且慚伏念某性本顓侗學無師法常持是古之論未免詆譏進乏適時之才自甘散滯荷承平之樂育獲儒館以優容濅厯嵗躔亦更事局間輙謀於私便因請補於外官校中五經之書僅成編目假二千石之守俄被選俞自國而南潁為善郡長人之寄時號優恩昔之偃息以作藩莫匪朝廷之舊望豈伊孤進遂此一麾斯葢伏遇某官至誠與賢平施稱物贊化鈞之獨運甄人品之衆流特矜羈拙之蹤見處便安之地誠為厚幸庸詎勝言方今民力尚艱邦刑未厝屢煩温詔慎擇守臣自審庸愚方䝉任使敢不度時所急思職當行察編齊疾苦之源副君相憂勞之意少収課最上報生成謝知府宻學右某近者得補汝隂待期江介望封圻而弗逺趨賔闥以無由矧素荷於知憐但傾懷於風晤音幐闕禮簡曠成愆恭承肇届春陽鎮綏民俗舍棠無訟考履多祥惟簮橐之巨賢本股肱之同體公權台輔之望衆議翕然弱翁治理之聲上知久矣諒俞音之匪晩佇歸節之權趨某幸以世契之隆姑託陶成之賜騰裝有日去徳罙賖願勤遵養之方下副夙夜之禱謝運使學士右某去嵗使斾過都甞投謁䞇逮歸去國輕逺恩門每懷奬與之私滋劇系馳之素此者叨從郡補獲𨽻使封揆材質之非長加吏文之弗狃惟民師帥之任懼無以稱於選掄頼部刺史之賢固足以振其愚短竊兹循省良用欣榮伏以某官性與道俱才為世出奥學臻於聖域髙論愯於朝端歩武中䑓久躋清要之地案條近甸暫倚詳明之才朝廷方佇於謨謀朝夕即登於要近發乎經濟之緼恵彼蒼黔之民時乃舊游永依大庇屬方涖事尚阻承顔願良以自珍副遥心之所祝謝運使郎中右某昨被朝俞叨從郡補屬布條之云始思裁牘之未遑不圗信介之來俄拜篋封之辱味言滋溢懐愧則深緬承副計之閑茂擁善祥之助恭以某官敏才經務冲識鄰幾聲震仕途華登郎選蚤膺朝委已樹政於淛藩俄柬上心從贊謀於澤節坐叅調燮行集富饒併疇膚使之勞入被近班之寵屬拘官守悵阻風期惟倍保於清􅁭冀逺符於詹系謝集賢相公右某伏念郡組遐縈久隔門庭之侍台躔委照忽紆簡牘之頒仰荷眷憐居深感畏恭承保綏吉履増集天倪伏以某官鼎棟元臣蓍龜舊徳儀泰階於三象歌巖石於四方筌宰同寅已載股肱之詠乾坤交泰坐凝社稷之功方屬炎歊未遑謁䞇伏望上副毗倚精調寢興回謝集賢相公右某伏念仰熒煌之􅚋每切於依投拜欵宻之函曲承於眷記恭審調燮元化寶練生經神相是膺天和並集伏以某官道符典則行著儀刑明識以通古今重徳以鎮風俗登翼惟新之政弼成可久之規四海之瞻久䝉於利澤百年之化方見於治平候屬商秋地遥賔閣伏惟上為宗社精調寢興賀叅政侍郎右某伏審某官即拜言綸叅持政柄被恩惟舊聞命胥懽伏以某官鍾粹太和膺期盛旦奮材猷而入用契筌宰以相求立朝盡諒直之誠賦政有將明之効繁機密命昔叅頼於贊襄冡宰近司今薦移於寵任已積彌綸之效允諧中外之心佇進上階永毗至治某素慚懵學最荷深知推轂使前顧重恩之未答守符於外修慶謁以無由賀樞宻諫議右某伏審某官寵膺制綍進貳天樞凡被眷私舉同抃躍伏以某官五辰鍾秀九徳兼謨繇大對而結主知厯旬嵗而更器任常楊掌誥為一代之詞宗趙張撥煩居三輔之治最入陪帷幄叅據廟堂誕掦經世之才佇正秉均之拜某荷知惟舊聞命胥懽限州組之方拘企賔階之莫及仰依陶冶徒結系馳賀判府太尉相公右某伏審某官拜恩典冊加數節旄坐移上相之庭就委三城之鎮翰垣増重寰甸均休伏以某官道徳元龜朝廷隆棟入則順事於百揆出則宣力於四方勲業冠時忠規簡上嚮自宰樞之均逸暫從輔屏以觀風謝有善君固周邦之相慶虞咨州牧將柔逺以任能繼煩同徳之賢久殿折衝之地藩軍成績已遂請於魚符當扆待賢佇再調於鵠鼎某早游翹館久去恩門欣聆前纛之還尚歎行郵之逺限拘州印阻詣賔閎回提刑度支右某叨𨽻使封阻親燕晤敢謂謙光之眷特貽函教之儀銜賜彌深増慚迨甚竊審詳亷之暇益全頤養之方伏惟某官國棟宏姿寶珩粹禀負首公之大節宣應務之劇才暫讞刑章允副寛平之望已聞召㫖佇陞要近之聨隆暑向繁髙閎尚邈冀精葆衛下慰傾馳賀安撫侍讀侍郎右某伏䝉某官光膺中詔出鎮巨藩凡在提封舉深慶抃恭以某官嶽符禀秀寶緯生才文窮述作之原識周治亂之體奮掦世美顯服禁塗授將鉞以臨邊繼収豐績侍殿帷而摘句屢告嘉謨懇辭京劇之煩請殿封圻之近憩旌伊始坐閤攸安矧望在於廟堂豈久留於方面佇聆迅召入副疇咨某被顧有年遡風尤切幸𨽻名於使管阻執贄於賔閎心所嚮翹言非殫究回知府觀察右某伏念嚮預朝趨每瞻顔表洎承郡補益逺門隅寖劇遡風之誠罕通執訊之問敢云貴要顧此冗閑紆翰勒以為儀篤情文而示好言因喜溢固多虚奬之談志以方回乃盡勞謙之意祗循恵好豈廢中藏伏以某官生質粹純才資敏給席公候之餘慶簡睿聖之深知譽洽士倫恩隆戚里亷車命秩誠徳位之相先使竹臨民矧政刑之允濟已從詳試即佇褒遷限封壤之正遥接燕言而未遂願順生經之固少符善祀之勤系慕所深究宣匪逮賀知府龍圖右某伏審光膺朝檢出布藩條凡荷眷知舉深抃躍恭惟某官學窮精祲徳富誠明繇邇閣之敷經踐禁塗之持槖厯更典領益著謀猷間得請於黼帷遂均休於符守初聆頓節已傳來暮之謡矧在鄰疆竊幸餘輝之庇方修贄禮遽損占書載循喜溢之言第劇欽銜之素封郵雖邇音㫖坐遥佇聞召節之頒前慶近樞之拜炎威如熾鈴閣方休冀眠食以自將副夙宵之所禱回祥符知縣郎中右某伏念符守拘縻標顔阻邈徒切遡風之想濅稽染翰之儀逺貺華函曲敦重禮眷此晩生之無似奚堪舊徳之相先銜愧自中刻銘罔替伏惟某官士林孤秀朝路通才試政事以甚詳藹聲猷而彌逺郎省時之清望久爾踐掦赤縣國之要官重兹委用已著循良之效行膺顯近之資姑冀䕶調少副勤企回同年著作右某伏審同年著作被諸府之薦能副三銓之覆實拜恩槐陛進秩蘭䑓素推應務之才兹實漸磐之始夙叨朋好竊抃榮陞官次坐縻展慶儀而未逮謙撝逺篤紆華幅以為先展味懿辭欽承重禮但感銜而不足遂藏去以無㤀時方用才日遲登俊永言傾嚮匪假周談賀留守相公辭太原再領西京右某伏審某官光被贊書進崇命數推至誠而確讓止褒冊之既行特帖後恩即移舊府義激周行之次歡騰近甸之間伏以某官奥學際天元功冠世熈帝之載則書叙九徳之歌知幾其神則易稱萬夫之望自兩登於魁柄皆弗處於盛名委政廟堂出藩畿甸邦國若否昔頼山甫之將明輔相重輕今繋晉公之出入昨以虞州咨牧漢冊圖勲坐移丞相之庭往殿太原之壤端揆崇秩所以尊師長之賢尹正重名所以増方鎮之體矧枌榆之故里佇旄纛之來歸而相公内樂安閑弗榮寵利亟露章而懇叙務辭爵以彌堅宸扆為之動懐朝制因而収汗止拜常山之節還臨洛宅之都俞命傳聞羣倫愯歎竊謂筌宰相契上方有舊人共政之求㝢縣具瞻下益思大鈞播物之恵雖暫諧於冲志諒即被於疇咨三冠鼎槐抑有本朝之故事再開鑪冶將副率土之傾心某早荷甄収方塵郡寄側聴保釐之始欣依臨照之餘恪守印符莫獲修於慶謁傾馳懇素姑永託於生成賀知府龍圖諫議右某伏審茂膺恩渥易守藩宣伏惟慶慰恭以某官清徳藹躬懿文邁古逄㑹光華之旦徊翔清切之塗輟内閣之論思均价人之委寄政成恵洽民詠朝咨再勞撫俗之仁來綏近甸佇對馳軺之召亟進通班繼賢世之令猷畢宗工之能事某忝分州節仰託使封恭聆坐閣之初未遂趨隅之謁傾依盛徳曷諭丹誠謝二府右某嚮以忝恩為郡便日布條循公式以謄書遡台庭而露懇地有常尊之隔禮無宜答之文豈謂某官牧徳至虚降心小物乗政司之多暇紆記室之報章眷舊甚勤特屈廟堂之範披文未既頓生州郡之輝恵賜不訾感銘無盡恭審内贊邦家之務助宣天地之和六氣茂康百祥叢集斯文未墜天方降任於哲人至治在辰上且仰成於良輔敢冀勉遵於時令順䕶生經益副萬樞之毗更増九鼎之固某限拘使竹㘴隔翹材竊深豫附之情永頼陶成之賜轉官謝二府右某此者伏䝉制恩特授前官者攸司上課成命下頒進位甚優省躬斯愧伏念某小才曲藝孤進晚生叙厯朝閨浸塵儒館懐鈆雖久書未畢於汗青請郡既行詔遂分於半竹凡更内外頗渉嵗年屬大比之甫期乏寸勞之報最公朝平施著令應遷擢聫三署之行仍躐左曺之要異恩所被非服是慚此葢伏遇某官陶冶百工權衡衆職使士大夫各稱其任無賢不肖皆用其長心推至公道弗異逺眷是顓愚之質薦䝉樂育之私増秩留州荷深仁而已至悉心為政惟來効之是圖將論報於生成敢殫勞於夙夜轉官謝監司右某此者叨膺制綍叙進郎曺寵渥所加庸虚靡稱伏念某天資弗厚學術固踈仕厯朝閨職塵儒館内掌故事於時無益於毫分出領近麾臨政未聞於善最屬攸司之大比縁滿嵗以應遷増秩甚優冐恩為愧此葢伏遇某官澄清使部振肅治綱羣吏臧否頼案亷而悉上公朝黜陟俟贊啟而後行非才所䝉其姑繇此但益勤於吏職期不累於已知提刑轉運先狀右某伏審某官差日登車便時行郡冐潦塗而匪易擁茨福以無虧露檄諸城已禀行䑓之範屬鞬近次佇修列郡之儀瞻望風徽竊深悚抃賀運使度支右某伏審某官内膺制綍出領使權伏惟慶慰恭以某官文懿學純徳方氣直夙擅儒林之譽蚤登郎署之榮司㑹佐籌朝用富彊之畫近畿案節上咨良直之謨行觀風績之騰聞入副宸庭之顯用某適叨守郡獲事提封第傾賀厦之誠尚阻承顔之願其於欣激曷諭端倪賀知府侍郎右某伏審光膺中詔榮鎮巨藩伏惟慶慰恭以某官秀禀天元識探道奥蚤躋榮於顯路自結知於上𠂻屢分圭竹之咨薦著循良之効撫綏方面坐期風教之凝進拜樞衡式副巖瞻之詠春陽伊始使傳方勤願益保於生經庶逺符於私禱賀淮南運使右某伏審顯膺詔檢榮緫使權伏惟慶慰恭以某官秀禀天元識探道奥自結宸旒之眷爰陞郎署之華日著聲光屢厯藩宣之委朝資經度緫司兵食之饒利毫坐析於江淮風節聳驚於郡邑竚迎褒召别踐顯嚴豈惟協輿議之歸故可展大賢之效某比拘班教尚阻承顔冀順保於生經庶益符於私禱回侍讀右某言念奔馳吏職隔濶俊游嚮義雖深親賢未遂豈云明哲之見顧貺以緘書而示情徳盛禮恭有勞謙終吉之美道同志合推相下不厭之心自惟薄才徒服髙誼恭承紬次於儀典方勤啟發於篇章累朝所行一旦大備自非精思之敏曷究淵源之來勉冀䕶調將副咨用區區所禱喋喋靡宣回夀州知府到任右某伏審某官出持使節已署郡條頒仁政以便民聴風謡之載道矧素推於才譽已詳試於良能諒非𤓰戌之期即被璽書之寵别躋顯用乃協輿言某叨假便麾幸依鄰壤方竊潤河之廕遽承占牘之貽欽佩多儀但深於刻著􅃡懐懿範罙切於系馳姑願珍調少副勤祝回知府内翰右某伏以天府浩煩之地任峻時權複門演潤之司職崇内著側聴恩俞之始實増抃蹈之誠恭惟知府内翰奥學輔時懿文華國魁甲多士羽儀盛朝暢風教於近藩備諮詢於法從龍荒結好生原隰之光輝鼇禁代言増訓辭之深厚暫勞治劇即慶登庸敢意眷慈特貽手問荷謙撝之有素激悚抃以逾深願勤導養之方少副傾祈之素回伴讀郎中右某伏審趨召節之嚴已修陛見視宸闈之學爰涖官儀裁慶問以未皇沐勞緘之猥及載惟謙厚増切悚銘恭以某官直道被躬純誠許國謹信自任祕温樹而不言清亷所髙潛郎曺而為樂國藩初建聖慮攸先式顧老成之風首膺進讀之任春陽在候燕晤未涯倍冀珍頥用符誠禱回廬州知府郎中右某近者使艎過郡獲修贄見之儀征斾首塗旋愴風期之逺辱華牋之猥及荷厚意之彌深竊承涓日惟良布條伊始幸接𤓰鄰之末實依河潤之餘恭惟某官植操端方懷誠謇諤出被藩朝之委入分財計之司聿眷耆明均休近輔矧淮淝之奥壤控南北之通逵英節之臨實均於方任甘棠之愛佇見於詠歌春律載陽晤言正阻倍祈保衛式副企瞻回鈐轄右某嚮叨共事幸親談燕之娯俄屬改轅遽悵聲容之别方深企徳猥辱占書竊承衝涉之勞無爽和倪之妙恭以某官清規格物淑聞藹時蚤縁睿眷之隆薦領兵防之寄謀惟可倚講練尤精諒匪俟於終更即别膺於峻召披風正逺珍食是祈欽祝之誠旦夕以冀回郢州知府學士右某嚮者某官輟蓬山之直紆富水之章聆涓便辰即署新政頒春庶俗已騰愷悌之謡講好它邦遽逮緘書之禮自惟亡狀素辱與㳺相望隔於封疆馳神劇於嵗月恭承惠好増激感悰竊以某官修性淳明執道深固學術足以表於士類政事足以達於民宜入觀石室之書已大正於訛失出假竹符之守蓋暫試於才猷異時從橐之求當首追鋒之召朋從之分企佇實勤惟善御於沖和副祝祈於旦暮上交代職方右某伏審光膺綸檢就領州章伏惟慶慰恭以某官識量淵淳風猷沈正屢更事任益著聲光薦仰副於朝咨來暫分於州寄自慙前粃得忝交符佇臨滿戌之期併叙與游之舊初炎在候珍食是祈行趨召節之嚴别踐顯塗之峻二府賀冬右某伏以日御迎長斗繩維北地雷衍畫慶叢陽復之亨鍾鼓布庭儀盛嵗元之亞恭惟某官道躋民極徳配黄鍾宣曜三階之符參和六典之職信功順事有若虞之臯䕫應變守文則為我之姚宋適履嘉辰之㑹方毗至治之期益介夀祺永扶運祚某限持州節阻奉慶觴傃翹館以馳誠託書筠而寡喻外任兩省賀冬右某伏以室琯升陽臺雲紀瑞輯朝圭而展慶獻紋履以迎長伏惟某官性藴端方徳猷純茂巳試大儒之効自結明主之知蕃宣屏翰之勞四方稱誦輔弼疑丞之任匪日登咨乗吉旦之嘉亨擁祥經而膍厚某限榮州組坐隔賔軒祝望瞻依倍百常等鄰郡賀冬伏以天正開統日晷迎長挺柔荔以應時候飛葭而布琯伏惟某官躬富才美治稱循良方開吉禄之榮益饗純禧之茂各縻官次阻叙慶儀但勤致祝之誠莫究傾思之意其於祝嚮曷既聲言二府賀正右某伏以七始推元三正建朔布典常於王闕㑹朝貢於春庭榖旦惟新近司叢祉恭以某官天鍾全徳體蹈大方協期運之休明應階符之炳耀内總三事朝廷以之尊榮外撫四夷方隅以之底定適屬履端之始允膺畀夀之祥永輔熈平式光才美某守符於外䞇謁無階瞻望門牆但馳誠素外任兩省賀正右某伏以履端於始史氏所以正三朝以正次王春秋所以尊五始矧㑹得天之數見臨交泰之期恭惟某官直道體和嘉猷濟衆縁飾真儒之事布宣明正之恩近甸列藩被仁風之浹洽元正上日開福履以駢繁乘此春祺行歸禁路某拘官有守叙慶無階禱嚮瞻依實倍彛等蘇魏公文集巻四十八
