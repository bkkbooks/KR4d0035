body:
  text: 蘇魏公文集巻五十五宋蘇頌撰墓表職方郎中沈君墓表君諱衡字公持越州蕭山人也其先世皆不仕至君之皇考始往依其外兄吏部郎王絲以學而君又力志自奮遂中景祐元年進士甲科知台州臨海明州之鄞杭州之錢塘三縣事通判泉州坐法降監衢州清酒務以嵗課有羨得便近官復通判濰淄婺三州代還主管北作坊充提舉司勾當公事自校書郎十遷至尚書職方郎中衣五品服為開封府判官差提㸃成都府路刑獄未行改判刑部又改三司鹽鐵勾院或權發遣由登聞檢院出知潤州陛對賜三品服到郡以疾得請提舉杭州洞霄宫以熈寧七年六月二十一日終于蘓州之居第享年六十八為人嚴整守法尤精吏事始為臨海時年尚少縣境瀕海多聚盜攘羣不逞之徒時或殺傷良民奪其資貨君悉為究訪且知主名區處募少壯千餘人一旦與度海以計禽之窮治得其實抵法者百餘輩人自以不寃郡上其事時相才之進官躐一等錢塘縣倚州郭生齒繁夥而版圖不治賦役常苦不均舊令憚于改作君至為之升降户等皆得其實人以為利泉有二商人負擔出而一人獨過期不返其家意為先歸者所殺得敝裘與荷擔之人適相類者即訴于縣其人不能自直遂誣服誠殺之云棄其屍于溪側官使人視之則腐敗不可識矣雖縣吏亦以謂真殺人者乃送之州君省案摘其情曰豈夜半殺人而能負重走百里且至城下乎且其人存亡未可知因掲于道以訪後行者數日果有人言甞見之于它郡即召而歸之囚遂得釋一郡皆歎伏濰州有里人欲汙其兄者其兄以告它日遇諸塗而毆之至于斃州將當其抵死君固爭不得遂請于朝果杖而釋之在婺日值二浙大水都水范師道奏君提舉蘇湖常秀水利事因言蒲瀝浦可治以泄横流都水是之方欲行其説㑹議論不同而止入朝典領尚方工作事器物皆犀利連中賞格遂自提舉司陞佐省府所至吏憚其詳察不敢舞以事號稱辦職焉初君罷官錢塘至京師待次審官當得泉倅而吏受賕匿其籍君懷不平乃訴其事御史鞫實寘吏于法而君卒得泉州轉運使心惡其以爭得官欲捃以事嵗中起大獄案治纎毫不貸然皆無實狀乃坐以官兵送舉子為私犯遂謫去凡十餘年不徙官㑹龎丞相為淄青安撫還言君淄州治狀始得除過其後數奉詔推劾大獄能得人情隠伏未甞有所縱舍以市恩朝議以幹健許之其撫宗族厚好賙人之急淄守卒賻䕶其家甚厚州人有遇毒將死親為刺臂和藥活之甞推已財以與同産嫁外女之孤嫠者及其亡也家無餘藏曽祖鄴祖仁厚父僑以君登朝為大理評事致仕後贈尚書刑部侍郎娶建陽章氏封某縣君子四人筠常州無錫縣主簿箋蘓州崑山縣主簿籜太廟齋郎筈尚幼女五人太子中舍劉復秘書丞唐殻海中胊山縣尉范汝楫蔡州司户參軍龔程杭州節度掌書記程寛皆其壻也君出白屋無當世資藉結髮從士子遊以文學起家祿仕四十年官五品歴臺省刺藩部追賁其先君有子第進士女皆從士人亦儒者之榮遇也又能勤刻自仕始終一致不為炎凉易操人或譏其深峭少恩而君自信深篤豈所謂强立不懼者歟諸孤􅁲以元豐元年某月某甲子葬君于蘇州之呉縣某鄉某原前期與其壻劉復狀君之行事履歴將求誌于墓石於是次子箋以甞為予從子壻自其家來杭請於予顧多事未暇次述及予還京師而君已𦵏矣箋又繼至其請不已故為之書其説以表于墓云墓碣朝議大夫致仕石君墓碣銘朝議大夫致仕新昌石君諱牧之字聖咨慶厯二年進士予同年生也姿韻沈雅志操髙逺幼無它好惟讀書是嗜未冠從鄉舉藉藉場屋間宿儒父兄行皆器重推先之二十七登科試秘書省校書郎知縣以便親就下補杭州新城尉移台州天台令自初任已有能名于時故相王荆公知鄞縣樞直陳公襄令仙右號江東三賢宰滿嵗用薦格改著作佐郎九遷至朝議比嵗課者三遇皇祐明堂嘉祐治平元豐登極霈恩者四見保甲括牧地有勞減年者再凡知江寧鹽城雍丘三縣通判温湖舒建四州而江寧温湖以别薦服喪避親不赴建安以親疾請侍養不待滿罷去入朝為越王宫太學教授監在京麴院其鹽城雍丘越邸用近臣别薦最後朝選知温州所至治迹見紀初餘杭發十縣官部丁夫治浙江隄岸未幾秋潮漱齧隄壞獨新城所治無患太守方公偕嘉之為言于朝増廣天台縣學擇鄉先生居師授之任以延俊造縣事間則親為講説逺近嚮慕負笈而至者若王景山余京方援伍原輩同時出黌下後皆為聞人陳公甞為文以紀其事先是邑有母告子不稟教令者訊之無大故乃呼之前喻以子事父母之道丁寧訓敕使急歸奉養後二十年行李過其境上母子泣拜馬首曰無狀子自䝉教戒感懼惕厲遂為善良聞者以為近古循吏之政鹽城海寇驚橈鄉聚州使督廹追捕符移狎至初不為動徐料村社义户得勇悍敢前者千餘命軍校部勒教以兵仗寇聞䑕伏鳥散熈寧初頒常平發歛暨役人免募法州縣急于期㑹因致煩擾詔遣侯叔獻察訪至雍丘詢之父老咸曰編户但知變法而不知變法之擾叔獻以聞朝廷方議褒擢後使者以為推行未盡而止然猶被保甲牧地之賞始涖永嘉病火政素怠颶風至則焮焰綿亘姦人利救焚攘敓吏恬不恠寖以成弊因舉行火保之令預為約束使知有犯聮坐一日火作親率部伍視畚挶綆缶之不悉力者收之餘悉競前俄頃而撲滅自是其弊遂革又患州境近鹽鹽禁益密黥𨽻相望而犯者不少衰止嵗課虧損責及郡官于是為設方畧急監臨而寛捕吏限以煑海之數每停竈啓閉牢盆出納須監官與捕吏親臨銖兩不入私門賈販既無所得不數月刑省而課羨州郭有通衢名五馬閡塞不通人行乆矣問吏屬則曰俗傳闢之利舉子而不利長人乃詆曰有是乎立命撤屋開路自爾衢衢不絶後累有登科者温人至今徳之乆之治辦益無事間或㑹賔僚追文酒之樂繼以酬唱篇詠不日盈編軸好事者集成二十巻目曰永嘉唱和云罷郡時年才六十六遂有歸休之志上封告老以本官致仕聖咨早厲士節出處進退不蘄苟得晩年通性命之理視死生窮達為一致故淡于榮利精力方强遽知止足還鄉里即祖居為宴坐之地是時昆弟罷郡退居數人相與游息山水間友于羣從超然自適如是三年而絶州縣省謁十年而廢宴㑹撒筆硯十三年年七十九矣盡屏去服玩青編黄巻亦不復問覽居常黙坐世累都遣一日盥沐更衣就寢無一語㗳然而逝雖脱屣蟬蛻無易於此時元祐八年冬十一月十三日也有遺書一編疏五十餘事處理家政至于廞歛之具喪葬之節賔客之禮子孫之戒纎悉無遺者門人葉經敘其始末為往生錄嗚呼達生悟理神識不昧泰豫若是豈力學行已自我得之者耶其性質純茂孝友忠實雖勉勵敦修之有素抑所稟賦之本厚耶故嘉言美行為人稱道者多矣少時甞贄所為歌詩于范文正公公謂其孤鴈晩望二篇有古人風後以時政十事上韓魏公如錢幣鹽法之類皆見施行在天台日太守元章簡公待以僚友甞曰如君文雅縣令淹才煩碎之務委之佐尉可也趙清獻公歸老過温其子㞦方為倅貳公每戒之曰善事石君曽宣獻公杜正獻公甞以在朝不及薦用為恨觀當時名公賢卿許與之言則人材可知也其著于筆札則有易論解經訓傳雜文歌詩總七千巻藏于家見其書則學術可知也室夀昌縣君王氏尚書屯田貟外郎賁之女子男子五常州晉陵尉景雩早卒進士景需明州奉化尉景零天台令景雯鄉貢進士景震女子七蘇州長洲尉葉庭實澤州陵川令王慶叟南劒州將樂縣令江汝言進士張禠馬景文李景常虞芝皆其壻也諸子世學景需就養不仕景雯踐父官諸壻業官鄉舉有聞孫二十五人曽孫七人景雱等奉治命以紹聖元年十二月某日葬于縣之九巖山某原冡塋封域悉如遺書平日經畫之㫖景雯自越千里之潤袖書與祠部君所述行錄見抵且扳先君同牓之契丐文以表墓隧時予方有家故未遑屬藁中嵗再至請益慤每念平昔與聖咨遊甚乆又甞論天下士族知新昌之世且嘉孝嗣往復之懃思盡述終之志可無紀乎案石氏系出青社唐季初祖某避地徙越因家新昌曽祖延俸仕錢氏為某官祖渥隠晦不仕父待用贈金紫光祿大夫祖孫居越數世百餘年遘聖代右文得以詩書教子弟天聖中世父待舉始擢進士第官至秘書丞自是登科者常不絶慶厯牓同時昆弟三人在選中而居顯仕者相踵枝葉繁衍從進士者又倍于向時嗚呼盛矣故悉書之又係以碣銘云學充乎中行著乎外其有云為名稱必大在巳所安存亡進退及物之利中和惠愛仕而知止終逺辱殆沒不怛化游神定泰嗚呼聖咨考履無悔善生安死令名如在墓誌太子少傅致仕贈太子太保孫公墓誌銘尚書禮部侍郎參知政事孫公諱抃以嘉祐七年三月上封求解畿近拜觀文殿學士兼翰林侍讀學士同羣牧制置使後二年二月以疾謝不能朝乞上還所居官拜太子少傅致仕以其年十一月戊辰薨于春明坊居第薨後十九月乃克葬于開封縣新里鄉之劉柴原實治平三年七月癸酉也公之薨也天子以先帝執政臣賻䘏甚厚為罷垂拱朝一日特遣中使存問其家事又贈黄金百兩制贈太子太保陞其二子官一等一異姓親為齋郎有司案禮令集尚書官諡曰文懿其葬也諸孤議請銘于公甞所親善者謂無若某厚某于是考察其言行功狀鑱于石而納諸壙云公字夢得眉州眉山人初名貫字道卿生五年而學為詩往往有警句傳于人甞贄文謁成都尹凌策將以童子薦之顧其幼且孤而止後累舉進士更今諱天聖八年拔甲科擢大理評事通判絳州代還試學士院以太常丞直集賢院判尚書祠部遷開封府推官徙判三司開拆司又試中書以右正言知制誥慶厯二年召入翰林為學士三遷其官至吏部郎中又帖其職為兼侍讀學士充史館修撰皇祐五年五月拜右諫議大夫權御史中丞在職二年上書曰臣無狀在臺閣無所補益願得一州以自試朝廷重違其誠而不忍使之去外乃授以學士承㫖兼侍讀修撰如舊又再遷其官禮部侍郎嘉祐五年四月程太保戡解樞密上念大臣數以言罷益艱其選用乃不以常次擢公為樞密副使不盡八月遂參預大政焉其别使自陞近職歴判登聞檢院國子監太常寺兼禮儀昭文館尚書刑部吏部流内銓都省知審官院通進銀臺司兼門下封駁權知慶厯六年貢舉糺察在京刑獄提舉諸司庫務醴泉觀公事磨勘諸路提㸃刑獄轉運使課績出疆為契丹國信使其為中丞以憲臺綱紀百司又有言責故事不兼他職得請解審官自是以為著令踐二府同修樞密院中書時政記提舉三館秘閣書籍同譯經潤文公自登朝迄謝事揚歴顯劇通三十年惟兩服親喪解職五載自是不去朝廷特為仁宗所器待甞從容賜對語人君大體公對曰人君繼天保民惟兢慎勤儉任賢納諫故能享恭已之名而延卜年之慶他日又問求賢致治之道公曰方今天下所謂賢者陛下用之殆遍誠願責其逺致毋以一事不效去之則人人得盡其才而助成治道矣方是時上委政二府而宿望大臣在外者乆不進用公意以此感悟上上欣然開納後聞公議事平恕稱之曰老成人所為固不同在兩禁十五年壹意文翰語未甞及朝政暨為中丞訪天下事有不得于心則抗章論列指切時病一無所避然其言遜而事顯不以激訐為直欲人主信而易行以此多見聽用内侍王守忠特恩遥領武寧軍節度制下諫官御史固爭不能得公最後上疏曰太宗時王繼恩有軍功不過授宣政使今守忠信宿舊然無繼恩功而節度使將帥極任非特宣政之比若輕授之是棄祖宗法也上即日為追寢守忠命温成后之喪大建陵廟公言本朝宗廟事皆集三省議乃定請以付外如故事不報又合諸御史求對面陳非便至再拜以請上亦為改容遜謝之其後罷立忌日去廟樂園陵使得更為監䕶葬事繄公所啟也在二府雖不乆而建言亦多甞謂承平世邉臣有勞不可以官賞恐徼功者生事于夷狄三司使宜用敦厚有經術之人使寛天下財利苟以趣辦應猝為任職則掊克之患滋長矣諸公深以其言為然素喜薦士善論人物其薦御史得今河東經畧唐公介髙陽安撫呉公中復皆一時之傑也公再領太常某時為博士數得接公論禮事每議下則使僚屬各陳其所見聞已然後為之裁定以此知公之所存也公為人外簡易而内嚴謹性至憂畏不妄舉動既貴益甚人或譏其太過亦不為少懈至遇事有所陳則挺然若不可奪者然而一出悃款靡有緣飾故言似激而人主不以為忤性似介而士論不以為矯蓋其守也固則勢不能撓其發也誠則物莫之忌詩所謂淑人君子其徳不回者公得之矣初陳恭公當國公甞用翰林舊事屢見于中書已觸其怒後恭公復相公適執憲又疏其强毅自任及妾張詔獄事廢置由已專權取必非大臣所宜為者恭公由是罷政事及薨請諡有司博士初諡榮靈公執不可曰陳公方重不倚亦有過人者如此名則已甚矣易曰恭可也論難乆不决至請于朝廷又覆于尚書卒用公言為定于是士大夫稱公平允無適莫者多矣自少好學通古今趣尚體要不以辨説為博洽每侍邇英閣進讀羣書至前代君臣亂亡禍敗之際昔所諱避不講者未甞不反覆開陳欲人主洞見本末曰書傳所以記此者正使後世以為戒故不敢畧也文章質厚簡重自成一體蓋似其為人有集三十巻目曰某集公年六十九而請還政親舊有勉以年未至者公曰强力而仕不能則止兹可勉乎于是得請休養其家燕閒自適卒以是年疾不起前勉公者乃歎其知命深而信道果也夫人王氏累封某郡夫人夫人同郡大姓也三姉皆歸里豪生子者又相嫁娶頗以寒士疎公公既貴而三家者有來求昏亦不拒之又為之保任其子若孫仕者數人子四人珏國子博士佑甫大理評事早卒喆林並太常寺太祝女四人適戎州僰道尉蒲獻卿太子中舍彭敏行都官貟外郎勾諶太常寺太祝宋奉國孫七人仕者二人孫氏自呉將武後世居富春其族盛于江東且千年未甞去呉籍至公之七世祖朴乃徙長安仕唐武宣世掌西川杜悰書記其子長孺亦攝彭山令卒官唐季多故子孫因家于眉山以聚書治産教子弟親田疇為事而眉人號其家曰書樓孫氏然不仕巳四世至公始脱甽畆推生産與諸兄而讀其家書以舉進士及貴贈其曽祖諱熠為太子太保祖諱琲為太子太傅父諱著明為太子太師三世之配皆追封國太夫人可謂盛于西南矣而諸孤遵奉遺誡卜葬開封不復西還其後又當著于開封乎惟公以儒生起逺方遭時得君自致公輔行已内信造次必于儒者接人恭而盡誠居官靡有過事艱于進而勇于退卒全功名考終牖下爵位若是器業若是行義若是皆宜銘銘之故吏職也銘曰古之儒者學然後仕語黙弛張動必由義其行有常不學不至至之惟難在公無愧公為邇臣修潔謹純内備顧問進退循循公執風憲其言謇謇莊色于朝匪躬之憚公貳台司天子之知寵至益戒力極而辭孰謂不為朝有正議孰謂進取進輒辭位爰始發蹤暨于考終視其所履無踰厥中匪積之厚爰徳之充銘以昭之詔乎無窮龍圖閣直學士知成都府李公墓誌銘予志學之嵗侍先歧公官洪井因接江西諸彦頗能道江表士大夫之世曰唐季之亂四方豪傑與京都士族往往避地江湖李氏能招攜安輯之故當時人物之盛不減唐日而文風施及其後裔今名顯於朝廷者多矣甞欲訪求其人而載述其事後與南康李公遊詢其世系則與前説相合公之裔蓋出唐郇公禕之十一代孫濤遭天祐宗室之禍與其父間闗南竄流寓湘潭馬商以為衡陽令時濤之從兄郁為梁閤門使上言濤父子羈族湖外可哀詔商遣還京師仕後唐相漢祖歴晉周入皇朝終官兵部尚書封莒國公號為名臣莒公之還也間道獨行一子不能從遂留江南其裔孫曰宗誨因占數于南康之建昌縣生知藉父産棲遁不求仕進鄉里號處士處士生溧水縣尉諱東以子貴贈金紫光祿大夫光祿生公諱常字公擇力學自喜多聞强識為文章敏捷初若不經思慮及成屬寓深雅識者知其逺器也擢皇祐元年進士甲科歴蘄江二州推官權宣州觀察推官監漣水軍轉般倉年少處小官而方重自持不妄笑語上下敬憚之發運使楊佐欲薦改官公推先其友人劉琦楊公歎曰不見此風乆矣乃并薦之琦後亦為御史名稱當世秩滿改大理寺丞韓康公任三司使辟為檢法官徙編校史館書籍英宗即位命輔臣舉館職曽魯公以公名應詔召試學士院貼秘閣校理俄兼史館檢討王荆公輔政大議改更法令與公素厚引為制置三司條例司檢詳官兼看詳中書條例並辭不拜權判尚書考功由太常博士換右正言同主管國子監公事時始作新法諫官御史論列其非是皆斥不用公力疏詆之以為始建三司條例司雖致天下之議而善士猶或與之至于均輸青苖之法取息歛怨傅㑹經義天下固已大駭而善士不復與矣荆公遣其所親厚往喻意不聽章十數上其言青苖尤切至詔使分析不從家居請罪者累月于是落校理通判滑州嵗餘復職知鄂州徙湖州又徙齊州齊素多盜公至痛懲艾之論報無虚日而不少止他日得黠盜刺為郡兵使直事鈴下稍任使之因詢其姦狀對曰此由富家為之囊橐官吏迹捕及門禽一人以獻則免矣公乃令得藏盜之家皆發屋破柱盡拔其根株自是姦不容匿境内遂清始公在江夏呉興政尚寛簡日與賔客縱酒嘯詠吏民安樂之郡以大治及為濟南頗峻文深詆郡亦大治由是人知其通疎適變所值無不可也是時河決靈平泛溢山東諸郡公捍禦得其要領一郡獨免患部使者以聞特詔奬諭徙淮南西路提㸃刑獄歴尚書祠部度支貟外郎寄祿格行換朝散郎元豐六年召還試太常少卿公以言去國十餘載至是始歸士論莫不喜其復用既而以職事陛對占奏閒雅上為改容及去猶目送乆之遂賜三品服未幾遷尚書禮部侍郎自少常轉儀曹時以為美擢後亦少繼者今上即位進吏部試户部尚書詔百官轉對公上七事曰崇㢘恥存鄉舉别守宰廢貪贓慎疑獄擇儒師修役法觀其目與當時所宜則公之志可見矣又案役法差免二科折衷為書上之大意以為法無新陳便民者良法也論無彼此可乆者確論也今使民俱出貲則貧者難辦俱出力則富者難堪盍各從其願則庶幾可乆也元祐赦恩蠲市易逋租不滿二百緡者除之公常請息過其數亦宜勿收而復舒鄂諸州錢冶與泉密市舶之法其後朝廷多行之逮今人以為便自朝奉大夫五遷至中大夫拜御史中丞兼侍讀加龍圖閣直學士初河決小呉議者請開淤河分殺水怒自孫村口截河為堤導還故處詔公往視之還奏非便事乆未決章至六七上執前奏不改又遣吏部侍郎范公百祿給事中趙公君錫覆案如公議罷其役然河之患亦竟未息也其論取士請分詩賦經義為兩科以盡學者所長其論省官請别自致因人兩塗以觀其才實凡所言事多舉大體務在廣諫諍抑僥倖戒激訐皆本之忠厚篤于世教甞謂已之所見有得必入告于上纎悉不隠若其隨時所趣以排擊取合則不能也其自信如此故忠言密啓世莫得而傳焉罷職為兵部尚書辭不拜出知鄧州數月徙成都府行次陜郊暴疾卒于閿鄉縣傳舍實元祐五年二月二日也訃聞朝廷士大夫無不駭痛以為善人云亡國之不幸也公幼有至性事親謹飭服喪居鄉逺近稱其行義仲兄布早卒事嫂張敬而嚴視其子如已出自奉清約俸賜皆賙其族捐館之日家無贏貲上賻特厚妣某氏追號某郡太君初娶長沙狄氏襄陽主簿遵度之女早卒追封某郡君遵度以文章顯名寳元慶厯閒當時名公皆推重之再娶新安魏氏光祿卿琰之女卒贈遂寧郡君又娶遂寧之弟封安康郡君子男四攄終揚州江都尉邍承事郎逡超並承務郎三女壻曰揚州江都主簿孫端亳州司户參軍丘楫封丘主簿黄叔敖公風度凝逺與人交有恩意其所厚善者翰林學士蘇公軾子瞻屢黜齟齬而以詩酬答更相稱譽甞坐此贖金而益親不悔少與髙郵孫覺莘老齊名俱為司空呂正獻公所知期以國器二人官伐趣舍大畧多同數月之間相繼而逝人甚異之平生所為文章諸子集為若干巻藏于家少時讀書于廬山之五老峯下白石僧舍後雖出仕宦而所抄書九千巻留山中如故號其處曰李氏山房甞曰生死必歸此其終也諸孤自閿鄉扶柩歸南康時公之伯兄莘為江南轉運使遂以其年十月丙午葬公建昌縣千秋原卒如其志其葬也諸孤來請銘予與公游三十年早同官寺又連姻屬論議無間然故知其所存尤悉大抵推誠接物進退有本末不為孑孑驚俗之行其所言于時有合有不合或以見詆而士論終以長者目之謂其逺大叵量然官不出六尚書夀止六十四其所藴積不得盡行于世嗚呼命也夫銘曰翼軫之精衡廬之靈鍾秀于人為時之英彼美公擇得其粹清氣直而和識逺而明濯纓江湖發藻仙瀛天子命之拾遺帝庭人訏我矯政失吾爭既出復召道直言行奕奕奉常巍巍貳卿帝用耆舊擢司典刑坐籌省計執憲臺丞變通盡利獻替輸誠金華進讀疇咨老成兩川遐守千騎徂征半途覯閔遂輟脩程于嗟國器臨摯而傾三紀立朝便蕃寵榮五峯舊隠未始忘情生存華屋歿有佳城克終厥志表以斯銘蘓魏公文集巻五十五
