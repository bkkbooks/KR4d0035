body:
  text: 蘇魏公文集巻六十二宋蘇頌撰墓誌叔父衞尉寺丞景陵府君墓誌銘叔父諱繹字謀甫謹案家譜蘇氏自唐許文正公瓌至叔父凢三徙籍今為安州景陵人許公之曽孫曰奕元和中終光州刺史子孫因家於固始光州之四世孫贈隰州刺史諱益自固始從王潮入閩又為泉州同安人實生我髙祖屯衛府君諱光誨國朝太平興國初從泉帥陳洪進入覲以前漳州刺史拜左監門衞將軍生祭酒府君諱祐圖歴漳州司馬祭酒生復州府君諱仲昌舉賢良擢進士第逾月覆落換三班官歴閤門祇侯左屯衞將軍提㸃荆湖南北兩路刑獄知宜邵復三州復州生七十叔父次第五門中號七君少力學有家法年十七從進士以病臂不克赴試遂棄詞業專精文史隂陽星厯占筮術數百家之言靡不精造喜推考人生年月日時以五行星數參騐休咎合若符要又學道家養生吐納禪宗止觀傳心之説因侍官景陵在郡服先府君喪遂占數焉方是時我先人在翰林乾元誕節洎南郊禮成皆得推恩子弟數欲薦仕叔父辭以病廢無妨他子弟之宜薦者先人善之遂任幼弟綖及其子顗皆為京司官自是叔父不復有榮進意結宇近郭闢為賔館躬殖才産才取贍足日與鄉人為飲食宴樂之好凢賔客過從無問髙下色目一接之以禮至于館餼祖行亦不以菲廢間則談道真咀禪味考運命閲骨相人有咨訪皆盡誠為之評析一經其品目後悉如言于是要塗要官使車過客至郡者必造其門若今門下章公子厚樞密安公厚卿龍圖閣王公勝之皆嘗因使咨訪期以逺到諸公至今稱道不已士論莫不伏其鑑裁也年少時尤好黄白㸃化之術一日有道人過之云我蜀人也今老矣顧有秘訣欲求人而授之得其人則我將逝矣因命取水銀一杯坐間銷為白金叔父驚異而未敢遽問姑留寘于客館其夕道人奄化遂貨其所銷白金為之具衾檟買地以塟其資費適取足焉因欷曰兹事信亦命乎吾平生接方士多矣無不懇祈而力為之毎患未盡其術今遇異人求我而我不契其心豈其是道人先知數盡假手于我以送終乎而吾不得受其術是命不偶也何必復勞心乎遂捜索故所蓄方藥盡焚棄之終老不復語黄冶事聞者嘆其信道篤而知命深也治平中以顗陞朝籍恩授大理評事致仕再遷衞尉寺丞居常起居無他苦一日嬰小疾遽令召諸子及外姻之在逺者俄而畢集即語以後事翌日書禪偈一闋捨筆而逝時熙寧十年某月某日也享年七十有二嬸氏劉温州平陽縣主簿諱半千之女平陽早有時譽先祖同舉直言被召至闕下㑹罷六科從進士一命而終嬸氏柔婉和惠善處家事方叔父閒居延賔客飲食歡酣夜以繼日如是數十年而中饋未甞少乏交親稱其賢明前一嵗捐室三子長曰頍季曰頠皆舉進士仲即顗也博學有文詞官至殿中丞歴監管局三司主簿知汝州葉縣所至有治跡公卿多器其才能方見任用以二親連喪不勝毁瘠逾月而卒一女適承議郎太僕寺主簿張承嗣頍頠力舉襄事以元豐七年某月某日奉二櫬塟於某縣某鄉某里而顗祔于某方從先志也某自總角即從叔父之教告在子姪行待遇特異自聞喪訃以官守道逺不得哭于靈幃固以痛恨矣今先逺有日又不得挽柩執紼以盡哀情其愴慟奈何竊惟叔父以文學遭聖世而曽不得一試有司以髙行聞當時而又不得一達朝廷終以末疾自棄巻懷不用是可惋也然端居里閭閒燕自適康寧夀考終其天年顧其所得亦不為少矣若考其所履則在困而安能任命也居遁不晦善處窮也清髙博識似司馬季主嚴君平而心無適莫不厭逺于塵俗文雅放達似劉伯倫陶靖節而躬蹈規矩不輕傲于軒冕蓋清機逺覽俯仰隨時得君子出處之宜達天命中和之理宜乎為宗族之矜式而士大夫所以推挹也諸弟以某周知宗事請文誌壙某雖粗記緒餘而識致不敏安得發明叔父髙逺之趣姑彷彿其言行載之於銘銘曰古之君子隠居求志山林朝廷出處一致或止或行與時偕逝囿於物者反為物累惟我叔父行完道備學通精微性資恬智初遊詞場豈不欲仕遇困而休非為傲世卜居江湖棄遺勢利造適交親笑談道藝尊酒不空清言有味士聞其風不逺而至子將人倫景純占筮託意寓言聊以卒嵗復魄沔陽流光漢澨從子勒銘以告來裔長安郡太君髙氏墓誌銘鬱林太守朝請郎陳君將以元豐八年十一月甲子塟其先太夫人長安郡太君髙氏於潤州丹徒縣白莵山之某原前期琢石以屬其甥蘇某為銘且志其卜遷之所由云惟陳氏世居泉南殁則塟其邑至朝請君昆弟少仕宦奉夫人居江淮者三十年不復南歸既而遭喪家吳中後議襄事卜者丹徒土厚水深宅壙于兹吉莫大焉於是遷其柩櫬而安厝之君子以謂得禮之宜也夫人之先潁川長社人父諱守成以材力顯于時與故東上閤門使張昭易同給事晉邸太宗纂極擢東頭供奉官方見寵用不幸早卒詔䘏其家事故昏姻多通貴戚夫人生而警慧柔嫺謙重出於天質非姆訓之所及見者皆奇之為之擇名配久無可者于時内閣潁川公初擢進士第調嵐州軍事推官以二尊年髙思得淑人以佐膳饔聞夫人在家之賢因以禮請遂合姓焉潁川公孝友清白為朝廷偉人而夫人恭靜和順能成君子之志奉上率下舉動有法周其族人曲盡情禮無不得其歡心者舅姑則曰順婦也姪娣則曰賢姒也六親則曰仁姑也有家七十年而中外無一間言前志所稱賢明辨通節義者夫人皆有焉潁川公諱某終龍圖閣直學士左諌議大夫開國本望累贈某官三男伯曰紹孫太子中舍通判䖍州仲曰繼孫國子博士並卒季曰維孫即朝請君也三女長歸于我先人翰林侍讀學士河陽府君實生小子某等以夫子官封河南郡太君次適故鄂州節度推官蘇玠幼適國子博士鄭几夫人享年八十九見其中外孫數十人康寧貴夀考終官舍豈非寛仁厚德福報之所及耶銘曰元聖有言曰仁者夀夫人之賢天錫之祐寛裕惟德肅雍乃儀曰婦而順曰母而慈積是慶善宜其家室既享永年亦保終吉泉山故塋曲阿新丘土壤雖隔魂氣同遊卜人曰食來裔之利識以斯銘世世無敝萬夀縣令張君夫人蘇氏墓誌銘西出廣陵故城十三里所有大墓在蜀岡之南曰馮家原集賢張公之所宅也集賢之次子曰潁州萬夀縣令挺卿斯立祔其壙西南隅之庚地堪輿家曰山連兌乾水流丁未其前望京江諸山拱而揖之皆吉符也元豐八年春正月集賢之孫天長縣主簿充南京國子監教授康伯昆弟將塟其偏親彭城縣君錢夫人得吉卜矣又舉世母武功蘇氏之柩同用其月巳酉厝于斯立之右方幼子獐老從之蘇氏予長妺也我先人太尉公翰林府君晩得女以其秀且慧故特撫愛之始稚而孩巳能言漸誦章句少長而承禮義之訓又能秉筆為詞語及筓擇配且久乃以適亳州司法吕昌緒昌緒故相許文穆公之孫也甫三年而寡後四年獲歸斯立斯立賢而有文章好學不勌平居刻苦奉養簡薄吾妹從其所好未嘗見於言色又七年而斯立卒且葬矣乃歸寧太夫人河南郡太君日侍膳外則以未亡自處不復接外事惟閉閤冥心誦佛書而已雖親戚亦少有見其面者熙寧五年從予奉版輿守東陽二月十二日過桐廬縣漏港灘失舟吾妺年四十二與獐老暨予一子潁士同日而亡予侍太夫人悲泣之哀甚踰年還喪維揚菆於開元佛舍又十三年始克同穴張氏三子長康直用斯立之舅翰林錢公補䕃為郊社齋郎次康夀次康叔即獐老也並相繼夭閼斯立遂無後而呂氏二子亦卒二孫尚幼惟是窀穸之事皆教授洎其尊公前利州路轉運判官通直君主之乃得如禮嗚呼可哀哉銘曰長江之陽蜀岡西其音在商壙者宜是為斯立之世墓嗚呼吾妹今從之彭城縣君錢氏墓誌銘元豐七年二月揚州天長縣主簿充南京國子監教授張康伯昆弟既終其母彭城縣君錢氏之喪以尊公前利州轉運判官通直君之命舉葬于江都縣東興鄉馮家原先塋之右域卜用明年正月已酉襄事吉出其叔舅右司郎中穆甫狀邀銘于所知予與張氏世姻也而通家有舊故誄行載筆得其詳焉夫人系出錢塘以曽祖吳越國王諱倧始葬㑹稽子孫遂占名數于彼祖諱易翰林學士累贈太尉考諱彦逺起居舍人知諫院贈工部尚書母濟陽縣太君丁氏故相晉公之孫女也初夫人之姑真寧縣太君既歸張氏為太常博士集賢校理諱宗古之配不幸集賢早世尚書念女兄之嫠居故以夫人許嫁其中子升卿公翊即通直君也將有行尚書誡之曰爾姑吾之同産爾往事之如母而恭勤有加焉可也于時士大夫家稱錢張之睦加于人一等矣夫人資素敏慧不類常女其就傅也自垂髫迨笄總習組紃𨽻文史至于筆札書計之事過目則善焉故二親奇而愛之其執笄也毎念衿褵之戒不以親貴自别酒醴饋食皆有節適服勤左右幾二十年始卒無異故皇姑安而稱之其主饋也内肅閨門外奉賓祭方其初官資薄躬率節儉以周其乏無少慊者又為收䘏族中孤女教養賙給歸之士人人皆稱其孝而慈也其教子也手繕經籍而授大義漸劘誘導至于成人故諸子游場屋取世科薦舉學官召試中選皆逮見之時論以謂後必有顯於世者其治已也内恕而外通平生未嘗有疾言大色始通直君職監司進擢甚寵一日坐論事同其使者奪官罷免命下甚遽初無知者衆駭異不知所圖而夫人處之晏然惟趣左右辧嚴即日就道浮江湖﨑嶇數千里還維揚寓舍輯儲峙為久安計與夫子絶甘分少如是五六年内外不謂其為遷謫也夫人之材智明達大槩如此又以早失所怙盡孝于母氏常惋温淸不時惟其起居之問雖在千里必浹旬一置郵書平安信反然後遑處間或相遇飲食已惟談内典論性理相顧怡然他日偶被重病歸省餘杭以就醫診濟陽憂甚親為和湯餌同臥起者累月夫人踧踖不自安乃强起潔誠精禱于浮屠曰蕞爾之軀死不足吝顧念一旦先沒必貽親累願稍延嵗月以盡太夫人餘年則瞑目無憾矣已而果有瘳後幾年得濟陽疾報即涕泣料家事一二飭誡若治命然因閲曹溪壇經忽若有省悉召家人輩語之曰是不堅體妄幻非實家人輩竊怪其語不類未幾訃至不敢遽白夫人曰吾母其往矣吾已發于夢寐矣而若不以告何也及得書一慟而絶經昔方寤徐曰吾獲從吾母游志願畢矣雖勉力成服而漿溢遂絶于口中外之慰問者一切謝遣如是五日嗒然而逝時四年二月初九日也嗚呼不攖寵辱不怛物化蓋志學之士有所不逮者而夫人履憂患不怵惕在困約如平居推理明分亦達識之所能安也至若愛親以存生聞喪而毁性此非智勇果敢之所能必至然所以能至之者豈純孝真哀之感自與天均冥㑹耶是必有辨之者故悉言之夫子享年五十二彭城之封從夫貴也子五人男子四長即康伯也次康孫泰州司户㕘軍次康道康廣女子一適其弟之子魯望張錢通婚蓋三世矣銘曰美矣錢張古之潘楊載世姻睦婦順夫良彭城之賢備有言德主饋執笄娣姒是式既齊寵辱復善生死昔以親存卒以親毁義盡母夫塟從舅姑銘此懿行貽於女圖夀昌太君陳氏墓誌銘夫人陳氏故樞相文忠公諱堯叟之孫尚書都官郎中諱師古之女尚書駕部郎中贈正議大夫畢公諱從古之繼室也幼聰警知書史年二十歸畢氏正議之祖文簡公景徳初以徳望相真宗為時名臣門風家範世載厥美夫人逮事其舅衞尉卿能盡孝敬人有稱之夫人曰昔我祖姑楚國夫人之事其姑祝夫人也辨色而起侍立左右未食不敢退嘗倚户後以聴命久之隱其壁以成迹而不知也吾未及此豈可以言孝乎治家嚴而有恩常勉其夫子以義而安于賤貧正議嘆曰使吾無不足于小官者夫人之助也正議卒官夀春時諸子猶未冠家故貧匱無所歸睢陽族人以書招之夫人答曰吾夫平生未嘗有秋毫取于人今死未久豈以妻子諉族屬耶竟不肯往遂家淮圻躬親紡績以自給又教其子以經史文章法書及近代名臣善言懿行以資其學久益不倦嘗病目不能視一旦有異僧叩門告以後日福夀之數且言諸子賴夫人以立小疾不足憂也未幾目果復明其後三子並舉進士登科仲衍被遇神宗稍任要職在官勤瘁擢起居郎以卒仲游朝奉郎集賢校理歴開封府推官判登聞鼓院餘皆有聞于時出入臺閣榮禄及親迭侍膝下流裔益廣皆如僧言于是人知畢氏之有母也始從夫封馮翊縣君後用子進徳興夀昌二縣太君諸子既登朝贈其父官四品又請以所遷官為母改郡封夫人曰汝必欲以此為孝當先嫡夫人故諸子用其言封前母梅氏為永嘉郡太君而夫人之號未及改也元祐四年四月寢疾壬子終於京師享年七十四子男六人曰仲連通直郎曰仲容終臨卭主簿皆梅出也曰仲偃承議郎次即仲衍仲游次仲愈宣徳郎皆夫人所生女四人長適進士孔宗堯次適通直郎田輔卿次適通直郎李調次未有行而卒孫男十二人曰受曰況曰舉曰完曰純曰亮曰謇曰逢曰慧孫曰寀曰沂老曰彥完用起居遺奏補太廟齋郎女十二人長嫁進士蘇象先象先予之長孫也諸子卜明年七月二十二日𦵏于鄭州管城縣馬亭鄉廬村以婚姻之好託銘於予嘗聞夫人六七嵗時從其祖母邠國宋夫人入參禁中章獻太后見其姿貌異指而問之賜以茶茗仲衍元豐初預檢討官制因奏事便殿神宗皇帝謂曰聞卿母能治家訓子今年幾何仲衍以實對上稱嘆久之非夫資稟夙茂行義素著則何以稚齒暮年動二聖之識賞惟其完夀康寜福履子孫終養遺德不泯有由然也銘曰將相之世生此淑女公卿之家乃得賢婦敬篤尊章義形夫子痛結未亡教勤仄視果有令人振興舊門登朝授職弟繼其昆視子之賢識母之訓生事死塟禮時孝盡丞相之墓滎澤之陽夫人從之數世相望仁夀郡太君陳氏墓誌銘元祐二年八月戊戌翰林學士承㫖通議大夫知制誥兼侍講鄧公母夫人仁夀郡太君陳氏以疾終于京師某坊之私第公以憂去位兩宮軫惻翌日遣中使就第弔問法賻外别賜上尊百壺白金一千五百兩又詔所居州郡治公館處其家朝廷所以周䘏邇臣有加于常數其恩禮至矣越十月某日公與季弟主客郎中奉夫人之柩塗行泣血翼扶登舟泛汳渠涉淮泗抵維揚權厝于某寺即其所為塗廬初卜𦵏江西故里不食墨又卜丹陽乃食遂以明年七月某日甲子遷神座窆于某縣某鄉某里山居西南水流東北用姓氏之利也自初喪闢帷堂殯階序升輤車渉逺道反幽宅至于復土無不如禮者君子以為事親之義于是盡矣夫人世占建昌軍南城縣生而警異父處士諱求母南昌萬氏竒其早成為擇良偶久之得同郡鄧府君諱立篤學有鄉行為士友推挹遂以歸之府君方力行養志不厭寒苦以徳義自信于鄉里而夫人躬服節儉勤勞内治事姑章敬以順接娣姒和以莊待宗戚仁以睦嵗時之祭享不以菲廢禮閭黨之賓客不以貧闕供故得盡内外姻之歡心以成良人之美志府君即世夫人年且少嘗有未亡之嘆誓不他從服則疏麤食則粢糲以詩書教子以組紃訓女傅保之事必親臨之比及成人有如宿習長子元父好學多聞不幸早卒次曰温伯即承㫖公也次曰仲父隱徳不仕省臺諸公前以逸民薦之季曰羲叔即主客公也儒雅有吏榦擢在清要昆弟既登朝追贈府君為光禄大夫而夫人方在色養自夀安縣太君再進郡封承㫖公遭遇神宗嘗為御史中丞坐言事謫守臨川親知或為逺適數千里必貽親憂夫人聞之曰言不用而去乃其職也即日趣行㦎然無戚容其後昆弟同在朝廷禁林天臺相繼進用鼎茵在前左右視膳孫息環侍怡怡如也士大夫之仕弗逮親者莫不榮慕焉夫人年八十有二平居强實飲食自若一得疾則語諸子曰吾病革矣我視死生猶夢幻曷足為爾輩累乎其終也偃然若大寐而無戚怛蓋康寧夀考加之執徳不怠其五福之具者乎二女嫁朝散郎陳光道某郡進士黄珏七孫曰景雋南安軍大庾尉早卒曰之純之敏並承務郎之劭承奉郎曰某曰某未仕皆少而有立能承世學予與承㫖公遊且二十年矣每登門聞夫人起居動止嚴而有裕成就門伐蓋家訓致然今又克塟京口與我先壠同一郡内諸昆弟是為所居里人其義固益親且厚矣因得紀夫人之行義以銘墓石抑嘗聞善塟者言潤之土厚宜封殖其水深宜壙穴塋于此者百世之固也夫人内行夙著諸子送終盡禮果得吉土以寧神宅永錫爾類其在兹乎銘曰婦德之茂孰先母儀化由風始治以家齊纚笄君臣著乎閫閨幅軸將相見于杼機維若仁夀好古知禮䦱門睦宗徙隣訓子子以母賢母以子貴濟世宜家孝慈兩遂顯顯諸子名稱暴聞或出或處不違其親青縑紫橐後弟前昆疏封奥郡終養髙門彤史古職具載言德我刋銘章納于幽穸京江北流峴山東直桑海或遷音徽無斁福清陳氏墓誌銘夫人陳氏諱池安賛善大夫知循州諱莊之女寧國軍節度推官福清王君諱碩之妻其先世占籍光州固始唐季避地徙閩今為福州羅源人賛善君信厚長者逺財好義又有文稱擢祥符元年第後調池州青陽尉實生夫人故以州命名母福清縣君范氏獨一女二親無所分其愛故撫育尤至自穉而笄姆傅勤誨有以成其謹飭之性焉既擇嘉配乃歸王氏夫才婦順遂宜厥家事姑能適其志周旋族屬上下皆得其歡心節推君困于州縣夫人數寓他州躬服勞苦先之以儉約親戚有以貧來告者隨家之所有以賑之至奩珥無存者亦不以累意也處閨門訓子姪如其家法故子姪承其教皆有學藝以至于成立焉享年六十一以熙寧八年六月丙辰疾終于丹陽仲子之官舍後二年春二月丙申塟湖州烏程縣九元鄉栖賢村㠶檣山之南原節推君先六年卒既𦵏矣至是合祔焉禮也子男三人長伯䕫舉進士次仲龍潤州丹陽尉幼季稷早卒女八人適長泰令林開徐州司法㕘軍朱炳進士楊價彭璉餘杭尉陳公佐進士劉績邵旦吳勵初夫人常以賛善君喪久不得𦵏為憂迨病且革語不及他事惟以此屬家人曰我自為若家婦無一不足者獨二親旅殯數十年畢生之痛無甚于此若輩能為我擇日月以禮襄事吾暝目無憾矣諸孤泣血奉其遺戒嗚呼夫人有子矣若節推君之治行則有侍御蔣君潁叔之誌在焉此獨叙夫人之大畧云銘曰幽嫺慎静女子之行和柔孝慈是謂姆師婉彼夫人亦允蹈之既明且智彤史之貽閨門雍雍姑嚴婦恭夫榮厥緒子紹其宗胡不夀考遽絶音容帆檣之𦵏良人是從蘇魏公文集巻六十二
