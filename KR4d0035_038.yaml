body:
  text: 蘇魏公文集卷三十八宋蘇頌撰表杭州謝上臣某言昨奉敕差知杭州軍州事充兩浙西路兵馬鈐轄已於四月初四日到任禮上訖者東南方面地實據於上遊左右省符詔俾分於半竹顧乏幹時之譽謬當治劇之名涖職云初懷章有愧臣某中謝伏念臣素惟寡陋早荷甄收自觸憲章坐鐫禁籍出麾良翰已涉歷於歲時入覲嚴宸復進趨於臺閣一昨代還睢甸攝職京司日奉內庭之朝預陪近著之列會江吳之闕守方淮海之荐飢昃食宵衣上軫帝心之慮雄藩督府遽叨使節之榮奉臨遣之丁寧重憂思之惕厲兼馳川陸達除書所治之邦既見吏民布主上欲安之訓事叢有責才薄難勝常自省思敢遑寧處此蓋伏遇皇帝陛下躬臨庶政周慮萬方每惟致治之源莫重長人之寄謂此一都之會素號要煩眷茲纍久之勤因而任使臣敢不悉心竭力求瘼恤災以荒政之所宜為職事之先急農桑衣食勸家戶以趨時期會簿書率掾丞而奉法少收州郡之課上副聖神之懷臣無任謝同修國史臣某言伏奉敕命差臣同修仁宗皇帝英宗皇帝正史者兩朝大典方經始於册書太史諸僚遂擢收於疏外祇膺明詔深負愧顔臣某中謝伏以載籍之司事言尤重非宣尼之聖莫能斷唐虞之典謨有馬遷之才然後成周漢之紀傳恭惟二聖之功烈超邁百王之規橅禮樂文章經天而緯地賢能道義華國而熙朝惟其類例之繁必假約修之善自非傑筆未易充員伏念臣薄祐孤生謏聞淺識亦嘗學於舊史敢自托於無能久習吏文寖忘緒業逺方隨牒姑安州郡之勤嚴召賜環忽被絲綸之寵俾趣馳於軺傳俄入覲於宸庭脫沉迷簿領之曹預筆削春秋之事職非其稱恩實不資此蓋伏遇皇帝陛下善述先猷繼繩遐武謂祖功之與宗德照臨四紀之餘自天聖迄於治平備該萬事之統將欲垂之不朽是用載於信書搜擇衆材付畀重任臣謹當溫尋素學啓發前篇考古史之見聞助羣儒之論著片言一字雖慙微婉之辭五志三科庶禆闕漏之目倘能卒業無憚服勞臣無任謝賜國史院開局銀絹右臣伏蒙聖慈特降中使賜臣開局例物銀器五十兩絹五十匹者史官論撰之司初塵選用內府幣餘之式均荷恩霑對渥澤之踰涯思職憂而罙甚伏念臣粵從藩翰召置書筵閲二聖之册書識諸凡之總載懷鉛舐筆愧非敘事之才束帛兼金例拜匪頒之惠寵光所被服用增慚此蓋伏遇皇帝陛下待遇儒臣祗嚴國典俯記編摩之始溥推賚豫之私遍及具僚不遺末至臣敢不服勤早夜積思縑縢期少補於信書庶不孤於宸旨謝賜筆墨紙右臣伏蒙聖慈特賜臣開局筆共七十管墨五十挺二十餅紙共一十三軸者摩研編削濫官太史之司授簡抽毫獲識上方之品緣國書而假寵拜君賜以為榮伏念臣誦數陋儒江湖逺守偶藉和鉛之舊擢登司籍之聨閲東觀之典墳方尋類例給尚書之筆札繼荷恩頒物皆中御之珍用非有司之稱此蓋伏遇皇帝陛下緝熙世烈載述聖謨選求敘事之良特記開編之始輟象管寶跗之副兼莵枝鵝素之竒三具惟精愧乏仲將之敏手百家可法敢希班氏之立言圖報萬全誓勤一志臣無任謝復諫議大夫臣某言伏奉告命復授右諫議大夫依前充集賢院學士散官勳封如故已祇受訖者禋祀國之大事俯遘熙成正諫朝之諍臣敢叨敘進濯僣狂之深咎還禁近之通班榮渥所臨愧顔交集臣某中謝伏念臣本非逺器誤被上知無潤色之才濫司言綍有迂踈之纍自絓刑章流離外遷奔馳末路望之之試三輔日懼有聞中山之責九年敢興滯念間起江湖之守召參筆削之司入覲天光獲觀國典屬備輶軒之使方走窮荒荐逢泰畤之祠阻陪盛禮何言罪戾再預甄收執簡書林未責編摩之效登坡掖省復塵清要之途內顧衰遲難勝寵拔此蓋伏遇皇帝陛下體乾之粹報本於郊不專享於福釐遂溥行於渙號振滯起廢推惻怛於聖衷量能授官假名器於蕞質載念孤愚之蔽擢從棄置之餘肆赦眚災恩所加者非一從事盡瘁義罙切於在三更當追省前非往圖後效職雖專於鉛槧無敢越思力可效於股肱猶期自奮益堅晚節少答鴻私臣無任濠州謝上臣某言伏奉告命降授祕書監依前充集賢院學士知濠州軍州事巳於今月日到任禮上訖者治劇政乖坐絓有司之議免官責薄特寬投裔之誅獲領左符出居善地倣徨去國但追省於前非怵惕臨州固不遑於寧處臣某中謝伏念臣昨由藩守入覲宸嚴每惟罪戾之餘絶覬光華之望不圖寒迹尚記清衷翻二帝之經擢參於史職宣四方之命備遣於使行俄會京尹之缺貟首荷帝俞之超用選掄誤及秋毫皆出於上恩蹇薄所鍾弱質奚勝於重寄徒夙宵而盡瘁顧塵露以無禆加以智有聾盲識無逺大事既失於不斷慮又闕於關防內史宜彈壓於豪強而臣縱舍有罪長官當督察於僚屬而臣聽任匪謀纍速人言上煩詔鞠獄辭既具國憲寧逃豈謂伏遇皇帝陛下恢天地之蓋容廣山川之藏納念嘗更於任使俯矜貸於庸昏削籍近班猶竊蘭臺之舊秩假麾外服仍分淮浦之近封飲食足以奉偏親之旨甘俸祿足以賙敝族於溫飽豈伊黜謫遂此便安實荷賜於君親更腆顔於民吏敢不刻心匪懈盡節不渝雖股肱之力已衰無復期於逺到而朝廷之士貴治忍自棄於末年誓勤宣布之謨仰答生成之造感深涕隕言切魂飛臣無任謝男駉賜進士出身臣某言進奏院報今月日放進士榜男駉賜出身者計偕羣彥並膺親䇿之榮勳廕晚生誤竊世科之寵方主臣之負罪遘孺子之逢辰報自臚傳慶叢私室臣某中謝伏以陛下發德音下明詔以求直言有司進真賢舉實亷以奉大對革曩歲詞章之舊擢知經通博之才詢事考言既以觀其術略因能任職又將究其施為蓋擇之而惟艱加試之於已效得人之盛如古所稱其在朝廷彬彬多文學之士見於事業凛凛幾德誼之風自非挾經世之謀何以副揚廷之選伏念臣承家有祿教子無功本惟朴學之傳妄厠諸生之列適會詔新於科制因令時習於師言居處圜橋之門寖聞講議誦吟裘氏之地竊服儒名濫隨賢書偶預奏籍方時俊獻明之際難衒淺聞乘春霆振滯之辰遂叨賜第伏况臣一門在仕三世決科逮於羣從之間繼有䇿名之美斯亦聖代衣冠之榮觀不勝逺方父子之遭逢聞命兢惶舉宗榮懼此蓋伏遇皇帝陛下表章六學損益百王收攬四方之豪樂聞三道之要澤施無外允臻至治之期士生此時固有非常之遇何兹賤息輒冒寵光雖無籯金遺子之能而有桂林衣綵之喜但慙寡陋仰玷明揚臣謹當飭厲其衷庶幾於道教之吏事則法令之文可師繩以古人則忠孝之言具在倘毫分之可報雖糜粉以無辭臣無任滄州謝上臣某言昨奉敕差知滄州軍州事巳於正月二十六日到任禮上訖者滄海奧區朔陲近塞異時禦侮本求將帥之才聖旦撫封參用文儒之士猥緣資籍得綰印章涖止翰垣屹然丘乘之衆周視城塹隱若金湯之堅夫何逺孤當是優寄濫官有靦懷懼兼常臣某中謝伏念臣稟賦拙艱操修昧陋早荷聖神之眷擢躋禁近之聨出屏藩宣入領臺閣日殫千慮識暗乃涉於迂疏每歷一官寵過輒成於齟齬再干吏議動絓刑書罪大責輕固常蒙於天幸恩深報寡寖已迫於年衰尚塵職秩之榮坐貪祿食之厚姑安散地更省前非豈謂伏蒙皇帝陛下德務在寬仁不遺舊運乾坤之造震發於枯荄委日月之明照臨於幽蔀蕩滌瑕垢斂收棄遺初析盟津之符既容自免重假浮濵之節復出殊私逮於臨遣之辰賜以清間之對謂臣之數竒多難特軫淵衷勉臣以直道自明屢形天語重念悔尤之久積親承訓敕之丁寧豈止鞭䇿於疲駑欲圖後效固將灰粉於肌骨庸副上知遂奔走以之官期夙宵而盡瘁矧惟此郡逺控殊方久沐承平之風號為敦朴之俗吏謹繩墨民安里閭外則邉候無聲內則河防有備竊居守長何所設施謹當督責掾僚講修農戰旁宣主澤兾編齊皆一於中和外振國威使夷落咸知於畏愛尚賴仁天之覆護少收治課之毫分仰答生成罙堅亮節臣無任滄州謝傳宣撫問右臣今月日某官到州伏蒙聖慈傳宣撫問者邉城逺守悵隔越於堯庭使馹載馳荷拊循於漢詔眷諸曹之僚掾逮連壘之兵師咸聽敷言交深舞抃伏惟皇帝陛下至仁丕冒盛德輝光獯戎悚戢於威懷郡國虔遵於法令因皇華之上計曲賜周爰降清問以下臨不忘勤恤仰天慈之寵被動民聽以欣榮臣叨假藩符坐糜塞廩戎亭偃革無施橫草之勞魏闕存心但極傾葵之志益殫瘁節上答隆恩臣無任謝復太中大夫臣某言伏蒙告命特授太中大夫依前充集賢院學士差遣散官封賜如故即時祗受訖者觸嚴科而去位歲歷三周扳常憲以原官秩增四等省愆尤於既往荷渥澤以罙優內積兢慙莫遑寧處臣某中謝伏念臣性鍾朴鈍時遘亨嘉藉文史之久資被帝俞之誤奬入持簪橐兩綴從官之聨出綰綬章嘗更尹正之任寵踰其量悔積於躬衆毁所歸誠以處下流之故三已無愠但慙孤上聖之知一昨滄海賜環中銓弄印逺臣去國敢言歸覲之期內史贊方中格除書之目仰煩全度曲示棄瑕仍委典章之司俾預討論之末屬久從於吏役加寖迫於衰年既貽嘖言固絶榮望豈謂清衷垂憫公議不遺書未畢於汗青命再頒於言綍惟制祿貴階之品視通閨近著之榮匪用次遷悉還舊貫自卑而敘上事固異於常倫若沒而復浮恩實均於再造此蓋伏遇皇帝陛下以湯仁御衆以周典平刑溫嚴如寒暑之時進退靡膝淵之異式序儒行有議郎大夫之名振拔滯淹忘一眚小疵之纍顧臣愚分所蒙實多敢不百慮在公一心圖報修其禮義稍異匹夫之愚加以忠精兾蹈古人之節臣無任謝吏部侍郎臣某言伏奉制命蒙恩特授臣通議大夫守尚書吏部侍郎者治典一新官儀大正簡求髦彥若時訓迪之謨振舉滯遺遂及妄庸之迹仰膺殊渥載惕丹誠臣某中謝竊惟在昔哲王並建衆職內則三公四輔翼贊於皇猷外則六卿百司經營於世務有道揆法守之敘無言厖事易之非故官得其人而庶政惟和事任其責而萬目自舉致治之極何莫由斯後王狃於因循流品從而雜揉臺省清崇之秩或假寵以敘遷中外典領之科因漸增於别使朱紫無辨要領莫尋垂百數年宜有丕變敝久必復聖斷惟精霈然發於德音將以核其名實列文階之等級所以革去虛稱據職事之劇間所以裁為中制稽於古則文而不僿驗於今則簡而易從炳焉三代之規橅垂為百世之典則渙號之始僉言允諧周禮太平之書方復行於聖旦尚書百官之本任尤重於選曹銓綜人流助毗風化建正置二使率屬而有差因能任官諒非賢而罔治伏念臣早緣孤進偶擢近班荏苒歲時愧無塵露之益間關憂患寖傷齒髮之衰一昨誤被甄收預聞制作迂儒曲學何補舊儀之遺近列清曹并塵虛授之奬况具貟之初備在首舉以尤艱恩以假人用非有次勉臨所治益畏攸針此蓋伏遇皇帝陛下藴天縱之多能富日新之盛德步驟堯舜庶績凝於九工跨越漢唐新書髙於六典特隆異數式序羣才振鷺充庭既集羽儀之盛疲駑伏櫪亦參仗衛之榮誰料衰遲適遭際會敢不率循詔旨探練故常謹司籍之所藏急古人之先務重念邅回之久已甘棄置之中睿明素審其無他枯朽屢蒙於再造超官賦祿皆清衷特達之知揣分量能實望外踰涯之幸屬限牽拘於嚴格無由敘對於清間感極涕零言殫喻拙姑自期於瘁盡庶不纍於聖明臣無任謝賜對衣金帶右臣伏蒙聖慈特賜臣衣一對金腰帶一條者華省備官叨二銓衡之政大庭賜服榮兼金艾之章祗荷寵光內深震惕伏念臣譾才無取多難甫還載荷甄升入塵清要崇資峻職皆躐等以冒遷繁錫彛儀出特恩之優異襲衣纎麗環帶輝華分頒踰商笥之榮佩服負梁鵜之愧官有其責固宜殫夙夜之勤服文以容敢不念忠純之守仰酬洪造誓罄一誠臣無任謝正議大夫臣某言伏奉敕命以臣曽預詳定官制特授正議大夫臣以任職無補過叨寵擢尋具狀辭免乞賜寢停蒙降詔書所請宜不允者治典更新方正名於庶位尸臣不職謬增秩於班資竊揣分以難安因控章而避免仰紆詔札輒拜言綸靦靣目以增慙鏤心膺而萃感臣某中謝竊於羲師黃紀治實本於建官唐典虞謨道莫先於稽古欽惟睿聖之有作備該今昔之所宜三臺五省之源流悉從訂正六職百工之巨細咸有綱條煥乎一代之憲章垂為萬世之法則取新去故事皆出於淵衷舉要治煩功乃推於典領溥加奬録遂逮庸虛伏念臣學非夙成老將耄及向由簿領之任擢預討論之司議損益之諸文則上遵於獨斷考册書之故事則旁出於衆僚顧臣充員迄無成效延引歲月當即罪誅豈意奉行之初併霑優渥之澤天官小宰秩正二卿之聨文散貴階位躐大夫之四寵靈特異捧對若驚內自省於冒塵實夙遭於際會此蓋伏遇皇帝陛下聖由天縱性自誠明躬萬務之幾微起百王之廢墜致治乎未亂以人而代工謂周室之太平禮經具載嘉漢規之宏逺官簿尚存將建極於中和首垂意於制作甫頒新令丕變周行責實循名居官者必任以事等功第賞有勞者不遺其能曽是瑣微荐膺殊選臣敢不恭承上意更勵末年倘筋力之可支惟詔條之是守講朝廷之大議誠無以異於衆人習臺閣之舊聞亦庶乎知之允蹈主恩欲報自誓彌堅臣無任蘇魏公文集卷三十八
