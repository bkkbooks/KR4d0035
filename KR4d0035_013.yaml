body:
  text: 蘇魏公文集卷十三宋蘇頌撰前使遼詩和國信張宗益少卿過潭州朝拜信武殿朝著籌邊久文明運算髙三冬馳日御一夜隕星旄從此通戎賂于今襲戰𫀆威靈瞻廟像列侍寫賢豪民獲耕桑利時無斥堠勞金繒比干櫓未損一牛毛和張少卿過德清憶郎中五弟平昔知君兄弟名籍隨亷茂䇿通經昆仲同舉進士至南宫請試明經巳傷荆木一枝折重過桐鄉雙淚零朝見鶺鴒詩思苦夜聽鴻雁睡魂醒近聞阮巷有才子異日軒昂看拾青和張仲巽過瀛州感舊覽君關外感懷篇重到藩城倍愴然豈為宦遊無定止却思世故易推遷流年忽復龍周紀仲巽去髙陽今十二年矣急景仍逢鴈去燕物是人非重惆悵空餘陳迹吏民傳仲巽近悼亡過此故吏迎候因語舊愴然懷念和安撫王臨騏驥見寄十月河濵土未乾行人裘褐苦沾汗邊侯顧遇勞紆軫驛舍留連暫憩鞍義貫雪霜松操古氣凌星斗劒光寒待君早晚功名就重約虛齊論隱桓大觀舊學春秋和王大觀寄張仲巽內使名卿話昔遊髙談術略氣橫秋邊亭一别嗟淹久故眼相看重唱酬舊德朝端方見用仲巽清才關外苦難留大觀腰間鞶綬頻加寵幾見新頭代故頭大觀自順安守嵗中移邊撫再遷騏驥初過白溝北望燕山青山如壁地如盤千里耕桑一望寬虞帝肇州疆域廣漢家封國冊書完因循天寶興戎易痛惜雍熙出將難今日聖朝恢逺略偃兵為義一隅安和仲巽過古北口楊無敵廟漢家飛將領熊羆死戰燕山護我師威信仇方名不滅至今邊塞奉遺祠和仲巽山行天險限南北回環千里山客亭依斗絶邉地信偏慳伴月驅行傳緣雲度故關林泉雖勝賞無奈霫奚間和仲巽過度雲嶺磴道青冥外躋攀劇箭飛朔風增凛冽寒日減清暉使者手持節征人淚濕衣此時仁傑意心向白雲歸奚山道中山路縈回極險難才經深澗又髙原順風衝激還吹面灧水堅凝幾敗轅山澗水流遇氷凍則橫溢道上彼人謂之灔水險滑百狀每為車馬之患巖下有時逢虎跡馬前頻聽異華言使行勞苦誠無憚所喜殊方識漢恩和仲巽奚山部落千里封疆薊霫間時平忘戰馬牛閒居人處處營耕牧盡室穹車往復還過摘星嶺路無斥堠惟看日嶺近雲霄可摘星握節偶來觀國俗漢家恩厚一方寧和宿牛山館山深孤館迥部落不成城夜永人無寐冬溫氣自清邉方通夏楚漢地接平營恩信今無外邉庭肯背盟又孤村四望百重山使節相陪北度關休歎光隂懷往昔且看巖石自斕斑和題㑹仙石雙石層稜倚翠巔相傳嘗此㑹羣仙繫風捕影誰能問空見遺踪尚巋然和宿鹿兒館邉城射獵取麑麛夭䴠仁心所不為鳴角秋山少閒日標名郵館客慵窺和冬至紫蒙館書事泰畤迎長日殊方展慶杯關山厭沙磧星斗望昭回月共寒更永風隨協氣來欲知王厯正候律應孳荄和就日館戎疆迢遞戴星行驛騎奔馳束火迎人向萬山峰外過月從雙石嶺間生館之東南有雙峰山行李將至見月初上馬蹄看即三千里客舍今踰四十程十月五日出都逮今四十一日矣每念皇華承命重愧無才譽副羣情和過神水沙磧沙行未百里地險己萬狀逢迎非長風狙擊殊博浪昔聞今乃經既度愁復上幸無漲天災日月免遮障和土河館遇小雪薄雪悠揚朔氣清衝風吹拂毳裘輕人看滿路瓊瑶跡盡道光華使者行和檀香板鏤檀芬馥貫縚邪擊玉敲金一串花自與麗妃親記曲後來傳玩幾人家和神水館逢齊葉二國信幾旬馳傳困風埃忽聽南軺病眼開千里邉疆難際遇一封京信况同來論情不異聲投谷適遇過於渴望梅談笑未經催命駕歸心雖切且徘徊使回蹉榆林侵夜至宿館十二月十七日使還兼道趣南轅朝出沙陀暮水村雪嶺迢遙人自少氷天凄慘日長昏鴉聞宿舍驚如閙馬識歸途去似奔屈指開年到京闕夢魂先向九重閽和使回過松子嶺石徑縈紆甚七盤披榛策馬上煙巒回頭却見臨潢境千里猶如指掌看和遊中京鎮國寺塔廟奚山麓乘軺偶共登青松如拱揖棟宇欲鶱騰邉禮多依佛居人亦貴僧縱觀無限意紀述恨無能和富谷館書事迢迢歸馭指榆津日日西風起塞塵沙底暗氷頻踠馬道路氷凍多在沙底彼人謂之暗氷行馬艱險百狀嶺頭危徑罕逢人客心牢落偏多感天意融怡漸發春珍重詩翁饒藻思剪裁風物見長新和奚山偃松亂枝轇轕翠隂圓倚岫垂崖盡偃然不為深根生觸石定應髙幹上摩天和過打造部落邉人居落瞰重林背倚蒼崖面曲潯澗水逢春猶積凍山雲無雨亦常隂田塍開墾隨髙下樵路攀緣極險深漢節經過人競看可能知得使臣心新嵗五十始覺衰悴因書長句奉呈仲巽少卿始衰心事自堪嗟但覺光隂似轉車白傅開經五秩滿仲尼學易數年加負薪筋力誠難强報國功名事轉賒若問信書何所得樂天知命任生涯後使遼詩熙寧十年八月自國史院被命假龍圖閣直學士給事中充大遼生辰國信使十月三日進發明年正月二十八日還闕道中率爾成詩以紀經見之事及歸録之某奉使過北都奉陪司徒侍中潞國公雅集堂宴㑹開懷縱談形于善謔因道魏收有逋峭難為之語人多不知逋峭何謂宋元憲公云事見木經蓋梁上小柱名取有折勢之義耳文人多用近語而未及此輒借斯語抒為短章以紀一席之事繕寫獻呈髙燕初陪聽拊髀清談仍許奉揮犀自知伯起難逋峭不比淳于善滑稽舞奏未終花十八酒行先困玉東西荷公德度容彺簡故敢忘懷去町畦某向忝使遼于今十稔再過古北感事言懷奉呈姚同事閣使西上閣門使英州刺史姚麟曾到臨潢已十齡今朝復忝建旜行同持漢使雙符節又過秦王萬里城盡日據鞍消髀肉通宵聞柝厭風聲自非充國圖方略但致金繒慰逺氓次行奚山奚山繚繞百重深握節何妨馬上吟當路牛羊眠薦草避人鳥鵲噪寒林羸肌己怯旜裘重衰鬢寧禁霜雪侵獨愛潺湲溪澗水無人知此有清音同事閣使見問奚國山水何如江鄉以詩答之奚疆山水比東吳物色雖同土俗殊萬壑千巖南地有扁舟短棹此間無因嗟好景當邉塞却動歸心憶具區終待使還酬雅志左符重乞守江湖早行新館道中經旬霜雪倦晨征重到邊疆百感生日上東扶千嶂影風來空谷萬號聲人心自覺悲殊土物色偏能動旅情况是天恩懷景俗不妨遊覽趂嚴程奚山道中村店炊黍賣餳有如南土擁傳經過白霫東依稀村落有鄉風食飴宛類吹簫市逆旅時逢煬竈翁漸使黔黎安畎畝方知雨露遍華戎朝廷涵養恩多少嵗嵗軺車萬里通過新館罕見居人引弓風俗可傷嗟滿目清溪與白沙封域雖長編户少隔山才見兩山家牛山道中耕種甚廣牛羊遍谷問之皆漢人佃奚土甚苦輸役之重農人耕鑿遍奚疆部落連山復枕岡種粟一收饒地力開門東向雜邉方田疇髙下如棋布牛馬縱橫似谷量賦役百端閒日少可憐生事甚茫茫發牛山朝發牛山道路回逺終日南行至暮又北趨宿館山坂縈紆道阻長數程行處尚相望晨裝方指南髙外館南一峯最髙彼人謂之南髙山宿館還趨北斗方既乏逺謀慙肉食空將衰鬢冒寒霜却尋十載曾行地風物依然土境荒奚山路出奚山路入中京界道旁店舍頗多人物亦衆行盡奚山路更賒路旁時見百餘家風煙不改盧龍俗唐盧龍節度兼押契丹使塵土猶兼瀚海沙朱版刻旗村賜食食邸門掛木刻朱旗青氊通幰貴人車貴族之家車屋通以青氊覆之皇恩百嵗加荒景物俗依稀想夢華中京紀事十一月十六日到中京未經苦寒天氣溫煦幾類河朔行人皆知厚幸紀事書呈同事閣使邉關本是苦寒地况復嚴冬入異鄉一帶土河猶未凍數朝晴日但凝霜上心固已推恩信天意從兹變燠𤾉最是使人知幸處輕裘不覺在殊方過土河中京北一山最髙土人謂之長呌山此河過山之東才可漸車又北流百餘里則奔注瀰漫至冬氷厚數尺可過車馬而氷底細流涓涓不絶長呌山旁一水源北流迢遞勢傾奔秋來注雨瀰郊野冬後層氷度輻轅白草悠悠千嶂路青煙裊裊數家村終朝跋涉無休歇遙指郵亭日已昏贈同事閣使山路盡陂陀行人陟險多風頭沙磧暗日上雪霜和草淺飛鷹地氷流飲馬河平生畫圖見不料再經過沙陀路二十三日入沙陀路行馬頗艱上得陂陀路轉艱陷輪推馬苦難前風寒白日少飛鳥地迥黃沙似漲川結草枝梢知里堠放牛墟落見人煙從來天地分南朔今作通逵近百年觀北人圍獵北人以百騎飛放謂之羅草終日才獲兔數枚頗有愧色顧謂豫曰道次小圍不足觀常時千人已上為大圍則所獲甚多其樂無涯也莽莽寒郊晝起塵翩翩戎騎小圍分引弓上下人鳴鏑羅草縱橫獸軼羣畫馬今無胡待詔世傳隂山七騎圖乃唐胡瓌創造後人多模搨及别為變態然皆不及舊製射鵰猶懼李將軍山川自是從禽地一眼平蕪接暮雲北人牧羊羊以千百為羣縱其自就水草無復欄柵而生息極繁牧羊山下動成羣嚙草眠沙淺水濱自免觸藩羸角困應無挾策讀書人氊裘冬獵千皮富湩酪朝中百品珍生計不贏衣食足土風猶似茹毛純某兩使遼塞俱值郊禮之嵗今以至日到北帳感事言懷寄呈同館諸公兩忝臨潢使俱逢泰畤祠國陽隨仗日塞外抗旜時盛禮羣公預丹心萬里馳周南歎留滯何似異方悲初至廣平紀事言懷呈同事閣使雙節同來朔漠邉三冬行盡雪霜天朝飱羶酪幾分飽同事嘗言修養法行路飲食不得飽過五分則諸病不生夜擁貂狐數鼓眠豫平生少睡雖三鼓就枕至五鼓亦不復瞑矣光景不停如轉轂歸心難遏似流煙須將薄宦同羈旅奔走何時是息肩冬日北庭懷餘杭舊僚屬曽約尋山春水間越江吳岫遍留連沙頭寺院看花日湖上樓臺試茗天酒後歌呼常薄暮風流雲散忽經年異方萬里相望處滿眼荒郊倍慘然契丹馬契丹馬羣動以千數每羣牧者才二三人而已縱其逐水草不復羈馵有役則旋驅策而用終日馳驟而力不困乏彼諺云一分餵十分騎畨漢人户亦以牧養多少為髙下視馬之形皆不中法相蹄毛俱不剪剔云馬遂性則滋生益繁此養馬法也邉城養馬逐萊蒿棧皂都無出入勞用力已過東野稷相形不待九方臯人知良御鄉評貴家有材駒事力豪略問滋繁有何術風寒霜雪任蹄毛北帳書事到㑹同館晚夕大風沙塵蔽日倍覺苦寒赴行帳之辰厲風頓止晴和可愛北海蓬蓬氣怒號厲聲披拂晝兼宵百重沙漠連空暗四向茅簷捲地飄與日過河流水涸行天畜物密雲遙北中久旱經冬無雨雪輶軒使者偏蒙福夙駕隂霾斗頓消離廣平十二月十日離廣平一向晴霽天氣溫暖北人皆云未嘗有之豈非南使和煦所致耶歸騎駸駸踏去塵數朝晴日暖如春向陽漸喜聞南雁炙背何妨問野人度漠兼程閒鼠褐據鞍濃睡側烏巾窮冬荒景逢溫煦自是皇家覆育仁山路連日衝冒西風頗覺行役之勞却到深山嵗已殘西風連日作晴寒塵埃季子貂皮敝憔悴休文革帶寬往復七旬人意怠﨑嶇千險馬行難三關猶有燕山隔安得陵空縱羽翰發栁河十二月二十七日早發栁河蹉程山路險滑可懼因見舊遊宛然如昨清晨驅馬兩崖間霜重風髙極險艱前日使人衝雪去今朝歸客踏氷還道旁榛莽樵蘇少野外汙萊耒耨閒遼土甚沃而地寒不可種春深始耕秋熟即止還似昔年經厯處下弦殘月插東山摘星嶺二十八日過摘星嶺行人相慶云過此則路漸平坦更無登陟之勞矣昨日才離摸斗東今朝又過摘星峯摸斗摘星二嶺名疲軀坐困千騎馬一行二百餘騎逺目平看萬嶺松絶塞阻長踰百舍畏途經厯盡三冬出山漸識還家路騶御人人喜動容一云行行漸識還家路蘇魏公文集卷十三
