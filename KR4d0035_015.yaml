body:
  text: 蘇魏公文集巻十五宋蘇頌撰册文仁宗皇帝諡册文代曽魯公維年月朔日甲子孝子嗣皇帝臣某謹再拜稽首言臣聞炎軒之蹟不一而帝有神黄之稱戊丁之王繼興而廟有中高之冠矧夫世祀寖逺軌迹相沿非顯號無以彰厥功非鴻名無以昭有徳是曰大法詎可闕焉伏惟大行皇帝濬哲温恭髙明博厚生知之性表於冲年君人之量發於事業爰自明兩繼照重華協帝入纂辰極上當天心屬長樂之臨朝任舊人而共政雖明徳務晦弗厲嚴威而皇綱用張坐銷權黨四罪而天下服三年而百姓仁然後發徳音下明詔復賢科之親䇿革文體之艷麗於時能言之類率籲而在朝屬辭之流壹變而返古故天聖明道之間號令風采於斯為盛矣逮夫乾綱獨運天徳清明躬親萬幾總核羣吏鉅細必擥書奏無留本乎厲精迄用致治因考古之禮樂遂有意扵興襲青壇致祀親藉千畆之田大寝告成合袪二儀之位増徽册扵祖考祫大饗扵廟祧登圜丘而欵上神者九終嚴報闢陽館而類太微者再成宗祀始時儒宫倚席士不宗師乃臨幸太學禮見經員繇是庠序之教興天下建櫜民乆忘戰乃大閱北郊考數軍實繇是師田之訓舉至扵著祀儀以謹有司之職纂樂記以補六藝之缺觀亨享之象而薦三鼎扵九郊案旋宫之圖而配七音扵二樂皆前世所未語諸儒所不講自我制作俱盡情文故景祐慶厯以來聲明文物扵是大備矣加以崇尚經術祇畏天命以彛倫皇極之道為常戒以法家拂士之言為攸箴其或災眚薦臻雨暘未若則必夙宵祇飭恐懼修省上答譴告皆本誠慤是以絶意聲色無事遊畋惟藝文是親非訓典不道邇英晝訪延講學之士觀文燕居耽墳史之玩刋金石以掲六經之文選儒學以定訓籍之目雖聴斷多務而研覃不廢故述作之制則有洪範政鑒以考休咎之證神武秘畧以論竒正之謀筆法之妙則有宫殿題牓皆窮飛動之勢刀鼎銘識兼該篆籒之體多能本乎天縱人文以之化成而又心推至公性有大度動作必憲扵古昔居處必防扵逸欲圖尚先烈為訓鑒也詔録唐事觀典則也官増諫員廣聰明也政委公輔謀治理也其損已之大則却徽號以守謙虚節服御以示敦朴减後宫之數以歸配良家黜斜封之恩以弭防私謁其恤民之深則遣使臣以寛力役蠲茶禁以止刑誅立廣惠之倉以救恤艱食出内帑之泉以資佐糴本其前識之逺則遏近戚之干公議罷功臣之任政司廣同姓之封以敦叙邦族建主器之位以預正皇統兵雖時動期禁暴而巳無尚功廣地之賞刑雖未厝務去惡而巳多宥過捨生之恩當夏戎之叛渙也謀臣獻侵伐之議乃以静綏疆陲率從保塞之請儂䝤之繹騷也上将建盪平之功猶慮重勞異域遂止深入之師其禦戎徠逺之術長矣保邦息民之利深矣故臨涖天下四十二年内無玩兵之虞外無暴歛之困生聚休息表裏謐清雖古所謂至治之極豈是過歟夫惟享厯之久而能遜志不伐保休徳獲全名此故哲王之所難也况復仁以守位寛以得衆兢業以隆三聖之緒謙恭以盡羣下之情持盈守成要終猶始葢自三五以還未有若兹之具美也方将淵黙以凝思優游而恭已法乾坤簡易之徳隮泰鴻億萬之年而幾務勞神憂勤損夀奄遺末命遂棄萬方率土銜哀攀號靡所顧惟眇質獲嗣慶基夙奉慈嚴敢忘率厲今以穆卜惟吉因山肇成眷同徳典禮之臣援稱天節惠之義奉揚景鑠祇薦崇名謹遣攝太尉具官臣某奉寳冊上尊諡曰某諡皇帝廟號某宗恭惟飈御未遥威靈如在昭膺懿冊永饗尊稱流祚扵無疆配天而齊極嗚呼哀哉立皇后冊文維元祐七年嵗次壬申五月癸未朔十六日戊戌皇帝若曰天地判合以綱人倫君后取則以御家邦自昔三代内徳之茂二南風化之本治道所繫詩書述焉朕纂紹丕服上䝉太皇太后聖訓八年扵兹而長秋未建奉饋闕職歴詢舊門審定福耦慈衷惟允斯即其人咨爾侍衛親軍馬軍都虞侯眉州防禦使贈太尉孟元孫女衣冠望族鄒魯華胄流光儲祉鍾粹邦媛有徽柔之質不待母師之誨有安正之美宜配坤極之尊稽謀大同儀物惟稱今遣攝太尉蘇某攝司徒王巖叟持節冊命爾為皇后膺兹嘉禮徃踐宫朝協宣隂教母臨萬方朕春秋時思䖍七廟之享后惟衡紞是将朕晨夕承顔致三宫之養后惟膳饔是視朕卑服節儉以躬率天下后亦練繒是式朕宴游省耕以穡事為本后亦穜稑是資於戲皇天無親惟徳斯永寅畏饗福巽順正吉嗣續百世克終有慶不其韙歟奏議立家廟議至和中文潞公作相立家廟下禮官議公時知太常禮院上此議元豐中知滄州因賜對神宗嘗從容訪問為學之要且云聞卿於典禮尤為精詳可以往時所論一二事來進因奏家廟承重二議檢會慶厯赦書文武官並許依舊式創立家廟謹按周禮諸侯五廟曰考廟曰王考廟曰顯考廟是諸侯祭父祖及曽髙所以然者服盡四世始祖不祧通為五世也大夫三廟及曽祖也始封不祧通為四世而髙祖止扵享嘗也士二廟及王考也皇考則為壇而祭之下士止扵一廟其王考則無廟而祭之唐及本朝廟二品以上得祭四世三品以下皆祭三世六品以下無廟者皆祭扵寝按開元禮及開寳通禮皆云六品以下若有廟者如五品儀無廟者祭扵寝今赦恩既許依舊式即合依禮令之數又按古者一世一廟五世則有五廟矣今之廟制與古不同皆為一廟同堂異室則一品二品之廟並一堂四室三品四品五品之廟並一堂三室乃合禮制又禮記王制曰大夫士有田則祭無田則薦是有土者乃為廟祭也有田則有爵無土與爵則子孫無以繼承宗祀若然是有廟者止扵其身子孫無爵祭乃廢也又禮曰父為大夫子為士葬以大夫祭以士今二品之家立廟者既死而子孫主祭如六品以下即祧二主祔一主又牲牢俎豆器物頓異在扵人情似未允㥦若乃參合古今之制依約封爵之令如官當立廟者請因遇恩封國公立廟一堂四室祭及髙祖量賜田若干頃尚書将軍及曽任二府或節度使者特封郡公立廟一堂三室祭及曽祖賜田若干頃給諫以上曽任學士者特封縣公廟亦一堂三室賜田若干頃其初封官未及二品者依三品未及三品者依五品其未有廟者即不得賜田每田二頃許置客户若干人並免州縣科役其田除租稅外地利悉入其家專以奉祭事不得他用死則子孫承襲並世降一等公降為侯侯降為伯當襲封者須長嫡子無長嫡則諸子見為長者同特改一官若今遺表外其餘恩數悉同常制其田子孫不得典賣有罪絶者還没官此亦稍近古法可以上副赦恩之意若以封爵難扵遽行即請考按唐賢寝室祠享儀不須牲牢俎豆止用燕器祭常食而巳議承重法臣近因上言臣僚家廟祠享事乞重定服紀親疎之制曰一節准五服年月勅斬衰三年嫡孫為祖父為長子今士庶之家子孫罕分嫡庶其相為服徃徃一槩以斬衰期或踰年從吉便行嫁娶苟有犯者緣勅律不分士庶便當一例斷罪臣以謂古者貴賤不同禮諸侯大夫世有爵禄故有大宗小宗主祭傳重之義則喪服從而異制匹士庶人亦何預焉何以言之謹按喪服傳曰父為長子何以三年也正體扵上又乃将所傳重也鄭康成曰重其當先祖之正體又以其将代已為宗廟主也而經不言長孫為祖者葢有爵土則父殁次當傳已其承重可知也近代仕不世爵宗廟因而不立尊卑亦無所統其長子孫與衆子孫無以異也生而情禮則一死而喪服獨異恐非先王制禮之本意也而世俗之論乃以三年之喪為重故謂當服者為承重而不知為承大宗之重也嘗聞慶厯中朝廷欲議臣僚應任子者長子長孫差優與官餘皆降等此亦近立宗之法也然雖有此議亦不果卒行慶厯末石中立卒未㡬庶子從簡又卒嫡孫祖仁先已服期不知後服禮官以謂宜别制斬衰嘉祐中劉煇祖母卒自言㓜孤鞠扵祖母雖有諸父亦乞解官行服禮官議煇是長孫自當承重臣竊謂祖仁官丞郎列近職世荷賞延是亦有重可承者也煇乃庶官世又非顯若云鞠扵祖母報以三年可也有諸父在而令承長孫重非也故熈寧八年六月詔書嫡子死無衆子者然後嫡孫承重襲封爵者雖有衆子猶承重此明宗子傳重正合古禮而未議無封爵者及庶人所以承重之意故學禮者猶以為未盡也傳曰都邑之士則知尊禰大夫及學士則知尊祖故諸侯及其太祖天子及其始祖之所自出由是言之尊卑之禮有隆殺之異而喪服從而為之制也明矣今服祖重者而無所以為重之義又無大夫庶人之别是尊卑一統而貴賤同體也臣伏覩朝廷修舉遺墜禮無不講喪服之制事干典刑有所未明固宜稽考欲乞特詔禮官博士參議禮律若以無封爵者無傳重之義即乞别立服制如在禮故合承重亦乞參酌古今收族立祭之禮立為宗子繼祖有以異扵衆子孫之法及庶人與士大夫當與不當同一律頒布天下使人知尊祖不違禮教則州郡用法斷扵不疑也臣職在守藩不當輕議禮典然麗刑讞獄亦州郡之所得言也議學校法臣聞古者立太學以教扵國設庠序以化扵邑雖王之諸子卿大夫之子弟及國之俊選皆造焉三代所以教化行而習俗成者由此道也自鄉遂之制壊而學校從而廢缺漢晉而下代有興置至唐而後備上都立國子監以摠六學之務設官則有祭酒司業為之長博士助教直講為之訓導監丞主簿掌其政令外則京府州縣各有學並置博士助教以主訓授之職由是黨庠遂序國學之制稍稍復矣國朝自景祐以來天下建學慶厯以後數立規程自是諸儒知所宗尚嵗月寖乆生師益増然而黌校之間未聞有業成通經之士顯著扵時而副朝廷之選用者今明詔将議改制而降意扵詢訪兹誠治世之先務而聖主所當留神也臣竊謂本朝學制大抵倣唐之舊然而設官有未備而教導有未至故積日雖乆而成効無聞也何以言之唐制學官國學則博士助教各二人直講四人大成十人學生三百人太學四門學則博士助教各三人學生各五百人而四門又有俊士八百人律書算學則博士助教各一人學生五十人至三十人今之學官惟直講說書共八人而無國子太學四門之别職事又無殿最之課太學生止扵三百人廣文生則三嵗試補但隨秋賦而不𨽻兩學聴習律學雖有其名而無其職書算則又闕焉唐之學官每嵗終考校以訓授功業多少為殿最學生則以業成通兩經以上者上扵監祭酒司業䇿試優者上扵禮部大成上扵吏部今二者咸無焉其法制滅裂如此而欲責其壹道徳而廣教化勢不可得也必欲别為新規臣愚以謂積習既乆未易更張莫若即舊法而増損之則便而易行也今學官八人謂宜各令分掌職事五人專職講說人各講一經春秋兼三傳禮記兼周禮儀禮並為大經各限二年講畢毛詩為中經限一年半周易尚書為小經限一年三人掌教授諸生以詩賦文論經史大義及時務䇿仍輪日直學以待諸生請問疑義并出公試題目若考校試巻則八人通主之其教導有方成効顯著為諸生凛伏者候及三年委判監官聞扵朝廷望賜召試館閣職事其不職者罷免之學生以五百人為額逐日早分經聴受每經百人仍兼習孝經論語聴讀罷則課習文史每月公試三學官考校優劣分三等掲名扵學以為勸沮監丞掌其課最主簿紏其違慢每一經講畢監上扵判監集官䇿試大義十道次日口說十道各定為三等大義通十并口說明白能發明聖賢深藴者為優等大義通六及口說俱通者為次等不及六通為下等其通一大經或一中經兼一下經試入優等者上扵朝廷望加旌拔或直送省試仍許特奏名次等籍其名以俟再試甄别下等本學常加敦勉其文行道藝超絶倫軰朝野所知者不拘常例並許舉薦以備朝廷擢用其律書算等亦望各立一學量置生徒庶令學者粗知本原以之入官不至墻面也州郡之學每州請置經學博士一員或只以教授名官内舉人及三百人以上者朝廷為選差正官三年為一任如能舉職有効者任滿日本州為保薦之乞加旌擢其餘本州辟召有科名守選官員或經行純粹之士上扵本路列奏朝廷俟㫖補授仍給本學公錢為俸亦以三年為任任滿保薦如正官法内命官望加優奨舉人即授以閒官再授教授之職每州仍置說書一員生徒二百人以上三人一百人以上二人以本郡有經術文行之士為鄉里所推者充仍從生徒衆舉州為補置本州無其人則請扵隣州使專講說諸生聴讀課試亦約太學之例如有經術精博文藝優長者上扵州州為覆試籍其名以補學職俟及三年顯有功効者說書同舉送國子監與通經者同試縣學置助教一員或只以教授為名推舉如州說書例兼主講說教授之事諸生有業成通經者上扵州學與通經者校試舉送州縣既立學校須藉公費望許摽撥本處閒田或户絶及僧寺荘土多處斟酌移割入學充職田天聖中王隨知江寧府請以茅山道宫荘田充本處書院職田詔從之隨生徒多少以定頃畆州縣為差人主持勾收課利入學以助支費條約既備奨勸既行則人人各務本業窮經學文不三五年可以丕革舊俗矣議貢舉法臣竊謂以今之科試取士比之徃年至為詳宻徃年專以詞賦為考式而學古者或詘扵聲病今則詩賦䇿論通考不專扵一場取舍徃年雖通考三場而學經術者或困扵無文今則有明經之舉徃年敦樸之士或不習科舉無由自逹今則有遺逸之薦是則詩賦所遺者取之扵䇿論䇿論所失者選之扵明經二者又不能盡則擢之扵遺逸天下苟有懐才負藝之人靡不畢為朝廷收擢而任用之矣今明詔猶以為不足者臣竊謂其弊不在法制之失而在扵措置之未盡耳夫措置之未盡其說有四一曰考試關防太宻二曰士子不事所業三曰詐冐户貫取應四曰取人多少不均所謂考試關防太宻彌封謄録是也夫彌封謄録本欲示至公扵天下然則徒置疑扵士大夫而未必盡至公之道又因而失士者亦有之何則國家取士行實為先今既彌封謄録考官但校文詞何由知其行實故雖有瓌異之士所試小戾程式或致退落平時嘗負玷累苟一日之長可取便預收采士之賢否而進退之間繫乎幸與不幸徃徃是矣是豈朝廷之本意耶臣竊覩天聖四年仁宗皇帝詔書曰如聞舉送之士操履罕修黜扵有司則紛然起謗升扵科選又多以敗官由習尚扵虚浮宜特行扵敦戒自今諸州發解諸舉人並須考訪履行或有乖僻彰暴雖所試可取不得一例解送以此見朝廷之意先士行而後文藝也若彌封謄録則何由辨其賢否而得如詔書之敦戒乎為今之便則莫若去彌封謄録之法使有司得專參詳考察一則主司知朝廷委任不疑益務盡心二則負實學者得以自明程文小疵不虞見棄三則淺陋之人固無僥倖之望至公之道無大扵此議者或曰此法行之巳乆今多士競進一旦改革必致喧訟何以弭之臣以為士子之行莫若鄉曲最知其詳儻或素履無聞因而黜落自厭羣議復何畏乎多言邪若其行完學富之人偶不與薦既知朝廷所以取之之意則人人自重不敢輕發養其㢘恥異日足為嘉士其所勸葢多矣若曰南省聚天下之士不下數千人主司無由一一知其賢否雖見姓名亦何益扵公選臣以謂此法宜先施之州郡亦庶㡬存鄉舉里選之遺範也望自今並委知州通判職官常加察訪本州行能之士記其姓名更相論辨遇詔下轉運司為精擇試官依常赴院鏁宿其舉人試巻更不彌封謄録仍别差官㸃檢收納應有塗注乙處並印記訖逐旋發送試院不得稽留令試官依公考校文藝除雜犯不考式者先行黜落外其餘悉定髙下訖報州令知州通判職官同入試院共加審覆以素有聲稱著扵鄉里者為先然後定其去留依額解送試官及州官若有偏曲私徇令監司嚴加按察具奏其事重行黜降如此詮擇必無幸進之人比至南省則是已經鄉里察訪設令依舊彌封謄録只考文藝亦不容無状之人得預奏名也其殿試考式繫之朝廷非有司所當措議也所謂士子不事所業者舉人不納公巻是也舊制秋試先納公巻一副古律詩賦文論共五巻預薦者仍親赴貢院投納及扵試巻頭自冩家状其知舉官去試期一月前差入貢院先行考校内事業殊異者至日更精加試驗如程試與公巻全異及書體與家状不同者並行駁放或假借他人文字辨認彰露亦便扶出永不得赴舉是舉人先納公巻所以預見其學業趣向如何亦有助扵選擇也景祐以前學者平居必課試雜文古律詩賦以備秋巻頗有用心扵著述者自慶厯初罷去公巻舉人惟習舉業外以雜文古律詩賦為無用之言而不留心者多矣此豈所以激勸士之篤學業文之意邪臣欲望自今舉人請應依前令投納公巻一副不得假借他人文字并親書試巻頭家状一准舊制委知舉考試官預先看詳以備将來與試巻參驗是非而升黜焉如此庶幾人知向學不為苟且之事矣所謂詐冒户貫請應者今外郡舉人赴開封府取應是也天下州郡舉子既以本處人多解額少徃徃競赴京師旋求户貫鄉舉之弊無甚扵此雖朝廷加以峻文而終不能禁止者葢以開封府舉人不多解額動以數百人適所以招徠之而使其冐法欲革其弊莫若預為之防扵罷舉之嵗令本府下諸縣察訪見今土著寔有多少舉人候見得的實數目開送貢院比校外郡人數酌中解名處量其分數别立定額外方舉人知其如此豈肯不逺數千里冐峻文而求寄貫乎其府中减下人數却乞移與國子監添起名額既巳革寄貫詐冒之弊又足廣庠序樂育之風如此行之誠兩有所便也或曰府中减下人國子監又復添額則人人競赴庠序投状其扵冐妄不亦均乎是不然也在開封府則有詐名冐貫之弊扵國子監自是四方俊造進取之所事體固不相類容其趨進復何害耶所謂取士多少不均者進士與制科遺逸是也臣竊以徃年放進士毎牓不下四五百人自間年放牓亦嘗近二百人諸科大約依進士人數而制科入等者不過兩三人明經不過三五人遺逸之薦復未有定制臣以謂舉制科者博通古今貫穿經史顧其積學勤亦至矣明經者雖誦數或闕而大義多通遺逸之薦縱不能盡如詔書之所求要之皆鄉里推許之人此數科比之進士諸科初學幸中者多取之亦未為謬濫也臣伏覩新制三嵗科詔每牓以三百人為限是進士諸科之路已廣而制舉遺逸議論猶未及之况近制明經已許均减諸科之數雖取人未多是巳有定制臨時可以通融損彼而益此也臣愚欲望自今三年科舉進士每牓且以二百五十人為限留其餘五十人以待制舉及遺逸之類其制舉䇿入優等者自依常例在下等者望量添人數比類賜以出身以酬其積學之勤其舉遺逸仍望立為定制毎放牓而後下詔諸路州郡及轉運司共察訪如士人中顯有履行純固經術文藝優贍為衆人推許者或場屋黜落或邱園髙蹈咸許保薦每路限以五人並敦遣赴京師依例試以䇿論考定髙下優者賜以科名與制舉所増人共足所留進士五十人之數下等亦望量推恩渥或與免将來文解如此則取士之路益廣而行藝之人無有棄遺奨育人材敦激偷窳上助風教不為無益也蘇魏公文集巻十五
