body:
  text: 蘇魏公文集卷六十八宋蘇頌撰書與胡恢推官論南唐史書某伏蒙寵示新著南唐史藁玩讀纍日深服才致之敏雖未獲遍覽全帙然用數篇可以見作者之新意也觀其發凡起例所記該洽固非小見淺聞之所能造詣竊於其間有一二事可疑者敢輒條問不知足下以為如何也仲尼曰必也正名是古人之凡有所為必當先正其名况在史志之作為後世信書豈不先務其名之正乎今足下題三主事跡曰南唐書某主載記者得非以李氏割據江表列於僞閏非有天下者故以載記代紀之名乎夫所謂紀者蓋摘其事之綱要而繫於嵗月而屬於時君乃春秋編年之例也史遷始變編年為本紀秦莊襄王而上與項羽未嘗有天下而著於本紀班固而下其書或稱帝紀言帝所以異於諸侯也故非有天下者不得而列焉而范煜又有皇后紀以繼帝紀之末以是質之言紀者不足以别正閏也或者謂陳壽三國志吳蜀不稱紀而著於傳是又非可為法者也壽以魏承漢統為正故稱紀吳蜀各據一方故在諸侯之列而言傳愚以謂既以魏為正統則諸侯宜奉天子之正朔其書當皆言魏志吳主蜀主傳安得言三國志而於吳蜀主傳各稱其紀年乎若曰吳蜀不禀魏正各擅制度則其書自稱紀無害史例也或者又謂仲尼作春秋不曰周史而曰魯史不稱天王之元年而稱魯公之元年則吳蜀傳不繫於魏史而自稱其年紀於義無異豫曰仲尼所作者魯史爾故稱其國君之元猶書曰王正月言王者之正諸侯所當禀奉而行稱魯公之元者是别其一國之書也又若隋巳受周禪最後代陳并其國地唐姚璹撰陳書亦稱紀李延壽作南北史二國之君有閏有正亦各稱紀而古人未有非之者所謂載記者别載列國之事兼其國君臣而言有正史則可用為例故東觀記著公孫述等事迹謂之載記而晉書又有十六國載記蓋用其法也足下必以南唐為閏位自當著五代書後列云李某載記可矣今曰南唐書載記似非所安也又有國家設官分職因革不同五帝之前有雲紀之類商周而後名稱益廣尚書之周官周禮之三百六十官左氏記郯子之言述之詳矣班固始作百官公卿表歷代各有職官志皆所以見異代更改沿襲之源流來者安得易而同之乎今足下書有兼納言視秩三司之類且李氏稱僣不聞有是官得非足下以兼侍中與儀同三司為近俗而易以此語乎是不然也若官稱之可易則仲尼序書當一槩以唐虞之官目之矣而旅獒曰太保作旅獒蔡仲之命曰周公位冢宰君牙曰君牙為大司徒景命曰伯景為太僕正者盡取當時之官名以記其行事也左丘明作傳列國之官稱亦未有更之者如楚之令尹宋之司城晉之三軍大夫如此之比非可悉數足以為後世約史之法也又詔令者古左史所記王者之言發而為號令其美惡繫時之治亂使後世有所觀法焉今足下所載李氏詔令皆非當時之言竝出於足下藻潤之辭美則美矣其可為史法乎夫載言之美莫過尚書虞夏之際其辭約而典商周之後其辭華而悉必若王言之可改則仲尼刪書當使誥誓之文與典謨一體其所以存而不易者欲見異代文章之盛也故揚子得以稱之曰虞夏之書渾渾爾商書灝灝爾周書噩噩爾自漢而下左右史為一職載述者兼言與事而書之而太史公班固諸史所記制詔文體類皆不同盡當時之言也蓋下筆擇其善者則備載之其不足存者則略其意而書之若以李氏草創典章不偹文獻不足則其命令之文亦可記其大指而巳不必釐改其辭也某學無師法未嘗為史但參之以經訓驗之以前書所見如是非敢以為得也蒙足下不相外乃敢發其所疑者亦幾乎因事述意求益於識者耳可采可擯毋惜開諭代提刑王綽上宰相朝廷不用武幾四十年一旦西羌負固從中命將率師致討間者帥臣數不料敵犬戎伺間敢窺邉郡我師至於挫鋭雖謀臣議士交陳攻取之計而曠日持久未聞决勝之畫夫以朝廷之威天下之大兵革非不堅也軍旅非不衆也將帥非不擇也然以守則不固以戰則不克其故何哉得非以承平日久兵頓卒罷邉遽既聞未遑講閲而使之禦戎對敵非百勝百全之道也故逆豎跳踉得以假息而又雈蒲雜黨乘隙而起嘯聚攘􅐁為鄉民患亦既翦治除滅俘捷繼至尚以道路遮迣桴鼓未息勵兵訓卒大為之防郡國武備不為不舉矣其於師律禁令之間猶或未行故某得以捃托餘論而詳言之伏見去歲倫賊狂蹶尋即成禽其所經州縣巡檢使臣縣尉以選愞黜去者凡數十人相次詔書選除新吏大抵人自激昂監觀前覆期立來效懲一勸百此為信然某竊體當諸處兵士以久不練習戎戰類多罷軟驕惰之輩近來雖有訓練之程而未聞習服之效伍符尺籍之禁既約束之不行鼓旗耳目之令亦進退之亡節若即加督責稍或勞苦往往羣輩相語構誹辭出怨言以動搖衆心前日倫冦之患是也其統領官屬以此多恤物議專務姑息故其驕惰之性迄未悛革驅而進戰至有臨敵而解盩中軍金鼓之指若斯之比皆和輯不至約束不嚴之過也兵法曰卒不可用是以其將豫敵也又曰卒不習勒百以當一習而用之一以當百是以古之善用兵者于平居無事之日先示之以恩信威令士巳親附畏禀然後交兵合刃之際行令立法人服而衆信我之所指必從而死我之所麾必從而移戰攻必取此其道焉凡今之為將帥者既不得素拊循其士卒而又統領之間禁令不專勢不能盡其死力姑藉朝廷厚賞以懷之每一經戰地小有俘獲皆厚賜給若從而敗散朝廷既行責帥之罰其卒伍或不問罪至如往嵗關外之戰屢失將臣前年京東西羣冦亦曾殺陷使臣縣尉初亦下令捕戮既而虞其竄伏為患遂命招集一切原宥止於配移下軍耳自此戰士見上令寬大但有邀賞之心而亡用命之志孫武有言令之以文齊之以武是謂必取又曰愛之而不能使厚之而不能令亂而不能治譬若驕子不可用也某以謂國家刑賞之柄律令具載夫敗軍者抵罪失利者免官將帥之刑也臨敵而先退背軍而退走失主將亡鼓旗節鉞者皆斬此部曲之刑也近者邉疆將臣巳得專行師律若巡檢縣尉不可便令執誅賞之政其所統之衆亦在朝廷為立條禁申嚴號令必使畏威禀命而後趣其進戰責其成功可也某之愚慮欲乞朝廷降指揮舉行軍法應今後巡檢縣尉遇賊出戰之時其兵士弓手若有不禀號令及臨陳退走因而亡陷將領者竝當以軍法從事仍遍告州縣使衆共知有此條約則統御之際可齊其士心然豫奪之間亦繫乎朝㫖行師之衆此為先急閣下盍因論道之隙一為開陳使愚慮得行則軍旅之下皆知典憲接戰之時不復敢有逗撓戢兵禁暴此亦一端願賜詳擇某資材不厚委寄甚隆朝夕省思嘗懼職業不修上纍吾君吾相之責任苟有所聞豈得緘默伏惟閣下富彌綸之才處機衡之任巨賢當國四海嚮風誠願采擇狂愚納用策慮則折衝厭難勝於未形彼羌戎豪酋將請命之不暇尚何有侵軼之為虞乎事實言直浼瀆鈞聽某無任悚懼激切之至謝太傅杜相公某之從事於南都也伏值相公以功成引年退居民里朝廷之優寵天下之瞻仰兹固崇絶於一時而士大夫望其藩牆希一顧之遇者豈容易哉眇爾小子幸得效官府下時隨衆僚進見風采奉承餘論不見疏棄巳為榮矣一日相公呼坐與語因論文字且索鄙作乃蒙以文學見稱他日又承誨曰吾常見世之學文者為吏而或不事事言吏政者又有脫略細故而不為文頃聞吾子之當官嚴上恭下不失中道辨論公事不憚勞力能爾可謂善政事矣某既承是言竊退而念之夫相公之所謂文學者經綸王道表裏聖賢言辭可以繼典墳之美論議可以明當世之務是豈章句之言誦數之說足稱於其前乎相公所謂政事者綱紀朝章措置邦體發一言則號令於天下舉一事則惠澤於生民是豈規規然謹詔條奉長上者足語於前乎然今猥見稱道者此特大賢君子好善忘勢不以巳之才髙道尊而忽人之小善小能故及於斯言而某亦未敢私之以為恩也如是益久而相公奬進之意益加於前或贊之於當塗或譽之於仕進作為文章乃使之評視奏疏章草又使之執筆間旬月不及門則恨相見之疏隔每見之必推古人所為相期於久逺姁姁乎其言之彌勤愈愈乎其意之彌親某于是又自念曰夫以相公之道德名位豈有待於一後進生而過相稱譽哉然而垂意若是者是必其中有所取而云爾也顧某之所有何足副其所稱邪雖然不得不謂之知巳者也某嘗謂知人聖哲以為難嚮非視其行藝之可嘉而察其操履之能固彼大賢君子孰肯徒然許之於心而譽之於口也然其所以受知於人也者亦不得為易何哉士嘗患無知已既有知巳矣則於其稱道也且厚而其責望也亦深彼以文學見知也後將責以文學之用於時矣一不至焉足為知巳者纍也彼以政事見知也後將責以政事之效於時矣一不至焉足為知巳者纍也得不審巳之道與彼言之相當然後可以無慊自視或餒焉當彼之厚望而貿然無愧者彼將以何人見待乎某是以每一承相公之言未嘗不退而自省所趣嚮與所作為懼有不至必將以聖人之法言為規凖勉勉焉以不戾於道為至也如是者非唯力儒行巳其義當爾亦將求免為無聞之人庶幾不負知巳者之責望也近者官滿獲代迫于從調不得留侍杖屨違去門下忽復一月言念恩紀無有涯量中心之懇固非筆墨所能究悉然而相公之期某也甚逺而某之思報德門下寧當如常人之用心故於書尺之間不復以屑屑小禮為務今偶使人行敢布腹心之萬一庶乎相公察某感知巳之心不為淺也依戀門館下情無任上中丞諫議某向以備幕府之僚吏司縣邑之政令伏江干而望門庭者凡幾年矣私自為計進不能奮起卓絶之技以收顯名退不能纍異績立竒效以躐榮仕徒取絶于知巳之門以不得見役為恨近者將外臺之命獲至于都門寅緣素舊始一拜堂下未逮從容而迫于簡書不得再見風采少敘懇懇中心尚有所願達者蓄之滋久將默而不陳是重恐栗而忘厚德也將輸而布之是率爾而瀆于尊嚴也與其默而有忘德之罪孰若輸而受瀆尊之誚與其退而有自絶之悔孰若進而就妄言之責執事其亦察而憐之使得悉其愚慮幸甚某竊念昔之未仕也家府與執事有同朝之好故某得日趨侍于前居則聆執事之法言行則觀執事之儀範如是者纍年矣執事矜其所為不見謂不可及其舉于有司也其豫奪柄則執事操之程其言不以後於衆是執事之于某也愛亦甚矣恩亦厚矣某固巳銘之中心誓之旦暮期於後日有以報見異之重矣今者道途趨走進退皇皇然而無所適㥏默而歸其舊局事卑冗之役趨期㑹之務其所以戚戚焉者非敢憚煩辭賤而云然也且金陵大邦江寧為劇邑以某臨之實非其任雖然亦未嘗以不肖而不盡其心為之謹疆場之政則明其比詳簡其迫胥為之辨閭里之訟則拔其豪猾安其罷軟除敝起廢足以紓氓籍之艱懲煩禁慝足以清貪暴之源有所不及未嘗捨也揣分摩巳豈當過有所求今猶有所未釋者蓋夙昔之願未遂為恧耳念某生而承父師之訓以簡編自娛故嘗得幸於選擢力有所困終委下流至于今無以自奮束于簿書窘于刀筆不得卒素業成美名上纍明哲之知為恨巳甚矣是以鬱鬱而不能止也非憚煩辭賤而云然也其欲試諸卿以求息肩之便邪惟是筋力之疲曾未暇伺候進退尚安能飾語言以附㑹志意乘人顔色以求賞愛哉其欲靜而須命邪則其蓄藏之未大名譽之未光恐遂汩沒於泥塗而不能成就其志願怵惕永慮未知所安非持而叩執事者殆無以起之何也執事以文雅偉量服海內以讜言碩德輔天子稱一人天下莫不以為當逹一善天下莫不以為然至於樂育英才教誨不倦固常以此自任矣某故曰非持而叩于執事則無以起之若某之所為執事既巳發而始之矣儻幸而終其賜不屑教誨開導誘進使得獲就藝業則某雖不佞猶能竭夙昔之愚志勉前修之徽猷毋以固陋自棄毋以卑賤自放不為詭激之行以希當世之名不踐苟容之利以違一切之難讀書為文期適于中道而後巳斯某之所以自為也顧持其所自為勉而徇其所見取則又以為非獨亡悔而巳亦將庶幾晞日月之末光喣江海之餘潤繇此而始矣不知執事所以處之者將如何耳仰干台嚴卑情無任上時相八月日承奉郎守大理寺丞蘇某惶恐百拜頓首上書贄文于昭文相公閣下某竊聞天下安注意於相天下危注意于將天子之事也遂萬物之宜使卿大夫各得任其職宰相之事也天子任宰相宰相治百官上下交相得然後百官熙而萬事理古所以臻夫至治之極者以此其原歟方今天下治定王澤流洽聖主淵默于巖廊之上萬幾之政仰成于丞輔以相公富經邦緯俗之才世載勳烈為士民之所瞻仰爰立作相俾乂本朝紀年之間三秉大政再冠鈞軸此誠天下安而天子注意之時也自朝廷之百官下逮于州邑邉圉之吏量能隨器皆得其用居臺閣者謀謨于內分職守者幹裕于外事之細大靡有遺諝此誠賢相在位而卿大夫得任其職之效于斯之時天下之士負道藝者思發其志業以效于治懷勇略者願竭其智力而施于用羣輩率籲雜遝而前以睎光榮蓋無虛日矧若某者有志於斯道為日久矣然而以材質駑下不能自奮以趨時汩沒下吏逮十餘年惟其榮進之階非跂望之可及也嚮者朝廷用禁林之奏以先君子嘗繇文章顯于時謂小子某能克其家而世于學故委之有司俾覆實以視其能否某重惟朝廷進人之路莫尚于文學之選其所以甄待之異者非特貴其藝能而巳必也觀乎趣于道非特取其言詞而巳必也要其有所用顧某之朴學鄙文誠無以稱明詔下采之實因念昔者承父師之訓嘗謂文以表其志學者先所行苟遭時遇知奮發藴慮見於事業不為難耳幸今朝廷推恩記其姓名嚮不能䇿厲以成雅志斯亦為學者之所恥也兹者獲罷外官聽命闕下伏遇相公當國任政方且慎擇人才責成衆職而某之所學專在文字輒敢裒采舊著離為五軸恭贄庭下蕪纍之作固不足以紆台衡之鍳抑用古之將意見誠之義以章乎物也伏惟幾務之暇少賜屬目或謂其志意之有守而憐其為先大夫之後而未有所成特均化工振起滯跡銷丱璞使成器育陵莪為良材則某雖甚愚豈忘樹立儻其展四體之效以立於軍師使百姓加勇焉此誠非所長也若其相公以治平之旦務在奉行故事發揮典章俾之紬次前聞論撰當世雖曰未學尚可勉而任職載述聖主賢相之功德使與謨訓均美此其志也干冒鈞聽代人上樞密龐太尉某聞崔祐甫之相唐也在位方逾嵗而除吏幾八百貟其間多舉用親識故人當時寒滯進擢略盡德宗初亦以為言且問其故祐甫對以為薦延士類須諳其實行非涉曩舊何緣而知其能否仲尼云舉爾所知正謂是爾以茲衆論伏其知言天下稱為賢相書美竹帛光華至今何其盛也某發卷至于此未嘗不重復嘆詠想見其風采耳念生不逢若斯人之推拔使沉滯之跡何階之望進豈賦命竒蹇之使然邪抑遭賢遇知自有其時乎某持是說久之未有際遇今將直貢于左右不知太尉以為何如哉竊念某才質駑下于時無所用偶以薄技得綴仕版故自䇿名于茲且二紀矣三從事于州幕始脫銓選再效役于嶺江乃得近官碌碌常調以至于衰暮未嘗有知巳特逹之薦仕宦若此非所以賦命之竒蹇歟雖然猶未甘心于廢棄者誠念頃游名場即獲拜接太尉之後塵爾來出入京師嘗蒙以一面之舊未之間擯今者幸遇太尉奮臯䕫事業佐佑唐虞之君得時行道天下蒙福士之干時希進者多見稱録于顯塗門下之士獨不可納說而望知乎且三府之上公位至重也五品之散郎官至卑也以至卑之官望至重之位其勢豈特霄壤相遼之限也其應豈特門庭萬里之逺也果以英哲之懷不替一日之雅俯聽愚陋容而納之則困躓之人未必無升進之望也以斯言之信乎遭遇之有時爾夫楚郊之踦履名微而數賤蓋可棄之物也然而昭王還顧而取之者得非以昔與之俱出而不忍以弊故而忘之也今某實蕞陋無取然游太尉之門可謂有年矣太尉果以疇昔之故記其姓名以備役使某誠未敢覬在崔公除吏八百人之中竊將自比楚昭之墜履尚睎收采使預平時一物之數獲在左右不勝懇懇之至冒瀆鈞嚴譴斥惟命與劉原父某白劉君十兄足下曩者竊不自謂得參文翰之游內省寅緣固為厚遇而足下不謂愚陋無議首蒙相示唱和詩一卷并賢弟所著漢官儀一編俾得榮觀時僕竊私歎劉氏有賢明兄弟如此而吾幸辱從游苟不能孜孜磨勵以及百分是亦交游之深恥也他日又蒙出新文一通周還伏讀未盡通曉大率皆明理亂根本之所由辭高而㫖逺深得古文之遺風伸辨一篇終始理道有以知足下之識通古今其言辭之美亦不下司馬子長之敘事設使足下生當其時彼辨說之士豈得馳其詭詐哉先德三銘足見孝子善述人之事垂之不朽在斯文也解木偶語其義切于譏誡昔春秋成而亂臣賊子懼今足下此文苟流行于世則竊位尸祿者得無悚勸乎榖熟橋銘言略而事詳蓋出于符命之體而理或過之逺矣彼司馬相如班固輩紀封禪之事不過藻飾詞采贊揚君美而巳今足下所作皆倣佛誥誓之義而成文上可以形容盛德下可以申勸將來豈徒與馬班爭能哉僕藝能淺薄不足稱道然自得友于足下始知學道之階漸及見足下之文又識為文之大體且世之為文者甚衆率皆好丹非素誇競一時苟求其繇理道者十無一二焉又求其醇而不疵者百無一二焉足下所為之文皆依約六經之㫖而為之辭縱橫虛誕之說無得而入焉故讀之者知聖人之道尊而易行信足下之深於文者也其文前日值他客在坐不得詳覽居無何家公移治省局迫于改館日以忽遽尋又以尊公有荆北之命恐足下趣裝無暇終未得再見前所相示之文今輒欲抄寫一本以為巾笥之祕儻一賜借惠庶孤陋之學有所模範則為幸之甚莫出于是惟足下終始之也又承見索寵行詩雖作之巳久自以學不經師匠不足汙大賢君子之耳目故但欲藏密而巳又竊惟念沐足下奬進之益勤至如古之朋友相成之義則又有大于是者蓋始則以文章論議開導其志意終則以德行道義成就其器業故其所樹立必有可觀焉異日與足下翺翔盛世勉跂聖賢之餘風而不中道畫乃所望於足下者也蘇魏公文集卷六十八
