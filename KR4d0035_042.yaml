body:
  text: 蘇魏公文集卷四十二宋蘇頌撰表謝郊禮加恩臣某言奉大神之祀既協休成均率土之釐普沾慶賜顧備員而無補叨進律以加優雖罄牢辭靡諧誠懇臣某中謝竊以漢室疏封之制非有功而不侯周家大賚之恩惟善人而是富方上主智臨之盛講三年郊見之儀合祀泰壇陟配烈祖萬靈感格四海駿奔湛恩浹洽於邇遐協氣充塞于上下凡在臣工之列咸修職業之常贊彼上儀受兹介福如臣者幸遭時用濫厠宰司初無顯相之勞首被疇咨之渥進加户邑增衍賦租居常畏于滿盈義當知于止足令難反汗莫回誕告之文賞弗值才坐愧食功之誚拜嘉有靦揣已何堪此蓋伏遇皇帝陛下德盛在躬仁漸無外誠著事天之實政先惠下之方禮行于郊周盡百王之能事命降於祖自得萬國之歡心再惟頂踵之微莫報乾坤之造奏甘泉之賦既乏雄辭詠蓼蕭之詩徒涵帝澤誓殫駑蹇上答生成臣無任又臣某言二儀並貺儲厚福以浸黎元百辟在庭對茂恩而先衆輔聽制音之誕告賦食采以增多靡獲固辭終慙虛受臣某中謝伏以郊祀國之大事用逆神釐封戶古之諸侯實崇命數周人以惠術而觀政漢制非功臣而不封治世有賢官儀約古進加寵祿抑有故常雖緣祭澤之所頒固在爵名而尤重伏念臣早蒙聖眷擢預政幾閥閲無可紀之勞股肱有不良之誚會兩宫之講祀舉三嵗之親郊主上躬薦于廟丘萬靈咸秩攸司奔走於官次百職具修顧惟備員初無云補均被等功之賞并加多邑之封薦控囊章固難回于渙汗祇膺綸詔良有積于厚顔此蓋伏遇太皇太后陛下器使羣才天恢全度廣上恩于率土推大賚於庶工近弼四鄰特優隆於禮秩爰田千戶俾增峻于等威居懷尸素之慚重享便蕃之渥德不稱祿有鑿址益髙之虞職掌建邦思徇國忘軀之義不渝晚節仰答鴻私臣無任謝集禧觀使臣某言伏奉制命蒙恩特授臣依前左光祿大夫充觀文殿大學士集禧觀使者罷軟不職致臺議之喧騰溥愛無私冒君恩之過渥弛近司之重責加內殿之榮名方嶽真祠特推置使之命路朝晨謁仍簡造廷之期罷政禮優比年例寡循涯揣分被寵若驚臣某中謝伏念臣曲學鮿生逺塗暮景竊祿久汙于華近議年早合於退藏屢控乞骸之章洊干黈纊之聽伏遇皇帝陛下太皇太后陛下博求耆舊誤逮疏虞省座禁林冠通班于邇綴左綱右揆預大政于中階臣於此時竊懷感遇慕古人之行惟知持正而守文適當今之宜不能開物而成務自為謀拙動與時違果嘖煩言上孤聖眷進而負四海之望其罪寧逃退而兼三綬之榮何名以稱倣徨拜賜愧懼在顔此蓋伏遇皇帝陛下太皇太后陛下旋運化鈞攬收威柄咨輔弼丞疑之任贊樞機帷幄之謀校嵗月之勤則記其功而忘其過納朝夕之誨則捨其短而用其長知臣本誦數之儒不責以經綸之業置臣于侍從之首仍使就間燕之居憫老矜愚恤私從欲恩同造物自生育而至于成才禮越常均既罷免而猶如在事臣雖甚戇粗有所知假名器之益多非軀命之能報今兹去位猶叨職秩之優異日挂車尚有田閭之請懇誠所激夙夕不忘臣無任乞致仕臣某言臣聞馳驅休息蓋壯老之異宜進退存亡實吉凶之所兆而況仕而陳力老而傳家既踰濛汜之年加有清漳之疾尚包羞而苟祿必招損以危軀敢控丹悰洊干淵聽旁皇罔措顛越是虞臣某中謝伏念臣本無過人之才謬緣稽古之力誤知二聖進秩三階苛碎失名致人言之匪厭逡巡去位荷上眷之不移擢置殿塗寵兼真館併優隆於異數罙愧負于素餐方今聖政日新賢才彚進居官任職人皆念夙退之勞責實循名臣獨處燕間之適校其勤怠宜有汰澄顧物理之推遷果天殃之逮及士安之久嬰咳逆軀半不仁貢禹之私願罷歸死無所恨況纍陳於奏牘猶坐玷于榮班寖迫衰遲益難安處伏望皇帝陛下太皇太后陛下閔憐耆耄深察疲羸推覆載之大恩廣生成之至德貸往愆于鈇質不責其終放散迹于丘園使遂其性倘獲退安於衡泌亦將不逺于都畿庶舊疹稍瘳或殘骸未殞與父老共歌於帝力冀樗櫟得盡于天年陪三嵗羔裘之郊非所敢望遇仲秋鳩杖之賜庶或與存冒瀆威顔必期開可臣欲乞守本官致仕臣無任第二表臣某言伏蒙聖慈以臣近上表乞守本官致仕特降詔書不允者犬馬齒耋宜寄迹於丘園雨露恩深重敷言於綸綍顧懇誠之未聽由剖析之靡周罔避瀆煩終期報可臣某中謝伏念臣散才濩落晚節摧頽望實不足以厭羣心謀猷不足以濟逺略在言語侍從之地既無一日之長責輔相經綸之謨固乏萬分之補退居間佚上諉生成祿不值功詎止食浮于人之誚福微勝羽每懷鬼瞰其室之憂爰自纍嵗以來屢貢乞骸之請仰紆異眷敢愛微軀倣徨求去而欲報主知舉措失中而動貽物議寖迫桑榆之景愧參槐棘之班考之禮經謝事之期已過揆之人事求全之念都忘復何面顔苟貪爵位伏望皇帝陛下太皇太后陛下仁推惻隱明察幽微蓋之如天冀俯從于人欲愛之以德使粗保于廉隅亟降俞音俾諧素志軒裳解釋免罹文豹之災藪澤浮沈稍遂淵魚之適倘殘骸之未殞報洪造以寧窮臣無任第三表臣某言伏奉今月日詔書伏蒙聖慈以臣再上表乞致仕所請宜不允者七十餘齡禮典自當于告老尺一中詔訓言未賜于允諧雖淵衷篤念舊之仁而病體益負芒之愧內懷憂迫罔避僣踰再控危悰難逃大譴臣某中謝伏念臣憃冥不競朴直寡儔誤被聖知擢參幾政以瑣才預廟堂之論何取訏謨以腐木厠槐棘之班自招浮議尋罷歸于里第仍留置于真祠役不受功空飽支離之粟人斯失望敢安曠廢之僚常切挂冠猶稽上印伏況器名踰分年病交侵蒲栁望秋奚勝雨露之澤桑榆向晚難延晷刻之期尚願丐于殘骸冀克完于晚節伏望皇帝陛下太皇太后陛下天從人欲海納汙流諒不奪之至誠降曰俞之大命素餐尸祿免貽貢禹之譏居常守終覬遂榮期之樂獲同黎庶歌詠太平臣無任揚州謝上臣某言昨奉敕差知揚州軍州事已于今月日到任禮上訖者奉尺一詔以歸第僅越三時假二千石以治民再膺八命固辭靡獲趣辦遂行黽勉臨州倣徨向闕臣某中謝伏念臣才資不厚遭遇最深仕歷四朝晚登三事荷旒明之委照謂無他腸顧衮職之闕遺曽微小補卒致煩言之嘖未從司敗之誅伏奏引年屢丐上還于榮紱清衷恤老特令置使于真祠徼幸實多靦慚非一豈意衰遲之景尚蒙嶽牧之咨拿舟利涉于安瀾交印遂頒于寬詔祇循寵渥益懼顛隮此蓋伏遇皇帝陛下天德包荒乾綱獨運任人惟舊視逺斯明念犬馬有守禦代勞之勤老猶不棄謂州郡有職間無事之地欲其少休因析左符俾藩要路矧兹陋族本占江干淮海奧區名在九州之列松楸故國地才一水之遙緣近嵗守臣之文有過江上冢之例營私至便責任奚勝平易近民敢豫言于報政中和樂職姑願效于歌詩但虞筋力之疲終覬田閭之請仰酬洪造靡惜餘生臣無任乞致仕臣某言臣聞老無能為難當壯者之食進不知退必有大耋之嗟矧巳迫于衰殘嘗屢陳于悃愊苟貪寵祿實靦面顔臣某中謝伏念臣生稟顓侗仕逢熙洽自一命而至于八牧纍玷官儀歷二府而亞於三階預聞國論年過七十效蔑毫分尚塵禁殿之近班仍藩淮海之要郡賦分至薄自知甚明福輕乎羽而莫勝顛冥且久中結若轖而為病痎頓踰年雖黽勉以從公終隕越而是懼按禮經則久當謝事考職業則固合黜幽曲荷矜全敢圖安佚伏望皇帝陛下隆恩荃宰運化陶鈞照臨如日之升誠明盡物之性念伏櫪之疲馬難戀君軒使垂翅之孤禽遂還林野倘未填于溝壑猶不逺于甸圻導引延年固靡希于漢傅謳歌樂聖終願效于堯民虔俟恩俞冀全晚暮臣欲乞守本官致仕干冒宸扆臣無任第二表臣某言今月日進奏院遞到伏蒙聖慈以臣近上表乞守本官致仕賜臣詔書所請宜不允者老臣以憊而告歸實虞罪戾明詔以恩而不聽載荷曲全恭承訓敕之辭重負曠尸之責敢殫懇至洊瀆旒明臣某中謝伏念臣稟賦甚愚遭逢最舊歷禁塗而殆遍預幾政以無堪早合退藏尚兹塵冒通班祕殿便蕃職秩之榮督府方州叨竊兵民之寄每思病耄有愧長臨福常懼于滿盈心益存於止足簪裳被體氷炭交懷蓋以強仕老傳而有年禮經所戒宦成名立而不去前哲尤譏矧疲瘵之巳侵敢宴安而遑處伏望皇帝陛下甄陶萬化綜核庶工察臣陳力之不能憫臣視息之無幾如天育物全生長收成之仁以齒使人異驅馳休息之惠逮其未殞賜以餘生舊爵崇階固足光榮于世族殘年朽骨庶幾保養于天倪延首中宸佇期可旨欲乞守本官致仕干冒宸嚴臣無任第三表臣某言今月日進奏院遞到伏蒙聖慈以臣近再上表乞守本官致仕賜臣詔書所請宜不允者素髮垂領久汙簪紱之行皂囊奏封屢瀆纊旒之聽俟恩俞而未遂紆寵答以彌優祇誦訓言莫勝負戴俯循危懇敢重敷陳臣某中謝伏念臣天賦朴愚上憐孤直入預幾衡之政出宣屏翰之風淮海一隅巳積曠官之誚嵩轘千里輒辭守鑰之行蓋以任重則必致疾顛年至則自當退處日西方暮好書者猶慮難圖夜行不休居位者所宜知止矧兹瘁質固已自知伏遇皇帝陛下攬邦政之福威核人才之賢否式序羣品不求全能眷惟瑣微嘗更寄委逮兹衰晚尤切始終上印綬于有司倘蒙從欲歸草茅于舊服尚冀全生苟因適于安間遂稍蠲于疾疹所完餘日莫非上恩辭盡情殫心危喻拙欲乞守本官致仕干冒宸扆臣無任辭免西京臣某言今月日進奏院遞到敕牒一道伏蒙聖恩就差臣知河南府兼西京留守司公事者聞命震越進退倣徨伏念臣年齒已侵寵榮踰分汙朝尸祿獲罪固多昨蒙睿慈擢守鄉郡過家上冢私願既從忨嵗視隂餘日無幾近者載露囊奏丐上印章告歸田閭冀全骸骨未奉俞音遽易别都內省荒孱曷勝寄委蓋以衰遲之暮景久塵嚴近之通班坐守淮東安佚之邦猶懼不逮使當西郊走集之會實非所宜伏望皇帝陛下矜臣筋力之疲羸難堪治劇察臣懇誠之迫切姑欲就間乞回天恩下遂物性臣無任祈天俟命激切屏營之至所有差敕臣未敢祇受見送揚州軍資庫權寄納欲乞特降指揮檢會臣前後纍奏陳乞致仕文字早賜施行第二表臣某言今月日泗州差人送到詔書一道伏蒙聖慈以臣近辭免差知河南府恩命并乞致仕所請宜不允者捧對綸函伏深股栗誠有未盡言不避誅伏念臣遭遇聖明􅏡歷中外分毫未報齒髮巳衰假守便藩已踰素望保釐近甸實懼非才向因陳情輒祈退老仰紆詔札曲諭眷懷固合趣拜除書即赴新任緣臣近已三上章奏丐歸田廬未奉俞音方虞重譴豈可尚貪寵祿更領要衝量力校能兩難任責重念臣頻年災禍妻室喪亡敢布腹心上干君父此蓋伏遇皇帝陛下憫憐朽質久汙近班特軫天衷俾還官政庶令晚節逭貪煩戀劇之譏益見清朝貴引年謝事之禮孤誠所迫得請為期臣欲望特降指揮檢會前奏乞守本官致仕早賜施行干冒天威臣無任揚州再任謝上臣某言六月十六日準尚書省劄子以臣近辭免知河南府新命乞守本官致仕奉聖旨依舊知揚州已于當月二十九日交割公事管勾訖者章辭留鑰揆薄祐以難當詔復舊藩戴隆恩而益懼欽承言綍俯集背芒臣某中謝伏念臣向以孱虛誤蒙簡擢年侵力薄方祈田里之歸福過災生遽遘室家之釁憂傷狼狽進退倣徨輒傾迫切之誠仰叩髙明之聽敢圖聖造俯念羈屯特推矜恤之慈俾遂便安之計淮海一都之會再假事權京口數舍之間切鄰鄉社感極而涕洟橫集懼深而氷炭交懷積是兢虞敢遑寧處此蓋伏遇皇帝陛下至仁惻隱大度含洪視民如傷愛人以德一物失所上干天地之陶甄千里雖遙灼見道途之艱苦不遺舊老復使長人但顧疲癃靡勝寄任况印章未解固當盡瘁以首公倘筋力向衰行覬投誠而告老臣無任乞致仕臣某言臣聞蒲栁經秋已有凋零之患禽魚向暮必求棲宿之安物固當然人亦宜爾矧禮年之云至加疲苶之交攻屢上封章丐歸田里愚衷未盡敢殫萬一之辭聖度并包罔避再三之瀆僣言不已典憲寧逃臣某中謝伏念臣才本下中仕踰四紀居官無塵露之益竊祿過釜鍾之優罪積誤朝恩隆補郡留連圭籥歘踰絳老之年衝冒風霜復迫漳濱之卧中乾而加以咳逆跖盩而不良能行出見吏民愧橛株之既朽自憐軀命類藁蒂之甚危每思止足之言深蹈滿盈之戒雖兹勉強益懼顛隮伏遇皇帝陛下達堯四聰明舜庶物念日昃耋嗟之咎推天覆地載之仁顧在衰遲倘諧退老非欲棄人間之事慕赤松之遊止期蔭林樾之庥希鴻烈之訓收骸里閭養疾衡門獲盡數以天年實荷恩於聖造欲望睿慈特賜指揮檢會臣前後奏章許守本官致仕臣無任第二表臣某言今月日進奏院遞到詔書一道伏蒙聖慈以臣近再上表乞守本官致仕所請宜不允者懇誠迫切奏牘頻煩洊紆批鳯之函弗聽解龜之請雖睿恩天覆未忍以老而見疏然衰病日侵自顧不能而宜去仰承敦諭愈重過尤進退靡遑顛隮是懼臣某中謝伏念臣仕踰四紀官歷三司平時無橫草之功晚嵗有負薪之疾髙官厚祿豈疲苶之所勝皓髮蒼顔况精神而已敝臨事每多于廢忘省躬久合于退藏竊自為謀實非過計若猶得及於視息盡志丘墳庶幾稍就于燕間専精醫藥上恃君親之眷復殫螻蟻之情伏望皇帝陛下運化陶鈞生成品物核羣才之能否念舊弼之尩殘曲軫清衷亟頒俞旨或假以上大夫之秩歸息蝸廬俾列于鄉三老之間時親鳩杖倘未填於溝壑罙結戀于軒墀西望馳誠終期得請欲乞守本官致仕干冒宸衷臣無任第三表臣某言今月日都進奏院遞到詔書一道伏蒙聖慈以臣近者再上封章乞守本官致仕所請宜不允者意切言疏未動髙明之聽恩隆禮厚洊頒寵答之書祇誦訓辭俯慙悴質循涯自訟欲默良難臣某中謝伏念臣以儒學承家以文科補吏能事教忠之訓夙稟義方強仕老傳之言粗知名分榮遇既踰于始望暮年猶躐於近班積尸素之愆尤致風淫之疾疹腹心咳欵夙宵幾廢于寢興步履蹣跚朝晝頗難于出入豈止違殆辱之戒抑將蹈滿盈之災爰自纍嵗以來屢有陳情之奏荷上心之矜恤紆中詔以留連姑黽勉以在公實支離之難強是敢再殫懇愊重冒淵聰丐未殞之餘齡復就間之州處伏望皇帝陛下離明燭逺天度包荒特推從欲之私俯降曰俞之旨許還章紱退就衡門倘得遂于全軀尚冀諧于佚老蓄房公之參术稍起尩羸藝陶令之桑麻更思造適骸骨雖投於畎畝夢魂猶戀于軒墀欵至之誠倣徨罔措臣欲乞守本官致仕干冒睿慈臣無任蘇魏公文集卷四十二
