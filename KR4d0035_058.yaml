body:
  text: 蘇魏公文集卷五十八宋蘇頌撰墓志職方郎中辛公墓志銘某之外舅尚書駕部貟外郎辛公以公族子兄弟孝友行義見推鄉論二季不幸早夭三昆仕宦皆為郎官歷典州郡以政事聞公于其次叔也又能力學取科第益為士大夫稱道以為辛氏昆仲可謂能世其家者也初駕部之葬某既銘其墓矣今公喪卜遷有日諸孤復請志因論次以續前刻云公故參知政事追封晉國公仲甫之孫太府少卿分司西京若沖之子諱有終字成之少舉進士試禮部不捷姊夫翰林承旨中山劉公筠留置門下將推任子恩薦之公力辭與其季有章由是人益竒其逺操中山公一代文宗門人賔客皆當時豪俊之士居其間相與講學切劘浸漬遂至于大成以之䇿名則從容如取已物以之從政則寬裕而為吏表信夫資之深而蓄之厚也公以景祐元年擢第補汝州團練推官知潁州沈丘縣事政以平易為尚故民便安之始一年民恐其滿去也于是父老數百輩詣轉運使請留再任會公以父憂去職不報服除再調寧國軍節度掌書記歷事太守二吳公所為不同有如水火諸僚或傳會其意以求合獨公贊佐有體不為前後易守故二公待之如一方是時朝廷督責諸部使者加轉運使以按察之名又增判官以重其任而江東三使者楊紘王鼎王綽也號最辦職文移舉擲無有虛月公被臺委鞫滯訟案積欺一嵗間幾百餘事連逮者甚衆公皆推析枉直或原或坐盡中情法三使者嘉之交薦于朝代還考課改著作佐郎知河南府永寧縣移知益州新都縣縣衢舊無阡陌公為溝遂課民植槐栁雜果于兩旁未幾木隂茂密邑居便之先是晉公以補闕守彭州嘗種栁城中以蔭街衢及去郡人思而愛之號補闕栁新都之民猶知其事謂公有祖門之惠愛焉纍轉祕書丞太常博士通判原州知青州博興縣由尚書貟外郎六遷至職方郎中嘉祐四年知鄂州其年初通茶禁令民户出租錢鄂之邑嵗當七萬三千緡使者纍請得減三萬緡仍自次年始除之公言民病𣙜法之弊復苦橫斂上幸弛而寬之矣然嵗中災歉尤甚望并蠲減以紓編户之艱急詔可之而鄰境得以例蠲者二州𣙜禁既除三司悉收諸路茶本茶租錢嵗計上供公以為本錢出縣官今官不市茶上供故以租錢賦于民若盡輸京師則南方貨幣竭矣有司詳定如公言而漕臺蒙利尤博舊制鄉縣衙前止三等而州郡差使有五等其患常在力役不相當吏得髙下任情公為奏定皆作五等以物産多寡傅差役重輕自是役者稱平諸邑坊場舊有無名酒額及上供綱還摺運載鹽赴本路二者為州人患且久公皆例上其事得請罷之迄今人懷其惠治平二年知渝州州界濵帶㺐夷種人喜乘間內侵捕吏平居未嘗撤警或科民齎糧餽守卒公至則悉召巡檢縣尉還本廨使戎漢不得相擾但逺斥候緝器備嚴訓練而巳㺐人知之終公之政無復犯境者本道上凡最以公治第一明年八月一日以疾終于州寢享年六十八公之先世著籍汾陽自晉公以大臣謝事留京師及薨葬許州之長社而子孫遂占數死者以昭穆從大墓將葬尚書卜祔大墓不吉卜陽翟之三封原吉因定禰塋諸子之先亡也皆以次葬公今又祔之以熙寧元年八月甲子厝事從日月之吉也夫人王氏國子博士羽之女逮事姑章名有禮則繼夫人馬氏太尉忠肅公亮之季女出貴胄配君子睦中外之族無不得其歡心者封永安縣君先公二年卒並合窆本壙子男三人長男晟太廟齋郎次旦次晃皆謹飭幹裕保守門法女嫁太子中舍張復圭司門貟外郎王瑜含山縣令馬玗太廟齋郎張孝敏餘皆早亡初尚書之歸休也公就養左右未嘗逺去晝則視饔膳夜須定寢然後反室篝火親學或達旦不寐如是者幾十年暨尚書亡公與仲氏﨑嶇田圃間力幹窆穸無不如禮者居家事諸兄如父閨門雍雍無間言人以為愛恭之至得于天資非外奬所及也某于姻黨中接公最熟每聽其言論沈密婉約皆有味趣大抵本於人情而歸之恕已所為如其言嗚呼可謂豈弟君子也已銘曰辛公樂易為世良吏不縱不苛歸之中和四邑善治二州長利惠愛人謡風猷世濟廉章薦論課以最聞未膺褒表奄謝休辰神復渝江喪還潁瀆安兹壙途從禰之卜朝散大夫纍贈户部侍郎趙公墓志銘公諱溫瑜字子美御史中丞兼宗正卿贈太師中書令兼尚書令魏文定公諱安仁之長子魏公在真宗世以道德文章以一代名臣歷翰林學士參知政事生七子皆傳其家學兄弟以修謹相尚不肯碌碌為衆人所為故其仕宦多至顯官出使典州皆有能稱當時士大夫之論以其家法如此而公之諸弟則曰所以能保守其祿仕不墜素業實吾兄誨飭使然耳公為人渾厚篤實不喜矯飾以徼名譽平居視之和易若無所不可者及其遇事臨文法則持守堅固人鮮能奪治家嚴而有恩接人恭而盡誠當官勤而愛物蓋有先世之風範焉公景德某年以執政子起家為太常寺奉禮郎嘉祐二年五月以少府監終于家在仕通五十年其間十五遷秩歷京寺監丞國子博士尚書貟外郎中司農光祿少卿最其任以事者由兼宗正主簿出知河南城父蘄水三縣由蘄水升通判石舒二州由舒州升知洋蘄隨解晉五州由晉州以朝選知婺曹濮三州而曹不至官由濮州以疾還京師權判殿中監凡更十四職大抵治簡而嚴不務苛擾以此人信而愛之先時蘄水有疑獄前令久不能決公至一訊而伏吏駭其明而不敢犯其後領州州人猶望風愯戢蘄俗右鬼有病用巫不用醫公為教諸巫使習診病又擇經方揭石于衢肆由是人知用藥稍革舊俗赴梁洋日道歧下聞蜀寇乘飢聚黨揚言將略洋州或謂公曰賊勢方張城中素無備不宜遽前公曰吾既受命為守臣聞難當亟往若遲留觀望豈朝廷所以任使之意耶即日單騎遂行迓者遇于路不知公太守也比至州吏民驚且喜曰新守來寇不足慮也因為之畫方略修禦備軍聲益振賊聞之遁去轉運使建言國初以來關隴之民多徙蜀者嵗久人益衆盡地力不足以給其衣食誠令僑寄之人悉遣還本土則蜀之財力可紓什三四事下諸郡公獨奏曰向時東人所以西徙者蓋因五代之荒擾耳比天下無事則巳習其土俗或長子孫一旦遣之是重困擾非所以固其心也朝廷是之于是洋民德公之深至有畫其像日拜于家者其在解州論安邑兩池利害著為一書目曰解池樞要上之又言官車輦鹽輸數十郡役卒推挽晝夜不得休息疲者既不勝其敝因而竄逃纍五犯則抵死役苦法重犯者相屬幸朝廷矜寬之詔聽其減死論三路民兵有老與病例得以強壯子弟黥面代名是時河東經略使料已代黥者徙𨽻旁州下軍而晉卒當徙者幾千人凶凶不自安公謂之曰邊兵額無髙下廩給均厚何憚而不往若撓帥府令動搖軍旅則有罪矣衆遂帖然就徙本路初更鐵錢法以大錢三當一公以為貨幣驟亡十之七貧者必先受其弊矣因密召諸軍校令軍中有質貸者約三日盡贖歸毋得畜錢于家日滿然後頒行其詔又誘諸豪發宿儲囷窖以平物價艱窘者獲濟矣東陽災歉流民入其境者日不減千計公躬為撫視闢官舍以居之便宜發常平倉并募富人輸粟以助賙給至嵗稔而止所全活者蓋數十萬人于時某從祖節判府君適在幕下預幹其事後屢稱公救恤之術條教最悉他郡莫能及也而轉運使亦言于朝廷賜璽書以褒之觀其治狀則其才資可知矣公平生好讀書至老不倦尤喜星厯五行之學晚悟性命之理浮圖所謂禪宗者頗得歸趣故于榮利泊如也初領東陽頗難于逺行及渡錢塘江乘潮蕩舟中流而歎曰王陽不欲乘險蓋類是矣自爾意彌不釋踰年感風眩後五年至濮上而疾復作既還都纍屬所親為剡奏求納祿章未及上而疾革其亡也朝廷以三品賻布給其家諸弟多在朝衣冠弔者盈門咸曰喪一善人矣享年六十一階朝散大夫勳上柱國開國天水縣子食邑六百户服紫衣金魚始娶焦氏某官某之女未及封而卒再娶李氏某官某之女封隴西郡君後公七年卒生五男九女男皆世其官約之殿中丞順之早夭隆之稷山令君弼以大理評事卒君紀太常寺太祝約之方雅有吏幹稱薦者多名公表率諸弟復得其家法以登朝恩纍贈公為尚書户部侍郎追封焦氏夫人為崇德縣太君李夫人為贊皇郡太君女皆從士人其壻曰祥符尉張遘進士黃孝儀黃必大理評事林鈞絳州判官呂定著作佐郎蘇結蘇州司户沈邁許田尉沈逵華隂主簿王黯而著作君實某之從叔父也公世為河南洛陽人曽祖贈太尉諱處厚祖殿中侍御史贈太師中書令諱孚洎魏公皆葬洛陽公歿之九年議葬卜地得伊闕縣教忠鄉之某原吉于是舉公及李夫人之喪並厝其壙時治平三年正月某日也葬前三月公之亞弟賔客君次其功狀求文於嘗所親厚者銘之余與公相接雖晚而世連姻媾通家有年固巳詳其履歷矣遂銘不讓銘曰盛矣趙宗其源蓋逺數世力儒始晦未顯御史既仕立朝謇謇至于魏公遂大繁衍魏公七子公長而賢表率其倫孝友是先門內雍雍行義不愆施于有政仁聲在焉公治七州皆有能績民詠遺愛朝嘉敏力音猷雖謝風聲未息紀其芬芳刋此幽石潁州萬夀縣令張君墓志銘斯立名挺卿太常博士集賢校理宗古之子尚書工部郎中直集賢院象中之孫父祖繼以文章登儒館顯名于世斯立與其兄都官貟外郎晉卿傳其家學俱用是擢進士第而斯立又用是舉賢良方正復大振名稱于天下既而被召至京師試有日矣一夕無疾而卒于景德之僧舍于是士大夫識與不識皆惜其才而嘆其未得大施于時為可痛也斯立天性敦朴而強敏過人幼自刻厲不喜他習惟讀書著文則不知倦厭甚則至于忘寢食忘寒暑衣敝膚垢而不以為陋心勦形疲而不以為苦其語默舉止動有凖則未嘗妄發蓋得之于中也深故形之于外也裕殆非勉力之可至者人從之遊久而益親與物無競而衆譽自歸少與河東裴煜如晦常山宋敏修中道友善情好莫逆雖出處異勢而趣舍一貫時則講論疑義簡牘切劘往返數四必理盡而後已斯立初舉進士時名聲未有聞也二人者為誦其試篇朝廷間以為自歷場屋未見如此之文也自是當塗稍稍有稱道斯立者斯立以嘉祐四年三月擢第補遂州司理參軍上官薦其才徙潁州萬夀縣令遂舉詔科以治平二年六月三十日卒以熙寧二年十月二十八日葬其葬也妻弱子幼不能舉事惟是轊櫝窀穸之具皆二弟彥卿升卿主之乃克如禮于此可以見其友愛之義素著也張氏先世本澶淵人東上閣門使昭允軍器庫副使昭易兄弟並事太宗皇帝于晉邸尤見親用即位踰年而擢為內使不幸俱早世軍器家留京師遂葬開封其後二集賢君皆祔之凡三世矣而閣門之子孫别葬揚州斯立卒之明年都官洎季弟稚卿及母夫人錢氏相繼殂喪卜葬開封不吉卜改遷其先府君并葬揚州吉于是彥卿同日舉五櫬浮汴淮而南下定窆江都縣之某里府君夫人合祔餘皆昭穆相從所謂以禮葬者也斯立文章雅麗閎贍規橅出于栁栁州劉賔客杜紫微楊文公宋宣獻使之一用于朝廷評者必曰典册之文也論議該洽純正似賈太傅董膠西陸宣公使之册于天子之前主司必曰王佐之才也嗟乎年止于四十二而官不過百里宰卒不得如其志此所謂命也夫始娶朝氏又娶蘇氏蘇氏豫長妹也二男子長曰康直用其舅端明殿學士錢公奏補為郊社齋郎幼曰康叔斯立所著文章遺藁詩賦箋奏議論策頌凡數千篇皆其手札細書未有倫次如晦常欲取而敘之為集未就而如晦又卒異日二子當有能述厥考之美而成先友之志者則其傳也益逺矣銘曰斯立之文淵源典墳辨言析理祖義基仁斯立之行規矩顔孟樂善忘貧安躬俟命資適逢辰道思致君大對有日半途遘屯愴彼明時喪兹國器誄行旌賢琢銘泉隧儀鸞使銀青光祿大夫任君墓志銘任姓出帝者後傳始為黃帝二十五子以德為姓者十四人任其一也由漢以來其别為七皆廣阿侯敖之裔也而安樂之望為盛至我朝仕而顯者蓋三家一在濟隂一在洛陽一在汶陽而濟隂之族又其盛曰禮部尚書康懿諱中正以樞密副使參知政事事真宗仁宗曰太子少師致仕英國安惠公諱中師復以樞密副使事仁宗兄弟先後登二府為時偉人故其子孫承家皆襲榮路儀鸞君即安惠公之嗣子也諱拱之字公肅生五嵗用康懿公任子為右侍禁纍轉內殿承制以安惠公引年洎遺奏連改供備庫西京左藏庫二副使四遷至儀鸞使知欣州治平元年四月甲子以疾終于州寢享年四十七君為人倜儻有志介而性特孝謹自以寡兄弟由少及長奉養親側未嘗逺去其從宦不擇間劇必以便庭闈為請安惠公之還政歸南曹也丐君本州兵馬都監及公薨內使例遭喪滿百日墨縗起就舊職君以為獨任先人後事不可捨帷堂而從組綬堅求終三年制惟是衰麻窀穸之事無不以時者當時士大夫稱其知禮外除管勾御輦院用京畿提點薦為雍丘縣都監未幾擢提點京東路刑獄公事移荆湖北路滿秩知全州所蒞以善治聞歸朝嘗被詔引伴西夏朝正旦使人君姿狀偉特進止􅈺雅尤為戎人憚伏其土毛之摯比舊特豐厚君視其不循式者皆却之人或謂之曰此常例不足拒也君曰吾聞之先人仕宦俸賜外所得無名皆不可受平居時交親相遺尚懼有涉嫌者况敢貪異國之賂以敗家檢乎後又持仁宗遺詔賜諒祚至其界牛心亭候人具食欲坐君東向君曰天子之使適下國自有常禮豈容輒有更變耶卒據主榻戎人不能奪及行諒祚遣其迓使持馬駝為禮又益以金帶繒帛之品且曰曩時使人至闕常賚之外有酒果燈籠之賜今國主尊王人故好幣加等所以將勤至之誠幸毋辭也君曰朝廷賜豫非藩國可以為比卒取馬駝而去使歸深被嘉奬遂拜欣州兼兵馬鈐轄治尚寬簡軍政不肅而其邊民戴其德惠監司亦屢薦其能今參知政事趙公吳公翰林錢呂諸公皆相引重期以逺跖而命不副時暗忽摧謝此知識者所以嘆惋而重惜也君三娶皆甲族令人曰太原王氏故相沂公之姪女曰福昌縣君李氏尚書右丞昭述之女並先亡曰文安縣君王氏六宅使合州刺史淵之女四男曰大理寺丞元卿曰大理評事元偓曰太廟齋郎某曰某官某二女長適大理評事梁彥深次幼未有行君好學通書史善筆札嘗采前世忠臣孝女事之尤著者書于屏障以為家戒故諸子輩承事惟謹語家法者多之君常言吾世為儒者獨從武辨懼黍先代方將請于朝丐換閨臺散秩而志尚未果及屬纊之日命僚掾草遺奏敘其意求一子為文資朝廷從之諸孤自定襄行哭護君之柩還曹南十四年某月某甲子窆于某鄉某原從先塋之側邀文于豫以志其墓石豫惟慶厯初先君嘗副安惠公使北都方是時朝廷推恩使者子豫得與君同制被命後豫使府畿元卿適官屬邑每見其幹裕敏恪竊私謂其家法如此此不可無述也銘曰惟任遐胄曹今為右康懿登樞英公拜後位以望隆慶由德茂子孫其承不墜厥構有美儀鸞繼仕朝端孝不遺親勤無廢官案刑典郡克濟以寬迓虜使戎不憚其難朝有知己薦之器使胡年不贏俾志斯墜彼銘者旌來朔之裔反宅故丘有子之似朝奉郎太常博士張君墓志銘毗陵張君諱奕字源明以慶厯六年舉進士擢乙科解褐試祕書省校書郎連調太平台州軍事二推官權洪州觀察推官用薦者章引對于延和殿改著作佐郎又用三司使蔡公奏為三部推勘公事今天子即位推恩遷祕書丞考課進太常博士以治平三年五月某日卒于京師之僦舍其孤中行請舟載喪南歸即用某年某月某日甲子葬于無錫縣某鄉某原從大墓也張氏世居無錫以善治生産名鄉里至君而超然自喜從諸生遊學經史為詞章以取科第固巳為士友所竒矣及其從宦專力塵事課簿書持文法所居以善稱兹又人之難能者台州大水壞城郭居民奔避無地君與同僚日夜走塗潦間為鄉導使人去卑就燥又躬督役事雖極疲頓亦不少憩而堤防遂完城中脫墊溺之患者君之力居多洪之屬邑有盜縱火焚人廬舍者亡三年矣一旦獲賊即訊款服問其火具曰始以瓦盎藏火至其家又以彗竹然而焚之問二物之所存則曰瘞于某所驗之信然既具獄君獨疑有寃因謂獄吏曰盜亡三年而所瘞之盎竹視之猶新此殆非實耳于是吏再窮治之果得枉狀而免之三司獄號最繁者日以數百萃庭下其間繫財賂之出入枝連蔓引枉直不可遽辨君皆推窮本原審核情偽事小戾則白所部辨析反覆或纍日不已上官始偕謂君滯懦不任事既而察其情至而從其初議非夫純明于中而不撓于外者詎能持守如是耶君居鄉里事繼母以孝謹聞友于兄弟門內雍睦人稱其家檢性尤樂善見人有所長必推挹嘉嘆謂巳不若家之小史張某者奉事謹畏君謂為可教因勉以學晝則親授經義暮則使為文詞如是久之卒至于成就而遣去後十年亦登進士第今為金壇主簿君雖出富室而從宦于外惟倚祿為養有不足未嘗取于家故病且死其醫藥棺具猶有不備者由是士大夫多嘆其廉且介也始君之先世未有仕進者逮君登朝緣郊祀恩追贈其父諱瑩為大理評事追封其母陳氏為仙遊縣太君其繼母湯氏為夀安縣太君其配朱氏為仁和縣君庇其族人追胥力役之事者不一夫人能自奮力學其效乃如此誠足以勸鄉閭為善者也君二子長即中行亦知向學次曰梁卿後君十五日而夭三女一適邑人陳充一適進士李毅一幼在家君之葬也同年生嚴叔堪論次其履歷與行能邀銘于豫豫官計省接君彌年每相過從語公家外時論理道聽其言亹亹有緒未嘗及名利觀其所守誠宜書之于是作銘以刻其墓石云猗張君行懿醇出民廬仕朝倫守道固服職勤從知已幹劇繁治衆獄無寃人志方展命已淪喪南歸壙江濆刋厥美載斯文屯田郎中知博州梁君墓志銘熙寧四年正月某日甲子故丞相贈司空兼侍中梁公葬于鄆州平隂縣某鄉之某原以其第三子新博陵守尚書屯田郎中亞之君祔于某方之某穴前此君之仲兄發之以狀屬豫曰大事有日矣先君之墓翰林承旨王公為之銘矣吾弟屬遊有舊不朽之圖敢以為諉豫惟早嵗與君同僚南都相好甚款嘗謂君文雅修潔資適逢世使之得位見于事業當有大過人者不幸早逝遂湮鬱弗著此僚友之所共嘆惋也然則紀述之義所以發沉晦而章懿實其得無辭乎君諱彥回亞之其字也機性夙就讀書學文勤刻不廢早夜及其發也沛然不可禦類非積力可致者昆弟皆少年得官京司而志尚益逺期于自奮慶厯五年秋舉進士同時預薦者三人而君復在魁選明年春遂與發之同年中第始君之大父翰林公洎世父史館公䇿進士于太宗真宗之朝俱為天下第一丞相又擢第于仁宗世卒以大用至君昆弟聮踵取世科名聲暴揚天下于時論士大夫世俗之美而文譽之顯者以梁氏為盛焉君既仕宦又以吏能稱平生歷官者九階領事任者六政而所蒞必有聲稱人皆謂之才有餘而志未充也初以將作主簿知京兆府萬年縣未行從丞相管勾秦鳯經略使機宜文字次以大理評事應故龍圖閣學士孫公祖德亳州南京兩府辟命簽書判官公事次以殿中丞通判瀛州次以太常博士從河北轉運使薦舉通判雄州又用𣙜場嵗課盈羡特遷屯田貟外郎次以都官知懷州英宗皇帝纂極推恩改職方遂正郎列權判本曹出知博州未赴治以治平三年五月九日卒于京師城西之私第享年四十一君為治尚寬簡而傅之以文法事至乃應不肯預為條教以此雖處叢劇亦無苛滯故所至吏謹于法而民安其守監司交章稱薦以為可大任雄州舊苦公厨之弊嵗時使客旁午而飲食之饋靡有虛日常擇牙校之厚資者主之雖殫家力不足以支浮冗君至則為之鐫治宿蠧易軍校代主者委積有素出納有定侵牟吏無所用事其間前弊遂革又言于朝廷應邊郡有若此類請一切更之北道于今稱便嘉祐末大賚天下三司調紬絹河北諸郡一用省估市易緡錢以給諸軍省估既髙不能即售往往配抑編户逺近苦之君遽上其事以謂新天子即位海宇咸蒙利澤豈根本之地而先有勞擾幸明詔許平其直使民易以轉移其後得依所在實價蠲減者自懷始也開封府劾雍丘縣劫盜四人獄具移糾察君被臺檄審問閲視案牘疑辭有傅致未盡實狀留之纍日摘其罅漏以示吏及就訊果二人嘗自言當案問末減法府未即斷會有曲赦四人者皆貸殊死繄君參審詳慎之致也在獄令為雪活二人而君終不自言或問所以答曰初非不欲言念一言之蒙賞甚輕而有司坐深故之罰重矣夫以重罰易輕賞豈我所為哉人以長者許之君喜為文詞長于諷寓然不尚華藻取意暢而已嘗獻祫享太廟治平初郊二賦並蒙優詔奬答儒者榮之河朔連嵗有大水地震之異君推本六沴以為咎在隂教失序力役勞人讒夫未去正人未用官司縱弛法令苟簡因條為六事上之又奏丹扆十針其言主于規切見之者謂君端方亮直有爭臣風采使之立于朝廷之上必將推已道以及物不然出竒納忠自下劘上二者必有遇焉惜乎遘時方亨齎志而歿古人以道之不行為有命者豈是類也耶君娶滎陽宋氏故司農少卿孝孫之女吏部尚書白之曽孫封仁和縣君生二男子曰子諒子雅皆為太常太祝六女子長適光祿寺丞呂延問次適太廟齋郎王凝四尚幼君孝友願恪加之以兢畏不怠故能逺于悔尤始卒無玷亦其家範如此子孫承教皆端飭自持可以保其世祿矣初君之守懷也丞相方鎮河橋封壤相距才百里而近父子惠愛被于河濵歌詠之聲相聞道路語仕宦者以為美談云銘曰亞之嶷嶷載世襲美翰林之孫丞相之子躬服名教心潛墳史發藻休辰差肩多士初佐藩僚事立名昭纍勞積課陟明在朝進登郎列出典州條忠言疏抗善政民謡時亨運短道未大顯後有達者宜章厥善塋在髙原銘在幽泉聲光不泯世世其傳蘇魏公文集卷五十八
