body:
  text: 蘇魏公文集巻三十二宋蘇頌撰外制右諫議大夫知制誥宋敏求依所乞落知制誥守本官差遣如故勅夫代言詞禁抗論諫垣皆侍從之榮塗本才髦之迭處苟堅辭職之請靡勞遞直之勤特徇雅懷俾原近秩以爾具官某學窮墳索世掌絲綸三朝擅文史之華兩掖著猷為之美朝廷命令乆預于演裁臺閣規橅兼推于練達忽告眊昏之苦願還翰墨之司再控封章備形懇至姑就七臣之列仍專衆職之臨噫去劇即閒既從于爾欲待賢優禮當體于予衷勉思埤政之謨式副疇咨之渥可權三司户部判官尚書司勲員外郎李立之可主客郎中勅具官某今之由尚書郎為三司佐属其選重矣非有積累之資明著之效則豈稱其官使哉以爾清白承家㢘方為吏名登華省治有顯聞曩丞水官能勤于障導移職計部善析于貨財課在有司法當遷秩擢正客曹之列仍㕘户版之員膺兹茂恩益念成效可左騏驥使劉斌可皇城使勅具官某諸司置使秩有等差而皇城為東班之首非夫歴仕綿乆材用章著安能陟級而致榮階以爾沈敏之資幹力之效擢于勇爵寘在朝聮累嵗有勞中樞校課當叙遷于官列俾陞冠于使華祇膺優異之恩益念始終之節可皇姪左千牛衛將軍令諼可右監門衛大將軍勅羣臣考陟之法近則四嵗逺或六年輒遷一官是謂大比至于宗室則以十嵗為定盖超歴階序不與外庭比故不得不積其嵗月而養成其才質也以爾具官某承襲慶美本乎天源生知孝恭長受寵禄能循保氏之教不忘為善之樂今宗正言爾服官滿嵗由環衛而陞大將可謂峻遷矣敬以命爾抑用前詔爾其夙夜匪懈内奉朝請外遵家政則可以逺于悔尤而守其禄位也可尚書祠部員外郎充秘閣校理鄭雍可度支員外郎勅具官某秘書圖籍之府非博學洽聞之才未嘗預校文之列郎官清要之司非通明敏識之士未嘗在承務之員二者兼榮斯謂優異以爾詞科甲選治状最稱擢寘書林荐游華省有司上累年之課官閥稔聞南宫叙左曹之聮支度尤貴用増爾秩俾酬厥勤更思善職之謀以副類能之舉可鄉貢進士葉祖洽可大理評事簽書奉國軍節度判官㕔公事勅某朕遵累聖之成謨復三年之選士俯臨便坐親策諸生爰擢敏才寘之上第以爾士鄉特起貢部陞名方領矩步以來庭大對危言而應問嘉乃博通之習用推優異之恩棘寺評刑超登于仕籍海藩佐幕往涖于政經無忘學古之規式副優儒之舉可太常博士充秘閣校理安燾可祠部員外郎勅具官某夫校文天禄方登博雅之才承務南宫是為清要之選爰疇善職叙進榮班以爾典學清修决科髙妙試之藩府則外臺稱從事之賢擢于奉常則有司言禮官之最因第勞于嵗課宜陞宷于冰㕔益思講繹之勤用副咨詢之舉可駕部員外郎田瑋等改官勅某國朝之制自諸司四品暨尚書郎卿寺丞属皆委之審官考核其賢否雖羣萃而序遷士常患其雜遝然勞陞而過黜時亦以為遴選與其進者厥惟艱哉惟爾之材能強辨有司銓叙之盖已乆矣姑用四載之最稍擢二官之榮勉収後勤副我明陟可都官員外郎新差權發遣江南西路提㸃諸州軍刑獄公事張頡可職方員外郎餘如故勅某朕閱朝士之籍擇其有聞于時者試之以煩劇之務内則臺省之僚列外則憲漕之事權績用既彰褒擢何吝以爾文雅沉厚士林所稱幹辦精明吏課連最方且委以一道案讞之重而又及乎四載計比之期宜増秩于清郎示甄勞于乆次若其奉使之稱職治獄之平反則早有顯庸豈限常格爾其勉懋副我疇咨可屯田郎中蘇泳等改官勅具官某尚書諸郎其品第五惟古號為清要在今得以叙遷稽其職儀是謂通顯以爾吏資官閥計比惟優朝著省闈踐歴滋乆擢進烏星之位漸陞鸞黨之階往其欽承無怠官守可都官郎中王力可職方郎中勅某夫承務南宫出使近服皆朝廷之優選而仕進之榮途属奏嵗勞用推恩陟以爾士科擢秀郎省馳聲試以治煩載嘉政事之敏委之督漕益懋將輸之程姑循校課之常稍進掌圖之秩宜収後最以副甄揚可比部員外郎刁綬俞士龍可並駕部員外郎勅具官某尚書郎官皆有副貳視其曹務之閒劇以為爵馭之等差限年而遷盖有恩格以爾能勤職業休有幹稱履歴周行綿更嵗次姑由吏課之最叙進省闈之聮往承渥恩益勵素守可都官員外郎充廣陵郡王申王院教授郭源中可職方員外郎餘如故勅具官某南宫為郎其選尤美有司校課限年乃遷自非積閥之優靡預類能之擢以爾清門襲美仕歴朝閨近著荐才職居宗邸頗聞善誨之益且懋宿官之勞宜即省闈進榮班等祇欽甄序之渥無怠講論之功可虞部員外郎程莊可比部員外郎勅某尚書員外郎自唐以來號為清要今雖不涖省事顧其榮秩不减平時考課而遷是曰優命以爾吏資之敏乆試外官嵗月之勞荐登最格矧已更于華著宜叙進于通班祇膺加等之恩益念匪躬之節可大理評事章望之可光禄寺丞致仕勅具官某通古今之學擅體要之文命屈當年仕沈下列志不攖于簪組心自適于江湖恩命屢頒輒遜辭于榮進懇誠再露祈退就于燕休守臣為言髙風可尚優進膳丞之秩俾從鄉閈之居祇欽寵章益保冲粹可前守惠州歸善縣主簿充國子監直講盧侗可衛尉寺丞勅具官某爾以經藝名家禮闈奏技勾稽南服外臺稱其亷平講訓上庠諸生服其行誼姑用年勤之乆叙陞卿属之華尚倚師儒使留黌序其益思于循誘兾有助於化成祇欽寵章克終譽問可試秘書省校書郎和州防禦推官充國子監直講崔公度可試大理評事充彰徳軍節度推官勅具官某博學多文見推士論韜光藴行自樂丘園向從特起之求且預上庠之召属辭親養靡應命書逮喪紀之既終閱荐章之交至惟其才諝宜有甄褒俾從事於方州竚觀能于幕畫勉思致用副我擢賢可大理寺丞文大同可右賛善大夫勅某今夫仕者既通籍于朝閨東宫與上臺班品雖異而推選之遴遷次實均以爾席慶髙門𨽻官卿寺分釐外局休有能聲比最攸司甫應恩格擢聮宫賛之秩漸階省闥之榮益懋來勤佇収逺績可右賛善大夫朱温其可殿中丞勅具官某天下之獄覆于刑曹設官置參其責均重閱兹校課之美宜有旌能之恩以爾仕以經明進聮朝定再膺詳讞之荐屢告平反之言姑用吏勞擢登盾省宜益思於明愼佇顯副于甄揚可奏舉人試大理評事前權信州軍事推官吕昌夀等改官勅某今之銓選之法至為詳密以嵗課校其勞勤以荐章視其操守二者備矣然後叙遷美秩榮資由此階漸惟爾閥閱咸應於兹俾陟京臺之聮益圖吏治之效可皇姪前金紫光禄大夫右監門率府率士臬可舊官服闋勅執親之喪鉅創何已順禮之變再期則除粤予近宗動禀成訓属居廬之終制當引籍以承恩以爾具官某茂公族之華陟朝閨之序衰麻去位既畢于哀情簪紱還臺宜陞于顯列復踐儲坊之秩入榮拱著之趨勉荷徽章罙勤素守可皇后生日奏親堂叔國子博士向綽可檢校工部尚書充内園使勅具官某内朝諸司並置使領參擇才武入備禁扃由文吏而對遷非親勲而莫允矧中宫之尊黨援誕日之慶條式推渙恩抑有舊比以爾綽席公卿之餘緒仕閨著之通班夙富吏資善守門法屢試治煩之務見推幹裕之能陞諸使聮示以優寵非特私于近戚盖亦用乎美才勉勤功名乃副甄擢可内園使知欽州石鑑可南作坊使令再任六宅使知邕州陶弼可左騏驥使令再任勅嶠南諸州搤于夷境者邕為㑹府而欽當要衝帥守之臣其選差重以爾具官陶弼握武縁之節馭邉有方以爾具官石鑑析羅山之符撫俗尤善而皆文敏自喜才資並優眷彼吏民方安于政迹表其治行咸進於使聮且重留于舊邦俾克終于美課宜究綏懷之畧用光奨擢之恩毋憚逺勤遂棄前績可六宅副使張恩可内藏庫副使勅具官某内司列使之榮並置副介増秩叙遷之法咸有差等爰擇武材庸備官制以爾策名勇爵服采禁廷頗彰幹職之勤且懋歴年之最宜疇美課躐進榮資往欽甄異之恩益盡忠勞之報可文思副使劉昌孫可左驍衛将軍致仕勅具官某夫仕或為禄貴夫逮親此士大夫之所美也爾居武弁能蹈斯言以偏堂之耄年祈謝事而就養是可嘉尚所宜顯褒擢于環衛之班俾從家居之佚遂爾素志嘉兹寵榮可内殿承制樊徳成可左屯衛将軍致仕勅具官某傳曰陳力就列不能者止此為臣之大方也爾早仕武階緜更外使自陳力疾之苦難效當官之勞願去班聮良嘉止足寵以環宫之衛俾安里閈之居祇服恩榮遂諧頥適可殿中省尚藥奉御直翰林醫官院張士禹可殿中省尚藥奉御充翰林醫官副使勅具官某周官醫師掌醫之政令以事制禄十全為上視功進等厥惟舊哉以爾執技精通居官勤恪擢在尚方之直榮參内著之朝属我諸姑近嬰綿痼言爾診調之效願酬處劑之良陞諸使聮用奨能事宜悉心于逺術思報效于殊恩可内殿崇班趙永圖可舊官服闋勅具官某爾列職禁庭蚤擅恪勤之裕服喪堊室已終縞􅎭之期宜移素冠起還舊著内朝之籍班等惟優勉遵移孝之方無怠首公之志可奏舉人前大名府留守推官試大理評事謝宗孟等改著作佐郎大理寺丞勅具官某等秘書大理之屬官前世為文章法律之選今銓筦之士考課來上視其資歴得以叙遷爾等咸以為吏之勞從外臺之荐俾之佐著作丞卿寺所以廣擢材之路也膺兹並命各念首公可奏舉人前京兆府乾祐縣令趙仝等改著作勅具官某麟臺著作古稱文雅之選天官考課今為進擢之階以爾詞學决科㢘勤在事校其年最甫應陟書俾遷京省之聮用奨吏能之美丕欽恩典益厲操修可奏舉人試秘書省校書郎前守宣州司理㕘軍王醇可著作佐郎勅具官某有唐吏部以四才三實選㧞賢能今之銓衡略用此制而又峻以考格責之荐章一不應條未嘗進擢惟爾之器質才諝有司校之詳矣㢘明勤辦外臺稱之備矣引對便坐審察其才陞列秘省之聮將觀幹劇之用益懋乃事副兹寵惠可奏舉人前鳯州梁泉縣令張延年等改官勅具官某中銓考課之法以才實為差外臺荐籍之章以幹亷為重進人之路辨等尤難以爾夙富吏資乆仕州縣校其年最應乃陟書叙遷卿属之華以顯宿官之效服我休寵無忘後勤可試秘書省校書郎守河南府法曹㕘軍充魯王宫小學教授王祁可大理寺丞勅具官某朕惟宗室子孫之衆欲其通知于道藝故擇儒雅之士為之講導以輔成其性質爾以經行修明來預兹選服職累嵗其勤至矣擢陞卿寺之属仍寘宫官之員茂對殊私益思惠訓可奏舉人前彬州髙亭縣令邢構等改官勅某今夫天下郡縣之廣吏員之衆非責之荐者則才勞之士何由而自達耶以爾早從銓集外有吏能善状可稱交章狎至宜甄乆職之效擢列上臺之官祇服恩榮罙勤治績可前定州觀察推官常宗仁可衛尉寺丞勅某朕念夫銓選之士叙進惟艱親程其能務収厥善雖有細故而不棄遺爾歴任有年書考十五外官稱荐其勞可嘉特示甄陞寘之京寺膺兹優異之典無懈終始之勤可秘書省校書郎守唐州泌陽縣令朱紘可大理寺丞餘如故勅某夫農田者生民之本也川澤者農田之資也而當官之人常患不能為之勸導使民棄本而趨末者衆矣爾居邑令能志于兹修復故渠為利旁境計臣言状請酬以官因擢九卿之丞俾仍百里之宰往膺明命善撫吾民益懋前勞乃稱甄寵可蕃落軍都指揮使馬忠等換内殿承制勅某以拳勇聞于邉疆以勤良備于軍校為種首之所嚮嘉技撃之尤精帥路為言便庭親試載閲武才之敏擢躋殿著之華閨籍聮榮恩章不次當益圖于忠藎在勉懋於勲庸可西頭供奉官梁籛可右清道率府副率致仕勅某七十致仕士之常也爾年未至而願歸休嘉其退尚之誠宜有褒遷之渥儲坊散秩俾遂家居祇服恩章往安閭里可右侍禁于用和可左清道率府副率致仕勅某早以吏勤擢陞班列逮兹齒耄願謝官聮良嘉知止之心俾遂歸休之佚儲坊美秩里閈安居往祇服于明恩足為榮于晩節可右侍禁郭懷慶可右清道率府副率致仕勅具官某七十致仕禮經之常也爾不待年至以疾自言閔筋力之既衰豈簪裳之可強陞以東儲之秩俾為居里之榮祇服恩私足慰遲暮可左僕射兼門下侍郎平章事曽公亮奏醫人謝維可試國子四門助教不理選限勅某爾傳習上池之技善識五藥之宜嘉勤事于相門尚未霑于仕版奏章來暨恩典有常往膺一命之榮罙盡十全之效可楚國大長公主遇南郊奏駙馬都尉李瑋祖宅門客廣文館進士許㮣可試將作監主簿不理選限勅具官某蚤𨽻上庠荐游主第屬邑司之有請爰郊慶之推恩言爾多文且祈筮仕俾膺試秩之命用酬肄業之勤祇服寵私勿忘修飭可太子少師致仕趙槩奏醫人張琬可試國子四門助教不理選限勅某習岐黄之論游卿輔之門術業甚精診治多應特徇舊臣之請用推試秩之恩祇服殊私益勤所學可光禄卿潘軫遺表男緩可試秘書郎勅某九卿之子例以試秩起家属乃父之云亡抗遺章而來上閔其陳力之乆宜有䘏後之恩擢爾仕塗俾延世禄當益思于負荷且無忝于榮名可兵部員外郎充寳文閣待制知相州傅卞遺表男囘次男同並守將作監主簿令持服勅某近著之臣忽傷于徂謝恤終之典宜異于常規属覽遺章祈爾世禄命擢陞于京寺俾不墜于家聲祇服優恩勉思負荷可追官勒停人鄭叔熊可試國子四門助教不理選限勅某早用近臣之荐擢聮試秩之榮坐法奪官援恩自理嘉素專于術學俾牽叙于上庠祇率恩章益思修省可太常少卿致仕謝檢孫延年可試監主簿勅某近制尚書外郎謝事得官一子以榮其歸所以褒士大夫進退之美也維乃祖父仕列亞卿解紱引年祈恩裕嗣假爾一命慰其晩年往膺試秩之榮益念克家之訓可守濮州文學尹處晦可曹州文學勅某頃列仕階尋貽吏議廢官滋乆援霈自陳矧巳寘于散曹宜稍遷于近郡益思循省以荷甄収可翰林醫學守應州金城縣主簿温果母梁氏可特封長夀縣太君勅具官某母某氏爾子以方技名家禁庭待詔喜有逮親之禄願移遷秩之恩眷乃髙年遂其私欲特䟽榮于湯邑俾増耀于鄉閭膺兹寵光足勸孝養可都水監飰料後行蒲士隆可孟州司馬勅具官某給事上臺歴年滋乆苦于羸薾願遂休閒易以州佐之聮俾從家居之佚被兹榮命足慰歸塗可故知溪洞新逺州軍州事田忠利長男洪祐可依前知溪洞新逺州軍州事勅某世居邉徼夙効忠勤属乃父之云亡當襲官而繼美爰推恩渥俾守封疆其善撫于裔夷思克承于門緒欽膺明命益盡丹誠可溪洞髙州四甲巡檢田洪祐弟洪保承兄官勅某乃父早著忠勞奄兹淪謝爾之伯氏已襲故封遞遷厥官俾慰遐裔爾其善承世美思撫邉民無忘循警之勤乃稱恩榮之美可麟州兀羅族子弟屈徳可銀酒監武充本族副都軍主勅某代居邉陲號有才勇承父兄之餘緒為種族之推先命傳襲于世資俾統綏于壮籍通階試秩式示朝章膺兹渙恩無怠乃事可蘇魏公文集巻三十二
