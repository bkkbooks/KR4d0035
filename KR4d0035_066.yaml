body:
  text: 蘇魏公文集卷六十六宋蘇頌撰序華戎魯衛信録總序元豐四年八月奉詔編類北界國信文字臣竊伏惟念國家奄宅四海方制萬區九夷百蠻罔不率俾蠢兹獯獫早已面內章聖皇帝因其喪師請和許通信好嵗時問遺寖以訓講陛下欽若成憲羇縻要荒乃命儒臣討論故事將欲垂于方册副在有司其所以慮逺防微紆意及此者皆以偃兵息民故也顧臣愚陋不足以奉承明詔黽勉期月初見綱領詮次類例皆稟聖謨前詔斷自通好以來以迄于今將明作書之由故以敘事冠於篇首厥初講和始于繼忠書奏與國乞盟之請賜以俞旨由是行成故次之以書詔既許其通好乃有載書以著信故次之以誓書昔之和戎則有金絮綵繒之賂我朝嵗致銀絹以資其費故次之以嵗幣恩意既通又有好貨以將之故次之以國信信好不可單往必有言詞以文之故次之以國書異國之情非行人莫達故次之以奉使奉使之别則有接送館伴所經城邑郵亭次舍山川有險易道途有回逺若非形于繢事則方向莫得而辨也故作驛程地圖前後遣使名氏非一職秩不同南北羣臣交相禮接年月次序散而不齊既為信書不可無紀故作名銜年表夫如是而使事盡矣通好肇於北人我從而聽之凡問遺之事皆列北使北信北書于前朝廷所遣乃報禮也故載之于後所以著其所從來也凡使者之至在道則有郵館宣勞之儀入朝則有見辭宴賜之式禮意疏數並有節文故次之以儀式又次之以賜豫彼待王人亦有常矩無敢違越故以持禮過界及北界分物係于後使者宜通賓主之歡而贄見之禮不可闕也故次之以交馳問勞往返詔宣書劄體範存焉故次之以詔録又次之以書儀信幣則有齎操之勤導從則有輿隸之衆霑賚所及無不均遍故次之以例物使者至都上恩顧恤靡所不至或貿易貨財或須索供饋或丐求珍異許豫多矣故次之以市易而供須求丐附焉南北將命往還約束細大之務動循前比故次之以條例凡此皆常使也誕辰嵗節致禮而已至若事干大體則有專使導之故次之以泛使疆場之虞帥守當任其責則接境司州得以公牒往復故次之以文移事非司州所能豫奪至待命官及疆吏對議者代州移徙巡鋪界壕是也故次之以河東地界疆界既辨則邊圉不可不謹故次之以邊防其别則有州郡壁壘之繕完寨鋪塘濼之限斷載於輿地所以示守備之嚴也凡為此書本於通好遼人則彼之種族自出不可不知遼本契丹也故次之以契丹世系遼與中國言語不通飲食不同逐草隨畜射獵為生難以禮義治也朝廷所以能固結而柔服之蓋知其愛好之實也故次之以國俗耶律氏僣擬中華有年數矣爵號官稱往往竊名故次之以官屬而宗戚俸祿三者相須並見於後邊塞之俗恃險與馬由古然矣故次之以關口道路又次之以蕃軍馬遼之為國幅􅊷不過三千餘里而並建都府兼置州縣軺車所過宜詳其處故次之以州縣彼荒裔也并有奚渤故土外接大荒之境其可見者宜兼著之所以示天聲之逮逺也故終于蕃界雜録而經制方略論議奏疏附焉臣竊觀前世制禦外侮之道載籍所記不過厚利和親以約結之用武克伐以驅除之或卑辭遜禮以誘其衷或入朝質子以制其命漢唐之事若可信也然約結一解則陵暴隨之彼豈不得其術耶蓋恃一時之安而不圖經久之利故也淵謀碩畫何代無之至於我朝乃得上䇿年歷七紀而保塞無患嵗來信幣而致禮益恭行旅交通邊城晏閉黎民土著至老死而不知兵革自書契以來戢兵保定未有如今日之全勝者也聖上方恢天下之度以威懷逺人猶慮有司慢令取侮遂案圖籍揭為令典使之循守無得而踰後雖有忿鷙悍黠之人欲啓事端繩以章條彼當自屈若然舉遼朔之衆唯上之令則是書之作可謂規模宏逺而德施無窮矣然以今日承平之勢當彼百年既往之運狃我涵煦侈心漸萌侈極而微形兆兹見藁街質館行可致其俘入矣今姑撮其大概副聖辰經逺之慮總二百卷卷有楦釀則釐為上中下謹條事目具於左方次年編類成書先具目録進呈六年六月五日蒙降宸筆賜名華戎魯衛信録校風俗通義題序臣所校定風俗通義崇文先闕本臣以私本因官書校定凡十卷謹次第録謹案范煜後漢書應劭字仲逺汝南南頓人歷太山太守後為袁紹軍謀校尉卒于鄴撰風俗通以辨物類名號釋時俗嫌疑文雖不典後世服其洽聞然傳不記其篇卷惟梁録載風俗通義三十卷隋書經籍志云三十二卷録一卷唐志亦云三十卷而臣某所傳才十卷初疑闕其下篇歷代諸儒著書引據最多而無若庾仲容子抄馬總意林載之略備今以其書校之乃篇次不倫然子抄但著卷第凡三十一而不記篇名意林則存篇名而無卷第今校其文意粗可見者獨皇霸一篇同為第一其正失第二子抄云第六愆禮三子抄云第八過譽四子抄云第七十反五子抄云第九聲音六子抄云十三窮通七子抄云十五祀典八子抄云二十神怪九子抄云三十一山澤十子抄云二十四又意林以祀典篇為儀禮其餘篇名可見者曰心政曰古制曰隂教曰辨惑曰折當曰恕度曰嘉號曰徽稱曰情遇曰姓氏曰諱篇曰釋忌曰輯事曰服妖曰喪祭曰宮室曰市井曰數紀曰新秦曰獄法其書並亡而第八并篇名亦亡又案意林于折當篇載目録云太山太守臣劭再拜上書曰秦皇焚書坑儒六藝缺亡髙祖受命四海乂安往往于壁柱石室之中得其遺文竹朽帛裂殘闕不備至國家行事俗問流語莫能原察故三代遣輶軒使者經絶域採方言令人君不出户牖而知異俗之語耳此其自敘如此勢當在卷首或卷末今乃云第十以此又知庾馬所載篇第未必當然故不復更改謹以黃紙繕寫藏之館閣校淮南子題序謹按班固前漢書淮南王安招致賓客方術之士數千人作為內書二十一篇外書甚衆又有中篇八卷書言神仙黃白之術亦二十萬餘言中篇者劉向傳所謂鴻寶苑祕是也與外書今並亡內書則鴻烈是也藝文志謂之內篇是書有後漢太尉祭酒許慎東郡濮陽令髙誘二家之注隋唐目録皆别傳行今校崇文舊書與蜀川印本暨臣某家書凡七部並題曰淮南子二注相參不復可辨惟集賢本卷末有前賢題載云許標其首皆詁鴻烈之下謂之記上髙題卷首皆謂之鴻烈解經解經之下曰髙氏注每篇之下皆曰訓又分數篇為上下以此為異崇文總目亦云如此又謂髙注詳于許氏本書文句亦有小異然今此七本皆有髙氏訓敘題卷仍各不同或于解經下云許慎記上或於間詁上云髙氏或但云鴻烈解或不言髙氏注或以人間篇為第七或以精神篇為第十八參差不齊非復昔時之體臣某據文推次頗見端緒髙注篇名皆有故曰因以題篇之語其間奇字並載音讀許于篇下粗論大意卷內或有假借用字以周為舟以楯為循以而為如以恬為惔如此非一又其詳略不同誠如總目之説互相考正去其重復共得髙注十三篇許注十八篇又按髙氏敘典農中郎將卞揖借八卷會揖喪遂亡後復補足今所闕八篇得非後補者失其定著外所闕卷但載淮南本書仍于篇下題曰注今亡許注仍不録敘並以黃紙繕寫藏之館閣小畜外集序或謂言不若功功不若德是不然也夫見於行事之謂德推以及物之謂功二者立矣非言無以述之無述則後世不可見而君子之道幾乎熄矣是以紀事述志必資乎言較於事為其貫一也自昔能言之類世不乏賢若乃德與功偕文備于道嘉謨讜論見信於時主遺風餘烈不泯于將來有若故翰林學士尚書刑部郎中贈禮部尚書巨野王公者幾希矣公諱禹稱字元之生知好學九嵗能詩與郡從事故相畢文簡公為唱酬之友及䇿名從事中書令趙韓王薦其文章太宗皇帝既已知名命召試中書宸筆賜題詔臣寮和御製雪詩序奏篇稱善自大理評事擢右拾遺直史館賜緋衣犀帶以寵異之端拱二年親試貢士俾公面賦長歌上覽而喜曰此不踰月當遍天下一日侍燕瓊林宣至膝前顧謂宰相曰王某一朝名士獨步當代異日垂名不朽矣公嘗謂遭知巳之主非盡言無以報稱故自登文館至涉禁林知無不為入則以告兩朝獻替一節始終由是聖君以忠亮待之士論以公卿屬之然而襟抱沖夷鋒氣髙邁直躬行巳不為時屈上知其然使宰執喻旨戒以容物而憤悶所激不能自已三坐左官皆以直道因作三黜賦以見志有不屈於道百謫何虧之句此其見於行事之深切者也雍熙中外服內侵邊警未艾公援漢文君臣單于事勸上內修德而外任人若勞民以事邊則冦在內而不在外矣於時京畿旱亢奏省乘輿服御暨紫雲工巧之技第減百官月俸願以已先稍贖尸素之罪在章聖時應直言詔亦以通鄰好赦繼遷為請復議減冗兵并冗吏以寬租賦親大臣逺小臣以重國體艱難選舉以清士流澄汰僧尼以除民蠧增州郡武備以防窺竊推天官洪範以弭災變皆切於時宜有禆朝論未幾臨演講和平夏封䇿息民罷兵省費除弊多公先識之所啓發此其推以及物之著明者也前後三直西掖一入翰林辭誥深純得裁成制置之體册命莊重兼典謨訓誥之文端拱針切劘上躬待漏記規警時宰上三賢疏推原前代之失不異方今請東封賦前知盛德之事必行聖代論議書敘理極精微詩歌贊頌義專比興雖在燕間或罹憂患凡有論撰未嘗空言此其紀事述志之尤最者也惟公道直行果既如彼主知人望又如此若天假之年久於是位則經國致君之業必大施於當時豈待言而後顯惜乎夀不及知命官止於省郎卒不得究其懷緼此所以發而為文章著見於後者也公之亡也天子嗟悼賻家恤後恩踰常比嗣子嘉言擢祥符進士上以詞臣之裔特遷大理評事以祿其親曽孫汾第皇祐甲科以免解法當降等仁宗閲卷首見公名嘉其有後特賜元第未幾考課上猶記前事命加秩一級今為朝議大夫集賢校理諸王府翊善兹以見文學行義足以垂裕後昆則夫臧孫不朽之言信於是矣公之屬稿晚年手自編綴集為三十卷命名小畜蓋取易之懿文德而欲巳之集大成也後集詩三卷奏議集三卷承明集十卷五代史闕文一卷並行於世而遺編墜簡尚多散落集賢君購尋裒類又得詩賦碑志論議表著凡二十卷目曰小畜外集因其名所以成先志也謂僕嘗學舊史前言往行多得其詳見咨序引久不獲辭竊謂文章末流由唐季涉五代氣格摧弱淪于鄙俚國初屢有作者留意變風而習尚難移未能復雅至公特起力振斯文根源于六經枝𣲖於百氏斥浮偽去陳言作而述之一變於道後之秉筆之士學聖人之言由藩牆而踐穾奧繄公為之司南也集賢君力學名家克大門伐振其絶業傳於無窮又足以繼紀事善述之美也不其韙歟呂舍人文集序仁宗皇帝一朝文章人物之盛跨越前代天聖初故相鄭國宋公洎仲氏尚書景文公同時擢甲科景祐中故參知政事歐陽文忠公由銓選陟文館閲旬嵗而歷兩禁登二府號令風采愯然動天下豪英間出相繼進用方是時承平百年禮樂興起亡書佚史靡不搜輯鴻筆大手競獻所長上之朝廷詔誥詞命與典謨相髙下之臺閣論議章奏有忠嘉之美至于一篇一詠尺牘片札朝染翰墨夕遍家户彬彬然文雅之風成於上而浹於下矣於時故兵部員外郎知制誥知潁州呂公縉叔起逺方邑尉入為編修唐書上方覽觀前王以李朝舊史參錯不倫思欲刋正為一代信書預筆削之任者皆一時髙選而文忠景文二公實専典領積十七年而書成前後官屬更十餘人或徙或遷出處不常惟縉叔與尚書范公景仁內閣宋公次道自發凡訖于絶筆又集天下碑刻類為唐文傳信考歷代氏譜族志為古今系表二書獨出縉叔一手可謂勤且博矣縉叔在朝最久雖兼領他司而未嘗離史事沈酣簡牘撰著尤多其或頌聖歌功賡唱迭和公卿倩代二府簡討涵濡應答殆無虛日及典誥命屬覃慶霈恩文書沓委占吏起草不少稽停未幾議修仁宗英宗正史朝論莫先縉叔者乃以積厪致疾疲於鉛摘懇求間職以就頤養朝廷惜其逺去詔以本職出守踰年終汝隂卒不得繼馬班之業述黃虞之典士大夫所以惋痛不已豈特歎周南之留滯也縉叔名夏卿生十嵗知書日誦數千言疊紙援筆便成章句大門侍御公謂先德廣文先生曰此兒不假礱琢自成美器始冠遊京師舉進士秋賦不捷時我先人在朝得其試稿示同列曰安有文章如此而不為時用者及其去也以詩勉之慶厯初再舉鄉書貢籍皆在上選既而擢第調端州髙要縣尉丁文簡公與景文公聯章薦入書府歷祕書著作丞直祕閣外臺郎修起居注遂知制誥嗚呼天不畀夀撤瑟之日年才五十有五平生所負經濟之緼未得悉施于時獨有文字載之册書播傳人口不朽之事其在兹乎嗣子拯善守世學悉裒舊稿以類詮次合為總集求豫文以冠於篇豫與縉叔家則同里學則同術仕則同年入朝同踐書館聲氣相與蓋有年矣宿草之恨未嘗忘之覽其遺編固多平日所見及嘗同議論者不待復孰而後見其所存也縉叔少通經術長而刻志史學仕宦三紀始卒史官故其立言創意深微婉約不戾經傳之旨詩則主于諷諭文則善于敘事贊頌本於導揚美實書奏謹于推明治理大抵獨得胸襟自成機杼辭雖精奧而不取竒僻理雖切著而不事抑揚嘉祐上書謂天下之亂常生完然無事時救失在于及時宿衛雜出民間而侍護禁掖宜取編户倣古虎士衛士之制坐食營壘之兵本非土著難以應敵不若漸更復府衛以重根本其愛君憂國之慮逺矣論史書謂陸羽秦系避僣藩辟命終躬不仕宜列隱逸閻立本王璵由藝術躐取髙位宜附方技其表善抑姦之意切矣文宗紀及宗室宰相孝友藩鎮夷狄逆臣諸傳十九贊序明識獨見勸懲之意深矣劉知幾有云文之與史其流一焉觀縉叔所敘汪洋閎衍體制不一然博學多聞拾遺補藝發幽隱甄是否使讀之者知善惡之所歸其三長之最歟凡卷第古律詩十二雜文議論贊記八表書啓序三祭文碑志行狀七制誥十總五十卷紹聖元年二月十五日蘇魏公文集卷六十六
