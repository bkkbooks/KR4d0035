body:
  text: 蘇魏公文集卷八宋蘇頌撰律詩送祖印忠師南歸擾擾京華客營營不自間胡為丘壑者亦到市朝間孤月無留影歸雲靡定山東南清勝處羡子一舟還和朱純臣兵部上已錫宴故事修春禊恩筵啓鳳林風光來莽蒼和氣動幽沈六豆分肴貴千鍾酌醴深執蘭遊洧水忘味聽韶音鳬藻羣官意雲天上帝心叨陪宴湑召非服愧華簪又和內院海棠華萼相輝采翠重幾畨濃豔九春中根盤省闥偏含潤影拂鄰墻暗逐風繁若百枝然寶炷深于三入染纁紅諸君賞咏時連屬珍重多才好事同次韻程公闢暮春日日尋春春欲還園林遊興未應闌間關鶯囀衝牙韻爛漫花開歷緑團須信馬蹄隨處健肯教金盞暫時乾休驚節物頻更換適意歡娛定一般再和暮春黃鶯初囀燕新還林館清虛景未闌甕撥金膏傾臘腳封開緑絹試春團條風吹笋苞猶嫩穀雨催花色漸乾若待休間頻燕集牽拘人事恐多般再和十分春色九分殘計日追遊至夜闌月照餘花光燭燭露垂新葉影團團壅平焙萱背尤宜厚汲引荷池莫放乾看即熏風催暑景要須佳玩兩三般再和入省宿雕龍辭辨幹時才重贊甘泉屈壯懷被擁綾香歸漢直食葷忘茹似顔齋公闢多素膳仍好詩休嗟簿領書堆案况是鴻鸞序漸階公論共推資望久春雲高步信難排和北軒薜荔分得巖枝帶蘚文壁間延蔓密含春元韻私稱不便借上字用搖風似展垂雲翼和雨疑騫化浪鱗寒對竹軒陵霰雪靜陪犀柄辟埃塵省闈不比山河逺休擬靈均詠若人和清明後一日遊西池萬家供帳集西明綵艦芳林酒屢行強對鶯花無奈老時聞歌吹不勝情輪囷佳氣城頭近烋噢清風語下生休沐儻間須數往水邊庭際解朝纓行次塘堤渺渺寒流千里餘帶城襟壘似江湖侯王設險古未有夷狄窺邊今遂無數郡營屯歸耒耨萬家生聚利菰蒲長堤不絶才如線南北衝衝是坦途登雄州城樓三關相直斷華戎燕薊山川一望中斥堠人間風馬逸朝廷恩廣使軺通嵗頒金絮非無䇿利盡耕桑豈有窮自古和親誚儒者可憐漢將亦何功接伴北使至樂壽寄高陽安撫吳仲庶待制道路傳聞北守賢就中清尚是河間轅門臥鼓軍無警幕府賡歌筆不間只合論思居禁闥豈宜留滯在邊關寧容舊客升堂室擬請新篇滿篋還和吳仲庶待制見寄幾日風沙結襟袖忽傳嘉惠眼重開交情不改乘車約和氣先隨掞藻來元帥本由詩禮選行人愧匪語言才相逢且喜論平素若校文章未易陪冬至日瓦橋與李綖少卿會飲使傳驅馳同被命邉城迢遞偶相從風霜正急偏催老嵗月如流又過冬方念去家千里逺無辭沈醉十分濃須知此會洵堪喜北上河橋便寡悰和王臨謝寄蜀箋雙井茶鈴閣優間斫句新客亭傳誦慰馳神誠知擷露敲冰陋豈敵揮毫掞藻春固乏瓊瑶酬錯寶多慚魚目換驪珍近來聞道談機迅更恐難當彼上人來書云近于真如妙用不敢多謝故以此答和李少卿寄吳仲庶延閣儒臣出撫邊指縱沙磧坐揮鞭歌謡早已留南楚唱和今還到北燕皇華詩皆是與使僚諸君賡和使客過從車結轍耕夫安佚土開阡更將佳句刋齋壁留作河間故事傳和吳仲庶寄李子儀五紀修戎好重關四向開村郊縱牛馬戰地長蒿萊過客朝連暮征軺去復回元侯勤主禮一一倒瓶罍和李子儀寄吳仲庶並馳絶塞待燕鄰喜過重關值故人闊别經年勞逺夢留連此日奉清塵威行列郡連營肅恩浹諸戎異域春願學子雲承漢詔未央宫壁頌功臣和李子儀瀛州借馬寄安撫待制塞草黃明畜牧肥外間千駟氣增威權竒毛骨森相映騕裊精神動若飛暫借行人持玉節屢陪方伯展朱旗料君早晚趨嚴召安穩乘歸從六騑和北遊銜命初開朔土遊故人威重肯回眸旌旗在列千餘騎棨戟遙臨十一州令尹投兵方秉羽羊公臨塞但輕裘諸賢酬唱無間日卷軸今應束兩牛李白詩云詩裁兩牛腰言其卷大如牛腰耳和吳仲庶龍圖寄德仁致政比部二首道骨仙風擅世華肯將璠玉混泥沙潛郎未老辭朝路傲吏歸來學道家逸似子荆將潄石清如中散本餐霞應思平日市朝客韁鎖拘攣正可嗟再和倦遊城闕厭紛華一棹南歸出白沙簪紱棄來如釋負山林到處便為家流泉繞舍鏘金玉仙餌盈槃泛露霞珍重宗英嘉隱操逺裁清句重咨嗟某忝被給札之召伏蒙景純學士文文寵示嘉篇且述早歲先人試職之日嘗亦相遇于政府感愴不巳輒次髙韻先友勤渠慶得時相逢仍在右垣扉負山徒荷君恩重起草多慙筆力微早歲應門叨賞識幾年聨襼接音徽雕章華藻蒙褒賁知我從今不患稀景純學士文丈再録早年見慶嘉篇重用前韻奉和載世交遊共一時立朝幾見盛門扉官班早合登青瑣星象俄聞返少微曽向瀛仙陪雅集更同綿蕝講鴻徽江干千里勞魂夢常恨平安信息稀與次道集賢諫議元素翰林赴沖卿樞密諫議見招宴會同賦江淮罷郡許歸朝臺閣重來鬢漸凋內禁羣英容接武西樞元弼記嘗僚當年巳絶坐中禮此日猶蒙客右招衰病無堪還自慰交遊相繼上層霄用諸公本韻各和一篇共三首早陪鵷鷺侍丹闈旋見夔龍陟近司西閣屢觀新詔草東曹猶記舊文移半途霄壤成分異幾嵗江湖役夢思席面故人皆顯重可憐顔尉獨厖眉右用沖卿樞密諫議本韻二紀書林得並遷外沈俱喜在樽前非才幸復登羣正大筆猶稽直五甎欣聽友聲同伐木坦忘情類似虛船白頭光景尤須惜樂事相逢且豁然右用次道集賢諫議本韻繼踵螭階入右垣曽參何敢望淵騫某向忝右史升西掖皆承元素舊綴唐人論曽參以後至故不得預十子之列復門重慶登庸命樞閣仍陪話舊筵貴賤交情都不改始終風節固難遷公卿平日推高譽朝論今誰過鄧先右用元素提舉內翰本韻寄題傅欽之學士濟源草堂大形南址直河津君有茅廬泲水濱蒼翠入簷藏絶景潺湲繞舍隔囂塵久遊臺閣忘聲利長憶漁樵狎隱淪待得功成年至日歸來不負故園春寄題蒲傳正學士清風閣閣倚青山書滿堂門齊通德里高陽傳家載世惟清白教子何人似義方班嗣一丘雖道卷劉商七業已名彰他年駟馬充閭貴須信文儒澤施長寄繹經清衍大師輦寺棲遲不計年衡門無異對林泉試闈給筆頻辭命繹館翻經屢奏篇九陌塵埃方外境六時香火靜中緣思陪丈室談名理自愧常為俗纍牽送王彥祖學士守毗陵黃州終始宋名臣載世逢時見裔孫賜第中宸躋甲等遷官京寺出殊恩文章已復光儒館風節應須繼祖門堅請麾符知有意聊將慈惠振元元彥祖皇祐中擢進士日仁宗皇帝以名臣之後特升甲科其後考課當升評祝中旨復令優遷和王察院竹篠巷阻風七言聞道扁舟下迅湍怒濤驚浪擁前灘岸迷津際居無定人隔過從意少歡風信未回聊對景嵗華將暮自凌寒君才一日能千里直上青雲亦未難冬夕會諸同僚與稅舍弟郡齋飲話通判歐郎中以二絶句紀事見寄次韻弟兄叨郡兩淮間賓友銜杯午夜歡喜聽話言消酒力更欽風義敵霜寒立朝才薄幸潛郎出守恩優便養堂賴得同僚借河潤坐令尸祿荷龍光次韻蔣穎叔遊西湖入南屏山樓臺高下滿仙風疑是蓬萊象帝宫湖面涵虛雲漾漾山腰藏景石瓏瓏松筠影出紅塵外鍾梵聲來碧落中薄暮將歸起餘思落霞飛鶩正橫空寄題吳興墨妙亭漢唐遺刻在江干右史殷勤輯墜殘剔去蘚文人乍識傳來墨本字猶完六書體法從兹辨二費聲光遂不刋何必臨池苦縈思燕間時得坐隅觀和歐陽永叔少師會老唱和詩三首得時行道貴知終猛退如公世罕逢擲棄浮名同敝屣保全高節似寒松文章千古追謨誥勳業三朝鏤鼎鐘見説新堂頻燕會故時賓客定相容公嘗見約異時潁上相尋某亦有意乞麾以依舊館右寄汝隂少師富貴功名已兩忘望高嵩華量包湘還家傲似蒙莊子定策忠于漢霍光逺訪交親情益重共論詩酒興偏長園亭繼日休車馬却悔多年滯廟堂右和南都趙少師出守嘗希阮仲容剖符仍繼夏侯公漢剖符封滕公為汝隂侯金華舊侣三賢並緑野先歸二老同宴會莫如今日盛唱酬還有古人風自嗟流落江湖外不得尊前聽燕鴻故相臨淄公守潁日有燕鴻等歌詞五闋右和汝隂侍讀送丁郎中守江州南朝兵馬臨江鎮聖世麾符守土臣此日風聲動湓浦早年名譽浹淮鄰君前此倅齊安琵琶昔有天涯曲􅖻􅑳今無境外人退食優遊多勝賞杯觴不負庾樓春次韻葛大卿題江氏寒光閣溪凝藍黛合雙川閣在千巖萬壑前潄石我思清病齒倚琴誰共聽流泉雲生北嶺橫空白春入東郊一望鮮況是江南風物好待君重詠四時天次韻桞郎中二詠蒲條圍坐雪添瓶側理糊窗熾炭明常對圖書堆四壁却思裘褐勝雙旌道心生後安休息事局間來怕踐更睡足定應輸杜守窮愁何必學虞卿地爐百幅敲冰密屬連寢甘誰復誚便便心間好隱忘言几官冷宜鋪坐客氊烏布任寬忘道韻絳紗徒侈怯霜天休嗟拋擲縑綾貴據榻猶勝枕杫眠紙帳蘇魏公文集卷八
