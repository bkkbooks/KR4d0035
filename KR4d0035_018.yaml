body:
  text: 蘇魏公文集卷十八宋蘇頌撰奏議請增葺尚書省稍復南宫故事臣竊以今之尚書省古之天臺朝廷萬事之本皆由此出其地莫重焉國朝因五季更置事歸三司者十六七歸諸司者十二三自兹視文昌為閒地矣雖然官次置位綱領猶存憲章典型規模可見曩者仁宗世嘗有大臣建言請移審官院歸吏部三班院歸兵部審刑院歸刑部庶幾稍近古制而當時議者不深維其本苟憚興作卒不克行誠可惜也臣纍曽主判本省閒曹備見其事八座六行皆崇堂華構比其他官守最為雄麗但以纍年以來頻經霖潦棟宇隳頽不庇風雨縱或官中檢舉支破材料修葺而本省並無都總監臨之人只憑看守剩員及門卒等催趨以此動經嵗月不得了畢切緣其間官物庫屋固不為少又有吏兵刑禮諸部簿書充積廊廡因此損壞散失者亦不可究知矣臣以謂向之議論移置官司恐未暇及則欲乞朝廷再賜相度增置朝臣或使臣兩員專令勾當本省公事及監門仍每夜輪一人押宿三年一替與當親民任使應本省簿書官物屋宇並令逐時㸃檢稍有損壞即供舉修葺仍便臨督工匠及收支材料直至了畢如遇貢舉亦可以一就充監貢院門所貴振舉綱維鈐束官物不至損失俟其嵗月浸久完葺有緒然後議移審官等三院還省則南宫故事可舉而行一代典章于斯為盛矣請重修纂國朝所行五禮臣竊惟方今聖治日新百度修舉其在朝政固無可措言者然詔㫖開納不容自默輒敢以平昔所懷一二狂瞽仰塞明詔臣伏見國朝以來制作禮樂上采三代下迄有唐損益節文簡冊具載而前後禮官纂集類無法制或直載一時所行或雜案牘嵗月條目相錯本末不倫臣竊考之六經在禮有三種之别周官著有司典領之事儀禮載升降隆殺之節戴記叙古今因革之文雖聖賢作述之不同而語其歸趣實相為表裏也後世言禮者皆不出此三體漢晉洎隋雖代有作者而苟簡一時法制無取唐明皇命學士等因貞觀顯慶所修五禮討論刪改集成一百五十卷是為大唐開元禮行于纍朝設于科舉傳其學者則有義鑑義羅之類比于近代之書最為詳悉故今世漢晉洎隋皆無傳而開元禮獨不廢者以其法制存焉故也太祖皇帝特詔儒臣劉溫叟盧多遜扈䝉等祖述其書傅以今事仍加增損足成二百卷是為開寶通禮又有義纂一百卷以發明其㫖要仍依開元禮設科取士逮今官司遵用斯為不刋况之六經儀禮之别也然此特一經也在于有司典領之事古今沿革之文猶闕而不立故舉行之際尚或未備自開寶以後百年之間纍聖躬行聲明寖盛非有繼述後世何觀嘉祐初太常歐陽修奏請編撰彼時臣任博士職預纂修嘗以恭謝一門分為三目其一自降御札公卿百司奉行辦備之事謂之有司其二自前期陳設至祼獻禮畢謂之儀注其三采古今曲臺論議更創之制謂之沿革以此一門為例他悉倣之修己議定具草會臣罷禮官領他職復奏姚闢蘇洵繼掌其事闢洵離析舊文更立新體撰成一百卷是為太常因革禮雖號簡要幾同鈔節姑可以備有司之檢閲誠未足以發揚聖朝制作之盛也臣伏覩陛下留意典章修舉廢墜前嵗詔命近臣詳定禮文自郊廟至于羣臣朝會與夫燕享器服之名數舞樂之形容考古揆今審定至當皆三代之所放失漢唐之所闕遺斷自清衷舉行殆遍固當著于典訓與六經並行為萬世矜式也臣不勝願幸欲望再命諸儒討論國朝以來自開寶通禮至近嵗詳定禮文以有司及儀注沿革依三禮隨類分門著為大宋元豐新禮付之太常頒于學官使博士弟子講習大義或施之科舉則數嵗之後必有詳練疏通之人上副拔擢可以為朝廷講議之官庶幾天下向風皆知禮教謙恭撙節不學而能於變時雍可跂而待也請别定縣令考課及立鄉官臣竊以國家恃以為治者民也使民敦本而趨善者縣令也是以前世論政者莫不以此為首務嚮者仁宗皇帝深知其故始詔保任縣令嵗復增考課之法其所以責任求治之意至矣然而縣邑之間卓然以治理之效聞者猶寡臣竊思之蓋以殿最之格不過校簿書案文法而巳故簿書益密而編户益擾文法彌具而治道彌逺是豈朝廷任官責效之本意耶且古之治民勸導教率無所不至故孝弟力田有優異之科三老亷吏有表率之義由是農民衆而土田闢風俗厚而獄訟稀今則不然民勤于力苟致贍足則懼外遷第等遂有因循不耕之患是力田者有纍而惰逰者無罰也父子聚居丁産稍多則懼差徭配率遂有離析異居之弊是孝弟無所勸而奸惡未得止也鄉村但有耆壯巡察吏卒追捕不聞以善道諭之者是教化無由至而獄訟不得息也然則欲變其俗使稍敦本者亦在朝廷勸勉之而巳臣欲望明詔戒敕自今考課以令長能用善道諭民勉末游而歸本業致獄訟稀簡而盜賊衰息者為優等其能校簿書均移稅賦發奸捕盜興利除害者為次等二者咸無為下等優等望賜超擢次等再加激厲末等自當降黜其田里之民亦許令長舉察州郡案覆立為科條有能盡力畎畝開墾陂澤久逺為利于衆者或羣居孝友宗族敦睦為鄉黨所推者如此之類特與蠲除户下差役其復有明于義理年高行著者即少加旌異或立鄉官之號以賜之使人諭教化于下相率而歸于善道如此則亷平之吏思盡所長禮義之風庶幾可致奏乞初出官人乞不許差充簽判臣伏見頃年纍遣使者寬恤民力减定衙前人數此誠朝廷惠綏元元之深意也而議者多謂自改定以來空閒人户甚䝉休養見役之人轉見困匱臣纍受外任備見其事蓋以衙前雖减而役事仍舊以二人之力舉三人之事不待言而後知其勞矣且州縣色役固有常規不可頓闕欲恤其困者莫若為之擇主轄之官也夫主轄之官一非其人則差使優重不得均濟優重不得均濟則有罄竭物産不能了一次色役者以此言之擇官不可不慎也臣竊見近年以來補䕃官例合陳乞差遣者雖初任及監當資序便得指射權注簽書州軍判官公事其間或有全未歷事之人衙司條例既多不能一一通曉利病大則奉上官頥指不敢違忤次則為姦吏欺紿莫能窮究遂使鄉户受敝無所控訴朝廷雖有惠恤之恩何由下達耶臣欲乞今後初官或監當資叙之人合該陳乞者只許指射本等優便差遣不得更乞權注簽判親民之職及初受恩澤幕職官亦只得注授以次職事官其簽判判官係主轄衙司者並令審官院并流內銓選差經事有舉主之人注受此亦寬恤民力之一端也奏乞春夏不斷大辟臣伏思國家以仁恩被冒天下祖宗慎用刑辟陛下丕承謨烈憲章大備輕重得宜上自朝廷下及州縣遵守條詔無有違者雖杖笞之責不合法令未嘗輒行其巳斷之獄猶加審察官司縱出者坐罰深故者或至廢黜而不用臣嘗謂自堯舜以來經史所著用刑詳慎未有及我朝之仁恕平允者也惟論决重辟猶不以時而議者未嘗及之誠恐亦為聖世當行之一事臣愚戇不識大體故敢以前古之說言之傳曰賞以春夏刑以秋冬是三代之時春夏未嘗行誅殺也史載秦世四時行刑王莽盛夏殺人是皆譏其虐政也漢制斷獄報重常盡三冬之月蓋不于陽盛之時勦絶生類所以協天意助人情也東漢以後或行或否近世遂廢而不舉其說蓋患囚繫之淹久耳臣以謂獄官案鞫苟有連逮不以輕重追呼參驗動涉嵗時未嘗以淹久故釋而不問也臣愚欲望聖慈參酌古義采用周漢詔天下獄囚自非惡逆以上决不待時外其餘衆罪並俟秋冬論决免當溫煦之日而有愁痛之聲亦足以成聖朝仁恩之美也且無知之民輕犯刑網殺之為可矜貸之為廢法萬一待决踰時或遇恩降得從末减是陛下不廢法而全人命者多矣恩威並行民知畏愛是當天心感召和氣誠太平之高致也奏乞京畿諸縣分屯禁軍治平元年上臣伏以周制六軍蓋出六鄉之衆在王畿四郊之地唐設十二衛軍亦散布輔畿郡縣又以關內諸府分𨽻之皆所以臨制四方為上國藩衛也國朝禁兵多在京城又畿內東南諸縣雖于糧運供饋為便而西北兩面武備或闕况中牟長垣兩縣直都門要衝之路二陲驛置皆由此出而舊不屯兵至于城守防轉居常乏人臣以為各可創置三五指揮又東明考城兩縣界與東京州縣相接素名聚冦之所雖有軍營其數甚少臣亦以為各可添置十數指揮欲乞朝廷委所司相度于京畿兵多處以新近招揀補填未足軍分移屯逐縣其未足人數候到彼處逐旋招填應營房所須土木材用即先委本縣預行計置俟壁壘巳具然後移軍往彼其衣糧錢帛除東明一縣自可于廣濟河轉漕供給外中牟等三縣即乞將鄰州接縣夏秋稅賦自近及逺以次支移就彼送納充贍取足或謂諸縣近經灾傷未宜遽起役事即乞先且標置營地逐一指揮旋行修蓋不三二年亦可辦集如此則不惟畿縣有備亦所以增上都四面之形勢也請重議加役流法臣聞曩嵗嘗有議者欲復肉刑將以寬减重辟而以此法久廢難以猝行又聞頗患配𨽻之人轉徙逺方監驅促迫經涉寒暑强者有奔亡之虞弱者有疲羸之困思革其弊宜求厥中昔漢文帝感一女子之言而制髠鉗代肉刑則有城旦鬼薪司冦之差唐太宗納裴洪獻之議而立加役流代斬趾則有三嵗居作之限今欲寬省嚴誅又憫配𨽻轉徙之勞臣愚以謂莫如重議加役流法取當黥代者依條斷罪髠髮鉗足晝則居作夜則置之圜土實滿三嵗然後釋之中間雖逢恩宥未滿嵗則不在原免之限其初釋放者仍送所居鄉貫譏察其出入又三嵗不犯故為之罪乃得聽從便其無鄉貫者鄰近州縣拘管譏察如前雖有凶頑之人而更三嵗勞役之苦且足以懲艾矣復有鄉保譏察之嚴又足以戒懼也如其性實凶暴放釋之後不知悛改復為人患則誅之可也投之四裔可也如此措置不惟省逺道奔亡之患又足以開其自新之路化暴惡為良民使愚俗知教化亦省刑止殺之一端也臣才識短淺不周世務姑奉詔㫖勉强罄竭所見如此非敢謂是然禮刑之論實繫朝廷事體伏望聖慈寬其罪戾特賜裁擇庶幾塵露少禆山海奏乞今後衝改條貫並委法官詳定臣竊以國家承平百年遺文墜典罔不修舉固巳跨越漢唐規模宏逺矣而于法令之間猶有所未盡者豈非前後論議之臣不能推原其本苟徇一時之便遂著而為令後之有司用之小或乖戾又復更易是致朝廷憲章未得一定夫聖王之法欲其簡約而明白使人易避而難犯然後垂之久逺為不刋之典如唐之十二律本朝之刑統是也雖歷數百年其間敕條之更改者多矣而二書獨不廢者以其得簡明之意故也自編敕之興號為繁密而中間衝改率不過一二十年又復重定蓋文繁則易攻事密則難悉只如嘉祐編敕頒行未數年而續降散敕又增于前日以此無知之民至有輕犯于法舞文之吏得以高下其手其弊蓋在乎更改不常耳臣去嵗任淮南轉運使日承准三司行下當年九月三日中書劄子為據江西轉運司及江淮發運司起請䖍吉等州新船借裝一運上京山東排岸司等處不得擅行截撥條約一道計四千七百餘字臣看詳大抵只是約束不得截撥新船往不係指定路分則編敕巳有留納州府違之者自當嚴斷矣其添入兵梢等候合納處朱鈔回歸梢工科違制兵士嚴斷若是創立上項刑名只當于本條下添入此一節可矣不必具載行遣使州郡煩費抄録若欲出榜曉示則數千餘言有司看覽尚或不悉豈庸愚兵卒能盡曉耶以此言之備録行遣徒有惑亂都無所益臣欲乞今後應有臣寮等起請刑名並委法寺及三司等處同共檢詳編敕果有未備即于門目內意相附近處添减裁定明言于某條內添减計若干字或是創立新條亦明言于某條後添入一條計若干字其衝改者即云某條自某字至某字計若干更不行用然後奏請頒下諸路便令諸州軍于編敕內添入逐件事節訖奏其先行下自降嘉祐編敕以後續降散敕亦乞委法官將逐件事節與編敕相參重行刪定候了畢日依此頒行仍明言多少條件各合附在某門目中或增减或衝改别立條目共計多少事件若干字數分明别白頒降諸路使州郡用法知所適從免令法吏檢坐之際有所隱漏致出入刑名其散敕即乞更不行用所冀三尺之法無前後之差畫一之規載清靜之美實治道之所先急者也奏乞那移諸路有剩常平廣惠倉錢斛赴府界臣伏見先朝置廣惠倉别貯天下户絶田土夏秋租課准備冬後救濟闕食貧民其仁恩至厚然天下土地有肥瘠故所收錢斛多少不等以此多處常有餘而少處常不足致朝廷之恩未得均遍臣訪聞江南東西淮南兩浙等路州軍見在斛㪷多處每州至三二萬石並是粳米仍有見錢在外兼逐年俵散數目不多契勘府界諸縣户絶租課昨准朝㫖平估價例令人户于府司送納見錢充濟四福田院貧子支用外去年十七縣廣惠倉見在斛㪷共只有八千餘石仍多是榖豆雜色依常平俵散亦有不足處况值昨來荒歉諸縣鎮鄉村凍餒之民甚多見今官中散俵粥米日計不下數百石雖近䝉朝廷降到空名祠部召僧行進納錢斛相兼賑濟故目下貧民得以充哺稍不失所然而豐荒常數不可前知萬一將來夏秋重罹不幸計今所餘必不能接濟誠不可不預為准擬也臣欲乞朝廷特賜指揮江淮等四路提㸃刑獄司契勘轄下諸州軍廣惠倉見在錢斛除本路見有飢歉州軍須至那移應副賑濟并更約度量留合要准備數目外其餘剩數錢斛並令擘畫附搭發運司綱運般載上京委提㸃司俵散闕絶縣分收貯以充廣惠之數或慮斛㪷重滯猝難般運即乞令逐州出糶見錢附綱前來就近擘畫收糴斛㪷損彼有餘助此不足則逺近之民無不畢被朝廷之惠也奏乞體量放稅臣伏見開封府界諸縣見有人户披訴旱灾舊例本府奏乞朝廷差官同本縣知佐依條親詣逐户田段一一檢覆臣纍曽密切體訪得委是旱損苗稼甚多其低下曽得雨處雖有薄熟亦所收無幾况鄉民見各候雨布種秋田若更勾集祇應檢覆誠恐有妨農事畿甸之民所宜朝廷倍加存恤臣欲乞特降指揮今來所差官許令與當職官一員只于諸縣逐鄉村體量蠲放苖稅更不親詣逐户田段所冀行遣簡便不至勞擾蘇魏公文集卷十八
