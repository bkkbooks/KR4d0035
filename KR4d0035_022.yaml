body:
  text: 蘇魏公文集卷二十二宋蘇頌撰內制太皇太后賜門下詔敕門下三朝盛會禮見羣臣王公造庭奉觴上壽皇帝臨御五載恭已端莊慶集惟新受朝饗禮吾總攬幾務叶助政綱雖克享治安而每懷抑畏今有司乃欲以天聖故事行會慶稱賀之儀顧惟菲涼豈敢比隆於先后其在典法亦當稽合於常規是日皇帝致賀於禁中羣臣奉表於東廡足以顯邦家之慶而形孝敬之風何必外朝乃為具體來年正月一日更不御殿受賀上壽候皇帝御殿禮畢百官並內東門拜表故兹詔示想宜知悉賜太子太保致仕張方平乞免明堂陪位允詔敕方平省所上表免明堂陪位事具悉朕涓吉季秋有事太寢祇嚴聖考陟配上神百辟諸侯咸肅雍於肆祀四朝舊德宜顯相於清明暨閲奏封堅辭疾老諒久安於閭里重逺涉於道塗姑徇至懷益延上壽可免赴闕陪位故兹詔示想宜知悉秋熱卿比平安好遣書指不多及許詔敕方平覽所上表免明堂陪位事具悉卿宣明九德左右四朝解紱傳家結廬近甸三歲大事宗祀明堂粵惟庶工莫不來助矧我舊老當相王儀忽覽封章之陳懇辭筋力之憊重煩耆哲姑聽便安益固沖和用介壽祉可免赴闕陪位故兹詔示想宜知悉秋熱卿比平安好遣書指不多及賜新除中大夫守尚書左丞韓忠彥辭免恩命不允詔敕忠彥省所劄子奏辭免恩命事具悉卿才推時棟世載王勳先帝所知朕嘗倚用地官主計巳阜邦財省轄提綱擢參國論顧僉言之惟允在眷注之尤深其聽訓言亟踐乃位所請宜不允故兹詔示想宜知悉不許詔敕忠彥省所劄子奏辭免恩命事具悉卿以棟幹之材歷藩朝之寄勤勞著於兩鎮典領載於六曹擢置近司俾承省務乃欲祈於避位豈未體於注懷雖嘉歎之不忘固恭謙之難徇往輔豫治毋煩固辭所請宜不許故兹詔示想宜知悉賜新除中大夫守尚書右丞許將辭免恩命不允詔敕許將省所劄子奏辭免恩命事具悉卿擢自甲科素推國器先朝簪橐之舊巳試其才二丞綱紀之司乃命以位蔽自朕志無若爾宜勿至固辭以煩多訓所請宜不允故兹詔示想宜知悉賜正議大夫知樞密院事安燾特給假候母親稍安日供職詔敕安燾省三省奏據卿狀近為母患未安曽上表劄子乞罷知樞密院除一在京宫觀差遣未賜允許乞進呈事卿位冠樞衡任隆體貌近緣親疾祈解政幾乃眷英髦方仰成而致治固嘗誨諭俾夙退以問安再閲敘陳備形懇至慮闕先嘗之餌特推豫告之恩卿其悉心寧於視膳佇聞病間即造朝趨其體至懷無煩屢請可特給假候母疾稍安日供職故兹詔示想宜知悉賜起復正議大夫知樞密院事安燾上表辭免恩命不允詔敕安燾省所上表辭免起復恩命事具悉卿民宗國器先帝輔臣殫竭一心勤勞八載本兵之政方倚於弼成巨創之哀奄罹於變故既踰易奠之制宜有奪情之恩何執禮之不渝乃上封而固請雖喪期有數難遽抑哀而王事所埤當從權制所請宜不允故兹詔示想宜知悉不許詔敕安燾覽所上表辭免起復恩命事具悉執親之喪情何有極體國之意忠不可忘卿早以經綸之才久參樞管之政惸然在疚猶爾踰時禮固有奪情之文爾尚堅銜恤之志封章茹痛雖諒於至誠墨絰從權亦從於故事勉副倚成之眷亟還機宥之司所請宜不許故兹詔示想宜知悉賜新除翰林學士朝奉郎知制誥蘇轍辭免恩命不允詔敕蘇轍省所劄子奏辭免恩命事具悉論思侍從之臣翰林乃朕之極選文章論議之美當時則爾有重名巳歷職於詞垣復試能於省部良嘉敏譽擢在禁嚴况伯仲之代選亦朝廷之榮觀辭之以義雖諒乃誠用值其才固無所避所請宜不允故兹詔示想宜知悉賜尚書吏部侍郎范百祿進撰成詩傳補注二十卷奬諭詔敕百祿省所上表撰成詩傳補注二十卷裒緝繕寫離為二十册上進事具悉夫六義之文蓋溫柔敦厚之教四家之説有訓詁傳箋之殊雖同出於先儒或有非其本義是使後學各務名家卿博識洽聞留心經術討論之外尤深於詩攬商周之盛衰考毛鄭之得失補注其略紬次成書真得作者之微頗助學官之闕奏篇來上講解甚明研味之餘嘉歎無巳故兹奬諭想宜知悉賜正議大夫知樞密院事安燾生日詔敕安燾卿稟天粹氣輔政纍年方首秋鳴鶴之辰乃吉夢維熊之旦載頒醪餼用助燕私享此多儀介以繁祉今賜卿生日羊酒米麵等具如别録至可領也故兹詔示想宜知悉賜正議大夫門下侍郎孫固生日詔敕孫固候屬首秋月惟初吉實哲輔挺生之旦有上臺寵錫之恩厚牢醴之豐盈助家庭之燕喜往承渥惠用介壽康今賜卿生日羊酒米麵等具如别録至可領也故兹詔示想宜知悉賜同知樞密院事趙瞻生日詔敕趙瞻仲冬初吉良輔挺生方陪幄之與謀記射蓬之襲慶錫以牢醴助其燕私益介多祥以贊豫治今賜卿生日羊酒米麵等具如别録至可領也故兹詔示想宜知悉賜新除檢校司空充保康軍節度使知潞州苗授辭免恩命不允詔敕苗授省所劄子奏辭免恩命事具悉卿稟溫嚴之氣有沉毅之謀擢領十連入長三衛惟拱護周廬之重加訓齊卒乘之勤方倚宿名遽辭苦疾閔煩戎政特徇雅懷易節制於房陵析麾符於上黨中外均勞之寄可謂優隆偃息藩軍之餘無妨頥養復覽遜辭之奏何其謙畏之深雖嘉乃誠難從所欲所請宜不允故兹詔示想宜知悉賜門下侍郎孫固再上劄子陳乞致仕不允詔敕孫固省所再上劄子奏陳乞致仕事具悉繼覩來奏備述至誠既以氣血愈衰為言又以公論不容為懼三復厥旨良用疚懷卿早事先朝位登樞宥之冠入輔台德任隆喉舌之司僅閲歲期偶愆和裕將懇祈於謝事冀自弭於思憂且股肱大臣進退係乎國體寒暑微疾休告具於令文勉專精神毋重憂畏佇聞勿藥之喜入副惟幾之咨所請宜不允故兹詔示想宜知悉賜新除中大夫同知樞密院事趙瞻辭免恩命不允詔敕趙瞻省所劄子奏辭免恩命事具悉卿蚤以才謀擢於要劇忠言讜論見稱二帝之朝武略文經翼我萬樞之務與聞國政已閲歲期特推進位之恩益重本兵之寄尚形固避難即爾從所請宜不允故兹詔示想宜知悉賜新除吏部尚書傅堯俞辭免恩命不允詔敕堯俞省所奏辭免恩命乞知絳州事具悉卿舊德老成中外矚望再持邦憲屢告嘉謀朝有正臣朕所倚賴天官大選久難其人今以命卿允協公論何為遜寵乃欲出麾雖云執謙實昧朕意急服厥職毋用固辭所請宜不允故兹詔示想宜知悉賜新除試御史中丞梁燾辭免恩命不允詔敕梁燾省所奏辭免恩命事具悉卿才推敏明世篤忠厚再登坡省有彌縫衮職之勞擢長憲臺佇綱紀朝廷之益已布綸命遽閲需封夫進無偏私何傷於去就言盡誠實豈廢於亷隅宜推是心亟踐乃位無或固執以稽朝僉所請宜不允故兹詔示想宜知悉賜觀文殿大學士光祿大夫知永興軍韓縝上表並劄子陳乞致仕不允詔敕韓縝省所上表並劄子陳乞致仕事具悉先帝大臣朕所尊禮矧惟元老嘗秉大鈞宣力四朝有勞王室內總百揆著謨明弼諧之忠出殿三秦有鎮靖威懷之裕方圖碩哲為我翰垣再閲封章願還印韍夫引年謝事雖據禮經而體國愛君豈忘雅意宜念始終之義毋煩懇慤之辭益茂逺猷姑安厥服所請宜不允不許詔敕韓縝覽所上表并劄子陳乞致仕事具悉卿勤勞四朝登翊三事先帝用之為棟幹國家賴之如股肱向解政幾出臨藩服咸秦千里豪強戢其風威羌夏二陲種落歸其轡馭何屢形於削牘祈還上於印章况耆老傳家有不得謝而忠臣在逺猶不忘君今卿精力方強志慮彌劭體我注意尚宜悉心毋至多言難從爾欲所請宜不許賜保寧軍節度使知大名府馮京進奉坤成節馬詔敕馮京覽所進奉坤成節馬一十匹事具悉露囊慶節諒同宇縣之歡台鉉舊賢方倚都圻之守逺致材駒之貢來充宰旅之歸嘉乃傾輸良深眷矚故兹詔示想宜知悉賜中大夫守中書侍郎劉摯生日詔敕劉摯日離維斗天生上才出為王國之華任屬政綱之務載臨慶日茂介壽祺言頒燕飫之儀用助祝延之會今賜卿生日羊酒米麵等具如别録至可領也故兹詔示想宜知悉賜中大夫守尚書右丞許將生日詔敕許將時維冬令日在斗維是生王佐之賢適協陽來之序萬機預職六射屆辰出肴醴於上方助燕私於家會今賜卿生日羊酒米麵等具如别録至可領也故兹詔示想宜知悉賜中大夫同知樞密院事趙瞻乞陜西一郡不允詔敕趙瞻省所劄子奏不嚴火禁致焚官舍伏望特除陜西一郡事具悉卿業藴將明任參宥密屬鬱攸之為沴蓋輿皂之弗虞奚為引愆乃求去位况樞衡之所寄方佇於逺猷誠意之雖堅難從於爾欲姑安厥位以副朕懷所請宜不允故兹詔示想宜知悉賜知樞密院事安燾上第二表辭免起復恩命不允詔敕安燾省所再上表辭免起復恩命事具悉春秋之義不以家事辭王事人臣之大節也卿久贊樞機備宣誠亮自聞家難每念愴傷雖深鞠育之恩豈忘荃宰之寄况喪禮從變既苫寢之逾時經義甚明當墨衰而從事煩疏封之再至終朝制之莫違益揚名而顯親是謂孝之合禮所請宜不允故兹詔示想宜知悉不許詔敕安燾覽所再上表辭免起復恩命事具悉乃眷樞臣久任朝政協贊惟幾之務倚注方深自罹何恃之艱哭踊斯畢恩從權奪國有故常再觀封章懇祈終制雖居喪盡禮懷念母之至情而移孝資忠亦為臣之大義宜體深眷亟復近司所請宜不許故兹詔示想宜知悉賜起復正議大夫知樞密院事安燾上第三表辭免起復恩命許終喪制允詔敕安燾省所三上表辭免起復恩命事具悉君子不奪人之喪仁之至也卿以儒學起家以忠純許國方委樞柄奄罹親喪既終奠虞當用詔起墨衰從事禮有權宜苴麻盡哀情在難奪卿既內懷於巨痛朕亦重違於至情良嘉達孝之心聽遂善居之志特依所請許終喪制故兹詔示想宜知悉許詔敕安燾覽所三上表辭免起復恩命事具悉三年之喪百王之所同而古今之所一也自聞銜恤奄忽踰時向之起卿蓋有權制卿之執禮良出哀情雖任重鴻樞倚注方切而痛深欒棘抑奪誠難姑徇至懷益嘉純孝特依所請許終喪制故兹詔示想宜知悉蘇魏公文集卷二十二
