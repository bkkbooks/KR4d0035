body:
  text: 蘇魏公文集卷六十五宋蘇頌撰序補注神農本草總序舊說本草經神農所作而不經見漢書藝文志亦無録焉平帝紀云元始五年舉天下通知方術本草者在所為駕一封軺傳遣詣京師樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋出于此而英公等注引班固敘黃帝內外經云本草石之寒溫原疾病之深淺此乃論經方之語而無本草之名唯梁七録載神農本草三卷推以為始斯為謬矣或疑其間所載生出郡縣有後漢地名者以為似張仲景華他輩所為是又不然也淮南子云神農嘗百草之滋味一日而七十毒由是而醫方興焉蓋上世未著文字師學相傳謂之本草兩漢以來名醫益衆張機華他輩始為之編録耳然神農舊經才三卷藥止三百六十五種至梁陶隱居又進名醫别録亦三百六十五種因而注釋分為七卷唐顯慶中監門衛長史蘇恭又托其差謬表請刋定乃命司空英國公李世績等與恭參考得失又增一百一十四種分門部類廣為二十卷世謂之唐本草國朝開寶中兩詔醫工劉翰道士馬志等相與撰集又取醫家常用有效者一百三十三種而附益之仍命翰林學士盧多遜李昉王祐扈䝉等重為刋定乃有詳定重定之目並鏤版模行由此醫者用藥遂知適從而僞蜀孟昶亦嘗命其學士韓保升等以唐本并圖經參比為書稍或增廣世謂之蜀本草今亦傳行是書自漢迄今甫千嵗其間三經撰著所增藥六百餘種收采罙廣可謂大備而知醫者猶以為傳行既久後來講求寢多參校近之所用頗亦漏略宜有纂録以備頥生毆疾之用嘉祐二年八月有詔臣禹錫等再加校正臣某等亦既被命遂更研核竊謂前世醫工原診用藥隨效輒記遂至增多槩見諸書浩博難究雖屢加刪定而去取非一或本經已載而所述粗略或俚俗常用而太醫未聞向非因事詳著則遺散多矣乃請因其疏据更為補注應諸家醫書藥譜所載物品功用並從採掇唯名近迂僻類乎怪誕則所不取自餘經史百家雖非方餌之急其間或有參說藥驗較然可據者亦兼收載務從該洽以副詔意凡名本草者非一家今以開寶重定本為正其分布卷類經注雜糅間以朱墨並從舊例不復釐改凡補注並據諸書所說無所刋潤其意義與舊文相參者則從刪削以避重復其舊已著見而意有未完後書復言亦具存之欲詳而易曉仍每條並以朱書復言亦具其端云臣等謹按某書云某事其别立條者則解于其末云見某書凡所引書以唐蜀二本草為先他書則以所著先後為次第凡書舊名本草者今所引用但著其所作人名曰某人云惟唐蜀本則曰唐本云蜀本云凡字朱墨之别所謂神農本經者以朱字名醫因神農舊條而有增補者以墨字間于朱字餘所增者皆别立條並以墨字凡陶隱居所進者謂之名醫别録並以其注附于末凡顯慶所增者亦注其末曰唐本先附凡開寶所增者亦著其末曰今附凡今所增補舊經未有者于逐條後開列云右幾種臣等續添凡藥舊分上中下三品今之續添難于詳辨但以類附見如緑礬次于礬石山薑花次于豆蔻扶栘次于水楊之類是也凡藥有功用本經未見而舊注已曾引據今之所增但涉相類更不立條並附本注之末曰續附如瓦苔附于垣衣燕覆附于通草馬藻附于海藻之類是也凡舊注出于陶氏者曰陶隱居云出于顯慶者曰唐本注出于開寶者曰今注其開寶考據傳記者别曰今按今詳又按皆以朱字别于其端凡藥名本經已見而功用未備今有所益者亦附于本注之末凡藥有今世已常用諸書而未見無所辨證者慮其傳聞非審亦所不載如葫蘆巴海帶之類當别為圖經以詳著之舊藥九百八十三種續添八十二種附于注者不預焉新定一十七種總新舊一千八十二條皆隨類粗釋推以十五凡則補注之意可見矣舊著開寶英公陶氏三序皆有義例所不可去仍載于首篇臣等所被校正詔書曰神農本草今既成書因以題篇不復加别號云本草後序嘉祐二年八月三日詔㫖朝廷頒方書委諸郡收掌以備軍民醫疾訪聞貧下之家難于檢用亦不能修合未副矜存之意今除在京巳係逐年散藥外其三京并諸路自今每年京府節鎮及益并慶渭四州各賜錢二百貫餘州軍監賜錢一百貫委長吏選差官屬監勒醫人體度時令案方合藥候有軍民請領晝時給付所有神農本草靈樞太素甲乙經素問之類及廣濟千金外臺祕要等方仍差太常少卿直集賢院掌禹錫職方員外郎祕閣校理林億殿中丞祕閣校理張洞殿中丞館閣校勘蘇某同共校正聞奏臣禹錫等尋奏置局刋校并乞差醫官三兩人同共詳定其年十月差醫官秦宗古朱有章赴局祗應三年十月臣禹錫臣億臣某臣洞入奏本草舊本經注中載述藥性功狀甚有疏略不備處已將諸家本草及諸書史中應係該說藥品功狀者採拾補注漸有次第及見唐顯慶中詔修本草書當時修定注釋本經外又有諸般藥品繪畫成圖及别撰圖經等辨别諸藥最為詳備後來失傳罕有完本欲下諸路州縣應係産藥去處並令識别人子細辨認根莖苗葉花實形色大小并蟲魚鳥獸玉石等堪入藥用者逐件畫圖並一一開說著花結實收採時月及所用功效其蕃夷所産藥即令詢問𣙜場市舶商客亦依此供析并取逐味各一二兩或一二枚封角因入京人差齎送當所投納以憑照證畫成本草圖并别撰圖經所冀與今本草經並行使後人用藥知所依據奏可至四年九月又凖敕差太子中舍陳檢同校正五年八月補注本草成書先上之補注本草所引書傳內醫書十六家援據最多今取撰人名氏及略述義例附于末卷庶使覽之者知所從來餘非醫家所切不復存此本草圖經序昔神農嘗百草之滋味以救萬民之疾苦後世師祖由是本草之學興焉漢魏以來名醫相繼傳其書者則有吳普李當之學録陶隱居蘇恭等注解國初兩詔近臣總領上醫兼集諸家之說則有開寶重定本草其言藥之良毒性之寒溫味之甘苦可謂備且詳矣然而五方物産風氣異宜名類既多贋僞難别以虺狀當蘼蕪以薺苨亂人參古人且猶患之況今醫師所用皆出于市賈所得蓋自山野之人隨時採獲無復究其所從來以此為療欲其中病不亦逺乎昔唐永徽中刪定本草之外復有圖經相輔而行圖以載其形色經以釋其同異而明皇御製又有天寶單方藥圖皆所以敘物真濫使人易知原診處方有所依據二書失傳且久散落殆盡雖鴻都祕府亦無其本天寶方書但存一卷類例粗見本末可尋宜乎聖君哲輔留意于搜輯也先是詔命儒臣重校神農本草等凡八書光祿卿直祕閣臣禹錫尚書祠部郎中祕閣校正臣億太常博士集賢校理臣某殿中丞臣檢光祿寺丞臣保衡相次被選仍領醫官秦宗古朱有章等編繹纍年既而補注本草成書奏御又詔天下郡國圖上所産藥本用永徽故事重命編述臣禹錫以謂考正羣書資衆見則其功易就論著文字出異手則其體不一今天下所上繪事千名其解說物類皆據世醫之所聞見事有詳略言多鄙俚向非專一整比緣飾以文則前後不倫披尋難曉乃以臣某向嘗刻意此書于是建言奏請俾専撰述臣某既被㫖則裒集衆說類聚詮次粗有條目其間玉石金土之名草木蟲魚之别有一物而雜出諸郡者有同名而形類全别者則參用古今之說互相發明其荄梗之細大華實之榮落雖與舊說相戾並兼存之崖略不備則稍援舊注以足成文意注又不足乃更旁引經史及方書小說以條悉其本原若陸英為蒴藋花則據爾雅之訓以言之諸香同樹則用嶺表録異以證之之類是也生出郡縣則以本經為先今時所宜次之若兔絲生于朝鮮今則出于冤句奚毒生于少室今乃來自三蜀之類是也收採時月有不同者亦兩存其說若赤箭本經但著採根今乃并取莖苗之類是也生于外夷者則據今傳聞或用書傳所載若玉屑玉泉今人但云玉出于于闐不究所得之因乃用平居海行程記為質之類是也藥有上中下品皆用本經為次第其性類相近而人未的識或出于逺方莫能形似者但于前條附之若溲疏附于枸杞琥珀附于茯苓之類是也又古方書所載簡而要者昔人已述其明驗今世亦常用之及今諸郡醫工所陳經效之藥皆并載其方用天寶之例也自餘書傳所無今醫又不能解則不敢以臆說淺見𫝊㑹其文故但闕而不録又有今醫所用而舊經不載者並以類次系于末卷曰本經外類其功用尤著與舊名附近者則次于逐條載之若通草次于木通石蛇次于石蟹之類是也總二十卷目録一卷撰次甫就將備親覽恭惟主上以至仁厚德涵養生類一物失所則為之惻然且謂札瘥薦臻四時代有救恤之惠無先醫術早嵗屢敇近臣讎校岐黃內經重定針艾俞穴或範金揭石或鏤版聫編憫南方蠱毒之妖于是作慶厯善救方以賜之思下民資用之闕于是作簡要濟衆方以示之今復廣藥譜之未備圖地産之所宜物色萬殊指掌斯見將使合和者得十全之效飲餌者無未達之疑納斯民于夀康召和氣於窮壤太平之致兹有助焉臣學不該通職預編述仰奉宸㫖深愧寡聞校定備急千金要方序善為醫者察聲色經絡視隂陽氣候以知六疾之所起而致以五辛六苦水火之齊故有通閉解結浣腸滌胃以生易死之妙學其術者大抵以農黃岐伯之經為宗而和扁諸家之說為解漢志所以論著其書列于藝文者誠以歷古所尚王官之守闕一不可也由漢迄唐其道寖廣名醫撰述殆百餘家年世寖逺頗或亡散今之所傳十不存一惟孫思邈備急千金方者首末粗見特為完書然而公私所藏鮮有善本簡編倒錯事理不倫肄習之流常以為患睿孝皇帝至仁恤物留意醫方以謂毆沴淫救昏札保夀命躋康寧無先于此道於是詔命儒臣是正墜失臣某等實被兹選典領有年竊謂孫氏之書精深博贍謏聞淺見誠難究悉乃因廣內祕文及民間衆本道藏竺典旁篇雜子並用搜訪以資參考得以正其舛互補其遺佚文之重復者去之事之謬戾者易之期年切至頗見領略凡得篇目若干門論若干首方若干道總三十卷皆仍其舊體也其間物有多寡權量不同病有緩急湯丸異齊鍊治有生熟之節名號有古今之殊文字假借之相通篇名前後之雜出每用一法皆宜遍知雖有舊凡汗漫難悉今撮其綱條傅以新意别為總例一篇列于卷首將使披文易曉用藥靡差濟世便民庶幾有助於聖治也昔劉歆敘方技為四種則有醫經經方房中神仙之别唐令分醫學為五科則有雜療瘍瘡少小耳目口齒角注之品自是學者各務專門用湯液者或昧於針方習産乳者或乖於雜療自非明智鮮或周知今是書所載始婦女而次嬰孺後丈夫而終耆耋每敘一病皆先論藏府之稟受又辨脈證之盛衰次審砭艾之所宜乃明藥石之相應至于吐納宣導飲食補養案摩符禁黃冶丹石衆術咸備靡不臻妙所謂兼劉氏四種之技通唐令諸科之學信可與前古經方相為表裏固非世醫常流所能倣佛也謹按唐史思邈京兆華原人生于周齊之間而卒于髙宗永淳之世蓋不啻百嵗人也少善談老莊兼綜釋典百家之書後隱居太白山數被詔起固辭祿仕當時知名之士多師事之盧照鄰嘗問名醫治疾之道思邈以天人相質之說為對照鄰深加嘆伏為敘其事云道洽古今學通數術髙談正一則古之䝉莊子深入不二則今之維摩詰觀斯言與其著書則其為人可見矣臣等固陋之學論次不精仰備奏篇深慚抵牾後序孫氏之書特為精博蓋以祖述農黃之㫖發明岐雷之奧太古以來竒經祕論無不該綜誠非近世醫流之比擬也臣等既因被詔得以詳求觀其書中引據可以槩見者多出素問九塸靈樞甲乙等經黃素録帙太素巢源古今本草諸家脈法張苗藥對陶𢎞景論廣劉涓子鬼遺等集金匱玉函肘後百一葛洪必效姚僧垣集驗陳延之小品謝士秦刪繁胡洽郭玉范汪阮炳等方今並參檢本書以正得失其書不傳者則又兼用後人所著出於孫氏者以為證比若五鑒經獨行方崔氏纂要延年祕録外臺祕要正元廣利李深之手集劉夢得傳信諸方之類亦旁取其所引用以相考質然後遺文疑義瑩然可明又觀前代名流所著醫方往往雜以古人方論不顯所出殆難尋究惟陶隱居廣百一方王道纂外臺祕要多標題其書名最為明白可以參求今以二書驗之則諸家之菁華悉為孫氏採擇矣而世俗妄人乃稱海上龍宮之事以附致為據誠不足據也近之知醫者每嘆惜前古方書亡失者衆若能盡心於孫氏則其思過半矣謹按孫氏千金方外又有翼方月令等書當别從讐校以備頒行此不復悉論也蘇魏公文集卷六十五
