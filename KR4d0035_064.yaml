body:
  text: 蘇魏公文集巻六十四宋蘇頌撰記江寧縣令題名記縣令題名舊無其傳某始到職以非便民先急之務而未遑經營也一日鄉民有訟田者辭連數室咸造于庭紛辨交爭初莫能決訊其劑約則曰亡之矣訊其移受之始曰不能記矣所能言者某令時接某事至某之隣鄉實某祖受田立籍之嵗也縣有版籍蓋載之矣因求其令在事之年而邑之胥吏皆無能言者乃為之捃摭數十年簿書始見其令之官氏閲其籍果得訟田者之祖名具載其地數而侵冒者乃詘某于是歎曰昔之居官者去而留名氏紀嵗月于府寺豈特好事者為之哉是亦有謂爾斯獄也以令之官寺乃得致訟之嵗月因版籍而後知民之情偽版籍雖具而民不能言其嵗月縣令雖去而民猶能言其為治之迹是令去而題名于後不為無益于治理也于是條令前令官稱姓名起開寶李氏去國郡邑歸職方始命王官迄兹慶厯六年凡七十載歴三十八令而拙者繼焉因命礱石紀其交承之次第龕于㕔事之壁間非惟紀乎嵗月而已又念夫居事職者坐廣居享豐禄假天子威刑案籍以莅職事其不能厪體以督簿書之務平心以待生齒之訟殆非朝廷所以建官分職之意也矧在是邑密負大府號為望縣其地之廣袤百里有畸編户逾二萬而間年逋逃未復者且千齒倍户有半而𨽻名于力役胥徒者幾三十之一其賦徭之重輕資貨之移用兼并之强弱紛爭之是非蓋日有焉一繫乎長人者之決之也苟失其當民實受弊在治者得不為之用心哉故予因紀年而又論政又書其命事之由于左方將以告于民官庶幾悉意民務毌俾其人曰某令者治某事而非是吾將何告焉姑待來者聴治之非惟警于來者抑將以自警焉則曰升斯堂而受牒訴舉而視之曰前日某事其人稱某令之不治則予之弊事是必將審覆其詞而求索其情亦冀臻夫理而少紓其責也起居院題名石柱記國朝淳化中始命史館修撰梁周翰直昭文館李宗諤知起居郎舍人事番直便殿以備左右史之職未幾更曰同修起居注常以館閣二人兼領之天聖景祐以來其選益重至有載筆未及書事而遷職禁序者嚮非久於鉛槧或已陟近省則莫得而進補焉院在朝堂西便門之左廡舊有版記載到官去事之嵗月訖治平初而版盡不續于是資政邵公始議易以石柱六年于兹礱劖甫就凢書記之法姓氏官代先後相續一用舊次間或差漏則以記史訂正自梁李至今蔡孫二君總百四人二君以謂異時省寺始至之日皆親題名于石而近之由是職而上遷者多在朝廷將修臺閣之故事宜得羣賢之翰迹用是歴請自丞相魯國公而下得手筆者十六人不鄙謂予曩嘗承乏俾叙事始刋于左方若乃陟降軒墀書記言動以簡牘之任而列從官之籍地清而近事守隨重故題述之義不獨矜仕進之榮遇亦所以䖍君命而謹職業則後之繼踵而至者豈得而廢兹熈寧年月日審刑院題名石柱記府寺題名所以記初拜職者官秩名氏暨臨涖之嵗月蓋有司榮事任而警位著也審刑院舊以版記揭于楹間年世寖逺鉛墨侵剥殆不可讀熙寧八年正月院長主客郎中崔君易以石柱冀堪永久其題自樞密直學士李公昌齡而下至君凡一百一十九命總九十七人先後相續書用舊法謂某嘗更承攝且繼先人之緒業宜詳知本末見屬敘事以記更置之所自云國初革五代因循之弊臺閣故事草創未具天下奏獄但𨽻大理刑部二司議上政府進熟報下即決太宗皇帝仁明撫運燭見至理以謂文吏巧詆不盡哀矜執政大臣非所以責于平亭也于是特詔以淳化二年八月置院禁中命近臣一員知院事以朝臣六員為詳議官專治斷讞不兼别務其廪賜優異燕見欵數固不與諸司等比凡州郡重辟之疑可矜若一命私犯罪笞以上之罰與夫律令格勅之弊當更者皆先由大理論定然後院官參議議合然後覈奏畫㫖送中書案實奉行其慎重如此非特獄無枉濫而巳毎嵗天下之奏常以千數多或倍之其間情涉巨蠧論如律者百纔一二餘從末減不下千人計淳化迨今八十年間其獲全貸䝉自新之人且十數萬矣而吏之承流任事深知上指其聴辭弊訟求所以生之者又可勝記乎議者咸曰用法平恕自書契以來未嘗有也竊尋經傳所載聖王賢主所以慎用刑誅有曰辟勿辟之戒三覆五覆之慮謂之盡矣然皆事出一時非有成憲貽于後代若我朝累聖繼承惟刑之恤遵用寛典百年不易者而復吏競其職上下循持杖笞輕科無得擅用禁令纎悉隄防完密雖施之萬世知其不可易也而有司欲通明創造之意㕘求事理之實將以毗助至治豈易其人哉前此常用禁省名臣委以事柄外廷郎列稀得預選崔君歴試斷議以文無害特膺器使居位四嵗號稱辨職故久留不代方且䖍恭朝夕以宿其業題刻之建意在善守前憲使來者覽觀因以知本朝祥刑之明理官稱選之艱又將盡心于侀成其於治道豈小補也我院舊在中書西南隅嘉祐四年詔徙于右掖之西墉外石柱置于㕔事之東廡云潤州州宅後亭記吳楚之俗大抵信􅷛祥而重淫祀潤介其間又益甚焉民病且憂不先醫而先巫其尤蠧者羣巫掊貨財偶土工狀䕫㺐傀鬽泆陽彷徨之象聚而館之叢祠之中鼓氣燄以興妖假鬼神以譁衆竒衺譎觚之人殖利擅私公行于道顧科禁莫之警也甚矣風俗之窳薄若是長人者獨不能矯其枉而率諸正乎慶厯七年祠曹員外郎彭城錢侯以方聞署等來作民牧下車之初視庶政之苛慝與習俗之抗弊既興且治之細大之務銖兩之奸無所容惟是里巫之盭俗始未及治明年夏有挾鬼説以邀賄于郡官者吏得以白即命寘于法因大索他黨悉鉤致之斥巫師者數十撤房祀者十餘土木幻誕之容碎于庭幃床供具之器籍于公架梁植楹蓋瓦級甎積以萬計視之皆良材而有用也乃相治署之西北墉得廣輪方十弓之地有軒宇遺基在焉髙山環前長川帶旁下視郛郭闤闠鬨然可以覽土風眺形勝察民物于是頤指工人構亭其上凡功費之給畢出于廢祠而無一簮之財取于官府既成題其榜曰某所以志革弊且勵夫汙俗也官僚之暇從賔客以臨之或目其題而贊之曰美夫吾侯之作斯亭也其有意于民乎因于神巫示昏淫可化而為敦龎也揭石以寄政欲編户曉然論善道也引美以為戒惡夫流弊久而復遷染也登髙以省風雖在豫遊不忘乎拊封畧也昔狄梁公之拊循江表李衛公之㢘察是邦皆嘗翦除淫祠澄清郡邑當時美之唐史稱焉紀風俗述政事其來舊矣是亦君子善政之義敢鑱諸石以書首事示將來成賢侯之意不以無似見命之辱竊謂是役也既始于巫蠱而終于戒後是豈獨為觀遊燕嬉而作也故著其大者宜詳小者可畧後之人登斯亭覽斯文由是知良二千石政事之美本乎革風俗而一中和也澶州重修北城記澶古衛地也在春秋時嘗㑹十一諸侯盟于此歴唐五代暨我朝皆以名州既而又表其軍曰鎮寧以重之自京師在汴是為北門之屏憑深搤衝襟帶燕魏蓋河朔一都之㑹也州本治頓丘晉天福中始徙于徳勝寨方其徙時出多故倉猝間即用舊址挾河橋為二城其規撫固已陋矣而河濱之土踈惡善隤北城之隅復當三掃之敝夏秋洪流暴溢浸淫泛濫大為州患急則料民而繕治之完而復圯者數矣慶厯中州使嘗有增築之議更三太守或營或止卒不克就治平三年三月給事中天章閣待制李公既領州事患其所以然也將踵前議而即新之詢之屬僚屬僚協謀請之朝廷朝廷曰俞于是工人程其能羣吏謹其職揆以間月授以事期引鐵丘之土以易朽壤市津門之木以增崇構調赤籍之伍以紓民力資囬圖之錢以省官用始築于九月二日甲子考成于十一月二日甲子兵馬鈐轄某官某某官某實董其役通判軍州事鄭某田某總領而臨涖大凡役六邑義勇兩埽河清諸舖兵總若干人為城五千七百七十步有畸而外郛水濠之長如之為輣樓五百一十一間而團敵馬面之制隨之西距河壖别為長堤三千五百三十歩所以止横水齧城之害也並壕外向植桑若棗若干株所以代枳棘藩落之衞也直城東西隅斷堤路増二甕城所以絶冦騎奔突之患也惟是郭門之器守禦之備莫不増舊而加葺焉臺髙而塹深下厚而上閷其堅足以遏湍悍之流其壯足以侈華裔之觀非夫智以經之仁以臨之則詎能即卑為崇撤故為新舉一日之力而收永久之利耶昔春秋所記諸侯之事而土工無大小必書然其美惡或不同者皆指事示後以為法戒也其曰夏城中丘者以重其書也謂其弊不早完使至大壞方夏勞衆而城與始作無異故重其事而譏之其曰冬城諸及防者以時而書也謂其戒民備物興徒竣事皆在農隙之月故謹其時以善之是役也因基于前謀及城之未毁戒夫春秋所謂重者也自縮版至于工休不盡中冬合乎春秋所謂時者也故作之不勞而成之如素宜其書以告夫來者嗣其休利而裕民于無窮也公名中師以文學政事陟從官治澶踰年而召歸方且大用矣慶厯三太守者某州防禦使郭公承祐龍圖閣直學士張公奎翰林侍讀學士葉公清臣也揚子寺聱隅先生祠堂記聱隅先生祠堂者江都縣宰承議郎羅君適所建也先生建安黄氏諱晞字景微年少時以有道稱于閩中泉南陳侯靖福唐陳侯絳在郡日爭以禮延請躬率諸生試聽講義于時士人習尚章句務為竒靡先生獨好古學不與衆合嘗倣論語法言著書千篇其發明聖賢道義之隱微與古今治理之得失詳矣自題其篇為聱隅子欷歔瑣微論其解曰聱隅者枿物之名欷歔者兼歎之聲瑣微者述之之謂蓋自因言以顯志也景祐中先生年四十矣始隨鄉貢至禮部又上五十䇿求應直言詔科俱以後時不得與試已而歎曰老大不偶若此豈能復從諸少年校程式于場屋間乎可以逝矣然欲閲天下義理觀未見之書莫若居京師為得計遂僦舍僻處而士子競造其門先生之學無所不通尤潛心者春秋易也其説以左氏凡例為得聖人之微鄭康成象數極天地之緼學者校量攻擊終莫能窮奥穾丞相武寧章公以其鄉人召置門下權利所處非所樂也時我先人方在臺省早聞其風下榻以招之先生欣然相就既一授館凡歴五期某日與之遊切劘論難愈久不窮後十餘年某復仕朝廷先生猶居陋巷晏如也又著揚庭新論十篇其指陳當世之務有若言禮樂述作之所由則太常卿論是矣言郡國武備之廢置則九州刺史論是矣餘篇悉然盖欲見于行事者也方是時公卿大夫交章論薦者數十人朝廷用丞相韓魏公言將以為國子監直講先生自謝于富丞相曰老生豈任仕宦者耶必不可辭願得七品閒官還南方足矣仁宗皇帝聞而異之特詔授太學助教致仕從其志也嘉祐二年四月無疾卒于隆和坊僦舍死之日囊無餘資惟所蓄書數萬巻存焉一子在逺不及治命門人范遷張粤議以某為知先生之深者宜主其後走僕來告某即日往哭其尸為買棺就殮且謀寄骨郊寺翌日魏公遣使為幹殯具又奠之以文其畧曰先生之道徳不用于朝宰相之過也聞者莫不痛先生之有時無命而稱魏公之推賢抑已也未幾其子某自南方來挈旅櫬載遺書以去過江都稾殯于揚子寺後圃既而交游故人共為復土就塟其地其未塟也川陸之經由者識與不識皆過其下咨嗟留連或為歌詩哀辭或書名屋壁至于木膚竹簳題記殆遍其無位而得民至誠而感物近世未有也羅君涖邑之始首來奠謁因覽封鬛黯然悽愴且謂大儒不祀後世何觀昔汝南先賢列城圖其像有吳君子仲尼表其墓思人尚徳由古而然于是即其故墟規度餘地增土於上者幾仞構堂其旁者幾椽設像中楹儼乎惟肖凡材力之費悉出俸泉不勞于人已日而就兆域有表松檟有序所以示乎來者盖有激于風義落成之日逺近來觀且欲記其經始之由載其始卒之行刻諸金石託文舊交予惟先生之道生不得亟行于時死而有名卿巨公周恤其後事嵗月久矣餘芳邈焉又有賢令宰為之封植幽壤表章令名則後來之人有踐斯地登斯堂挹先生之遺風知大雅之不改雖綿禩寖逺棟宇其頽又將繼而新之廟食兹邦垂範來裔孰謂先生無後乎沂州氶縣崇勝寺重修上生院記崇勝古寺也在氶之西隋開皇十六年初建于甑州號維衞未幾與州俱廢至唐初復興歴載三百州縣或降或徙而寺不復毁國初太平興國三年遂賜今額而隸邑籍焉由寺之西序其别院曰上生實行凝海靜二上人之經始也凝東京人少受具于景徳寺西禪院有經論學通上生百法二教開演既久學徒寖廣應請兹地遂為下方至則視棟宇之摧落風雨無以庇覆乃條其佛事之不如儀者以告于邑人謀所以新之積勤累勞垂二十年而基構就既老且死衆以其事屬于靜又八年乃克成之凡為屋僅二百楹堂皇階庭門阿環合佛寢僧廬亦既完具又冶鐵為像三十一軀坐立侍衛品地有序圖形賦采悉如教相于是緇徒知所以宴息里閭知所以信向或曰兹吾邑之榮觀不可以無紀也靜乃狀其事因宗秀師求文以劖于石秀愿士也往來沂魯間尤樂其土俗以謂氶本蘭陵故地多楚漢聖賢遺迹是宇也雖無竒偉絶異之觀而當往來走集之㑹將勤館人此焉其歸予雖未嘗過而游之然而望荀卿之舊邦想二疎之清塵因欲載文其地以寄懷古之思異日有來觀之當為我留連於兹以訪耆舊之遺説也靈香閣記棟宇可以庇風雨臺榭可以逺燥濕庭除可以肅賓客山川可以廣眺望此居處之壯觀也而為浮屠之説者則不然曰不閎偉不足以容衆大不盛麗不足以來信向故惟善經構增飾窮年而不已既而已閎麗矣而吳越之俗猶以為未也丹雘金碧斵礱炫熀至于殫人之財極工之巧而不知止故其山林之峻深郊郭之爽塏幽人之所卜智士之所營非為浮屠者不得而居有也思允師居睦州兠率寺之法華院佛學之外兼妙岐黄之術有以疾病告者必盡其技而為之診視凡湯液之所餌砭針之所加無不如期而應自郡官至于編户皆稱其方技之神良而功施之周普由是車馬之踵門者日月相繼而不絶也常患其居宇之湫陋賓至無所容遂闢故址革而新之又于其傍為閣五間楹桷崇髙軒檻虚明經像嚴于中草石蓄于次齋房客館左右布列藥欄花圃前後相望升其堂則聞芝术之芬氲游其庭則見竹樹之䕃翳雖密邇闤闠而山居巖處之趣備焉考成之日太守集賢王微之率賓僚燕飲其上且嘉儲峙之美因題其顔曰靈香又賦詩以紀其事繼而作者貳車史館劉元忠也觀二詩則院與閣之所有皆可見矣後三年予自東陽赴亳社憩郡郵㑹故人留止過允之居因得一遊目焉嘗謂桐廬郡溪山之清絶自晉宋以來文士多稱述之往往載于題詠觀夫城邑閭井皆坦塗平陸蓋與他州無有異也及登髙而望則羣峯回環一水縈帶烟雲晻靄朝暮異狀不離指顧而萬景在目信乎吳越之佳郡前人之所稱詠不為虚談也而兹閣又占一郡之勝處髙髙下下皆有幽致足為端居造適之樂復以甘辛寒温之上味給人朝夕之求其為利固巳博矣然則不得與夫競土木而誇閎麗者並也宜乎微之元忠嘆賞之勤勤如此因書所見以繼二詩之後云温州開元寺重修大殿記古聖人立言垂教皆所以長世而利物也至若道被幽顯而不遺事見乆逺而易信者其惟浮屠氏之法乎自中國逹於蠻夷自郡縣至於鄉聚凢在含識無有愚智一聞其說靡不歸誠而信向焉由漢迄今千有餘嵗雖世教有隆替而佛事未嘗廢絶者以其為道一本于人心人心欲安樂則曰積徳重者能享之人心惡罪苦則曰殖福厚者能去之故塔廟布于四方像設備于家户猶以為奉之未至也今夫吳越之俗以熏修相勝至于傾竭財力而不為勞崇飾土木而不知止是孰毆之使然耶皆至誠悃愊生於信心故莫之能禦也先是永嘉郡火始作于民廬延及官寺遂逮僧舍所謂開元寺者東南之壯觀也一旦煨燼人用愁戚其欲興造切于巳居寺僧擇隨素有行願知衆人之所欲為也于是盡發私橐以圖修復之役且謂築室者始乎成寢治寺者先乎抗殿乃即故地規創新宇料工度材初亦無求于外而郡之大姓聞風響應願心而樂施者不謀而同締構有日矣適㑹擇隨順世其徒曰有英等六輩閔師之艱勤齎志而殁共誓勠力繼成其事指期促辧卒亦如師之素焉稡其資費幾數千萬凡為殿之堂室暨四旁環屋曰遊巡者總三十有一間其崇七尋其深倍之其廣益深之半中楹塑大像者三左右立像者十妙嚴之相髙廣之坐瓔珠之具金采之飾一倣其教之所述焉既而緇俗競勸合為廊宇房闥者繼踵而畢事不及三年重門周閣廣居大厦巋然如初而閎侈巨麗又非疇日之儗也按寺本東晉郡人李整之所捨宅也歸佛于大寧之二禩得號于開元二十六年中廢于昭肅之初復造于宣皇之季火于治平之乙已完于熙寧之癸丑六百年間再毁而再復終不可廢也向非人情之所欲為與僧志之不可奪則詎能集大縁于一時復已廢之頽址耶夫人情之所欲為功雖大而易就蓋不强之使然耳下之人能不强人者其興事也猶若此之速然則為治者亦有不强人之政乎以之興事而就功況于是其猶反掌歟熙寜十年三月二十二日錫山唱和詩石刻記先公宰無錫日某方在羈貫稍涉人事因得拜接邑尉竇公總之特䝉知奬相與亢禮公以文學登雋科尉大邑先公器其才識期以逺到毎賔從賞㑹莫不同之或遇欣適則形于篇詠時公春秋方盛未有嗣子嘗得異夢先公為之占曰是男子之祥且貴兆也後十月實生彥法天章先公即日以詩慶之有仙果遲遲生海中平時曽説夢維熊及駟馬定應髙慶閥五龍從此繼英風之句某親侍左右目覩其事無幾何薄祐早孤流離多難數與公相遇顧愛益親後彦法擢殊科某叨預考官獲觀奏賦既而復同館閣不替世舊猥以父執見推不幸二公相繼殂謝再有寢門之慟前嵗小子詒作尉兹邑值公之季子亦領丞事父祖舊治繼為同僚累代周旋風義尤篤一日詒於僧舍得唱和遺篇方且更以石刻縣丞君以為當時事迹莫若某經見之詳以書見抵俾敘始末某追念疇昔忽五十年罄僾緒言才若俯仰因念昔人有居父官不敢當舊位坐臥皆易其處前史稱之今丞尉卑秩而所居又非舊位雖無可避者然而井邑亭舍欵識猶存嵗月緬然手澤未泯吏民觀者猶有餘思子孫對之能不感愴某既嘉縣丞君不忘先志又喜詒繼託末光而某雖未嘗從事于彼然得綴名于後亦足以慰逺慕之懷兹為願幸也故敢備言之若其諸公官伐洎題載嵗月詒已敘于前兹不復紀刋石後月日具官某謹記蘇魏公文集巻六十四
