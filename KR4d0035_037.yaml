body:
  text: 蘇魏公文集巻三十七宋蘇頌撰表謝改祠部貟外郎臣某言今月日進奏院逓到官告勅牒各一道伏蒙聖恩特授臣尚書祠部貟外郎依前充集賢校理散官勲封賜如故已即時祇受訖者南宮地要左省資清由考課而叙遷顧濫官而有愧寵光所被震惕兼常臣某中謝伏念臣本乏異能惟耑樸學始以文詞而得仕寖階儒雅之並游校石室之書未終編次綴金閨之籍乆汚周行間叨出守之行頗遂自營之便洊更内外靡効涓塵徒殫累乆之勤甫應攸司之比曲推天奬擢寘郎曹仍因詞館之舊規得躐冰㕔之近署仰承渥命實為非次之榮俯揆庸材奚稱清班之選此蓋伏遇尊號皇帝陛下推至公之厚德録羣下之小勞發絲綸之言出而彌大霈雨露之澤惠以無私曾是逺孤均蒙况施臣敢不祇循謨訓益厲公忠州郡之政雖未優敢忘盡力朝廷之恩得其報豈憚捐軀瞻望闕庭臣無任謝改度支貟外郎臣某言進奏院逓到告勅各一道伏蒙聖慈特授臣尚書度支貟外郎依前充集賢校理散官勲封如故臣已即時捧受訖者大明升照幽遐皆瞩於輝光麗澤周流品物咸均於膏潤顧惟州郡之列外隔雲天之瞻例沐朝禧叙陞官次對南宮之清選荷中詔之優除拜賜以還措顔無所臣某中謝伏念臣僻儒陋學衰緒孤生始充賦於有司遂䇿名於乙等脫巾從仕寖牽俗吏之為給札試言俄玷文林之選既效刋讎之業復參典領之司賛緝禮於奉常預紬書於天禄棲遲數職渉歴八朞愧非博洽之能靡有發明之效毎循涯分敢計淹通向以私便而自陳蒙假近封而試守出頒條詔姑度時之所宜上體朝廷惟恤民之是務徒内殫於心慮曾未效於毫分昨者伏遇皇帝陛下纂紹丕圖發揮鴻業遵累朝之成憲推大賚之殊私施命以誥四方仁無異逺猶天之運一氣物悉由庚而臣恪守藩條親逢邦慶方切傾陽之志遽叨増秩之文左省通班猥被殊常之擢下邦冗守益知重外之榮揆省非才悸慙厚渥雖官仍古號無職業之當遷而恩出宸慈顧寵名之難稱敢不恭於授命勤以首公勉修政令之宜兾有㳙塵之補少收薄最上報盛時臣無任淮南轉運使謝上臣某言臣昨自三司度支判官伏奉勅㫖蒙恩擢充淮南諸州水陸計度轉運使兼本路勸農使臣即以七月十五日到本任交割職事管勾訖者賛畫甘泉乆玷三臺之末觀風淮甸驟陞數使之榮朝寄非輕地望兼重愧非才選靡稱厥官姑謹詔期趣行所部寵靈所被畏惕非常臣某中謝竊以州郡備官所以分釐於民務朝廷遣使所以宣布於主恩付一道之事權用六條而舉察賦輿出内俾以均輸吏治否臧責之薦黜自非綿更於事任渠能振肅於治綱若臣者才不足以適時慮不足以經逺偶縁資級之例得從選用之階始自書坊出分使竹俄從寰服入佐計籌粗收歲月之勞蔑著毫分之效豈謂伏遇皇帝陛下察庶工之任事矜乆職之良勤拔於省僚授以利柄矧惟淮海之部寔搤東南之衝昔號奥區今逢樂歲五稼盈疇而遂茂四人勤力以厚生料乎漕運之程無煩趣辦之急惟當敷宣惠澤通究物情編齊之利病可更必求其本刑政之重輕或失當適其中止期嘉靖少稱掄擇若乃事體貌以為風采盡銖兩以歛民財顧在懦愚誠多闊畧重念上慈天覆聖治日新官無内外之殊事悉憂勤之繫昨臣受任之始獲面於清光陛下臨遣之言曲加於勉諭自省最為於疎逺何圖亦記於淵衷豈非以委任之優故特示拊循之厚雖乾坤平施非報謝之可言而犬馬微生苐勤勞而思奮倘馳驅之有用期終始以無渝瞻望闕庭臣無任潁州謝上臣某言昨奉勑差知潁州軍州即以三月五日到本任赴上訖者初蒙補郡遽忝近封内省非才奚堪優命始受䖍君之署即頒問事之條思職當優以榮為懼臣某中謝伏念臣顓侗所禀識藴無竒承家學之緒餘冒詞科之等次獲參仕綴甫狃吏文以小材積日之勞例遷散秩預尚方給筆之召遂齒清流暨入直於文林亦更塵於事局賛奉常之典禮講練非精定廣内之圖書繙酬未究竊自營於私計因上丐於外官國體務寛詔恩垂可析半符而付畀假便地以優容恭惟至治之辰方重長人之吏惟良而與共此深軫清衷選賢而欲安之訖臻善化矧汝陽之故壤控淮服之上游民承艱食之餘朝舉救飢之政向非㢘平之素著豈稱選俞顧慙空薄之無聞謬膺寵寄此蓋伏遇尊號皇帝陛下髙明委鍳造化財成任官惟賢非有内外之異授人以政將觀治理之能弗間孤愚均令任使臣敢不勤宣上德勞徠斯民夙夜罄於一心躬親輯於庻務簿書細故必嚴期㑹之程獄訟羣情當適重輕之典倘收薄最是答鴻私瞻望闕庭臣無任謝弟梲授秘閣校理臣某言臣伏見今月二十三日詔勅蒙恩以臣弟尚書虞部貟外郎梲守本官充秘閣校理者振滯之舉實曠世之罕逢遭時之榮顧一門而特盛父子相望於近序弟兄繼踵於鴻都豈伊逺孤遘此殊遇臣某中謝伏以校文中秘儒者美官預臺閣之漸階以鉛槧為職業朝廷育材之地禮待之甚隆公卿薦士之科推擇之尤遴載念臣之末緒梲也無聞姑用先臣之素資得通閨籍而叙進粗承家學未䇿世科㑹英皇帝閔詞館之寖微命政事府論士林之逸滯詎期柄弼輒以名聞時方困簿領之迷疇敢覬圖書之選重明繼統前詔遂行收從甸服之還許試複門之禁推恩特異予職過優以平進常調之流陞名於天禄非大雅博達之士簉跡於俊躔豈惟叔氏之冒塵抑亦臣愚之厚幸此蓋伏遇皇帝陛下廣人文而致治遵聖考之成模捜揚巖穴之遺間用衣冠之族布春澤之潤自葉以流根舉泰陽之征拔茅而連茹使臣同氣之賤繼忝登瀛之游載世光華多士稱詠臣敢不念教忠之訓戒異物之遷一心首公百為盡節雖簡編之任未能酬天地之恩而手足相維庻可展股肱之力用兹勉勵少答生成臣無任謝知制誥臣某言伏奉制命䝉恩特授依前守尚書工部郎中知制誥告謝日仍面賜金紫章服者非常之命忽降於中宸逺至之人驟陞於邇綴矧演綸之職峻顧發藻之才微冒服寵靈深懐愧惕臣某中謝伏以王言所記寳訓具存欽明濬哲之君有二典以載其道仁義公恕之主因七制以見其心蓋君臣之吁俞或號令之宣布非言無以盡戒敕之意非文無以揚鼓舞之功下更十代之紛紜皆備一朝之制作其事則雅頌之各異其辭則體要以為先惟是代言之司實專起草之事相沿往範罙號要塗地親法從之聮官列近司之属分曹領乎六押時預邇謀判事謂之五花間參疑議豈徒取揮翰之士蓋亦藉幹時之良用人其難歴古所共肆我朝之致治遭列聖之右文世有常楊之倫入居詔誥之任由是百年之盛德逺追三代之髙風興闡大猷雖本聖朝之獨運潤色鴻業亦資儒雅之敷揚向非博達之流加有精通之識髙文大冊可以發揮治功忠言嘉謀可以禆助聼㫁則無以茂膺華選克繼前修如臣者衰緒微生寡聞淺識少而好學竊慕聖賢之所存勞而無功遂以顓愚而自守夤縁科級渉歴士階始課簿書之勤稍遷京寺再叨翰墨之薦獲玷詞林亦甞典禮曲臺校文中秘假麾潁尾案治寰畿賛大農之計籌預商利筦持使者之華節薦領事權奔馳未效於小勤趋走遽䝉於迅召超從冗外入奉清閒對仗分班幸識侍臣之貴研螭記事多慙良史之能每懐踰分之憂姑守宿官之願不圖進拔特出睿衷命試可於公槐遂躐登於星掖拜恩之始亟瞻省戸之光占謝之辰仍被服章之賜不日改士倫之觀在臣為曠世之榮重念亡父先臣被遇仁宗甞登西閣歲月裁踰於二紀寵光復逮於孤臣識謝文饒豈練朝廷之典故才非百藥猥居父子之世官徒驚後拜之優莫繼先芬之善感極而涕隨言發愧深而汗浹顔間將何以荷累聖之深恩對一門之盛事逢辰至幸撫巳愈輕此蓋伏遇皇帝陛下摠攬權綱慎徽典則謂祖宗之制皆可舉而行惟臺閣之模以得人為盛因掄才於珥筆使賛命於出方靡由左右之容俯收積累之效擢之清禁寘彼通班臣敢不厲志冰淵潛精簡冊早暮百思於事守終始一志於公忠裁渙號之文慎於返汗念謇臣之節期以匪躬兾成㳙露之勞少答髙旻之施臣無任婺州謝上臣某言昨奉勅差知婺州軍州事已於二月二十四日到任訖者濯巳然之深咎推不次之優恩析以省符委之州政彷徨去國徒結戀於軒墀黽勉之官良有愧於民吏臣某中謝伏念臣賦材不厚學道甚迂偶肩羣俊之彚征薦荷三朝之樂育典藩將漕校治迹以無稱載筆演綸㸃榮塗而有日向縁職守輒議詔除蓋狃習於故常致乆格於成命稽違有禁合寘於嚴科在宥推仁止鐫於近籍恭趨朝請甫越歲華属均宗祀之釐遂假東陽之守川塗累月間關百憂敢辭逺道之勤實懼嚴程之過適臨治所載惕愚衷祇服寵光罙深感涕此蓋伏遇皇帝陛下堯仁天廣周澤海流躬摠攬於萬機思慎用於八柄以庸制祿效雖薄而不遺觀過知仁情非故而或捨顧臣無狀受賜實多始收擢於逺孤終含容於狂妄率由洪造曲示矜全臣敢不祇省前愆勉思後效奉六條之戒敕一禀新書使七邑之黎萌咸知上意倘涓埃之可集在夷險而不渝亳州謝上臣某言昨知婺州伏奉勅命就差知亳州已於三月二十七日到任訖者山城逺守方待罪以靡遑圻輔名封忽䝉㤙而内徙出南陬之卑陋從寰内之便安涖職之初省躬無措臣某中謝伏念臣噐非閎達性本顓侗蚤仕周行寖塵榮仕先朝寘之詞館粗歴中外之煩陛下擢之掖垣乆侍清閒之燕然以才微寵過效薄釁深果積愆尤上繄含貸還省曹之舊秩日奉外朝剖使竹之新符出為方郡甫周歲琯未著事勞不圖易地之優遂竊維藩之重矧臨渦之奥壤連象日之中畿賦役平均被周官輕近之惠詔條明備邁漢家畫一之規其在長人之官足以循法而治豈兹棄置宜稱拊臨此蓋伏遇皇帝陛下天地生成山川藏納念甞任使猶齒録於姓名拔於逺孤就付畀於垣翰顧臣無狀寔惕優除惟當上體朝廷一心政事勤訪生民之利病使知睿主之㤙仁兾桑榆之可收誓堅晩節倘塵露之有補豈吝微軀謝集賢院學士臣某言一去禁嚴再逢郊霈荷言綸之優奨進書殿之華資追訟前愆震慚新寵臣某中謝伏念臣瑣材近噐淺識寡聞偶由鉛槧之勞稍躐閨臺之序履歴中外不離刀筆刑名之間拔擢顯華遂階言語侍從之列每念逢辰之幸㑹常期盡瘁以匪躬當官而行竊效古人之守不學無術尚拘流俗之為果自觸於嚴科坐鐫除於近籍奉朝逾歲姑勤夙退之恭假守二藩已就外遷之例不圖名姓尚簡纊旒未終更戍之期忽被召環之命入趨嶢闕賜對便庭親承德音俯慰沉跡寒蟲蟄戸聞震虩而知出幽潜宿草陳根煦春陽而復有生意俄獲典司於武選所忻復望於清光退省已之昨非惟刻心而自咎伏遇皇帝陛下躬圎丘之大報徧寰宇以均釐刮垢滌瑕物沾再造之施振淹起廢人賴曲全之私夫何釁累之餘荐沐生成之惠寘之儒職復以榮塗恭以國家恢振治綱一新政體聲明紀律髙出於百王文物衣冠畢登於羣彦惟麗正圖書之府盛開元禮樂之司宜得豪英為之領袖豈容蕞陋遂㸃品流重念臣早預校讎殆周旋於二紀今叨選用復冠冒於諸儒雖淵衷軫念舊之懐而有司亡辨等之比伏詳辭訓參質故常在外館之地則為閒正學士之名則已重先朝著定或自二府公台而踐更近歲例遷皆由兩省丞郎而兼領陛下以臣因霈㤙而甄叙故許用散秩以超除惟其㤙數之優當有官儀之别亦嘗自言於公府豈敢取必於僉諧尋拜寵嘉載懐悸懼雲霄咫尺徒堅傾藿之心堂陛等差限隔規蒲之禁謹當祇循上賜増激丹誠惟公家之利是思非忠義之言弗道所領簿書之餘暇重講習於舊聞異時典故之討論兾粗知於大畧倘厚㤙之可報雖誓死以無辭臣無任南京謝上臣某言昨奉勅命差知應天府兼南京留守司已於今月十一日到任訖者象日建畿地本興王之重刻符為瑞寄分别鑰之優被㫖趣行馳郵即路初涖䖍君之表愈懐存闕之誠臣某中謝伏念臣平進孤生腐儒曲學荷累朝之樂育得厠羣英䝉陛下之采收擢登近列間以敗官而罹責乆從散秩以偷安去國三年屢渉江湖之險長民二郡未施犬馬之勞俄賜覲於天臺繼備員於武選再原郊霈復寘書林直廬方識於故棲近輔遽叨於外補保釐東國固慙維屏之非才密邇中都茲幸承流之易治此蓋伏遇皇帝陛下勛髙上世澤浸多方謂王政之所施必由近始顧吏能之可任不以遐遺豈圖蹇躓之餘辱預甸圻之選重念冒㤙之優異初蘄叙懇於清閒屬廹官期特蠲陛對不得一瞻法座少侍威顔口陳刑政之宜面稟聖神之訓望髙門之地詎惟飛騖於精魂頒明詔之㤙敢不勉勤於夙夜誓竭始終之節少酬覆露之仁臣無任蘇魏公文集巻三十七
