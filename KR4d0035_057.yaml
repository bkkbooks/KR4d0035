body:
  text: 蘓魏公文集巻五十七宋蘓頌撰墓誌夀州霍丘縣主簿宋君墓誌銘宋氏世占開封蓋得姓授氏之邑也皇朝贈太子左清道率府副率譓始居襄邑鄉里稱長者生内殿崇班良起家為三班官出掌筦庫治軍旅並有善狀生衢州西安縣令宏少治儒術學易于徂徠石守道授春秋于泰山孫明復名重上庠擢進士丙科調亳州衛真縣主簿上官薦其材宜治劇領邑以卒事跡具太學博士曽君􅌈所敘銘誌予甞觀其所學自經史百家黄老言至于星厯五行占課象數兵家權謀之書皆貫穿浹洽無所不通其書存者多手鈔蠅頭細字幾數十萬言又甞以其生之年月日時推考星緯參騐休咎自謂夀不得長故造適任運不蘄苟進無幾何以使牒考試它州在道遘水禍以歿士大夫聞者莫不嘆其志于道而安于命也生夀州霍丘縣主簿拯拯字道濟幼嵗以父死職事推恩補郊社齋郎孝友惇愿善守家法予以女弟妻之留于家且乆知其强敏人也一從進士不中選益自奮勵早夜誦習書傳課試文賦期于大成有志無命才滿一官年止二十八以治平二年遘疾卒于京師僦舍生三子曰育曰充曰髙髙亦早卒育充力學游場屋不墜門業然自霍丘之亡子弟繼以淪謝二孤羈寓京口因而著籍宋氏不絶如綫育每追念先世多艱率府而下五世藁菆京畿乆不得歸大墓已為世適當任其責而單力不能反葬鄉里常抱終窮之痛因謀于親知曰墳墓近所居則嵗時展省不廢既而卜遷其兆亦從于是裹糧西上干舟有司載其髙曽大父母暨父叔季弟凡十三喪以歸買地于京峴北原元豐壬戌六月辛酉既襄事矣而相冢者曰山髙逺地水與風逆神靈弗居育復詢求他師徧求陵阪得今崇徳里焦石山之東南原地合葬範嵗在乙丑月維丙子其日庚申厥利大舉乃啓諸柩厝于新阡率府君位西向大穴崇班霍丘為二昭西安為穆二從祖祖父三季父一幼弟别為二塋附于東南隅同日掩六壙事無不及者師言山當巽隅外如拱抱水出庚辛合流江海法曰亡者安而存者利宋氏宜有後矣嗚呼育以孤童自立力貧舉事往返江淮數千里負其親喪再嵗卜遷卒得吉宅永錫爾類師言其信乎銘曰維家遘屯維子艱勤念所親乎生不逮養死不克𦵏懷巨創乎五世之喪自汴之陽歸朱方乎始塋京峴山峻水斷居匪善乎通呉之東若堂之封卜之從乎考易之繇有子無咎福厥後乎龍圖閣待制知揚州楊公墓誌銘華陽楊氏自漢太尉震四世顯赫子孫散在河洛至唐而益盛其居鄭州之滎澤者曰尚書左僕射於陵最貴僕射之六世孫曰江州錄事參軍絳遭廣明喪亂因家江表其子曰津事南唐以言不合去之南越劉鋹用為尚書水部貟外郎生太子中舍守慶入皇朝為坊州司馬贈尚書右丞生翰林侍讀學士諱偕以文武亮直被遇仁宗為時名臣其亡也天子思之特贈尚書兵部侍郎侍讀生大理寺丞贈中散大夫諱忱與其弟大理評事慥俱以經術文章名振一時中散生公公諱景畧字康功四嵗用祖䕃守將作監主簿十四上書皇帝言天下事又謁執政論所以言者丞相富文忠公尤竒愛之初監咸平縣酒務已有能稱治平二年擢進士第知夀州安豐縣年少領劇邑處之沛然民有賦租不以時入者獨按其大姓與里胥它户不督而自集里豪有倚富冒法者以事召至庭下窮竟無罪得器服擬上方事立寘于法一邑為之惴慄縣當水衝嵗甞病涉為之創巨橋往來者遂無患因目其橋為楊公橋安豐代還監京東竹木場兼三司主管權度支判官公事徙開封府推官就遷判官方朝廷患獄瘉之弊公以謂䕶視不謹吏當繩之以法診治有瘳毉當勸之以賞詔用其言著為令接送遼使使者回澶淵例先馳二介以報其國時耶律用政欲遣三介公執不可甚力卒用常例出提㸃兩浙刑獄始至常州訊囚有縣學生具酒食設同舍而邑令之子預㑹州鞫以贓罪證逮者百人公以法無飲食坐贓事即日盡釋之杭州司理邵權騐囚小不如法已州罰矣轉運使又劾奏以為不職詔公覆案公具本末獨保證之權卒得免自是它州之寃獄滯訟得平反亟決者多矣公居官勤勩不為苟簡法或未便即建明于朝甞言太學有嵗月之限逺方寒士或以貧或以親不能趨期者請州置學官如太學法以便科舉又言募官管押諸州綱運給以道費本欲紓牙校破産之患而守倅有應募者沿法自利為國羞辱莫甚于此請下按察官不許押綱令又謂浙江網罟太密禽魚不得生息請山澤謹其時禁死者不葬寄骸廬野乆則暴露可傷謹喪葬限以嵗月其恕心恤隠多此類也閩寇廖恩剽掠境上公出兵數百重立購賞上以為專命奪一官仍故職滿嵗移河北東路過都留為提㸃開封府界諸縣鎮公事再領府判官管勾使院公事提舉三司帳句磨勘司在府圻宣力居最坐遷局過限及遣官捕蝗再奪一官未逾月以塞河勞復故制曰河溢原武隄塞輒平䕶安居民繄爾能力除書之言若此其治效可知也元豐六年右司闕貟宰相薦者數人神宗曰楊某可稱其任即拜尚書右司郎中上言尚書郎官有非才望者令長官舉行不放上或門止故事未幾遷起居郎使髙麗為國王祭奠使上諭以此行多欲去者卿在所選也對曰欲與不欲非為利即憚險耳臣知稟命而已公偉儀觀善辭令至其國舉措辭受言語輕重皆有節適歸則能道其土風人物禮儀繁畧纎悉不遺深稱上㫖就賜金紫之服擢試中書舍人占謝日上曰卿文辭温潤雅宜典誥近制舍人預押六曹公詳練典故每有大議多引前代以為據故執政稱其有禆助明年避親嫌換龍圖閣待制知揚州移蘇州復徙維揚元祐元年八月遘疾丁未終于州寢享年四十七公為人樂易自喜外和而内勁臨事果于行不為貴勢所屈待下盡禮周旋不懈非意相忤不與校也自與當時名卿遊多見推挹薦舉僚吏幾數百人而無一為累者豈至誠樂與而不能欺者歟其為治嚴而不苛在郡公私未甞以一毫撓民故二州之政從容若無所事而民自恱服至蘓未數月獄無繫者議者以為自孫冕在鎮日甞獄空逮今八十年復見楊公矣去之日呉人遮道泣涕及卒揚人思之不已舉州為之設浮屠齋又建祠堂于龍興佛舍拜泣其下雖古所謂遺愛不過是也幼有至性母靜安縣太君盧夫人生公三年而卒後遇盧黨即涕泣眷慕如母存焉賙其族人不間疎戚賴以存者甚衆尤喜讀書平居佔畢之外無它玩好常以讎校得失為樂事所藏書萬餘巻猶繕寫不輟又集周秦以來金石刻文至七千巻用以考騐前史疏捂與夫放佚之事其辨博通洽抑有資焉者文集十五巻西掖草二巻奏議三巻執政年表一巻奉使句驪叢抄十二巻少林居士聞見錄十巻公少以名家子有文學以自表志在推巳以及物中間屢試權劇亦有所攄發矣兩奪官不以罪觀其過可以知仁也晩遇主知方見任用而時為命奪不得盡如其志然見于文者亦足以識其所存也夫人嘉興縣君韓氏故太師周忠憲公諱億之孫今門下侍郎維之女賢慧得其門法治辦家政無不如禮者子男子二曰允某官曰崈某官皆向學有立女子二適宣義郎李持正承事郎韓戢並當時望族初侍讀公卜地于河南洛陽縣以葬其先君其後遂為洛陽人而子孫之亡者相繼祔于其側今允崈奉公喪以歸用其年某月某日窆于某鄉某里去祖塋幾里而近葬有日矣諸孤以沈誌見委予惟載世名徳其所紀述者前有歐陽文忠公誌在貳卿之墓後則有王荆國公呉正憲公銘在中散理評之墓顧鄙文不足以表彰遺徳以繼三賢之後然四世通舊其言行之美多平日之所親見聞者姑直書其事以成孝嗣之志銘曰楊氏之顯自震太尉繁衍至唐於陵端揆貳卿皇朝徳銘三世中散不偶内閣復貴内閣之貴天子所知屢試其難事靡不為宣慰嵎夷光華逺而書贊名命宰司是毗昔使東南有威有惠更殿大邦不勞而治西閣東臺方竚公歸豈伊不淑命與時違時哲云亡士類嗟戚我懷世歡其痛何極凡墓有銘著厥平生一言善志千古英聲貳卿之葬文忠敘事中散理評師儒誌墓我述遺徳以續前詩雖非麗藻亦無愧辭承議郎集賢校理蔡公墓誌銘臨川蔡景繁諱承禧吾亡友濬沖諱元導之子休文諱元翰之從子尚書職方貟外郎知南劒州諱宗晏之孫初天禧中我先人與職方公先後為宜州軍事推官實相交承情好尤厚故濬沖兄弟以文章見知留處門館使某同筆硯習六科景祐五年二君俱以茂材異等召試秘閣時如格者衆遂不得預廷䇿其後屢試不捷休文卒死布衣濬沖與景繁父子同中嘉祐二年進士第濬沖終南劒州軍事推官景繁由太平州司理河南府軍巡判官改大理寺丞知䖍州雩都縣熈寧七年召對便殿訪以時事極陳用人立法之弊擢太子中允監察御史裏行滿二嵗加集賢校理提㸃開封府縣鎮公事入為開封府推官改判官管勾使院公事兼提舉三司帳句磨勘司累遷太常博士官制換承議郎出為淮南計度轉運副使以疾卒于泗州之行司元豐七年十二月某日也景繁初為州掾時年尚少吏頗易之一日謫其舞文鬻獄者上于州州為斥逐太守張伯方愛其剛方有守數與議論不以僚掾禮待之其治雩都縣事無細大皆自詳處胥吏畏縮無所措手溪水暴溢幾沒城郭為之具枋篳以濟生聚而溺者獲出水遇艱食又出常平粟以賑絶乏而飢者不流監司劾奏其擅發倉廩詔釋不治當時論者以為景繁為小官已能任大責使之遭時得位顧其設施豈易量耶及為御史論大臣之任事怙權者拔用親黨遍布要路非國家之福章言廷諍前後十數神宗悟為之罷免其黨輩者數人又論用兵交趾不可與爭旦夕利所遣北軍難以深入及不宜用中人主兵柄唐季之事可用鑒也凡此皆近臣之所難言者人皆為之危而上獨稱其忠藎面賜緋衣銀魚謂曰聊以旌卿讜直耳熈寧某年接伴遼使還獻治邊十三事深愜上㫖李復圭坐小法罷邊帥張商英以言事黜官景繁連疏救解以謂二人者皆美材可用不當留滯逺方開封府治中貴人獄得其閨門隂事連逮甚衆尹與中人有恩舊遷延不訊景繁即合同僚辨爭累日至論列上前尹辭詘坐貶官它日上又謂曰向覽卿臺章甚合理道凡有聞見不可以不在其位而遂啽嘿也景繁自以起疎逺遭知已之主苟有可禆益時政雖逆鱗遻物終無所避就既而復上數十事多指摘時病竟留中不出議者謂其必復言職俄而有使淮之命其為使者務舉大體嚴而不苛吏有建征利之言者一切不用權廬揚二州雖日月不乆而民多能道其善狀大概志在愛君拊民一聞忠義之語必力行而極言之未甞顧以利害不幸年止五十不得大施于時究極其緼是可傷也自少時篤學力文博記善說進對上前亹亹有緒故屢見稱奬居家教訓子弟講論道義常至夜分善與人交不為炎涼改觀予家人官其部屬者至則薦之人問其能否對曰吾先人所知其家人固多善士豈必問也接物和裕侃侃不折雖恭上厚下而不可撓以私周旋族中貧乏待以濟者甚衆尤喜興奬名教誘掖後進雩都素少士人人未知學為之擇秀民以誨導之勉以進取其後成就弟子若郭峻之徒相繼有登科第者邑人懷徳至祠而報之夫人何氏臨江著族克配君子能成厥家封崇徳縣君二子居厚居易四女二嫁青州范世基撫州鄒璠二在室居厚甞舉臨江進士同試者千餘人首中鄉書以家艱不赴禮部居易八嵗亦知向學嗚呼景繁其不亡矣平生所為文章甚多未遑詮次居厚裒而類之為三十五巻曰論語指歸十巻曰奏議集十巻曰文集十五巻寳文閣待制何公正臣甞稱景繁至誠所發本于仁義忠信有遷固之辭有騷人之諷諭有折檻引裾之忠謇聞何公之言可以知景繁之心矣蔡氏出濟陽至唐𢎞文閣學士允恭始居長安子孫家焉其後南唐清徽殿侍書士煜又居金陵煜之子曰倚復徙臨川倚之孫曰為政皇朝贈尚書比部郎中職方即其子也自倚至濬沖六世居臨川景繁甞遊京口見其山川而樂之曰吾老必歸此于是居厚用其遺言擇地丹徒以元祐元年某月某日𦵏某鄉某里之西南原因家于潤遂為潤人也居厚以予其世通舊求誌其墓感今懷昔不得無言又繫之以銘銘曰蔡出濟陽長安之系允恭仕唐祖煜避地始遷金陵以書入侍再徙臨川服儒數世職方允文首中名第中司薦才詘于不試徊翔外遷終老州寄二子褎然賢科赴制仲氏差池殞于壯嵗伯也及子同登進士先後祖孫並時兄弟儒學一門時稱盛事蔚矣集賢幹時良器文中御史簡在先帝繩糾不私權豪沮氣道直難進勢危易躓出案甸圻清衷益記入佐京尹復摧寵貴帝曰爾言不繫其位方竚嘉謀遽膺外使淮海百城征誅未乂軺車一臨民寛吏惴惟其設施志在經濟千里脩塗未半而逝平日有言京口吉地生居死藏存歿之利嘉哉孝嗣命從其治果得佳城卒如素志太常少卿致仕王公墓誌銘太常少卿致仕王公諱田字介然開封人給事中同知樞密院贈太師中書令諱博文之子贈太子太師諱士安之孫作坊副使贈太子太傅諱諫之曽孫少以名家子有學問所與游者多當世聞人故累舉進士鏁㕔皆拔髙名後以父任為試秘書省校書郎許州臨潁尉再廕補將作監主簿故相錢文僖公王沂文正公並薦其才又上所為文章三萬餘言召試學士院賜及第四遷太常博士歴尚書屯田度支兵部三貟外工刑兵三部郎中初領簽書鳯翔節度判官鄉民有得遺財于道者遇捕卒拒不伏禽府尹周式曰此正謂盜而後强者將寘于重辟公獨以為闌遺無强取法拒捕又不以仗執不敢斷式曰吾為吏固先于若豈不曉法爾有異識何不以狀來使吾按治耶公即上議狀式意為解止決杖而釋之㑹中令尹歧徙鎮國軍未乆求侍養還京師管句左右廂店宅務視邸舍有不葺與民占冒無籍者請官為繕完畫間架使増僦錢由是二嵗中溢舊課四萬緡用前勞陞知通利軍始至決滯獄數十人自是庭無留事都轉運使楊偕孫祖徳髙覿相繼言其治狀以父憂去職又服母喪通五年而除起監在京左藏庫前此出納庫籍惟載正數其羨贏皆不㑹積乆鉅萬主吏得以轉移為姦公至則操簿書坐帑中鉤索隠漏得籍外金帛及軍賞折直髙下不當償者悉條其數上三司三司更命它官按騐得實計其所收物直三十六萬七十緡以其事聞于朝廷擢為羣牧判官滿嵗制置使王祁公奏公甞出邢洺諸州治監牧水害有效請留再任又一年權開封府判官出提㸃江東刑獄尋移江西皆自陳不願行留判三司户部句院拜京東轉運使又辭不願行以使者秩移知襄州是嵗飢歉山南尤甚公募豪姓出粟萬餘斛造饘粥哺流民賴是全活者甚衆故中書舍人胡旦旅殯在郡邸其子孫孱不能舉𦵏且三十年矣公為作奏曰旦有大名甞為先帝近臣朝廷宜厚恤之詔以庫錢二十萬畀其家具𦵏公又命書記石温主其事為之擇善地安厝如禮餘錢以給其孫郡人聞之喜且嘆曰胡氏存歿獲濟矣在郡才五月召還復判户部勾院滿四嵗當出補外官又自陳願領京師閒曹徙判尚書倉部後五年以亞卿謝事又二年年七十五卒于清和坊之私第卒後七月諸孤自京師奉其柩𦵏于孟州汜水縣萬山原先塋之左次實治平二年十一月甲子也公為人淳厚謙恭不自標置接人不盡誠禮見親戚與賔客無少長貴賤皆局局然奉之不少墮語言洞見底裏不為隠欺而人與之接者退而必曰真善人也然而當官閱簿領持法律精密審詳雖甚細微亦不敢忽慢故所歴十三官皆以勤事著稱而無毫毛過失其中心慈不忍蓋出天性非强勉所至見人議法苟有可以生出之路雖非已者亦從容為言及聞有所平反則喜如出諸已少時數隨侍在官中令每閱案牘多焚香過閣中情有疑者密以問公公對曰法重情輕不如從輕中令深嘉納之自終親喪後不復主家事門内之治一以委諸弟惟葺居第日往河外購良材歸則親督工程頗務崇壯是時太夫人在堂見而召諸子語之曰中令既棄捐若輩復安用此大屋乎公對曰王氏自髙祖以來由祁魏曹洛遷徙者數四靡所定處自先人之來京師始得此第經營艱苦每患其庳陋數欲増大之而未及就某等雖不肖所以盡力于此者將畢先志耳及成室昆弟未甞坐堂寢中雖待賔客亦就偏廡示不敢據先君之正處也景祐中從祖睦卒官江西三孤女貧不能自還中令方以為憂㑹病且革以屬公公即冒江湖往返數千里提攜以歸嫁之輒得賢壻其後二為大官一為朝士故翰林侍讀學士楊安國今龍圖閣直學士韓贄駕部貟外郎綦愿是也于時言家法者以為美談公前後三娶皆顯族初配髙氏秘書監志寧之女次配許氏刑部郎中韓之女並早亡不及封今夫人李氏亳州刺史周之女號金城縣君子男九人曰峋太子贊善大夫曰岐曰岯曰崿京司官曰崌瀛州樂夀縣尉曰嵎曰嶧曰嶠選補官曰岷未仕女八人一適工部郎中集賢修撰知桂州陸詵一適衛尉少卿趙尚寛六幼在室諸孫九人男皆傳其家學女必得佳士而歸之可謂善治家矣初中令在近密公已為郡守後二十八年亞弟疇復為樞密副使時公已得謝還第見其登用士大夫來慶拜者日盈其門且推福于公及其𦵏也副樞之喪又同舉事儀用三品而公柩在前州縣過喪亦如常禮始卒哀榮其盛也如此豈非積善之報歟公素無疾暨副樞之薨哀慟累日家人怪其傷悴過甚旁為開譬公曰我非不知命也但念吾弟生二嵗而失先夫人吾甞躬自復育又見貴顯一旦先我而逝感今懷昔可遽解耶自是悒悒彌甚相距五十餘日而終嗚呼可哀也𦵏有日諸孤以僕接公有年又僕之仲弟亦許氏姻也用是累來請誌于壙既不得辭又為之銘曰不矜其容不暴其終仕而行已惟義之從靜以逺悔明以保躬吉人之履君子之終天錫多福惟享其厚好徳康寧考終以夀萬山公塋昭左穆右體魄既安慶鴻厥後蘇魏公文集巻五十七
