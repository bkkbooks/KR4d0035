body:
  text: 蘇魏公文集卷二十一宋蘇頌撰內制明堂赦書門下治人莫急於重祭嚴父孰大於配天昔者周公宗祀明堂而致孝鴻惟仁祖規撫路寢以尊親參合古今之宜兹謂情文之盡肆我昭考稱秩彛祠周爰羣䇿之長專崇一帝之配聖作明述事並功偕稽吕令之文則享以秋季案魯經之載則日用吉辛允協靈心奉為常憲朕纂圖宸極承訓慈闈事舉於中禮循其舊嚮講親祠之制一遵先聖之謨對越上神翕受純嘏五韙來備三稔于兹屬方隅之底寧嘉河流之順復物無疵癘民用平康荷穹昊之降休致函生之䝉祉復會一郊之嵗前詢七數之謀而乾象垂文晨覿房心之次朝儀取法是為政教之宫適及其時兹用展采陳千乘萬騎之儀衛極四海九州之貢羞皆欲有以致其嚴猶懼無以稱其德前期戒衆各揚職以盡恭先甲端誠中集虛而思道始欽柴于真館旋備物于大庭作主侑神帝與親而並享奠匏及瓉薦暨祼以交行一純罄而高明歆四氣和而諸福應有司已事祝嘏既告以孝慈與物惟新風霆爰布于號令式均惠澤溥被敷天可大赦天下云云延州要藩上郡舊境皇朝建彰武之節以開帥庭先帝寵王爵之封以賜朕履惟山川之嚴峻本土族之敦厖宜加府號之稱用旌受命之地延州升為延安府於戲合內朝之神事既因錫羡以推仁得萬國之歡心又將使民而知孝蓋布德行惠者非賢罔乂任大守重者惟后克艱尚賴文武藎臣股肱碩輔共底緝熙之治庶成忠厚之風咨爾羣倫其體朕意赦書日行五百里敢以赦前事言者以其罪罪之主者施行麻太師文彥博加食邑制門下季秋大享周公之禮見于經三嵗親祠國朝以來著為令恭惟皇祐之制肇崇路寢之居稽參節文舉合彛典朕遹遵先憲祇率舊章奠真祖而欵殊庭奉昭考而配上帝休成熙事爰霈澤于多方乃眷帝師預制儀于前識誕均神貺用奬王勳頒以䇿書告于朝宷太師平章軍國重事上柱國潞國公食邑二萬七千一百户食實封一萬一千四百户文彥博溫良恭儉明允篤誠受天純粹而生為國敻求而仕方仁皇之在御得元精之佐臣四方于宣文武見乎事業一相處內謀猷著于幾康屢委柄而出藩遂傳家而佚老肆朕纂服渴見儀形起真拜于上司冀翼成于初政副文母之咨訪慰眇躬之寤思閔煩以總職之勞專任以代工之重四朝元老深有賴于謨明三事大夫皆仰承于矩度屬舉宗祈之典獲詢肆類之文逮此慶恩久當封于成國徇其謙請但增數于爰田惟邑賦與真租示褒功而崇德於戲國有大賚蓋是富于善人惠于宗公期永錫于難老尚交修於一德庶終譽于萬方惟竭乃誠同底于道可皇叔徐王皓加食邑制門下稽古仁皇肇太室宗祈之典思文聖考奉一天崇配之祠朕祇遹先猷稱秩元祀侑神作主克崇嚴父之恭與物惟新因霈自天之澤式孚庭號用顯宗英皇叔永興鳯翔等軍節度管內觀察處置等使守太尉開府儀同三司雍州牧兼鳯翔牧上柱國徐王食邑一萬二千八百户食實封四千三百户賜贊拜不名皓以族屬之尊處公侯之上親則叔父爵為真王而德性明誠行能純備孝友內著靡待喬梓之觀言動有常不越宫壇之表而自苴茅建國列邸奉朝名位並髙親賢莫二建雍岐之雙節奄鳬繹之大邦正考之三命益恭顔淵之一善弗失惟詩書是好非禮義不談得先秦之古文幾同漢室識前朝之舊典莫如東平所謂邦家之翰垣宗室之儀表永為藩輔上奉母儀比禋禮之休成錫純禧而均被告于列位寵以徽章增命數于王家廣土田于邑户仍于書詔賜以不名於戲積厚者流光雖自文昭之慶位髙者禮異抑由王行之賢茂對明緡之恩益增磐石之固可皇叔祖華原郡王宗愈加食邑制門下國家六聖貽謀百年制禮在我昭考崇奉親配帝之儀逮兹眇躬思繼志述事之訓永惟大享之報適協季秋之中時其宗尊實相熙典奉璋在列儼乎陟恪之容渙汗均休厚乃褒優之命皇叔祖寧國軍節度宣州管內觀察處置等使檢校司空開府儀同三司持節宣州諸軍州事宣州刺史上柱國華原郡王食邑七千八百户食實封二千四百户宗愈天資渾厚躬服謙撝地承帝室之華系衍王家之慶其言甚大深知樂善之方力行有餘常事學文之語自先朝之睦族首同姓以分封列邸留朝久席王侯之寵擁旄拜衮復兼將相之崇處貴不驕好禮有立方其與祭之日能謹事神之難雖百執盈庭皆奉各揚之職而三獻成禮允資終事之勤不有異恩曷彰懿行是用因美原之故壤即宛陵之大邦再徹土田並增邑户酬勳之典有國所先於戲歌我將之詩克昭先烈流祭澤之廣用奬親賢祇荷厖鴻之休益思寅畏之戒永保天祿克終令名可皇叔祖安康郡王宗隱加食邑制門下天載無聲雖備物不足稱其德父尊莫抗非陟配何以昭其功故仁祖所以躬太寢之祠神皇所以專一帝之奉逮此三年之報率遵二聖之謨奠玉祼圭既畢儀而升燎垂纓委佩多顯相之在庭宜舉慶條首褒宗戚告于朝寀用廣神休皇叔祖保信軍節度使廬州管內觀察處置等使檢校司空開府儀同三司持節廬州諸軍事廬州刺史上柱國安康郡王食邑七千八百户食實封二千一百户宗隱挺質端良處躬循謹衍天源之流潤為邦族之尊宗早分列郡之封位兼王爵繼荷陟壇之拜秩視公台執禮不愆樂善無厭經籍文史常置于巾箱車馬輿臺不踰于科品有大而能謙必豫位高而受命益恭屬禋祀之慶成推渙恩而自近井田真食保增錫于户封將相重侯故優崇于命數酬勳有典賦祿非私於戲天祐我家宗戚固多于賢懿祭有大澤寵章實異于等倫勿替兢修以永終譽可皇弟大寧郡王佖加食邑制門下朕歷吉季秋蕆事太室尊聖考而配上帝克盡孝誠祈厚福以浸羣元式孚渙號惟豫介弟時乃宗英早緣帝子之恩已開爵土今拜大神之貺宜峻等夷皇弟山南東道節度襄州管內觀察處置橋道等使檢校太尉開府儀同三司持節襄州諸軍事襄州刺史上柱國大寧郡王食邑六千户食實封一千九百户佖擢秀天枝分暉星采生知忠孝跬步不忘于君親夙慕善良比年已習于弦誦爰自勝衣趨拜擇日受封擁漢沔之節旄宅吉陽之疆土巳崇上衮益知傴僂之恭雖處深宫如臨師保之敬屬精禋之竣事敷惠澤以均休爰即舊封薦加優命增以轅田之賦衍乎真食之租誕告大庭式揚熙霈於戲大事在祀執膰所以惠諸侯宗子維城懷德所以固寧宇思處家為善之樂知制節謹度之宜期底大成無違䇿㫖可皇弟咸寧郡王俁加食邑制門下朕承列聖之休光荷文母之慈訓追養繼孝感時念親交于明神展嚴父配天之禮友于兄弟厚同氣異息之恩屬兹慶賜之行首舉懿親之命告於庭宷布乃言綸皇弟定武軍節度定州管內觀察處置等使檢校太尉開府儀同三司持節定州刺史上柱國咸寧郡王食邑五千户食實封一千七百户俁岐嶷之姿見于幼惠溫文之美有若夙成勝衣乃拜于官封授䇿巳兼于將相未就外傅字書已習于竒觚早肄少儀行步不踰于佩玉適遘禋祀之慶進加命數之崇稽案舊章誕頒徽典擁節旄于新樂不改故邦廣國壤于宜川再隆異渥户田加賦幹食增封實均神貺之孚益重天倫之愛義兼敦睦恩越等威於戲祝嘏既告以孝慈成豫精享公侯以為之藩屏繄爾懷寧惟詩禮可以飭躬惟仁義可以保國勉思逺度無忘訓辭可保康軍節度使苗授加食邑制門下行莫大于孝孝以尊親為先祭則致其嚴嚴以配天為重朕欽承謨烈昭事穹旻歷季秋之吉辛躬三嵗之大享樵蒸焜上既接禮于明神祼將于京遂昭功于聖考逮兹竣事推以渙恩褒嘉元戎亶揚丕命保康軍節度房州管內觀察處置等使檢校司空持節房州諸軍事房州刺史上柱國濟南郡開國公食邑三千三百户食實封五百户苗授天資端厚性緼沈雄傑然師帥之才奮於州縣之職干戈衛社隱若敵國之堅談笑臨邉㗲無武將之體冒犯矢石保守封疆先帝知其才謀委成戎閫前嵗召于邉徼入長殿廬謙而有光寵至益戒以疾屢請辭劇彌堅解蘭錡之親兵領關陘之重鎮精禋既戒祭貢預䖍熙典克成寵章載錫加數邑田之廣衍封幹食之多褒命非私疇功惟允於戲聽鼓鼙而思將帥豫不忘于舊勳守富貴而和人民爾宜圖于逺略祇服明訓往惟欽哉可駙馬都尉李瑋加食邑制門下朕祇遹先謨欽崇神事惟天惟祖宗之敷祐敢忘報本之恭以禋以肆獻而展儀期盡克誠之享粵在秋旻之季載嚴宗祀之文汔盛禮之休成賴庶工之助相嘉與勳戚同兹慶欣平海軍節度泉州管內觀察處置等使檢校太師持節泉州諸軍事泉州刺史駙馬都尉上柱國平原郡開國公食邑六千七百户食實封二千四百户李瑋系出王門行如素士早厭紛華之習樂為名教之修仁皇以舅家之親降虞嬪而欲貴先帝以外戚之屬授漢節以隆恩而志不期驕動必由禮日恪位著奉昕朝而不違言敦詩書務時敏而有裕試守嘗更于方郡雅意蓋在于本朝侍合宫之祠能罄齊明而涖事推大澤之霈宜優禮秩以均禧仍棨㦸于泉山廣土田于安德户封真食併用旌酬於戲神明之休詎菲德之專享爵祿之馭非有功者不承矧豫舊族之賢夙禀教忠之訓不愆素守自保全名可西蕃邈川首領阿里骨加食邑制門下祭有十倫之義施爵賞以為先福者百順之名本忠孝之自出朕祇祓陽館崇嚴禰宫配神穹昊之尊流澤幅員之廣嘉與卿士同兹慶休便蕃優渥之恩固無內外之異告于朝宷布乃言綸西蕃邈川首領河西軍節度凉州管內觀察處置押蕃落等使金紫光祿大夫檢校太保持節凉州刺史上柱國寧塞郡開國公食邑四千户食實封一千一百户阿里骨生有軼材少負偉略禀天地之義氣得秦豳之遺風奠塞外之封疆繼承列土擁河西之旄鉞坐護諸羌長雄一方作我西屏屬九筵之講禮盛四海之駿奔來獻其琛實相豫祀是用加命王公之數視秩帝傅之崇增井賦于爰田廣國租于真食於戲爾有時享嵗貢之恪史不絶書我有餕神觀政之方惠必及下既均承于純嘏宜益厲于忠規往服訓言克享天祿可南平王李乾德加食邑制門下朕稽五禮之文躬三年之祀歷吉季秋之序薦誠太寢之居嚴父配天既克成于能享加地進律用褒寵于有勞乃眷藩臣越在嶺表特推頒于優渥俾共介于福釐推誠保節忠亮同德順化翊戴功臣靜海軍節度觀察處置等使特進檢校太尉同中書門下平章事安南都護上柱國南平王食邑九千户食實封三千四百户李乾德氣禀溫仁志抱忠義席世芬于南國遵侯度于中朝扞城其民奄奠朱䳒之域要服者貢逺輸南海之珍自分王爵之封專擁將旄之貴寵章所被嘉欣戴以彌恭疆埸無虞本綏懷之有裕爰舉宗祈之澤薦加命數之崇視秩三司增封千室兼厚真租之數併酬保境之功於戲導揚神休自京師而及于諸夏保守土宇和人民而莫若勤王益厲乃誠永錫爾祉可蘇魏公文集卷二十一
