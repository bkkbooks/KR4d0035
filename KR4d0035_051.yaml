body:
  text: 蘇魏公文集巻五十一宋蘇頌撰碑銘翰林侍講學士正奉大夫尚書兵部侍郎兼秘書監上柱國江陵郡開國侯食邑一千三百户食實封二百户贈太子太師諡文莊楊公神道碑銘并序淳化五年冬十月真宗皇帝以壽王出閣尹開封朝廷慎選府僚輔導明兩於是驛召鎮安軍節度行軍司馬楊公為左諫議大夫充開封府判官至道元年秋八月春宫建兼太子左庶子三年三月儲皇踐極由給事中拜工部侍郎充樞宻直學士兼秘書監再遷禮部踰年以衰耄求解近職進兵部侍郎未幾特置侍讀學士秩如内禁公以本官充翰林侍讀學士兼官如故夏侯嶠邢昺吕文仲實並命也上日賜會秘閣寵以七言御詩儒學之官一時為盛以公春宫舊僚眷待尤異每清閒訪對從容言天下之事多至移刻造辟之論世莫得而聞也方將圖舊熈功記善惇史屬遘足盭移告家居璽書銀璫診問旁午仍以御封上藥賜之咸平初郊不及陪扈特詔賚物如侍祠仍進封江陵郡侯未幾鑾輅北巡公舁疾辭於苑中上諭以勉進醫藥不久當相見及駐蹕大名又以手詔問平安好否三年正月二十三日車駕還都遽遣中使慰諭後二日以疾不起聞上為軫惻久之特輟視朝一日贈兵部尚書降内司賔至其第賻錢五十萬帛五百疋又賜祥符縣之北常村塋地縁葬所須皆出王家錢内侍任文慶實監護其事詔以其壻太常丞譙國宋公臯直集賢院外孫常山公綬為太常寺太祝姪孫偃集並同學究出身蓋聖主所以尊賢憫舊推徃撫存終始之恩至矣公諱徽之字仲猷胄出華隂著姓漢太尉震七世孫信安侯嚮之子奢仕晉鬱林太守永嘉南渡徙籍上饒奢之十五世孫光翼唐上元中為信州刺史以劉展亂江左遣其子建安令宣挈族人歸於閩因家浦城遂占數建安焉子孫累世以財力擅州里公之曽祖式辟王潮參謀軍事未幾辭歸終老於家祖郜當唐季盗起率合義徒千餘人保守土境補閩義軍指揮使累官至本州防禦使考澄生戎馬間獨業文史嘗以䇿畫干忠懿王王一見竒之表置幕府俄假緋衣銀魚為本縣令卒官以子貴贈尚書禮部侍郎公禮部次子也少刻學自立不妄交游邑人江文蔚善詞賦江為能歌詩並延置客館切靡友善遂與齊名聞潯陽之廬山學舍甚盛因徃肄業屬李氏失政不欲仕其國乃濳服間道逹於汴洛贄文公卿間特為竇儀王朴所知王公答書以竒士目之周顯徳二年第進士同奏名者十六人世宗命近臣覆實惟公洎李覃何儼趙隣幾中選解褐秘書省校書郎集賢校理歴著作佐郎右拾遺竇儼薦同修禮樂書時相范質尤器待之國初加朝散大夫出監唐州方城縣商稅值故人奉使亷訪謡俗公見之因言主上應天順人海宇寜一宜崇尚儒術以厚民俗使者還具白其語頗拂上指左降鳯翔府天興令府帥王彦超籍其名待以賔禮蜀平徙嘉州峨眉令開寶初復佐著作劉溫叟任御史中丞十二年屢求解職不許及卒太祖問宰相朝行中誰可繼溫叟者薛居正對曰楊某即溫叟所放進士節行清白亦相類也時雖不果用然朝論自此以舊徳處之出知全州太平興國中再轉右補闕代還陛見日太宗顧左右曰朕在藩邸即聞其能詩因盡索公之所著奏御凡数百篇仍别獻謝章其落句云十年流落今何幸叨遇皇王問姓名他日又獻雍熈詞十篇上皆稱善用其韻以和答焉自是聖藻宸章多得别本之賜嘗屬疾敕上醫視之賚錢三十萬皆非常比也歴侍御史庫部員外郎更判刑部南曹同知差遣院賜紫衣金魚太宗留意儒雅日閱羣書詔翰林學士李昉等采前代文章類為千卷號文苑英華謂公邃於風什專俾編詩為一百八十巻端拱初由兵部郎中拜左諫議出知許州入判史館加修撰兼判昭文館集賢院因次對上言方今取士多以文詞罕用經術望詔太學増博士員選通經耑門之學擢以本官分教胄子用廣風化太宗深嘉納之謂輔臣曰楊某儒雅之士操履無玷寘之館殿得其宜矣元夕預召乾元樓觀燈上喜其老而不衰蓋有意於器使也公性方介疾非道以干進者毎言溫㓂用擊摶取貴仕使後輩務習趨競禮俗漸薄矣察斯言可以知其趨舍之所存也時樞宻副使劉昌言翰林學士張洎錢若水皆不次進擢而右計使董儼方圖柄任嘗謂公曰上待二翰林甚厚旦夕且大用矣後公語直史館錢熈旣而逹於劉張二人指摘以為公構飛語中傷近臣上聞而惡之不復問狀即日貶山南東道節度行軍司馬未行易鎮安遂陞王府方公之斥也年過七十矣自以為没世不復用矣而人亦謂之老且廢也然而斥未数日而易近鎮又数月而登藩朝之選非上所寵遇而厚信者莫得而與焉而公出左官首當斯命非夫文行業履之素茂豈能取信於人主非上之誠明待下不疑亦不能排衆毁而獨任卒所以䕶翼儲闈成令聞者由夫知臣之明而信道之篤也公初拜府僚自坡省至貳卿凡五命皆與故相畢文簡公同制而公位其上景徳初真宗登用舊人畢公自兵部預政事踰月遂冠鈞宰而公以耆年先薨故不及大任然以儒者起逺方值世故涉險難而逹中朝遄遘龍興薦遇好文之主晚年遭會風雲得以行其所學雖不至公卿亦不為不遇也公純厚清素外無矯飾仕数進黜不為夷險易其守而博聞强識出於天質善為清言好論典故自唐以來士族人物風流雅俗悉能詳記聽其言亹亹不絶酷信瞿曇修因之說居常以五鼔夙興盥潄誦黄巻如是者三十年猶一日也加之保守名節兢慎不懈故自結髪至於啟手足未嘗有過事當時論者以謂孔子所云善人吾不得而見之又曰吾未見好學者公之謂歟平生以風鍳自髙而寡合於世前輩惟故相李昉貳卿王祐深相推挹僕射石熈載參預李穆賈黄中與為文義之友識翰林王禹偁於布衣時薦戚綸任館閣是二人者卒為名臣雍熈中從孫南陽公億初以神童召對君相以為異人間出公猶勉以進修不可巳其後髙名峻節一代宗師每叙事質疑其言必稱從祖江陵公云爾其取重有識如此常戒學者當務三多著述看讀持論尤難屬文須詞理相副不爾同乎案檢無足觀也所為文章髙雅純重素好吟詠老而不廢對賔客論詩則終日忘倦言六義者莫不宗之有集二十巻没後上令夏侯嶠取以留中公刻意精思以臻乎大成勞形嗇神以嚮乎具福咸平中王翰林謫黄州未行旬浹之間公三至其家慰勉開釋情禮備至時人旣服其風義之敦厚又歎其精力之强固非夫鍾秀之異而純守之固能至是乎初母夫人章之在娠也夢朝南極見老人拜以為母他日又夢大星隕於室噏而吞之旣寤嚥中尚熱無幾何而公生及薨之前一夕冠帶仰瞻於庭下歸而趣家人治後事曰吾之星位退矣翼日遂捐館豈儒宗耆英生皆稟精文象殁則反舍於辰房乎公享年八十室中牟王氏尚書金部郎中澣之女繼晉江王氏國子博士仁郁之女號太原郡君後公十三年卒自卒及葬真宗再遣中貴人以緡帛恤其家公無子一女前夫人所生三嵗而失所恃繼夫人躬自鞠毓逮於筓字歴選良匹遂歸譙公累封鄭國太夫人賢明通書治家有法子即常山宣獻公也公薨時方十齡而超異夙成克荷後事圖書素業一以付之惟宣獻公以文章道徳顯赫兩朝佐佑仁皇再登宰政號令風采為時宗工雖徳業所基本乎世閥而緒風克紹抑自外門景祐二年冬十二月宣獻公奏䟽上前曰臣之外祖早事先帝在天府為上介在春坊為首僚際會龍飛待遇無比徂謝之日恩備始終官應定謚而故吏失於陳請二夫人配食復闕從子加贈之文竊惟聖朝敦奬世臣宜䝉襃賁非敢以臣備位輒覬恩榮是月制以太子太師禭章文莊公誄䇿告其第又以京兆太原二郡夫人追命告配室於時鄭國方康寜在養躬拜綸函承顔顯親事光兩族士大夫以為慶善之所及也洎宣獻下世嗣子今龍圖閣直學士某終養祖堂上承適重外曽冢廟繼修常事自禮部以上𦵏浦城者則其邑有舊構佛祠勅號等覺禪院以為殖福之地又有施田以飯其淨衆今族孫進士倜主其世祀云楊氏徙建安且六世至公始顯繼以南陽文公其族仕者益衆故尚書駕部郎中致仕贈太常少卿士彦皆公之兄弟諸孫也龍圖君每惟宣獻之志以謂公之賜塋宻邇都門安宅兹久而神道弗表非所以稱累朝寵飾之意顧謂某嘗學舊史前言徃行父祖之所逮聞也見咨譔述義不得謝又繼之以銘銘曰惟宋三世章聖初帝奥有真賢以相儲貳儲相謂誰楊公畢公朝之舊徳時謂儒宗帝旣繼聖乃作畢命公老而亡不迨共政公之道義天子傅師公之操履朝廷表儀仕躐等夷政譏擊摶聞公髙風俗以敦薄學者紛紜論義交錯得公語言士有規矱公之云亡帝思舊勲宗無主祀女裕後昆敦恤其家幹以王人孰傳其業付於外孫憲憲外孫民宗國器京兆家書太史篇記浹洽旁羅遂用名世佐佑仁宗輔成至治養堂念親欲報之徳頓首上前上為愴惻儲師小君禭章誄䇿襃厥世臣賁於宗祏惟祖惟孫有徳有言孝承慈顔恩榮外門永錫祚嗣流其慶源歿而不朽清風尚存古之盛德必有識表窆繂於埏麗牲在廟公塋浚郊木拱周道揭此銘章來裔是告龍圖閣直學士修國史宋公神道碑叙曰在昔官以世稱而其事著見於後者獨史氏之載籍存焉司馬遷論著先人所次舊聞班固奉詔續父所撰前記皆因其緒業卒成大典後之言官守者稱之談世家者善焉國朝史官無常員惟時撰錄所寄尤艱其選而宋氏二公載世典領其職起建隆訖天禧述祖宗創制致治之美洎真宗一朝實録時則尚書令燕國宣獻公預焉自乾興至治平叙二帝成功盛德之事洎仁宗一朝實錄時則貳卿龍圖常山公繼焉五朝正史二聖編年出於一門父子手筆可謂家世之盛矣傳曰信哉其能成名也其常山公之謂乎公諱敏求字次道宣獻公諱綬之長子也世為趙州平棘人曽祖龜符本州别駕祖臯尚書度支員外郎直集賢院並以宣獻公任政府追贈太師中書令而集賢公又兼尚書令胙譙國公三世業履勲猷見端明殿學士邯鄲李公碑誌詳焉公生十年而承家學摛辭㨿古早有過人者自經傳所載師儒所傳靡不旁通而浹洽而於唐世及本朝尤為練逹禮樂之因革官閥之遷次朝士大夫之族系九流百家之畧錄悉能推本其源流而言其歸趣雅為丞相宋元憲公所知從辟洛陽每訪以故實太師歐陽文忠公領禮儀修唐史以公嘗僚手書咨事自謂淺陋繄鴻博之助至於廟堂典故學者疑義莫不從而質之而後決初仁宗留意藝文參用名實寘公文館英宗綜核羣臣閱臺省之久不遷者擢公修記史掌名命今上憲章百王禮文有所損益其論譔之選公未嘗不在其中晚嵗付以史事未逾月紀草成與其長屬奏御上特開資政殿服鞾袍讀之終篇改容而諭之曰兩朝豐功盛德頼卿等考求而發明之它日移疾告上方臨集英䇿進士顧公不在列問左右宋某安否即遣中使撫問間数日又命挾醫診視仍召其子官於外者歸省及以訃聞上憫然傷惻制贈尚書禮部侍郎勅府縣應接其葬事皆特恩非常比也公以文雅被眷累朝才陞器使終始隆渥諸儒鮮偕最凡歴官起天聖三年乾元節以父任秘書省正字寶元二年召試學士院賜進士第慶厯三年以光祿寺丞充館閣校勘坐赴同舍蘇舜欽奏邸飲會出簽書集慶軍節度判官以祖母鄭國太夫人髙年請解職留侍京師未幾王文安公刋修唐書表公習唐舊事為編修官復校勘鄭國棄養服嫡孫重去位仍許修書於家稍遷集賢校理歴通判西京知太平州入為郡牧判官開封府推官三司度支判官墜馬傷足出知亳州召還充仁宗實錄院檢討官步蹇不任朝謁特㫖蠲之由京寺七轉至尚書工部郎中兩以慶恩覃霈一以唐書襃賞四以考課進秩治平元年同修起居注明年知制誥同修撰實錄今上登極陟兵部於時英宗大行梓宫在殯上封者請聽宗室嫁娶太常議不可旣踰年又有言者公曰義服變而練可以嫁娶矣坐前後不類奪一官以知制誥知絳州未幾復官召還修撰如故實錄成拜右諫議大夫熈寜三年四月今樞宻副使吕公以言事罷御史中丞知潁州公以草制執政指所言易其詞以進未旬日今御史中丞李公自秀州判官擢監察御史裏行公言舊制博士以上再歴通判須奏舉方得入臺去年驟用京官議者以為非今又以幕職超拜恐弗循官制之舊即上還其制目因自陳目疾蘄解書命章再上以本官奉朝請歳中兼史館修撰明年加集賢院學士八年特拜龍圖閣直學士十年修國史其别使自校勘至右史兩知太常禮院判登聞鼔院官告院尚書禮部開封府發解官錫慶院考試官契丹國信使洎陞從官歴糾察在京刑獄判祕閣祕書省尚書都省刑部工部吏部流内銓禮部貢院知通進銀臺司兼門下封駮管勾三班院編修宗正寺修玉牒官提舉醴泉觀再判太常寺兼禮儀院事洎知審官東院提舉官告院定奪郊赦命官使臣罪犯編排錄用勲臣子孫一為制䇿考試官四為殿後考覆官其專領則永厚山陵熈寜七年南郊皆為禮儀使館伴契丹使河北祭塞河口編修閣門儀制蕃國朝貢條例詳定元正朝賀儀注而省寺所涖多宣獻舊服公嗣修其政有光前烈又掌均公建公牋記攝鴻臚卿護燕國公主兖王衛王葬事以疾不果行其論議則為禮官時少師石中立薨四十日而子從簡又卒無他子承重嫡孫祖仁不知所以服公曰按司馬操駮徐邈攝祭議是服宜三年鄭康成注儀禮期出而虞䘮以三年是服可再制祖仁當解官因其葬制斬衰時三禮官執㩀不一判寺宋景文公獨是公議隴西郡王李用和薨輟朝日通在太廟孟享不坐内公援石保吉故事請補其日徐國公主以駙馬都尉王師約兄為姪奏官公執非是詔即正其名太常前上祧廟迭遷禧祖事巳施行旣而再三參定公言巳有前議不敢預聞遂免連書熈寜初轉對上三事其一曰外官數易吏民疲於送迎願久其職則考績有實而恪位匪懈矣其二曰河陜舉人以文詞登科者鮮望因科詔令三路與諸郡列薦其行能特恩賜第則朴茂之士遝進矣其三曰頃年遣使寛恤民力减放役人而事務仍舊宜酌其閒劇省事増人庶幾民蒙實惠其為修撰言館閣四部書猥多舛駁請以漢藝文志目購尋衆本委直官重複校正然後取歴代至唐錄所載第為数等擇其善者校留之餘置不用則秘書得以完善也其論貢舉請州郡置學官專職教導三歳科舉取士三分以二分待糊名校試如舊式一分依元年赦勅州郡論薦監司審覈而後奏名太學則主判保薦並赴御試中格者附牓如此取之數路則羣材不遺矣秘書省論郊廟祝詞語義有非當請命學士改定使河口還奏河北旱灾望蠲其夏租罷絳守言本郡嵗伐山梢八十餘萬其役特重請均三分一於晉澤二州以紓絳人其後官不數易太學三舍取士州郡置學官三路取百人繄公開陳其端也熈寜四年議入閣兩制太常以謂此唐日坐朝之儀不足為盛禮宜削去之公請如唐坐宣政故事約閣門舊圖量設儀衛以朝朔望詔可其奏今月朔朝文徳由此始也舊制臺閣官被命别使即中謝後或廢格公使永厚陵洎修國史皆奏復之觀所舉可以知其造次必於義而不失職守也其譔著則有書闈集十二巻後集六巻西垣制集十巻東觀絶筆集二十卷屬詞謹嚴似權僕射論事簡切似李司空訓辭兼常楊之溫雅篇什得元劉之清麗蓋有湛深之思初宣獻公輯唐大詔令未次甲乙公用十三類離為一百三十巻唐自大中世史記放絶載禩不傳公綴集所聞續武宣懿僖昭哀六朝實錄總一百四十八巻國朝都汴沿舊方鎮府寺邸第閭里坊巷増易數矣人罕識其故處者公依韋述類例譔東京記三巻雍洛故京漢唐遺事洊罹殘燬其迹熄矣公掇方志洎碑記所載撰長安河南志各二十巻奉詔編緝則有閣門儀制十三巻集例三十巻例要五巻蕃夷朝貢錄十巻記當官所聞見與其應用則有三川下官錄入蕃錄春明退朝錄各二巻韻類宗室名五巻安南錄三巻元會故事一巻摭唐人物世系遺事則有諱行後錄五巻纂唐文章之散逸巻部不倫者有李翰林集三十巻李北海集十五巻顔魯公集十五巻劉賔客外集十巻孟東野集十巻李衛公别集五巻百家詩選二十巻復采晉唐人詩歌見於石者作寶刻叢章三十巻嘗謂司馬遷史記注解䟽牾學者罕通其義訓悉取音義索隱正義王元感陳伯宣别注將倣顔師古西漢為集注及被詔修百官表續本朝會要删定九域志皆未克就嗚呼可謂博矣公雅以善書稱結字清勁得其家法前奉詔題濮安懿王王夫人神主書御製韓忠獻公碑及當時公卿士人匄請題寫被金石刻者多矣嘗對延和上問宣獻遺蹟翌日奏七軸以獻自公之亡未有繼其書名者公姿宇渾厚樂易自得與之交久而益親平居言笑侃侃不為邉幅表襮一遇事則毅然據正若不可犯者人亦莫窺其尺寸闊狹三為郡守皆以修書召去不得滿嵗其去也民益思之喜甄奬人物前後薦士數百訖不為累鄭國太夫人故太子太師江陵楊文莊公徽之之女文莊無子宣獻逮公繼主其祭事嵗時不絶嘗欲勒碑神道病革猶戒其子亟成之家書數萬巻多文莊宣獻手澤與四朝賜札藏秘惟謹或繕寫别本以備出入退朝則與子姪繙讐訂正故其收藏最號精宻平生無他嗜好惟沈酣簡牘以為娱樂雖甚寒暑未嘗釋巻早與仲弟都官君敏修文章學問互相開發子姪輩悉能奉循世範熈寜三年昆弟三人同年登科士大夫著為衣冠盛事公久在禁垣時歎榮滯而恬然裕處未嘗以世務嬰慮病中手疏治命止戒子孫勤約清白以紹世風幼子未官而推遺澤以及從孫兹又可以見其所存云耳母夫人常山郡太夫人畢氏故相文簡公之孫公又娶其姪光禄少卿從善之女號京兆郡君室則姑子家則婦姑慈和靜專濟美圖訓前四年逝公以世教浸薄禮服簡廢特制杖期以稱哀情言禮法者善之子男九人慶曽殿中丞匪躬著作佐郎二早夭尚賢將作監主簿正功大理評事表微揆方將作監主簿處仁始名女子二人適贊善大夫王佑秘書丞吕希純並先亡孫八人焞將作監主簿燔煜爚㷟煇灼皆未官孫女七人長適太常寺太祝曽說次適白馬縣丞范祖徳五幼未有行公年六十一以元豐二年四月甲辰終于春明坊之適寢以其年七月癸酉𦵏管城縣馬亭郷東城原宣獻公之右次旣𦵏矣諸孤泣血奉遺事抵僕曰先人平生相知之在朝者無若翰林范公洎公之久且深其𦵏也范公銘其壙矣今埏隧所表宜得公文以載於石二者蓋先志也僕惟三紀交遊趣舍不異仕宦出處亦畧相等懿文美行尤詳其始末銜悲紀實故質而不文銘曰皇世隆儒以文致治士陶其化超然特起荆山瑾瑜喬林把梓或生遠鄕或出門勢遭時並出蔚為邦器廟堂彬彬臺閣濟濟如古哲王思皇多士代有名家克濟其美彼美常山族茂枝繁風流儒雅奕葉蟬聨鴻都秘館由祖逮孫言論史經父子演繙惟宣獻公輔翊仁宗議論閎遠詞藻深雄一時標凖萬事中庸經邦貳政徳爵偕隆公踐世職徊翔閨掖朝廷典章禮樂沿革祖述源流貫穿今昔聞其話言士有矜式宣獻之文公實嗣之宣獻之博公又繼之寵禄方至謀謨未施徒留故事載在攸司公登史觀天子所選考紀初聞賜對清晏袍服改容覧書稱善聖言襃賁委成大典公疾不朝集英遣使挾醫診治召還其子公之云亡上嗟良史贈官詔𦵏不以常比馬亭之東父祖有墓豐碑重屋隱然崇阜公穴其旁不百舉步雙螭相望揭於衢路公之遺風士所嚮慕公之令子克承厥緒君子之澤何有世數施乎無窮兹丘以固蘇魏公文集巻五十一
