body:
  text: 蘇魏公文集卷四十九宋蘇頌撰啓謝知制誥右臣蒙恩授前件職者驟塵清禁仰服華褒才不副時愧無容處伏以王者審乎出令莫重訓辭儒臣職於代言是為華選自百篇之義缺洎七制之主興代有裁成之文形於播告之指述辭意則貴乎深厚而爾雅語詔册則欲其昭毅而和莊象夬揚庭言之文者行之逺演絲成綍體之大者述之難必資起草之工以贊發中之命右文在旦多士盈朝除書德音如常揚者時不乏言語侍從比朔臯者未足多光輝簮槖之聯增峻陛亷之等繼登兹選未易其人如某者才非有以絶羣學不足以適道屬少孤之多難常苦節以自持不辭小官蓋竊逮親之祿入望大利固無經國之謀幸當路之為言預復門之試可進登書府涉厯歲華職有屢遷效無薄最間奉召趨之一節入塵記史之二星載筆赤墀已玷從官之末著篇黃閣遽膺寵典之優升置掖垣典司渙令矧右曹之清秩實先子之嘗僚深愧鯫生復仍故職坐卧敢當於舊位翼成懼棄於後基世掌絲綸徒竊古人之美習知臺閣誤先寒士之求此蓋伏遇某官協贊聖辰主平公論士無愚哲咸歸品目之明言有吁俞素啓上聰之聽是令踈外辱在甄成敢不刻志始終匪躬朝夕奉遵職禁道無替於守官圖報國恩心不忘於知已亳州到任謝二府右某蒙恩差知前件州已到任上訖者隳官責薄敢辭逺守之勞易地恩優再竊近藩之寄適由便道遂此布條叨幸居多悸惶曷已伏念某挺至愚之稟無適用之才頃冒憲章上孤樂育一麾出守巳荷曲成之私六輔陪京遽膺內徙之寵虔命始臨於位表銜恩豈在於他門此蓋伏蒙某官推致大中之原輔成至治之極振滯淹以廣賢路靡有遐遺棄疵眚以盡人材俾其自效良慚懵昧復被甄收猥從僻陋之邦寖獲便安之地奉循詔令當官彌念於匪躬追省愆尤勠力尚期於晚節亳州到任謝兩省右某近膺朝命易守輔藩方其蒞事之初屬嬰多故惟是奏書之緩深愧非儀姑勤企德之誠猶惕負恩之誚伏念某早由孤宦誤擢近班不職稽違坐鐫西省之籍至仁惻隱出假東陽之麾郡壤雖遙土風甚媺頒條暇日但思追省於愆尤去國踰年不幸重罹於憂患旅懷多感榮仕寖忘豈圖易地之優獲在陪京之列非惟出於逺僻且復便於私營此蓋某官以直方之道致君以忠恕之心格物外收棄置使有漸階自慚疵眚之餘未副稱揚之惠寬其罪罟既蒙觀過之知勤於吏資敢怠當官之效心之蘄嚮言豈勝陳賀昭文僕射相公右某啓伏審某官筆述聖經書聞宸扆言綸誕告秩增左相之崇台鉉兼華地進東臺之長式彰儒效永化人文恭以某官生德自天潛心於古立言垂教若稽姬孔之猷熙載奮庸無愧臯夔之業閔學者之師悖欲聖人之指明間奉淵謨講詳典籍之奧獨推卓見發明義理之歸甫終汗簡之功盡革顓門之陋微言之緒復續於當今大道之行可期於兹世宜服寵嘉之渥進居師長之尊多士是依萬邦攸慶某拘嬰符鑰阻拜門藩涵泳塵編常患迷塗而擲埴參評舊學將期發覆以開明竊抃之誠喻言曷既回交代資政侍郎右某啓伏承某官請麾便郡移節近圻尚稽緣鵠之謀再遂左魚之適顧惟鄙陋夙忝從遊慙無告政之能將幸承顔之便雖嘗奏記巳愧後時豈圖公輔之尊曲徇平懷之體逺紆教尺過著謙撝兩紙八行固親踈而有意一日三復姑藏去以為榮伏況丹扆虛懷明庭佇告豈止平生之交義久俟彈冠諒惟遐邇之人心咸思躍冶郊迎有日股抃尤深更祈匽薄之餘益厚將綏之祉乃情企嚮臨紙奚言回知府經略密學右某啓伏審顯膺褒詔進直內樞勳望益髙輿情胥慰某官器能閎博智略淵通早推望族之華復擅文場之秀踐揚中外歷試劇煩制閫西陲進拓金湯之固斥疆遐服盡收冠帶之民躐躋禁密之聨蓋示疇咨之漸方欣異數遽枉華緘祗認眷私銘藏悃素回知府內翰右某伏念逖違門序第傾企嚮之懷恪守郡條時闕興居之問敢期隆顧逺辱貽書銜眷良深增慙固甚竊惟剸劇之裕無爽頤生之和伏以某官時棟上材聖門高第文章國之經緯德業民之表儀自奮躍于天衢遂簡知于黼座雍容禁復潤飾王猷不離侍從之聨總治浩穰之地名威已振儒效益彰諒匪俟於纍朝定進升於四輔暑躔加畏賔館尚賖伏冀精調庸副虔禱回知府內翰右某伏審某官寵膺朝制正尹都畿以文章侍從之才治衆大劇煩之地未勞餘力巳副具瞻伏惟某官賢業絶人忠言許國入當三册之問遂冠四方之豪黼座虛懷待以公卿之器金坡進直演成謨訓之辭上方以吏事而任三公時皆由選表而登二府今煩俊哲而為治實賴威名而鎮時諒匪纍朝遂登大任某久遊材館方假州符阻贄謁於賔閎但馳誠於天邑回南京權府運使中允右某此者叨膺制命獲守留京自省庸虛有慚寄任竊念某所慿不厚自視無竒徒用簡編之資漸階臺閣之選未蠲謫籍復敘郊禧閲麗正之圖書再塵儒職委離宫之管鑰繼荷恩章矧近府之會衝豈非材之冝據顧惟多幸得在提封奉行新書敢不悉心於庶務振舉大要方將稟誨於外臺豈謂某官屈使範之威眷朋簪之舊日圻千里俯勞臨涖之煩手札八行先枉勤渠之問披尋辭意銘篆膺心佇趣辦嚴之期即修謁贄之禮自餘悃欵靡俟究宣回南京通判郎中右某言念析符南服再越於歲期易地近疆薦叨於恩制適從便道遽此頒條企望藩封竊喜仁鄰之援拘縈官守無階晤語之期豈謂某官眷舊情深撝謙志篤特遣行人之使首貽纍幅之書褒以榮辭兹見相先之範藏之私禇彌敦永好之隆坐阻風徽難宣感悃回防禦太傅右某啓伏審朝門覆實文躋科等之優英節超恩秩峻州防之寄宗藩擢秀士論推髙竊以國家系本仙源慶流屬籍九族以睦廣帝堯文思之勛半楚而封盛炎漢王公之制寵拜雖緣於世緒褒甄必校於藝能時有卓爾特立之才上副褎然首舉之選恭以某官性資明敏問學該通志外綺紈之華躬持韋布之行河間好古樂與諸儒而並逰更生屬辭遂偕羣雋而進拔俄給上方之札髙中有司之程大對危言帝每篇而稱善通侯列爵位不次以加榮匪惟冠映於懿親固亦輝華於多士某欽聞時譽阻遘風期官守攸拘展慶儀而莫逮親賢垂眷枉翰尺以先貽載觀掞藻之華但切靦顔之愧無緣燕接益用銘銜回河東都運諫議右某啓伏審某官寵膺詔綍進擢諫坡仍留將漕之權且重撫封之寄素叨眷與竊抃鄙悰竊惟某官方正自持清通不澆早服教忠之訓久彰應務之才贊劇治煩風力稔聞於臺閣頒條刺郡聲猷夙簡於朝廷惟唐晉之舊墟扼戎羌之衝地均輸所寄功最薦登坐收制勝之謀就拜褒賢之典陟天子諍臣之列已峻近班繼大門先德之榮益為盛事敢意謙光之重不遺棄置之餘首貺箋封過敦禮範荷明哲久要之契銘著不忘祝公台大用之期傾依有日乃誠虔企臨紙奚言回瀛州安撫待制右某啓伏審某官被發中之詔膺謀帥之權進班禁閣之逰杖鉞瀛關之壤時登俊哲士有輝光伏惟某官以奧學清文羽儀臺閣以英聲茂實簡在朝廷向自書林之校文出分漕挽之將命兩淮川陸之會肅抗風稜二史言動之司旋歸禁從方告猷於帝右復領使於朔陲引錣運籌薦修農戰之備鑿門推轂遂有軍師之求寵加荷槖之聨益重元戎之寄為光清世襲美德門緩帶寢兵巳擅羊公之譽緇衣善職行歌鄭武之詩某早被眷知久違英晤自聽撫邊之拜久稽奏記之儀何大雅之謙撝不崇體貌顧並逰之冗外特貶緘書豈惟荷聲氣之所同抑亦增茂悅之深慶在於欣激難悉條陳杭州到任謝二府右某蒙恩差知前件州已到任上訖者全吳故社寧海雄藩異時禁近之巨公出為屏翰何意斥疏之逺迹遂許長臨適兹賦政之初深愧冒恩之厚伏念某器非閎逺躬負愆尤絶覬榮塗止期祿食昨罷睢陽之管入趨魏闕之朝典領圖書幸與諸儒之踵武出入臺省得階邇綴之班聨會江淮之薦飢煩宵旰之遐慮咨求良牧偶擢匪才受命飲氷敢自營於私便之官便道即宣布於上恩方事之叢以榮為懼此蓋某官道佐明主德施逺方眷東南隅之民尚艱粒食擇二千石之吏俾乂海邦再省孱虛奚堪責任敢不上體朝廷之意恪奉詔條拊循家户之人使安田里庶幾免過仰副至公回越州知府大資右某啓此者叨分朝寄獲假州符惟東南之要衝當熯災之為沴冝求宿望出布上恩顧兹蹇躓之餘素乏循良之譽誤膺咨牧來此長人受命飲氷姑夙宵而增愓之官便道頒條詔以云初伏遇某官暫輟政機出臨藩閫封疆千里幸依鄰國之光坯冶一陶更佇化工之賜敢謂謙撝之德特紆欵密之書味藻思之彌髙但銘丹臆望翹材之甚邇阻侍清塵感嚮之誠敷陳無盡回致政太傅侍中右某伏念假使竹於一方迹縻江海望翹材於千里目斷雲霄居慙走俗之勞遂闕問安之禮自惟簡怠宜取悔尤豈謂某官陂量兼容台躔委照固燕居之多暇裁尺素以見貽兩紙八行親枉鍾毫之妙片言一字意踰魯筆之褒兼聆高蹈之間固有多祥之集非徒感誦并用欣歡重念孱虛夙承奬拔離竒為器曲成特出於化工連蹇違時棄置自甘於散地悵舊恩之莫報嗟末路之攸拘慕赤松之逰無階企仰祝大椿之算但極傾馳上西川知府端明侍郎右某伏念辱知素深去德滋久下邦假守顧簿領之攸攖上館馳誠通記函而殆闕緬惟德履時擁天和伏以某官道繫斯文名重當世立朝則蘧史之載直作鎮則方召之告猷西南一都巳榮後拜之寵左右四輔佇繼緇衣之詩尚阻趨隅倍祈良食孤羇之迹陶冶是期上大孝昭文相公右某啓伏以某官以不時出之才內輔朝政以大丞相之重躬執親喪伏自倚廬西還灰籥屢變聖上惟同體之義夙夜注懷士民思造物之仁邇遐延首諒典册之前降期爐冶之再開蓋本朝故事之當行況上公虛位而佇復將兩全於忠孝宜俯就於情文某二紀荷知八年受賜迹留書館悵去德之踰時恩假州符盡提衡之素惠限兹遙阻未獲瞻承中心欲陳萬一奚究回登州知郡司封右某啓向者某官奏南司之課膺中詔之褒進左曹於省聨領奧藩於海裔蓋切循良之選爰咨端諒之能自承擁傳之去東居悵拊塵之坐隔懷鉛自窘未遑緘候之儀占牘不忘首辱惠存之問聆布條之伊始惟善俗之有方政務多間福基衆厚伏以某官奧學敏識峻節孤風得古人之清通為來者之矩矱郡邑之政沛然謡於民言臺閣之模凛乎肅於朝著方倚直繩之用遽膺半竹之行昔者由御史而為省郎唐官謂之清望出諫官而補郡守漢臣因以自陳矧惟碩哲之謨允協前良之美諒兹出守聊為外資詠中和之詩巳宣於主澤還顧問之列行奉於帝俞榮據顯華之塗參為孤拙之芘適臨歊暑坐逺清言願遵御於氣沖冀冥符於善禱乃情依嚮舐筆奚殫回宿州知郡郎中右某啓伏審某官出分使節巳布郡條頒仁政以便民聼風謡之載道矧素推於才譽巳詳試於良能諒非瓜戍之期即被璽書之寵别躋顯用乃協輿言某素偃聲猷幸依鄰壤方切餘輝之燭首貽尺牘之貽仰服謙撝但深悚荷賀樞密相公右某伏審某官寵膺制册入冠樞庭賢哲在朝中外交慶恭以某官謨資六德道贊九功二紀奮經綸之謨七年當鈞冶之柄致君之慮逹於天淵許國之誠貫於金石庶務由之清穆百度為之和平曩由陟屺之哀始正居廬之禮三年之孝已著於儀刑羣辟之師再符於夢卜惟新大政爰任舊人僉諧元老之尊特重本兵之地山甫文武之憲式副簡求傅説鹽梅之和聿隆瞻望某拘縈使竹阻造賔墀仰明命之誕揚倍常倫而歡抃回告諭太保右某近者伏承某官出諭帝宸之旨循行侯服之遙惟是末封獲瞻茂範雖喜接辭之便且慙為禮之踈屬軒斾之不留恨風規之遽隔料惟登頓無爽粹和適兹疾置之來首辱華箋之貺謙撝過厚感戢奚勝矧以聖政惟新遣使就安於列壤時才被選抗旌允副於上心諒竣事以還朝巳疇能而被寵清秋伊始閎館正遙冀眠食以自珍慰夙宵之所禱在於傾嚮靡逮周陳知府祠部先狀右某伏審某官榮分漢節出鎮淮藩驅大斾以戒行歷弊封而甫邇悠塗冒涉諒無爽於履祥近境將迎佇恭投於典謁乃心所嚮須面殫陳回觀察太尉右某近審某官懇請州麾出觀藩政方布便時之治巳騰來暮之謡朝寄值才士論歸美矧屬戚賢之望纍更中外之煩風績素隆柄任伊漸承偃藩之多暇傳占牘之斯來仍顧鯫生均紆厚禮榮辭見假本由巽下之誠髙誼所臨永訂要言之好在於感惕萃乃悰襟當寒律之正嚴諒神倪之益泰更勤輔養遲對寵嘉區區之心喋喋無喻回省副右某言念縈縻麾守隔闊門闌雖傾嚮誼之誠久闕馳郵之問敢期謙顧逺墜箋封諦味情文交輸愊臆欣承副計之暇無虧養浩之方恭以某官道本直清志敦恬裕逢辰奮於才美載世踐於顯華使節觀風宣四方而著效計庭參畫通九府以收勳諒弗俟於纍朝即别膺於大任炎暉巳熾崇館方遙尚冀精調少副詹禱上陵使相公右某伏審某官暫違宫闕祇事寢園營萬世固安之橅慰兩宫哀慕之志恭惟巳竣陵域歸止廟堂忘履跋之為勞固神明之薦祉伏以某官清寧間氣道德元龜文武憲乎四方謨猷宣乎九德昨者先皇厭世嗣聖承祧綴衣在庭首當顧命之屬同軌至會躬案因山之儀方大號之惟新賴庶綱之有寄熙帝之載邁虞書股肱之歌王功曰勳紀周人彛鼎之器永光鴻業允副具瞻回太原經略相公賀冬右某啓伏以灰飛氣應厯推天統之元剛長朋來易著乾陽之始伏惟某官任隆三事望重四朝輟端揆之彌綸布藩宣之條教簡簡降福慶已協於迎長巖巖具瞻民共歌於畫一敢期謙德逺貺華箋仰承眷與之私罙積悚銘之素莫遑面敘愈劇心搖回賀冬右某伏以珠躔起厯竹律生音斗指子以平時氣萌泉而仕物恭以某官公忠挺操幹敏馳聲適逢會於亨辰將茂迎於蕃祉限拘麾守阻奉賔儀方結慶懷首蒙華問祇佩眷勤之意但深悚企之私蘇魏公文集卷四十九
